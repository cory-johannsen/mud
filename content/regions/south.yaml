id: south
name: "South"
article: "the"
description: |
  The American South — swamp-drowned cities, fortified plantation compounds, and
  endless stretches of overgrown highway. The heat and humidity breed a particular
  kind of toughness. You're built like a brick wall but not known for your
  finesse or your charm.
