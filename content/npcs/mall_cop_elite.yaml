taunts:
  - "Sir, I'm going to need you to step away from the entrance."
  - "The Segway's gone but the authority absolutely remains."
  - "Mall security elite means I stopped being a joke about three years ago."
  - "This badge still means something. It means you're in violation."
  - "I've cleared malls, parking structures, and loading docks. You're nothing."
  - "People laughed at mall cops. Nobody's laughing now."
  - "The uniform's been modified. So have I."
  - "You are in an unauthorized zone. All zones are my zone."
  - "I've got a mall the size of a city block to patrol. You're slowing the patrol."
  - "Stun baton says comply. I say comply louder."
  - "The food court used to be the problem area. Now you're the problem area."
  - "Elite designation means I was the best when best still mattered."
  - "I arrested shoplifters. Then I arrested raiders. Same energy."
  - "Nobody takes from this mall without going through me."
  - "The mall board designated this a secure zone. I enforce the designation."
  - "My training was laughed at. My results are not laughed at."
  - "I know every entrance, exit, and hiding spot in this building."
  - "You're making a scene. I handle scenes."
  - "Compliance is mandatory. This is not a courtesy request."
  - "I've held this mall through three different faction claims. It stays held."
  - "The riot shotgun is for situations that require escalation. Congratulations."
  - "Security elite means I've earned the armor. And the attitude."
  - "Step away from the merchandise or I remove you from the premises."
  - "This mall has a no-threat policy. You're a threat. Policy applies."
  - "I've been doing this job since before and after the world ended. I'm very good at it."
  - "Segway or not, the mall cop always gets their person."
