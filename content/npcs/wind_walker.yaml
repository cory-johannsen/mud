id: wind_walker
name: Wind Walker
description: A mysterious figure who moves through the gorge winds like they aren't there, wrapped in layers of woven grass and leather.
level: 4
max_hp: 40
ac: 16
awareness: 11
ai_domain: scavenger_patrol
respawn_delay: "5m"
abilities:
  brutality: 10
  quickness: 16
  grit: 14
  reasoning: 12
  savvy: 17
  flair: 10
loot:
  currency:
    min: 30
    max: 100
  items:
    - item: wind_goggles
      chance: 0.15
      min_qty: 1
      max_qty: 1
    - item: gorge_moss
      chance: 0.5
      min_qty: 1
      max_qty: 3
    - item: medkit
      chance: 0.25
      min_qty: 1
      max_qty: 1
taunts:
  - "The gorge taught me that everything bends or breaks. Which are you?"
  - "I've walked paths through these winds that would scatter most people."
  - "Mysterious doesn't mean harmless. The gorge taught me that too."
  - "I hear the wind before you do. That's how long I've been listening."
  - "The grass and leather keep me warm. What keeps you safe?"
  - "You sense something wrong about me. Your senses are correct."
  - "Wind walkers move through this gorge like the wind does — without asking permission."
  - "I've been watching you since the ridge. You never noticed. That's instructive."
  - "The gorge has no mercy and neither do I."
  - "My awareness is sharper than yours. Has been for a long time."
  - "You can't outrun the wind. You won't outrun me."
  - "The layers I wear are from every season of living out here. They've seen more than you."
  - "I've navigated the gorge in total darkness. You're easier to handle than total darkness."
  - "Wind goggles say I've thought about surviving out here longer than you have."
  - "The gorge moss knows me. The gorge winds know me. You're new."
  - "Move quietly or move quickly — you can't do both well enough to matter."
  - "I've passed through territories that would kill most people. Your territory is one of them."
  - "The mystery is useful. It keeps people off-balance. Like you are now."
  - "Woven grass armor from the gorge. Light, flexible, effective. I made it."
  - "I don't fight like someone who's been fighting. I fight like someone who's been surviving."
  - "The wind gave me patience. I've had years of patience. It's run out."
  - "High savvy means I've read this situation and the reading isn't in your favor."
  - "I walk where others can't. I stop where others fall."
  - "The gorge runners know to let me pass. You don't have that wisdom yet."
  - "Something in how you move says you've never been in real wind. I have."
  - "The goggles are on. The patience is off."
