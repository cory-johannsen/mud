taunts:
  - "You're interrupting production. That offense carries a steep penalty."
  - "I built this brewery from ash and spite. Nothing takes it from me."
  - "You smell that? Hops, yeast, and incoming pain."
  - "The kettles are boiling. So am I."
  - "People travel fifty miles for my brew. They respect me or they don't come back."
  - "I've cracked skulls harder than yours and gone back to stirring the mash."
  - "Every scar on my arms has a story. You're about to be one of them."
  - "This apron's stained with more than hops. Don't make me add to it."
  - "You want the territory? You fight the warlord. That's me."
  - "My cleaver's handled tougher cuts than you."
  - "The workers here answer to me. So does everyone who walks through that door."
  - "I've beaten men twice your size with a steel ladle."
  - "Mess with my supply chain and you become the supply."
  - "Last raider who came through here is now part of the fermentation process."
  - "Liquid assets and lead fists — that's my business model."
  - "You've got two options: buy a round or bleed on the floor."
  - "My beer built this empire. My fists maintain it."
  - "The brew don't stop just because some fool wants a fight."
  - "I've survived five gang wars over this territory. You're nothing new."
  - "Try to take my kegs and I'll make you a cautionary tale."
  - "Respect the warlord or the warlord respects nothing about your continued health."
  - "I've broken bigger, meaner, and better-armed than you."
  - "The hops aren't the only thing that's bitter around here."
  - "Every drop I make costs sweat and blood. Today it'll cost yours."
  - "Warlord is a title you earn. I earned it the hard way."
  - "You don't walk into a king's brewery and start trouble."
