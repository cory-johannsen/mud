id: brew_warlord
name: Brew Warlord
description: A barrel-chested brewer in a stained leather apron, reeking of hops and violence. His arms are scarred from years at the kettles and in the fights.
level: 3
max_hp: 38
ac: 16
rob_multiplier: 1.5
awareness: 7
ai_domain: brew_warlord_combat
respawn_delay: "5m"
abilities:
  brutality: 16
  quickness: 12
  grit: 16
  reasoning: 8
  savvy: 10
  flair: 12
