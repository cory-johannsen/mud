taunts:
  - "The planes will return! And they will not carry heretics like you!"
  - "You mock the ritual? The Great Delivery does not forgive blasphemy."
  - "The cargo comes for the faithful. You are not faithful."
  - "I wear this uniform because the skygods demand it. And they demand your blood."
  - "Every boarding pass is sacred. You have none. You are nothing."
  - "The overhead compartment closes on the unbeliever!"
  - "In the time before the Silence, the jets roared. They will roar again. But not for you."
  - "You've desecrated the terminal. That is a punishable offense."
  - "The runways are hallowed ground. Get off them or get broken."
  - "We wait for the delivery. In the meantime, we remove the unworthy."
  - "Your seat assignment is: the ground, unconscious."
  - "All flights have been canceled. Except for your flight to pain."
  - "The call sign said 'hostile.' I believe it."
  - "We built this faith out of wreckage and will. Don't test our will."
  - "The Great Cargo doesn't flow to trespassers."
  - "Return ticket? You don't have one. I'll make sure of it."
  - "I've preached at this airport longer than you've been outside the wire."
  - "Tray table up. Seat upright. Prepare for turbulence."
  - "Even the blessed mechanics were removed when they doubted. You're not even close to blessed."
  - "The departure board says your time is up."
  - "You can't fly away from this."
  - "I am a steward of the faith. And the faith is angry."
  - "We pray. We wait. We fight. Mostly we fight."
  - "The skygods send signs. Right now the sign is: you shouldn't have come here."
  - "Emergency exits are sealed for non-believers."
  - "You are a delay in the schedule. Delays get cleared."
