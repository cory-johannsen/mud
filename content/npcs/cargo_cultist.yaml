id: cargo_cultist
name: Cargo Cultist
description: A wild-eyed zealot in a tattered flight attendant uniform, preaching that the planes will fly again.
level: 7
max_hp: 49
ac: 15
rob_multiplier: 1.0
awareness: 7
ai_domain: cargo_cultist_combat
respawn_delay: "5m"
abilities:
  brutality: 12
  quickness: 10
  grit: 14
  reasoning: 10
  savvy: 16
  flair: 14
loot:
  currency:
    min: 15
    max: 70
  items:
    - item: boarding_pass
      chance: 0.5
      min_qty: 1
      max_qty: 1
    - item: airline_meal
      chance: 0.3
      min_qty: 1
      max_qty: 1
    - item: medkit
