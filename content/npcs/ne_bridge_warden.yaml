id: ne_bridge_warden
name: Bridge Warden Cross
description: A towering enforcer in military plate, Warden Cross controls the Fremont Bridge eastern approach through force of personality and a modified battle rifle. She has held the bridge ramp for six years, turning the tangle of collapsed overpasses into an impregnable chokepoint. The gangs answer to her here. Nobody crosses without her permission.
