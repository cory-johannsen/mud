taunts:
  - "PDX tarmac belongs to the raiders now. You're on the runway."
  - "Aircraft fuselage armor means I rebuilt myself out of wreckage. Appropriate."
  - "This propeller blade has never been used for flying. It's been used for other things."
  - "The airport's been dead for years. The danger is very much still active."
  - "Jet fuel's rare and so is my patience. Both running low."
  - "You landed on the wrong tarmac."
  - "I've held runways against worse groups than you."
  - "Improvised armor from the fuselage of a 737. That's commitment."
  - "The machete's for when the rifle's too loud. Today I don't care about loud."
  - "PDX raiders run this whole airfield. You're in the airfield."
  - "I've cleared every terminal and hangar out here. The tarmac's the last holdout."
  - "Brutality's my best stat and I don't apologize for it."
  - "Hatchet, machete, rifle — I adapt to whatever the tarmac calls for."
  - "You came through the security gate. That gate is ours."
  - "Fuel vials and scrap — that's the currency out here. I'm very rich."
  - "The runways go on forever and I know every crack in them."
  - "Tarmac raider isn't a gang. It's a lifestyle. A violent one."
  - "I wear the plane on my back. I'm the last thing it'll ever hit."
  - "Three years on this tarmac and nothing's flown. Nothing leaves without my say either."
  - "The airport's my territory. The gift shops, the gates, the runways — mine."
  - "I've repelled four armed groups from this strip. Your count puts you at five."
  - "Brutal and fast — that's the combination that cleared this airport."
  - "Jet fuel doesn't burn itself. I've watched what happens when it does."
  - "Last crew that tried to use this runway didn't use it for what they planned."
  - "The propeller was decorative when I found it. It isn't anymore."
  - "Control tower's dark, the fuel line's cold, and I'm the only thing still running out here."
