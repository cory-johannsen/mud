id: tarmac_raider
name: Tarmac Raider
description: A brutal raider in improvised armor made from aircraft fuselage, wielding a propeller blade as a weapon.
level: 12
max_hp: 86
ac: 16
rob_multiplier: 1.0
awareness: 8
ai_domain: tarmac_raider_combat
respawn_delay: "5m"
abilities:
  brutality: 17
  quickness: 15
  grit: 14
  reasoning: 10
  savvy: 10
  flair: 10
