id: outlet_scavenger
name: Outlet Scavenger
description: A determined scavenger in a torn windbreaker, methodically picking through outlet mall debris.
level: 1
max_hp: 16
ac: 13
rob_multiplier: 1.0
awareness: 7
ai_domain: outlet_scavenger_combat
respawn_delay: "5m"
abilities:
  brutality: 10
  quickness: 14
  grit: 12
  reasoning: 12
  savvy: 12
  flair: 10
loot:
  currency:
    min: 5
    max: 30
  items:
    - item: outlet_tag
      chance: 0.5
      min_qty: 1
      max_qty: 3
    - item: scrap_metal
      chance: 0.4
      min_qty: 1
      max_qty: 2
taunts:
  - "This outlet mall is my outlet mall."
  - "Sale's over. For you, permanently."
  - "I've picked through every store in here twice. Back off my finds."
  - "Torn windbreaker but intact survival instincts."
  - "You think a mall is soft territory? Walk through one that's been three years dark."
  - "Price tags are useless now. Everything costs blood."
  - "Methodical means I've mapped every corner. You haven't."
  - "The outlet gives up good stuff to people who know where to look. I know."
  - "Every price tag in my pocket represents something you didn't get."
  - "Fast hands and faster feet — I move through here better than you think."
  - "I've claimed the outlet from one end to the other. That includes where you're standing."
  - "The windbreaker's torn. So is my patience for people who take my finds."
  - "Come for my salvage and find out how determined a scavenger gets."
  - "Other scavengers knew to stay out of my section. You didn't get the memo."
  - "There's more here than you can carry. That doesn't mean it's yours."
  - "I've survived in this mall longer than you've been looking."
  - "The stores are empty but the resistance is not."
  - "Check the tag: property of me."
  - "Efficient and territorial — that's outlet scavenging."
  - "I track what I take. You taking it makes the math wrong."
  - "Three seasons in this mall. I know every collapsed ceiling and every good shelf."
  - "Quick hands, good eyes, bad attitude about sharing."
  - "The outlet was picked clean by five different crews. I outlasted them all."
  - "You wandered into the wrong wing of the wrong mall."
  - "Twelve-season sale: everything must go, including you."
