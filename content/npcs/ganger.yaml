id: ganger
name: Ganger
description: A street tough with a scar across one cheek. He eyes you with territorial suspicion.
level: 1
max_hp: 18
ac: 14
perception: 5
ai_domain: ganger_combat
respawn_delay: "5m"
abilities:
  brutality: 14
  quickness: 12
  grit: 14
  reasoning: 8
  savvy: 10
  flair: 8
taunt_chance: 0.3
taunt_cooldown: "30s"
taunts:
  - "You don't belong here, outsider."
  - "Keep walking if you know what's good for you."
  - "Got any rounds? Didn't think so."
  - "This is our turf. You're trespassing."
skill_checks:
