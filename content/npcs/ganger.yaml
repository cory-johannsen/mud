taunts:
  - "This is our turf. You're about to find out why."
  - "Should've kept walking, outsider."
  - "I've broken better people than you."
  - "You picked the wrong block."
  - "Nobody comes back from this street."
  - "Last chance to turn around."
  - "You think you're tough? I've eaten tougher."
  - "We own everything from here to the overpass."
  - "Your face is gonna look a lot worse in a minute."
  - "I've been waiting for someone dumb enough to try me today."
  - "You got a death wish or just bad navigation?"
  - "Scream all you want — nobody's coming."
  - "I'm gonna enjoy this."
  - "You're bleeding on our street. I respect that."
  - "Hit me again. Go ahead."
  - "You're slower than the last fool I put down."
  - "Pain's all you're walking away with. If you walk away."
  - "Keep fighting. It just makes it better."
  - "We don't call the Patrol here."
  - "Money, chips, or your hands. Pick two."
  - "Nobody leaves this block without our permission."
  - "You're on borrowed time, friend."
  - "I've got nowhere to be except here, hurting you."
  - "The crew's watching. Gotta make this look good."
  - "Next time you see a corner with our colors, you run."
  - "This isn't personal. Well — it's a little personal."
  - "You should've paid the toll."
  - "Your last mistake was thinking you were welcome here."
  - "Still standing? That's cute."
  - "We'll strip you clean and leave you for the dogs."
