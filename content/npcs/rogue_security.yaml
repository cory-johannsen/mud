id: rogue_security
name: Rogue Security Guard
npc_type: combat
description: >
  A former airport security officer whose uniform has seen better days. The
  badge is still pinned to a chest rig cobbled together from tactical gear
  and salvage. Eyes dart between exits — old training mixed with new
  paranoia. The taser is long dead, but the baton and the attitude remain.
max_hp: 70
ac: 16
level: 10
awareness: 5
personality: aggressive
loot_table: security_gear
taunts:
  - "Badge is still on. Authority is still on. Get clear."
  - "I used to ask politely. Then the world ended."
  - "Former airport security. The taser's dead. The baton isn't."
  - "My training said de-escalate. My training didn't anticipate this."
  - "I've been watching every exit in this terminal since year one."
  - "The uniform's falling apart. The attitude isn't."
  - "Rogue security means I stopped following their rules and started following mine."
  - "Six years in airport security. Two years post-collapse. I've seen everything."
  - "Eyes on every exit — old habit. You're not going to any of them."
  - "The chest rig's cobbled together but functional. So am I."
  - "Paranoid keeps you alive in here. I'm very alive."
  - "You're not cleared for this area. I'm cleared to remove you."
  - "The badge means I used to have authority. The baton means I still do."
  - "Post-collapse security is more incentivized than the old kind."
  - "I've patrolled this terminal in the dark for so long I don't need lights."
  - "Everything I learned about people who don't follow rules is about to apply."
  - "Back in the day I'd radio for backup. Today I am the backup."
  - "My paranoia has saved me three times this week. Today makes four."
  - "You're not following procedure. Procedure would have been to not come here."
  - "Combat training's mostly improvised. Still works."
  - "The old security tapes would show me doing this job. I still am."
  - "Don't make me use this baton. Actually — I don't mind using the baton."
  - "Every corner of this facility is documented in my head."
  - "Cleared, cleared, not cleared — that's you, on the right."
  - "I've held this post through riots, raids, and two flu seasons. You're a Tuesday."
  - "Security rogue means I work for myself now. Right now I'm working on you."
