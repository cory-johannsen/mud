id: rustbucket_ridge_warlord
name: Iron Duke Salvage
description: >
  The undisputed ruler of Rustbucket Ridge, Iron Duke Salvage built his empire
  from scrap metal and raw violence. A former heavy equipment operator, he
  wears a welded suit of industrial plate and swings a pneumatic-assisted
  maul that can punch through vehicle doors. Every piece of scrap on the ridge
  passes through his hands. He enforces tribute with methodical brutality
  and has never lost a territorial dispute — because he doesn't leave
  survivors to contest the outcome.
level: 30
max_hp: 810
tier: boss
ac: 24
rob_multiplier: 2.0
