taunts:
  - "The Ridge is mine. Every scrap, every life on it."
  - "I've crushed harder people than you with one hand."
  - "Iron Duke doesn't negotiate. Iron Duke eliminates."
  - "You came for the warlord? Here I am. Enjoy what's left of your life."
  - "The scrapyard has swallowed entire crews. You're next."
  - "Every piece of metal on this ridge has my name on it. So do you."
  - "I built this empire from nothing. I'll add your bones to the foundation."
