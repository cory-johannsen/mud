id: warehouse_guard
name: Warehouse Guard
description: An armored guard standing before warehouse doors, steel pipe in hand, daring anyone to try getting past.
level: 32
max_hp: 300
ac: 19
rob_multiplier: 1.2
awareness: 8
ai_domain: ganger_combat
respawn_delay: "5m"
abilities:
  brutality: 15
  quickness: 14
  grit: 16
  reasoning: 10
  savvy: 12
  flair: 9
loot:
  currency:
    min: 20
    max: 80
  items:
    - item: steel_pipe
      chance: 0.25
      min_qty: 1
      max_qty: 1
    - item: shipping_manifest
      chance: 0.3
      min_qty: 1
      max_qty: 1
    - item: medkit
      chance: 0.2
      min_qty: 1
      max_qty: 1
weapon:
  - id: steel_pipe
    weight: 3
  - id: rebar_club
    weight: 2
  - id: combat_knife
    weight: 1
armor:
  - id: leather_jacket
    weight: 2
  - id: tactical_vest
    weight: 3
taunts:
  - "These doors don't open for you."
  - "I'm standing in front of the warehouse because I'm supposed to be standing in front of the warehouse."
  - "The pipe says back off. I say it louder."
  - "Whatever's in here is not yours. It's not for you. Go away."
  - "Guard duty pays in food and shelter. I take it seriously."
  - "I've held this door through three attempts. You're number four."
  - "The warehouse is locked. I'm the other lock."
  - "Shipping manifest says everything in here is accounted for. Including the violence needed to protect it."
  - "I don't ask what's inside. I ask what you're doing outside. Wrong answer."
  - "Steel pipe's good for pipes and heads. Very versatile."
  - "Every approach to this building is my approach. You used one."
  - "The rebar club's for when the pipe feels inadequate. It usually doesn't."
  - "You came to take from the warehouse. I came to prevent that. One of us succeeds."
  - "Guards who go soft don't stay guards. I stay guards."
  - "The job is simple: nobody gets in. You're testing the simplicity."
  - "Armed, armored, and very clear about what I'm protecting."
  - "The doors stay shut while I'm breathing. I'm breathing."
  - "I've heard every story about why someone needs to get into this warehouse. None of them worked."
  - "Whoever owns this inventory hired me because I'm reliable. I'm being reliable right now."
  - "Three winters on guard duty. My patience for this conversation is limited."
  - "You can't see what's in there. I can't let you see what's in there."
  - "The manifest is in my pocket. The reasons I protect it are in the pipe."
  - "You're making a scene at a building I protect. That's my problem to solve."
  - "I don't take bribes. I take this job seriously."
  - "Every crate in there represents someone's investment. I represent their security."
  - "Stand down or get put down. Guard choice."
