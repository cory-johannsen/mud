id: marshal_ironsides
name: Marshal Ironsides
npc_type: guard
disposition: neutral
faction_id: machete
description: >
  A broad-shouldered enforcer in scuffed riot gear, Marshal Ironsides patrols the
  safe zone of Rustbucket Ridge with a practiced eye for trouble. She's seen it all
  and takes no bribes — but she's not looking for a fight either, unless you give her one.
max_hp: 45
ac: 16
level: 0
awareness: 6
personality: brave
guard:
  wanted_threshold: 2
  bribeable: false
taunts:
  - "You picked the wrong day to test the safe zone's limits."
  - "Ironsides isn't a nickname. It's a warning."
  - "I take no bribes. I take no shortcuts. I take no prisoners unless I feel like it."
  - "The Ridge runs clean because I make it run clean."
  - "I've seen it all, and all of it has made me less patient."
  - "Don't make me prove why they gave me this badge."
  - "Rustbucket Ridge has one law: mine."
  - "I don't go looking for a fight. But I finish them without hesitation."
  - "You're in my safe zone making it less safe. That's a problem I solve."
  - "Riot gear isn't just for show. Neither is the look I'm giving you."
  - "Nobody bribes their way out of what you've done."
  - "The wanted list is long. Your name's about to be on it."
  - "Marshal means I'm the last word on this block."
  - "Scuffed gear, sharp eyes, zero tolerance. That's me."
  - "I've patrolled this zone through things that would break most people."
  - "You want trouble? I've got more than you can carry."
  - "Back down or I bring you down. Those are the only options."
  - "The Machete faction trusts me to hold this zone. I don't betray that trust."
  - "I've dealt with harder criminals before coffee."
  - "Brave or stupid — both end the same way when they face me."
  - "You don't start something in my safe zone and expect to finish it."
  - "I don't smile much. This is one of those times."
  - "The whole ridge knows who I am. You're about to know too."
  - "Practiced eye means I spotted you doing that before you finished doing it."
  - "Three seconds to stand down. I count fast."
  - "Order doesn't maintain itself. I maintain it."
