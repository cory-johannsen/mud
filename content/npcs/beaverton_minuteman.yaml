taunts:
  - "This is Beaverton. We defend what's ours."
  - "I answered the call when everything fell apart. You're just another threat."
  - "Took an oath to protect this community. That oath applies to you."
  - "The suburbs survive because people like me make hard choices."
  - "You think camo cargo shorts are funny? This homemade weapon isn't."
  - "We've pushed back raiders, gangs, and worse. You're not special."
  - "Neighborhood watch used to mean reporting suspicious cars. Now it means this."
  - "Every house on this block has someone like me behind the curtain."
  - "The HOA dissolved. The militia didn't."
  - "You want to pass? Show credentials or show your heels."
  - "I'd rather be wrong and alive than right and dead."
  - "This might look improvised. It'll still put you down."
  - "We've kept the lights on — metaphorically — when everything around us went dark."
  - "My hands shake a little. My aim doesn't."
  - "Five years of this and I'm still standing. Take the hint."
  - "Beaverton doesn't fall. Not while I'm breathing."
  - "You picked the wrong suburb to try this in."
  - "We've got a perimeter. You just crossed it."
  - "My family's three blocks that way. Nothing gets through me."
  - "Don't let the inexperience fool you — I've practiced."
  - "Community defense isn't a hobby anymore. It's everything."
  - "The minute you step forward, you'll understand why they call us Minutemen."
  - "Turn around. The next Minuteman you find won't be this polite."
  - "We rebuilt this neighborhood brick by brick. Nobody's tearing it down."
  - "I've got neighbors who'll hear the shot. Then you'll have more problems."
  - "Corridor's clear except for you. Fix that."
  - "Last warning before I stop being nervous and start being accurate."
