id: ne_portland_brew_lord
name: Dex the Brew Lord
description: >
  A mountain of a man whose brewery compound is the most fortified structure
  in Northeast Portland. Dex distilled his authority the same way he distills
  his product — slowly, under pressure, with heat. He brews the only reliable
  alcohol in the district and charges accordingly, using the monopoly to fund
  his enforcers and keep rivals in line. His fists are calloused from years
  of barrel-rolling and head-cracking.
level: 12
max_hp: 86
ac: 16
