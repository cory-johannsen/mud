taunts:
  - "Every taproom on Mississippi pays tribute. So will you, one way or another."
  - "I built this compound with these hands. I defend it the same way."
  - "You want to take on the brewery? You can't even handle the fumes."
  - "Mississippi Ave runs on my product and my rules. Both are non-negotiable."
  - "I've cracked skulls harder than yours and gone back to brewing before sunset."
  - "The grain fermenting in those tanks is worth more than your life. Act accordingly."
  - "NE Portland respects two things: good beer and the man who makes it. I'm both."
