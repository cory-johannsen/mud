id: ross_salvager
name: River Salvager
description: A wiry scavenger with a bolt-action rifle slung over one shoulder and a belt full of stolen tools. They work the island's shores for scrap and tolerate no witnesses.
level: 3
max_hp: 28
ac: 14
awareness: 8
ai_domain: scavenger_patrol
respawn_delay: "5m"
abilities:
  brutality: 12
  quickness: 15
  grit: 12
  reasoning: 10
  savvy: 13
  flair: 8
loot:
  currency:
    min: 20
    max: 60
  items:
    - item: scrap_metal
      chance: 0.5
      min_qty: 1
      max_qty: 3
    - item: salvage_tools
      chance: 0.3
      min_qty: 1
      max_qty: 1
    - item: medkit
      chance: 0.1
      min_qty: 1
      max_qty: 1
weapon:
  - id: bolt_action_rifle
    weight: 3
  - id: hunting_knife
    weight: 2
armor:
  - id: work_jacket
    weight: 3
  - id: leather_jacket
    weight: 2
taunts:
  - "Ross Island doesn't appreciate witnesses."
  - "I work alone because witnesses complicate things. You're a witness."
  - "The bolt-action says stay back. I also say stay back."
  - "I've cleared this shoreline of competition three times. Four's easy."
  - "Wiry doesn't mean weak. Ask the last person who thought that."
  - "The island's full of scrap and I know where all of it is. You don't."
  - "I don't share my salvage routes. Or my oxygen with trespassers."
  - "Stolen tools built a life out here. I defend that life."
  - "Every shore, every bank, every pile — I've catalogued it all."
  - "River salvaging requires knowing when to shoot and when to wait. I know."
  - "The rifle's for distance. The hunting knife's for when you get close."
  - "You came to the wrong island looking for the wrong things."
  - "I work the shores because nobody else dares. That means no one comes here without consequences."
  - "Silent, wiry, and very good at this. Three warnings in one."
  - "The work jacket's from a crew I used to run with. They're not around anymore."
  - "Ross Island provides if you're hard enough to take it. I'm hard enough."
  - "You're standing on my inventory."
  - "No witnesses means the price of finding me is higher than you want to pay."
  - "The salvage goes in the bag. You go in the river."
  - "Patient, fast, and not interested in conversation."
  - "I've maintained this site through floods and scavenger crews. You're a smaller problem."
  - "Accurate at distance and aggressive up close. Choose your range poorly."
  - "The island keeps its secrets and I keep mine. You're about to be one."
  - "Long-range warning. Short-range consequences. You're at consequences range."
  - "I live on what I take from these shores. That makes me very motivated."
  - "The water doesn't know your name. Neither will anyone else."
