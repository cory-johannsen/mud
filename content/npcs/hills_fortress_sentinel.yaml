id: hills_fortress_sentinel
name: Fortress Sentinel
description: An elite knight of the inner sanctum, armored from helm to boot in layered server-rack plating. These sentinels are chosen for size and absolute loyalty to the Kingdom's core.
level: 12
max_hp: 86
ac: 16
awareness: 8
ai_domain: ganger_combat
respawn_delay: "5m"
abilities:
  brutality: 18
  quickness: 10
  grit: 17
  reasoning: 11
  savvy: 10
  flair: 9
loot:
  currency:
    min: 60
    max: 200
  items:
    - item: knight_tabard
      chance: 0.3
      min_qty: 1
      max_qty: 1
    - item: server_rack_panel
      chance: 0.25
      min_qty: 1
      max_qty: 2
    - item: medkit
      chance: 0.2
      min_qty: 1
      max_qty: 1
resistances:
  bludgeoning: 3
  slashing: 3
weapon:
  - id: tactical_hatchet
    weight: 2
  - id: suburban_machete
    weight: 2
  - id: bayonet
    weight: 1
armor:
  - id: tactical_vest
    weight: 2
  - id: kevlar_vest
    weight: 3
taunts:
  - "The inner sanctum does not receive visitors."
  - "I was chosen from among the Kingdom's finest. Now you face the finest."
  - "Layer upon layer of plating. You'll run out of strength before you find flesh."
  - "Absolute loyalty means I don't negotiate and I don't hesitate."
  - "The core of the Kingdom is behind me. You will not pass."
  - "I've trained for this exact moment. Have you?"
  - "A sentinel of the inner sanctum is not merely a guard. We are the wall."
  - "Size and loyalty — two things that will not bend today."
  - "You've come further than most. That's where it ends."
  - "The King's trust is heavier than any armor. I carry both."
  - "Every soldier who wanted to be here was tested. I passed. You won't."
  - "The fortress held before you came. It'll hold after."
  - "Elite doesn't mean arrogant. It means I'm genuinely better at this than most."
  - "My post is the final post. You've reached the end of your plan."
  - "Server rack plating is surprisingly effective. You'll discover that."
  - "I've been standing sentinel for three years. I don't tire. I don't doubt."
  - "Come through me if you can. You can't."
  - "The Kingdom's inner sanctum has never been breached. Honor that record."
  - "I was picked for size and loyalty. I take both seriously."
  - "Whatever you planned, it ends here."
  - "The hatchet's for close work. The machete's for everything else."
  - "I've faced harder opponents than you in training. They didn't get through."
  - "No voice goes beyond this post without clearance. No body either."
  - "Three layers of plating, two weapons, one objective: you don't pass."
  - "Sentinels of the inner sanctum are chosen last and fight longest."
  - "You've made an error in judgment that I am about to correct."
  - "The Kingdom stands because its defenders stand. I stand."
