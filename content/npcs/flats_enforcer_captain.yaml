taunts:
  - "I run the Enforcer Den. You just walked into my office."
  - "Veteran of this block, this block, and that block. I know all of them."
  - "Deliberate and dangerous. Those are my two modes. Guess which one you triggered."
  - "The crew answers to me. So does everyone who steps inside the Flats without permission."
  - "I've seen harder people than you break. I enjoyed watching."
  - "Scarred and still standing. What does that tell you?"
  - "Authority means I don't have to hesitate. I won't."
  - "Every scar is a lesson someone taught me that I'm about to teach you."
  - "You came to the Flats looking for what, exactly? A funeral?"
  - "I don't give second chances. I don't have to."
  - "This block's mine. The crew's mine. The outcome of this fight is mine."
  - "I've broken people who thought they were coming to take my corner. They were wrong."
  - "Violence isn't something I resort to. It's something I prefer."
  - "Captain means I'm the last line. You should've been stopped before reaching me."
  - "My reputation alone should've turned you around. Poor information."
  - "Ten years in Felony Flats. Nobody takes this title without earning it bloody."
  - "You thought the crew was tough? You haven't met the person they answer to."
  - "I don't bother with threats. Watch what I do instead."
  - "The Flats respects strength. You have none. That's a problem."
  - "I've commanded this block through three gang wars and a flood. You're a Tuesday."
  - "Last person to test me is still being found in pieces."
  - "The Den stands because I put down everything that challenged it."
  - "Step forward. I'm curious whether your nerve matches your stupidity."
  - "Pain is a lesson. I'm an excellent teacher."
  - "Nobody on this block questions me. Now nobody off it either."
  - "Your move was mistake one. Every move after this is a mistake I'll enjoy."
  - "Practiced authority means I don't even have to raise my voice. But I can."
