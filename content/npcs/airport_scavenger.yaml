id: airport_scavenger
name: Airport Scavenger
npc_type: combat
description: >
  A lean, sun-darkened figure draped in layers of salvaged clothing. Carries
  a wire-framed backpack stuffed with stripped electronics and copper wire.
  Scavengers are territorial about their picking grounds and will fight
  viciously over even small caches of useful junk. The eyes are calculating,
  always pricing out what you're carrying.
max_hp: 18
ac: 12
level: 2
awareness: 4
personality: territorial
loot_table: scavenger_junk
taunts:
  - "This terminal's mine. Every gate, every corridor."
  - "I've been picking this place clean for two years. You're not taking my finds."
  - "Put it down. That copper is spoken for."
  - "You think this junk is free? Nothing here is free."
  - "I know every exit in this airport. You don't."
  - "Touch my pile again and I'll use this pipe to rearrange your face."
  - "The runways are mine. The terminals are mine. Move on."
  - "I've fought off three crews trying to claim this wing. You're next."
  - "Lot of bones under this tarmac. Yours can join them."
  - "See this wire? Worth more than your life."
  - "Other scavengers learned to stay away. You'll learn too."
  - "The airport doesn't belong to anyone — except me."
  - "I was here before you and I'll be here after."
  - "Keep your hands off my circuits."
  - "This whole concourse is priced out. Trespassers pay in blood."
  - "Cargo bay B is my bedroom. You just knocked on the wrong door."
  - "Back off before I strip you for parts too."
  - "You've got shiny things on you. I'll be taking those."
  - "There's more scrap in this place than you could ever carry. You don't need mine."
  - "My territory runs from baggage claim to the international terminal."
  - "I've been friendly long enough. Now I'm just hungry."
  - "You're standing on a gold mine of wire and aluminum. I found it first."
  - "Leave now and I won't follow. Stay and we see who bleeds more."
  - "The dead left a lot behind. I claimed it. Get your own."
  - "You look like you've got at least a kilo of useful scrap on you."
