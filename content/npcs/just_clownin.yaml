id: just_clownin
faction_id: just_clownin
name: Just Clownin
description: >
  The one they call Just Clownin presides over the camp like a ringleader who
  never got the memo that the show was over. White-painted face cracked with age
  and grime, a tailcoat stitched from a dozen different fabrics, a top hat
  crowned with a severed rubber hand. He doesn't just perform violence — he
  choreographs it. Every clown in the camp takes their cues from him.
level: 7
max_hp: 90
ac: 15
rob_multiplier: 2.0
awareness: 10
respawn_delay: "10m"
disposition: hostile
abilities:
  brutality: 16
  quickness: 16
  grit: 14
  reasoning: 10
  savvy: 12
  flair: 20
loot:
  currency:
    min: 100
    max: 300
  items:
    - item: greasepaint
      chance: 1.0
      min_qty: 1
      max_qty: 1
taunts:
  - "LADIES AND GENTLEMEN — tonight's main act is your destruction!"
  - "You came to see the show? You ARE the show."
  - "I've been performing for twenty years. The crowds got smaller. The clowns got meaner."
  - "Every act needs a finale. Yours starts now."
  - "I don't just run this camp. I AM this camp."
  - "The makeup never comes off. Neither does the smile. Neither will yours."
  - "They called me Just Clownin. Like it was a joke. EVERYTHING IS A JOKE."
  - "Step right up, step right up — last performance of your life!"
  - "I trained these clowns. They are artists. You are their canvas."
  - "The show must go on. And the show goes on over you."
