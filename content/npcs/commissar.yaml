id: commissar
name: Commissar
description: >-
  A sharp-eyed political officer in a pristine uniform, the only clean
  clothes in the wasteland. Their voice carries absolute authority.
level: 3
max_hp: 24
ac: 14
rob_multiplier: 1.5
awareness: 9
ai_domain: commissar_combat
respawn_delay: "5m"
abilities:
  brutality: 10
  quickness: 12
  grit: 14
  reasoning: 15
  savvy: 14
  flair: 17
loot:
  currency:
    min: 30
    max: 120
  items:
    - item: red_armband
      chance: 0.5
      min_qty: 1
      max_qty: 1
    - item: commune_ration
      chance: 0.4
      min_qty: 1
      max_qty: 2
    - item: medkit
      chance: 0.2
      min_qty: 1
      max_qty: 1
weapon:
  - id: assault_rifle
    weight: 3
  - id: heavy_revolver
    weight: 2
  - id: combat_knife
    weight: 1
armor:
  - id: tactical_vest
    weight: 2
  - id: kevlar_vest
    weight: 3
taunts:
  - "Your defiance is noted. It will be addressed. Forcefully."
  - "The Party's will is absolute. So is my authority."
  - "Ideological deviation carries severe consequences. You are deviating."
  - "I have executed traitors in cleaner uniforms than you."
  - "Compliance is not optional. It is the only option."
  - "The collective demands order. I am order."
  - "You speak to me without the proper deference. Correct that immediately."
  - "I represent more than myself. Your defiance insults all of us."
  - "Revolutionary justice is swift and certain. Prepare to receive it."
  - "We did not survive the collapse to tolerate dissenters."
  - "Your attitude indicates counter-revolutionary tendencies. I address those directly."
  - "This uniform has never been dirtied by surrender. Yours will be dirtied by failure."
  - "I have authorized the use of force. You may begin being afraid now."
  - "Authority isn't earned in the wasteland. It's taken. I took it."
  - "There is a right side of this. You are not on it."
  - "I have sent better soldiers than you to re-education. You'll skip that step."
  - "The discipline I enforce is for the benefit of all. Even you, if you'd listen."
  - "Resistance is a choice. The consequences are not."
  - "This clean uniform represents everything we're fighting to rebuild. Don't soil it with your presence."
  - "I have eliminated threats to collective security before sunrise and been done before breakfast."
  - "Your file reads: unaffiliated, hostile, expendable."
  - "We have a saying: the nail that sticks up gets hammered. You're sticking up."
  - "I don't lose sleep over necessary enforcement. I won't lose any over you."
  - "Speak when spoken to. You were not spoken to."
  - "Order first. Mercy later. Possibly."
  - "The commissariat does not negotiate with threats. We neutralize them."
