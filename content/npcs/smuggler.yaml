id: smuggler
name: Smuggler
description: A shifty figure in a long coat, pockets bulging with goods of questionable origin.
level: 16
max_hp: 120
ac: 17
awareness: 7
ai_domain: scavenger_patrol
respawn_delay: "5m"
abilities:
  brutality: 10
  quickness: 15
  grit: 12
  reasoning: 12
  savvy: 9
  flair: 14
loot:
  currency:
    min: 25
    max: 90
  items:
    - item: contraband_pack
      chance: 0.35
      min_qty: 1
      max_qty: 1
    - item: trade_token
      chance: 0.25
      min_qty: 1
      max_qty: 1
    - item: scrap_metal
      chance: 0.4
      min_qty: 1
      max_qty: 3
taunts:
  - "The coat's long for a reason. So are the odds against you."
  - "Shifty means fast. You'll find that out."
  - "I've moved contraband through checkpoints, militia lines, and gang territory. You're easier."
  - "Everything in my pockets is worth more than your life. I protect my pockets."
  - "Three factions want what I'm carrying. You're none of them and this isn't a deal."
  - "I've talked my way out of worse situations than this. Talking's done."
  - "Smugglers survive on flair and fast feet. Plenty of both right here."
  - "The long coat hides a lot of things. You're about to find one of them."
  - "Trade tokens aren't just for trading. They're for bribing, and failing that, for throwing."
  - "I've done business across every faction line in Portland. You're not a faction."
  - "My supply chain runs through your neighborhood. You're disrupting commerce."
  - "I know which doors to knock on in this city. I know which ones to kick."
  - "Don't grab a smuggler's coat. You don't know what's in the pockets."
  - "Every item I carry has a buyer. The trouble I'm about to bring you has a seller."
  - "Quick feet, quick hands, and absolutely no loyalty to anyone right now."
  - "I've outrun people in heavier gear than yours."
  - "The contraband isn't mine. The knife is. The knife doesn't care."
  - "Questionable goods, very certain violence. That's the current situation."
  - "Three years running product through a collapsed city has made me very adaptable."
  - "My operation depends on discretion. You've ruined discretion. Consequences follow."
  - "I've been searched, threatened, and chased. None of those stopped me."
  - "The long coat says I'm a smuggler. The look on my face says I'm done being polite."
  - "I move things people want moved. Right now I want to move you out of my way."
  - "Flair means I make it look easy. It's not easy. For you."
  - "I know people in every district. Right now the only relevant one is me."
  - "You're holding up a delivery schedule that three very impatient people care about."
