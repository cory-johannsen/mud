id: ne_scavenger
name: NE Scavenger
description: A gaunt figure in patched canvas, hauling a duffel bag of salvage. Eyes sunken but alert, always looking for unattended resources — or unattended people.
level: 2
max_hp: 20
ac: 13
awareness: 7
ai_domain: scavenger_patrol
respawn_delay: "5m"
abilities:
  brutality: 11
  quickness: 13
  grit: 12
  reasoning: 9
  savvy: 13
  flair: 8
loot:
  currency:
    min: 8
    max: 40
  items:
    - item: scrap_metal
      chance: 0.6
      min_qty: 1
      max_qty: 3
    - item: medkit
      chance: 0.15
      min_qty: 1
      max_qty: 1
weapon:
  - id: combat_knife
    weight: 3
  - id: steel_pipe
    weight: 2
taunts:
  - "This duffel bag is full and I'd like to keep it that way."
  - "Gaunt doesn't mean dead. I'm very much not dead."
  - "Sunken eyes see everything. I saw you coming."
  - "NE Portland was picked clean by people like me. It's still being picked."
  - "I carry what I find and I find what I fight for."
  - "You've got unsecured gear. I have an interest in unsecured gear."
  - "Canvas patch, duffel bag, and a knife that's been used plenty."
  - "Alert is the right word. Extremely alert."
  - "I've lived out of this bag for two years. It stays full."
  - "Unattended resources include you, technically."
  - "The difference between me and you is I'm currently winning."
  - "Don't follow a scavenger into their territory. This is my territory."
  - "I know every abandoned building on this strip. You don't."
  - "The pipe's for crowbars. Also for people who want what I've crowbarred."
  - "You look like you've got a few useful pounds on you."
  - "I've outrun faster and outfought stronger. You're in the middle somewhere."
  - "NE scavengers operate by one rule: what's mine is mine and what's yours is negotiable."
  - "Don't make me drop the bag. I'll be very angry about dropping the bag."
  - "Hollow face doesn't mean hollow effort."
  - "I've survived on the margins so long the margins are home."
  - "Step away from my haul and we don't have to do this."
  - "Opportunistic is a nice word for what I am. The other words are less polite."
  - "The knife's been sharpened today. What have you done today?"
  - "Touch my scrap and you become part of my haul the hard way."
  - "Gaunt, alert, and absolutely done with people approaching my site."
  - "I found this corner. I'll find a way to make you regret questioning that."
