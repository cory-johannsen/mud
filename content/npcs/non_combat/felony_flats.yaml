  name: "Broken Arrow Hostess"
  npc_type: brothel_keeper
  npc_role: brothel_keeper
  type: human
  description: "Runs the Broken Arrow Lounge from a reinforced back room in the Jade District. Business is cash only, discretion is included."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 8
  disposition: neutral
  personality: neutral
  abilities:
    brutality: 8
    grit: 10
    quickness: 11
    reasoning: 10
    savvy: 13
    flair: 14
