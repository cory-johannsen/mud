- id: lake_oswego_merchant
  name: "The Sommelier"
  npc_type: merchant
  type: human
  description: "Sells curated goods from behind a repurposed wine bar. The markup is polite but firm."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  merchant:
    merchant_type: general
    sell_margin: 1.4
    buy_margin: 0.4
    budget: 1200
    inventory:
      - item_id: stim_pack
        base_price: 60
        init_stock: 4
        max_stock: 8
    replenish_rate:
      min_hours: 8
      max_hours: 16
      stock_refill: 1
      budget_refill: 250

- id: lake_oswego_healer
  name: "Dr. Ashford"
  npc_type: healer
  type: human
  description: "A former general practitioner who still insists on proper technique. More expensive than most."
  level: 4
  max_hp: 22
  ac: 10
  awareness: 4
  disposition: neutral
  personality: neutral
  healer:
    price_per_hp: 6
    daily_capacity: 120

- id: lake_oswego_job_trainer
  name: "The Career Counselor"
  npc_type: job_trainer
  type: human
  description: "Believes in matching skills to roles. The counseling is unsolicited but surprisingly accurate."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  job_trainer:
    offered_jobs:
      - job_id: scavenger
        training_cost: 150
        prerequisites:
          min_level: 1
      - job_id: drifter
        training_cost: 250
        prerequisites:
          min_level: 2

- id: lake_oswego_banker
  name: "Private Banker"
  npc_type: banker
  type: human
  description: "Discreet, professional, and entirely uninterested in where the money came from."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  banker:
    zone_id: lake_oswego
    base_rate: 0.90
    rate_variance: 0.04

- id: lake_oswego_hireling
  name: "The Attendant"
  npc_type: hireling
  type: human
  description: "Trim, quiet, and capable. Available for hire. References provided on request."
  level: 3
  max_hp: 28
  ac: 12
  awareness: 4
  disposition: neutral
  personality: opportunistic
  hireling:
    daily_cost: 100
    combat_role: melee
    max_follow_zones: 3
