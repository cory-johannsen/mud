- id: aloha_merchant
  name: "Swap Meet Sally"
  npc_type: merchant
  type: human
  description: "A fast-talking trader with a folding table covered in goods from six different factions. She remembers every price."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 4
  disposition: neutral
  personality: neutral
  merchant:
    merchant_type: general
    sell_margin: 1.3
    buy_margin: 0.45
    budget: 1000
    inventory:
      - item_id: stim_pack
        base_price: 50
        init_stock: 5
        max_stock: 10
    replenish_rate:
      min_hours: 6
      max_hours: 12
      stock_refill: 1
      budget_refill: 200

- id: aloha_healer
  name: "Doc Neutral"
  npc_type: healer
  type: human
  description: "A compact medic who patches up anyone regardless of faction. Neutrality is the brand."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  healer:
    price_per_hp: 4
    daily_capacity: 100

- id: aloha_job_trainer
  name: "The Coordinator"
  npc_type: job_trainer
  type: human
  description: "Manages work placement across the neutral zone. If there's a job worth doing, The Coordinator knows about it."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  job_trainer:
    offered_jobs:
      - job_id: scavenger
        training_cost: 150
        prerequisites:
          min_level: 1
      - job_id: drifter
        training_cost: 250
        prerequisites:
          min_level: 2

- id: aloha_banker
  name: "Escrow Eddie"
  npc_type: banker
  type: human
  description: "A soft-spoken man who holds everyone's money with equal disinterest. The zone runs on his credit."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  banker:
    zone_id: aloha
    base_rate: 0.92
    rate_variance: 0.05

- id: aloha_guard
  name: "Border Watcher"
  npc_type: guard
  type: human
  description: "A sentry stationed at the bazaar perimeter. Watches for weapons and raised voices."
  level: 3
  max_hp: 32
  ac: 14
  awareness: 5
  disposition: neutral
  personality: brave
  guard:
    wanted_threshold: 2
    bribeable: false

- id: aloha_fixer
  name: "The Adjuster"
  npc_type: fixer
  type: human
  description: "Speaks in euphemisms. Every problem has a price; every price has a solution."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 5
  disposition: neutral
  personality: cowardly
  fixer:
    npc_variance: 1.15
    max_wanted_level: 4
    base_costs:
      1: 150
      2: 350
      3: 700
      4: 1500
