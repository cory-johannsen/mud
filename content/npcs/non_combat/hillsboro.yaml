  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  merchant:
    merchant_type: general
    sell_margin: 1.35
    buy_margin: 0.4
    budget: 1100
    inventory:
      - item_id: stim_pack
        base_price: 55
        init_stock: 5
        max_stock: 10
