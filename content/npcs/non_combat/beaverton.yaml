- id: beaverton_merchant
  name: "Free Trader Bo"
  npc_type: merchant
  type: human
  description: "Works a stall in the free market. Buys anything, sells anything, takes no sides."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  merchant:
    merchant_type: general
    sell_margin: 1.3
    buy_margin: 0.45
    budget: 1000
    inventory:
      - item_id: stim_pack
        base_price: 50
        init_stock: 5
        max_stock: 10
      - item_id: riot_shield
        base_price: 130
        init_stock: 2
        max_stock: 3
    replenish_rate:
      min_hours: 6
      max_hours: 12
      stock_refill: 1
      budget_refill: 200

- id: beaverton_healer
  name: "Medtech Remy"
  npc_type: healer
  type: human
  description: "A compact medic with a portable kit and a businesslike manner. Gets you patched and back on the road."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  healer:
    price_per_hp: 4
    daily_capacity: 100

- id: beaverton_job_trainer
  name: "Skills Broker"
  npc_type: job_trainer
  type: human
  description: "Matches skilled workers with employers. Keeps a running list of what the market needs."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  job_trainer:
    offered_jobs:
      - job_id: scavenger
        training_cost: 150
        prerequisites:
          min_level: 1
      - job_id: drifter
        training_cost: 250
        prerequisites:
          min_level: 2

- id: beaverton_banker
  name: "The Vault"
  npc_type: banker
  type: human
  description: "Runs an actual reinforced vault beneath the market. Rates are standard. Security is not."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  banker:
    zone_id: beaverton
    base_rate: 0.92
    rate_variance: 0.05

- id: beaverton_guard
  name: "Market Watch"
  npc_type: guard
  type: human
  description: "Patrols the market perimeter. Discourages weapons and loud disputes."
  level: 3
  max_hp: 32
  ac: 14
  awareness: 5
  disposition: neutral
  personality: brave
  guard:
    wanted_threshold: 2
    bribeable: false

- id: beaverton_hireling
  name: "Trail Hand"
  npc_type: hireling
  type: human
  description: "A capable mercenary available for day rates. Brings their own gear."
  level: 3
  max_hp: 28
  ac: 13
  awareness: 4
  disposition: neutral
  personality: opportunistic
  hireling:
    daily_cost: 75
    combat_role: melee
    max_follow_zones: 3

- id: beaverton_motel_keeper
  name: "Extended Stay Clerk"
  npc_type: motel_keeper
  type: human
  description: "Works the front desk of a former corporate extended-stay hotel, still running on backup power. Hot water, sometimes."
  level: 2
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  motel:
    rest_cost: 75

- id: beaverton_fixer
  name: "The Consultant"
  npc_type: fixer
  npc_role: fixer
  type: human
  description: "Former tech sector middle manager who pivoted to problem resolution. Has a laminated rate card and a very firm handshake."
  level: 5
  max_hp: 30
  ac: 12
  awareness: 12
  disposition: neutral
  personality: cowardly
  abilities:
    brutality: 10
    grit: 12
    quickness: 13
    reasoning: 12
    savvy: 15
    flair: 11
  fixer:
    npc_variance: 1.15
    max_wanted_level: 4
    base_costs:
      1: 150
      2: 350
      3: 700
      4: 1500
  loot:
    currency:
      min: 10
      max: 50

