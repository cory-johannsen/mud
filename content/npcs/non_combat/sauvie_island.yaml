- id: sauvie_island_merchant
  name: "Farmer's Market"
  npc_type: merchant
  type: human
  description: "A composed farmer selling produce and preserved goods. Everything is local."
  level: 2
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  merchant:
    merchant_type: consumables
    sell_margin: 1.2
    buy_margin: 0.5
    budget: 700
    inventory:
      - item_id: stim_pack
        base_price: 40
        init_stock: 4
        max_stock: 8
      - item_id: scrap_shield
        base_price: 50
        init_stock: 2
        max_stock: 3
    replenish_rate:
      min_hours: 8
      max_hours: 16
      stock_refill: 1
      budget_refill: 140

- id: sauvie_island_healer
  name: "Herb Woman"
  npc_type: healer
  type: human
  description: "Uses locally grown herbs and careful hands. The oldest healer on the island by far."
  level: 3
  max_hp: 18
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  healer:
    price_per_hp: 2
    daily_capacity: 60

- id: sauvie_island_job_trainer
  name: "The Old Hand"
  npc_type: job_trainer
  type: human
  description: "Has farmed, fought, and survived on Sauvie Island for decades. Teaches what's worked."
  level: 4
  max_hp: 22
  ac: 10
  awareness: 4
  disposition: neutral
  personality: neutral
  job_trainer:
    offered_jobs:
      - job_id: scavenger
        training_cost: 100
        prerequisites:
          min_level: 1
      - job_id: drifter
        training_cost: 175
        prerequisites:
          min_level: 2

- id: sauvie_island_banker
  name: "The Tin Can"
  npc_type: banker
  type: human
  description: "Manages the island cooperative's shared funds. The tin can nickname is not entirely metaphorical."
  level: 2
  max_hp: 18
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  banker:
    zone_id: sauvie_island
    base_rate: 0.89
    rate_variance: 0.04

- id: sauvie_island_motel_keeper
  name: "Farm Host"
  npc_type: motel_keeper
  type: human
  description: "Rents bunk space in the old farmhouse. Breakfast is not included, but the smell of coffee at dawn is free."
  level: 2
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  motel:
    rest_cost: 40

- id: sauvie_island_fixer
  name: "The Harvest Hand"
  npc_type: fixer
  npc_role: fixer
  type: human
  description: "A quiet figure who has been on the island longer than most. Every deal arranged here stays here."
  level: 5
  max_hp: 30
  ac: 12
  awareness: 12
  disposition: neutral
  personality: cowardly
  abilities:
    brutality: 10
    grit: 12
    quickness: 13
    reasoning: 12
    savvy: 15
    flair: 11
  fixer:
    npc_variance: 1.15
    max_wanted_level: 4
    base_costs:
      1: 150
      2: 350
      3: 700
      4: 1500
  loot:
    currency:
      min: 10
      max: 50

- id: sauvie_island_brothel_keeper
  name: "Farmhouse Hideaway Host"
  npc_type: brothel_keeper
  npc_role: brothel_keeper
  type: human
  description: "Operates the Farmhouse Hideaway from the neutral farmhouse's back rooms. Pastoral setting, entirely non-pastoral business."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 8
  disposition: neutral
  personality: neutral
  abilities:
    brutality: 8
    grit: 10
    quickness: 11
    reasoning: 10
    savvy: 13
    flair: 14
  brothel:
    rest_cost: 25
    disease_chance: 0.15
    robbery_chance: 0.20
    disease_pool:
      - street_fever
      - crotch_rot
      - swamp_itch
      - track_rash
      - gutter_flu
      - rust_pox
      - neon_blight
      - wet_lung
      - chrome_mange
      - black_tongue
    flair_bonus_duration: "24h"
  loot:
    currency:
      min: 0
      max: 0

- id: sauvie_island_black_market_merchant
  name: "Island Trader"
  npc_type: black_market_merchant
  npc_role: merchant
  type: human
  description: "Trades goods that crossed the bridge without going through inspection. The produce is legitimate; the rest is not."
  level: 4
  max_hp: 22
  ac: 11
  awareness: 10
  disposition: neutral
  personality: neutral
  abilities:
    brutality: 9
    grit: 11
    quickness: 12
    reasoning: 12
    savvy: 14
    flair: 11
  merchant:
    merchant_type: black_market
    sell_margin: 1.5
    buy_margin: 0.6
    budget: 500
    replenish_rate:
      min_hours: 6
      max_hours: 12
      stock_refill: 0
      budget_refill: 100
  loot:
