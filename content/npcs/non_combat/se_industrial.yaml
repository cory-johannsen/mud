- id: se_industrial_merchant
  name: "Shift Trader"
  npc_type: merchant
  type: human
  description: "Sells supplies between shifts from a wheeled cart. Knows what every worker needs."
  level: 2
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  merchant:
    merchant_type: general
    sell_margin: 1.25
    buy_margin: 0.45
    budget: 900
    inventory:
      - item_id: stim_pack
        base_price: 45
        init_stock: 5
        max_stock: 10
      - item_id: scrap_shield
        base_price: 50
        init_stock: 2
        max_stock: 3
    replenish_rate:
      min_hours: 6
      max_hours: 10
      stock_refill: 1
      budget_refill: 180

- id: se_industrial_healer
  name: "Plant Medic"
  npc_type: healer
  type: human
  description: "Handles industrial injuries with the speed and competence of long practice."
  level: 3
  max_hp: 22
  ac: 10
  awareness: 4
  disposition: neutral
  personality: neutral
  healer:
    price_per_hp: 3
    daily_capacity: 120

- id: se_industrial_job_trainer
  name: "Union Rep"
  npc_type: job_trainer
  type: human
  description: "Manages worker training and job placement for the industrial district. No work without dues."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  job_trainer:
    offered_jobs:
      - job_id: scavenger
        training_cost: 120
        prerequisites:
          min_level: 1
      - job_id: drifter
        training_cost: 200
        prerequisites:
          min_level: 2

- id: se_industrial_banker
  name: "Paymaster"
  npc_type: banker
  type: human
  description: "Handles wage distribution and deposits for the district. Shift workers trust the paymaster."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  banker:
    zone_id: se_industrial
    base_rate: 0.91
    rate_variance: 0.04

- id: se_industrial_guard
  name: "Shop Steward"
  npc_type: guard
  type: human
  description: "Enforces break-room rules and zone safety protocols. Takes the job seriously."
  level: 3
  max_hp: 32
  ac: 13
  awareness: 5
  disposition: neutral
  personality: brave
  guard:
    wanted_threshold: 2
    bribeable: false

- id: se_industrial_hireling
  name: "Temp Worker"
  npc_type: hireling
  type: human
  description: "Available on short notice. Reliable in a fight, reliable on a loading dock."
  level: 2
  max_hp: 26
  ac: 12
  awareness: 3
  disposition: neutral
  personality: opportunistic
  hireling:
    daily_cost: 55
    combat_role: melee
    max_follow_zones: 2

- id: se_industrial_motel_keeper
  name: "Shift Boss"
  npc_type: motel_keeper
  type: human
  description: "Manages the break room cots between shifts. The fluorescent lights never fully turn off. You get used to it."
  level: 2
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  motel:
    rest_cost: 35

- id: se_industrial_fixer
  name: "The Dock Boss"
  npc_type: fixer
  npc_role: fixer
  type: human
  description: "Controls the unofficial flow of goods through the neutral loading dock. Knows which problems stay on the dock and which ones leave on a truck."
  level: 5
  max_hp: 30
  ac: 12
  awareness: 12
  disposition: neutral
  personality: cowardly
  abilities:
    brutality: 10
    grit: 12
    quickness: 13
    reasoning: 12
    savvy: 15
    flair: 11
  fixer:
    npc_variance: 1.15
    max_wanted_level: 4
    base_costs:
      1: 150
      2: 350
      3: 700
      4: 1500
  loot:
    currency:
      min: 10
      max: 50

- id: se_industrial_brothel_keeper
  name: "Loading Dock Host"
  npc_type: brothel_keeper
  npc_role: brothel_keeper
  type: human
  description: "Runs the Loading Dock operation from a converted freight office. No windows, no signage, and no memory of who came through."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 8
  disposition: neutral
  personality: neutral
  abilities:
    brutality: 8
    grit: 10
    quickness: 11
    reasoning: 10
    savvy: 13
    flair: 14
  brothel:
    rest_cost: 20
    disease_chance: 0.15
    robbery_chance: 0.20
    disease_pool:
      - street_fever
      - crotch_rot
      - swamp_itch
      - track_rash
      - gutter_flu
      - rust_pox
      - neon_blight
      - wet_lung
      - chrome_mange
      - black_tongue
    flair_bonus_duration: "24h"
  loot:
    currency:
      min: 0
      max: 0

- id: se_industrial_black_market_merchant
  name: "Manifest Trader"
  npc_type: black_market_merchant
  npc_role: merchant
  type: human
  description: "Operates from the neutral office with a clipboard that never quite matches the inventory. Shrugs when asked about discrepancies."
  level: 4
  max_hp: 22
  ac: 11
  awareness: 10
  disposition: neutral
  personality: neutral
  abilities:
    brutality: 9
    grit: 11
    quickness: 12
    reasoning: 12
    savvy: 14
    flair: 11
  merchant:
    merchant_type: black_market
    sell_margin: 1.5
    buy_margin: 0.6
    budget: 500
    replenish_rate:
      min_hours: 6
      max_hours: 12
      stock_refill: 0
      budget_refill: 100
  loot:
    currency:
      min: 10
      max: 50
