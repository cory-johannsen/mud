- id: troutdale_merchant
  name: "Road Trader"
  npc_type: merchant
  type: human
  description: "Sells goods to everyone passing through. The truck stop is the last chance before the gorge."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  merchant:
    merchant_type: general
    sell_margin: 1.3
    buy_margin: 0.45
    budget: 1000
    inventory:
      - item_id: stim_pack
        base_price: 50
        init_stock: 5
        max_stock: 10
      - item_id: riot_shield
        base_price: 130
        init_stock: 2
        max_stock: 3
    replenish_rate:
      min_hours: 6
      max_hours: 12
      stock_refill: 1
      budget_refill: 200

- id: troutdale_healer
  name: "Rest Stop Medic"
  npc_type: healer
  type: human
  description: "Patches up travelers before and after the gorge run. Volume business."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  healer:
    price_per_hp: 4
    daily_capacity: 90

- id: troutdale_job_trainer
  name: "The Dispatcher"
  npc_type: job_trainer
  type: human
  description: "Manages cargo runs and labor contracts out of the truck stop. Has work for anyone passing through."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  job_trainer:
    offered_jobs:
      - job_id: scavenger
        training_cost: 150
        prerequisites:
          min_level: 1
      - job_id: drifter
        training_cost: 250
        prerequisites:
          min_level: 2

- id: troutdale_banker
  name: "Troutdale Trust"
  npc_type: banker
  type: human
  description: "A regional trust operating from the truck stop. Understands the road economy."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  banker:
    zone_id: troutdale
    base_rate: 0.91
    rate_variance: 0.04

- id: troutdale_motel_keeper
  name: "Motel Clerk"
  npc_type: motel_keeper
  type: human
  description: "Runs what's left of the highway motel — half the rooms still intact, the sign still lights up at night. Old habit."
  level: 2
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  motel:
    rest_cost: 50

- id: troutdale_fixer
  name: "The Trucker"
  npc_type: fixer
  npc_role: fixer
  type: human
  description: "An old-road operator who knows every stop between here and the gorge. Problems disappear over the horizon on his schedule."
  level: 5
  max_hp: 30
  ac: 12
  awareness: 12
  disposition: neutral
  personality: cowardly
  abilities:
    brutality: 10
    grit: 12
    quickness: 13
    reasoning: 12
    savvy: 15
    flair: 11
  fixer:
    npc_variance: 1.15
    max_wanted_level: 4
    base_costs:
      1: 150
      2: 350
      3: 700
      4: 1500
  loot:
    currency:
      min: 10
      max: 50

- id: troutdale_brothel_keeper
  name: "River's Edge Hostess"
  npc_type: brothel_keeper
  npc_role: brothel_keeper
  type: human
  description: "Runs the River's Edge Tavern out of the motel's remaining back rooms. Small-town discretion, small-town prices."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 8
  disposition: neutral
  personality: neutral
  abilities:
    brutality: 8
    grit: 10
    quickness: 11
    reasoning: 10
    savvy: 13
    flair: 14
  brothel:
    rest_cost: 30
    disease_chance: 0.15
    robbery_chance: 0.20
    disease_pool:
      - street_fever
      - crotch_rot
      - swamp_itch
      - track_rash
      - gutter_flu
      - rust_pox
      - neon_blight
      - wet_lung
      - chrome_mange
      - black_tongue
    flair_bonus_duration: "24h"
  loot:
    currency:
      min: 0
      max: 0

- id: troutdale_black_market_merchant
  name: "Truck Stop Dealer"
  npc_type: black_market_merchant
  npc_role: merchant
  type: human
  description: "Operates from the truck stop's back booth. Has goods from everywhere the highway goes and no receipts for any of it."
  level: 4
  max_hp: 22
  ac: 11
  awareness: 10
  disposition: neutral
  personality: neutral
  abilities:
    brutality: 9
    grit: 11
    quickness: 12
    reasoning: 12
    savvy: 14
    flair: 11
  merchant:
    merchant_type: black_market
    sell_margin: 1.5
    buy_margin: 0.6
    budget: 500
    replenish_rate:
      min_hours: 6
      max_hours: 12
      stock_refill: 0
      budget_refill: 100
  loot:
    currency:
      min: 10
      max: 50

