- id: ne_portland_merchant
  name: "Neighborhood Mike"
  npc_type: merchant
  type: human
  description: "Runs the corner store from behind a plywood counter. Knows what the neighborhood needs."
  level: 2
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  merchant:
    merchant_type: general
    sell_margin: 1.25
    buy_margin: 0.45
    budget: 800
    inventory:
      - item_id: stim_pack
        base_price: 45
        init_stock: 5
        max_stock: 10
