- id: ross_island_merchant
  name: "Island Trader"
  npc_type: merchant
  type: human
  description: "Sells salvage and supplies from the dock shack. Everything smells faintly of river."
  level: 2
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  merchant:
    merchant_type: general
    sell_margin: 1.3
    buy_margin: 0.5
    budget: 900
    inventory:
      - item_id: stim_pack
        base_price: 50
        init_stock: 4
        max_stock: 8
    replenish_rate:
      min_hours: 8
      max_hours: 16
      stock_refill: 1
      budget_refill: 180

- id: ross_island_healer
  name: "Boat Medic"
  npc_type: healer
  type: human
  description: "Trained to patch wounds on a moving deck. Perfectly adequate on solid ground."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  healer:
    price_per_hp: 4
    daily_capacity: 80

- id: ross_island_job_trainer
  name: "The Captain"
  npc_type: job_trainer
  type: human
  description: "Retired river captain who now teaches anyone who's willing to put in the work."
  level: 4
  max_hp: 24
  ac: 11
  awareness: 5
  disposition: neutral
  personality: neutral
  job_trainer:
    offered_jobs:
      - job_id: scavenger
        training_cost: 150
        prerequisites:
          min_level: 1
      - job_id: drifter
        training_cost: 250
        prerequisites:
          min_level: 2

- id: ross_island_banker
  name: "The Chest"
  npc_type: banker
  type: human
  description: "Keeps the island's communal funds in a literal waterproofed chest. Reliable if basic."
  level: 2
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  banker:
    zone_id: ross_island
    base_rate: 0.90
    rate_variance: 0.05

- id: ross_island_hireling
  name: "Deck Hand"
  npc_type: hireling
  type: human
  description: "Strong, experienced, and available. Works for day rates plus a meal."
  level: 3
  max_hp: 28
  ac: 12
  awareness: 4
  disposition: neutral
  personality: opportunistic
  hireling:
    daily_cost: 60
    combat_role: melee
    max_follow_zones: 2

- id: ross_island_motel_keeper
  name: "Dock Keeper"
  npc_type: motel_keeper
  type: human
  description: "Rents a cot in the corner of the dock shack. The river noise keeps some people up. Others find it peaceful."
  level: 2
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  motel:
    rest_cost: 40

- id: ross_island_fixer
  name: "The River Rat"
  npc_type: fixer
  npc_role: fixer
  type: human
  description: "A long-time island resident who knows every boat, every debt, and every secret that has crossed the river. Discrete as the current."
  level: 5
  max_hp: 30
  ac: 12
  awareness: 12
  disposition: neutral
  personality: cowardly
  abilities:
    brutality: 10
    grit: 12
    quickness: 13
    reasoning: 12
    savvy: 15
    flair: 11
  fixer:
    npc_variance: 1.15
    max_wanted_level: 4
    base_costs:
      1: 150
      2: 350
      3: 700
      4: 1500
  loot:
    currency:
      min: 10
      max: 50

- id: ross_island_brothel_keeper
  name: "River Rat Den Hostess"
  npc_type: brothel_keeper
  npc_role: brothel_keeper
  type: human
  description: "Runs the River Rat Den from an old river shack on the neutral dock. Weathered, pragmatic, and entirely unbothered by judgment."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 8
  disposition: neutral
  personality: neutral
  abilities:
    brutality: 8
    grit: 10
    quickness: 11
    reasoning: 10
    savvy: 13
    flair: 14
  brothel:
    rest_cost: 25
    disease_chance: 0.15
    robbery_chance: 0.20
    disease_pool:
      - street_fever
      - crotch_rot
      - swamp_itch
      - track_rash
      - gutter_flu
      - rust_pox
      - neon_blight
      - wet_lung
      - chrome_mange
      - black_tongue
    flair_bonus_duration: "24h"
  loot:
    currency:
      min: 0
      max: 0

- id: ross_island_black_market_merchant
  name: "Drift Trader"
  npc_type: black_market_merchant
  npc_role: merchant
  type: human
  description: "Sells goods that came downriver and didn't come with paperwork. The barge is always loaded; the manifest is always blank."
  level: 4
  max_hp: 22
  ac: 11
  awareness: 10
  disposition: neutral
  personality: neutral
  abilities:
    brutality: 9
    grit: 11
    quickness: 12
    reasoning: 12
    savvy: 14
    flair: 11
  merchant:
    merchant_type: black_market
    sell_margin: 1.5
    buy_margin: 0.6
    budget: 500
    replenish_rate:
      min_hours: 6
      max_hours: 12
      stock_refill: 0
      budget_refill: 100
  loot:
    currency:
      min: 10
      max: 50
