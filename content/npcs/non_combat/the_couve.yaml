- id: the_couve_merchant
  name: "Border Trader"
  npc_type: merchant
  type: human
  description: "Runs a checkpoint stall at The Crossing. Stocks whatever comes across the bridge."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  merchant:
    merchant_type: general
    sell_margin: 1.3
    buy_margin: 0.45
    budget: 1000
    inventory:
      - item_id: stim_pack
        base_price: 50
        init_stock: 5
        max_stock: 10
    replenish_rate:
      min_hours: 6
      max_hours: 12
      stock_refill: 1
      budget_refill: 200

- id: the_couve_healer
  name: "Couve Medic"
  npc_type: healer
  type: human
  description: "Faction-aligned but treats anyone at the checkpoint. The Couve values functional allies."
  level: 3
  max_hp: 22
  ac: 10
  awareness: 4
  disposition: neutral
  personality: neutral
  healer:
    price_per_hp: 4
    daily_capacity: 100

- id: the_couve_job_trainer
  name: "The Recruiter"
  npc_type: job_trainer
  type: human
  description: "Handles faction recruitment and skill verification at the crossing. Practical and efficient."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 4
  disposition: neutral
  personality: neutral
  job_trainer:
    offered_jobs:
      - job_id: scavenger
        training_cost: 150
        prerequisites:
          min_level: 1
      - job_id: drifter
        training_cost: 250
        prerequisites:
          min_level: 2

- id: the_couve_banker
  name: "Border Bank"
  npc_type: banker
  type: human
  description: "Manages currency exchange and deposits at the Washington end. Rates favor the faction."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  banker:
    zone_id: the_couve
    base_rate: 0.91
    rate_variance: 0.04

- id: the_couve_guard
  name: "Crossing Guard"
  npc_type: guard
  type: human
  description: "Controls access at The Crossing. Professional, not aggressive. Trouble is declined at the door."
  level: 3
  max_hp: 36
  ac: 15
  awareness: 6
  disposition: neutral
  personality: brave
  guard:
    wanted_threshold: 2
    bribeable: false

- id: the_couve_fixer
  name: "The Smuggler"
  npc_type: fixer
  type: human
  description: "Technically a checkpoint official. Practically, the most connected person at the bridge."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 6
  disposition: neutral
  personality: cowardly
  fixer:
    npc_variance: 1.2
    max_wanted_level: 4
    base_costs:
      1: 200
      2: 450
      3: 900
      4: 1800
