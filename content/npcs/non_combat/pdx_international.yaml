- id: pdx_international_merchant
  name: "Duty-Free Dani"
  npc_type: merchant
  type: human
  description: "Runs the only legitimate goods counter in the terminal. The duty-free signage is ironic."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  merchant:
    merchant_type: general
    sell_margin: 1.3
    buy_margin: 0.45
    budget: 1000
    inventory:
      - item_id: stim_pack
        base_price: 50
        init_stock: 5
        max_stock: 10
      - item_id: riot_shield
        base_price: 130
        init_stock: 2
        max_stock: 3
    replenish_rate:
      min_hours: 8
      max_hours: 16
      stock_refill: 1
      budget_refill: 200

- id: pdx_international_healer
  name: "Airport Medic"
  npc_type: healer
  type: human
  description: "Stationed at Terminal B. Keeps a defibrillator and a first-aid kit. Busier than expected."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 4
  disposition: neutral
  personality: neutral
  healer:
    price_per_hp: 4
    daily_capacity: 100

- id: pdx_international_job_trainer
  name: "Gate Agent"
  npc_type: job_trainer
  type: human
  description: "Former airport staff who now manages job routing in and out of the terminal zone."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  job_trainer:
    offered_jobs:
      - job_id: scavenger
        training_cost: 150
        prerequisites:
          min_level: 1
      - job_id: drifter
        training_cost: 250
        prerequisites:
          min_level: 2

- id: pdx_international_banker
  name: "Currency Exchange"
  npc_type: banker
  type: human
  description: "Still operates behind the old currency exchange counter. The rates have changed considerably."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  banker:
    zone_id: pdx_international
    base_rate: 0.89
    rate_variance: 0.05

- id: pdx_international_guard
  name: "TSA Remnant"
  npc_type: guard
  type: human
  description: "Still wearing the old badge out of habit. Still checking for contraband out of instinct."
  level: 3
  max_hp: 32
  ac: 13
  awareness: 5
  disposition: neutral
  personality: brave
  guard:
    wanted_threshold: 2
    bribeable: false

- id: pdx_international_motel_keeper
  name: "Terminal Agent"
  npc_type: motel_keeper
  type: human
  description: "Manages the last operational terminal hotel. Prices reflect demand, not quality. Knows it."
  level: 2
  max_hp: 20
  ac: 10
  awareness: 3
  disposition: neutral
  personality: neutral
  motel:
    rest_cost: 150

- id: pdx_international_fixer
  name: "The Gate Agent"
  npc_type: fixer
  npc_role: fixer
  type: human
  description: "Works the neutral terminal's information economy. Lost luggage, missed connections, and wanted problems all handled for a fee."
  level: 5
  max_hp: 30
  ac: 12
  awareness: 12
  disposition: neutral
  personality: cowardly
  abilities:
    brutality: 10
    grit: 12
    quickness: 13
    reasoning: 12
    savvy: 15
    flair: 11
  fixer:
    npc_variance: 1.15
    max_wanted_level: 4
    base_costs:
      1: 150
      2: 350
      3: 700
      4: 1500
  loot:
    currency:
      min: 10
      max: 50

- id: pdx_international_brothel_keeper
  name: "Terminal Comfort Host"
  npc_type: brothel_keeper
  npc_role: brothel_keeper
  type: human
  description: "Runs Terminal Comfort from a repurposed airline lounge. Amenities are minimal, rates are maximum, and layovers are never boring."
  level: 3
  max_hp: 20
  ac: 10
  awareness: 8
  disposition: neutral
  personality: neutral
  abilities:
    brutality: 8
    grit: 10
    quickness: 11
    reasoning: 10
    savvy: 13
    flair: 14
  brothel:
    rest_cost: 90
    disease_chance: 0.15
    robbery_chance: 0.20
    disease_pool:
      - street_fever
      - crotch_rot
      - swamp_itch
      - track_rash
      - gutter_flu
      - rust_pox
      - neon_blight
      - wet_lung
      - chrome_mange
      - black_tongue
    flair_bonus_duration: "24h"
  loot:
    currency:
      min: 0
      max: 0

- id: pdx_international_black_market_merchant
  name: "Duty-Free Dealer"
  npc_type: black_market_merchant
  npc_role: merchant
  type: human
  description: "Moved into the terminal's former duty-free shop. Goods are duty-free in the sense that no duties apply to anything sold here."
  level: 4
  max_hp: 22
  ac: 11
  awareness: 10
  disposition: neutral
  personality: neutral
  abilities:
    brutality: 9
    grit: 11
    quickness: 12
    reasoning: 12
    savvy: 14
    flair: 11
  merchant:
    merchant_type: black_market
    sell_margin: 1.5
    buy_margin: 0.6
    budget: 500
    replenish_rate:
      min_hours: 6
      max_hours: 12
      stock_refill: 0
      budget_refill: 100
  loot:
    currency:
      min: 10
      max: 50

