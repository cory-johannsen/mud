    weight: 3
  - id: tactical_vest
    weight: 2
taunts:
  - "NE Portland is painted with our colors. Read the walls."
  - "Every surface in a three-block radius has been tagged. This block is ours."
  - "Broad shoulders, sawed-off, and absolutely no interest in your explanation."
  - "You don't ask questions out here. Neither do I."
  - "Gang colors mean boundaries. You crossed one."
  - "I've been marking this territory since year two. You're late to understanding it."
  - "Spray paint and shotgun shells — that's how we claim and keep."
  - "NE doesn't negotiate with trespassers. We don't have the patience."
  - "Knock on this block's door and I'm the door."
  - "Everything northeast of that intersection is ours. You're northeast of that intersection."
  - "I've cleared this stretch before breakfast. You're second shift."
  - "The jacket says who I work for. The shotgun says what happens next."
  - "You've got about four seconds to make a better decision than the one you're making."
  - "NE gang enforcer means I do the heavy lifting so the crew can focus."
  - "Come through here without clearance and see how fast an enforcer can move."
  - "This territory was bled for. You'll add to the total."
  - "I don't start with the shotgun. I end with it."
  - "The colors on this jacket aren't decorative. They're a warning."
  - "You're in our zone making poor choices. I enforce the consequences."
  - "Every inch of this block has been walked by someone who answers to the gang. Me."
  - "Faster hands than you expect. Worse results than you want."
  - "My jacket's brighter than the future you're looking at right now."
  - "Last enforcer who asked questions first is still embarrassed about it."
  - "Come to NE without respect and leave without teeth."
  - "I've hit people with this pipe and this rifle on the same afternoon. Efficient."
  - "The gang trusts me because I don't let things slide. Nothing slides."
