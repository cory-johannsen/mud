id: troutdale_gorge_king
name: Wind King Voss
description: >
  A wild-haired mystic-warlord who rules the gorge approaches from Multnomah
  Falls, claiming divine mandate from the wind itself. Voss commands both
  the wind walkers and the gorge bandits, using the cult's mysticism to
  motivate the faithful and brute force for everyone else. He wears layered
  salvaged gear decorated with feathers, and fights with a brutal efficiency
  that contradicts the mystical persona.
level: 12
max_hp: 258
tier: boss
ac: 21
rob_multiplier: 2.0
