taunts:
  - "The wind brought you here. The wind will scatter what remains."
  - "Multnomah Falls is a sacred place. You've made it a battlefield. So be it."
  - "The gorge runners answer to the wind. The wind answers to me."
  - "You think the falls are beautiful? Wait until you see the view from the bottom."
  - "Every traveler through the gorge pays tribute to the Wind King."
  - "The mystic path and the violent path converge here. At me."
  - "The gorge has claimed better fighters than you. The wind remembers them."
