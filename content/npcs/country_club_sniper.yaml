taunts:
  - "The fairway is a killing field now. Welcome."
  - "I had a handicap of four before the collapse. My new handicap is you."
  - "This cart isn't exactly what the members had in mind, but it works."
  - "I've been patient long enough to let you get comfortable. Mistake."
  - "The club used to keep out riff-raff with a dress code. Now we use this rifle."
  - "Par for this hole is one round. I rarely need two."
  - "The range is perfect from here. I'd know — I've calculated it."
  - "Eighteen holes. You're not reaching the first one."
  - "Members only. Non-members get a different kind of membership card."
  - "The pro shop is gone but the marksmanship remained."
  - "Patience is the first lesson of golf. It's also the first lesson of sniping."
  - "I used to tip the caddies well. I still tip — just differently."
  - "You can't see me but I've been watching you since the parking lot."
  - "The rough used to mean the tall grass. Now it means you're in my zone."
  - "I've put down raiders, scavengers, and one persistent raccoon from this position."
  - "Fore! That's what you should've heard before you entered the course."
  - "The club motto used to be excellence. Now it's elimination."
  - "This scope's been cleaned and calibrated. You're very clearly in the crosshairs."
  - "Breathe, aim, squeeze. Three steps. You're the target."
  - "The country club has new standards. They're lethal."
  - "You wandered onto private grounds. There's a fee for that."
  - "I've been a member here for thirty years. The membership still means something."
  - "Distance isn't your friend out here. It's mine."
  - "The greens are red now. Just how things go."
  - "You're moving like you don't know you're being tracked. You are."
  - "The cufflinks are the last thing people see, usually."
