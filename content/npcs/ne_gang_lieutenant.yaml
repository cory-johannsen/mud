taunts:
  - "Lieutenant means I've survived every enforcer who thought they could do my job."
  - "The enforcers answer to me. Right now I'm answering for them."
  - "You've walked into the gang's western command. That's not a mistake you make twice."
  - "Battle rifle, full authority. You're outmatched on both counts."
  - "I've held this block through four gang wars. You're not the fifth."
  - "The spray paint on this vest is the rank insignia. Read it."
  - "My crew runs six blocks. You just stepped into the center of it."
  - "Enforcers mark territory. Lieutenants enforce the price for crossing it."
  - "I've seen tougher and buried them under the overpass."
  - "You want to negotiate? Talk to the rifle."
  - "The only people who walk into gang territory uninvited are fools or fighters. You don't look like a fighter."
  - "I run a tight operation. You're a loose end."
  - "Last person who challenged my block is still being looked for."
  - "The gang promotes by survival. I've survived everything NE Portland has thrown at me."
  - "Step back or get stepped on. Those are the only options the lieutenant offers."
