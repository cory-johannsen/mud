taunts:
  - "The Kingdom's weapons stay in the Kingdom's hands. Yours aren't Kingdom hands."
  - "I've protected this armory through two assassination attempts. You're attempt three."
  - "Every blade in this vault has a story. You're about to become one."
  - "Warden means I'm the last lock on the most important door."
  - "You want what's in here? Go through what's in front of you."
  - "The King trusts me with the armory. I don't betray that trust."
  - "I carry four blades. Guess which one I reach for first."
  - "This armory has never been breached. I intend to maintain that record."
  - "Scarred from the kettles and the fights — I know both intimately."
  - "A veteran guarding the weapons of a kingdom is not easily removed."
  - "You'd need a small army to take this store. And you're not an army."
  - "The Kingdom's strength lives in this armory. I live in front of it."
  - "I've survived things that would end most soldiers. You're not in that category."
  - "Come for the weapons and find out why I have so many scars."
  - "Sharp reflexes. Sharper blades. Both will be used today."
  - "This position has never fallen. Today is not the day."
  - "The armory is not the prize you think it is — the warden is the real problem."
  - "I've been chosen for this duty because I'm the hardest person here to kill."
  - "Slashing means nothing to me. I've built a resistance to it."
  - "The Kingdom rises on steel. I guard the steel."
  - "Every attempt on this vault has ended the same way. Ask the graves."
  - "I was trained to fight inside an armory. Every shelf, every corner is my advantage."
  - "Take one step closer and find out why they call it the Warden's post."
  - "Circuit boards and combat blades in the same vault. I'm comfortable with both."
  - "Nobody survives stealing from the Kingdom's armory. I enforce that policy."
  - "Muscle, loyalty, and a very bad memory for forgiveness. That's me."
