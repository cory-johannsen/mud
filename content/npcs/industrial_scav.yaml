id: industrial_scav
name: Industrial Scavenger
description: A nimble scavenger in a hard hat and reflective vest, picking through industrial ruins with practiced efficiency.
level: 1
max_hp: 15
ac: 14
rob_multiplier: 1.0
awareness: 9
ai_domain: industrial_scav_combat
respawn_delay: "5m"
abilities:
  brutality: 10
  quickness: 14
  grit: 12
  reasoning: 12
  savvy: 14
  flair: 10
loot:
  currency:
    min: 5
    max: 30
  items:
    - item: scrap_metal
      chance: 0.65
      min_qty: 1
      max_qty: 4
    - item: shipping_manifest
      chance: 0.2
      min_qty: 1
      max_qty: 1
weapon:
  - id: steel_pipe
    weight: 3
  - id: dock_hook
    weight: 2
  - id: cheap_blade
    weight: 1
armor:
  - id: leather_jacket
    weight: 3
  - id: tactical_vest
    weight: 2
taunts:
  - "Hard hat doesn't mean soft skull — mine or yours."
  - "This reflective vest makes me easy to spot. So does the pipe."
  - "I've been picking industrial sites clean since the second year. Back off."
  - "These ruins are my workplace. You're trespassing on the job site."
  - "Every industrial scavenger worth their weight will fight for their site."
  - "The equipment here is mine to take. You're not."
  - "Nimble is what these ruins require. I'm very nimble."
  - "Efficiency means I calculate threats quickly. You're a threat."
  - "I know every collapsed roof, every unstable floor in this complex. You don't."
  - "The hard hat's seen better days. So have I. Both still work."
  - "Don't come between an industrial scavenger and their haul."
  - "I've picked copper from live panels. Your approach is less dangerous."
  - "Ruins like these give up metal, wire, and occasionally trouble. You're trouble."
  - "This manifest shows what's mine. Everything on this site is on this manifest."
  - "Practiced efficiency means I hit hard and move fast."
  - "The dock hook was made for cargo. It handles people too."
  - "Don't stand in the scrap. That's evidence of poor judgment."
  - "Two years in industrial ruins makes you creative about how to handle problems."
  - "I can strip a machine in twelve minutes. You I can handle faster."
  - "Site's secure. Was secure until you showed up."
  - "Industrial scavengers have a code: what you find, you keep. I found this site first."
  - "The pipe's good for prying open panels and prying open fools."
  - "Touch my scrap and we go from coworkers to enemies. We're not coworkers."
  - "I've worked sites that would kill you just from the fumes. You're less dangerous."
  - "This hard hat's protected my head through three cave-ins. Your fists aren't worse."
  - "Back off the claim or get removed from the claim."
