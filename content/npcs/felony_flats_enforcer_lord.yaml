taunts:
  - "This block runs because I make it run. You're about to stop it."
  - "Every motel, every corner, every deal on this strip belongs to me."
  - "You came to the Enforcer Den looking for trouble. You found the Captain."
  - "I've broken crews that were bigger and better armed than you."
  - "The flats are mine. The people on it pay me. You don't get to change that."
  - "My enforcers are everywhere. You just walked into the middle of them."
  - "Felony Flats has only one law — whatever I say it is."
