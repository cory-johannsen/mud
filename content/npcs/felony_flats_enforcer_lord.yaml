id: felony_flats_enforcer_lord
name: The Captain
description: >
  A hulking veteran of a dozen territorial wars who runs the Enforcer Den
  with iron discipline and casual cruelty. The Captain's face is a map
  of old scars, and his arms bear the mark of every crew he's ever put down.
  He enforces the block's protection racket with practiced efficiency,
  collecting tribute from the crack houses and motels alike.
level: 10
max_hp: 210
