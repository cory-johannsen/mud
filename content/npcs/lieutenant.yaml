id: lieutenant
name: Gang Lieutenant
description: A seasoned enforcer in a battered leather coat. His posture says he has been in more fights than you have.
level: 3
max_hp: 35
ac: 14
ai_domain: lieutenant_combat
rob_multiplier: 1.5
awareness: 8
abilities:
  brutality: 16
  quickness: 14
  grit: 16
  reasoning: 10
  savvy: 12
  flair: 12
taunts:
  - "Lieutenant means I've fought my way up. Keep that in mind."
  - "I've been in more fights than your whole crew combined."
  - "You don't just fight me. You fight everyone I've trained."
  - "The coat's seen better days. I haven't — I've seen worse and survived."
  - "You come at the lieutenant, you come at the organization."
  - "I've sent harder people than you running."
  - "The gang respects me because I've earned it in blood. Yours is next."
  - "A lieutenant who can't hold their ground isn't a lieutenant long."
  - "I've outlasted three bosses and two gang wars. You're a footnote."
  - "Smart enough to make rank, mean enough to keep it."
  - "Every mark on this coat tells a story. You're about to be a chapter."
  - "I don't back down. It's not a policy — it's just who I am."
  - "Talk slower and I still won't care. Move faster and you'll regret it."
  - "Standing where the boss isn't means I handle this personally."
  - "I've made calls that ended careers. This is a call I'm making."
  - "The gang put me here because they know I handle problems."
  - "Step up to a lieutenant and find out why there are only a few of us."
  - "I've been trained by people who are legends now. For bad reasons."
  - "You're brave. I've broken brave people before."
  - "There's a difference between a thug and a lieutenant. That difference ends you."
  - "More fights than years on this earth. That's my record."
  - "Last person who got this close to me needed reconstruction."
  - "Experience doesn't mean slow. It means I know exactly where to hit."
  - "The organization runs through me. You're in my way."
  - "Back off or I make this a teaching moment."
  - "I'm in a very bad mood and you're standing in the center of it."
