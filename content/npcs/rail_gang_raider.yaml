taunts:
  - "The rails run through our territory. So do you, apparently."
  - "Rail yards are the best ambush ground in the metro. You'll learn why."
  - "I grew up running these tracks. You're new to them."
  - "Between the junction and the sidings, there's no one but me."
  - "Fast on rail ballast, faster with a blade. Try me."
  - "The old trains don't run anymore. My crew does."
  - "Rusty tracks, rusted patience. Move along before I move you."
  - "I've lived in these yards long enough to think in rail time — very slow and very sudden."
  - "Every siding in this yard is mine. Every junction. Every abandoned car."
  - "Rail gang's got reach from the central yard to the freight lines."
  - "You picked the wrong rail to follow."
  - "I can disappear in a rail yard like no one you've met."
  - "Scarred from falls and fights. Both made me sharper."
  - "Nobody passes through the junction without us knowing."
  - "The tracks are my home. You don't walk into someone's home like this."
  - "Lean and fast — that's how you survive rail yard ambushes. I survive them daily."
  - "The old freight cars make good hiding spots. I know them all."
  - "You're between me and the next siding. Bad placement."
  - "Rail gang raiders don't fight fair. We fight effective."
  - "Every approach through the yards is covered by someone I know."
  - "The gravel between the tracks trips up people who don't know it. I know it."
  - "Fast reflexes from years of dodging actual trains when they still ran."
  - "Your first mistake was stepping onto these tracks. Your second is what comes next."
  - "Rail life makes you lean and mean. That's the classification."
  - "Three years in the yards and I've never once been robbed. The reverse has happened plenty."
  - "The junction belongs to the rail gang. Consider that your orientation."
