id: gang_enforcer
name: Gang Enforcer
description: A heavily armed gang member patrolling territory lines with a chip on their shoulder and a shotgun to back it up. They shoot first and don't bother with questions.
level: 27
max_hp: 237
ac: 19
rob_multiplier: 1.2
awareness: 7
ai_domain: territory_patrol
respawn_delay: "5m"
abilities:
  brutality: 15
  quickness: 13
  grit: 14
  reasoning: 9
  savvy: 10
  flair: 9
loot:
  currency:
    min: 40
    max: 120
  items:
    - item: shotgun_shells
      chance: 0.6
      min_qty: 2
      max_qty: 6
    - item: gang_colors
      chance: 0.4
      min_qty: 1
      max_qty: 1
    - item: medkit
      chance: 0.2
      min_qty: 1
      max_qty: 1
weapon:
  - id: sawn_off
    weight: 3
  - id: steel_pipe
    weight: 2
armor:
  - id: kevlar_vest
    weight: 3
  - id: leather_jacket
    weight: 2
taunts:
  - "Territory line's right there. You crossed it."
  - "Shotgun first. Questions don't come after."
  - "The gang owns this block. I enforce what the gang owns."
  - "You walked into a patrol zone without clearance. That's fatal."
  - "I've been enforcin' since before you knew which side of Portland to avoid."
  - "Chip on my shoulder? More like a boulder. Come knock it off."
  - "Gang colors mean something. You're disrespecting them just by standing there."
  - "Nobody moves through this territory without paying the toll."
  - "I don't ask questions because the answers don't change what happens."
  - "You've got about three seconds before I stop thinking about it."
  - "The crew's watching. I gotta perform. You're the performance."
  - "Big barrel, bad attitude, and nothing to lose. That's me."
  - "You think the shotgun's for show? I've never once had to show it twice."
  - "This is our zone. Every inch has been bled for."
  - "I've removed people from this territory that thought they were untouchable."
  - "The gang doesn't send its best for simple patrol. That's what I am."
  - "Trespassing in gang territory is a lifestyle choice I don't recommend."
  - "I've been in more fights than you've had decent meals since the collapse."
  - "Move along or move out. Permanently."
  - "You don't look like you belong here. Because you don't."
  - "Every approach to this block is covered. I covered them."
  - "Gang enforcement is blunt by design. So is my weapon."
  - "You're making this a situation. I've resolved situations before."
  - "Last person who tried to bluff their way through here got carried out."
  - "No paperwork required. Just results."
  - "I work for the gang. The gang decides who walks this block. They decided. Not you."
