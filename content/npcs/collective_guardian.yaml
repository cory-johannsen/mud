id: collective_guardian
name: Collective Guardian
description: >-
  A stern guardian in olive drab, red armband on the left bicep,
  patrolling the collective's perimeter with unwavering purpose.
level: 6
max_hp: 42
ac: 15
awareness: 8
ai_domain: ganger_combat
respawn_delay: "5m"
abilities:
  brutality: 16
  quickness: 12
  grit: 14
  reasoning: 10
  savvy: 14
  flair: 10
loot:
  currency:
    min: 15
    max: 60
  items:
    - item: red_armband
      chance: 0.3
      min_qty: 1
      max_qty: 1
    - item: medkit
      chance: 0.25
      min_qty: 1
      max_qty: 1
    - item: scrap_metal
      chance: 0.2
      min_qty: 1
      max_qty: 2
weapon:
  - id: combat_knife
    weight: 2
  - id: assault_rifle
    weight: 2
  - id: riot_shotgun
    weight: 1
armor:
  - id: tactical_vest
    weight: 3
  - id: kevlar_vest
    weight: 2
taunts:
  - "The collective is not negotiable. Neither am I."
  - "You cross this perimeter, you cross all of us."
  - "We built something here worth defending. I defend it with everything I have."
  - "The armband means something. Don't make me prove it."
  - "Solidarity among comrades. Decisive action against threats. You're a threat."
  - "This community feeds, shelters, and protects its people. I'm the protection."
  - "Trespassers don't get to claim collective resources. They get removed."
  - "The people voted on the rules. The rules say you leave."
  - "I serve the collective's interest. Its interest is you gone."
  - "Five years of building this together. Nobody's taking it apart."
  - "Every member of this collective has my back. That means you face all of us."
  - "Ideals don't stop a bullet, but they give you something worth shooting for."
  - "Move back. This is your one warning from the collective."
  - "I've held this post through floods, raiders, and faction wars. You're manageable."
  - "We share everything here — except the perimeter. That's mine alone."
  - "Revolutionary discipline means I don't hesitate when the collective is threatened."
  - "The armband says I mean it. I mean it."
  - "Internal conflict gets resolved through committee. You're external. I handle you."
  - "This isn't just land. It's everything we have. Walk away."
  - "We take care of our own. Right now that means taking care of you."
  - "The collective asked me to be firm. I'm being firm."
  - "You're not a member. You're not welcome. Now you're a problem."
  - "Plenty of blood was shed to build this place. I'll shed more to keep it."
  - "Step aside? No. You step aside."
  - "The old world fell because nobody cooperated. We cooperate against threats."
  - "This rifle isn't for show. Neither is the ideology behind it."
