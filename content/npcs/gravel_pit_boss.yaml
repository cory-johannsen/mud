id: gravel_pit_boss
name: Gravel Pit Boss
description: The self-proclaimed king of the gravel pit, built like the machinery he oversees, ruling through brute force and intimidation.
level: 4
max_hp: 48
ac: 17
rob_multiplier: 1.5
awareness: 8
ai_domain: gravel_pit_boss_combat
respawn_delay: "5m"
abilities:
  brutality: 17
  quickness: 10
  grit: 16
  reasoning: 10
  savvy: 12
  flair: 12
loot:
  currency:
    min: 40
    max: 150
  items:
    - item: gravel_chunk
      chance: 0.4
      min_qty: 1
      max_qty: 3
    - item: scrap_metal
      chance: 0.35
      min_qty: 1
      max_qty: 2
    - item: medkit
      chance: 0.2
      min_qty: 1
      max_qty: 1
weapon:
  - id: rebar_club
    weight: 3
  - id: steel_pipe
    weight: 2
  - id: suburban_machete
    weight: 1
armor:
  - id: leather_jacket
    weight: 2
  - id: kevlar_vest
    weight: 3
taunts:
  - "I built my kingdom from gravel and grit. Nothing comes easy here."
  - "You think you can take from me what I made with these hands?"
  - "King of the pit means I've put down everyone who tried what you're trying."
  - "Gravel pit work makes you hard. I am very, very hard."
  - "The machinery obeys me. Why would you be different?"
  - "I've crushed bigger problems than you under these boots."
  - "This pit runs because I run it. You'll run from it if you're lucky."
  - "Every ton of gravel here is mine. So is every drop of blood spilled for it."
  - "Brute force built this operation. It'll defend it too."
  - "You want what's in the pit? Get through the boss of the pit."
  - "I've moved more rock than you can imagine. Moving you is nothing."
  - "Workers answer to me. Equipment answers to me. Now you answer to me."
  - "The last challenger to my authority is part of the gravel now. Literally."
  - "This club built this empire and it'll protect it."
  - "Nobody underestimates the pit boss twice."
  - "Intimidation is my first tool. I've got plenty more."
  - "You think because it's a gravel pit it's not worth fighting for? Think again."
  - "I call myself king because everyone else was too afraid to argue."
  - "Come here and take something. See how that works out for you."
  - "The pit produces. I protect that production. That means stopping you."
  - "Machinery and muscle — that's how this place runs."
  - "I've been swinging this club longer than most people have been fighting."
  - "Heavy industry builds heavy people. I'm proof."
  - "You don't challenge a man who's spent his life moving rock."
  - "Every corner of this pit is mine. Every corner."
  - "You're about to learn why they gave me the title."
