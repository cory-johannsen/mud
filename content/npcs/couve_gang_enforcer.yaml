id: couve_gang_enforcer
name: Gang Enforcer
description: A heavyset enforcer collecting tribute for one of the Couve's street gangs. A shaved head, brass knuckles, and zero patience.
level: 6
max_hp: 42
ac: 15
awareness: 6
ai_domain: ganger_combat
respawn_delay: "5m"
abilities:
  brutality: 16
  quickness: 11
  grit: 15
  reasoning: 8
  savvy: 10
  flair: 9
loot:
  currency:
    min: 20
    max: 70
  items:
    - item: scrap_metal
      chance: 0.3
      min_qty: 1
      max_qty: 2
    - item: medkit
      chance: 0.2
      min_qty: 1
      max_qty: 1
weapon:
  - id: spiked_knuckles
    weight: 2
  - id: sawn_off
    weight: 2
  - id: combat_knife
    weight: 2
armor:
  - id: tactical_vest
    weight: 2
  - id: leather_jacket
    weight: 3
taunts:
  - "The Couve's got rules. Rule one: you pay tribute."
  - "Vancouver was underestimated before the collapse too. Still a mistake."
  - "My knuckles don't get tired. Do yours?"
  - "Tribute collection's my job. Your wallet or your jaw — both work."
  - "Cross the river and you cross us. You crossed the river."
  - "You look like you've never been hit with brass knuckles. I can fix that."
  - "Washington state has three rules left. I'm enforcing all three."
  - "I've shaken down harder people than you before my first cup of water today."
  - "Every block in this city belongs to someone. You're standing on ours."
  - "Zero patience. Zero negotiation. All enforcement."
  - "Pay up or get stomped. I'm not in a philosophy mood."
  - "The Couve gang remembers everyone who pays and everyone who doesn't."
  - "You don't have enough friends to make this even."
  - "Head down, hands up, money out. In that order."
  - "I've broken jaws before I've had breakfast. You're making me hungry."
  - "Shaved head means I've got nothing left to grab. You do."
  - "Last one who tried to talk their way out of tribute needed surgery."
  - "This side of the river is settled. Settled means us."
  - "I collect for the crew. The crew collects from everyone."
  - "Don't make this complicated. It doesn't need to be complicated."
  - "You walked into a collection zone. You're about to be collected."
  - "Fast or slow, this ends one way."
  - "The Couve doesn't forget a face. Especially the ones I've rearranged."
  - "Hand it over and walk away. One chance."
  - "Big frame, small patience, no mercy."
  - "I've seen tougher people melt when the knuckles come out."
  - "Vancouver survives because we don't go soft. Ever."
