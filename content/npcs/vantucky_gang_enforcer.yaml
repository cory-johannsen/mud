id: vantucky_gang_enforcer
name: Gang Enforcer
description: A heavy-set enforcer in a sleeveless jacket covered in gang patches. Knuckles scarred, eyes cold, moving with the unhurried confidence of someone who has broken many people.
level: 2
max_hp: 28
ac: 13
awareness: 6
ai_domain: ganger_combat
respawn_delay: "5m"
abilities:
  brutality: 15
  quickness: 9
  grit: 13
  reasoning: 8
  savvy: 10
  flair: 8
loot:
  currency:
    min: 30
    max: 110
  items:
    - item: brass_knuckles
      chance: 0.25
      min_qty: 1
      max_qty: 1
    - item: medkit
      chance: 0.2
      min_qty: 1
      max_qty: 1
    - item: ammo_casing
      chance: 0.4
      min_qty: 1
      max_qty: 2
weapon:
  - id: combat_shotgun
    weight: 3
  - id: heavy_revolver
    weight: 2
  - id: combat_knife
    weight: 1
armor:
  - id: leather_jacket
    weight: 3
  - id: tactical_vest
    weight: 2
taunts:
  - "Vantucky gangs don't do mercy. That's not a rumor."
  - "Heavy and slow is what people think. They stop thinking things after that."
  - "The patches on this jacket represent things I've done. All of them relevant right now."
  - "Scarred knuckles mean I've been settling things this way for a long time."
  - "Vancouver's got its own flavor of hard. You're tasting it."
  - "I move with confidence because I've broken people who ran from me."
  - "Cold eyes don't mean I'm not angry. They mean I've been angry long enough to go quiet."
  - "Vantucky enforcer means the crew sends me when they want it done right."
  - "I've held corners across the bridge for years. This is one of those corners."
  - "The shotgun's for opening moves. The revolver's for when they move."
  - "Unhurried confidence means I know how this ends. You should know too."
  - "Gang patches aren't decorations. Every one earned."
  - "You don't get to be an enforcer by being the second fastest."
  - "Brass knuckles in my pocket, shotgun in my hands, patience in my nature."
  - "I've worked both sides of the Columbia. Neither side has beaten me yet."
  - "Vantucky runs deep on this side of the river. You're in it."
  - "Heavy set means I don't go down easy. Remember that when you swing."
  - "I've enforced collection, protection, and punishment. Today's punishment."
  - "The cold eyes thing isn't a performance. It's experience."
  - "Every bruise I've given someone was in service of the crew. You're in service."
  - "Come at me and come at the whole Vancouver operation."
  - "I've pushed people out of territory they thought was theirs. This is my territory."
  - "Slow is what you see. The part you don't see is what matters."
  - "The crew trusts me because I've never left a job half-done."
  - "Vancouver gang life made me this. Portland couldn't have done it better."
  - "Last person who squared up to me spent three weeks not doing much of anything."
