taunts:
  - "The Couve is mine from the river to the freeway. Every inch."
  - "I managed twenty-three locations before the collapse. Now I manage territories."
  - "The Mall King's word is law in Vancouver. That's not hyperbole."
  - "Strip mall empire means something when you actually built it."
  - "Every warlord from Jantzen Beach to Fourth Plain answers to me."
  - "You think corporate authority died with the world? I kept it alive."
  - "Nobody challenges the Mall King inside his own kingdom."
