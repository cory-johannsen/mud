id: the_couve_warlord
name: Mall King Grogan
description: >
  A massive former chain restaurant manager who reinvented himself as the
  undisputed Warlord of Vancouver Mall. Grogan holds court in the old
  food court, collecting tribute from every vendor and enforcer group
  from Jantzen Beach to Fourth Plain. He wears salvaged corporate signage
  as improvised plate armor and carries a stop sign mounted on a steel post.
