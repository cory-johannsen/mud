taunts:
  - "You are in violation of Homeowners Association Code Section 4, paragraph 2. Please comply or be struck."
  - "The CC&Rs still apply. Especially the part about unauthorized personnel."
  - "This is a residential area. You are not a resident."
  - "Citation first. Then the baton. Then the emergency committee meeting."
  - "I have the authority of the board. The board is very serious people."
  - "Property values are maintained by people like me. Using methods like this."
  - "The polo shirt means authority. The baton means I enforce it."
  - "Nobody bypasses the HOA. Nobody."
  - "Your landscaping of this situation is non-compliant. I'm correcting it."
  - "The clipboard has your name on it now. Under 'immediate removal.'"
  - "Unauthorized presence in a protected community is a Level 3 violation."
  - "The board voted to handle threats with extreme measures. I handle extreme measures."
  - "Golf clubs aren't just for the course anymore. This is proof."
  - "I took an oath to defend the covenant. The covenant demands I stop you."
  - "You think the apocalypse ended the HOA? The HOA survived everything."
  - "Complaint filed. Correction initiated. You're the correction target."
  - "Thick neck, clipboard, and absolutely zero sense of humor about violations."
  - "This community survived because we maintained standards. Standards mean you leave."
  - "I've cited more trespassers than I can count. Most needed medical attention afterward."
  - "Section 7 covers unauthorized entry. I cover Section 7."
  - "The baton is a compliance tool. Consider yourself non-compliant."
  - "You're disturbing the aesthetic of this neighborhood. I am aesthetically opposed to you."
  - "The stun baton is for difficult cases. You're being difficult."
  - "HOA enforcement has evolved. We don't send letters anymore."
  - "Community standards require that I remove threats. Forcibly if necessary."
  - "You'll be fined, cited, and then beaten. In that order."
  - "The apocalypse changed everything except the bylaws."
