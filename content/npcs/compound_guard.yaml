taunts:
  - "Compound's closed. So is your window to walk away."
  - "I've got eyes on you from three positions. Don't flatter yourself thinking I'm alone."
  - "The people inside pay me to keep people like you out. I earn my pay."
  - "Sandbags, scope, and patience. I've got all three."
  - "You're in my sightline. That's not a good place to be."
  - "Turn around now and the scope stays on your back instead of your head."
  - "The compound's survived three assaults. You're not a fourth."
  - "I don't need orders to shoot someone who keeps advancing."
  - "This position has held. It will keep holding."
  - "Clear the approach or get cleared from it."
  - "I've been watching you since you came over that ridge."
  - "Every angle is covered. Every approach is covered. You're not covered."
  - "Last group that tried to breach us left in pieces. Not all pieces accounted for."
  - "The wire's not just for show. Neither am I."
  - "Inside this compound are people who depend on me. You're testing my dedication."
  - "Advance another meter and I stop using my voice to warn you."
  - "Guard duty's boring until moments like this. I've been ready."
  - "You don't know the layout. I do. Every inch."
  - "Perimeter secure. Threat identified. Taking action."
  - "The compound doesn't fall while I'm posted."
  - "You chose wrong when you chose this approach."
  - "Nowhere to hide out here. Nowhere to run."
  - "I have a very clean field of fire right now. Don't ruin my record."
  - "The people inside are counting on me. What are you counting on?"
  - "Standing down isn't an option I'm offering you."
  - "This rifle has kept the peace for two years. Today's no different."
  - "I've read every book on perimeter defense ever written. Applied knowledge."
