id: field_worker
name: Field Worker
description: >-
  A weary worker in muddy overalls, hands calloused from tilling
  the collective's fields.
level: 1
max_hp: 16
ac: 13
awareness: 6
ai_domain: scavenger_patrol
respawn_delay: "5m"
abilities:
  brutality: 12
  quickness: 10
  grit: 14
  reasoning: 9
  savvy: 12
  flair: 10
loot:
  currency:
    min: 3
    max: 20
  items:
    - item: commune_ration
      chance: 0.5
      min_qty: 1
      max_qty: 2
    - item: harvest_sickle
      chance: 0.1
      min_qty: 1
      max_qty: 1
taunts:
  - "You're walking through someone's food. That someone is me."
  - "These fields are what keep people alive. Don't test what I'll do to protect them."
  - "I've worked soil all day. I can work you next."
  - "Stealing from the collective means stealing from everyone. I take that personally."
  - "Touch the crop and I'll use this sickle for something other than harvest."
  - "Hard work built this field. Harder people defend it."
  - "You think farming is soft work? Feel these hands and rethink that."
  - "Every seed that got buried here cost something. You'll cost the same."
  - "We eat because we work and we fight. Right now I'm fighting."
  - "Muddy boots and calloused knuckles. What do you have?"
  - "The harvest doesn't stop for trespassers. I just pause to deal with them."
  - "I've turned harder ground than you."
  - "Get off the rows. The collective's yield isn't yours."
  - "We feed thirty people with these fields. You're not the thirty-first."
  - "I'm tired. That makes me short on patience for this."
  - "The sickle can harvest a lot of things. Including problems."
  - "Two years I've been working this land. You'll be a footnote."
  - "Stealing food out here is a killing offense. I enforce it."
  - "Get away from the crop or I put you in it."
  - "I didn't break my back for you to come take what I grew."
  - "The fields are all we have. I'll die before I let you take them."
  - "You picked the wrong time to trespass. Harvest season means everyone's watching."
  - "Even the dirt here is worth defending."
  - "My hands are for growing things — and for stopping people who'd take them."
  - "You smell like you haven't worked a day since the collapse. That ends now."
