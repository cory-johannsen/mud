taunts:
  - "Vancouver holds its ground. Always has."
  - "This strip mall survived the collapse. So did we. You won't."
  - "Militia means we fight together. Right now I'm the one fighting you."
  - "You crossed into Couve territory without clearance. That's a problem."
  - "We've defended this block from gangs twice your size."
  - "Surplus camo, homemade ammo, and absolute conviction. Come test it."
  - "Portland gangs think they own the river. We own our side."
  - "Step back or step down. Your choice."
  - "The Couve militia doesn't bluff and doesn't negotiate with trespassers."
  - "I've been in this camo so long it's basically skin at this point."
  - "You think because we're across the river we're soft? Big mistake."
  - "Every checkpoint, every patrol — we've held this territory."
  - "My crew is three blocks in every direction. None of them are friendlier than me."
  - "Civilians are behind me. Threats are in front of me. That's you."
  - "Washington fed itself when Oregon collapsed. We remember that."
  - "Back off the perimeter. This is your only civil conversation with the militia."
  - "We buried the last people who pushed through here. I can dig again."
  - "Strip malls are ugly but they're ours. Everything ugly is ours."
  - "I've been militia since the second month. I'm very good at this now."
  - "Portland tried to absorb us twice. We're still here."
  - "I protect my people. Right now my people want you gone."
  - "Assault rifle, tactical vest, and three years of experience. Good luck."
  - "The safety's off because I saw you coming two minutes ago."
  - "There's no winning move for you here. The militia's dug in."
  - "This is our stand. It will continue to be our stand."
  - "Couve doesn't fall. Get that through your head."
