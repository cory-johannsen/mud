id: strip_mall_scav
name: Strip Mall Scav
description: A scrappy survivor picking through strip mall ruins. She moves with nervous efficiency, stuffing salvage into a bulging pack.
level: 1
max_hp: 12
ac: 14
rob_multiplier: 1.0
awareness: 8
ai_domain: strip_mall_scav_combat
respawn_delay: "5m"
abilities:
  brutality: 10
  quickness: 14
  grit: 12
  reasoning: 11
  savvy: 14
  flair: 9
loot:
  currency:
    min: 5
    max: 35
  items:
    - item: scrap_metal
      chance: 0.6
      min_qty: 1
      max_qty: 3
    - item: neon_tube
      chance: 0.25
      min_qty: 1
      max_qty: 1
weapon:
  - id: cheap_blade
    weight: 3
  - id: rebar_club
    weight: 2
  - id: golf_club
    weight: 1
armor:
  - id: leather_jacket
    weight: 4
  - id: kevlar_vest
    weight: 1
taunts:
  - "Strip mall's picked clean except for what I haven't touched yet. That's mine."
  - "Nervous efficiency means I'm fast and I'm jumpy. Both are your problem."
  - "This pack doesn't get any lighter. Neither do my consequences for people who bother me."
  - "I've found neon tubes and scrap in three stores today. You'll be stop four."
  - "Scrappy means I've made do with less than this and still came out ahead."
  - "You're eyeing my pack. I'm eyeing your equipment. We've both made assessments."
  - "Rebar club says I've thought about this before and prepared accordingly."
  - "I work fast and quiet. Right now I'm going to work loud."
  - "The strip mall ruins are mine until they aren't. They still are."
  - "Golf club from a sporting goods store. Still very effective."
  - "Don't follow a scav through their own ruins. I know every broken step."
  - "I've been picking through this strip all morning. I'm not splitting the haul."
  - "Fast hands for stuffing salvage, same hands for defending it."
  - "Kevlar vest came out of a sporting goods store two blocks over. Worth the find."
  - "Three stores down that strip have given me enough to eat for a week. You're not eating it."
  - "Nervous doesn't mean scared. It means aware. I'm very aware."
  - "I know which stores are already cleared and which ones aren't. Huge advantage."
  - "Scrappy survivor means I've survived specifically because I fight scrappy."
  - "Strip mall scav sounds low. It means I eat when others don't."
  - "The blade's for close work. The rebar's for emphasis."
  - "I've been cornered in these ruins before. I found a way out that time too."
  - "You don't know this mall like I know this mall."
  - "Bulging pack means I've had a good day. I'm going to finish having a good day."
  - "Savvy is my best quality. I've already planned three exits."
  - "Come take a swing. I've been swinging heavier things than you all morning."
  - "Don't touch the neon tube. That's decoration. I'm keeping it."
