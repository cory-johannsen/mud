taunts:
  - "You have no idea what you just walked into."
  - "Nobody in this room has ever said no to me. You won't be the first."
  - "Nobody moves for anyone. Anyone moves for me."
  - "That look on your face — keep it. I want to remember it."
  - "I've broken people who were twice your size and three times as confident."
  - "The name is a warning. You should've listened to it."
  - "You feel it? That weight in the air? That's me."
  - "I don't fight people. I end them."
  - "Nobody calls me that and expects a quiet day."
  - "You think this is a fight. I think this is a formality."
  - "I've been building to this my whole life. Have you?"
  - "Flair and fury. I've got both in excess."
  - "You walked in here on two legs. Let's see about walking out."
  - "I've never once lost when it mattered. Today matters."
  - "Every room I enter gets quieter. Why aren't you quieter?"
  - "The force in this room is me. Don't mistake it for anything else."
  - "You have exactly the wrong energy for this situation."
  - "Nobody leaves here without my say-so. I'm not saying so."
  - "Power isn't taken. It's demonstrated. Watch."
  - "I've been told no once. It didn't end well for the teller."
  - "You're outgunned, outmaneuvered, and outclassed. What's your plan?"
  - "I don't raise my voice because I don't need to."
  - "This ends when I decide it ends. Not before."
  - "The whole block breathes when I breathe. You're interrupting."
  - "Walk in with that face and see what face you leave with."
  - "Warning? I don't do warnings. Only outcomes."
  - "Big presence, bigger reputation, biggest mistake you'll ever make."
