taunts:
  - "Every deal through Aloha passes through me. Every. Single. One."
  - "You think neutral zone means safe? Wrong. It means my rules."
  - "The sentries answer to the council. The council owes me favors."
  - "I've buried better threats than you in this scrap yard."
  - "The neutral zone is a lie I sell to keep the credits flowing."
  - "You should have paid the toll and kept walking."
  - "I didn't build this operation to lose it to someone like you."
