id: aloha_smuggler_king
name: The Smuggler King
description: >
  A wiry, sharp-eyed man who clawed his way to the top of Aloha's black market
  trade through a combination of cunning, ruthlessness, and an uncanny ability
  to make problems disappear. He operates from the scrap yard's depths, surrounded
  by loyal enforcers and crates of contraband. His knife is always within reach.
level: 5
max_hp: 72
ac: 17
