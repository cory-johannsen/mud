id: couve_scavenger
name: Couve Scavenger
description: A gaunt figure in patched-together salvage gear, sifting through rubble for anything worth taking. Territorial and unpredictable.
level: 3
max_hp: 24
ac: 14
awareness: 4
ai_domain: ganger_combat
respawn_delay: "5m"
abilities:
  brutality: 11
  quickness: 14
  grit: 12
  reasoning: 9
  savvy: 11
  flair: 7
loot:
  currency:
    min: 3
    max: 25
  items:
    - item: scrap_metal
      chance: 0.7
      min_qty: 1
      max_qty: 4
    - item: medkit
      chance: 0.08
      min_qty: 1
      max_qty: 1
weapon:
  - id: cheap_blade
    weight: 3
  - id: golf_club
    weight: 2
  - id: spiked_knuckles
    weight: 1
armor:
  - id: leather_jacket
    weight: 2
  - id: worn_clothes
    weight: 3
taunts:
  - "This rubble's mine. The whole block is mine."
  - "I found it first. Finder's rights. Enforced by this blade."
  - "You smell like you've got something worth taking."
  - "Territorial's a nice word for it. I call it survival."
  - "Picked this site clean twice already. I know where every piece is."
  - "Get your own ruins. These are spoken for."
  - "Unpredictable? That's the nicest thing anyone's called me."
  - "I live in these walls. I know every crack and corner."
  - "You're slowing down my work. That makes you an obstacle."
  - "This side of the river's thin pickings. Don't make them thinner."
  - "I've chased off crews triple my size. They had more to lose than me."
  - "Gaunt doesn't mean weak. It means hungry. And hungry is dangerous."
  - "I scratch for every piece. You think I'll share?"
  - "The rubble gives up its secrets to people who know how to look. I know. You don't."
  - "Get out of my site before I make this permanent."
  - "You've got gear on you that I could use. Let's discuss."
  - "There's always another block to scavenge. But not for you."
  - "I don't start fights. I finish salvage. Sometimes both."
  - "Couve scavengers eat last. That means we eat anything."
  - "Your stuff's nicer than mine. That's about to change."
  - "Touch one more piece of my haul and I'll touch your face with this blade."
  - "I've survived two winters in these ruins. You're a summer problem."
  - "Don't mistake tired for soft. I'm both. Still dangerous."
  - "Thin pickings make sharp scavengers. I'm very sharp."
  - "Leave something for me or leave something of yourself."
  - "Vancouver's got nothing left worth being gentle over."
