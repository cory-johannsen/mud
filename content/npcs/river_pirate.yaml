taunts:
  - "The Willamette belongs to us. You're standing on our shore."
  - "Sharp eyes and sharp hooks. Both trained on you."
  - "River pirates don't ask twice."
  - "You think the river's neutral ground? Nobody told us."
  - "Everything that floats past is taxed. So is everything that walks past."
  - "Weathered and mean — that's what the river does to you."
  - "My waders have been through worse than you."
  - "The current washes everything downstream. I'll help."
  - "I've taken cargo off vessels in fog and rain. You're stationary. Easy work."
  - "Drop what you're carrying or go in the river with it."
  - "River map says every inch of this bank is mine. I made the map."
  - "Fast on land and faster on water. Choose your terrain poorly."
  - "The slicker's seen a hundred jobs. This is number one-oh-one."
  - "We've held this stretch since the second season. Nothing changes."
  - "I've fought off boat crews and dock workers. You're a solo problem."
  - "The fishing net's for fish. The machete's for trespassers."
  - "Nobody comes to this bank friendly. So I stopped being friendly."
  - "Upriver or downriver — both are my territory."
  - "The river gives and the river takes. Right now it's taking what you have."
  - "I can see you from a quarter mile away in this gear. Had plenty of time to prepare."
  - "Pirate's code: take what you can, give nothing back."
  - "The dock hook's got more uses than you'd expect from a hook."
  - "Toll on the Willamette is life and property. Guess what I'm collecting."
  - "You don't have a boat and you don't have a choice."
  - "I've survived three winters on this river. You won't survive this conversation."
  - "Muddy boots and bad intentions — that's the river pirate way."
