id: beaverton_hoa_warlord
name: Director Grunfeld
description: >
  The self-styled Director of the Beaverton Free State wears a modified riot
  suit over a collared shirt and carries a reinforced clipboard that doubles
  as a bludgeon. Grunfeld rose through the HOA enforcement ranks by writing
  more violations than anyone else, then had his rivals cited for unauthorized
  personal conduct. He runs the Mall Enforcement Core with bureaucratic
  brutality and a zero-tolerance policy on dissent.
