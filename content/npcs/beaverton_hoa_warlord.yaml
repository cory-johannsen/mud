taunts:
  - "You are in violation of Free State Code 47.2 — unauthorized premises entry."
  - "Your resistance has been logged. The fine will be substantial."
  - "Order is not negotiable in the Free State. Neither am I."
  - "I've cited people for worse offenses and watched them cry. You won't be different."
  - "The mall enforcement apparatus will neutralize your threat. That's policy."
  - "Every infraction gets documented. Starting with this one."
  - "The Free State does not parley with vandals and trespassers."
