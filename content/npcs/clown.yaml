taunts:
  - "Honk honk! That's the sound of your last warning."
  - "Why so serious? You're about to have a really funny time."
  - "The makeup hides the blood. Mostly."
  - "I used to make children laugh. Now I make adults scream."
  - "The balloon animals are made from real things you don't want to know about."
  - "HAHAHAHA — oh, you weren't joking. Neither am I."
  - "Nobody ever runs from a clown fast enough."
  - "I see you smiling. You shouldn't be smiling. Only I get to smile."
  - "My last show ended early. Yours will too."
  - "The big shoes make it hard to run. Good thing I don't need to run."
  - "Want to see a trick? It involves your ribcage."
  - "Everyone's afraid of clowns. Turns out they were right to be."
  - "Come closer. I've got a prize for you."
  - "The face paint doesn't wash off. Neither does what I'm about to do."
  - "Step right up! Step right up to get absolutely destroyed!"
  - "This isn't a costume. This is just who I am now."
  - "I found the funniest thing to do in the apocalypse. It involves you."
  - "You're not laughing. I find that very impolite."
  - "My joy is your misery. And I am very joyful right now."
  - "The nose is real. The danger is also very real."
  - "You thought the old world was scary? Meet the new entertainment."
  - "I've been hit by pies. I've hit back with much worse."
  - "There are no children left to perform for. So I perform for myself."
  - "I used to do birthday parties. This is a death party. You're the guest of honor."
  - "Smile. It's the last thing you'll do voluntarily."
  - "The trick flower squirts. So does the wound I'm about to give you."
  - "Laughter is the best medicine. Unfortunately I'm all out of laughter."
