taunts:
  - "Vantucky militia keeps the Vancouver side clean. You're making it dirty."
  - "Flag patch means I still believe in something. That something includes defending this ground."
  - "Full camo, full commitment, full disregard for whatever you're about to say."
  - "We've been patrolling this territory since before Portland fell completely."
  - "The beard's not a style choice. It's how time looks on a militiaman."
  - "You crossed into militia-controlled territory. There are consequences."
  - "I scan for threats all day. You just became a confirmed threat."
  - "Assault rifle says I've been preparing for exactly this kind of situation."
  - "Vantucky doesn't kneel to Portland gangs, federal remnants, or travelers."
  - "My squad's a shout away. But I won't need them."
  - "The tactical vest is standard issue. The attitude is personal."
  - "Eyes scanning for threats — and they just stopped scanning because I found one."
  - "We hold the north end because nobody's managed to take it. That includes you."
  - "I've run militia drills in the rain, the dark, and the cold. This is easier."
  - "Camo means I was already in position before you knew where to look."
  - "The flag patch means something to the people who wear it. That something includes fighting."
  - "Vancouver's independent. I enforce that independence."
  - "Don't mistake rural militia for unsophisticated. We've had years to get good."
  - "We've repelled everything that's come from Portland. You're from Portland."
  - "Kevlar under the vest, rifle in hand, knife on the hip. Prepared."
  - "The militia code is simple: defend, deny, enforce. Currently enforcing."
  - "I've walked this perimeter a thousand times. I know every approach angle."
  - "Vantucky's not part of Portland and never will be. That's what I fight for."
  - "The revolver's for up close. You're about to be up close."
  - "I've done midnight patrols in weather that would send city people inside. You're nothing."
  - "American flag patch on a post-America jacket. Make of that what you will."
