id: cedar_hills_patrol
name: Cedar Hills Patrol
description: A young recruit in a clean uniform, nervously checking their patrol route with a walkie-talkie that may or may not work.
npc_type: guard
level: 1
max_hp: 18
ac: 14
awareness: 9
ai_domain: scavenger_patrol
respawn_delay: "5m"
guard:
  wanted_threshold: 1
abilities:
  brutality: 10
  quickness: 14
  grit: 12
  reasoning: 12
  savvy: 14
  flair: 10
loot:
  currency:
    min: 10
    max: 40
  items:
    - item: parking_pass
      chance: 0.5
      min_qty: 1
      max_qty: 2
    - item: scrap_metal
      chance: 0.3
      min_qty: 1
      max_qty: 2
taunts:
  - "H-halt! This is a restricted patrol zone!"
  - "I'm calling this in. You're going to want to comply."
  - "Cedar Hills Patrol has authority over this area. That means you."
  - "My radio might not work but my aim does."
  - "I've memorized every route. There's no way out you haven't already shown me."
  - "Don't make me escalate this. I will, but I'd rather not."
  - "I'm on the books now. Might be new, but I take it seriously."
  - "This zone is protected. Trespassers are removed by force if necessary."
  - "I've trained for this. Not a lot, but I've trained."
  - "Step back or I step forward and it gets ugly fast."
  - "The community put faith in me. I won't let it down."
  - "You're making this harder than it needs to be."
  - "Cedar Hills stands because people do what I'm doing right now."
  - "I know my patrol route better than I know my own face."
  - "This walkie-talkie might be dead but the person holding it isn't."
  - "Back away from the perimeter. Last warning before force."
  - "The handbook says I should de-escalate. The handbook hasn't seen you."
  - "You're going to make me look bad in front of the whole patrol."
  - "I've got backup. Probably. Stand down anyway."
  - "Nervous doesn't mean harmless. Remember that."
  - "My first week on the job and I'm not about to fold now."
  - "Compliance is easy. The alternative is not."
  - "I don't want trouble. But I know how to make it."
  - "Perimeter alert is active. You activated it. Own that."
  - "Even rookies can stop a breach when they have to."
  - "I've been on four patrols and nobody's gotten through. Not today either."
