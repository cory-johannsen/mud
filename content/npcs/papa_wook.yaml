id: papa_wook
name: Papa Wook
description: >
  The patriarch of the Wooklyn collective, Papa Wook commands the tribe through
  sheer presence and an ancient ceremonial staff said to channel the spirits of
  every festival ever held in these streets. His dreadlocks are woven with bones,
  coins, and living flowers that bloom regardless of season. To face Papa Wook is
  to face the groove itself.
