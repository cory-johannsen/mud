id: salvager_crew
name: Salvager Crew
description: A pair of hardened salvagers in patched gear, working a site together. They defend their finds with practiced aggression.
level: 5
max_hp: 35
ac: 15
rob_multiplier: 1.0
awareness: 8
ai_domain: scavenger_patrol
respawn_delay: "5m"
abilities:
  brutality: 12
  quickness: 12
  grit: 13
  reasoning: 10
  savvy: 11
  flair: 9
loot:
  currency:
    min: 10
    max: 40
  items:
    - item: scrap_metal
      chance: 0.6
      min_qty: 1
      max_qty: 4
    - item: outlet_tag
      chance: 0.3
      min_qty: 1
      max_qty: 2
weapon:
  - id: rebar_club
    weight: 3
  - id: cheap_blade
    weight: 2
  - id: pipe_wrench
    weight: 2
armor:
  - id: leather_jacket
    weight: 4
  - id: work_coveralls
    weight: 3
taunts:
  - "You're stepping on our work site. Step back."
  - "We don't split finds with strangers. We split strangers from their finds."
  - "Two of us, one of you — do the math."
  - "Hardened from every kind of work and every kind of fight."
  - "Salvage crew means we watch each other's backs. Both of us are watching yours."
  - "This site's been our operation for six months. Nobody moves in after six months."
  - "We've run off bigger groups with less ammo. Try us."
  - "Drop it. We want whatever you've picked up near our claim."
  - "Practiced aggression is the crew way. Nobody gets soft out here."
  - "We've got rebar, blades, and a very clear sense of what's ours."
  - "Solidarity among crew members. None of it extends to you."
  - "You found our site. Now you found our problem."
  - "We work together. That makes us harder to fight than you think."
  - "Two people who trust each other completely versus one stranger. Easy calculation."
  - "Every piece here got priced and claimed before you arrived."
  - "Working a site together means we know each other's moves. We don't know yours."
  - "I signal left, they go right. You won't know which way to watch."
  - "The work coveralls mean we're serious about what we do here."
  - "Salvage crew ethics: the site belongs to who holds the site. We hold it."
  - "You wandered into occupied territory. Occupation is defended."
  - "We've stripped three sites this week. We'll strip this problem next."
  - "The wrench and the club have cleared this site before. They can do it again."
  - "Nobody comes to our claim without paying. You didn't pay."
  - "Hard work makes hard people. Two hard people. Against you."
  - "Get off the claim or we remove you from the claim."
  - "Back to back, we cover every angle. Your angles are covered."
