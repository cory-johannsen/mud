id: scavenger
name: Scavenger
description: A wiry figure in mismatched armor, picking through the rubble with practiced efficiency.
level: 1
max_hp: 14
ac: 13
rob_multiplier: 1.0
awareness: 7
ai_domain: scavenger_combat
respawn_delay: "5m"
abilities:
  brutality: 10
  quickness: 16
  grit: 12
  reasoning: 12
  savvy: 14
  flair: 8
loot:
  currency:
    min: 5
    max: 30
  items:
    - item: scrap_metal
      chance: 0.75
      min_qty: 1
      max_qty: 5
    - item: medkit
      chance: 0.15
      min_qty: 1
      max_qty: 1
weapon:
  - id: cheap_blade
    weight: 3
  - id: steel_pipe
    weight: 2
  - id: combat_knife
    weight: 1
armor:
  - id: leather_jacket
    weight: 4
  - id: tactical_vest
    weight: 1
taunts:
  - "Rubble's full of useful things. So is whatever you're carrying."
  - "I pick through wreckage all day. You're just a different kind of wreckage."
  - "Mismatched armor means I've been in enough fights to need it."
  - "Fast feet, sharp blade, nothing to lose. That's my situation."
  - "I've stripped buildings bare. I can strip you bare too."
  - "Every chunk of scrap metal I own was someone else's problem."
  - "Wiry means I move fast. You'll find that out."
  - "You're between me and what I want. That's the only issue here."
  - "Practiced efficiency — same for salvage, same for fighting."
  - "I've got half a dozen scrap pieces in this pack that used to belong to someone else."
  - "Quickness is the one stat that matters in a wasteland. I've got it."
  - "Don't mistake lean for weak. I've been surviving on lean for three years."
  - "You've got more gear than me right now. That's a temporary situation."
  - "Scavengers who hesitate don't stay scavengers."
  - "Every fight I've had ended with me carrying more than when I started."
  - "The rubble hides a lot of things. I know them all."
  - "I'm not looking for trouble. I'm looking for your stuff."
  - "Cheap blade and a steel pipe — simple tools for a simple job."
  - "Portland's bones have been good to me. You might be too."
  - "I've got nothing tying me here except this salvage. I'm very motivated to keep it."
  - "Don't back a scavenger into a corner. We know too many ways out."
  - "You think I look desperate? Desperate people fight dirty."
  - "The collapsed city feeds people who know where to look. I know where to look."
  - "One bad day away from starving. That makes every fight a priority."
  - "I've survived the fall, the winter, and the gangs. You're not harder than all three."
  - "Mismatched armor's better than no armor. I checked."
