id: vantucky_scavenger
name: Vantucky Scavenger
description: A wiry figure in a patchwork coat, face half-hidden behind a dust mask and cracked goggles. Moves fast and low, picking through debris with practiced efficiency and no mercy for anyone who gets in the way.
level: 18
max_hp: 140
ac: 17
awareness: 8
ai_domain: ganger_combat
respawn_delay: "5m"
abilities:
  brutality: 10
  quickness: 14
  grit: 10
  reasoning: 10
  savvy: 12
  flair: 8
loot:
  currency:
    min: 10
    max: 60
  items:
    - item: scrap_metal
      chance: 0.5
      min_qty: 1
      max_qty: 3
    - item: ammo_casing
      chance: 0.35
      min_qty: 1
      max_qty: 2
    - item: duct_tape
      chance: 0.2
      min_qty: 1
      max_qty: 1
weapon:
  - id: sawn_off
    weight: 2
  - id: combat_knife
    weight: 3
  - id: pipe_wrench
    weight: 1
armor:
  - id: leather_jacket
    weight: 2
  - id: padded_coat
    weight: 2
taunts:
  - "Vantucky scavengers move low and fast. Currently doing both."
  - "Dust mask and cracked goggles means I've been in the ruins longer than you've been careful."
  - "Patchwork coat's got more patches than original. That's the Vancouver aesthetic."
  - "I pick through debris and I pick through people. Same technique."
  - "Fast and low — that's how you survive in Vantucky's ruins."
  - "Ammo casings in my pocket means I reload constantly. I'm ready."
  - "This side of the river has its own kind of scavenger. More aggressive."
  - "Don't follow a scav through terrain they know. You'll lose them. Then you'll lose."
  - "The sawn-off's a conversation ender. You started the conversation."
  - "Duct tape and scrap and a bad attitude — that's the Vantucky formula."
  - "Cracked goggles still work fine. So do I."
  - "I've been moving through Vancouver rubble since the second year. You're slow in comparison."
  - "Nobody hired me to be here. I hired myself. I'm very motivated."
  - "Pipe wrench says I'm comfortable with leverage."
  - "You see dust mask and patchwork coat. I see your gear and think about what I'll do with it."
  - "Vancouver's ruins go deep. I know all the good spots. You don't."
  - "Fast hands, low profile, and no patience for interruptions."
  - "I've dodged militia, gangs, and radseek dogs across this whole city. You're slower."
  - "The goggles keep the dust out of my eyes while I deal with you."
  - "Scavenging in Vantucky means competing with the militia and the gangs. I'm still here."
  - "Every ammo casing I carry was pulled from a site somebody else thought was empty."
  - "Patchwork means I fix things. Including problems like this."
  - "I work fast because slow scavengers go hungry. I haven't gone hungry."
  - "Vantucky's got nothing fancy but it's got plenty of people willing to fight for scraps."
  - "This knife's been used today already. It doesn't mind going again."
  - "Low to the ground and quick — that's not just movement. That's a fighting style."
