id: chemical_enforcer
name: Chemical Enforcer
description: A heavyset enforcer in a patched hazmat suit, gas mask hanging loose around the neck. Works security for whoever controls the chemical plants and tank farms.
level: 3
max_hp: 34
ac: 15
awareness: 7
ai_domain: ganger_combat
respawn_delay: "5m"
abilities:
  brutality: 14
  quickness: 10
  grit: 16
  reasoning: 9
  savvy: 10
  flair: 8
loot:
  currency:
    min: 15
    max: 60
  items:
    - item: gas_mask
      chance: 0.2
      min_qty: 1
      max_qty: 1
    - item: scrap_metal
      chance: 0.4
      min_qty: 1
      max_qty: 2
    - item: medkit
      chance: 0.15
      min_qty: 1
      max_qty: 1
weapon:
  - id: steel_pipe
    weight: 3
  - id: combat_knife
    weight: 2
armor:
  - id: tactical_vest
    weight: 3
  - id: leather_jacket
    weight: 2
taunts:
  - "You know what's in those tanks? You don't want it on you."
  - "This hazmat suit isn't for my protection. It's for after."
  - "Contamination zone. Personnel without clearance are eliminated."
  - "Try breathing near these pipes without my permission. See what happens."
  - "The chemical plant runs because people like me keep out people like you."
  - "I've seen what leaks do to a person. You want a demonstration?"
  - "Security for the plant means no witnesses."
  - "That mask around my neck is optional. Your continued breathing is not."
  - "Boss says keep the perimeter clean. You're a mess."
  - "The compounds in those tanks are classified. So is what I'm about to do to you."
  - "Touch the equipment and you'll learn what corrosive means firsthand."
  - "I work in chemicals. I know exactly how long pain can last."
  - "This pipe has cleared more heads than a dose of chlorine."
  - "The plant doesn't stop production for trespassers. It stops trespassers."
  - "You think the smell here is bad now? Wait until I'm done."
  - "Industrial zone. No trespassing. No exceptions. No mercy."
  - "I've broken bones in a hazmat suit. I'm comfortable in this."
  - "The tanks hold enough to eat through steel. Think about what they'd do to you."
  - "Don't bleed on the floor. There are reactions I don't want to explain."
  - "Every inch of this facility is my responsibility. Including removing you."
  - "Security clearance required. You don't have it. I'll stamp your exit."
  - "I've held this post through two chemical spills and a gang raid. You're nothing."
  - "The mask goes on when things get messy. Things are about to get messy."
  - "Trespassers here don't get reported. They get processed."
  - "Nobody in this district moves product without our consent. You're not moving."
