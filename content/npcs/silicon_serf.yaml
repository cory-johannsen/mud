id: silicon_serf
name: Silicon Serf
description: A haggard tech worker in a stained cleanroom suit, maintaining infrastructure they no longer understand.
level: 5
max_hp: 35
ac: 15
awareness: 6
ai_domain: scavenger_patrol
respawn_delay: "5m"
abilities:
  brutality: 8
  quickness: 12
  grit: 12
  reasoning: 14
  savvy: 10
  flair: 10
loot:
  currency:
    min: 3
    max: 15
  items:
    - item: circuit_board
      chance: 0.5
      min_qty: 1
      max_qty: 1
    - item: scrap_metal
      chance: 0.3
      min_qty: 1
      max_qty: 2
taunts:
  - "I maintain systems I don't understand for people I've never met. I'm done being careful."
  - "Cleanroom suit, dead eyes, and a tool belt. This is what tech did to people."
  - "I've rewired servers and patched conduit in the dark. You're not difficult."
  - "The infrastructure needs maintenance. So do people who bother me."
  - "Don't mistake haggard for helpless."
  - "I've kept this district running. I can shut parts of it down too."
  - "Silicon serf means I survived by being useful. I'm still useful. Mostly for this."
  - "The stained suit means I've been at this longer than the collapse was ago."
  - "Reasoning stat's my best attribute. I've reasoned that you need to leave."
  - "I fix things by understanding how they break. You're about to be broken."
  - "The tech bosses are dead or gone. I'm still here doing their maintenance."
  - "Circuit boards are currency now. I've got some. You want some. Fight for it."
  - "I know which cables to pull to make things go very wrong. In general."
  - "Haggard means this place has taken everything and I'm still working."
  - "The cleanroom suit's a relic. So is the idea that I'm safe to push around."
  - "Years of maintaining things nobody understands gave me a lot of time to think about violence."
  - "I'm too tired to be afraid. That makes me very dangerous."
  - "Tech district serf is the bottom rung of the bottom rung. Nothing left to lose."
  - "I fix. I maintain. I hold things together. Including myself, barely."
  - "Useless infrastructure, useless bosses, useless life — but I'm still here."
  - "Don't underestimate the one who kept the lights on this long."
  - "Everything in this district runs because of me. You're in my district."
  - "I know the layout of every building in a six-block radius. Do you?"
  - "Small hands are good for tight spaces. Also for quick strikes."
  - "The circuit boards aren't going to pack themselves. Back off."
  - "I've soldered in the dark during firefights. You're a manageable distraction."
