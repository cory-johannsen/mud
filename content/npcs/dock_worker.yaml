taunts:
  - "The docks don't close. Neither does my fist."
  - "I've been loading and unloading since before you were a problem."
  - "This hook's moved more cargo than you can imagine. Including people."
  - "Dock rules: respect the work, respect the workers. You're failing both."
  - "These hands have hauled enough weight to know exactly where to put it."
  - "Portland docks run on sweat and intimidation. I provide both."
  - "You don't belong on my pier. I'll move you myself."
  - "I've worked 12-hour shifts and still had the energy to handle problems like you."
  - "The river's right there. Don't make me introduce you."
  - "I've cracked skulls with this pipe during shift breaks. You're on my schedule now."
  - "Dock workers eat at the end of the day. Everything else waits."
  - "This coverall's got stains you don't want to know the origin of."
  - "You're holding up operations. That makes you cargo."
  - "The union's dead but the muscle memory isn't."
  - "I move things for a living. Right now I'm moving you."
  - "Been on these docks twenty years. I know every plank, every corner."
  - "Big shoulders mean big hits. Simple math."
  - "You're in the way of commerce. Commerce wins."
  - "The water doesn't care who goes in. Neither do I."
  - "Last person who bothered me on the pier ended up off the pier."
  - "Broad shoulders, dock hook, and a bad morning. Don't add to it."
  - "I've carried heavier things than your attitude."
  - "The cargo waits. You won't."
  - "We keep this port running through everything. You're not stopping that."
  - "Hit a man with a dock hook once and they stop asking questions."
  - "You don't get to disrespect the docks and walk away clean."
