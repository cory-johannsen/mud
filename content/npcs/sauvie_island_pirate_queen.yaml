taunts:
  - "The channel is mine. The dock is mine. Right now, so are you."
  - "I've sunk bigger threats than you and fed them to the sturgeon."
  - "Red Moira doesn't negotiate with people who come armed to her dock."
  - "Every boat on this river pays tribute or pays in blood. Choose."
  - "The island council thinks they run things here. I let them think that."
  - "My crew has claimed this waterway for three years. You won't take it in three minutes."
  - "The Multnomah Channel runs red when I'm angry. Get ready to see it."
