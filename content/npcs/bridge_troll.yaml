taunts:
  - "Nobody crosses without paying. Nobody."
  - "Toll's not optional. Neither is the beating."
  - "Every bridge in Portland's got a price. This one's mine."
  - "You want to get to the other side? Get past me first."
  - "I've dropped bigger people than you into that water."
  - "The rebar says you pay. The pipe agrees."
  - "I own this bridge. Everyone who crosses pays rent."
  - "Try to run across and find out how fast I move."
  - "Last fool who refused the toll is fish food now."
  - "You're not the first. You won't be the last. But you will pay."
  - "Cross me and the river's the last thing you'll see."
  - "Toll, or I throw you off the side."
  - "This span is mine from guardrail to guardrail."
  - "I've been collecting here since before the water got weird."
  - "Step forward and it costs more than you have."
  - "Pay the toll or I'll use you to fix the pothole on the other side."
  - "The Willamette doesn't care how tough you think you are."
  - "I've held this bridge against gangs, militias, and Patrol. You're lighter work."
  - "You're three seconds from going over the railing."
  - "I collect from everyone. Dead or alive, it turns out."
  - "There's no way around me. I checked."
  - "Nobody built that bridge for free. Nobody crosses it for free either."
  - "Tokens, chips, or pain. Pick one."
  - "My club's been across more skulls than I can count. Adding yours."
  - "The bridge stands because I stand on it. Come test that theory."
  - "I don't move for anyone who doesn't pay."
  - "Rain, dark, or daylight — the toll never sleeps."
