id: harvest_guard
name: Harvest Guard
description: A sturdy guard in work boots and a flak jacket, watching over the island's precious crops.
level: 25
max_hp: 215
ac: 19
rob_multiplier: 1.2
awareness: 7
ai_domain: ganger_combat
respawn_delay: "5m"
abilities:
  brutality: 15
  quickness: 10
  grit: 14
  reasoning: 10
  savvy: 12
  flair: 10
loot:
  currency:
    min: 10
    max: 50
  items:
    - item: fresh_produce
      chance: 0.35
      min_qty: 1
      max_qty: 2
    - item: medkit
      chance: 0.15
      min_qty: 1
      max_qty: 1
weapon:
  - id: harvest_sickle
    weight: 3
  - id: combat_knife
    weight: 2
  - id: sawn_off
    weight: 1
