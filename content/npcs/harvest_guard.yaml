    weight: 3
  - id: leather_jacket
    weight: 2
taunts:
  - "These crops feed the island. I feed the crops a little blood when I have to."
  - "You're standing in someone's food supply. Back off or get backed off."
  - "Harvest season is sacred. Trespassers during harvest get the sickle."
  - "I've guarded these rows through storms and raids. You're manageable."
  - "The island survives on what grows here. I'll die before I let it be taken."
  - "Work boots and a flak jacket — I'm not some farm hand you can bully."
  - "These fields are everything. Don't test the people who protect everything."
  - "Touch one head of grain and I take one of yours."
  - "Crop guards aren't soft. We protect what people eat."
  - "The ferry brings trouble sometimes. I send it back."
  - "This soil is why we're still alive. I take that seriously."
  - "Guard duty here means deadly earnest. I'm deadly earnest."
  - "You've got no business near the harvest. Get gone."
  - "I've fought off scavengers, raiders, and desperate individuals. All the same."
  - "The island's precious. My tolerance for threats to it is zero."
  - "Every plant in this field took work and water. You're not taking either."
  - "Farmers grow things. I grow things and I defend them."
  - "The sickle's not just for wheat."
  - "Put the produce down and back away. Slowly."
  - "I'd rather lose my life than lose this harvest. Good thing I don't have to choose."
  - "People are counting on these fields surviving. I count on it too."
  - "You're not desperate enough to get through me."
  - "The crops have a guard for a reason. You just found the reason."
  - "Flak jacket's seen better days. It's still better than what you've got."
  - "Island defense starts at the field line. This is the field line."
  - "Work hard enough and you learn what's worth protecting. These fields are worth it."
