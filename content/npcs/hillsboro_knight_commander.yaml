id: hillsboro_knight_commander
name: Knight-Commander Valdris
description: >
  Encased in the heaviest server-rack armor in the Kingdom, Valdris earned
  the commander's position by defeating three challengers in the training yard.
  She maintains the armory with obsessive precision and personally oversees
  the forging of every weapon issued to the Kingdom's knights. Her blade
  is a sharpened server blade half a meter long, and she knows how to use it.
