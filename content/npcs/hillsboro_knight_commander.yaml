taunts:
  - "The armory is the Kingdom's spine. You won't break it."
  - "Every weapon here was forged by my hand. This one is for you."
  - "Knights train every day for the moment an enemy enters these halls."
  - "Server-rack armor has turned better blades than yours."
  - "The Kingdom's strength lives in this room. Leave or prove why you deserve to challenge it."
  - "I've seen squires die for less than this offense."
  - "Your defeat will be catalogued and used to train the next generation of knights."
