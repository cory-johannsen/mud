      chance: 0.6
      min_qty: 2
      max_qty: 4
    - item: medkit
      chance: 0.4
      min_qty: 1
      max_qty: 2
    - item: kevlar_vest
      chance: 0.25
      min_qty: 1
      max_qty: 1
weapon:
  - id: rebar_club
    weight: 3
  - id: steel_pipe
    weight: 2
armor:
