    weight: 3
  - id: leather_jacket
    weight: 2
taunts:
  - "The Blood Camp exists because I made it exist. Nobody gave it to me."
  - "They call me the Slasher. I've earned every letter of that name."
  - "Rustbucket Ridge has laws. Mine are the only ones enforced in this den."
  - "You walked into my nest. That's the last mistake a lot of people made."
  - "The trophies on my armor used to be people. Add another set."
  - "Fear keeps this corner of the ridge productive. Let me remind you why."
  - "Nobody challenges the Slasher twice. The den has room for another example."
