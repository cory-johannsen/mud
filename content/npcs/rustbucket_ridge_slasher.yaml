id: rustbucket_ridge_slasher
name: The Slasher
description: >
  A terrifyingly efficient killer who carved out a bloody corner of Rustbucket
  Ridge and holds it through pure violent intimidation. The Slasher wears
  a patchwork of salvaged armor decorated with trophies from fallen enemies.
  Nobody in the ridge knows where he came from, only that the Blood Camp
  appeared overnight and bodies appeared with it. His den is the most
  feared place in the trailer park.
level: 7
max_hp: 90
ac: 18
rob_multiplier: 2.0
awareness: 9
ai_domain: rustbucket_ridge_slasher_combat
respawn_delay: "10m"
abilities:
  brutality: 20
  quickness: 12
  grit: 18
  reasoning: 9
  savvy: 10
  flair: 9
loot:
  currency:
    min: 100
    max: 280
  items:
