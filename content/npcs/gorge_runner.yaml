id: gorge_runner
name: Gorge Runner
description: A swift-footed runner in wind-resistant gear, carrying messages through the gorge's relentless winds.
level: 2
max_hp: 22
ac: 15
awareness: 10
ai_domain: scavenger_patrol
respawn_delay: "5m"
abilities:
  brutality: 9
  quickness: 15
  grit: 12
  reasoning: 10
  savvy: 15
  flair: 10
loot:
  currency:
    min: 10
    max: 50
  items:
    - item: gorge_moss
      chance: 0.4
      min_qty: 1
      max_qty: 2
    - item: medkit
      chance: 0.2
      min_qty: 1
      max_qty: 1
taunts:
  - "I carry messages through winds that knock grown people down. You don't scare me."
  - "Fastest route is through you. I'll take it."
  - "Runners don't stop. We also don't get stopped."
  - "The wind in the gorge teaches patience and violence. I learned both."
  - "Message delivery runs on schedule. Interruptions get removed from the schedule."
  - "I've run these roads in ice storms and firefights. You're easier."
  - "My route doesn't have detours. You're about to be detoured."
  - "Quick feet and quicker decisions. Don't slow me down."
  - "I know every kilometer of this gorge. You know none of it."
  - "Cross me and you'll find out why runners carry weapons."
  - "The package gets delivered. What happens to you is secondary."
  - "Nobody intercepts a gorge runner and walks away comfortable."
  - "I've been hit before and kept running. You won't hit me."
  - "The wind's in my favor. It usually is."
  - "You don't block a runner. You just create another obstacle I go around. Or through."
  - "Speed over strength — until I need both."
  - "I've got places to be. You're not one of them."
  - "The gorge runners have a code: deliver or die. You're testing the die part."
  - "Light gear, fast legs, and a very short temper for delays."
  - "Every second I'm not running is a second I'm annoyed."
  - "You'll reach for me and find air."
  - "Wind-resistant gear is also fist-resistant. Mostly."
  - "Message runs taught me that sometimes the obstacle fights back. So do I."
  - "I've outrun rockslides. You move slower than a rockslide."
  - "The gorge is my office. This is my turf."
  - "Last person who blocked my route needed two months to walk straight again."
