id: battleground_grand_commissar
name: Grand Commissar Volkov
description: >
  A barrel-chested ideologue in a long grey coat adorned with hand-stitched
  rank insignia. Volkov has ruled the Battleground Collective's war room
  for six years through sheer force of doctrine and fists. He believes
  every word of the collective's ideology and enforces it without mercy.
  His revolutionary tribunal has sentenced dozens to reeducation.
