taunts:
  - "The collective does not fall. Its enemies do."
  - "Ideological deviation is a disease. I am the cure."
  - "You assault the war room of a sovereign collective. This is an act of war."
  - "Every challenger to collective authority ends up in reeducation — or the river."
  - "The revolution is permanent. So is my authority."
  - "You think individual courage beats collective discipline? Let me demonstrate otherwise."
  - "This coat has more blood on it than you can imagine. Most of it justified."
