id: crack_house_dealer
name: Crack House Dealer
description: A territorial dealer guarding product and turf on the row houses of Felony Flats. Paranoid, quick to violence, and backed up by the whole block.
level: 3
max_hp: 28
ac: 13
awareness: 5
ai_domain: ganger_combat
