taunts:
  - "You picked the wrong block to walk down."
  - "This is Felony Flats. Every house on this row is watching."
  - "Paranoid? Yeah. Wrong? No. You're exactly the kind of trouble I expected."
  - "Don't come to my block looking like that. It's disrespectful."
  - "Product's spoken for. So is your wellbeing if you don't back off."
  - "The whole street knows I'm here. You think I'm worried about you?"
  - "Last cop who came through here didn't walk out the same way they walked in."
  - "Touch my stash and the entire block comes down on you."
  - "I've been paranoid for three years. Saved my life every time."
  - "This pistol's been with me longer than most people I know."
  - "Nobody moves in Felony Flats without my knowing. I knew about you."
  - "You're trespassing on an enterprise. That's expensive."
  - "I don't sleep. I don't forgive. I definitely don't forget."
  - "You think you're the first person to try this? You're not."
  - "Business is fragile. Threats to business get removed. You're a threat."
  - "Get off my corner. Every corner is my corner."
  - "I've been quick to violence my whole life. The apocalypse just gave me context."
  - "The row houses all belong to the organization. You're in the organization's way."
  - "Turf isn't just geography. It's survival. Mine."
  - "I didn't survive this long by being slow on the draw."
  - "You're already being watched by four people you can't see."
  - "Move product, protect turf, remove threats. You're a threat."
  - "Fast hands, faster reflexes. You'll see."
  - "The whole Flats will hear about this. Hope you're ready for what that means."
  - "I've never once been outpaced when things went sideways."
  - "Back up slow. No sudden moves. The people behind me have less patience than I do."
