id: bike_courier
name: Bike Courier
description: A lean rider in patched lycra, weaving through rubble on a stripped-down fixie. A messenger bag bristles with sharp objects.
level: 1
max_hp: 14
ac: 14
awareness: 8
ai_domain: scavenger_patrol
respawn_delay: "5m"
abilities:
  brutality: 10
  quickness: 16
  grit: 12
  reasoning: 12
  savvy: 14
  flair: 8
loot:
  currency:
    min: 5
    max: 30
  items:
    - item: bike_chain
      chance: 0.4
      min_qty: 1
      max_qty: 1
    - item: medkit
      chance: 0.15
      min_qty: 1
      max_qty: 1
taunts:
  - "On your left. Permanently."
  - "I move faster than you think and hit harder than you expect."
  - "Every delivery I've made was through someone who tried to stop me."
  - "You're in my lane."
  - "This chain's been around more necks than handlebars."
  - "Try to catch me. I dare you."
  - "The roads are mine. Foot traffic gets out of the way."
  - "I've been weaving through rubble for years. You're just another obstacle."
  - "Lycra doesn't mean soft. Ask the last guy who laughed."
  - "Speed and surprise. That's all I need."
  - "Got a delivery to make and you're making me late. Big mistake."
  - "Nobody catches a courier who doesn't want to be caught."
  - "The messenger bag? Full of sharp things. Take a guess."
  - "I know every shortcut in this city. You'll never corner me."
  - "Caught my wheel on a raider's jaw once. Kept going."
  - "You're going to feel this for a week."
  - "I've been hit by cars. You're less sturdy than a car."
  - "The roads belong to people who can use them. Get off."
  - "Fixie, chain, and spite. What do you have?"
  - "Don't stand in the intersection looking confused. It never ends well."
  - "I don't stop for red lights or people who get in my way."
  - "Last sprint. You're the finish line."
  - "Wind in my face, blood on the asphalt — just another run."
  - "Back in the day I raced. Now I fight. Same thing, really."
  - "You'll hear me coming before you see me. Then it'll be too late."
  - "I've ridden through gunfire. Your fists don't scare me."
