id: intel_guard
name: Intel Guard
description: A professional guard in corporate tactical gear, protecting the tech campus perimeter with lethal efficiency.
level: 3
max_hp: 34
ac: 16
awareness: 8
ai_domain: ganger_combat
respawn_delay: "5m"
abilities:
  brutality: 14
  quickness: 15
  grit: 15
  reasoning: 10
  savvy: 12
  flair: 9
loot:
  currency:
    min: 25
    max: 100
  items:
    - item: circuit_board
      chance: 0.35
      min_qty: 1
      max_qty: 1
    - item: medkit
      chance: 0.2
      min_qty: 1
      max_qty: 1
weapon:
  - id: corp_security_smg
    weight: 3
  - id: combat_knife
    weight: 2
armor:
  - id: tactical_vest
    weight: 2
  - id: kevlar_vest
    weight: 3
taunts:
  - "Campus is classified. So is the method I'm about to use on you."
  - "Corporate security protocols are still in effect. You're in violation."
  - "This gear isn't from a surplus store. Neither is my training."
  - "Perimeter alarm tripped 40 seconds ago. I've been ready since then."
  - "The tech here is irreplaceable. My job is irreplaceable. You are not."
  - "Professional security doesn't bluff. Threat level: lethal."
  - "Intel campus doesn't host unauthorized visitors. You're about to be escorted out."
  - "I was corporate security before the collapse. I'm still corporate security."
  - "Efficiency is the corporate value that applies to threat removal."
  - "SMG says I don't need to get close. But I don't mind close."
  - "Badge or blade. You have one. I have the other."
  - "The equipment in there survived the collapse intact. You won't survive this intact."
  - "Lethal efficiency. That's the job description. Currently active."
  - "Three entry points. All covered. You found the one that found me first."
  - "I've had more tactical training than most militia members. Use that information."
  - "This campus is a node in something bigger. I protect the node."
  - "Professional doesn't mean merciful. Clear the perimeter."
  - "Circuit boards don't come cheap anymore. Neither does the cost of trespassing."
  - "My response time is very good. You'll experience that."
  - "The old company might be gone but its security assets are still very much operational."
  - "I've cleared this campus fourteen times. Fifteen is fine too."
  - "Cool under pressure is not a brag — it's a threat."
  - "Don't mistake professional restraint for hesitation."
  - "Intel campus security: where the training never stopped even when everything else did."
  - "The buildings contain things worth killing for. I'm the reason that doesn't work out for trespassers."
  - "You picked the wrong campus to approach from the wrong direction."
