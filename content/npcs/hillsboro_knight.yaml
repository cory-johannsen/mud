taunts:
  - "In the name of the Kingdom of Hillsboro, you are commanded to stand down."
  - "This sigil means something. It means you're about to have a very bad day."
  - "Server rack armor was my idea. It's a good one."
  - "A knight of the Kingdom does not yield. Especially not to you."
  - "You stand before the Kingdom's blade. Reconsider your position."
  - "I have sworn oaths that make this fight inevitable if you don't retreat."
  - "The halberd is homemade. The edge is very real."
  - "Hillsboro endures because its knights endure. I will endure."
  - "You've challenged a Kingdom soldier on Kingdom ground. This ends one way."
  - "Size and the sigil — I have both. What do you have?"
  - "The Kingdom's honor is mine to defend. I defend it."
  - "I've trained in full armor since before the Kingdom had a proper name."
  - "Every dent in this plating is a story. You'll be a dent."
  - "There is no parley with trespassers on Kingdom land."
  - "The old world's steel was better. This will still do."
  - "I am not a soldier for hire. I believe in what I protect."
  - "Towering, armored, and sworn. You picked the wrong opponent."
  - "The Kingdom does not retreat. Neither do its knights."
  - "My tabard has never been dishonored. Today's not the day it starts."
  - "A knight without conviction is just a person in heavy clothing. I have conviction."
  - "Stand aside or be moved aside with considerably more force."
  - "I've fought in this armor so long it feels like skin. Better skin."
  - "The Kingdom was built on defense. I am built on defense."
  - "You'll find that server rack plating is harder than it looks."
  - "Face the knight or face the consequence of turning your back on the knight."
  - "This halberd reaches further than you think."
