taunts:
  - "Jantzen Beach belongs to the pirates now. You're on our shore."
  - "The Columbia runs red when we want it to."
  - "Cutlass or boat hook — pick which one you'd prefer I use."
  - "We've raided both shores. You're just the most recent target."
  - "The mall's been picked clean. Everything left goes to the pirates."
  - "Rain slicker and a bad attitude — welcome to Jantzen Beach."
  - "I've taken cargo off boats bigger than your whole plan."
  - "The river's ours. This beach is ours. You're trespassing twice."
  - "Quick on my feet even in waders. You'll see."
  - "Every ship that passed the beach paid a toll. You're paying it on land."
  - "Nobody sails or swims through here without our blessing."
  - "I've boarded vessels in chop and fog. Your approach is easier to handle."
  - "The pirate life is simple: take, keep, defend. I'm currently defending."
  - "Plunder's in my blood. So is the skill to protect it."
  - "This machete's cut through rope, cargo nets, and people. Not in that order."
  - "You shouldn't have docked here. The beach fee is steep."
  - "I've fished worse things than you out of the Columbia."
  - "Even the seagulls know not to cross Jantzen Beach pirates."
  - "Bring that weapon one step closer and find out how fast a pirate moves."
  - "The old water park's our fortress now. You just walked into the moat."
  - "Rain in my eyes doesn't affect my swing. Nothing does."
  - "Every piece of salvage on this beach is ours by right of first contact."
  - "We've held this riverfront through three raids from the Portland side."
  - "Ahoy is a greeting. This is not a greeting."
  - "Crossing the Columbia without tribute means crossing me."
  - "The dock hook's got more range than you expect. Good hook."
