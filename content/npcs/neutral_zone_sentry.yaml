id: neutral_zone_sentry
name: Neutral Zone Sentry
description: A stern-faced sentry in mismatched armor, sworn to enforce the peace of the neutral zone.
level: 18
max_hp: 140
ac: 17
awareness: 9
ai_domain: ganger_combat
respawn_delay: "5m"
