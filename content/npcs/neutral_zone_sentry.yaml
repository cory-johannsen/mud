taunts:
  - "Neutral zone means nobody brings their war here. You're bringing your war here."
  - "The peace of this zone is my responsibility. You're threatening it."
  - "I've held the line between factions for two years. You're not a faction. You're just a problem."
  - "Weapons down. This is a neutral zone, not a combat zone."
  - "I swore to enforce the peace. Enforcement starts now."
  - "Every faction agreed to the neutral zone rules. You're violating them."
  - "Sentry duty in the neutral zone means nobody passes without my okay. You don't have my okay."
  - "I've turned back gangs, militias, and everything in between. You're easier."
  - "Mismatched armor, sworn purpose, total commitment. That's the neutral zone sentry."
  - "The peace here cost blood to establish. I won't let you waste it."
  - "Put it away or I put you away."
  - "This whistle calls every agreement-bound faction in the zone. Don't make me use it."
  - "You think neutral means undefended. That's the mistake everyone makes."
  - "Back across the boundary line. Final warning."
  - "The zone stands because its sentinels stand. I stand."
  - "Factions fear each other. They all respect this zone. They respect it because of me."
  - "One wrong move and the neutral zone becomes a crime scene."
  - "I've got the authority of every faction's treaty on my side. That's a lot of authority."
  - "My armor's from six different sources. My conviction is from one."
  - "Violating the neutral zone is the fastest way to make all sides your enemy."
  - "Stern face, fast reflexes, and no patience for disruption."
  - "The zone exists for a reason. Don't be the reason it stops existing."
  - "You're standing in the most protected square kilometer in the metro. Act like it."
  - "Step back. Weapons down. Walk away. Easy choices."
  - "I enforce the peace so others don't have to. Don't give them a reason."
  - "The neutral zone's lasted three years. It'll outlast this conversation."
