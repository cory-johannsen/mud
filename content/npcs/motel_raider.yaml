id: motel_raider
name: Motel Raider
description: A violent squatter who claims motel rooms by force. His eyes are wild and his knuckles are scarred.
level: 2
max_hp: 26
ac: 15
rob_multiplier: 1.0
awareness: 6
ai_domain: motel_raider_combat
respawn_delay: "5m"
abilities:
  brutality: 15
  quickness: 14
  grit: 13
  reasoning: 9
  savvy: 9
  flair: 8
loot:
  currency:
    min: 15
    max: 60
  items:
    - item: motel_key
      chance: 0.3
      min_qty: 1
      max_qty: 2
    - item: cheap_blade
      chance: 0.15
      min_qty: 1
      max_qty: 1
    - item: medkit
      chance: 0.1
      min_qty: 1
      max_qty: 1
weapon:
  - id: rebar_club
    weight: 2
  - id: cheap_blade
    weight: 2
