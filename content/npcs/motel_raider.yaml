taunts:
  - "Room's taken. So is everything in it."
  - "I claimed this motel in the first month. It's been mine since."
  - "Wild eyes? Yeah. That's what living here does to you. Good."
  - "Knock on the wrong door and you meet the wrong resident."
  - "Every room in this motel is occupied — by me and my patience for violence."
  - "The keys I carry open everything. Including people."
  - "I've held every floor of this building through raid attempts."
  - "Scarred knuckles mean I've been doing this a long time and I'm still here."
  - "You want a room? I'll give you a room. A very short stay."
  - "Check-in requires blood. You've got some. Pay up."
  - "The sawn-off is for guests who don't respect check-out time."
  - "I sleep light and hit hard. Two useful qualities."
  - "This motel was a dump before the collapse. Now it's my dump."
  - "You came here looking for shelter. You found something else."
  - "Every corner of every room is mine. Including whatever corner you back into."
  - "I've broken into rooms to take back what I claimed. Yours doesn't look hard."
  - "The vacancy sign's been off since I took over. Take the hint."
  - "Wild and mean — that's how the motel made me."
  - "Last guest who checked in without my permission checked out permanently."
  - "I've held this place against bigger groups than you."
  - "The rebar by the door isn't decorative."
  - "You walked past three warning signs to get here. That's on you."
  - "Motel raider sounds like a joke until you're on the wrong side of the blade."
  - "I've been squatting this territory longer than most people have been surviving."
  - "The room number doesn't matter. The result is the same."
  - "Feral motel energy — unpredictable, territorial, and not in a good mood."
