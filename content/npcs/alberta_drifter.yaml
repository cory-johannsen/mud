id: alberta_drifter
name: Alberta Street Drifter
description: A wiry figure wrapped in layers of mismatched clothing, eyes constantly scanning for opportunity or threat. Survivor written in every line of their face.
level: 2
max_hp: 24
ac: 14
rob_multiplier: 1.0
awareness: 9
ai_domain: alberta_drifter_combat
respawn_delay: "5m"
abilities:
  brutality: 12
  quickness: 14
  grit: 14
  reasoning: 10
  savvy: 15
  flair: 9
loot:
  currency:
    min: 10
    max: 60
  items:
    - item: scrap_metal
      chance: 0.5
      min_qty: 1
      max_qty: 3
    - item: medkit
      chance: 0.2
      min_qty: 1
      max_qty: 1
taunts:
  - "Alberta Street belonged to artists once. Now it belongs to survivors. Guess which one I am."
  - "I've drifted far enough to know exactly how to hurt someone."
  - "Every scar on my hands tells a story. You're about to be a chapter."
  - "Drifters don't have anything to lose. That makes us dangerous."
  - "I've slept in worse places than a ditch with your body for company."
  - "You think you can read me? You can't. I've been unreadable since the collapse."
  - "Move along or get moved along."
  - "I've been chased, shot at, starved, and frozen. You're not even close to my worst day."
  - "This street's seen better. So have I. Neither of us is going back."
  - "Don't let the coat fool you. I know how to use everything in these pockets."
  - "Quick and dirty or slow and painful — your choice."
  - "I travel light. You're slowing me down."
  - "I don't fight for territory. I fight for principle. Right now the principle is you need to leave."
  - "Seen a lot of Portland burn. You're not going to be the one who takes me down."
  - "Drifters don't have friends. We have insurance policies."
  - "Alberta used to have murals. Now it has me. Take the hint."
  - "I've outrun Patrol, gangs, and dogs. You're none of those things."
  - "You picked the wrong drifter to follow."
  - "I keep moving because staying alive means staying unpredictable."
  - "You've got something I want or you're standing somewhere I need to be."
  - "Go. Find a different route. This one ends badly for you."
  - "I've been surviving since before most people stopped trying."
  - "Don't mistake threadbare for harmless."
  - "Last time someone thought I was easy pickings, I walked away with their boots."
  - "One more step and we're past talking."
  - "The street's long. You don't have to die on this part of it."
  - "I've been watching you since you turned the corner. You're not as sneaky as you think."
