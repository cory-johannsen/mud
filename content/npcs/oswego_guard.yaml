taunts:
  - "Lake Oswego hasn't fallen to the kind of person you are. It won't today."
  - "Pressed khakis and body armor — read that combination correctly."
  - "This community has standards. You are below them."
  - "Efficiency is a Lake Oswego tradition. I'm being very efficient right now."
  - "Guards here earn their salary. Watch what that means."
  - "You're not cleared for this district. You're barely cleared for that block."
  - "Lake Oswego maintains order. I maintain Lake Oswego."
  - "The people here paid to be protected. I deliver on that promise."
  - "Practiced patrol means I know when something's wrong. Something's wrong."
  - "Step back past the perimeter before I step you past it."
  - "We've kept this community running while Portland burned. Respect that."
  - "I've been uniform since day one. Discipline doesn't end with civilization."
  - "Oswego guards earn their reputation differently than gangs. But the result's the same."
  - "Your presence here is unauthorized. So is the continued existence of your current posture."
  - "The cufflinks in my pocket are a reminder of what this community is protecting."
  - "You want to enter Lake Oswego? You want to leave it walking?"
  - "Professional protection means I know exactly how many ways to stop you."
  - "Community security is not a hobby. It's a calling."
  - "The lake's behind me. The people I protect are behind the lake."
  - "I don't threaten — I notify. Consider yourself notified."
  - "Uniform says I'm serious. Body armor says I'm prepared. Both are accurate."
  - "Osvego stands because we defend it. This is part of the defense."
  - "No unauthorized entry, no unauthorized weapons, no unauthorized you."
  - "I've patrolled this zone every day for two years. Today's no exception."
  - "Back away and we can all pretend this was a misunderstanding."
  - "Don't mistake civility for weakness. We are civil and we are not weak."
