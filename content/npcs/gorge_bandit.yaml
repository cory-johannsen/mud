taunts:
  - "The gorge takes everything. I just take first."
  - "You picked a bad junction to slow down at."
  - "I know every ambush point from here to Hood River. This is one of them."
  - "Travelers through the gorge pay a tax. I'm the tax collector."
  - "Wind-scoured and mean — that's what this place makes you."
  - "Every road through here is mine. Every traveler owes me."
  - "You can't outrun me in the gorge. I know every shortcut."
  - "The bridges are chokepoints. You're in a chokepoint."
  - "I've stripped richer travelers than you. They all look the same afterwards."
  - "The gorge wind covers the sound. Nobody will hear."
  - "Drop the pack and we don't have to make this ugly."
  - "I've been living off the road tax since year one. I'm very good at collecting."
  - "The river below, the cliffs above, and me in front. No good options."
  - "Wiry? Yeah. Fast? You'll see."
  - "Junction toll. Pay up or get knocked down."
  - "I've got five other locations like this. You found my favorite."
  - "The moss here grows over everything eventually. Including you."
  - "Nobody stops at this junction unless I stop them."
  - "Wind and patience — I've got both. You've got a pack full of things I want."
  - "This blade has cut through better weather gear than yours."
  - "Road tax in the gorge isn't optional. Never was."
  - "You're moving slow. That was your first mistake."
  - "Three exits from this junction. I'm blocking two."
  - "The old I-84 gave up plenty. So will you."
  - "Ambush isn't the right word. I prefer 'strategic revenue collection.'"
  - "The gorge has been thinning the weak since it was carved. I continue the tradition."
