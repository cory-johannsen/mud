id: ellie_mack
name: Ellie Mack
npc_type: merchant
description: >
  Sergeant Mack's younger sister and former army quartermaster. Where her
  brother stocks the guns, Ellie keeps everyone alive long enough to use them.
  She repairs and resells salvaged armor out of a reinforced storage locker at
  the back of the lodge, and has a reputation for knowing exactly which piece
  of kit will stop exactly which caliber of round.
