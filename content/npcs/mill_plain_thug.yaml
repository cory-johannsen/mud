taunts:
  - "Mill Plain's got a million ways to make you disappear."
  - "Looking for easy marks and found one. That's you."
  - "Rain-soaked and mean — that's the Mill Plain way."
  - "You think this is just a hoodie? That's already your mistake."
  - "Hand it over before I make this embarrassing for both of us."
  - "Easy mark? You're the easiest I've seen today."
  - "This street's full of people like me. I'm the one you found."
  - "The knuckles are up close. The blade's for when you back away."
  - "I've taken from smarter and faster than you."
  - "Mill Plain doesn't do mercy. Learned that the hard way myself."
  - "Rain doesn't slow me down. Nothing does."
  - "You're in the wrong stretch of road, friend."
  - "Gold club, blade, or knuckles — all three have been used on people today."
  - "I don't fight for territory. I fight for whatever you're carrying."
  - "The hoodie hides the bruises. The other person's bruises are unrelated."
  - "Vancouver's dangerous. Mill Plain is where danger lives."
  - "Slow enough to rob, fast enough to run. That's the thug skill set."
  - "You looked like an easy job. Still might be. We'll see."
  - "I've done this ten times today. Practice makes perfect."
  - "Wet streets and desperate people — I am both."
  - "Drop it quick and I'll only take the good stuff."
  - "You've got the look of someone who hasn't been properly robbed yet."
  - "Mill Plain thugs have a reputation for a reason."
  - "This block belongs to people who take what they need. I take what I need."
  - "The rain's in your eyes. I don't have that problem right now."
  - "If you had better gear you'd have taken a different route."
