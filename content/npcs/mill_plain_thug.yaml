id: mill_plain_thug
name: Mill Plain Thug
description: A street tough in a rain-stained hoodie, looking for easy marks along Mill Plain.
level: 1
max_hp: 18
ac: 13
rob_multiplier: 1.0
awareness: 5
ai_domain: mill_plain_thug_combat
respawn_delay: "5m"
abilities:
  brutality: 14
  quickness: 12
  grit: 14
  reasoning: 8
  savvy: 10
  flair: 8
loot:
  currency:
    min: 5
    max: 40
  items:
    - item: scrap_metal
      chance: 0.5
      min_qty: 1
      max_qty: 3
    - item: medkit
      chance: 0.1
      min_qty: 1
      max_qty: 1
weapon:
  - id: spiked_knuckles
    weight: 3
  - id: cheap_blade
