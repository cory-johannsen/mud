id: terminal_squatter
name: Terminal Squatter
description: A gaunt figure huddled in a sleeping bag between rows of airport seats, surviving on whatever the terminal provides.
level: 1
max_hp: 16
ac: 13
rob_multiplier: 1.0
awareness: 7
ai_domain: terminal_squatter_combat
respawn_delay: "5m"
abilities:
  brutality: 10
  quickness: 12
  grit: 14
  reasoning: 10
  savvy: 12
  flair: 10
loot:
  currency:
    min: 3
    max: 25
  items:
    - item: scrap_metal
      chance: 0.5
      min_qty: 1
      max_qty: 2
    - item: airline_meal
      chance: 0.25
      min_qty: 1
      max_qty: 1
taunts:
  - "This terminal's been my home for two years. You're not welcome in my home."
  - "I sleep on the old airport seats. They're more comfortable than they look. You won't get to check."
  - "Gaunt means hungry. Hungry means motivated. Motivated means dangerous."
  - "The boarding gate is mine. The whole terminal is mine."
  - "Airline meals don't taste great but they last forever. So does my tenancy here."
  - "I've survived in this terminal through four winters. You're a summer problem."
  - "The arrivals board stopped updating. I never stopped defending my space."
  - "Don't walk through a squatter's terminal like you own it."
  - "I know every chair, every column, every exit. You know none of them."
  - "Terminal squatter sounds sad. It means I've outlasted everyone who tried to move me."
  - "The sleeping bag rolls up fast when I need to move. I need to move."
  - "Scrap metal from the gift shops and airline meals from the galley. I eat fine."
  - "You think an airport terminal is abandoned. It isn't."
  - "I've held this gate against three different groups. None of them got through."
  - "The terminal provides everything I need. Including the right to defend it."
  - "Security checkpoints don't work anymore. I'm the checkpoint now."
  - "Dead departure board, empty gates, full attitude. Welcome to my terminal."
  - "I've made furniture out of luggage carts. I've made weapons out of the rest."
  - "Don't wake the squatter up angry. I was already awake. And already angry."
  - "This concourse belongs to the people who stayed when everyone else ran."
  - "Every row of seats in this building has a story. You're about to be one."
  - "Grit's my best quality. Two years of terminal living will do that."
  - "The last announcement that played here was three years ago. The last fight here was yesterday."
  - "I've got nothing worth taking but I've got plenty worth defending."
  - "This used to be Gate C. Now it's mine."
  - "You don't wander into a squatter's terminal uninvited. You especially don't wander into mine."
