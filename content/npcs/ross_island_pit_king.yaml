id: ross_island_pit_king
name: The Pit King
description: >
  The supreme authority of Ross Island's gravel operation, who rules from
  the center of the pit in a cluster of armored prefab buildings. Larger
  and meaner than any of his workers, the Pit King enforces productivity
  through terror and tribute, collecting a cut of every load hauled up
  the switchback road. His great-coat is stained with gravel dust and
  the evidence of past confrontations.
