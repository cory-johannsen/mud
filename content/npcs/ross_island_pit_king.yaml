taunts:
  - "The island is mine. Everything you see was won in blood."
  - "I've put down four challengers in this pit. The gravel ate them all."
  - "You want the king? You found him. Now pay the price."
  - "This operation runs because I break anyone who threatens it. Starting with you."
  - "The gravel pit is my throne. You've just walked into the throne room."
  - "Bridge tolls, pit tribute, river trade — all mine. Including your fate."
  - "Nobody crosses this pit without my permission. You just did."
