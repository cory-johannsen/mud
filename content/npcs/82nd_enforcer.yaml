taunts:
  - "82nd doesn't belong to you. Never did."
  - "I've been collecting on this stretch since before you knew Portland existed."
  - "You don't have enough blood to pay what you owe."
  - "Nobody crosses my avenue without my say-so."
  - "I've flattened bigger people with one arm."
  - "You're not the first fool to try me on this block. You're just the latest."
  - "Pain is a language I speak fluently. Let me translate."
  - "The overpass? Past me. You won't make it past me."
  - "Walk away now and I'll let you keep your kneecaps."
  - "You picked the wrong street, wrong block, wrong day."
  - "I was built for this. What were you built for?"
  - "I've cracked skulls on every corner from Powell to Division."
  - "Tribute or teeth. Your call."
  - "Nobody's coming to help you. This is 82nd."
  - "Last guy who tried that is still eating through a straw."
  - "Hit harder. I need to feel something."
  - "The whole avenue is watching. Make a good show of it."
  - "I don't break. I just break other people."
  - "You're breathing my air. That's already an offense."
  - "Step one more inch and you won't step anywhere again."
  - "I've outlasted gangs, floods, and the Patrol. You're nothing."
  - "They call me an enforcer. You're about to see why."
  - "Drop everything or I drop you."
  - "You're wasting my time. And now I'm angry about it."
  - "I collect more than money. I collect pain."
  - "You've got brave eyes. Too bad the rest of you can't back them up."
  - "That's a nice jaw. I'm about to rearrange it."
  - "The road tax on 82nd is blood. Pay up."
