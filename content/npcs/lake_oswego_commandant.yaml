id: lake_oswego_commandant
name: Commandant Prescott
description: >
  A silver-haired martinet in pressed tactical gear who commands Lake Oswego
  Nation's military forces from Iron Mountain Overlook. Prescott earned
  his position by executing three previous commandants for incompetence.
  He runs sniper qualification from the bunker's firing positions and
  personally reviews every property violation that earns an armed response.
level: 60
max_hp: 2430
ac: 27
rob_multiplier: 2.0
tier: boss
awareness: 11
ai_domain: lake_oswego_commandant_combat
respawn_delay: "10m"
