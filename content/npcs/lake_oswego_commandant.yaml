taunts:
  - "You've crossed into Lake Oswego Nation without authorization. That's a capital offense."
  - "Iron Mountain exists to prevent exactly this kind of incursion. I exist to enforce that."
  - "Property value is meaningless without the force to defend it. I am that force."
  - "My snipers have overwatch on every approach. You made it this far by luck. Luck ends here."
  - "The enclave's survival depends on absolute response to threats. You are a threat."
  - "I've repelled three organized assaults on this position. You are not organized."
  - "Excellence in defense. That's what separates Lake Oswego from the wasteland."
