taunts:
  - "The ammo depot is Vantucky's beating heart. I am its guardian."
  - "I was prepping for exactly this situation long before it happened."
  - "Free territory means free to defend itself. That's my job."
  - "The militia is the only law worth having out here. Compound law."
  - "You think you can walk into my depot? I've got rounds counted to the shell."
  - "Everyone in Vantucky either works with me or works against me. Pick one."
  - "Colonel Hardcase earned that rank the hard way. Today you'll see how."
