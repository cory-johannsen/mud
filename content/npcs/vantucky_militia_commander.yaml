id: vantucky_militia_commander
name: Colonel Hardcase
description: >
  A barrel-chested ex-prepper who turned his survivalist obsession into a
  paramilitary empire. Hardcase controls the Vantucky ammo depot with
  military precision and distributes weapons as currency, power, and leverage.
  He drills his compound guards daily and views anyone outside the militia
  as a potential enemy. The ammo depot is his inner sanctum, and he defends
  it with everything he has.
level: 25
max_hp: 645
tier: boss
ac: 24
rob_multiplier: 2.0
boss_abilities:
  - id: militia_rally
    name: "Militia Rally"
    trigger: round_start
    trigger_value: 0
    cooldown: "3m"
    effect:
      aoe_condition: frightened
  - id: highway_barrage
    name: "Highway Barrage"
    trigger: hp_pct_below
    trigger_value: 75
    cooldown: "4m"
    effect:
      aoe_damage_expr: "4d8"
  - id: commanders_endurance
    name: "Commander's Endurance"
    trigger: hp_pct_below
    trigger_value: 50
    cooldown: "5m"
    effect:
      heal_pct: 25
awareness: 10
