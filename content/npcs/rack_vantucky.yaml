id: rack_vantucky
name: "The Rack"
npc_type: merchant
description: >
  A lean woman in her thirties who runs the armor wall of the neutral pawn shop.
  Pegboard lines the whole left side — helmets, vests, gloves, boots, every piece
  tagged with condition and price. She knows every dent. She'll sell you what
  stops bullets, not what looks good.
