id: sauvie_survivalist
name: Island Survivalist
description: A lean, weathered loner armed with a hunting rifle and too many opinions about who belongs on the island.
level: 2
max_hp: 24
ac: 14
awareness: 9
ai_domain: ganger_combat
respawn_delay: "5m"
abilities:
  brutality: 12
  quickness: 13
  grit: 15
  reasoning: 11
  savvy: 13
  flair: 8
loot:
  currency:
    min: 15
    max: 60
  items:
    - item: field_rations
      chance: 0.4
      min_qty: 1
      max_qty: 2
    - item: scrap_metal
      chance: 0.25
      min_qty: 1
      max_qty: 1
    - item: medkit
      chance: 0.1
      min_qty: 1
      max_qty: 1
weapon:
  - id: hunting_rifle
    weight: 3
  - id: combat_knife
    weight: 2
armor:
  - id: leather_jacket
    weight: 3
  - id: padded_armor
    weight: 2
taunts:
  - "The island doesn't need you. And neither do I."
  - "I've got opinions about who belongs on Sauvie Island. You don't."
  - "Long winter out here teaches patience and distance shooting. Both apply."
  - "The ferry brings trouble sometimes. You're this week's trouble."
  - "I've lived alone here by design. Intruders interrupt the design."
  - "Get off the island. I'll help you off if you need it."
  - "Self-reliance means I handle every problem myself. You're a problem."
  - "I've weathered two floods and three gang incursions. You're lower stakes."
  - "The hunting rifle has a long effective range. So does my patience — but it's ended."
  - "Too many opinions and all of them say you leave."
  - "Island life means I'm the only law here. Read that law carefully."
  - "I know every corner of this island. You know none of it."
  - "Sauvie's mine. The whole thing. I've walked every inch."
  - "You came looking for resources. You found a person who has none to spare."
  - "The weather out here builds character. Come back when you have some."
  - "Lean, weathered, and armed — that's three reasons to reconsider."
  - "I don't want company. I especially don't want your company."
  - "The last group who came through uninvited left fewer than they arrived."
  - "This island survived the collapse quiet and isolated. You're breaking the isolation."
  - "Survivalist means I've planned for exactly this situation."
  - "Range is my friend. Distance is my defense. You're inside both."
  - "I left Portland to get away from people. You brought people with you."
  - "The island feeds me and I protect it. Including from you."
  - "I've been alone long enough to be very good at staying that way."
  - "Don't push me. I've been pushed by bigger things and pushed back harder."
  - "You made a mistake crossing onto this island. I'll help you understand that."
