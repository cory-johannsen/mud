id: pdx_high_steward
name: High Steward Manifest
description: >
  The self-appointed spiritual and military commander of the PDX cargo cult
  wears a salvaged pilot's uniform layered with boarding passes, luggage
  tags, and sacred manifests. Manifest claims divine authority granted by
  the sky gods and backs it up with a brutal talent for violence. He sits
  atop the control tower, interpreting cargo law and sending his cultists
  to enforce it across the tarmac.
level: 7
max_hp: 80
ac: 18
rob_multiplier: 2.0
awareness: 10
ai_domain: pdx_high_steward_combat
respawn_delay: "10m"
