    weight: 2
taunts:
  - "The sky gods have revealed your fate in the sacred manifest. It is not good."
  - "I am the voice of the cargo law. Cargo law is absolute."
  - "The control tower sees all approaches. We saw you coming hours ago."
  - "Every plane on this tarmac is a temple. You have desecrated sacred ground."
  - "The manifest shows no authorized entry for you. You will be processed and removed."
  - "The sky gods demand sacrifice from those who disrupt the sacred order."
  - "I have guided this cult from chaos to doctrine. You cannot undo that with violence."
