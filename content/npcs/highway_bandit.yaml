taunts:
  - "End of the road. For you."
  - "Everybody pays a toll on this highway now."
  - "I've been crouching by this road since sunrise. You're the first interesting thing."
  - "Nothing moves on this stretch without paying the bandit's price."
  - "Ambush works better when you act surprised. Try to act surprised."
  - "Drop the pack and maybe you keep the rest."
  - "I've done this a hundred times. You haven't."
  - "The highway's mine from the overpass to the interchange."
  - "Fast hands and faster reflexes — that's what the road teaches."
  - "Lean and mean is how you survive out here. I've survived a long time."
  - "You were easy to track. Most people are."
  - "There's no Patrol out here. No witnesses either."
  - "I've jumped bigger caravans than you with less backup."
  - "This blade's seen more road trips than you."
  - "The highway doesn't belong to anyone anymore — except the people who take it by force. That's me."
  - "Resistance means I get more determined. Think about that."
  - "I didn't pick this spot by accident. Every angle is covered."
  - "You're slower than you think and I'm faster."
  - "Every traveler pays or every traveler bleeds. Those are the options."
  - "Last caravan through here left me well-stocked. You'll restock me again."
  - "I've been jumped before. I don't get jumped anymore."
  - "That sawn-off has cleared this road before. It'll clear it again."
  - "You're on my stretch. My stretch, my rules."
  - "The lean ones hit harder. File that away."
  - "Nobody's coming for you out here. You know that, right?"
  - "Survival isn't polite. Neither am I."
