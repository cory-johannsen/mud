taunts:
  - "Sullivan's Gulch is mine. The freight cars, the sidings, all of it."
  - "Nobody moves through the gulch without knowing we're watching."
  - "Rail corridor territory doesn't have borders — it has consequences."
  - "I've been living in these freight cars since the first year. I know every shadow."
  - "You followed the wrong tracks in here."
  - "The gulch swallows people. I've helped it do that more than once."
  - "Freight car to freight car — you'll never catch me in this maze."
  - "The campfire smoke you smelled? That was the warning."
  - "Gulch raiders don't fight clean. We fight effective."
  - "I was born in these ruins. You're just visiting badly."
  - "This switching yard is our fortress. Learn that before you bleed."
  - "The sound of metal on metal you heard? That was us moving into position."
  - "Four years in the gulch and I've never lost a challenge on my home ground."
  - "You stepped over the rail into our camp. That's the last polite decision you make."
