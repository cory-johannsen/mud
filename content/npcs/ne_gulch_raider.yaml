id: ne_gulch_raider
name: Gulch Raider
description: A hardened squatter who has claimed the old Sullivan's Gulch rail corridor as home. Moves between rusted freight cars with ease, striking from shadow and retreating into the maze of wrecked rolling stock.
level: 10
max_hp: 70
ac: 16
awareness: 10
