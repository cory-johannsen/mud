id: hillsboro_knight_commander_takedown
title: Knight-Commander Takedown
description: >
  Knight-Commander Valdris controls Hillsboro's military arsenal and
  personally oversees the brutal conscription of serfs into the knight
  order. Without her leadership, the Kingdom's military machine loses
  its edge. The armory hall is the heart of Hillsboro's capacity for
  organized violence.
