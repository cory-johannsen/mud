id: felony_flats_captain_takedown
title: The Captain Takedown
description: >
  The Captain runs Felony Flats' most brutal protection racket from
  the Enforcer Den, collecting tribute from every motel, crack house,
  and strip mall in the district. Taking him down would break the
  enforcer hierarchy and give the Flats' residents a chance to breathe
  without paying for the privilege.
