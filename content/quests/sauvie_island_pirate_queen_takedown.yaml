id: sauvie_island_pirate_queen_takedown
title: Pirate Queen Takedown
description: >
  Captain Red Moira's river pirates have strangled Sauvie Island's trade
  routes, seizing cargo and demanding tribute from the farming collective.
  The island's food production suffers under her tax, and her river dock
  has become a fortified stronghold. Taking her down would free the
  channel and restore legitimate commerce.
