id: aloha_smuggler_king_takedown
title: Smuggler King Takedown
description: >
  The Smuggler King has been manipulating the Aloha Neutral Zone from the
  shadows for years, controlling black market trade and corrupting the sentry
  councils. The zone's uneasy peace depends on cutting off his operation
  at the source — in the scrap yard where he holds court.
