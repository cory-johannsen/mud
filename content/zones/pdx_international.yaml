zone:
  id: pdx_international
  danger_level: sketchy
  min_level: 5
  max_level: 15
  world_x: 2
  world_y: -3
  script_dir: content/scripts/zones/pdx_international
  name: PDX International
  description: The ruins of Portland International Airport, where cargo cultists worship the grounded planes and tarmac raiders
    fight over salvage from the hangars.
  start_room: pdx_terminal_b
  rooms:
  - id: pdx_airport_way_west
    title: Airport Way West
    description: 'The cracked expanse of Airport Way stretches east toward the looming

      silhouette of PDX International. Abandoned cars rust in the median,

      their doors flung open by long-gone refugees. To the west, the

      overpass connects back toward the I-205 corridor and NE Portland.

      '
    danger_level: safe
    exits:
    - direction: west
      target: ne_i205_onramp
      zone: ne_portland
    - direction: east
      target: pdx_airport_way_east
    - direction: south
      target: pdx_terminal_b
    map_x: 0
    map_y: 0
    spawns:
    - template: airport_scavenger
      count: 1
      respawn_after: 5m
    equipment:
    - item_id: zone_map
      max_count: 1
      respawn_after: 0s
      immovable: true
      script: zone_map_use
      description: Zone Map
    properties:
      lighting: overcast
      atmosphere: wind
  - id: pdx_airport_way_east
    title: Airport Way East
    description: 'Airport Way continues eastward past collapsed sound barriers and

      overgrown retention ponds. The terminal buildings rise ahead,

      their glass facades shattered and dark. A faded sign overhead

      reads "Departures" with an arrow pointing into oblivion.

      '
    danger_level: sketchy
    exits:
    - direction: west
      target: pdx_airport_way_west
    - direction: east
      target: pdx_terminal_entrance
    - direction: south
      target: pdx_parking_garage
    map_x: 2
    map_y: 0
    spawns:
    - template: airport_scavenger
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: desolate
  - id: pdx_i84_east
    title: I-84 Eastbound On-Ramp
    description: 'The elevated on-ramp curls upward toward the skeletal remains of

      Interstate 84 heading east. Concrete barriers are scarred with

      old bullet impacts. From here you can see the airport sprawl to

      the south and the Columbia River glinting in the distance to the north.

      '
    danger_level: sketchy
    exits:
    - direction: east
      target: trout_i84_west_junction
      zone: troutdale
    - direction: south
      target: pdx_cargo_terminal
    map_x: 10
    map_y: 0
    spawns:
    - template: tarmac_raider
      count: 1
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: wind
  - id: pdx_terminal_entrance
    title: Terminal Entrance
    description: 'The main entrance to PDX International gapes open, its automatic

      doors long since jammed. Shattered glass crunches underfoot.

      Faded welcome signs in a dozen languages hang askew from the

      ceiling. The air smells of mildew and old carpet.

      '
    danger_level: sketchy
    exits:
    - direction: west
      target: pdx_airport_way_east
    - direction: north
      target: pdx_ticketing_hall
    - direction: south
      target: pdx_max_station
    map_x: 4
    map_y: 0
    spawns:
    - template: terminal_squatter
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: musty
  - id: pdx_ticketing_hall
    title: Ticketing Hall
    description: 'A massive open hall stretches before you, its vaulted timber ceiling

      still remarkably intact. Abandoned check-in kiosks stand in long

      rows like headstones. Squatters have strung tarps between the

      counters, creating a makeshift shantytown beneath the departures board

      that still reads "DELAYED" for every flight.

      '
    danger_level: sketchy
    exits:
    - direction: south
      target: pdx_terminal_entrance
    - direction: north
      target: pdx_the_carpet
    - direction: east
      target: pdx_baggage_claim
    map_x: 4
    map_y: -2
    spawns:
    - template: terminal_squatter
      count: 2
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: smoke
  - id: pdx_the_carpet
    title: The Carpet
    danger_level: sketchy
    description: 'The famous PDX carpet spreads beneath your feet, its teal geometric

      pattern faded but unmistakable. The cargo cultists have turned this

      section into a shrine. Candles flicker in concentric circles around

      a central altar made from stacked luggage. Faded boarding passes

      are pinned to every surface. The zealots kneel here, murmuring

      prayers to the sky gods for the return of flight.

      '
    exits:
    - direction: south
      target: pdx_ticketing_hall
    - direction: north
      target: pdx_concourse_a
    - direction: east
      target: pdx_concourse_b
    - direction: west
      target: pdx_concourse_e
    map_x: 4
    map_y: -4
    spawns:
    - template: cargo_cultist
      count: 2
      respawn_after: 5m
    properties:
      lighting: candlelight
      atmosphere: reverent
  - id: pdx_concourse_a
    title: Concourse A
    danger_level: sketchy
    description: 'Concourse A stretches northward, its floor-to-ceiling windows

      offering a view of the dead tarmac beyond. Empty gate seating

      areas have been converted into sleeping quarters. Hand-lettered

      signs above each gate announce fictional destinations:

      "Gate A3 — Paradise. Now Boarding."

      '
    exits:
    - direction: south
      target: pdx_the_carpet
    - direction: north
      target: pdx_jet_bridge
    map_x: 4
    map_y: -6
    spawns:
    - template: cargo_cultist
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: quiet
  - id: pdx_concourse_b
    title: Concourse B
    danger_level: sketchy
    description: 'Concourse B is the most intact of the terminal wings. Scavengers

      have set up a trading post in the old duty-free shop. The smell

      of cooking fires drifts from deeper in the corridor. A crude map

      of the airport is painted on the wall, marking safe zones and

      raider territory in different colors.

      '
    exits:
    - direction: west
      target: pdx_the_carpet
    map_x: 6
    map_y: -4
    spawns:
    - template: airport_scavenger
      count: 2
      respawn_after: 5m
    properties:
      lighting: firelight
      atmosphere: smoke
  - id: pdx_concourse_c
    title: Concourse C
    danger_level: sketchy
    description: 'The central concourse is a wind tunnel. Broken windows let the

      rain drive in sideways, and pools of standing water reflect

      the grey sky. A partially collapsed ceiling reveals twisted

      ductwork and dangling wires overhead. Despite the damage,

      squatters have claimed the drier corners.

      '
    exits:
    - direction: south
      target: pdx_concourse_d
    - direction: east
      target: pdx_food_court
    map_x: 0
    map_y: -6
    spawns:
    - template: terminal_squatter
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: rain
  - id: pdx_concourse_d
    title: Concourse D
    danger_level: sketchy
    description: 'Concourse D has been heavily fortified by the cargo cultists.

      Barricades made from luggage carts and vending machines block

      unauthorized passage. Religious iconography covers the walls —

      painted airplanes ascending into golden clouds, flight attendants

      with halos, pilots depicted as saints.

      '
    exits:
    - direction: north
      target: pdx_concourse_c
    - direction: east
      target: pdx_concourse_e
    map_x: 0
    map_y: -4
    spawns:
    - template: cargo_cultist
      count: 2
      respawn_after: 5m
    properties:
      lighting: candlelight
      atmosphere: incense
  - id: pdx_concourse_e
    title: Concourse E
    danger_level: sketchy
    description: 'The easternmost concourse opens onto a panoramic view of the

      runways. The cultists gather here at dawn, watching the horizon

      for planes that will never come. Old telescopes and binoculars

      are mounted along the windows. A hand-painted sign reads

      "Observation Deck — Arrivals Expected."

      '
    exits:
    - direction: west
      target: pdx_concourse_d
    - direction: east
      target: pdx_the_tarmac
    map_x: 2
    map_y: -4
    spawns:
    - template: rogue_security
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: wind
  - id: pdx_food_court
    title: Food Court
    danger_level: sketchy
    description: 'The old airport food court has become a scavenger market.

      Rusted kitchen equipment serves as trade counters. Faded menu

      boards above each stall now list barter rates for salvage.

      The smell of reheated airline meals mingles with wood smoke.

      This is the closest thing to commerce the airport has.

      '
    exits:
    - direction: west
      target: pdx_concourse_c
    map_x: 2
    map_y: -6
    spawns:
    - template: terminal_squatter
      count: 2
      respawn_after: 5m
    properties:
      lighting: firelight
      atmosphere: smoke
  - id: pdx_baggage_claim
    title: Baggage Claim
    danger_level: sketchy
    description: 'The baggage carousels have been repurposed as communal sleeping

      platforms, their conveyor belts padded with old blankets and

      clothing. Families have staked out territories around each

      carousel. Children play on the motionless belts. A hand-crank

      generator provides dim, flickering light.

      '
    exits:
    - direction: west
      target: pdx_ticketing_hall
    - direction: north
      target: pdx_neutral_terminal
    map_x: 6
    map_y: -2
    spawns:
    - template: airport_scavenger
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: crowded
  - id: pdx_the_tarmac
    title: The Tarmac
    danger_level: sketchy
    description: 'The vast expanse of cracked asphalt stretches in every direction,

      dotted with the skeletal remains of grounded aircraft. Weeds

      push through seams in the concrete. The wind howls across the

      open space, carrying grit and the faint smell of old jet fuel.

      Raiders patrol here, claiming the planes as their territory.

      '
    exits:
    - direction: west
      target: pdx_concourse_e
    - direction: east
      target: pdx_hangar_row
    - direction: south
      target: pdx_runway_south
    - direction: north
      target: pdx_fuel_depot
    map_x: 8
    map_y: 4
    spawns:
    - template: tarmac_raider
      count: 2
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: wind
  - id: pdx_hangar_row
    title: Hangar Row
    danger_level: sketchy
    description: 'A line of massive aircraft hangars stretches along the eastern

      edge of the tarmac. Their corrugated metal walls are dented and

      rusted, but still standing. Raiders have claimed the hangars as

      workshops, stripping aircraft for armor and weapons. The sound

      of hammering echoes from inside the nearest structure.

      '
    exits:
    - direction: west
      target: pdx_the_tarmac
    - direction: north
      target: pdx_cargo_terminal
    - direction: east
      target: pdx_control_tower
    map_x: 10
    map_y: 4
    spawns:
    - template: tarmac_raider
      count: 2
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: industrial
  - id: pdx_control_tower
    title: Control Tower
    boss_room: true
    danger_level: dangerous
    description: 'The air traffic control tower rises above the airport like a

      concrete lighthouse. The climb up the interior stairwell is

      treacherous — missing steps and crumbling railings. But the

      view from the top is unmatched. You can see the entire airport,

      the Columbia River, and on clear days, the ghostly outline of

      Mt. Hood to the east.

      '
    exits:
    - direction: west
      target: pdx_hangar_row
    - direction: east
      target: pdx_old_control_tower
    map_x: 12
    map_y: 4
    spawns:
    - template: rogue_security
      count: 1
      respawn_after: 5m
    - template: pdx_high_steward
      count: 1
      respawn_after: 10m
    properties:
      lighting: exposed
      atmosphere: wind
  - id: pdx_cargo_terminal
    title: Cargo Terminal
    danger_level: sketchy
    description: 'The freight processing building has become the cargo cult''s

      headquarters. Shipping containers are arranged in a labyrinth,

      their interiors converted into living quarters and worship spaces.

      The High Steward holds court here, interpreting "sacred manifests"

      and distributing salvage according to divine cargo law.

      '
    exits:
    - direction: south
      target: pdx_hangar_row
    - direction: north
      target: pdx_i84_east
    - direction: east
      target: pdx_cargo_warehouse
    map_x: 10
    map_y: 2
    spawns:
    - template: cargo_cultist
      count: 3
      respawn_after: 5m
    properties:
      lighting: candlelight
      atmosphere: incense
  - id: pdx_parking_garage
    title: Parking Garage
    danger_level: sketchy
    description: 'The multi-level parking structure has been converted into a

      fortress. Vehicles on each level form walls and chokepoints.

      Ramps between levels are gated and guarded. The rooftop level

      serves as a lookout post with views in every direction. Rain

      pools on the oil-stained concrete of the lower levels.

      '
    exits:
    - direction: north
      target: pdx_airport_way_east
    map_x: 2
    map_y: 2
    spawns:
    - template: rogue_security
      count: 2
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: enclosed
  - id: pdx_max_station
    title: MAX Station
    danger_level: sketchy
    description: 'The airport MAX light rail station sits in silent decay. The

      elevated platform overlooks empty tracks that disappear into

      overgrown brush. A derailed train car sits halfway off the rails,

      its interior gutted and converted into a squatter shelter.

      The electronic schedule display is dark and dead.

      '
    exits:
    - direction: north
      target: pdx_terminal_entrance
    - direction: east
      target: pdx_rental_car_lot
    map_x: 4
    map_y: 2
    spawns:
    - template: terminal_squatter
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: desolate
  - id: pdx_jet_bridge
    title: Jet Bridge
    danger_level: sketchy
    description: 'The enclosed walkway extends from the terminal gate out over

      the tarmac, ending abruptly where it once connected to an

      aircraft door. The accordion walls sway in the wind. Looking

      down through gaps in the floor, you can see the cracked

      asphalt far below. The cultists consider this a sacred passage.

      '
    exits:
    - direction: south
      target: pdx_concourse_a
    map_x: 4
    map_y: -8
    spawns:
    - template: cargo_cultist
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: wind
  - id: pdx_runway_south
    title: South Runway
    danger_level: sketchy
    description: 'The main runway stretches into the distance, its faded center

      line barely visible beneath layers of dirt and debris. The

      remains of a crashed cargo plane lie halfway down the strip,

      its fuselage split open and picked clean by scavengers.

      Raiders use the wreckage as a fortified camp.

      '
    exits:
    - direction: north
      target: pdx_the_tarmac
    - direction: east
      target: pdx_fuel_depot
    map_x: 8
    map_y: 6
    spawns:
    - template: tarmac_raider
      count: 1
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: wind
  - id: pdx_fuel_depot
    title: Fuel Depot
    danger_level: sketchy
    description: 'Massive fuel storage tanks rise like rusted monuments behind

      chain-link fencing topped with razor wire. Most are empty, but

      the raiders guard them fiercely — even trace amounts of jet fuel

      are worth killing for. The ground is stained dark, and the air

      burns with fumes on hot days.

      '
    exits:
    - direction: south
      target: pdx_the_tarmac
    - direction: west
      target: pdx_runway_south
    map_x: 8
    map_y: 2
    spawns:
    - template: tarmac_raider
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: chemical
  - id: pdx_rental_car_lot
    title: Rental Car Lot
    danger_level: sketchy
    description: 'Row after row of rusted vehicles fill the old rental car lot.

      Most have been stripped of anything useful, but the sheer number

      of cars creates a maze-like warren. Squatters live in the more

      intact vehicles, and the lot''s perimeter fence provides a

      degree of security from tarmac raiders.

      '
    exits:
    - direction: west
      target: pdx_max_station
    map_x: 6
    map_y: 2
    spawns:
    - template: airport_scavenger
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: quiet
  - id: pdx_terminal_b
    title: Terminal B
    danger_level: safe
    description: "A section of the airport terminal cordoned off from the main concourse. Chairs bolted to the floor, vending machines that still work, and people who've learned to wait."
    exits:
    - direction: north
      target: pdx_airport_way_west
    map_x: 0
    map_y: 2
    spawns:
    - template: pdx_international_merchant
      count: 1
      respawn_after: 0s
    - template: pdx_international_healer
      count: 1
      respawn_after: 0s
    - template: pdx_international_job_trainer
      count: 1
      respawn_after: 0s
    - template: pdx_international_banker
      count: 1
      respawn_after: 0s
    - template: pdx_international_guard
      count: 1
      respawn_after: 0s
    - template: pdx_international_quest_giver
      count: 1
      respawn_after: 0s
    properties:
      lighting: fluorescent
      atmosphere: waiting
  - id: pdx_neutral_terminal
    title: Neutral Terminal
    danger_level: safe
    description: 'A stretch of terminal corridor that no faction controls outright.
      Scorch marks and old bloodstains tell the story of whoever last
      tried to claim it, but some tacit truce holds now. A hand-painted
      sign reads "Neutral Ground" in three colors of spray paint.
      Travelers move through quickly and quietly.
      '
    exits:
    - direction: south
      target: pdx_baggage_claim
    - direction: north
      target: pdx_neutral_lounge
    - direction: west
      target: pdx_neutral_gate
    map_x: 4
    map_y: -10
    spawns:
    - template: chip_doc_pdx_international
      count: 1
      respawn_after: 0s
    - template: pdx_international_motel_keeper
      count: 1
      respawn_after: 0s
    properties:
      lighting: dim
      atmosphere: tense
  - id: pdx_neutral_lounge
    title: Neutral Lounge
    danger_level: safe
    description: 'A former airline lounge stripped of its premium trappings but
      still furnished with bolted-down seats and a working water spigot.
      People rest here without looking over their shoulders. The
      unwritten rule is that weapons stay holstered inside these walls.
      '
    exits:
    - direction: south
      target: pdx_neutral_terminal
    - direction: east
      target: pdx_neutral_gate
    - direction: north
      target: pdx_international_brothel
    map_x: 4
    map_y: -12
    properties:
      lighting: dim
      atmosphere: quiet
  - id: pdx_neutral_gate
    title: Neutral Gate
    danger_level: safe
    description: 'A boarding gate at the end of a short jetway corridor, walled
      off from the rest of the concourse with salvaged chain-link and
      plywood. The gate seating is intact. Someone has taped a list
      of rules to the wall: no fighting, no theft, no cult recruitment.
      '
    exits:
    - direction: east
      target: pdx_neutral_terminal
    - direction: west
      target: pdx_neutral_lounge
    map_x: 2
    map_y: -12
    properties:
      lighting: dim
      atmosphere: still
  - id: pdx_cargo_warehouse
    title: Cargo Warehouse
    danger_level: sketchy
    description: 'A cavernous freight warehouse attached to the cargo terminal.
      Pallet racking stretches to the ceiling, most of it bare or
      collapsed. Scavengers pick through the debris systematically.
      The concrete floor is cracked by years of freeze-thaw cycles,
      and drainage channels run black with old motor oil.
      '
    exits:
    - direction: west
      target: pdx_cargo_terminal
    map_x: 12
    map_y: 2
    spawns:
    - template: airport_scavenger
      count: 2
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: industrial
  - id: pdx_old_control_tower
    title: Old Control Tower Base
    danger_level: sketchy
    description: 'The base of a decommissioned secondary control tower, shorter
      than the main one and partially buried by a collapsed roof section.
      Rogue security has claimed the fortified ground floor as a
      checkpoint, demanding a toll from anyone passing through the
      eastern perimeter.
      '
    exits:
    - direction: west
      target: pdx_control_tower
    - direction: north
      target: pdx_east_runway
    map_x: 14
    map_y: 4
    spawns:
    - template: rogue_security
      count: 2
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: tense
  - id: pdx_east_runway
    title: East Runway
    danger_level: sketchy
    description: 'A secondary runway running along the eastern boundary of the
      airport. Tarmac raiders have painted territory markers along
      the center line. The far end disappears into a wall of overgrown
      blackberry brambles that have reclaimed the old blast zone.
      '
    exits:
    - direction: south
      target: pdx_old_control_tower
    - direction: north
      target: pdx_perimeter_fence
    map_x: 14
    map_y: 2
    spawns:
    - template: tarmac_raider
      count: 2
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: wind
  - id: pdx_perimeter_fence
    title: Perimeter Fence Line
    danger_level: sketchy
    description: 'The chain-link perimeter fence has been breached in a dozen
      places, each gap a contested crossing point. Razor wire coils
      along the top where it still stands. Rogue security patrols
      the fence line, chasing off scavengers trying to slip through
      to the outer roads.
      '
    exits:
    - direction: south
      target: pdx_east_runway
    map_x: 14
    map_y: 0
    spawns:
    - template: rogue_security
      count: 1
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: wind

  - id: pdx_international_brothel
    title: Terminal Comfort
    danger_level: safe
    description: A former airline club lounge off the neutral terminal corridor, its frosted glass doors still etched with the old carrier's logo. Inside, reclined seats have been converted into curtained berths. The bar cart still operates. Terminal Comfort offers the airport traveler experience with none of the amenities and all of the human contact.
    map_x: 4
    map_y: -14
    exits:
    - direction: south
      target: pdx_neutral_lounge
    spawns:
    - template: pdx_international_brothel_keeper
      count: 1
      respawn_after: 0s
    - template: pdx_international_black_market_merchant
      count: 1
      respawn_after: 0s
    - template: pdx_international_fixer
      count: 1
      respawn_after: 0s
