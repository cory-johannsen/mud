zone:
  id: hillsboro
  danger_level: sketchy
  world_x: -4
  world_y: 0
  script_dir: content/scripts/zones/hillsboro
  name: Kingdom of Hillsboro
  description: A feudal tech-state built on the bones of the old semiconductor industry. Knights in server rack armor patrol
    solar farms and data center keeps, ruling over serfs who maintain machines they no longer understand.
  start_room: hills_the_keep
  rooms:
  - id: hills_tv_highway_east
    title: TV Highway East
    description: 'The cracked asphalt of the old Tualatin Valley Highway stretches east

      toward Aloha, littered with burned-out cars and toppled power poles.

      To the west, the road narrows as crude barricades mark the edge of

      the Kingdom of Hillsboro. Blue-and-white banners snap in the wind.

      '
    danger_level: sketchy
    exits:
    - direction: east
      target: aloha_tv_highway_west
    - direction: west
      target: hills_campus_gate
    - direction: north
      target: hills_cornell_road
    - direction: south
      target: hills_the_keep
    map_x: 0
    map_y: 0
    equipment:
    - item_id: zone_map
      max_count: 1
      respawn_after: 0s
      immovable: true
      script: zone_map_use
      description: Zone Map
    properties:
      lighting: overcast
      atmosphere: wind
  - id: hills_campus_gate
    title: Campus Gate
    description: 'A fortified checkpoint built from concrete jersey barriers and welded

      steel plate. Two guard towers fashioned from old cell towers flank

      the entrance. The Intel logo, repainted in fresh blue, adorns a

      sheet-metal arch above the gate. Beyond lies the tech campus heartland.

      '
    danger_level: sketchy
    exits:
    - direction: east
      target: hills_tv_highway_east
    - direction: west
      target: hills_campus_boulevard
    - direction: south
      target: hills_orenco_station
    map_x: -2
    map_y: 0
    spawns:
    - template: intel_guard
      count: 2
      respawn_after: 5m
    properties:
      lighting: torchlight
      atmosphere: guarded
  - id: hills_campus_boulevard
    title: Campus Boulevard
    description: 'A wide road lined with dead ornamental trees runs through the heart

      of the old tech campus. Manicured lawns have gone feral, knee-high

      grass pushing through walkways. Buildings of glass and steel loom

      on either side, their corporate logos faded but still legible.

      '
    danger_level: sketchy
    exits:
    - direction: east
      target: hills_campus_gate
    - direction: west
      target: hills_server_keep
    - direction: north
      target: hills_knight_barracks
    - direction: south
      target: hills_serf_quarters
    map_x: -4
    map_y: 0
    spawns:
    - template: silicon_serf
      count: 1
      respawn_after: 5m
    - template: hillsboro_hireling
      count: 1
      respawn_after: 0s
    - template: intel_guard
      count: 1
      respawn_after: 30m
    properties:
      lighting: overcast
      atmosphere: quiet
  - id: hills_server_keep
    title: The Server Keep
    description: 'The massive data center has been converted into a fortress. Its

      windowless concrete walls need no reinforcement. Cooling towers

      still hum with power drawn from the solar farm. Inside, rack after

      rack of dead servers line corridors turned into throne rooms and

      armories. This is the seat of the Kingdom''s power.

      '
    core: true
    exits:
    - direction: east
      target: hills_campus_boulevard
    - direction: north
      target: hills_throne_room
    - direction: south
      target: hills_the_foundry
    - direction: down
      target: hills_power_station
    - direction: west
      target: hills_fortress_core
    map_x: -6
    map_y: 0
    spawns:
    - template: hillsboro_knight
      count: 2
      respawn_after: 5m
    properties:
      lighting: fluorescent
      atmosphere: humming
  - id: hills_throne_room
    title: The Throne Room
    description: 'Deep within the data center, a cavernous server hall has been cleared

      to create the throne room of the Kingdom. The throne itself is a

      massive chair welded from server chassis, draped in blue-and-white

      banners. Cooling fans embedded in the walls create a constant low

      drone. LED strips cast everything in pale blue light.

      '
    core: true
    exits:
    - direction: south
      target: hills_server_keep
    map_x: -6
    map_y: -2
    spawns:
    - template: hillsboro_knight
      count: 1
      respawn_after: 5m
    properties:
      lighting: led_blue
      atmosphere: solemn
  - id: hills_royal_archives
    title: The Royal Archives
    description: 'What was once a server monitoring center now serves as the Kingdom''s

      library. Salvaged technical manuals, engineering textbooks, and

      printed-out documentation fill metal shelving. A few ancient monitors

      still flicker with scrolling text, powered by jealously guarded

      solar reserves. The archivists treat every page as sacred.

      '
    danger_level: sketchy
    exits: []
    map_x: 202
    map_y: 0
    spawns:
    - template: intel_guard
      count: 1
      respawn_after: 30m
    properties:
      lighting: dim
      atmosphere: quiet
  - id: hills_solar_farm
    title: The Solar Farm
    description: 'Acres of solar panels stretch across what were once parking lots.

      Most still function, their output carefully maintained by teams

      of serfs. Guard towers ring the perimeter. This is the Kingdom''s

      most vital resource — without the panels, the servers go dark

      and the Kingdom loses its claim to legitimacy.

      '
    danger_level: sketchy
    exits:
    - direction: north
      target: hills_the_foundry
    map_x: -6
    map_y: 4
    spawns:
    - template: intel_guard
      count: 2
      respawn_after: 5m
    properties:
      lighting: bright
      atmosphere: exposed
  - id: hills_serf_quarters
    title: Serf Quarters
    description: 'Rows of cubicle partitions have been repurposed as living spaces,

      each small cell containing a bedroll and a few personal effects.

      The air smells of sweat and solder flux. Workers in stained

      cleanroom suits shuffle between shifts, their eyes hollow with

      exhaustion. A communal cook fire smolders in a repurposed server rack.

      '
    danger_level: sketchy
    exits:
    - direction: north
      target: hills_campus_boulevard
    map_x: -4
    map_y: 2
    spawns:
    - template: silicon_serf
      count: 2
      respawn_after: 5m
    properties:
      lighting: firelight
      atmosphere: crowded
  - id: hills_knight_barracks
    title: Knight Barracks
    description: 'A reinforced office building serves as the military compound for

      the Kingdom''s knights. Server rack armor hangs on improvised stands.

      Halberds fashioned from rebar and sharpened steel lean against walls.

      A training dummy made from bundled cable and duct tape stands in

      the central courtyard, thoroughly battered.

      '
    danger_level: sketchy
    exits:
    - direction: south
      target: hills_campus_boulevard
    map_x: -4
    map_y: -2
    spawns:
    - template: hillsboro_knight
      count: 2
      respawn_after: 5m
    properties:
      lighting: torchlight
      atmosphere: military
  - id: hills_training_grounds
    title: Training Grounds
    description: 'An old parking structure has been converted into a training facility.

      Concrete pillars serve as obstacles for combat drills. Chalk outlines

      on the floor mark sparring positions. The clang of improvised weapons

      echoes off the low ceiling as squires practice formations their

      masters learned from medieval history wikis.

      '
    danger_level: sketchy
    exits: []
    map_x: 202
    map_y: 2
    spawns:
    - template: hillsboro_knight
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: echoing
  - id: hills_the_foundry
    title: The Foundry
    description: 'A converted clean room now serves as the Kingdom''s manufacturing

      center. Salvaged equipment is used to fabricate circuit boards,

      repair solar panels, and forge the crude weapons and armor that

      equip the knights. The air is thick with the acrid smell of

      solder and the whine of repurposed industrial tools.

      '
    danger_level: sketchy
    exits:
    - direction: north
      target: hills_server_keep
    - direction: south
      target: hills_solar_farm
    map_x: -6
    map_y: 2
    spawns:
    - template: silicon_serf
      count: 2
      respawn_after: 5m
    properties:
      lighting: industrial
      atmosphere: smoke
  - id: hills_market_square
    title: Market Square
    description: 'An open courtyard between campus buildings has become the Kingdom''s

      commercial hub. Traders from the surrounding wasteland barter for

      circuit boards and salvaged tech. Stalls built from office furniture

      display everything from scavenged food to makeshift weapons.

      A knight stands watch from a second-floor balcony.

      '
    danger_level: sketchy
    exits:
    - direction: south
      target: hills_tanasbourne_ruins
    map_x: 4
    map_y: -4
    spawns:
    - template: hillsboro_banker
      count: 1
      respawn_after: 0s
    - template: intel_guard
      count: 1
      respawn_after: 30m
    properties:
      lighting: overcast
      atmosphere: bustling
  - id: hills_orenco_station
    title: Orenco Station
    description: 'The old MAX light rail station has been converted into a trade post.

      The platform serves as a loading dock. Rusted rail cars have been

      gutted and turned into storage sheds and merchant stalls. Caravans

      from the east arrive here, trading scrap and food for the Kingdom''s

      circuit boards and solar-charged batteries.

      '
    danger_level: sketchy
    exits:
    - direction: north
      target: hills_campus_gate
    - direction: south
      target: hills_amberglen_plaza
    map_x: -2
    map_y: 2
    spawns:
    - template: hillsboro_job_trainer
      count: 1
      respawn_after: 0s
    - template: intel_guard
      count: 1
      respawn_after: 30m
    properties:
      lighting: overcast
      atmosphere: trade
  - id: hills_rock_creek_trail
    title: Rock Creek Trail
    description: 'A muddy trail follows the overgrown creek bed through dense

      undergrowth. The trees here have reclaimed the suburban landscape,

      their roots cracking through old sidewalks and driveways. Patrol

      markers — blue rags tied to branches — indicate the Kingdom''s

      border. Something rustles in the blackberry thickets.

      '
    danger_level: sketchy
    exits: []
    map_x: -2
    map_y: -2
    spawns:
    - template: intel_guard
      count: 1
      respawn_after: 5m
    properties:
      lighting: dappled
      atmosphere: wilderness
  - id: hills_tanasbourne_ruins
    title: Tanasbourne Ruins
    description: 'The skeleton of a massive shopping complex sprawls across several

      blocks. Collapsed roofs expose aisles of rusted shelving picked

      clean decades ago. Feral dogs den in the old anchor stores. The

      parking lot is a wasteland of crumbling asphalt and sun-bleached

      shopping carts. Scavengers still pick through the deeper sections.

      '
    danger_level: sketchy
    exits:
    - direction: north
      target: hills_market_square
    - direction: west
      target: hills_suburban_wasteland
    map_x: 4
    map_y: -2
    spawns:
    - template: intel_guard
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: desolate
  - id: hills_cornell_road
    title: Cornell Road
    description: 'The old arterial road winds north through overgrown suburbs.

      McMansions with caved-in roofs line both sides, their HOA-approved

      paint schemes faded to uniform grey. The road itself is cracked

      and buckled but still passable. Kingdom patrol markers dot the

      route at regular intervals.

      '
    danger_level: sketchy
    exits:
    - direction: south
      target: hills_tv_highway_east
    - direction: west
      target: hills_rock_creek_trail
    - direction: north
      target: hills_helvetia_overlook
    map_x: 0
    map_y: -2
    spawns:
    - template: intel_guard
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: suburban
  - id: hills_power_station
    title: Power Station
    description: 'Below the Server Keep, a basement level houses the Kingdom''s

      power distribution center. Banks of salvaged batteries line the

      walls, connected by a rat''s nest of cabling to the solar farm

      above. The hum of electricity is constant and oppressive. A wrong

      step here could be fatal. Only trusted engineers are permitted entry.

      '
    danger_level: sketchy
    exits:
    - direction: up
      target: hills_server_keep
    map_x: 202
    map_y: 8
    spawns:
    - template: intel_guard
      count: 1
      respawn_after: 5m
    properties:
      lighting: emergency
      atmosphere: electric
  - id: hills_refugee_processing
    title: Refugee Processing
    description: 'A fenced compound near the serf quarters where newcomers are

      evaluated for useful skills. Those who can repair electronics

      or maintain solar panels are granted serf status. The rest are

      turned away at the gate. Chain-link pens hold a dozen hollow-eyed

      wanderers awaiting their interviews.

      '
    danger_level: sketchy
    exits: []
    map_x: 202
    map_y: 10
    spawns:
    - template: silicon_serf
      count: 1
      respawn_after: 5m
    properties:
      lighting: harsh
      atmosphere: tense
  - id: hills_amberglen_plaza
    title: Amberglen Plaza
    description: 'A cluster of old office parks surrounds a decorative pond choked

      with algae. The buildings here serve as overflow housing and

      workshops. Laundry lines strung between structures flutter with

      faded corporate polo shirts. Children chase each other through

      the ruins of a landscaped courtyard.

      '
    danger_level: sketchy
    exits:
    - direction: north
      target: hills_orenco_station
    map_x: -2
    map_y: 4
    spawns:
    - template: intel_guard
      count: 1
      respawn_after: 30m
    properties:
      lighting: overcast
      atmosphere: domestic
  - id: hills_suburban_wasteland
    title: Suburban Wasteland
    description: 'Beyond the Kingdom''s core, endless tracts of collapsed suburban

      housing stretch in every direction. Cul-de-sacs lead nowhere.

      Identical floor plans repeat like a glitch in reality. The wind

      moans through broken windows. Occasionally, a chimney still

      stands amid the rubble like a lonely monument.

      '
    danger_level: sketchy
    exits:
    - direction: east
      target: hills_tanasbourne_ruins
    map_x: 2
    map_y: -2
    spawns:
    - template: silicon_serf
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: desolate
  - id: hills_helvetia_overlook
    title: Helvetia Overlook
    description: 'A hilltop clearing offers a panoramic view of the Kingdom below.

      The solar farm glitters to the south. The Server Keep''s cooling

      towers trail steam into the grey sky. Beyond the borders, the

      wasteland stretches to the horizon in every direction. A crude

      watchtower built from telephone poles stands here, manned day

      and night by the Kingdom''s scouts.

      '
    danger_level: sketchy
    exits:
    - direction: south
      target: hills_cornell_road
    - direction: southeast
      target: hills_suburban_wasteland
    map_x: 0
    map_y: -4
    spawns:
    - template: hillsboro_knight
      count: 1
      respawn_after: 5m
    properties:
      lighting: bright
      atmosphere: wind
  - id: hills_the_keep
    title: The Keep
    description: 'A fortified community hall at the edge of the Hillsboro enclave. Stone walls and firelight. A place of order, or something close to it.'
    danger_level: safe
    exits:
    - direction: north
      target: hills_tv_highway_east
    - direction: east
      target: hills_waystation
    map_x: 0
    map_y: 2
    spawns:
    - template: hillsboro_merchant
      count: 1
      respawn_after: 0s
    - template: hillsboro_healer
      count: 1
      respawn_after: 0s
    properties:
      lighting: firelight
      atmosphere: guarded
  - id: hills_fortress_core
    title: Knight Fortress Core
    description: |
      The inner sanctum of the Kingdom's military power. Thick blast doors
      salvaged from a decommissioned data center seal the entrance. Inside,
      elite knights in the heaviest server-rack armor stand motionless at
      their posts. The floor is polished concrete, scrubbed daily by serfs
      who are not permitted to raise their eyes. Every surface whispers of
      controlled violence.
    core: true
    exits:
    - direction: east
      target: hills_server_keep
    - direction: north
      target: hills_armory_hall
    map_x: -8
    map_y: 0
    spawns:
    - template: hills_fortress_sentinel
      count: 2
      respawn_after: 5m
    properties:
      lighting: torchlight
      atmosphere: military
  - id: hills_armory_hall
    title: Armory Hall
    description: |
      Racks of salvaged weapons line every wall — rebar halberds, sharpened
      server blades, and a few precious firearms kept under lock and chain.
      Suits of server rack armor hang from ceiling hooks, each bearing the
      crest of a knight who died in service to the Kingdom. The armorer,
      a scarred woman with oil-blackened hands, works in silence at a forge
      built from a repurposed UPS unit.
    core: true
    exits:
    - direction: south
      target: hills_fortress_core
    map_x: -8
    map_y: -2
    spawns:
    - template: hills_armory_warden
      count: 1
      respawn_after: 5m
    properties:
      lighting: forge_glow
      atmosphere: industrial
  - id: hills_outer_fields_north
    title: Outer Fields North
    description: |
      Reclaimed farmland stretches across what were once suburban back yards.
      Raised beds made from salvaged lumber hold rows of kale, squash, and
      legumes. A few scarecrows fashioned from old crash-test dummies keep
      the crows away. The Kingdom's blue-and-white border markers stand at
      the tree line to the north.
    danger_level: sketchy
    exits:
    - direction: south
      target: hills_tv_highway_east
    - direction: west
      target: hills_outer_fields_south
    map_x: 0
    map_y: -6
    spawns:
    - template: hillsboro_knight
      count: 1
      respawn_after: 30m
    properties:
      lighting: overcast
      atmosphere: rural
  - id: hills_outer_fields_south
    title: Outer Fields South
    description: |
      A wide expanse of terraced growing fields follows the gentle slope
      south of the highway. Irrigation channels dug by hand run between
      the beds. Serfs in muddy boots move slowly between rows, tending
      crops under the grey sky. A water tower converted to a guard post
      overlooks the entire field.
    danger_level: sketchy
    exits:
    - direction: east
      target: hills_outer_fields_north
    - direction: south
      target: hills_amberglen_plaza
    map_x: -2
    map_y: -6
    spawns:
    - template: hillsboro_knight
      count: 1
      respawn_after: 30m
    properties:
      lighting: overcast
      atmosphere: rural
  - id: hills_east_road
    title: East Road
    description: |
      A cracked two-lane road runs east from the Kingdom's border, flanked
      by overgrown hedges and the ruins of strip malls. The tarmac here is
      better maintained than most — Kingdom serfs patch the worst sections
      to keep trade caravans moving. Faded mile markers have been repainted
      with blue-and-white Kingdom symbols.
    danger_level: sketchy
    exits:
    - direction: west
      target: hills_tv_highway_east
    - direction: north
      target: hills_waystation
    map_x: 2
    map_y: 0
    spawns:
    - template: intel_guard
      count: 1
      respawn_after: 30m
    properties:
      lighting: overcast
      atmosphere: quiet
  - id: hills_waystation
    title: Waystation
    description: |
      A converted gas station serves as a neutral waypoint on the eastern
      approach to the Kingdom. The canopy still stands, patched with sheet
      metal and salvaged lumber. Beneath it, travelers rest on improvised
      benches. The old convenience store has been stripped bare, its shelves
      replaced with cots and a communal water barrel.
    danger_level: safe
    exits:
    - direction: south
      target: hills_east_road
    - direction: west
      target: hills_the_keep
    - direction: north
      target: hills_waystation_yard
    - direction: east
      target: hills_waystation_shelter
    map_x: 2
    map_y: -2
    properties:
      lighting: dim
      atmosphere: quiet
  - id: hills_waystation_yard
    title: Waystation Yard
    description: |
      Behind the waystation, a fenced yard holds a tangle of salvage —
      rusted vehicle frames, stacked lumber, coils of wire. A communal
      fire pit occupies the center, ringed with mismatched chairs. The
      smell of woodsmoke and engine oil hangs in the still air.
    danger_level: safe
    exits:
    - direction: south
      target: hills_waystation
    - direction: east
      target: hills_trading_post
    map_x: 2
    map_y: -4
    properties:
      lighting: firelight
      atmosphere: quiet
  - id: hills_waystation_shelter
    title: Waystation Shelter
    description: |
      A back room of the old gas station has been converted into a clinic
      and meeting space. Folding tables line the walls, covered with tools
      and salvage. In the corner, a lean figure in a worn technician's
      coat works over a neural interface chassis, tools moving with practiced
      precision. A hand-painted sign reads: "IMPLANTS REMOVED — NO QUESTIONS."
    danger_level: safe
    exits:
    - direction: west
      target: hills_waystation
    map_x: 4
    map_y: -2
    spawns:
    - template: chip_doc_hillsboro
      count: 1
      respawn_after: 0s
    properties:
      lighting: dim
      atmosphere: tense
  - id: hills_trading_post
    title: Trading Post
    description: |
      A converted auto repair shop serves as an informal trading floor for
      travelers passing through the Kingdom's eastern approach. Goods are
      spread on workbenches and hanging racks — dried food, salvage, clothing,
      and the occasional piece of working electronics. A hand-lettered sign
      above the bay door reads: "ALL SALES FINAL. NO WEAPONS DRAWN INSIDE."
    danger_level: safe
    exits:
    - direction: west
      target: hills_waystation_yard
    map_x: 4
    map_y: -4
    properties:
      lighting: overcast
      atmosphere: trade
