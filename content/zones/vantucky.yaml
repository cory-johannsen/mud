zone:
  id: vantucky
  danger_level: dangerous
  world_x: 2
  world_y: -4
  script_dir: content/scripts/zones/vantucky
  name: Vantucky
  description: The rural-urban fringe east of Vancouver, where militia compounds, gun markets, and highway bandits rule a
    landscape of strip malls, farmland, and fortified homesteads.
  start_room: vantucky_the_compound
  rooms:
  - id: vantucky_fourth_plain_west
    title: Fourth Plain — Vantucky Border
    description: 'The road crosses an invisible line where the Couve ends and Vantucky begins.

      Burned tires and razor wire mark the boundary. A hand-painted sign reads

      "WELCOME TO FREE TERRITORY" with a crude skull beneath it.

      The pavement is cracked and patched with gravel. Pickup trucks rust in driveways.

      '
    danger_level: dangerous
    exits:
    - direction: west
      target: couve_fourth_plain_east
    - direction: east
      target: vantucky_andresen_road
    - direction: south
      target: vantucky_gas_station_ruins
    - direction: north
      target: vantucky_the_compound
    map_x: 0
    map_y: 0
    spawns:
    - template: vantucky_militiaman
      count: 1
      respawn_after: 5m
    equipment:
    - item_id: zone_map
      max_count: 1
      respawn_after: 0s
      immovable: true
      script: zone_map_use
      description: Zone Map
    properties:
      lighting: overcast
      atmosphere: tense
  - id: vantucky_andresen_road
    title: Andresen Road
    description: 'A commercial strip of gutted big-box stores and collapsed fast food joints.

      The parking lots have been converted into militia drill grounds and swap meets.

      Shell casings crunch underfoot. A faded Walmart sign hangs by one bolt,

      swinging in the wind with a metallic groan.

      '
    danger_level: dangerous
    exits:
    - direction: west
      target: vantucky_fourth_plain_west
    - direction: north
      target: vantucky_checkpoint_north
    - direction: east
      target: vantucky_orchards
    - direction: south
      target: vantucky_gun_market
    map_x: 2
    map_y: 0
    spawns:
    - template: vantucky_militiaman
      count: 2
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: commercial
  - id: vantucky_orchards
    title: The Orchards
    description: 'Once a quiet suburban neighborhood, the Orchards has been carved into

      fortified compounds. Chain-link fences topped with concertina wire

      surround clusters of houses. Old fruit trees grow wild between the lots,

      their branches heavy with unpicked apples rotting on the ground.

      The smell of fermenting fruit mixes with wood smoke.

      '
    danger_level: dangerous
    exits:
    - direction: west
      target: vantucky_andresen_road
    - direction: north
      target: vantucky_compound_alpha
    - direction: east
      target: vantucky_164th_ave
    - direction: south
      target: vantucky_burnt_bridge_creek
    map_x: 4
    map_y: 0
    spawns:
    - template: vantucky_militiaman
      count: 1
      respawn_after: 30m
    properties:
      lighting: dappled
      atmosphere: suburban
  - id: vantucky_164th_ave
    title: 164th Avenue — Militia Territory
    description: 'The wide avenue is blocked by vehicle barricades made from stacked cars.

      Militia flags fly from improvised poles. Guard towers fashioned from

      telephone poles and plywood overlook the road in both directions.

      A hand-cranked siren sits atop the nearest tower, ready to sound the alarm.

      '
    danger_level: dangerous
    exits:
    - direction: west
      target: vantucky_orchards
    - direction: north
      target: vantucky_compound_bravo
    - direction: east
      target: vantucky_shooting_range
    map_x: 6
    map_y: 0
    spawns:
    - template: vantucky_militiaman
      count: 2
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: militarized
  - id: vantucky_i84_overpass
    title: I-84 Overpass
    description: 'The highway overpass is a notorious ambush point. Rusted guardrails

      offer minimal cover. Abandoned vehicles have been pushed to the sides

      to create a kill zone. Shell casings and old bloodstains mark the concrete.

      Below, the interstate stretches east and west into the haze.

      '
    danger_level: dangerous
    exits:
    - direction: east
      target: vantucky_i84_east
    - direction: west
      target: vantucky_i84_onramp
    map_x: 2
    map_y: 4
    spawns:
    - template: highway_bandit
      count: 2
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: dangerous
  - id: vantucky_fishers_landing
    title: Fisher's Landing
    description: 'The old transit center at Fisher''s Landing overlooks the Columbia River.

      Fishing boats are chained to makeshift docks along the muddy shore.

      A few families have set up permanent camps in the parking structure,

      trading smoked fish and river salvage. The water is brown but the fish

      still bite, if you don''t mind what they taste like.

      '
    danger_level: dangerous
    exits:
    - direction: west
      target: vantucky_river_trail
    map_x: 4
    map_y: -4
    spawns:
    - template: vantucky_scavenger
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: riverside
  - id: vantucky_compound_alpha
    title: Compound Alpha
    description: 'A fortified homestead surrounded by earthen berms and razor wire.

      The main house is reinforced with steel plates and sandbag walls.

      A watchtower made from a grain silo provides a commanding view of the

      surrounding area. Dogs bark from somewhere inside the perimeter.

      Radio antennas bristle from the rooftop like metal quills.

      '
    danger_level: dangerous
    exits:
    - direction: south
      target: vantucky_orchards
    - direction: east
      target: vantucky_compound_bravo
    map_x: 4
    map_y: -2
    spawns:
    - template: compound_guard
      count: 2
      respawn_after: 5m
    properties:
      lighting: floodlit
      atmosphere: fortified
  - id: vantucky_compound_bravo
    title: Compound Bravo
    description: 'The second major compound in the area occupies a former farm property.

      A barn has been converted into an armory and meeting hall. Jersey barriers

      and old shipping containers form the outer wall. A faded Gadsden flag

      snaps in the wind above the gate. The guards here are well-equipped

      and suspicious of outsiders.

      '
    danger_level: dangerous
    exits:
    - direction: south
      target: vantucky_164th_ave
    - direction: west
      target: vantucky_compound_alpha
    - direction: north
      target: vantucky_farm_compound
    map_x: 6
    map_y: -2
    spawns:
    - template: compound_guard
      count: 2
      respawn_after: 5m
    properties:
      lighting: floodlit
      atmosphere: fortified
  - id: vantucky_gun_market
    title: Gun Market
    description: 'An open-air arms bazaar sprawls across the parking lot of a dead strip mall.

      Tables display everything from hunting rifles to improvised firearms.

      Ammunition is sold by the round. A hand-lettered sign reads

      "ALL SALES FINAL — NO REFUNDS — NO COMPLAINTS."

      The smell of gun oil hangs thick in the air.

      '
    danger_level: dangerous
    exits:
    - direction: north
      target: vantucky_andresen_road
    - direction: east
      target: vantucky_burnt_bridge_creek
    map_x: 2
    map_y: 2
    spawns:
    - template: vantucky_gang_enforcer
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: commerce
  - id: vantucky_burnt_bridge_creek
    title: Burnt Bridge Creek
    description: 'A wooded ravine cuts through the suburban sprawl. The creek runs muddy

      and fast after the rains. Hidden camps dot the treeline, marked only

      by thin wisps of smoke rising through the canopy. Deer trails

      and boot prints crisscross the muddy banks. This is where people go

      when they want to disappear.

      '
    danger_level: dangerous
    exits:
    - direction: north
      target: vantucky_orchards
    - direction: west
      target: vantucky_gun_market
    - direction: east
      target: vantucky_hidden_bunker
    map_x: 4
    map_y: 2
    spawns:
    - template: vantucky_scavenger
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: wilderness
  - id: vantucky_i84_east
    title: I-84 East — Troutdale Border
    description: 'The eastbound lanes of I-84 stretch toward the Columbia River Gorge.

      The road is cratered and overgrown but still passable on foot.

      A checkpoint of burned vehicles marks the border with Troutdale territory.

      Wind howls through the gorge entrance, carrying the smell of pine and ash.

      '
    danger_level: dangerous
    exits:
    - direction: west
      target: vantucky_i84_overpass
    - direction: east
      target: trout_i84_west
    map_x: 4
    map_y: 4
    spawns:
    - template: highway_bandit
      count: 1
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: wind
  - id: vantucky_gas_station_ruins
    title: Gas Station Ruins
    description: 'The skeletal canopy of an old gas station stands over dry pumps and

      shattered concrete. The convenience store has been looted down to the

      drywall. Someone has set up a still in the back room, and the sharp

      smell of moonshine cuts through the decay. Empty jugs line the counter.

      '
    danger_level: dangerous
    exits:
    - direction: north
      target: vantucky_fourth_plain_west
    - direction: east
      target: vantucky_gun_market
    - direction: south
      target: vantucky_i84_onramp
    map_x: 0
    map_y: 2
    spawns:
    - template: vantucky_gang_enforcer
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: decay
  - id: vantucky_shooting_range
    title: Shooting Range
    description: 'A clearing behind a berm of packed earth serves as the community

      shooting range. Steel targets hang from welded frames at various distances.

      Spent brass litters the firing line. A plywood shed holds reloading

      equipment and a hand-painted scoreboard tracking weekly competitions.

      The crack of gunfire echoes through the trees at all hours.

      '
    danger_level: dangerous
    exits:
    - direction: west
      target: vantucky_164th_ave
    - direction: south
      target: vantucky_ammo_depot
    map_x: 8
    map_y: 0
    spawns:
    - template: vantucky_militiaman
      count: 1
      respawn_after: 5m
    properties:
      lighting: open
      atmosphere: loud
  - id: vantucky_hidden_bunker
    title: Hidden Bunker
    description: 'A rusted hatch in the hillside opens to a concrete bunker from the

      Cold War era. Someone has restocked it with supplies and ammunition.

      The walls are lined with shelves of canned goods, water jugs, and

      medical supplies. A ham radio crackles with static in the corner.

      The air is stale but breathable.

      '
    danger_level: dangerous
    exits:
    - direction: west
      target: vantucky_burnt_bridge_creek
    map_x: 6
    map_y: 2
    spawns:
    - template: vantucky_scavenger
      count: 1
      respawn_after: 5m
    properties:
      lighting: emergency
      atmosphere: underground
  - id: vantucky_farm_compound
    title: Farm Compound
    description: 'A working farm surrounded by electric fence powered by solar panels.

      Raised beds of vegetables and a small orchard provide food for the

      nearby compounds. Armed farmers patrol the perimeter on ATVs.

      A grain elevator towers over the property, doubling as a lookout post.

      Chickens scratch in the dirt between rows of kale and potatoes.

      '
    danger_level: dangerous
    exits:
    - direction: south
      target: vantucky_compound_bravo
    - direction: east
      target: vantucky_water_tower
    map_x: 6
    map_y: -4
    spawns:
    - template: compound_guard
      count: 1
      respawn_after: 5m
    properties:
      lighting: open
      atmosphere: agricultural
  - id: vantucky_checkpoint_north
    title: Northern Checkpoint
    description: 'A militia checkpoint controls the road heading north toward the river.

      Concrete barriers force vehicles into a single lane. A hand-cranked

      gate blocks the passage. Guards check everyone coming through,

      demanding tolls or trade goods. A cage of rusted rebar serves as

      a holding cell for those who can''t pay.

      '
    danger_level: dangerous
    exits:
    - direction: south
      target: vantucky_andresen_road
    - direction: north
      target: vantucky_river_trail
    map_x: 2
    map_y: -2
    spawns:
    - template: vantucky_militiaman
      count: 2
      respawn_after: 5m
    properties:
      lighting: floodlit
      atmosphere: controlled
  - id: vantucky_river_trail
    title: Columbia River Trail
    description: 'A muddy trail follows the south bank of the Columbia River. The water

      is wide and grey, the Oregon shore barely visible through the mist.

      Driftwood and debris pile against the bank. Old boat launches are

      half-submerged in silt. The trail connects the checkpoint to the

      fishing camps at Fisher''s Landing.

      '
    danger_level: dangerous
    exits:
    - direction: south
      target: vantucky_checkpoint_north
    - direction: east
      target: vantucky_fishers_landing
    map_x: 2
    map_y: -4
    spawns:
    - template: highway_bandit
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: riverside
  - id: vantucky_i84_onramp
    title: I-84 On-Ramp
    description: 'The crumbling on-ramp curves up toward the interstate. Wrecked cars

      have been pushed to the shoulders, forming walls of rusted metal.

      Graffiti tags mark bandit territory. A burned-out RV sits at the

      top of the ramp, converted into a lookout post with a tarp roof

      and a collection of empty cans strung as an alarm system.

      '
    danger_level: dangerous
    exits:
    - direction: north
      target: vantucky_gas_station_ruins
    - direction: east
      target: vantucky_i84_overpass
    map_x: 0
    map_y: 4
    spawns:
    - template: highway_bandit
      count: 2
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: dangerous
  - id: vantucky_water_tower
    title: Water Tower
    description: 'A rusted municipal water tower rises above the treeline. The ladder

      is intact and leads to a platform with a panoramic view of the

      surrounding territory. Someone has bolted a sniper blind to the

      catwalk. Radio equipment is lashed to the railing with paracord.

      From here you can see the compounds, the highway, and the river.

      '
    danger_level: dangerous
    exits:
    - direction: west
      target: vantucky_farm_compound
    map_x: 8
    map_y: -4
    spawns:
    - template: vantucky_militiaman
      count: 1
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: elevated
  - id: vantucky_ammo_depot
    title: Ammo Depot
    description: 'A fortified storage building behind the shooting range serves as the

      militia''s ammunition depot. The cinderblock walls are reinforced with

      sandbags. Wooden crates stamped with military designations are stacked

      to the ceiling. A guard sits at a desk keeping meticulous inventory

      in a water-stained ledger.

      '
    danger_level: dangerous
    exits:
    - direction: north
      target: vantucky_shooting_range
    map_x: 8
    map_y: 2
    spawns:
    - template: compound_guard
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: secure
  - id: vantucky_trailer_park
    title: Trailer Park
    description: 'A sprawl of mobile homes in various states of decay. Some are occupied

      and fortified with plywood and sheet metal. Others are stripped to the

      frame. Laundry lines stretch between units. Children play in the dirt

      between trailers while adults keep watch from lawn chairs, weapons

      within reach. A communal fire pit smolders in the center.

      '
    danger_level: dangerous
    exits:
    - direction: north
      target: vantucky_gas_station_ruins
    - direction: east
      target: vantucky_burnt_bridge_creek
    - direction: south
      target: vantucky_overgrown_freeway
    map_x: 0
    map_y: 6
    spawns:
    - template: vantucky_gang_enforcer
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: residential
  - id: vantucky_the_compound
    title: The Compound
    description: "The Vantucky militia's main compound. Spare and functional. They'll trade, train, and bank here — loyalty is assumed, not enforced."
    exits:
    - direction: south
      target: vantucky_fourth_plain_west
    - direction: west
      target: vantucky_neutral_pawn
    map_x: 0
    map_y: -2
    spawns:
    - template: vantucky_merchant
      count: 1
      respawn_after: 0s
    - template: vantucky_healer
      count: 1
      respawn_after: 0s
    - template: vantucky_job_trainer
      count: 1
      respawn_after: 0s
    - template: vantucky_banker
      count: 1
      respawn_after: 0s
    - template: vantucky_hireling
      count: 1
      respawn_after: 0s
    properties:
      lighting: fluorescent
      atmosphere: military
  - id: vantucky_neutral_pawn
    title: Neutral Ground Pawn Shop
    description: 'A reinforced storefront with blacked-out windows and a hand-painted sign

      reading "NEUTRAL GROUND — NO WEAPONS DRAWN." The pawnbroker here enforces

      the rule with iron patience and a shotgun behind the counter. Factions

      set their grudges outside the door. Inside, salvaged goods change hands

      in relative peace. Tobacco smoke and the smell of machine oil hang

      in the air.

      '
    danger_level: safe
    exits:
    - direction: east
      target: vantucky_the_compound
    - direction: north
      target: vantucky_neutral_back
    map_x: -2
    map_y: -2
    properties:
      lighting: dim
      atmosphere: tense_neutral
  - id: vantucky_neutral_back
    title: Neutral Ground Back Room
    description: 'A cramped back room behind the pawn shop, used for private dealings and

      quiet conversations. A folding table holds a battery-powered lamp and a

      hand-drawn map of local territories. Mismatched chairs ring the table.

      Confidentiality is the only currency that matters here. Voices stay low

      and the door stays locked from the inside.

      '
    danger_level: safe
    exits:
    - direction: south
      target: vantucky_neutral_pawn
    - direction: east
      target: vantucky_neutral_vault
    map_x: -2
    map_y: -4
    properties:
      lighting: lamplight
      atmosphere: private
  - id: vantucky_neutral_vault
    title: Neutral Ground Vault
    description: 'A repurposed bank vault room at the rear of the building, its heavy steel

      door now serving as a clinic and chip removal suite. Marta "Needles" Voss

      keeps her tools clean and her mouth shut. The overhead light is surgical-bright,

      the floor scrubbed down to bare concrete. One chair, one table, one rule:

      no questions asked.

      '
    danger_level: safe
    exits:
    - direction: west
      target: vantucky_neutral_back
    map_x: 0
    map_y: -4
    spawns:
    - template: chip_doc_vantucky
      count: 1
      respawn_after: 0s
    properties:
      lighting: surgical
      atmosphere: clinical
  - id: vantucky_east_side
    title: East Side Strip
    description: 'A stretch of former retail corridor carved into gang turf. Spray-painted

      boundaries mark block-by-block control changes. Broken glass glitters

      on the asphalt. Lookouts watch from second-floor windows.

      The smell of burning trash drifts from alley drums.

      '
    danger_level: dangerous
    exits:
    - direction: west
      target: vantucky_164th_ave
    - direction: north
      target: vantucky_abandoned_mall
    map_x: 9
    map_y: 2
    spawns:
    - template: vantucky_gang_enforcer
      count: 1
      respawn_after: 5m
    - template: vantucky_scavenger
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: gang_territory
  - id: vantucky_abandoned_mall
    title: Abandoned Mall
    description: 'The skeleton of a mid-size shopping mall, its skylight long since shattered.

      Rain pools in the atrium between collapsed retail kiosks. Squatters

      have claimed the anchor stores, fortifying entrances with shopping carts

      welded together. Territorial markings cover every flat surface.

      The escalators are frozen mid-motion, steps used as seating.

      '
    danger_level: dangerous
    exits:
    - direction: south
      target: vantucky_east_side
    - direction: west
      target: vantucky_shooting_range
    map_x: 9
    map_y: 0
    spawns:
    - template: vantucky_gang_enforcer
      count: 2
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: derelict
  - id: vantucky_rail_spur
    title: Rail Spur Yard
    description: 'A short length of rail line terminates at a gravel yard behind the old

      industrial district. Rusted boxcars sit immovable on seized tracks.

      The cars have been claimed as shelters and ambush positions.

      Old rail equipment rots in sidings. The only thing moving here

      is trouble looking for someone to find.

      '
    danger_level: dangerous
    exits:
    - direction: north
      target: vantucky_ammo_depot
    map_x: 8
    map_y: 4
    spawns:
    - template: highway_bandit
      count: 1
      respawn_after: 5m
    - template: vantucky_scavenger
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: industrial
  - id: vantucky_river_cliffs
    title: River Cliffs
    description: 'Shale cliffs drop twenty feet to a rocky shoreline where the Columbia

      bends south. Wind scours the rim year-round. A rope ladder descends to

      a narrow beach used by smugglers making quick crossings. Carved footholds

      in the rock show centuries of use. The view is brutal and beautiful.

      '
    danger_level: dangerous
    exits:
    - direction: west
      target: vantucky_fishers_landing
    map_x: 7
    map_y: -4
    spawns:
    - template: highway_bandit
      count: 1
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: cliffside
  - id: vantucky_overgrown_freeway
    title: Overgrown Freeway
    description: 'A section of raised highway reclaimed by vegetation. Blackberry canes

      push through cracks in the asphalt, their vines draped across the median.

      Young alder trees have split the on-ramp shoulders. The road surface

      is treacherous and visibility is poor. Ambushers love it for exactly

      those reasons.

      '
    danger_level: dangerous
    exits:
    - direction: north
      target: vantucky_trailer_park
    - direction: east
      target: vantucky_i84_onramp
    map_x: 0
    map_y: 8
    spawns:
    - template: vantucky_scavenger
      count: 1
      respawn_after: 5m
    - template: highway_bandit
      count: 1
      respawn_after: 5m
    properties:
      lighting: dappled
      atmosphere: overgrown
