zone:
  id: felony_flats
  danger_level: dangerous
  world_x: 4
  world_y: 2
  script_dir: content/scripts/zones/felony_flats
  name: Felony Flats
  description: The sprawl of SE 82nd Avenue and its surrounding blocks — a wasteland of burned-out strip malls, fortified
    motels, and desperate survivors clinging to the hustle.
  start_room: flats_jade_district
  rooms:
  - id: flats_82nd_ave
    core: true
    title: 82nd Avenue
    description: 'The wide expanse of 82nd Avenue stretches north and south, cracked

      asphalt dotted with burned-out cars and improvised barricades.

      Strip malls line both sides, their signs shot out or stolen.

      This is the spine of Felony Flats — everything flows through here.

      The air smells of diesel smoke and something chemical.

      '
    exits:
    - direction: north
      target: flats_powell_blvd
    - direction: south
      target: flats_foster_road
    - direction: east
      target: flats_strip_mall_north
    - direction: west
      target: flats_motel_row
    - direction: northeast
      target: flats_gas_station
    map_x: 0
    map_y: 0
    spawns:
    - template: 82nd_enforcer
      count: 2
      respawn_after: 5m
    - template: strip_mall_scav
      count: 1
      respawn_after: 5m
    equipment:
    - item_id: zone_map
      max_count: 1
      respawn_after: 0s
      immovable: true
      script: zone_map_use
      description: Zone Map
      skill_checks:
      - skill: grift
        dc: 14
        trigger: on_use
        outcomes:
          crit_success:
            message: "The terminal's security bypass clicks over. You pull the full district layout."
          success:
            message: "The lock clicks. You're in — partial map data loads onto the screen."
          failure:
            message: "The terminal rejects your attempt. The interface locks you out."
            effect:
              type: deny
          crit_failure:
            message: "You fumble the bypass and trigger an alert. The terminal goes dark."
            effect:
              type: deny
    properties:
      lighting: overcast
      atmosphere: exhaust
  - id: flats_motel_row
    danger_level: sketchy
    title: Motel Row
    description: 'A line of single-story motels stretches along the block, their

      doors reinforced with plywood and sheet metal. Territorial markers

      in spray paint cover every surface. Laundry lines strung between

      rooms carry rags that might once have been clothes.

      Someone watches from behind a curtain on the second floor.

      '
    exits:
    - direction: east
      target: flats_82nd_ave
    - direction: west
      target: flats_motel_back_lot
    map_x: -2
    map_y: 0
    spawns:
    - template: motel_raider
      count: 2
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: hostile
  - id: flats_strip_mall_north
    danger_level: sketchy
    title: North Strip Mall
    description: 'A gutted strip mall with a collapsed awning. The old signage

      is unreadable beneath layers of graffiti. A nail salon, a pawn

      shop, and a check-cashing place — all stripped to the studs.

      Scavengers pick through what remains with practiced efficiency.

      '
    exits:
    - direction: west
      target: flats_82nd_ave
    - direction: south
      target: flats_strip_mall_south
    - direction: east
      target: flats_parking_lot_east
    map_x: 2
    map_y: 0
    spawns:
    - template: strip_mall_scav
      count: 2
      respawn_after: 5m
    skill_checks:
    - skill: parkour
      dc: 12
      trigger: on_enter
      outcomes:
        crit_success:
          message: "You vault the collapsed awning with practiced ease, landing clean on the far side."
        success:
          message: "You carefully pick your way through the debris, ducking under buckled metal."
        failure:
          message: "You stumble through the wreckage, scraping yourself on a jagged edge."
          effect:
            type: damage
            formula: "1d4"
        crit_failure:
          message: "You trip hard on a chunk of concrete and crash into the rubble."
          effect:
            type: damage
            formula: "2d4"
    properties:
      lighting: dim
      atmosphere: dusty
  - id: flats_strip_mall_south
    danger_level: sketchy
    title: South Strip Mall
    description: 'The southern half of the strip mall complex. A laundromat with

      shattered front windows stands next to a former dollar store.

      The dollar store has been converted into a crude sleeping quarters,

      its shelves rearranged into partitions. Rats scatter at your approach.

      '
    exits:
    - direction: north
      target: flats_strip_mall_north
    - direction: west
      target: flats_foster_road
    - direction: east
      target: flats_alley_east
    map_x: 2
    map_y: 2
    spawns:
    - template: strip_mall_scav
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: musty
  - id: flats_foster_road
    core: true
    title: Foster Road
    description: 'Foster Road cuts diagonally through the grid, lined with dead

      trees and collapsed power lines. The pavement is buckled from

      years of freeze-thaw without maintenance. A faded mural on a

      brick wall depicts a Portland that no longer exists.

      The road narrows as it heads south toward the edge of the zone.

      '
    exits:
    - direction: north
      target: flats_82nd_ave
    - direction: east
      target: flats_strip_mall_south
    - direction: south
      target: flats_foster_south
    - direction: west
      target: flats_apartments_west
    map_x: 0
    map_y: 2
    spawns:
    - template: 82nd_enforcer
      count: 2
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: wind
      terrain: difficult
  - id: flats_johnson_creek
    danger_level: sketchy
    title: Johnson Creek
    description: 'The overgrown banks of Johnson Creek form a hidden world beneath

      tangles of blackberry and alder. The water runs brown and slow.

      Makeshift camps are tucked into the brush — tarps and pallets

      arranged with survivalist ingenuity. Cookfire smoke drifts

      through the canopy like fog.

      '
    exits:
    - direction: north
      target: flats_lents_park
    map_x: 2
    map_y: 6
    spawns:
    - template: strip_mall_scav
      count: 1
      respawn_after: 5m
    properties:
      lighting: shaded
      atmosphere: damp
  - id: flats_powell_blvd
    core: true
    title: Powell Boulevard
    description: 'Powell Boulevard is wide and exposed, a six-lane killing field

      with no cover between the burned husks of fast-food restaurants.

      The wind whips down the corridor unimpeded. To the northwest,

      the faint outline of downtown rises through the haze.

      '
    exits:
    - direction: south
      target: flats_82nd_ave
    - direction: west
      target: flats_hawthorne_approach
    - direction: east
      target: flats_gas_station
    - direction: north
      target: flats_powell_overpass
    map_x: 0
    map_y: -2
    spawns:
    - template: 82nd_enforcer
      count: 2
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: wind
  - id: flats_lents_park
    danger_level: sketchy
    title: Lents Park
    description: 'What was once a neighborhood park is now an overgrown camp.

      The baseball diamond is a firepit circle. The playground equipment

      has been repurposed into drying racks and lookout platforms.

      Scavengers trade and barter here under an uneasy truce.

      '
    exits:
    - direction: south
      target: flats_johnson_creek
    - direction: west
      target: flats_foster_south
    map_x: 2
    map_y: 4
    spawns:
    - template: strip_mall_scav
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: smoke
  - id: flats_jade_district
    danger_level: safe
    title: Jade District
    description: 'The old Jade District still clings to life. Food stalls built

      from shipping containers serve mystery-meat skewers and rice

      cooked over propane burners. A hand-painted sign reads

      "TRADING POST — NO WEAPONS DRAWN." It is the closest thing

      to neutral ground in Felony Flats.

      '
    exits:
    - direction: west
      target: flats_powell_overpass
    - direction: north
      target: flats_safe_house
    - direction: east
      target: flats_jade_alley
    - direction: south
      target: flats_back_room
    map_x: 2
    map_y: -4
    spawns:
    - template: felony_flats_merchant
      count: 1
      respawn_after: 0s
    - template: chip_doc_felony_flats
      count: 1
      respawn_after: 0s
    properties:
      lighting: firelight
      atmosphere: smoke
  - id: flats_hawthorne_approach
    danger_level: sketchy
    title: Hawthorne Approach
    description: 'The road climbs westward toward the Hawthorne district and

      the distant towers of downtown. A crude checkpoint of stacked

      tires and razor wire marks the border between Felony Flats

      and the downtown core. Beyond it, different rules apply.

      '
    exits:
    - direction: east
      target: flats_powell_blvd
    - direction: northwest
      target: courthouse_steps
    map_x: -2
    map_y: -2
    properties:
      lighting: overcast
      atmosphere: tense
  - id: flats_foster_south
    danger_level: sketchy
    title: South Foster Road
    description: 'Foster Road fades into crumbling side streets at the southern

      edge of the flats. The buildings thin out, replaced by overgrown

      lots and rusted chain-link. Beyond lies the industrial sprawl

      of SE Portland. A hand-lettered sign warns: "YOU ARE LEAVING

      THE FLATS. GOOD LUCK."

      '
    exits:
    - direction: north
      target: flats_foster_road
    - direction: east
      target: flats_lents_park
    - direction: south
      target: sei_powell_terminus
    - direction: southeast
      target: flats_johnson_creek
    map_x: 0
    map_y: 4
    properties:
      lighting: overcast
      atmosphere: desolate
  - id: flats_motel_courtyard
    danger_level: sketchy
    title: Motel Courtyard
    description: 'A cracked concrete courtyard between two motel wings. A dead

      swimming pool serves as a garbage pit. Someone has strung

      christmas lights that no longer work between the balcony

      railings. The doors to several rooms stand open, dark inside.

      '
    exits: []
    map_x: -4
    map_y: 2
    spawns:
    - template: motel_raider
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: stale
    effects:
      - track: fear
        severity: mild
        base_dc: 10
        cooldown_rounds: 3
        cooldown_minutes: 5
  - id: flats_motel_back_lot
    danger_level: sketchy
    title: Motel Back Lot
    description: 'Behind the motel, a gravel lot is choked with stripped cars

      and overflowing dumpsters. A chain-link fence topped with

      concertina wire separates the lot from a drainage ditch.

      Shell casings glint in the gravel.

      '
    exits:
    - direction: south
      target: flats_motel_courtyard
    map_x: -4
    map_y: 0
    spawns:
    - template: motel_raider
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: quiet
  - id: flats_parking_lot_east
    danger_level: sketchy
    title: East Parking Lot
    description: 'A vast, empty parking lot stretches under the grey sky. Faded

      paint lines are barely visible. Shopping carts lie on their

      sides like dead animals. A watchtower cobbled from pallets

      and corrugated tin stands in the far corner.

      '
    exits:
    - direction: west
      target: flats_strip_mall_north
    - direction: south
      target: flats_alley_east
    map_x: 4
    map_y: 0
    spawns:
    - template: strip_mall_scav
      count: 1
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: open
  - id: flats_alley_east
    danger_level: sketchy
    title: East Alley
    description: 'A narrow alley runs behind the strip malls, hemmed in by

      cinderblock walls tagged with gang signs. Puddles of dark

      water fill the potholes. A fire escape ladder hangs just

      out of reach. The alley reeks of rot and old fires.

      '
    exits:
    - direction: north
      target: flats_parking_lot_east
    - direction: west
      target: flats_strip_mall_south
    - direction: south
      target: flats_lents_park
      hidden: true
    map_x: 4
    map_y: 2
    skill_checks:
    - skill: wasteland
      dc: 14
      trigger: on_enter
      outcomes:
        crit_success:
          message: "Your sharp eye catches a narrow gap between the cinderblock walls — a hidden passage leads south toward the park."
          effect:
            type: reveal
            target: south
        success:
          message: "Something catches your eye — there's a concealed passage squeezed between the walls to the south."
          effect:
            type: reveal
            target: south
        failure:
          message: "Nothing unusual catches your attention."
        crit_failure:
          message: "You're completely oblivious to your surroundings."
    properties:
      lighting: dark
      atmosphere: fetid
      terrain: difficult
  - id: flats_apartments_west
    danger_level: sketchy
    title: Western Apartments
    description: 'A block of three-story apartment buildings, their stucco facades

      crumbling and stained with water damage. Most windows are

      boarded. A few show candlelight. The front steps of each

      building are territorial boundaries — cross the wrong one

      and you will know it.

      '
    exits:
    - direction: east
      target: flats_foster_road
    map_x: -2
    map_y: 2
    spawns:
    - template: felony_flats_healer
      count: 1
      respawn_after: 0s
    properties:
      lighting: dim
      atmosphere: wary
  - id: flats_apartments_south
    danger_level: sketchy
    title: Southern Apartments
    description: 'Low-slung apartment complexes border the park, their parking

      lots converted to garden plots behind improvised fences.

      Laundry hangs from balcony railings. Children''s toys,

      sun-bleached and cracked, litter the concrete walkways.

      Life goes on, even here.

      '
    exits:
    - direction: west
      target: flats_pawn_shop
    - direction: north
      target: flats_convenience_store
    map_x: 202
    map_y: 0
    properties:
      lighting: overcast
      atmosphere: domestic
  - id: flats_gas_station
    danger_level: sketchy
    title: Abandoned Gas Station
    description: 'A gutted gas station with its canopy collapsed on one side.

      The pumps are long dry, but the concrete island makes decent

      cover. The convenience store attached has been cleaned out

      a hundred times over. Someone is living in the car wash bay.

      '
    exits:
    - direction: west
      target: flats_powell_blvd
    - direction: southwest
      target: flats_82nd_ave
    map_x: 2
    map_y: -2
    spawns:
    - template: strip_mall_scav
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: chemical
  - id: flats_powell_overpass
    core: true
    title: Powell Overpass
    description: 'A crumbling concrete overpass spans the old freight rail line.

      The guardrails are gone, stolen for scrap. From here you can

      see the full desolation of Felony Flats spread out in every

      direction — strip malls, motels, and parking lots stretching

      to the grey horizon.

      '
    exits:
    - direction: south
      target: flats_powell_blvd
    - direction: east
      target: flats_jade_district
    - direction: north
      target: flats_rail_yard
    map_x: 0
    map_y: -4
    spawns:
    - template: 82nd_enforcer
      count: 2
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: wind
    effects:
      - track: despair
        severity: mild
        base_dc: 11
        cooldown_rounds: 3
        cooldown_minutes: 5
  - id: flats_pawn_shop
    danger_level: sketchy
    title: Ruined Pawn Shop
    description: 'The pawn shop''s steel security gate is bent open like a tin can.

      Inside, empty display cases line the walls. The back room has

      been converted into a workshop — a grinding wheel, pliers,

      and scrap metal suggest someone is still making crude weapons

      here. The workbench is warm to the touch.

      '
    exits:
    - direction: east
      target: flats_apartments_south
    - direction: north
      target: flats_convenience_store
    map_x: 202
    map_y: 2
    spawns:
    - template: felony_flats_banker
      count: 1
      respawn_after: 0s
    - template: strip_mall_scav
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: metallic
  - id: flats_convenience_store
    danger_level: sketchy
    title: Looted Convenience Store
    description: 'A former convenience store with its front glass long gone.

      The shelves are bare except for dust and rat droppings.

      A hand-scrawled menu on the wall offers "clean water" and

      "mystery jerky" at outrageous prices. A surly figure stands

      behind the counter made of stacked milk crates.

      '
    exits:
    - direction: south
      target: flats_apartments_south
    - direction: west
      target: flats_pawn_shop
    map_x: 202
    map_y: 4
    spawns:
    - template: felony_flats_job_trainer
      count: 1
      respawn_after: 0s
    properties:
      lighting: dim
      atmosphere: commercial
  - id: flats_rail_yard
    danger_level: sketchy
    title: Abandoned Rail Yard
    description: 'Rusted freight cars sit on overgrown tracks, their doors hanging

      open. Some have been converted to shelters, their interiors

      partitioned with hanging blankets. The rail ballast crunches

      loudly underfoot, making stealth impossible. Crows line the

      tops of the cars like sentries.

      '
    exits:
    - direction: south
      target: flats_powell_overpass
    map_x: 0
    map_y: -6
    spawns:
    - template: motel_raider
      count: 2
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: rust
  - id: flats_crack_house_row
    core: true
    title: Crack House Row
    description: 'A block of condemned row houses, their windows dark and boarded.

      Chemical reek hangs in the air — burnt plastic and something
      sweet underneath. Lookouts perch on the stoops, eyes tracking
      every movement on the street. This is prime territory, earned
      in blood and held the same way.

      '
    exits:
    - direction: west
      target: flats_82nd_ave
    - direction: north
      target: flats_enforcer_den
    map_x: 2
    map_y: 0
    spawns:
    - template: crack_house_dealer
      count: 2
      respawn_after: 5m
    - template: 82nd_enforcer
      count: 1
      respawn_after: 5m
    properties:
      lighting: dark
      atmosphere: chemical
  - id: flats_enforcer_den
    core: true
    title: Enforcer Den
    description: 'A fortified storefront with steel-plate shutters and a reinforced

      door. Inside, the enforcers who run this block gather between
      shifts — cards, weapons maintenance, and the low hum of
      territorial tension. The walls are papered with warning
      flyers and wanted faces.

      '
    exits:
    - direction: south
      target: flats_crack_house_row
    - direction: east
      target: flats_rail_yard
    map_x: 2
    map_y: -2
    spawns:
    - template: flats_enforcer_captain
      count: 2
      respawn_after: 10m
    - template: 82nd_enforcer
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: hostile
  - id: flats_alley_north
    danger_level: sketchy
    title: North Alley
    description: 'A narrow service alley cuts behind the northern storefronts.

      Dumpsters overflow with refuse, and the concrete is stained

      dark with old spills. A broken fire escape hangs overhead,

      its lowest rung just out of reach. The alley connects the

      main boulevard to the quieter streets beyond.

      '
    exits:
    - direction: south
      target: flats_powell_blvd
    - direction: east
      target: flats_gas_station
    map_x: -2
    map_y: -2
    spawns:
    - template: strip_mall_scav
      count: 1
      respawn_after: 5m
    properties:
      lighting: dark
      atmosphere: fetid
  - id: flats_dumpster_yard
    danger_level: sketchy
    title: Dumpster Yard
    description: 'A chain-link enclosure behind a gutted supermarket, packed

      with industrial dumpsters. The smell is eye-watering. Rats

      the size of cats move between the containers without fear.

      Scavengers work the bins methodically, cataloguing whatever

      the strip malls discarded before the collapse.

      '
    exits:
    - direction: north
      target: flats_strip_mall_south
    - direction: west
      target: flats_alley_east
    map_x: 4
    map_y: 4
    spawns:
    - template: strip_mall_scav
      count: 2
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: rot
  - id: flats_mechanic_lot
    danger_level: sketchy
    title: Mechanic Lot
    description: 'A former auto repair shop, its bays open to the street.

      Stripped vehicles in various states of disassembly fill every

      space. The mechanics here work on anything — vehicles, weapons,

      or the occasional prosthetic. They do not ask about provenance.

      A pit bull sleeps under a rusted hood.

      '
    exits:
    - direction: east
      target: flats_foster_road
    - direction: north
      target: flats_motel_row
    map_x: -2
    map_y: 2
    spawns:
    - template: motel_raider
      count: 1
      respawn_after: 5m
    - template: felony_flats_fixer
      count: 1
      respawn_after: 0s
    properties:
      lighting: overcast
      atmosphere: grease
  - id: flats_safe_house
    danger_level: safe
    title: Safe House
    description: 'A reinforced apartment unit above a shuttered laundry. The

      door is unmarked — known only by word of mouth. Inside,

      mismatched furniture and a working lock provide the rarest

      commodity in Felony Flats: genuine security. People come

      here to breathe, to plan, and to recover.

      '
    exits:
    - direction: south
      target: flats_jade_district
    map_x: 2
    map_y: -6
    spawns:
    - template: felony_flats_job_trainer
      count: 1
      respawn_after: 0s
    properties:
      lighting: dim
      atmosphere: quiet
  - id: flats_back_room
    danger_level: safe
    title: Back Room
    description: 'A windowless room behind the Jade District trading post.

      The walls are hung with salvaged acoustic foam. A single bare

      bulb on a battery pack provides light. Deals are struck here

      that never appear in any ledger. The fixer keeps an eye on

      who comes in and who leaves.

      '
    exits:
    - direction: north
      target: flats_jade_district
    map_x: 2
    map_y: -2
    spawns:
    - template: felony_flats_banker
      count: 1
      respawn_after: 0s
    properties:
      lighting: dim
      atmosphere: close
  - id: flats_jade_alley
    danger_level: safe
    title: Jade District Alley
    description: 'A narrow passage running east of the Jade District trading

      post. Herb bundles and drying laundry hang overhead. The

      herbalist keeps her workspace here — mortar and pestle, jars

      of dried plants, and a camp stove. The smell of ginger and

      something medicinal cuts through the usual Flats stench.

      '
    exits:
    - direction: west
      target: flats_jade_district
    map_x: 4
    map_y: -4
    spawns:
    - template: felony_flats_healer
      count: 1
      respawn_after: 0s
    properties:
      lighting: firelight
      atmosphere: herbal
