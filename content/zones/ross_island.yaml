zone:
  id: ross_island
  danger_level: dangerous
  world_x: 0
  world_y: 2
  script_dir: content/scripts/zones/ross_island
  name: Ross Island
  description: A small fortress island in the Willamette, dominated by a massive gravel pit and ringed by overgrown forest.
    Bridge toll gangs control access while hermits haunt the interior.
  start_room: ross_dock_shack
  rooms:
  - id: ross_bridge_east
    title: Ross Island Bridge — East Landing
    description: 'The western end of the Ross Island Bridge touches down on cracked

      concrete pilings sunk into the island''s eastern shore. The bridge

      deck behind you is a gauntlet of missing sections and buckled steel.

      Ahead, a crude barricade of wrecked cars and chain-link fencing

      funnels all traffic toward a toll gate. Spray-painted warnings

      promise violence to anyone who runs the checkpoint.

      '
    exits:
    - direction: north
      target: sei_ross_bridge_approach
    - direction: west
      target: ross_toll_gate
    - direction: south
      target: ross_east_shore
    - direction: east
      target: ross_dock_shack
    danger_level: dangerous
    map_x: 0
    map_y: 0
    equipment:
    - item_id: zone_map
      max_count: 1
      respawn_after: 0s
      immovable: true
      script: zone_map_use
      description: Zone Map
    spawns:
    - template: bridge_troll
      count: 1
      respawn_after: 30m
    properties:
      lighting: exposed
      atmosphere: wind
  - id: ross_toll_gate
    title: Toll Gate
    description: 'A ramshackle checkpoint blocks the road west. Corrugated metal

      walls funnel travelers through a narrow gap where a heavy chain

      can be dropped at a moment''s notice. Toll prices are scratched

      into a sheet of plywood — the rates change daily, always upward.

      Dented toll tokens litter the mud at your feet.

      '
    exits:
    - direction: east
      target: ross_bridge_east
    - direction: west
      target: ross_bridge_road
    - direction: south
      target: ross_shoreline_path
    danger_level: dangerous
    map_x: -2
    map_y: 0
    spawns:
    - template: bridge_troll
      count: 2
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: tense
  - id: ross_bridge_road
    title: Bridge Road
    description: 'A potholed road cuts west from the toll gate into the island''s

      interior. Rusted guardrails line one side; the other drops away

      to a tangle of blackberry brambles and collapsed retaining walls.

      Tire tracks in the mud suggest regular traffic — the gravel pit

      still draws workers and scavengers alike.

      '
    exits:
    - direction: east
      target: ross_toll_gate
    - direction: west
      target: ross_pit_edge
    - direction: south
      target: ross_the_overgrowth
    danger_level: dangerous
    map_x: -4
    map_y: 0
    spawns:
    - template: bridge_troll
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: muddy
  - id: ross_east_shore
    title: East Shore
    description: 'A narrow strip of gravel and driftwood lines the island''s

      eastern bank. The Willamette slides past, grey and cold.

      Bridge pilings rise overhead like the legs of some concrete

      giant. Small fires have been lit here recently — charred

      circles mark where someone cooked river fish.

      '
    danger_level: dangerous
    exits:
    - direction: north
      target: ross_bridge_east
    - direction: south
      target: ross_south_shore
    - direction: west
      target: ross_shoreline_path
    map_x: 0
    map_y: 2
    spawns:
    - template: ross_salvager
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: damp
  - id: ross_shoreline_path
    title: Shoreline Path
    description: 'A muddy trail follows the island''s southern perimeter, weaving

      between riverside willows and heaps of industrial debris. The

      water is close enough to touch. Old tires and shopping carts

      protrude from the shallows. The path is well-worn — hermits

      use it to move unseen between the shore and the interior.

      '
    danger_level: dangerous
    exits:
    - direction: north
      target: ross_toll_gate
    - direction: east
      target: ross_east_shore
    - direction: south
      target: ross_tidal_pool
    map_x: -2
    map_y: 2
    spawns:
    - template: island_hermit
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: damp
  - id: ross_south_shore
    title: South Shore
    description: 'The island''s southern bank faces the open river. The current

      is strong here, churning around exposed rocks and half-submerged

      logs. A crude dock made of lashed pallets extends a few meters

      into the water. Someone has tied a rowboat to it — the oars

      are missing, but the hull looks sound enough.

      '
    danger_level: dangerous
    exits:
    - direction: north
      target: ross_east_shore
    - direction: west
      target: ri_south_shore
    map_x: 0
    map_y: 4
    spawns:
    - template: gang_enforcer
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: river
  - id: ross_tidal_pool
    title: Tidal Pool
    description: 'A depression in the rocky shore traps river water at low tide,

      creating a murky pool teeming with crawdads and small fish.

      The rocks around the edge are slick with algae. Hermits have

      laid crude fish traps here — woven baskets weighted with stones.

      The smell of brine and decay hangs in the still air.

      '
    danger_level: dangerous
    exits:
    - direction: north
      target: ross_shoreline_path
    - direction: west
      target: ross_driftwood_camp
    map_x: -2
    map_y: 4
    spawns:
    - template: island_hermit
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: brackish
  - id: ross_driftwood_camp
    title: Driftwood Camp
    description: 'A makeshift shelter built from driftwood and river debris clings

      to the southwestern shore. Tarps stretched over leaning timbers

      create a low ceiling. Inside, bedrolls and tin cans suggest

      several people live here. A fire pit smolders with damp coals.

      Fishing lines trail from stakes driven into the bank.

      '
    danger_level: dangerous
    exits:
    - direction: east
      target: ross_tidal_pool
    map_x: -4
    map_y: 4
    spawns:
    - template: island_hermit
      count: 1
      respawn_after: 5m
    properties:
      lighting: firelight
      atmosphere: smoke
  - id: ross_the_overgrowth
    title: The Overgrowth
    description: 'The island''s interior is choked with vegetation gone feral.

      Blackberry canes form impenetrable walls. Ivy has swallowed

      whole structures — only corners and rooflines hint at what

      lies beneath. The canopy overhead blocks most light, creating

      a green twilight. Movement in the undergrowth could be rats,

      could be something larger.

      '
    danger_level: dangerous
    exits:
    - direction: north
      target: ross_bridge_road
    map_x: -4
    map_y: 2
    spawns:
    - template: island_hermit
      count: 2
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: overgrown
  - id: ross_the_hermitage
    title: The Hermitage
    description: 'Hidden deep in the overgrowth, a clearing has been carved from

      the brambles. Lean-tos built against a crumbling concrete wall

      form a small compound. Wind chimes made of scrap metal and bone

      hang from the branches. The hermits here trade in river fish,

      salvage, and rumors. They trust no one from the bridge.

      '
    danger_level: dangerous
    exits:
    - direction: north
      target: ross_cave_entrance
    map_x: -8
    map_y: 2
    spawns:
    - template: island_hermit
      count: 2
      respawn_after: 5m
    properties:
      lighting: sheltered
      atmosphere: quiet
  - id: ross_cave_entrance
    title: Cave Entrance
    description: 'A narrow opening in a moss-covered rock face leads into darkness.

      The stone around the entrance is scored with old tool marks —

      this was once part of the quarry operation. Cool air flows out,

      carrying the smell of damp earth and standing water. Hermit

      markings scratched into the rock warn outsiders away.

      '
    danger_level: dangerous
    exits:
    - direction: south
      target: ross_the_hermitage
    - direction: down
      target: ross_cave_interior
    - direction: east
      target: ross_pit_edge
    map_x: -8
    map_y: 0
    spawns:
    - template: island_hermit
      count: 1
      respawn_after: 5m
    properties:
      lighting: dark
      atmosphere: damp
  - id: ross_cave_interior
    title: Cave Interior
    description: 'The cave opens into a low chamber carved from compressed gravel

      and sandstone. Water drips from the ceiling, pooling in shallow

      depressions. Old mining equipment rusts in the corners — picks,

      buckets, a section of rail track going nowhere. Someone has

      stacked supplies against the far wall under a sheet of plastic.

      '
    danger_level: dangerous
    exits:
    - direction: up
      target: ross_cave_entrance
    map_x: 202
    map_y: 0
    spawns:
    - template: island_hermit
      count: 1
      respawn_after: 5m
    properties:
      lighting: dark
      atmosphere: damp
  - id: ross_rubble_ridge
    title: Rubble Ridge
    description: 'A long spine of heaped gravel and broken concrete rises above

      the tree line, offering a commanding view of the island and

      the river beyond. To the west, the gravel pit yawns open.

      To the east, the bridge stretches toward SE Industrial.

      The wind is fierce up here, whipping grit into your eyes.

      Lookout posts made of stacked debris dot the ridgeline.

      '
    danger_level: dangerous
    exits:
    - direction: north
      target: ross_pit_edge
    - direction: down
      target: ross_quarry_floor
    map_x: -6
    map_y: 2
    spawns:
    - template: gang_enforcer
      count: 1
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: wind
  - id: ross_pit_edge
    title: Pit Edge
    description: 'You stand at the rim of the Ross Island gravel pit, a vast

      excavation that dominates the island''s center. The walls drop

      away steeply — fifty feet of layered sediment and exposed rock.

      Heavy machinery rusts at the bottom. A switchback road carved

      into the pit wall provides the only vehicle access. The scale

      of the operation is staggering, even in ruin.

      '
    exits:
    - direction: east
      target: ross_bridge_road
    - direction: south
      target: ross_rubble_ridge
    - direction: down
      target: ross_gravel_pit
    - direction: west
      target: ross_cave_entrance
    - direction: north
      target: ross_north_shore
    danger_level: dangerous
    map_x: -6
    map_y: 0
    spawns:
    - template: gravel_pit_boss
      count: 1
      respawn_after: 30m
    properties:
      lighting: overcast
      atmosphere: industrial
  - id: ross_gravel_pit
    title: Gravel Pit
    description: 'The massive excavation is a world unto itself. Terraced walls

      of grey stone and compacted earth rise on all sides. At the

      center, a cluster of prefab buildings serves as the pit boss''s

      domain — part office, part throne room. Workers sort gravel

      by hand, filling buckets that get hauled up the switchback

      road. The operation is brutal but functional.

      '
    exits:
    - direction: up
      target: ross_pit_edge
    - direction: south
      target: ross_quarry_floor
    - direction: east
      target: ross_crane_platform
    - direction: west
      target: ross_lagoon
    danger_level: dangerous
    map_x: 202
    map_y: 2
    spawns:
    - template: gravel_pit_boss
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: industrial
  - id: ross_quarry_floor
    title: Quarry Floor
    description: 'The lowest point of the pit is a flat expanse of crushed stone

      and standing water. Mining carts sit on rusted tracks that go

      nowhere. The walls tower overhead, cutting off the wind but

      trapping the cold. Workers chip at the rock face with hand

      tools, filling bags of aggregate for the pit boss''s trade

      caravans. The work never stops.

      '
    danger_level: dangerous
    exits:
    - direction: north
      target: ross_gravel_pit
    - direction: up
      target: ross_rubble_ridge
    - direction: west
      target: ross_lagoon
    map_x: 202
    map_y: 4
    spawns:
    - template: gravel_pit_boss
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: cold
  - id: ross_lagoon
    title: Lagoon
    description: 'The western section of the pit has flooded, creating a murky

      lagoon fed by groundwater seepage and rain. The water is

      surprisingly deep — the bottom drops away quickly from the

      gravel shore. Fish thrive here, drawn by the insects that

      breed in the still water. Hermits fish from the banks with

      handmade rods, tolerated by the pit boss for the food they

      provide.

      '
    danger_level: dangerous
    exits:
    - direction: east
      target: ross_gravel_pit
    - direction: south
      target: ross_quarry_floor
    map_x: 202
    map_y: 6
    spawns:
    - template: ross_salvager
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: still
  - id: ross_crane_platform
    title: Crane Platform
    description: 'A rusted construction crane stands frozen mid-swing, its boom

      extended over the pit. The operator''s cab is accessible via

      a ladder welded to the support tower. The platform at its base

      is reinforced concrete, one of the few solid surfaces in the

      pit. Crates of sorted gravel are stacked here, awaiting

      transport that may never come.

      '
    danger_level: dangerous
    exits:
    - direction: west
      target: ross_gravel_pit
    - direction: north
      target: ross_pit_edge
    map_x: 202
    map_y: 8
    spawns:
    - template: gang_enforcer
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: industrial
  - id: ross_north_shore
    title: North Shore
    description: 'The island''s northern bank faces downtown Portland across the

      grey expanse of the Willamette. The ruined skyline is visible

      through the rain — shattered towers and collapsed overpasses.

      From here it looks almost peaceful, if you squint. The shore

      is rocky and exposed, battered by the river current. A few

      rotting pilings mark where a ferry dock once stood.

      '
    danger_level: dangerous
    exits:
    - direction: south
      target: ross_pit_edge
    - direction: west
      target: ross_west_shore
    - direction: east
      target: ri_willamette_overlook
    map_x: -6
    map_y: -2
    spawns:
    - template: gang_enforcer
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: wind
  - id: ross_west_shore
    title: West Shore
    description: 'The western tip of the island narrows to a rocky point where

      the current splits around the landmass. Driftwood accumulates

      in massive tangles against the rocks. The river is at its

      widest here, and the far bank is a dark line of trees and

      industrial ruins. A narrow causeway of exposed rocks and

      sandbars leads toward Hardtack Island at low water.

      '
    danger_level: dangerous
    exits:
    - direction: east
      target: ross_north_shore
    - direction: west
      target: ross_hardtack_island
    - direction: south
      target: ri_east_bank
    map_x: -8
    map_y: -2
    spawns:
    - template: ross_salvager
      count: 1
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: wind
  - id: ross_hardtack_island
    title: Hardtack Island
    description: 'A tiny satellite island barely above the waterline, connected

      to Ross Island by a shifting sandbar. Scrubby trees and tall

      grass cover the hump of land. The remains of a campsite —

      fire ring, scattered cans, a collapsed tent — suggest someone

      lived here once. The isolation is absolute. The river surrounds

      you on all sides, grey and indifferent.

      '
    danger_level: dangerous
    exits:
    - direction: east
      target: ross_west_shore
    map_x: -10
    map_y: -2
    spawns:
    - template: island_hermit
      count: 1
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: isolated
  - id: ross_dock_shack
    title: Dock Shack
    description: "A weathered shack at the island's main landing. Nets hang on the walls, a woodstove burns in the corner, and someone is always willing to do business."
    exits:
    - direction: west
      target: ross_bridge_east
    - direction: east
      target: ri_neutral_dock
    map_x: 2
    map_y: 0
    spawns:
    - template: ross_island_merchant
      count: 1
      respawn_after: 0s
    - template: ross_island_healer
      count: 1
      respawn_after: 0s
    - template: ross_island_job_trainer
      count: 1
      respawn_after: 0s
    - template: ross_island_banker
      count: 1
      respawn_after: 0s
    - template: ross_island_hireling
      count: 1
      respawn_after: 0s
    properties:
      lighting: firelight
      atmosphere: commerce
  - id: ri_neutral_dock
    title: Neutral Dock
    description: 'A weathered wooden dock extends into a sheltered cove on the

      island''s eastern edge. The planks are warped but solid. Rope

      lines hang from iron cleats, and a hand-painted sign reads

      "NO WEAPONS DRAWN." Small skiffs bob in the calm water.

      Traders and travelers use this dock as common ground.

      '
    danger_level: safe
    exits:
    - direction: west
      target: ross_dock_shack
    - direction: north
      target: ri_neutral_shack
    - direction: east
      target: ri_neutral_cache
    map_x: 4
    map_y: 0
    properties:
      lighting: overcast
      atmosphere: calm
  - id: ri_neutral_shack
    title: Neutral Shack
    description: 'A low-slung shack built from salvaged lumber sits on pilings

      above the waterline. A hand-drawn truce flag — white cloth

      on a bamboo pole — hangs from the eaves. Inside, mismatched

      chairs ring a driftwood table where strangers share meals

      without asking questions. A rain barrel catches water at

      each corner.

      '
    danger_level: safe
    exits:
    - direction: south
      target: ri_neutral_dock
    - direction: east
      target: ri_neutral_cache
    map_x: 4
    map_y: -2
    properties:
      lighting: sheltered
      atmosphere: quiet
  - id: ri_neutral_cache
    title: Neutral Cache
    description: 'A reinforced storage room hidden beneath the neutral shack,

      accessible through a trapdoor. Shelves hold preserved food,

      medical supplies, and the tools of survival. Doc Ferra has

      claimed a corner for her equipment — a battered case, a

      folding chair, and a lamp. The gang truce holds here by

      mutual fear of losing the resource.

      '
    danger_level: safe
    exits:
    - direction: west
      target: ri_neutral_dock
    - direction: north
      target: ri_neutral_shack
    map_x: 6
    map_y: -2
    spawns:
    - template: chip_doc_ross_island
      count: 1
      respawn_after: 0s
    properties:
      lighting: dim
      atmosphere: sheltered
  - id: ri_south_shore
    title: Southern Inlet Shore
    description: 'A rocky stretch of shore along the island''s southern inlet,

      where the river current slows in a shallow backwater. Exposed

      gravel bars emerge at low water. Gang scouts use the high

      bank above as a firing position — the rocks below are

      painted with the territorial marks of three different crews.

      '
    danger_level: dangerous
    exits:
    - direction: east
      target: ross_south_shore
    - direction: west
      target: ri_gravel_pit_deep
    map_x: -2
    map_y: 6
    spawns:
    - template: gang_enforcer
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: river
  - id: ri_east_bank
    title: East Bank Outcrop
    description: 'A jutting shelf of basalt on the island''s eastern flank,

      scoured smooth by decades of river current. The drop to the

      water is sheer. Salvagers use ropes and pulleys anchored

      to iron spikes to lower equipment to the riverbank below.

      Fresh blood on the rocks suggests the spot was contested

      recently.

      '
    danger_level: dangerous
    exits:
    - direction: north
      target: ross_west_shore
    - direction: south
      target: ri_gravel_pit_deep
    map_x: -8
    map_y: 1
    spawns:
    - template: ross_salvager
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: exposed
  - id: ri_gravel_pit_deep
    title: Gravel Pit Deep Cut
    description: 'The deepest excavated section of the gravel pit extends further

      west than the main operation, hidden from above by an overhang

      of compacted sediment. Water pools in tire ruts. Rusted

      conveyor belt segments lie tangled in the mud. The walls here

      are close enough to touch on both sides.

      '
    danger_level: dangerous
    exits:
    - direction: east
      target: ri_south_shore
    - direction: north
      target: ri_east_bank
    - direction: west
      target: ri_dredge_ruins
    map_x: -6
    map_y: 6
    spawns:
    - template: gravel_pit_boss
      count: 1
      respawn_after: 5m
    - template: gang_enforcer
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: industrial
  - id: ri_dredge_ruins
    title: Dredge Ruins
    description: 'The rusted skeleton of an old river dredge rests half-submerged

      in the shallows, dragged here decades ago when the operation

      shut down. Its superstructure has collapsed, but the hull

      remains above water at all but the highest river stages.

      Salvagers have stripped most of the valuable metal. What

      remains is contested turf.

      '
    danger_level: dangerous
    exits:
    - direction: east
      target: ri_gravel_pit_deep
    - direction: north
      target: ri_channel_crossing
    map_x: -8
    map_y: 6
    spawns:
    - template: ross_salvager
      count: 1
      respawn_after: 5m
    - template: island_hermit
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: decay
  - id: ri_channel_crossing
    title: Channel Crossing
    description: 'A narrow channel separates Ross Island from a gravel bar to

      the north. At low water, it is knee-deep and crossable with

      care. At flood stage, the current is lethal. Gang enforcers

      guard the crossing point, charging passage to anyone who

      wants to cross. The gravel bar beyond is contested territory.

      '
    danger_level: dangerous
    exits:
    - direction: south
      target: ri_dredge_ruins
    - direction: east
      target: ri_willamette_overlook
    map_x: -8
    map_y: -4
    spawns:
    - template: gang_enforcer
      count: 2
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: river
  - id: ri_willamette_overlook
    title: Willamette Overlook
    description: 'A flat rock shelf elevated above the northern shore gives an

      unobstructed view up and down the Willamette. The ruined

      bridges to the north are framed against the sky. Salvagers

      use this point to watch for river traffic — boats mean

      trade or raiders, and knowing which is worth the climb.

      Spent shell casings litter the ground near a low stone wall

      used as a firing rest.

      '
    danger_level: dangerous
    exits:
    - direction: west
      target: ri_channel_crossing
    - direction: south
      target: ross_north_shore
    map_x: -4
    map_y: -4
    spawns:
    - template: ross_salvager
      count: 1
      respawn_after: 5m
    - template: gang_enforcer
      count: 1
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: wind
