zone:
  id: battleground
  danger_level: all_out_war
  world_x: 4
  world_y: -6
  script_dir: content/scripts/zones/battleground
  name: Battleground Socialist Collective
  description: A fortified commune carved from the ruins of old Battleground, where collective labor and ideological discipline
    hold back the wasteland. Whether utopia or prison depends on whom you ask.
  start_room: battle_infirmary
  rooms:
  - id: battle_i5_south
    danger_level: safe
    title: I-5 Southbound On-Ramp
    description: 'The cracked asphalt of the old interstate on-ramp marks the southern

      boundary of the collective''s territory. Concrete jersey barriers

      have been arranged into a crude checkpoint. Red banners snap in the

      wind overhead, bearing the collective''s hammer-and-wheat emblem.

      To the south, the road descends toward The Couve.

      '
    exits:
    - direction: south
      target: couve_i5_north
      zone: couve
    - direction: north
      target: battle_the_gate
    map_x: 0
    map_y: 0
    equipment:
    - item_id: zone_map
      max_count: 1
      respawn_after: 0s
      immovable: true
      script: zone_map_use
      description: Zone Map
    spawns:
    - template: collective_guardian
      count: 2
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: wind
  - id: battle_the_gate
    danger_level: dangerous
    title: The Gate
    description: 'A reinforced barricade of welded car frames and corrugated steel

      blocks the road. A narrow passage forces single-file entry under

      the watchful eyes of armed guardians perched on platforms above.

      Hand-painted signs read: ALL PROPERTY IS COLLECTIVE PROPERTY.

      WEAPONS WILL BE INSPECTED.

      '
    exits:
    - direction: south
      target: battle_i5_south
    - direction: north
      target: battle_main_street
    map_x: 0
    map_y: -2
    spawns:
    - template: collective_guardian
      count: 2
      respawn_after: 5m
    - template: battleground_guard
      count: 1
      respawn_after: 0s
    properties:
      lighting: overcast
      atmosphere: tense
  - id: battle_main_street
    danger_level: dangerous
    title: Main Street
    description: 'The central avenue of the collective stretches north, lined with

      repurposed storefronts now serving communal functions. The pavement

      has been swept clean — a rarity in the wasteland. Propaganda posters

      cover every available surface, exhorting unity and labor. Citizens

      move with purpose, eyes forward, speaking in low tones.

      '
    exits:
    - direction: south
      target: battle_the_gate
    - direction: north
      target: battle_market_square
    - direction: east
      target: battle_assembly_hall
    - direction: west
      target: battle_the_commons
    map_x: 0
    map_y: -4
    spawns:
    - template: collective_guardian
      count: 2
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: orderly
  - id: battle_assembly_hall
    danger_level: dangerous
    title: Assembly Hall
    description: 'A converted high school gymnasium serves as the collective''s

      political heart. Rows of folding chairs face a raised platform

      where a lectern stands beneath an enormous red banner. The walls

      are lined with portraits of the collective''s founders, their

      painted eyes seeming to follow you. A schedule board lists

      mandatory attendance sessions.

      '
    exits:
    - direction: west
      target: battle_main_street
    map_x: 2
    map_y: -4
    spawns:
    - template: commissar
      count: 1
      respawn_after: 5m
    - template: collective_guardian
      count: 1
      respawn_after: 5m
    properties:
      lighting: fluorescent
      atmosphere: echo
  - id: battle_the_commons
    danger_level: dangerous
    title: The Commons
    description: 'Long wooden tables fill a repurposed restaurant, where the

      collective takes its meals together. The air is heavy with the

      smell of boiled grain and root vegetables. A serving line dispenses

      identical portions from dented steel containers. No one eats alone.

      No one eats more than their share.

      '
    exits:
    - direction: east
      target: battle_main_street
    - direction: south
      target: battle_infirmary
    map_x: -2
    map_y: -4
    spawns:
    - template: collective_guardian
      count: 2
      respawn_after: 5m
    properties:
      lighting: warm
      atmosphere: crowded
  - id: battle_market_square
    danger_level: dangerous
    title: Market Square
    description: 'An open square where the collective''s surplus goods are distributed

      according to need — or at least according to the commissariat''s

      assessment of need. Requisition forms are stacked on a folding table.

      A chalkboard lists available items and their labor-credit costs.

      Private trade is forbidden, but whispers suggest otherwise.

      '
    exits:
    - direction: south
      target: battle_main_street
    - direction: east
      target: battle_propaganda_hall
    - direction: north
      target: battle_farm_east
    - direction: west
      target: battle_armory
    map_x: 0
    map_y: -6
    spawns:
    - template: battleground_merchant
      count: 1
      respawn_after: 0s
    - template: collective_guardian
      count: 2
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: busy
  - id: battle_propaganda_hall
    danger_level: dangerous
    title: Propaganda Hall
    description: 'The walls of this former church are covered floor to ceiling with

      murals depicting the collective''s idealized vision: workers united,

      fields golden, enemies vanquished. A printing press in the corner

      churns out pamphlets. The smell of fresh ink fills the air.

      A loudspeaker mounted above the door crackles with recorded speeches.

      '
    exits:
    - direction: west
      target: battle_market_square
    - direction: north
      target: battle_the_commissariat
    map_x: 2
    map_y: -6
    spawns:
    - template: commissar
      count: 1
      respawn_after: 5m
    - template: collective_guardian
      count: 1
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: reverent
    effects:
      - track: rage
        severity: mild
        base_dc: 12
        cooldown_rounds: 3
        cooldown_minutes: 5
  - id: battle_the_commissariat
    danger_level: dangerous
    title: The Commissariat
    description: 'The administrative nerve center of the collective occupies a

      fortified brick building. Filing cabinets line every wall, stuffed

      with labor reports, production quotas, and citizen dossiers.

      A large map of the territory bristles with colored pins.

      The commissars who work here hold the collective''s true power.

      '
    exits:
    - direction: north
      target: battle_reeducation_center
    - direction: east
      target: battle_commissar_hq
    map_x: 2
    map_y: -8
    spawns:
    - template: commissar
      count: 1
      respawn_after: 5m
    - template: collective_guardian
      count: 1
      respawn_after: 5m
    properties:
      lighting: fluorescent
      atmosphere: bureaucratic
  - id: battle_reeducation_center
    danger_level: dangerous
    title: Reeducation Center
    description: 'A squat concrete building with barred windows and a heavy steel

      door. The official name is painted in cheerful yellow letters above

      the entrance: CENTER FOR IDEOLOGICAL ALIGNMENT. From within come

      the muffled sounds of recited slogans. No one speaks of what

      happens to those who fail to graduate.

      '
    exits:
    - direction: south
      target: battle_the_commissariat
    - direction: north
      target: battle_reeducation_block
    - direction: east
      target: battle_outer_perimeter_east
    map_x: 2
    map_y: -10
    spawns:
    - template: collective_guardian
      count: 1
      respawn_after: 5m
    - template: commissar
      count: 1
      respawn_after: 5m
    properties:
      lighting: harsh
      atmosphere: oppressive
  - id: battle_worker_barracks
    danger_level: dangerous
    title: Worker Barracks
    description: 'Rows of identical cots stretch through a converted warehouse.

      Each sleeping space is allotted exactly two meters of width.

      Personal belongings are stored in small footlockers — inspected

      weekly. A duty roster posted by the door assigns every hour of

      the day. Privacy is a bourgeois luxury.

      '
    exits:
    - direction: east
      target: battle_market_square
    - direction: north
      target: battle_greenhouse
    map_x: 202
    map_y: 16
    spawns:
    - template: collective_guardian
      count: 2
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: stale
  - id: battle_armory
    danger_level: dangerous
    title: The Armory
    description: 'A reinforced bunker built from stacked shipping containers,

      the armory is the collective''s most restricted building.

      Weapons and ammunition are stored behind a cage of welded rebar.

      A sign-out ledger tracks every round issued. The guardian on

      duty checks papers with mechanical thoroughness.

      '
    exits:
    - direction: east
      target: battle_market_square
    map_x: -2
    map_y: -6
    spawns:
    - template: collective_guardian
      count: 2
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: secure
  - id: battle_infirmary
    danger_level: safe
    title: The Infirmary
    description: 'A converted dental office serves as the collective''s medical

      facility. The equipment is ancient but functional. A medic in

      a stained white coat moves between patients on salvaged gurneys.

      Supplies are rationed carefully — aspirin is worth its weight

      in ammunition here.

      '
    exits:
    - direction: north
      target: battle_the_commons
    - direction: west
      target: battle_infirmary_ward
    - direction: south
      target: battle_neutral_commons
    map_x: -2
    map_y: -2
    spawns:
    - template: battleground_healer
      count: 1
      respawn_after: 0s
    - template: battleground_job_trainer
      count: 1
      respawn_after: 0s
    properties:
      lighting: fluorescent
      atmosphere: antiseptic
  - id: battle_farm_east
    danger_level: dangerous
    title: East Fields
    description: 'Terraced plots of vegetables stretch across what was once a

      suburban neighborhood. Foundation walls serve as raised beds.

      Workers move between rows with hand tools, weeding and watering

      from rain barrels. The soil is dark and rich — the collective''s

      most precious resource after its people.

      '
    exits:
    - direction: south
      target: battle_market_square
    - direction: west
      target: battle_farm_west
    - direction: north
      target: battle_north_fields
    map_x: 0
    map_y: -8
    spawns:
    - template: field_worker
      count: 2
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: earthy
  - id: battle_farm_west
    danger_level: dangerous
    title: West Fields
    description: 'More cultivated plots extend westward, these devoted to grain

      and legumes. A hand-cranked irrigation system feeds water through

      salvaged PVC pipes. Scarecrows fashioned from mannequin parts

      stand sentinel over the crops. The wind carries the sweet smell

      of growing things — rare and precious.

      '
    exits:
    - direction: east
      target: battle_farm_east
    - direction: north
      target: battle_the_granary
    map_x: -2
    map_y: -8
    spawns:
    - template: field_worker
      count: 2
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: pastoral
  - id: battle_the_granary
    danger_level: dangerous
    title: The Granary
    description: 'A converted auto repair shop now serves as the collective''s

      primary food storage. The vehicle bays are sealed and climate-

      controlled through ingenious passive ventilation. Sacks of dried

      grain, canned preserves, and seed stock fill every corner.

      Armed guardians patrol the perimeter around the clock.

      '
    exits:
    - direction: south
      target: battle_farm_west
    - direction: east
      target: battle_north_fields
    - direction: west
      target: battle_outer_perimeter_west
    map_x: -2
    map_y: -10
    spawns:
    - template: collective_guardian
      count: 2
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: dry
  - id: battle_north_fields
    danger_level: dangerous
    title: North Fields
    description: 'The northernmost agricultural plots thin out into scrubland at

      the edge of the collective''s territory. The soil here is poorer,

      yielding only hardy root vegetables. Beyond the last fence post,

      the wasteland begins — wild, ungoverned, dangerous.

      '
    exits:
    - direction: south
      target: battle_farm_east
    - direction: west
      target: battle_the_granary
    - direction: north
      target: battle_the_watchtower
    map_x: 0
    map_y: -10
    spawns:
    - template: field_worker
      count: 1
      respawn_after: 5m
    - template: collective_guardian
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: exposed
  - id: battle_the_watchtower
    danger_level: dangerous
    title: The Watchtower
    description: 'A wooden platform built atop a cell tower provides a commanding

      view of the northern approaches. Sandbags ring the observation

      post. A battered pair of binoculars hangs from a nail. From here,

      a guardian can see movement for miles across the flat terrain.

      The wind is constant and cold.

      '
    exits:
    - direction: south
      target: battle_north_fields
    - direction: north
      target: battle_border_checkpoint
    map_x: 0
    map_y: -12
    spawns:
    - template: collective_guardian
      count: 2
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: wind
  - id: battle_memorial_grove
    danger_level: dangerous
    title: Memorial Grove
    description: 'A quiet clearing behind the assembly hall where young trees

      have been planted in memory of the collective''s founders and

      fallen defenders. Hand-carved wooden markers bear names and

      dates. Wildflowers grow between the saplings. It is the one

      place in the collective where silence is not suspicious.

      '
    exits:
    - direction: west
      target: battle_assembly_hall
    - direction: north
      target: battle_the_commissariat
    map_x: 202
    map_y: 32
    spawns:
    - template: collective_guardian
      count: 2
      respawn_after: 5m
    properties:
      lighting: dappled
      atmosphere: solemn
  - id: battle_greenhouse
    danger_level: dangerous
    title: The Greenhouse
    description: 'A patchwork structure of salvaged window panes and plastic

      sheeting traps warmth and moisture for delicate crops that

      cannot survive the open fields. Tomato vines climb twine

      supports. Herb boxes line makeshift shelves. A worker tends

      seedlings with the care of a surgeon. The air is thick,

      humid, and smells of green growth.

      '
    exits:
    - direction: south
      target: battle_worker_barracks
    - direction: east
      target: battle_farm_west
    map_x: 202
    map_y: 34
    spawns:
    - template: field_worker
      count: 1
      respawn_after: 5m
    - template: collective_guardian
      count: 1
      respawn_after: 5m
    properties:
      lighting: diffused
      atmosphere: humid
  - id: battle_training_yard
    danger_level: dangerous
    title: Training Yard
    description: 'A packed-dirt yard behind the armory where guardians drill

      in formation. Wooden posts serve as striking targets, their

      surfaces splintered from countless blows. A whistle blast

      echoes across the yard as a senior guardian barks corrections.

      Discipline is the collective''s shield.

      '
    exits:
    - direction: east
      target: battle_armory
    - direction: north
      target: battle_farm_west
    map_x: 202
    map_y: 36
    spawns:
    - template: collective_guardian
      count: 2
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: disciplined
  - id: battle_supply_depot
    danger_level: dangerous
    title: Supply Depot
    description: 'Stacked crates and barrels fill a fenced lot behind the

      commissariat. Everything the collective scavenges from the

      wasteland passes through here for cataloging and redistribution.

      Inventory sheets flutter on clipboards wired to the fence.

      Nothing enters or leaves without documentation.

      '
    exits:
    - direction: south
      target: battle_the_commissariat
    - direction: west
      target: battle_north_fields
    map_x: 202
    map_y: 38
    spawns:
    - template: battleground_banker
      count: 1
      respawn_after: 0s
    - template: collective_guardian
      count: 2
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: orderly
  - id: battle_cistern
    danger_level: dangerous
    title: The Cistern
    description: 'A deep concrete cistern collects rainwater filtered through

      layers of gravel and charcoal. The collective''s water supply

      is guarded as fiercely as its granary. The sound of dripping

      water echoes in the chamber below. A hand pump brings water

      to the surface for distribution.

      '
    exits:
    - direction: east
      target: battle_the_commons
    - direction: north
      target: battle_worker_barracks
    map_x: 202
    map_y: 40
    spawns:
    - template: collective_guardian
      count: 2
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: damp
  - id: battle_commissar_hq
    core: true
    title: Commissar Headquarters
    description: 'The inner sanctum of collective authority — a hardened command

      post where senior commissars coordinate enforcement operations.

      A bank of radio equipment crackles with reports from outposts.

      Wall-mounted maps track citizen movements and resource allocations.

      The air smells of stale tobacco and paranoia.

      '
    exits:
    - direction: west
      target: battle_the_commissariat
    - direction: south
      target: battle_war_room
    map_x: 4
    map_y: -8
    spawns:
    - template: commissar
      count: 2
      respawn_after: 5m
    - template: lieutenant
      count: 2
      respawn_after: 5m
    properties:
      lighting: fluorescent
      atmosphere: tense
  - id: battle_reeducation_block
    core: true
    title: Reeducation Block
    description: 'A row of reinforced cells where ideological dissidents undergo

      intensive correction sessions. The walls are thick enough to

      muffle screams. Numbered doors line a narrow corridor lit by

      a single swinging bulb. Guards pace the hall with practiced

      indifference.

      '
    exits:
    - direction: south
      target: battle_reeducation_center
    map_x: 2
    map_y: -12
    spawns:
    - template: commissar
      count: 1
      respawn_after: 5m
    - template: collective_guardian
      count: 2
      respawn_after: 5m
    properties:
      lighting: harsh
      atmosphere: oppressive
  - id: battle_war_room
    core: true
    title: War Room
    description: 'A former bank vault converted into a strategic planning chamber.

      Tactical maps cover a central table, weighted down with shell

      casings. The collective''s military leadership convenes here

      to plan operations against encroaching factions. Entry is

      by commissar clearance only.

      '
    exits:
    - direction: north
      target: battle_commissar_hq
    map_x: 4
    map_y: -10
    spawns:
    - template: commissar
      count: 1
      respawn_after: 5m
    - template: lieutenant
      count: 3
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: strategic
  - id: battle_outer_perimeter_east
    danger_level: dangerous
    title: Outer Perimeter East
    description: 'The eastern edge of collective territory, marked by coils of

      razor wire and improvised warning signs. Beyond the perimeter

      posts, the wasteland offers no protection. Patrols sweep the

      boundary every few hours, but gaps exist for those who watch

      long enough.

      '
    exits:
    - direction: west
      target: battle_reeducation_center
    map_x: 4
    map_y: -12
    spawns:
    - template: collective_guardian
      count: 2
      respawn_after: 5m
    - template: country_club_sniper
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: exposed
  - id: battle_outer_perimeter_west
    danger_level: dangerous
    title: Outer Perimeter West
    description: 'The western boundary of the collective is marked by a berm of

      pushed earth and a chain of guard posts. Searchlights sweep

      the open ground at night. Guardians here are more trigger-happy

      than their counterparts inside — the perimeter attracts trouble.

      '
    exits:
    - direction: east
      target: battle_the_granary
    map_x: -4
    map_y: -10
    spawns:
    - template: collective_guardian
      count: 2
      respawn_after: 5m
    - template: country_club_sniper
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: alert
  - id: battle_border_checkpoint
    danger_level: dangerous
    title: Border Checkpoint
    description: 'A fortified checkpoint at the northern approach, where traffic

      into and out of collective territory is scrutinized. Concrete

      barriers force vehicles to weave at low speed. Guardians check

      papers with practiced suspicion. Anyone without proper

      documentation is turned back — or worse.

      '
    exits:
    - direction: south
      target: battle_the_watchtower
    map_x: 0
    map_y: -14
    spawns:
    - template: collective_guardian
      count: 2
      respawn_after: 5m
    - template: country_club_sniper
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: tense
  - id: battle_infirmary_ward
    danger_level: safe
    title: Infirmary Ward
    description: 'A quiet side room of the infirmary with additional recovery cots

      for the more seriously injured. Curtains partition the beds for

      a modicum of privacy — unusual in the collective. The chip_doc

      maintains an unofficial workshop here, handling implant maintenance

      with discretion and without asking too many questions.

      '
    exits:
    - direction: east
      target: battle_infirmary
    map_x: -4
    map_y: -2
    spawns:
    - template: chip_doc_battleground
      count: 1
      respawn_after: 0s
    properties:
      lighting: fluorescent
      atmosphere: quiet
  - id: battle_neutral_commons
    danger_level: safe
    title: Neutral Commons
    description: 'A small courtyard behind the infirmary that serves as an

      informal neutral ground. By unspoken agreement, even the most

      zealous commissars leave this space alone. People from outside

      the collective sometimes meet contacts here. The collective

      tolerates it — the infirmary needs suppliers the black market

      can provide.

      '
    exits:
    - direction: north
      target: battle_infirmary
    - direction: south
      target: battleground_brothel
    map_x: -2
    map_y: 0
    spawns:
    - template: battleground_motel_keeper
      count: 1
      respawn_after: 0s
    properties:
      lighting: overcast
      atmosphere: cautious

  - id: battleground_brothel
    title: The Foxhole
    danger_level: safe
    description: A converted storage bunker behind the neutral commons, accessed through a reinforced steel door marked with a red X. Inside, army-surplus cots, a coal burner, and no unnecessary conversation. The Foxhole runs on military schedule. Services rendered, morale maintained, no unit affiliation required.
    map_x: 0
    map_y: 100
    exits:
    - direction: north
      target: battle_neutral_commons
    spawns:
    - template: battleground_brothel_keeper
      count: 1
      respawn_after: 0s
    - template: battleground_black_market_merchant
      count: 1
      respawn_after: 0s
    - template: battleground_fixer
      count: 1
      respawn_after: 0s
