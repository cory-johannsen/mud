zone:
  id: downtown
  danger_level: sketchy
  min_level: 1
  max_level: 6
  world_x: -1
  world_y: 0
  name: Downtown Portland
  description: The shattered remains of Portland's urban core, where rain-slicked rubble and rusting infrastructure
    form the bones of a dead civilization.
  start_room: downtown_underground
  script_dir: content/scripts/zones/downtown
  rooms:
  - id: pioneer_square
    danger_level: safe
    title: Pioneer Courthouse Square
    core: true
    description: 'You stand in the ruins of what was once Pioneer Courthouse Square.

      The iconic brick amphitheater is cracked and overgrown with black moss.

      The sky is a permanent grey. Rain falls sideways.

      A weathered sign reads "Portland''s Living Room" — the irony is not lost.

      '
    exits:
    - direction: north
      target: morrison_bridge
    - direction: east
      target: broadway_ruins
    - direction: south
      target: market_district
    - direction: west
      target: transit_mall
    - direction: southeast
      target: dt_old_town_square
    map_x: 0
    map_y: 0
    spawns:
    - template: ganger
      count: 2
      respawn_after: 2m
    - template: scavenger
      count: 1
      respawn_after: 3m
    equipment:
    - item_id: medkit
      max_count: 1
      respawn_after: 5m
      immovable: false
      script: ''
    - item_id: zone_map
      max_count: 1
      respawn_after: 0s
      immovable: true
      script: zone_map_use
      description: Zone Map
    properties:
      lighting: dim
      atmosphere: rain
  - id: morrison_bridge
    title: Morrison Bridge Approach
    danger_level: safe
    description: 'The western approach to the Morrison Bridge stretches before you.

      Twisted rebar juts from crumbling concrete. The Willamette churns below,

      dark and swollen with decades of unfiltered runoff.

      Abandoned vehicles form a rusted barricade across the bridge deck.

      '
    exits:
    - direction: south
      target: pioneer_square
    - direction: east
      target: burnside_crossing
    - direction: west
      target: waterfront_trail
    - direction: north
      target: downtown_underground
    - direction: southeast
      target: dt_salmon_street_springs
    map_x: 0
    map_y: -2
    properties:
      lighting: overcast
      atmosphere: wind
  - id: broadway_ruins
    title: Broadway Ruins
    danger_level: safe
    description: 'The shells of old theaters and department stores line what was once Broadway.

      Faded marquees hang at broken angles. A colony of crows watches from

      the gutted upper floors. Glass crunches under every step.

      '
    exits:
    - direction: west
      target: pioneer_square
    - direction: north
      target: burnside_crossing
    - direction: south
      target: courthouse_steps
    - direction: east
      target: dt_pearl_district_edge
    map_x: 2
    map_y: 0
    properties:
      lighting: dim
      atmosphere: quiet
  - id: market_district
    title: Market District
    danger_level: safe
    description: 'Makeshift stalls cobbled from salvage line the broken street.

      The smell of wood smoke and something cooking drifts between

      tarps strung between lampposts. This is the closest thing

      to civilization left in the core.

      '
    exits:
    - direction: north
      target: pioneer_square
    - direction: east
      target: courthouse_steps
    - direction: west
      target: director_park
    - direction: southwest
      target: dt_park_blocks_south
    map_x: 0
    map_y: 2
    spawns:
    - template: downtown_motel_keeper
      count: 1
      respawn_after: 0s
    properties:
      lighting: firelight
      atmosphere: smoke
  - id: waterfront_trail
    title: Waterfront Trail
    danger_level: safe
    description: 'A cracked pathway follows the river''s edge. The Willamette laps

      against collapsed seawalls. Rusted sculptures from the old waterfront

      park lean at impossible angles. Upstream, the skeletal remains

      of the Steel Bridge disappear into the fog.

      '
    exits:
    - direction: east
      target: morrison_bridge
    - direction: northwest
      target: sauvie_bridge_south
    - direction: south
      target: dt_naito_parkway
    - direction: west
      target: dt_steel_bridge_west
    map_x: -2
    map_y: -2
    properties:
      lighting: overcast
      atmosphere: fog
  - id: transit_mall
    title: Transit Mall
    core: true
    description: 'The once-bustling transit corridor is silent. Overhead wires hang

      in tangled loops. A MAX light rail car sits derailed and gutted,

      its windows long since shattered. Weeds push through every crack

      in the concrete platform.

      '
    exits:
    - direction: east
      target: pioneer_square
    - direction: south
      target: director_park
    - direction: west
      target: beav_canyon_road_east
    map_x: -2
    map_y: 0
    spawns:
    - template: ganger
      count: 1
      respawn_after: 5m
    - template: scavenger
      count: 1
      respawn_after: 6m
    properties:
      lighting: dim
      atmosphere: desolate
  - id: director_park
    title: Director Park Wasteland
    core: true
    description: 'The geometric water feature is dry and filled with debris.

      The glass canopy overhead is miraculously intact, though stained

      with years of grime. It offers rare shelter from the endless rain.

      Scorch marks on the concrete hint at past conflicts.

      '
    exits:
    - direction: north
      target: transit_mall
    - direction: east
      target: market_district
    - direction: south
      target: lo_checkpoint_north
    map_x: -2
    map_y: 2
    spawns:
    - template: ganger
      count: 1
      respawn_after: 5m
    - template: scavenger
      count: 1
      respawn_after: 6m
    properties:
      lighting: sheltered
      atmosphere: dry
  - id: burnside_crossing
    title: Burnside Crossing
    danger_level: safe
    description: 'The intersection of Burnside and the old Broadway is a no-man''s land.

      The street is wide and exposed. Burnt-out storefronts stare with

      empty window-eyes. Graffiti in fading neon paint marks territorial

      boundaries of factions long since scattered.

      '
    exits:
    - direction: south
      target: broadway_ruins
    - direction: west
      target: morrison_bridge
    - direction: north
      target: ne_broadway_bridge
    - direction: east
      target: dt_burnside_overpass
    map_x: 2
    map_y: -2
    properties:
      lighting: exposed
      atmosphere: wind
  - id: courthouse_steps
    title: Courthouse Steps
    danger_level: safe
    description: 'The old federal courthouse looms above, its neoclassical columns

      chipped and stained. The broad stone steps serve as a gathering

      point for scavengers trading rumors and salvage.

      Someone has carved "NO LAW" into the granite above the entrance.

      '
    exits:
    - direction: west
      target: market_district
    - direction: north
      target: broadway_ruins
    - direction: southeast
      target: flats_hawthorne_approach
    - direction: east
      target: cliff_base
    map_x: 2
    map_y: 2
    properties:
      lighting: overcast
      atmosphere: open
  - id: cliff_base
    title: Base of the Cliff
    danger_level: safe
    description: 'A sheer rock face rises before you. Hand-holds have been carved into the stone, worn
      smooth by countless ascents. The cliff stretches upward into darkness above.

      You can see the stone glints with moisture in places, suggesting water seeps from cracks higher
      up.

      '
    exits:
    - direction: west
      target: courthouse_steps
    - direction: north
      target: cliff_top
    map_x: 4
    map_y: 2
    properties:
      climbable: 'true'
      climb_dc: '15'
      lighting: dim
      atmosphere: stone
  - id: cliff_top
    title: Top of the Cliff
    danger_level: safe
    description: 'You stand on a rocky ledge overlooking the city ruins below. From this vantage, you
      can see the twisted streets and collapsed buildings of the downtown core spreading out in all directions.

      The wind is stronger up here, carrying the smell of rain and rust. To the east, a steep ravine drops
      away sharply.

      '
    exits:
    - direction: south
      target: cliff_base
    - direction: east
      target: ravine_flooded
    map_x: 4
    map_y: 0
    properties:
      lighting: overcast
      atmosphere: wind
  - id: ravine_flooded
    title: Flooded Ravine
    danger_level: safe
    description: 'You stand in a narrow ravine filled with murky water. The current is strong, fed by
      underground springs and seepage from the cliff face above.

      The water is cold and opaque, impossible to see more than a few inches down. The ravine walls are
      slick with moss and algae.

      '
    exits:
    - direction: west
      target: cliff_top
    map_x: 4
    map_y: -2
    properties:
      lighting: dim
      atmosphere: flooded
      water_terrain: 'true'
      water_dc: '12'
  - id: downtown_underground
    title: The Underground
    description: A repurposed parking garage two levels below street level. Strip lighting, folding tables,
      and the low hum of people who need things and people who have them.
    danger_level: safe
    exits:
    - direction: south
      target: morrison_bridge
    - direction: west
      target: downtown_brothel
    map_x: 0
    map_y: -4
    spawns:
    - template: downtown_merchant
      count: 1
      respawn_after: 0s
    - template: downtown_healer
      count: 1
      respawn_after: 0s
    - template: downtown_job_trainer
      count: 1
      respawn_after: 0s
    - template: downtown_banker
      count: 1
      respawn_after: 0s
    - template: downtown_guard
      count: 1
      respawn_after: 0s
    - template: downtown_quest_giver
      count: 1
      respawn_after: 0s
    properties:
      lighting: strip
      atmosphere: commerce
  - id: dt_old_post_office
    title: Old Post Office Ruin
    danger_level: safe
    description: 'The massive Romanesque Revival building has lost most of its roof but its thick

      granite walls still stand. Pigeons nest in the arched window frames. The cavernous

      interior smells of wet stone and old paper. Collapsed sorting racks form strange

      metallic sculptures on the flooded floor.

      '
    exits:
    - direction: northeast
      target: dt_union_station_ruins
    - direction: east
      target: dt_park_blocks_north
    map_x: -4
    map_y: -4
    properties:
      lighting: open_sky
      atmosphere: ruin
  - id: dt_park_blocks_north
    title: North Park Blocks
    danger_level: safe
    description: 'A narrow strip of parkland between old brick buildings. The elms have grown wild

      and enormous, their root systems cracking the brick pathways. Moss-covered statues

      peer from the undergrowth. It''s quieter here than most of downtown — almost peaceful.

      '
    exits:
    - direction: west
      target: dt_old_post_office
    - direction: south
      target: dt_park_blocks_south
    - direction: north
      target: dt_union_station_ruins
    map_x: -2
    map_y: -4
    properties:
      lighting: filtered
      atmosphere: overgrown
  - id: dt_park_blocks_south
    title: South Park Blocks
    danger_level: safe
    description: 'The southern extension of the park blocks runs past the ruins of art museums and

      university buildings. Flowering weeds have colonized every planter. Someone has

      arranged salvaged sculptures into a rough avenue of strange totems.

      '
    exits:
    - direction: north
      target: dt_park_blocks_north
    - direction: northeast
      target: market_district
    map_x: -2
    map_y: 4
    properties:
      lighting: overcast
      atmosphere: quiet
  - id: dt_pearl_district_edge
    title: Pearl District Edge
    danger_level: safe
    description: 'The former gallery district''s brick warehouses are gutted but structurally intact.

      Someone is growing food in the ground-floor spaces — rows of kale visible through

      broken windows, tended by people who don''t make eye contact with strangers.

      '
    exits:
    - direction: west
      target: broadway_ruins
    - direction: northwest
      target: dt_union_station_ruins
    - direction: south
      target: dt_powell_books_ruin
    map_x: 4
    map_y: -1
    properties:
      lighting: dim
      atmosphere: inhabited
  - id: dt_burnside_overpass
    title: Burnside Overpass
    danger_level: safe
    description: 'The old Burnside Bridge overpass spans a dry concrete channel. The underside is

      a city of tarpaulins and rope ladders — people live here, tucked above the flood

      line. They watch you cross with the calm assessment of people who have seen worse.

      '
    exits:
    - direction: west
      target: burnside_crossing
    - direction: southeast
      target: dt_chinatown_gate
    map_x: 4
    map_y: -5
    properties:
      lighting: shadow
      atmosphere: inhabited
  - id: dt_union_station_ruins
    title: Union Station Ruins
    danger_level: safe
    description: 'The terra cotta clock tower still stands, improbably, its clock frozen at 3:17.

      The vaulted waiting hall has become a kind of neutral ground — its size and

      multiple entrances make it impossible to hold, so no one tries. People pass through

      without incident, by unspoken agreement.

      '
    exits:
    - direction: southwest
      target: dt_old_post_office
    - direction: south
      target: dt_park_blocks_north
    - direction: east
      target: dt_chinatown_gate
    - direction: southeast
      target: dt_pearl_district_edge
    map_x: -2
    map_y: -6
    properties:
      lighting: hall
      atmosphere: neutral
  - id: dt_chinatown_gate
    title: Chinatown Gate
    core: true
    description: 'The ornate ceremonial gate still spans the intersection, its paint faded but

      its dragons intact. The neighborhood behind it is contested territory — the gate

      marks the edge of a dozen overlapping claims. Gang tags have been painted over

      gang tags so many times the wall is thick with pigment.

      '
    exits:
    - direction: northwest
      target: dt_burnside_overpass
    - direction: west
      target: dt_union_station_ruins
    - direction: south
      target: dt_old_town_square
    map_x: 6
    map_y: -4
    spawns:
    - template: ganger
      count: 1
      respawn_after: 5m
    - template: lieutenant
      count: 1
      respawn_after: 10m
    properties:
      lighting: dim
      atmosphere: tense
  - id: dt_old_town_square
    title: Old Town Square
    core: true
    description: 'The cobblestone plaza is cracked but open, surrounded by brick facades with

      empty windows. It was once full of late-night crowds. Now it''s full of tension —

      the kind of wide open space where everyone can see everyone else coming.

      '
    exits:
    - direction: north
      target: dt_chinatown_gate
    - direction: northwest
      target: pioneer_square
    - direction: northeast
      target: cp_entry
      zone: club_privata
    - direction: east
      target: dt_powell_books_ruin
    - direction: south
      target: dt_city_hall
    map_x: 6
    map_y: -2
    spawns:
    - template: scavenger
      count: 2
      respawn_after: 4m
    - template: commissar
      count: 1
      respawn_after: 8m
    properties:
      lighting: exposed
      atmosphere: tense
  - id: dt_powell_books_ruin
    title: Powell's Books Ruin
    core: true
    description: 'The famous bookstore''s block-filling warren of rooms is mostly intact. The books

      are mostly ruined by water damage, but the shelves still stand and the rooms still

      connect in their labyrinthine way. Scavengers come to trade pages of dry text for

      kindling or insulation. Occasionally someone reads.

      '
    exits:
    - direction: west
      target: dt_old_town_square
    - direction: north
      target: dt_pearl_district_edge
    - direction: south
      target: dt_main_library
    map_x: 8
    map_y: -2
    spawns:
    - template: scavenger
      count: 1
      respawn_after: 5m
    - template: 82nd_enforcer
      count: 1
      respawn_after: 7m
    properties:
      lighting: dim
      atmosphere: musty
  - id: dt_city_hall
    title: City Hall Stronghold
    core: true
    description: 'The white stone pile of the old city hall has been fortified by whoever currently

      holds it — the occupants change, the sandbags don''t. Arrow slits have been cut

      through the ornamental stonework. The plaza in front is clear and unobstructed,

      which is a threat in itself.

      '
    exits:
    - direction: north
      target: dt_old_town_square
    - direction: east
      target: dt_main_library
    - direction: south
      target: dt_salmon_street_springs
    map_x: 6
    map_y: 0
    spawns:
    - template: lieutenant
      count: 1
      respawn_after: 8m
    - template: commissar
      count: 1
      respawn_after: 10m
    properties:
      lighting: fortified
      atmosphere: hostile
  - id: dt_main_library
    title: Main Library Fortress
    core: true
    boss_room: true
    description: 'The central library''s modernist concrete shell is almost perfectly defensible.

      A faction has made it their seat — the upper floors are occupied, the entrance

      is guarded, and the card catalogue has been repurposed as a ledger of debts.

      '
    exits:
    - direction: west
      target: dt_city_hall
    - direction: north
      target: dt_powell_books_ruin
    map_x: 8
    map_y: 0
    spawns:
    - template: ganger
      count: 2
      respawn_after: 4m
    - template: 82nd_enforcer
      count: 1
      respawn_after: 6m
    - template: downtown_library_warlord
      count: 1
      respawn_after: 10m
    properties:
      lighting: controlled
      atmosphere: occupied
  - id: dt_salmon_street_springs
    title: Salmon Street Springs
    danger_level: safe
    description: 'The old fountain plaza still produces water — something to do with the original

      city water infrastructure that nobody has figured out how to shut off. A small

      settlement has grown around it. Dr. Reyes has set up her clinic under a canvas

      awning at the fountain''s edge, her instruments laid out with surgical precision.

      '
    exits:
    - direction: northwest
      target: morrison_bridge
    - direction: north
      target: dt_city_hall
    - direction: east
      target: dt_esplanade_north
    - direction: south
      target: dt_sw_hills_road
    - direction: southwest
      target: dt_naito_parkway
    map_x: 2
    map_y: -4
    spawns:
    - template: chip_doc_downtown
      count: 1
      respawn_after: 0s
    properties:
      lighting: open
      atmosphere: settlement
  - id: dt_esplanade_north
    title: East Bank Esplanade North
    danger_level: safe
    description: 'The elevated walkway along the east bank of the Willamette offers a view of the

      downtown skyline — or what''s left of it. The suspension walkway sways slightly

      in the river wind. Below, the water is dark and moving fast. The railing is solid.

      '
    exits:
    - direction: west
      target: dt_salmon_street_springs
    - direction: south
      target: dt_esplanade_south
    map_x: 5
    map_y: -4
    properties:
      lighting: open
      atmosphere: wind
  - id: dt_esplanade_south
    title: East Bank Esplanade South
    danger_level: safe
    description: 'The southern stretch of the esplanade widens into a plaza where the old dock

      pilings are visible at low water. A few fire rings have been built here, their

      ash cold. The city wall is visible across the river, its old mural mostly intact.

      '
    exits:
    - direction: north
      target: dt_esplanade_north
    - direction: west
      target: dt_hawthorne_bridge_east
    map_x: 5
    map_y: -2
    properties:
      lighting: open
      atmosphere: riverside
  - id: dt_hawthorne_bridge_east
    title: Hawthorne Bridge East Approach
    danger_level: safe
    description: 'The Hawthorne Bridge still stands — one of the few bridges across the Willamette

      that remains passable. The east approach is considered safe by common consent;

      both sides of the river need the crossing too much to fight over it. Sentinels

      watch from both ends but don''t interfere with transit.

      '
    exits:
    - direction: east
      target: dt_esplanade_south
    - direction: north
      target: dt_sw_hills_road
    map_x: 2
    map_y: -3
    properties:
      lighting: overcast
      atmosphere: transit
  - id: dt_sw_hills_road
    title: SW Hills Road
    danger_level: safe
    description: 'The road climbs steeply toward the west hills, switchbacking through tall firs

      that have reclaimed the shoulder. The air is noticeably cleaner here. You can

      hear the city below but the distance makes it abstract, almost peaceful.

      '
    exits:
    - direction: north
      target: dt_salmon_street_springs
    - direction: south
      target: dt_hawthorne_bridge_east
    map_x: 0
    map_y: -6
    properties:
      lighting: filtered
      atmosphere: forest
  - id: dt_steel_bridge_west
    title: Steel Bridge West Approach
    core: true
    description: 'The Steel Bridge''s double-deck swing span is frozen in a half-open position,

      leaving a gap that can only be crossed on a narrow steel catwalk someone bolted

      on afterward. The catwalk is solid but narrow. Wind off the river is constant.

      '
    exits:
    - direction: southeast
      target: dt_naito_parkway
    - direction: east
      target: waterfront_trail
    map_x: -4
    map_y: -2
    spawns:
    - template: scavenger
      count: 1
      respawn_after: 5m
    - template: ganger
      count: 1
      respawn_after: 6m
    properties:
      lighting: overcast
      atmosphere: wind
  - id: dt_naito_parkway
    title: Naito Parkway
    core: true
    description: 'The old riverside highway is cracked and heaved by tree roots, but wide enough

      to still feel like a road. It connects the waterfront to downtown in a straight

      shot, which makes it useful and dangerous in equal measure. You are visible for

      a long way in both directions.

      '
    exits:
    - direction: north
      target: waterfront_trail
    - direction: northwest
      target: dt_steel_bridge_west
    - direction: northeast
      target: dt_salmon_street_springs
    - direction: south
      target: tofteville_gate
      zone: wooklyn
    map_x: -3
    map_y: 0
    spawns:
    - template: scavenger
      count: 1
      respawn_after: 4m
    - template: 82nd_enforcer
      count: 1
      respawn_after: 8m
    properties:
      lighting: exposed
      atmosphere: open
  - id: downtown_brothel
    title: The Back Room
    danger_level: safe
    description: A converted service corridor off the Underground, accessed through a heavy steel door
      with a hand-lettered sign that reads BACK ROOM. Inside, red-tinted strip lighting, curtained alcoves,
      and a folding table where three people conduct three different businesses simultaneously. Noise
      from the parking garage is entirely muffled.
    map_x: -6
    map_y: -4
    exits:
    - direction: east
      target: downtown_underground
    spawns:
    - template: downtown_brothel_keeper
      count: 1
      respawn_after: 0s
    - template: downtown_black_market_merchant
      count: 1
      respawn_after: 0s
    - template: downtown_fixer
      count: 1
      respawn_after: 0s
