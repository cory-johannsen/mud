zone:
  id: aloha
  danger_level: safe
  world_x: -4
  world_y: 2
  script_dir: content/scripts/zones/aloha
  name: The Aloha Neutral Zone
  description: A demilitarized trading post on the old TV Highway corridor, where smugglers, brokers, and refugees coexist
    under an uneasy truce enforced by neutral zone sentries.
  start_room: aloha_the_bazaar
  rooms:
  - id: aloha_tv_highway_east
    title: TV Highway — East Gate
    description: 'The eastern end of the Aloha Neutral Zone opens onto the cracked

      asphalt of TV Highway. A makeshift barricade of wrecked cars and

      chain-link fencing marks the border. Faded signs warn travelers

      to check weapons at the gate. Beyond the barricade, Beaverton sprawls.

      '
    exits:
    - direction: east
      target: beav_tv_highway_west
    - direction: west
      target: aloha_sentry_post_alpha
    map_x: 0
    map_y: 0
    spawns:
    - template: neutral_zone_sentry
      count: 2
      respawn_after: 5m
    equipment:
    - item_id: zone_map
      max_count: 1
      respawn_after: 0s
      immovable: true
      script: zone_map_use
      description: Zone Map
    properties:
      lighting: overcast
      atmosphere: tense
  - id: aloha_sentry_post_alpha
    title: Sentry Post Alpha
    description: 'A sandbagged guard station occupies what was once a gas station canopy.

      The roof provides shelter from the rain, and a fire barrel crackles

      in the corner. Sentries watch the eastern approach with practiced

      vigilance. A logbook sits on a plywood desk, recording every arrival.

      '
    exits:
    - direction: east
      target: aloha_tv_highway_east
    - direction: west
      target: aloha_185th_crossing
    - direction: south
      target: aloha_checkpoint_lane
    map_x: -2
    map_y: 0
    spawns:
    - template: neutral_zone_sentry
      count: 1
      respawn_after: 5m
    properties:
      lighting: firelight
      atmosphere: guarded
  - id: aloha_185th_crossing
    title: 185th Avenue Crossing
    description: 'The intersection of TV Highway and 185th Avenue is a wide, windswept

      crossroads. Traffic lights dangle uselessly from corroded poles.

      Foot traffic flows in all directions — traders heading to the bazaar,

      refugees seeking the camp, smugglers slipping toward the warehouses.

      '
    exits:
    - direction: east
      target: aloha_sentry_post_alpha
    - direction: west
      target: aloha_brokers_row
    - direction: north
      target: aloha_message_board_plaza
    - direction: south
      target: aloha_the_bazaar
    map_x: -4
    map_y: 0
    properties:
      lighting: overcast
      atmosphere: busy
  - id: aloha_the_bazaar
    title: The Bazaar
    description: 'An open-air market sprawls across what was once a shopping center

      parking lot. Tarps and salvaged awnings stretch between poles, shading

      rows of blankets and folding tables piled with scavenged goods.

      The air is thick with the smell of grilled rat and diesel smoke.

      Haggling voices rise and fall like waves.

      '
    exits:
    - direction: north
      target: aloha_185th_crossing
    - direction: south
      target: aloha_park
    map_x: -4
    map_y: 2
    spawns:
    - template: aloha_broker
      count: 2
      respawn_after: 5m
    - template: aloha_merchant
      count: 1
      respawn_after: 0s
    - template: aloha_healer
      count: 1
      respawn_after: 0s
    - template: aloha_job_trainer
      count: 1
      respawn_after: 0s
    - template: aloha_banker
      count: 1
      respawn_after: 0s
    - template: aloha_guard
      count: 1
      respawn_after: 0s
    - template: aloha_fixer
      count: 1
      respawn_after: 0s
    properties:
      lighting: overcast
      atmosphere: crowded
  - id: aloha_brokers_row
    title: Broker's Row
    description: 'A line of shipping containers has been converted into cramped offices,

      each one painted a different color to mark its owner. Hand-lettered

      signs advertise currency exchange, contract negotiation, and caravan

      insurance. The sound of deal-making echoes between the metal walls.

      '
    exits:
    - direction: east
      target: aloha_185th_crossing
    - direction: west
      target: aloha_caravansary
    - direction: south
      target: aloha_black_market
    map_x: -6
    map_y: 0
    spawns:
    - template: aloha_broker
      count: 2
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: commercial
  - id: aloha_sentry_post_bravo
    title: Sentry Post Bravo
    description: 'The western guard station mirrors its eastern counterpart — sandbags,

      fire barrel, plywood desk. A hand-painted sign reads "LEAVING NEUTRAL

      ZONE — ARM YOURSELVES." The sentries here watch the Hillsboro road

      with grim attention, wary of raiding parties from the west.

      '
    exits:
    - direction: east
      target: aloha_caravansary
    - direction: west
      target: aloha_tv_highway_west
    map_x: -10
    map_y: 0
    spawns:
    - template: neutral_zone_sentry
      count: 1
      respawn_after: 5m
    properties:
      lighting: firelight
      atmosphere: guarded
  - id: aloha_tv_highway_west
    title: TV Highway — West Gate
    description: 'The western boundary of the neutral zone is marked by a wall of

      stacked tires and corrugated steel. Beyond it, TV Highway stretches

      toward Hillsboro, empty and rain-washed. A faded green highway sign

      reads "Hillsboro — 4 mi" with a bullet hole through the 4.

      '
    exits:
    - direction: west
      target: hills_tv_highway_east
    - direction: east
      target: aloha_sentry_post_bravo
    map_x: -12
    map_y: 0
    spawns:
    - template: neutral_zone_sentry
      count: 2
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: tense
  - id: aloha_caravansary
    title: The Caravansary
    description: 'A walled compound built from bus shells and wooden pallets serves

      as a rest stop for traveling traders. Campfires dot the muddy yard.

      Pack animals — mostly dogs and a few scrawny mules — are tethered

      to posts. The smell of coffee substitute and wet canvas fills the air.

      '
    exits:
    - direction: east
      target: aloha_brokers_row
    - direction: west
      target: aloha_sentry_post_bravo
    - direction: south
      target: aloha_stables
    map_x: -8
    map_y: 0
    spawns:
    - template: aloha_broker
      count: 1
      respawn_after: 5m
    properties:
      lighting: firelight
      atmosphere: weary
  - id: aloha_park
    title: Aloha Park
    description: 'An overgrown park serves as neutral meeting ground. The playground

      equipment is rusted but children still play on it. Old-growth trees

      provide rare canopy cover. Benches carved with initials and dates

      mark generations of survivors. This is where truces are negotiated

      and disputes settled without bloodshed.

      '
    exits:
    - direction: north
      target: aloha_the_bazaar
    - direction: west
      target: aloha_warehouse_district
    map_x: -4
    map_y: 4
    properties:
      lighting: dappled
      atmosphere: peaceful
  - id: aloha_refugee_camp
    title: Refugee Camp
    description: 'A sprawling tent city fills a former school field. Canvas and plastic

      sheeting stretch over improvised frames. Cook fires send thin smoke

      columns into the grey sky. Families huddle in clusters, sharing

      what little they have. A hand-painted sign at the entrance reads

      "ALL WELCOME — NO FACTION COLORS."

      '
    exits:
    - direction: north
      target: aloha_trading_post
    map_x: -2
    map_y: 6
    properties:
      lighting: dim
      atmosphere: desperate
  - id: aloha_warehouse_district
    title: Warehouse District
    description: 'Rows of corrugated steel warehouses line a potholed access road.

      Most doors are padlocked or welded shut. The ones that aren''t

      lead to dimly lit interiors where goods change hands without

      questions asked. Lookouts perch on the rooftops, watching for

      sentries and rival smugglers alike.

      '
    exits:
    - direction: east
      target: aloha_park
    - direction: north
      target: aloha_black_market
    - direction: south
      target: aloha_back_alley
    map_x: -6
    map_y: 4
    spawns:
    - template: smuggler
      count: 2
      respawn_after: 5m
    properties:
      lighting: dim
      atmosphere: suspicious
  - id: aloha_trading_post
    title: Trading Post
    description: 'A fortified building — once a fast-food restaurant — has been

      converted into a proper trading post. Shelves behind a barred

      counter display ammunition, medicine, and canned food. A chalkboard

      lists today''s exchange rates in smudged handwriting.

      '
    exits:
    - direction: south
      target: aloha_refugee_camp
    - direction: north
      target: aloha_checkpoint_lane
    map_x: -2
    map_y: 4
    spawns:
    - template: aloha_broker
      count: 1
      respawn_after: 5m
    properties:
      lighting: lantern
      atmosphere: commercial
  - id: aloha_black_market
    title: Black Market
    description: 'Behind a false wall in one of the warehouses, a clandestine market

      operates by lantern light. Goods banned even by the neutral zone''s

      lax standards are laid out on oil-stained blankets — pre-war tech,

      unregistered weapons, chemical compounds. The dealers speak in

      whispers and accept only hard currency.

      '
    exits:
    - direction: south
      target: aloha_warehouse_district
    - direction: north
      target: aloha_brokers_row
    map_x: -6
    map_y: 2
    spawns:
    - template: smuggler
      count: 2
      respawn_after: 5m
    properties:
      lighting: lantern
      atmosphere: illicit
  - id: aloha_checkpoint_lane
    title: Checkpoint Lane
    description: 'A narrow lane runs between the trading post and the eastern sentry

      station. Jersey barriers funnel foot traffic into single file.

      Sentries check packs and ask pointed questions. The walls are

      plastered with wanted posters and trade notices, most of them

      rain-blurred beyond reading.

      '
    exits:
    - direction: north
      target: aloha_sentry_post_alpha
    - direction: south
      target: aloha_trading_post
    map_x: -2
    map_y: 2
    properties:
      lighting: overcast
      atmosphere: controlled
  - id: aloha_message_board_plaza
    title: Message Board Plaza
    description: 'A small plaza centered on a massive cork board sheltered under

      a tin roof. Hundreds of notes, sketches, and pleas are pinned

      to it — missing persons, job postings, warnings about road

      conditions, and coded messages for those who know how to read them.

      People linger here, scanning the board with desperate hope.

      '
    exits:
    - direction: south
      target: aloha_185th_crossing
    - direction: east
      target: aloha_inn
    - direction: west
      target: aloha_water_station
    map_x: -4
    map_y: -2
    properties:
      lighting: overcast
      atmosphere: anxious
  - id: aloha_water_station
    title: Water Station
    description: 'A gravity-fed water filtration system built from scavenged parts

      occupies a fenced lot. Clean water trickles into plastic drums

      lined up in rows. A posted schedule dictates ration amounts.

      Two sentries guard the pumps around the clock — water is worth

      more than currency in the wastes.

      '
    exits:
    - direction: west
      target: aloha_market_hall
    map_x: -6
    map_y: -2
    properties:
      lighting: overcast
      atmosphere: vital
  - id: aloha_inn
    title: The Rusty Lantern Inn
    description: 'A two-story building with boarded windows and a hand-painted sign

      depicting a dented lantern. Inside, cots are rented by the hour.

      A ground-floor common room serves watered-down homebrew and

      reheated canned stew. It is the closest thing to comfort

      the neutral zone offers.

      '
    exits:
    - direction: west
      target: aloha_message_board_plaza
    map_x: -2
    map_y: -2
    properties:
      lighting: lantern
      atmosphere: weary
  - id: aloha_stables
    title: The Stables
    description: 'A covered lot where pack animals are housed and carts repaired.

      The stalls are built from highway guardrails and plywood. A farrier

      works at a makeshift forge, hammering scrap into horseshoes.

      The smell of hay and animal sweat cuts through the usual rain-damp air.

      '
    exits:
    - direction: north
      target: aloha_caravansary
    map_x: -8
    map_y: 2
    properties:
      lighting: dim
      atmosphere: earthy
  - id: aloha_back_alley
    title: Back Alley
    description: 'A narrow passage runs behind the warehouses and the inn, choked

      with refuse and puddles of oily rainwater. Doorways curtained

      with plastic sheeting lead to unseen rooms. This is where deals

      go wrong and people disappear. The shadows seem to have eyes.

      '
    exits: []
    map_x: -6
    map_y: 6
    spawns:
    - template: smuggler
      count: 1
      respawn_after: 5m
    properties:
      lighting: dark
      atmosphere: dangerous
  - id: aloha_scrap_yard
    title: Scrap Yard
    description: 'Mountains of twisted metal, shattered appliances, and stripped

      vehicles fill an open lot surrounded by razor wire. Scavengers

      pick through the piles with practiced eyes, searching for anything

      of value. A crane with a rusted electromagnet looms overhead,

      frozen mid-swing for eternity.

      '
    exits:
    - direction: north
      target: aloha_warehouse_district
    map_x: 202
    map_y: 0
    properties:
      lighting: overcast
      atmosphere: industrial
  - id: aloha_old_church
    title: The Old Church
    description: 'A small church with a cracked steeple stands at the edge of the

      neutral zone. Its stained glass is mostly gone, replaced with

      plastic wrap that glows faintly in the light. Inside, pews serve

      as sleeping quarters. A faded mural of the Pacific Northwest

      covers one wall, a reminder of what was lost.

      '
    exits:
    - direction: north
      target: aloha_refugee_camp
    map_x: 202
    map_y: 2
    properties:
      lighting: dim
      atmosphere: solemn
  - id: aloha_farm_collective
    title: Community Farm Collective
    description: |
      Raised beds and hoop houses fill the former school field, tended
      by a rotating crew of volunteers who divide the harvest by labor
      share. Rows of kale, chard, and root vegetables stretch toward
      a rain-grey horizon. A hand-lettered sign at the gate reads
      "Take what you need. Leave what you can." Someone has added
      "— or else" in a different hand.
    exits:
    - direction: north
      target: aloha_park
    - direction: west
      target: aloha_orchard_road
    map_x: -4
    map_y: 6
    properties:
      lighting: overcast
      atmosphere: productive
  - id: aloha_solar_array
    title: Solar Array Field
    description: |
      Rows of salvaged photovoltaic panels tilt toward the pale sky on
      hand-welded iron frames. Cables snake across the gravel toward a
      converted storage unit that houses the battery bank. A lone
      technician in worn overalls makes her daily rounds with a multimeter,
      logging output numbers in a grease-stained notebook. The hum of
      charging capacitors is oddly calming.
    exits:
    - direction: north
      target: aloha_stables
    - direction: east
      target: aloha_warehouse_district
    map_x: -8
    map_y: 4
    properties:
      lighting: overcast
      atmosphere: industrious
  - id: aloha_trade_road_east
    title: Trade Road East
    description: |
      A wide gravel road runs east from the bazaar toward the outer
      perimeter fence. Merchant carts rut the surface into parallel
      grooves. Roadside vendors have claimed the verges with folding
      tables and rope-strung tarps, selling everything from boot
      leather to salvaged circuit boards. The foot traffic never
      quite stops, even after dark.
    exits:
    - direction: west
      target: aloha_the_bazaar
    map_x: 0
    map_y: 2
    properties:
      lighting: overcast
      atmosphere: busy
  - id: aloha_water_tower
    title: Old Water Tower
    description: |
      A rusted steel water tower looms over the western edge of the
      neutral zone, its legs wrapped in razor wire to deter climbers.
      From the ground, the tank looks intact — a small miracle. A
      hand-painted sign near the base announces water pressure hours.
      Children dare each other to touch the rusted ladder rungs before
      fleeing back to safer ground.
    exits:
    - direction: north
      target: aloha_sentry_post_bravo
    map_x: -10
    map_y: 2
    properties:
      lighting: overcast
      atmosphere: utilitarian
  - id: aloha_school_shelter
    title: Converted School Shelter
    description: |
      A former elementary school has been converted into the neutral
      zone's primary shelter. Classrooms serve as dormitories, the
      gymnasium as a communal dining hall, and the library as a quiet
      room where exhausted travelers can simply sit in peace. The
      hallways still bear faded alphabet murals and crayon drawings
      behind cracked glass frames. The place feels almost safe.
    exits:
    - direction: north
      target: aloha_message_board_plaza
    - direction: west
      target: aloha_school_yard
    - direction: east
      target: aloha_clinic_wing
    map_x: -4
    map_y: -4
    danger_level: safe
    properties:
      lighting: bright
      atmosphere: peaceful
  - id: aloha_school_yard
    title: School Yard
    description: |
      The old schoolyard still has its chain-link fence and a pair of
      basketball hoops, nets long gone. Kids kick a deflated ball
      across the cracked blacktop while adults watch from the fence
      line. The open space doubles as a gathering point for community
      announcements and, on clear nights, outdoor movie screenings
      projected against the gymnasium wall.
    exits:
    - direction: east
      target: aloha_school_shelter
    map_x: -6
    map_y: -4
    danger_level: safe
    properties:
      lighting: bright
      atmosphere: peaceful
  - id: aloha_clinic_wing
    title: Clinic Wing
    description: |
      A pair of classrooms at the school's east end have been
      partitioned into examination bays with hanging curtains. The
      smell of antiseptic cuts through the dusty air. A quiet
      technician works at a folding table near the window, a
      magnifying headlamp strapped to her forehead, delicately
      probing a neural interface board between growing-season calls.
      She patches implants for a fair fee and asks no questions.
    exits:
    - direction: west
      target: aloha_school_shelter
    map_x: -2
    map_y: -4
    danger_level: safe
    spawns:
    - template: chip_doc_aloha
      count: 1
      respawn_after: 0s
    properties:
      lighting: bright
      atmosphere: peaceful
  - id: aloha_market_hall
    title: Community Market Hall
    description: |
      A covered pavilion — roofed with salvaged corrugated steel and
      open on three sides — serves as the zone's all-weather market.
      Permanent stalls with plywood counters line the interior. The
      selection is modest compared to the bazaar but the prices are
      posted plainly in chalk, and there is none of the frantic
      haggling. A community board near the entrance lists what goods
      are most needed that week.
    exits:
    - direction: east
      target: aloha_water_station
    map_x: -8
    map_y: -2
    properties:
      lighting: overcast
      atmosphere: orderly
  - id: aloha_orchard_road
    title: Orchard Road
    description: |
      A tree-lined road winds between remnant orchard rows — apple,
      pear, and plum — planted by a neighborhood association before
      the collapse. Most trees still bear fruit in season. Volunteers
      prune and water them by rota. In autumn the road is fragrant
      with windfall fruit and the sound of bees. Even in the grey
      season it offers a rare sense of continuity.
    exits:
    - direction: east
      target: aloha_farm_collective
    - direction: north
      target: aloha_warehouse_district
    map_x: -8
    map_y: 6
    properties:
      lighting: dappled
      atmosphere: peaceful
