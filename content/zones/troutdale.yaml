    - template: gorge_bandit
      count: 1
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: rushing_water
  - id: trout_crown_point_trail
    title: Crown Point Access Trail
    description: 'A steep switchback trail climbs the basalt escarpment toward Crown Point.

      Loose shale slides underfoot with each step. The gorge wind increases

      with altitude, tearing at exposed skin. Painted rock cairns mark

      the route where the trail surface has eroded away entirely.

      '
    danger_level: sketchy
    exits:
    - direction: west
      target: trout_east_gorge_road
    - direction: north
      target: trout_crown_point
    map_x: 10
    map_y: 0
    spawns:
    - template: wind_walker
      count: 1
      respawn_after: 5m
    properties:
      lighting: exposed
      atmosphere: gale
  - id: trout_old_highway_ruins
    title: Old Highway Ruins
    description: 'A stretch of pre-war highway has been swallowed by a decades-old landslide,

      leaving a chaos of cracked asphalt slabs tilted at impossible angles.

      Rusted guardrail sections jut from the rubble like broken fingers.

      Gorge bandits use the terrain for ambushes — cover is everywhere

      and sight lines are terrible.

      '
    danger_level: sketchy
    exits:
    - direction: east
      target: trout_ranger_station
    - direction: south
      target: trout_crown_point_trail
    - direction: west
      target: trout_east_gorge_road
    map_x: 10
    map_y: -4
    spawns:
