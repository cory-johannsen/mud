      count: 1
      respawn_after: 0s
    - template: troutdale_motel_keeper
      count: 1
      respawn_after: 0s
    properties:
      lighting: fluorescent
      atmosphere: transit
  - id: trout_neutral_lobby
    title: Motel Lobby
    description: 'The motel lobby has been converted into a common gathering hall.

      Mismatched chairs ring a central fire drum venting through a jury-rigged

      chimney. Maps and notices cover one wall. A counter still serves as

      a check-in desk, now manned by a weathered clerk who tracks who comes

      and goes with careful neutrality.

      '
    danger_level: safe
    exits:
    - direction: south
      target: trout_neutral_motel
    - direction: east
      target: trout_neutral_storage
    - direction: west
      target: troutdale_brothel
    map_x: 2
    map_y: -4
    spawns:
