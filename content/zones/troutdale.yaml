      count: 1
      respawn_after: 0s
    properties:
      lighting: firelight
      atmosphere: shelter
  - id: trout_neutral_storage
    title: Motel Storage Room
    description: 'A converted storage room at the back of the motel lobby, shelves still

      stacked with towels and cleaning supplies long since repurposed. A curtained

      alcove in the corner serves as an impromptu clinic. The smell of antiseptic

      cuts through the dust. Someone has taped a handwritten rate card to the wall.

      '
    danger_level: safe
    exits:
    - direction: west
      target: trout_neutral_lobby
    map_x: 4
    map_y: -4
    spawns:
    - template: chip_doc_troutdale
      count: 1
      respawn_after: 0s
    properties:
      lighting: dim
      atmosphere: clinical
  - id: trout_east_gorge_road
    title: East Gorge Road
    description: 'Historic Highway 30 stretches east into the gorge, its surface buckled

      by tree roots and seasonal floods. Abandoned vehicles rust at the roadside,

      some converted into makeshift shelters. Salvagers work the wrecks

      methodically, cutting torches sparking in the grey light.

      '
    danger_level: sketchy
    exits:
    - direction: west
      target: trout_halsey_street
    - direction: east
      target: trout_crown_point_trail
    - direction: north
      target: trout_old_highway_ruins
    map_x: 8
    map_y: 0
    spawns:
    - template: salvager_crew
      count: 2
      respawn_after: 5m
    properties:
      lighting: overcast
      atmosphere: wind
  - id: trout_sandy_river_bank
    title: Sandy River Bank
    description: 'A wide gravel bar stretches along the Sandy River''s eastern bank,

      exposed by low water. Smooth river stones cover the ground in every shade

      of grey. Driftwood has piled into elaborate tangles at the bends.

      The far bank is thickly forested, hiding movement in the shadows.

      '
    danger_level: sketchy
    exits:
    - direction: north
      target: trout_sandy_river
    - direction: east
      target: trout_river_trail
    - direction: south
      target: trout_sandy_river
    map_x: 5
