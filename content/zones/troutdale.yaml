zone:
  id: troutdale
  danger_level: sketchy
  min_level: 3
  max_level: 12
  world_x: 6
  world_y: 0
  script_dir: content/scripts/zones/troutdale
  name: Troutdale
  description: Gateway to the Columbia River Gorge, where outlet mall ruins and relentless winds define
    a landscape of scavengers, runners, and wind mystics.
  start_room: trout_truck_stop
  rooms:
  - id: trout_i84_west
    title: I-84 Westbound On-Ramp
    description: 'The crumbling westbound on-ramp of Interstate 84 marks the edge of Troutdale.

      Wind screams through the concrete barriers, carrying grit and the smell of the river.

      Rusted guardrails lean outward like broken teeth. To the west, the freeway

      disappears toward the distant haze of Vancouver.

      '
    danger_level: safe
    exits:
    - direction: west
      target: vantucky_i84_east
      zone: vantucky
    - direction: east
      target: trout_stark_street
    - direction: south
      target: trout_frontage_road
    - direction: north
      target: trout_truck_stop
    map_x: 0
    map_y: 0
    equipment:
