      count: 2
      respawn_after: 4m
    properties:
      lighting: overcast
      atmosphere: desolate
  - id: troutdale_brothel
    title: The River's Edge Tavern
    danger_level: safe
    description: The highway motel's western wing, kept in better condition than the rest. A hand-painted
      sign reads RIVER'S EDGE with a fish below it. Inside, the carpeting is old but clean, the beds are
      actual beds, and the proprietor maintains a small bar. Small-town hospitality, small-town discretion.
    map_x: 0
    map_y: 100
    exits:
    - direction: east
      target: trout_neutral_lobby
