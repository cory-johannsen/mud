      lighting: fluorescent
      atmosphere: transit
  - id: trout_neutral_motel
    title: Rusted Anchor Motel
    description: 'A two-story cinder-block motel that somehow survived the collapse with

      most of its roof intact. Faded anchor logos dot the doors. The parking lot

      has been cleared and repurposed as a neutral meeting ground — weapons

      checked at the door, no questions asked. A hand-lettered sign reads

      "SAFE HARBOR. EVERYONE WELCOME."

      '
    danger_level: safe
    exits:
    - direction: west
      target: trout_truck_stop
    - direction: north
      target: trout_neutral_lobby
    map_x: 3
    map_y: -2
    spawns:
