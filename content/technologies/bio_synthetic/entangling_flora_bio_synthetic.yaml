id: entangling_flora_bio_synthetic
name: Bio-Snare Web
description: 'You cause bio-synthetic tendrils to erupt from the ground, entangling
  creatures. Each creature in the area must attempt a Reflex save.


  Critical Success The creature is unaffected.

  Success The creature takes a -5-foot circumstance penalty to its Speeds for 1 round.

  Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Immobilized] for
  1 round. It can attempt to @UUID[Compendium.pf2e.actionspf2e.Item.Escape] against
  your spell DC.

  Critical Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Immobilized]
  for 1 minute. It can attempt to @UUID[Compendium.pf2e.actionspf2e.Item.Escape] against
  your spell DC.'
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: Plants and fungi burst out or quickly grow, entangling creatures.
      All surfaces in the area are difficult terrain. Each round that a creature starts
      its turn in the area, it must attempt a Reflex save.
