id: bio_seal_membrane
name: Bio-Seal Membrane
description: 'You grow a replenishing protective bio-synthetic membrane around the
  target. The membrane enables the target to breathe even underwater or in a vacuum,
  protects from severe cold and heat, and grants a +1 status bonus to the target''s
  saves against inhaled dangers such as inhaled poisons and toxic gases.


  Heightened (7th) The status bonus increases to +2, and the membrane also grants
  resistance 5 to cold and fire.'
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 1
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You create a replenishing protective bubble of fresh, temperate air
      around the target. The shell of air enables the target to breathe even underwater
      or in a vacuum, protects from severe cold and heat
