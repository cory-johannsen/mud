id: asphyxiation_zone
name: Asphyxiation Zone
description: 'You render all air in the target area stagnant and oxygen-depleted,
  creating a shimmering haze of dead air. The stagnant air becomes difficult terrain.
  Creatures that breathe air and aren''t holding their breath must spend an action
  on their turn straining to breathe; once they do, they take 3d6 poison damage (basic
  Toughness save) from hypoxia and become Fatigued.


  Heightened (+2) The damage increases by 3d6.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 3d3
    damage_type: poison
    dc: 0
  on_failure:
  - type: damage
    dice: 3d6
    damage_type: poison
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d6
    damage_type: poison
    dc: 0
