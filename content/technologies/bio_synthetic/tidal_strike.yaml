id: tidal_strike
name: Tidal Strike
description: 'A surge of bio-synthetic hydraulic fluid propels you across the battlefield
  with fluid grace. You Stride up to 50 feet. This movement doesn''t trigger reactions.
  You can make a Strike at any point during your Stride. If your Strike hits, the
  hydraulic surge flows after you to batter the target, dealing an additional 2d6
  bludgeoning damage.


  Heightened (+1) The additional damage increases by 1d6.'
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 3
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 2d10
    damage_type: bludgeoning
    dc: 0
