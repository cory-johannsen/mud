id: chromatic_spore_burst
name: Chromatic Spore Burst
description: 'You launch a burst of multicolored bio-luminescent spores that damage and disorient foes. Each enemy in the area takes 4d6 poison damage and must attempt a Toughness save.


  Critical Success The creature is unaffected.

  Success The creature takes half damage.

  Failure The creature takes full damage and is Dazzled for 1 round.

  Critical Failure The creature takes double damage and is Dazzled for 1 minute.'
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 3
range: self
targets: single
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 4d6
    damage_type: poison
  - &id001
    type: condition
    condition_id: dazzled
    value: 1
  on_crit_failure:
  - type: damage
    dice: 8d6
    damage_type: poison
  - *id001
