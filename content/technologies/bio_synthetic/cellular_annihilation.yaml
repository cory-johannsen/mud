id: cellular_annihilation
name: Cellular Annihilation
description: 'You point at a creature and trigger a cascade of cellular self-destruction.
  The target takes 70 void damage with a basic Grit check. If the target is undead
  or otherwise has void healing, the tech loses the death and void traits and gains
  the vitality trait, and the target takes 70 vitality damage with a basic Fortitude
  save.


  Upgraded (+1) The damage increases by 10.'
tradition: bio_synthetic
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: '70'
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: '70'
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: '70'
    damage_type: void
    dc: 0
