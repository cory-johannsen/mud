id: elemental_storm_matrix
name: Elemental Storm Matrix
description: 'You synthesize four types of elemental compounds that combine forces
  to form a chaotic biochemical storm. The confluence has AC 28 and 120 Hit Points,
  weakness 10 to area effects, and immunity to bleed and poison. Creatures can move
  through the confluence; creatures within the confluence are concealed, and all creatures
  outside the confluence are concealed to creatures within it. When you Cast or Sustain
  this tech, you choose up to two different types of elements to activate.


  Air (air, electricity) The matrix releases a bolt of bioelectricity, dealing @Damage[4d4[electricity]]
  damage to creatures within 20 feet of the confluence, with a basic Reflex save.
  This doesn''t affect creatures that are completely inside of the confluence.

  Earth (earth) The confluence gains a +2 circumstance bonus to AC and resistance
  10 to all physical damage (except adamantine) for 1 round.

  Fire (fire) Thermal reactions roar through the confluence, dealing @Damage[1d6[persistent,fire]]
  damage to those partially or entirely inside the confluence.

  Metal (metal) The matrix flings shrapnel through the confluence, dealing @Damage[2d6[slashing]]
  damage to those partially or entirely inside the confluence with a basic Reflex
  save. A creature that critically fails also takes @Damage[1d6[persistent,bleed]]
  damage.

  Water (attack, water) The matrix expels a high-pressure jet. Attempt a ranged spell
  attack against a target within 60 feet of the confluence, using your spell attack
  roll modifier. This attack ignores concealment granted by the confluence, and the
  elemental gets a +2 circumstance bonus on the tech attack roll against a target
  inside the confluence. The water deals @Damage[4d6[bludgeoning]] damage on a hit
  (doubled on a critical hit). This attack doesn''t count toward your multiple attack
  penalty.

  Wood (wood) Roots and organic growths spread, making ground in the area difficult
  terrain.'
tradition: bio_synthetic
level: 6
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
