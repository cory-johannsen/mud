id: juvenile_companion
name: Companion Revert Protocol
description: You administer a growth-reversal compound to your bio-engineered companion, temporarily reverting it to a compact
  juvenile form.
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You transform your companion into its juvenile form, such as a cub, foal, kitten, puppy, or piglet, making
      the target appear harmless. It becomes Tiny (if it was larger), and its reach is reduced to 0
