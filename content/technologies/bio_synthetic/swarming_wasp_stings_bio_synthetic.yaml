id: swarming_wasp_stings_bio_synthetic
name: Swarming Wasp Stings
description: |-
    You manifest a swarm of disembodied wasp stingers that stab creatures in the area, possibly poisoning them. Creatures in the affected area take @Damage[1d6[piercing]] damage. Each creature that takes piercing damage must attempt a Fortitude save.

    Critical Success The target is unaffected.
    Success The target takes @Damage[2d6[poison]] damage.
    Failure The target is afflicted with Swarming Wasp Venom at stage 1.
    Critical Failure The target is afflicted with swarming wasp venom at stage 2.

    Swarming Wasp Venom (poison)
    Level 7
    Maximum Duration 6 rounds
    Stage 1 @Damage[2d6[poison]] damage and Clumsy 1 (1 round)
    Stage 2 @Damage[3d6[poison]] damage and Clumsy 2 (1 round)
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 1d3
          damage_type: piercing
          dc: 0
    on_failure:
        - type: damage
          dice: 1d6
          damage_type: piercing
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 2d6
          damage_type: piercing
          dc: 0
