id: cataclysm_spore_burst
name: Cataclysm Spore Burst
description: You draw chemical energy from your surroundings and unleash a devastating
  wave of bio-reactive compounds. All creatures in a 30-foot cone take 6d6 damage
  of a type you choose (acid, cold, electricity, fire, or poison) with a basic Reflex
  save.
tradition: bio_synthetic
level: 3
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
