id: combustible_spore_cloud
name: Combustible Spore Cloud
description: 'You release a cloud of combustible bio-synthetic spores. The cloud functions
  as Mist. If any open flame or fire effect contacts the cloud, it ignites. Creatures
  in the cloud take 10d6 fire damage with a basic Quickness check. After igniting, the
  cloud disperses.


  Upgraded (+1) The fire damage increases by 2d6.'
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 10d3
    damage_type: fire
    dc: 0
  on_failure:
  - type: damage
    dice: 10d6
    damage_type: fire
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 20d6
    damage_type: fire
    dc: 0
