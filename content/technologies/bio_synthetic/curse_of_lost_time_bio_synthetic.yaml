id: curse_of_lost_time_bio_synthetic
name: Accelerated Decay
description: You inject the target with enzymes that cause rapid cellular degradation.
  The effect depends on whether the target is an object, a construct, or a living
  creature. Artifacts and cursed items are immune.
tradition: bio_synthetic
level: 3
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 4d3
    damage_type: untyped
    dc: 0
  on_failure:
  - type: damage
    dice: 4d6
    damage_type: untyped
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 8d6
    damage_type: untyped
    dc: 0
