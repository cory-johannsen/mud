id: bounty_of_the_sky_bio_synthetic
name: Bounty of the Sky
description: You call forth a flock of geese that drop restorative fruits and breads from the sky as they fly overhead. You or an ally in the area can Interact to collect one of these gifts, and can then either consume it as part of the same action or do so with a separate Interact action later in the spell's duration. Enemies who attempt to pick up one of these gifts find that it turns to ash in their hands. Each time a character consumes one of these gifts, they can select one of the following benefits.The character regains 4d6 Hit Points.The character reduces the stage of one poison or disease they suffer from by one stage. This can't reduce the stage below 1 or cure the affliction.The character reduces the value of their @UUID[Compendium.pf2e.conditionitems.Item.Clumsy], @UUID[Compendium.pf2e.conditionitems.Item.Drained], @UUID[Compendium.pf2e.conditionitems.Item.Enfeebled], or @UUID[Compendium.pf2e.conditionitems.Item.Stupefied] condition by 2, or reduces two of the listed conditions by 1 each.Heightened (+2) The amount of Hit Points a character regains from consuming a gift increases by 2d6.
tradition: bio_synthetic
level: 6
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
resolution: none
effects:
    on_apply:
        - type: damage
          dice: 4d6
          damage_type: untyped
          dc: 0
