id: seashell_of_stolen_sound_bio_synthetic
name: Bio-Sound Capture Organ
description: |-
    Trigger A creature within range begins to make a sound.
    You store a sound in a seashell to use as you will: the last words of a loved one, a dragon's mighty roar, the compromising conversation between two powerful diplomats, or even more strange and secret. As part of Casting this tech, you must present an unbroken seashell. When you Use this tech, magic swirls around the triggering creature, copying the sounds they make, as well as any background noise, for the next minute and storing them in the seashell.
    You or another creature can then play the sound back from the seashell during the spell's duration by Interacting with the seashell, but once the sounds have been played back, the seashell shatters and the spell ends.
    As normal for spells with a duration until your next daily preparations, you can choose to continue expending the spell slot to prolong the duration of an existing seashell of stolen sound for another day. While the spell faithfully copies the sounds around the target, it doesn't reproduce any special auditory or sonic effects of the sound.
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 0
range: ranged
targets: single
duration: instant
resolution: none
