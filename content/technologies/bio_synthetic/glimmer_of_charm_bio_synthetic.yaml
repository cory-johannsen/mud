id: glimmer_of_charm_bio_synthetic
name: Glimmer of Charm
description: |-
    You're bathed in a smooth, almost glittering aura that improves the attitude of those near you. Any creature that ends its turn in the aura must attempt a Will saving throw with the following effects. No matter the result, it's then temporarily immune for 24 hours. The effect lasts until the spell ends, even after the creature leaves the aura.

    Critical Success The creature is unaffected and is aware of the aura.
    Success The creature's attitude toward you improves by one step. If that improves its attitude to at least @UUID[Compendium.pf2e.conditionitems.Item.Indifferent], it can't take hostile actions against you, though the effect ends as soon as you take a hostile action against the creature or its allies.
    Failure The creature's attitude toward you improves by two steps. It can't take hostile actions against you, though the effect ends as soon as you take a hostile action against the creature or its allies.
    Critical Failure The creature's attitude becomes @UUID[Compendium.pf2e.conditionitems.Item.Helpful] to you, though the effect ends as soon as you take a hostile action against the creature or its allies. While the creature is helpful, it can't take hostile actions against you.
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
