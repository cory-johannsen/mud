id: spider_sting_bio_synthetic
name: Paralytic Venom Gland
description: |-
    You magically duplicate a spider's venomous sting. You deal 1d4 piercing damage to the touched creature and afflict it with spider venom. The target must attempt a Toughness save.

    Critical Success The target is unaffected.
    Success The target takes @Damage[1d4[poison]] damage.
    Failure The target is afflicted with spider venom at stage 1.
    Critical Failure The target is afflicted with spider venom at stage 2.

    Spider Venom (poison)
    Level 1
    Maximum Duration 4 rounds
    Stage 1 1d4 poison damage and Enfeebled 1 (1 round)
    Stage 2 1d4 poison damage and Enfeebled 2 (1 round)
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: "1"
          damage_type: piercing
          dc: 0
    on_failure:
        - type: damage
          dice: 1d4
          damage_type: piercing
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 2d4
          damage_type: piercing
          dc: 0
