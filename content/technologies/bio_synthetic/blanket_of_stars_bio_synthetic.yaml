id: blanket_of_stars_bio_synthetic
name: Bioluminescent Shroud
description: 'A living membrane of adaptive chromatophores drapes over you, filled
  with pinpricks of bioluminescence. It synchronizes your biological signature with
  the ambient environment, granting you a +2 status bonus to Stealth checks to @UUID[Compendium.pf2e.actionspf2e.Item.Hide]
  and @UUID[Compendium.pf2e.actionspf2e.Item.Sneak].

  While outside under low-light conditions, you''re also @UUID[Compendium.pf2e.conditionitems.Item.Invisible]
  as long as you remain still. When moving under low-light conditions, you''re @UUID[Compendium.pf2e.conditionitems.Item.Concealed]
  instead.

  Gazing too closely at the shifting patterns is disorienting. Any creature that ends
  its turn adjacent to you must attempt a Will save; this is a mental, visual effect.Success
  The creature is unaffected.

  Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Dazzled] until
  the end of its next turn.

  Critical Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Confused]
  and dazzled until the end of its next turn.'
tradition: bio_synthetic
level: 6
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
