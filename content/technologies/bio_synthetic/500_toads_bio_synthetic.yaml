name: Spore Flood
description: You release a flood of engineered micro-organisms that carpet the area. Their biomass is sufficient to trigger
  weight- and motion-sensitive hazards, and the living carpet renders the area difficult terrain. Destroyed organisms are
  rapidly replaced for the duration.
