id: laryngeal_bloat
name: Laryngeal Bloat
description: 'You inject mutagenic compounds that cause the target''s vocal cords
  to swell grotesquely. The target must attempt a Toughness save.


  Critical Success The target is unaffected.

  Success The target takes a -1 penalty to Deception checks involving speech.

  Failure The target can only croak, taking a -4 penalty to all speech-based checks.

  Critical Failure The target is rendered mute for the duration.'
tradition: bio_synthetic
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d6
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 2d10
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d10
    damage_type: mental
    dc: 0
