id: toxin_spore_mines
name: Toxin Spore Mines
description: 'Area four unoccupied 5-foot squares, each of which is at least 20 feet
  apart


  You cultivate four bio-engineered bulbs, each filled with toxic spores and sensitive
  to motion. When a creature enters a space adjacent to a bulb, or when a bulb is
  touched or damaged (each bulb has AC 5), the bulb detonates and releases spores
  in a @Template[emanation|distance:15]. Creatures in the area take 8d8 poison damage
  and must attempt a Toughness save with the following results.


  Critical Success The creature is unaffected.

  Success The creature takes half damage and becomes @UUID[Compendium.pf2e.conditionitems.Item.Dazzled]
  for 1 round.

  Failure The creature takes full damage, becomes dazzled for 1 round, and becomes
  Stupefied 1 for 1 minute.

  Critical Failure The creature takes double damage, is dazzled for 1 round, and becomes
  Stupefied 2 for 1 minute.


  Heightened (+1) The damage increases by 2d8.'
tradition: bio_synthetic
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d4
    damage_type: poison
    dc: 0
  on_failure:
  - type: damage
    dice: 8d8
    damage_type: poison
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d8
    damage_type: poison
    dc: 0
