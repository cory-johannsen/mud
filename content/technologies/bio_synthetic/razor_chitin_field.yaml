id: razor_chitin_field
name: Razor Chitin Field
description: 'You cause razor-sharp chitin blades to sprout from the ground, slashing
  at and obstructing creatures in the area. The area is difficult terrain. Each creature
  in the area when the tech is activated and who end their turn within the area take
  3d6 slashing damage and bleed damage, with a basic Quickness check.


  Upgraded (+2) The slashing damage increases by 1d6.'
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 3d3
    damage_type: slashing
    dc: 0
  on_failure:
  - type: damage
    dice: 3d6
    damage_type: slashing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d6
    damage_type: slashing
    dc: 0
