id: solar_flare_detonation
name: Solar Flare Detonation
description: 'A powerful globe of concentrated solar energy explodes in the area, dealing 8d10 fire damage to all creatures in the area, plus an additional 1d10 vitality damage to undead creatures. Each creature in the area must attempt a Reflex save.


  Critical Success The creature is unaffected.

  Success The creature takes half damage.

  Failure The creature takes full damage.

  Critical Failure The creature takes full damage and becomes Blinded permanently.

  If the globe overlaps with an area of darkness-based tech, the solar flare attempts to counteract the darkness effect.


  Heightened (+1) The fire damage increases by 1d10, and the vitality damage against undead increases by 1d10.'
tradition: bio_synthetic
level: 7
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d6
    damage_type: fire
    dc: 0
  on_failure:
  - type: damage
    dice: 8d10
    damage_type: fire
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d10
    damage_type: fire
    dc: 0
