id: threefold_aspect_bio_synthetic
name: Threefold Aspect
description: |-
    This spell allows you to change between three versions of yourself of different ages: a maiden (young adult), a mother (adult), or a matriarch (elderly). Choose one when you Cast the Spell. While the spell lasts, you can change the age to any of the three or to your natural age by Sustaining the spell. Your form always looks like you regardless of the age, and creatures who know you still recognize you and can tell your age is different.
    Threefold aspect alters your physical appearance and personality to present an authentic version of yourself at various ages. This grants you a +4 status bonus to Deception checks to pass as the chosen age, and you can add your level as a proficiency bonus to these checks even if you're untrained. Furthermore, unless a creature specifically uses a @UUID[Compendium.pf2e.actionspf2e.Item.Seek] action or otherwise carefully examines you, it doesn't get a chance to notice that you aren't at your true age. You can Dismiss this spell.
tradition: bio_synthetic
level: 3
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
