id: bio_hardening_membrane
name: Bio-Hardening Membrane
description: |-
    You ward yourself with shimmering magical energy, gaining a +1 item bonus to AC and a maximum Dexterity modifier of +5. While wearing mystic armor, you use your unarmored proficiency to calculate your AC.
    Mystic Armor

    Upgraded (4th) You gain a +1 item bonus to saving throws.
    Upgraded (6th) The item bonus to AC increases to +2, and you gain a +1 item bonus to saving throws.
    Upgraded (8th) The item bonus to AC increases to +2, and you gain a +2 item bonus to saving throws.
    Upgraded (10th) The item bonus to AC increases to +3, and you gain a +3 item bonus to saving throws.
