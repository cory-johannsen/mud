id: all_is_one_one_is_all_bio_synthetic
name: Biomass Redistribution
description: You meld the targets' biological matter and life force into a single
  organism and then, in an instant, sift them back out into their component selves.
  When you separate the targets back into themselves, you can choose to switch the
  positions of any number of targets with the positions of other targets. Additionally,
  you can modulate the share of vital essence to share the burden of pain. Distribute
  the Hit Points of all targets however you choose, except that no target can receive
  fewer than 1 Hit Point or more than their maximum Hit Points.
tradition: bio_synthetic
level: 8
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
resolution: none
