id: sound_body_bio_synthetic
name: Sound Body
description: |-
    You send a surge of healing energy to restore the target's body. Attempt to counteract an effect of your choice imposing one of these conditions on the target: @UUID[Compendium.pf2e.conditionitems.Item.Blinded], @UUID[Compendium.pf2e.conditionitems.Item.Dazzled], @UUID[Compendium.pf2e.conditionitems.Item.Deafened], @UUID[Compendium.pf2e.conditionitems.Item.Enfeebled], or @UUID[Compendium.pf2e.conditionitems.Item.Sickened]. If you didn't counteract the effect, but you would have if its counteract rank were 2 lower, instead suppress the effect until the beginning of your next turn. The effect's duration doesn't elapse while it's suppressed.
    This spell can't counteract or suppress curses, diseases, or conditions that are part of the target's normal state.Heightened (4th) Add @UUID[Compendium.pf2e.conditionitems.Item.Drained] and @UUID[Compendium.pf2e.conditionitems.Item.Slowed] to the list of conditions.
    Heightened (6th) As 4th rank, plus add @UUID[Compendium.pf2e.conditionitems.Item.Petrified].
    Heightened (8th) As 4th rank, plus add petrified and @UUID[Compendium.pf2e.conditionitems.Item.Stunned].
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
    on_apply:
        - type: utility
          dc: 0
          description: 'You send a surge of healing energy to restore the target''s body. Attempt to counteract an effect of your choice imposing one of these conditions on the target: @UUID[Compendium.pf2e.conditionitems.Ite'
