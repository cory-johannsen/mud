id: parasitic_infestation
name: Parasitic Infestation
description: 'You infest the target with bio-synthetic parasites that devour tissue. The target takes 4d6 poison damage and must attempt a Grit check.


  Critical Success The creature takes no damage.

  Success The creature takes half damage.

  Failure The creature takes full damage and is Sickened 1.

  Critical Failure The creature takes double damage and is Sickened 2.'
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 4d3
    damage_type: piercing
    dc: 0
  on_failure:
  - type: damage
    dice: 4d6
    damage_type: piercing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 8d6
    damage_type: piercing
    dc: 0
