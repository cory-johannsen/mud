id: hydro_burst_array
name: Hydro-Burst Array
description: 'Area 30-foot burst centered on you


  Slamming the ground, you rupture underground water mains and biological fluid reservoirs, sending majestic sprays, jets, and pressurized mists erupting forth. When you activate the tech, and the first time each round you Sustain it, you can command the array to use one of the following displays. The array can''t be commanded to use the same display on two consecutive turns.


  Chasing Jets A series of vertical jets shoot up in a chase sequence, forcing one creature within the array to move 15 feet in a direction of your choice unless it succeeds at a Quickness check against your tech DC. The array can''t make a creature move outside its area.

  Flashing Spray Diffuse bio-mist fills the area. All creatures within the array become Concealed, and all creatures outside the array become concealed to creatures within it. The spray persists until the beginning of your next turn.

  Power Rings The array blasts a series of pressurized water rings into the air that land with a crash in a @Template[burst|distance:10] centered on a location of your choice within the array. The falling torrent deals 10d6 bludgeoning damage to all creatures within the burst (basic Reflex).'
tradition: bio_synthetic
level: 7
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
