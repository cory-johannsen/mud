id: eagle_eye_mutation
name: Eagle-Eye Mutation
description: Your optical organs temporarily mutate, granting telescopic vision. You
  can view creatures, objects, and terrain more than 30 feet away and up to 30 miles
  away as though they were only 30 feet away.
tradition: bio_synthetic
level: 3
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You can see distant objects as if they were closer. You can view
      creatures, objects, and terrain features that are more than 30 feet away and
      up to 300 feet away as though they were only 30 feet away.
