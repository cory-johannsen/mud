id: biome_reclamation_pulse
name: Biome Reclamation Pulse
description: You sense the synthetic pollution choking this zone and initiate a bio-reclamation protocol. You attempt to restore the area to a natural state, removing all artificial objects and buildings and encouraging the growth of plants on the ground that remains. Creatures are unaffected unless caught in a structural collapse.Ground All ground within the area becomes greater difficult terrain for 1 round.Objects Any unattended object of Bulk 4 or less is destroyed, regardless of Hardness, unless it's an artifact or similarly hard to destroy.Plants Plants in the area become healthier and more fruitful for 1 year.Structures Structures within range are shaken and may collapse, as if affected by Earthquake.
