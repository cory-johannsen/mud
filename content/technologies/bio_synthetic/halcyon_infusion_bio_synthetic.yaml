id: halcyon_infusion_bio_synthetic
name: Mutagenic Awakening
description: 'You infuse mutagenic compounds into your target, unlocking dormant bio-pathways
  and granting them the ability to channel biological energy.

  Choose a 1st-rank spell you prepared today or that''s in your repertoire, of the
  same tradition you used to cast mutagenic awakening. The spell must be one that
  has a listed range. If the target is at least 3rd level, you can choose a 2nd-rank
  spell instead of a 1st-rank spell; and if the target is at least 5th level, you
  can choose a 3rd-rank spell. The target can Use this tech once per day as an innate
  spell of the tradition you used to cast mutagenic awakening. If they are untrained
  in the appropriate magical tradition, their spell attack bonus is 2 + their level
  + their highest mental ability modifier, and their tech DC is 12 + their level
  + their highest mental ability modifier.

  Unlike most abilities that can only be used once per day, the target refreshes their
  use of the granted innate spell each day only after you make your daily preparations
  and choose to extend the infusion''s duration by either refraining from preparing
  a spell in the slot (if you''re a prepared spellcaster) or expending another spell
  slot (if you''re a spontaneous spellcaster).


  Heightened (8th) If the target is at least 7th level, you can choose a 4th-rank
  spell.

  Heightened (10th) As 8th, and if the target is at least 9th level, you can choose
  a 5th-rank spell.'
tradition: bio_synthetic
level: 6
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
