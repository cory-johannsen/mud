id: stinking_cloud_bio_synthetic
name: Stinking Cloud
description: |-
    You create a cloud of putrid mist in the area. The cloud functions as @UUID[Compendium.pf2e.spells-srd.Item.Mist] except it sickens creatures that end their turns within the cloud. (The @UUID[Compendium.pf2e.conditionitems.Item.Concealed] condition is not a poison effect.)

    Critical Success The creature is unaffected.
    Success The creature is Sickened 1.
    Failure The creature is Sickened 1 and Slowed 1 while in the cloud.
    Critical Failure The creature is Sickened 2 and Slowed 1 until it leaves the cloud.
tradition: bio_synthetic
level: 3
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
