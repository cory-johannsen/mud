  while in the area. Once per round, you can Sustain the spell to make a tendril lash
  out from any square within the expanse. This tendril has a 15-foot reach. Make a
  melee tech attack roll against the target; on a success, the tendril pulls the
  target into the growth and makes it @UUID[Compendium.pf2e.conditionitems.Item.Immobilized]
  for 1 round or until the creature Escapes (against your tech DC), whichever comes
  first.

  @UUID[Compendium.pf2e.spell-effects.Item.tech Effect: Tangling Creepers]'
