id: necrotic_march_signal
name: Necrotic March Signal
description: 'You emit a biochemical signal that empowers undead and terrifies the living. Undead creatures within the area gain the Quickened condition for 1 minute, which they can use only to Stride.

  Living creatures in the area must attempt a Willpower save. This gains the emotion, fear, and mental traits for living creatures.


  Critical Success The creature is unaffected.

  Success The creature is Frightened 1.

  Failure The creature is Frightened 2.

  Critical Failure The creature is Frightened 3 and Paralyzed for 1 round.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: frightened
    value: 1
  on_crit_failure:
  - *id001
