id: genetic_override_command
name: Genetic Override Command
description: 'You issue a command backed by the target''s own genetic signature, compelling
  obedience at a biological level. Your instructions can''t be self-destructive. Though
  this protocol has the linguistic trait, this applies only to the instructions. The
  target must attempt a Will saving throw.


  Critical Success The target is unaffected, is temporarily immune for 1 week, and
  identifies your genetic signature.

  Success The target is unaffected, is temporarily immune for 1 day, and identifies
  a fragment of your genetic signature.

  Failure The target does as you command. Duration is 10 minutes, or until the target
  has completed a finite instruction or it becomes self-destructive. Temporarily immune
  for 1 hour.

  Critical Failure As failure, but duration is 8 hours, and no temporary immunity.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You instruct the target to do something, compelling obedience by
      calling it by its true name. Your instructions can't be self-destructive. Though
      this tech has the linguistic trait, this applies only
