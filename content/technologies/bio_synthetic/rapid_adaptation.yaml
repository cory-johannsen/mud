id: rapid_adaptation
name: Rapid Adaptation
description: 'You flood the target with energy from the terrain around it, compressing centuries of evolution into a single moment. The target gains one of the following natural adaptations based on the surrounding environment.Aquatic The target gains a swim Speed equal to its land Speed. If it already had a swim Speed, it gains a +10-foot status bonus to its swim Speed.Arctic The target isn''t affected by severe or extreme cold, and when it rolls a success on an Acrobatics check to Balance on ice and snow, it gets a critical success instead.Desert The target isn''t affected by severe or extreme heat, and when it rolls a success on an Acrobatics check to Balance on sand, it gets a critical success instead.Forest The target gains scent as an imprecise sense with a range of 30 feet.Mountain The target isn''t @UUID[Compendium.pf2e.conditionitems.Item.Off-Guard] when Climbing, and when it rolls a success on an Acrobatics check to Balance on rubble, it gets a critical success instead.Plains The target gains a +10-foot status bonus to its land Speed.Underground The target gains darkvision.@UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Rapid Adaptation]'
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
