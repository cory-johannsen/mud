id: chilling_spray_bio_synthetic
name: Chilling Spray
description: |-
    A cone of icy shards bursts from your spread hands and coats the targets in a layer of frost. You deal 2d4 cold damage to creatures in the area; they must each attempt a Reflex save.Critical Success The creature is unaffected.
    Success The creature takes half damage.
    Failure The creature takes full damage and takes a –5-foot status penalty to its Speeds for 2 rounds.
    Critical Failure The creature takes double damage and takes a –10-foot status penalty to its Speeds for 2 rounds.Heightened (+1) The damage increases by 2d4.
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: "2"
          damage_type: cold
          dc: 0
    on_failure:
        - type: damage
          dice: 2d4
          damage_type: cold
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 4d4
          damage_type: cold
          dc: 0
