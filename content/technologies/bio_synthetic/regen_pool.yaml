id: regen_pool
name: Regen Pool
description: 'You create a pool of bio-synthetic regenerative fluid that you and your
  allies can draw from later. The pool appears as a disc of shimmering green liquid
  on the ground in a square within range. At any time during the duration, if you
  or an ally are adjacent to the pool, that character can Interact to tap the pool''s
  restorative properties, regaining 4d8 Hit Points.


  The pool can be tapped a total of 3 times before it is exhausted.


  Upgraded (+1) The healing increases by 1d8.'
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 4d8
    damage_type: untyped
    dc: 0
