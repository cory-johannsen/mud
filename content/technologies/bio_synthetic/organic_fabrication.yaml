id: organic_fabrication
name: Organic Fabrication
description: 'You bio-synthesize a temporary object from organic raw materials. It
  must consist of organic or mineral matter (such as wood, paper, bone, or stone)
  and be 5 cubic feet or smaller. It can''t rely on intricate artistry or complex
  moving parts, never fulfills a cost, and can''t be made of precious materials or
  materials with a rarity of uncommon or higher. It is obviously temporarily synthesized.


  Heightened (5th) The item is metal and can include common minerals.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
