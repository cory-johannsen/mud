id: elemental_sense_bio_synthetic
name: Elemental Sensor Array
description: 'Your bio-synthetic implants grant enhanced elemental perception. Choose
  one sensor mode. The spell gains the listed trait or traits. All sensor modes and
  their effects remain identical to the base protocol (Aquatic Echolocation, Heatsense,
  Magnetoreception, Mechanoreception, Tremorsense, Woodsense).


  Heightened (6th) The duration increases to 8 hours, and you can take 1 minute to
  recalibrate, switching sensor modes.'
