id: rapid_clone_deployment
name: Rapid Clone Deployment
description: 'You bio-print a combat-ready duplicate of your companion from accelerated
  stem cells, and the duplicate fights alongside its twin, mirroring the original''s
  actions. The duplicate appears adjacent to your companion and has the same statistics.

  Each time you Command your companion, both your companion and its duplicate gain
  2 actions. The duplicate always acts immediately after your companion and must use
  identical actions to the ones your companion used, in exactly the same order. However,
  it can use the actions differently, such as Striding to a different position or
  selecting a different target for a Strike. If the duplicate is unable to mimic an
  action, it performs the action without result and the action is wasted. The duplicate
  can''t use any actions that can be used only a limited number of times per day.

  The duplicate isn''t truly alive and can''t be healed in any way. If the duplicate
  ever reaches 0 Hit Points, it is instantly destroyed and rapid clone deployment
  immediately ends.'
tradition: bio_synthetic
level: 8
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
