id: mineral_sculpting
name: Mineral Sculpting
description: 'You reshape stone or mineral matter into a rough shape of your choice. The process is too crude for intricate parts or fine details. Any creatures standing atop the stone when you reshape it must each attempt a Quickness check or Acrobatics check.


  Success The creature is unaffected.

  Failure The creature falls Prone atop the stone.

  Critical Failure The creature falls off the stone (if applicable) and lands Prone.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: prone
    value: 1
  on_crit_failure:
  - *id001
