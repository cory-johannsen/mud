id: impart_empathy_bio_synthetic
name: Impart Empathy
description: |-
    You expand the target's ability to understand social cues that are normally beyond its comprehension. Any creature to which the target isn't unfriendly or hostile can use Diplomacy to @UUID[Compendium.pf2e.actionspf2e.Item.Make an Impression] on it and to make very simple Requests of it. This doesn't render the animal any more inclined to help than it otherwise would be.

    Heightened (4th) The spell can also target plants and fungi.
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
