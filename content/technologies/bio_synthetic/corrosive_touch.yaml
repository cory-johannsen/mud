id: corrosive_touch
name: Corrosive Touch
description: 'You cause the target to rapidly corrode via bio-synthesized oxidizing agents. This can affect nonferrous materials, but the target must be all or mostly metal. Skymetals such as adamantine and orichalcum are immune.

  All damage ignores Hardness. If the spell causes persistent damage, a creature can scrape off the corrosion (reducing the DC of the flat check to end persistent damage to 10 and granting an immediate flat check).


  Creature or Hazard Must be mostly metal. Deals 8d6 damage (basic Toughness save), plus 2d6 persistent on a failed save.


  Item Deals [[/r {2d6}]]{2d6 damage}, subject to a basic Reflex save by the creature wearing or holding the item; unattended items automatically critically fail. On a failed save, also 1d6 persistent.


  Heightened (+1) Increase creature/hazard damage by 2d6, and increase max Bulk of targetable items by 1.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 2d6
    damage_type: untyped
    persistent: true
  - type: damage
    dice: 1d6
    damage_type: untyped
    persistent: true
  on_crit_failure:
  - type: damage
    dice: 2d6
    damage_type: untyped
    persistent: true
  - type: damage
    dice: 1d6
    damage_type: untyped
    persistent: true
