id: tomorrows_dawn_bio_synthetic
name: Restorative Dawn Aura
description: 'Bright bioluminescent energy radiates from your body in a 20-foot radius
  (and dim light for the next 20 feet). You gain mental resistance 5. Any undead or
  corrupted creature that begins its turn adjacent to you must attempt a Will save.

  Critical Success The creature is unaffected and immune for the remaining duration.

  Success The creature is Sickened 1 until the end of its turn.

  Failure The creature is sickened 1 and becomes Slowed 1 until the end of its next
  turn.

  Critical Failure As failure, but Sickened 2 and remains slowed 1 for the rest of
  the duration.Heightened (6th) Mental resistance 10.

  Heightened (8th) Mental resistance 15.'
