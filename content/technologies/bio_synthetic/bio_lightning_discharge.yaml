id: bio_lightning_discharge
name: Bio-Lightning Discharge
description: |-
    You call down a tendril of lightning that cracks with thunder, dealing 1d12 electricity damage and 1d4 sonic damage to the target with a basic Reflex save. A target wearing metal armor or made of metal takes a –1 circumstance bonus to its save, and if damaged by the spell is Clumsy 1 for 1 round.

    Heightened (+1) The damage increases by 1d12 electricity and 1d4 sonic.
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 1d8
          damage_type: electricity
          dc: 0
        - type: damage
          dice: "1"
          damage_type: sonic
          dc: 0
    on_failure:
        - type: damage
          dice: 1d12
          damage_type: electricity
          dc: 0
        - type: damage
          dice: 1d4
          damage_type: sonic
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 2d12
          damage_type: electricity
          dc: 0
        - type: damage
          dice: 2d4
          damage_type: sonic
          dc: 0
