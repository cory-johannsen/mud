id: ranages_circle_bio_synthetic
name: Ranage's Circle
description: |-
    Many stories tell of a clearing deep in the Mwangi jungle, surrounded by ancient cypress trees. At the center stands an ancient baobab tree growing around a large sphere of black basalt. Legends say that two spirit brothers, Ranage and Golokango, dwelled there long ago until Golokango's evil ways forced the virtuous Ranage to encase his brother in stone. Ranage then transformed himself into a tree to surround and protect the rock for all time. By telling this tale, you condemn an enemy to a stony fate similar to Golokango's and summon plants to surround them.
    When you Cast this Spell, every square adjacent to the target becomes difficult terrain from the sudden eruption of plant life for 1 minute. The target also attempts a Fortitude save.Critical Success The target is unaffected.
    Success The target is Clumsy 1 as their feet are bound within stone. This condition lasts until they move from their current position.
    Failure The target is Clumsy 2 and @UUID[Compendium.pf2e.conditionitems.Item.Immobilized] as their legs are encased in rock. The clumsy condition lasts until they move from their current position, and they can @UUID[Compendium.pf2e.actionspf2e.Item.Escape] from being immobilized with a check against your spell DC.
    Critical Failure The target is clumsy 2 and @UUID[Compendium.pf2e.conditionitems.Item.Restrained] as nearly their entire body is covered in basalt. The clumsy condition lasts until they move from their current position, and they can Escape from being restrained with a successful check against your spell DC.
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
