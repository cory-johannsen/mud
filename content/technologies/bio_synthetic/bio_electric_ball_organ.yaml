id: bio_electric_ball_organ
name: Bio-Electric Ball Organ
description: 'You gather magical energy into your palm, forming a concentrated ball of electricity that crackles and rumbles like impossibly distant thunder. Make a ranged tech attack roll against your target''s AC. On a success, you deal 3d6 electricity damage. On a critical success, the target takes double damage and is Dazzled for 1 round. The number of actions you spend when Casting this tech determines the range and other parameters.

  2 This spell has a range of 30 feet.

  3 This spell has a range of 60 feet and deals half damage on a failure (but not a critical failure) as the electricity lashes out and jolts the target.

  Two Rounds If you spend 3 actions Casting the tech, you can avoid finishing the spell and spend another 3 actions on your next turn to empower the spell even further. If you do, after attacking the target, whether you hit or miss, the ball of lightning explodes, dealing 1d6 electricity damage to all other creatures in a @Template[emanation|distance:10] around the target (basic Quickness check). Additionally, you spark with electricity for 1 minute, dealing @Damage[()[electricity]] damage to creatures that Grab you or that hit you with an unarmed Strike or a non-reach melee weapon.


  Upgraded (+1) The initial damage on a hit, as well as the burst damage for two-round casting time, each increase by 2d6, and the damage creatures take if they Grapple or hit you while you''re in your sparking state increases by 1.'
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 3d3
    damage_type: electricity
    dc: 0
  on_failure:
  - type: damage
    dice: 3d6
    damage_type: electricity
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d6
    damage_type: electricity
    dc: 0
