id: cryo_wall
name: Cryo Wall
description: 'You construct a barrier of bio-synthetic cryogenic compound that blocks
  sight and freezes foes when shattered. You create either a 1-foot-thick wall in
  a straight line up to 60 feet long and 10 feet high, or a 1-foot-thick, 10-foot-radius
  hemisphere. Each 10-foot-by-10-foot section has AC 10, Hardness 10, and 40 Hit Points.


  When a section is destroyed, it releases a blast of cryogenic compound dealing 3d6
  cold damage to creatures within 10 feet (basic Reflex save).


  Heightened (+2) The Hit Points of each section increase by 10, and the cold damage
  increases by 1d6.'
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 2d6
    damage_type: cold
    dc: 0
