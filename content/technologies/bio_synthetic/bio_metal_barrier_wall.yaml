id: bio_metal_barrier_wall
name: Bio-Metal Barrier Wall
description: 'You extrude a sheet of bio-synthesized metal, forming a wall of organic
  iron, low-grade cold iron, or standard-grade silver up to 60 feet long, 30 feet
  high, and 1/4 inch thick. The wall doesn''t need to stand vertically but must form
  a straight line in an unbroken open space so it doesn''t pass through any creatures
  or objects, or the spell is lost. Each 10-foot-by-10-foot section of the wall has
  AC 10 and is immune to critical hits and precision damage. The wall''s Hardness,
  HP, and BT use the statistics of a structure of the material you chose. Creatures
  can move through a section of the wall that''s broken.


  Upgraded (7th) The wall is high-grade silver or standard-grade dawnsilver.

  Upgraded (8th) The wall is standard-grade cold iron.

  Upgraded (9th) The wall is high-grade dawnsilver.

  Upgraded (10th) The wall is high-grade cold iron or standard-grade adamantine.'
tradition: bio_synthetic
level: 6
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: minutes:1
resolution: none
