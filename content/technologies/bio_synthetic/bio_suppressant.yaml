id: bio_suppressant
name: Bio-Suppressant
description: You deploy fire-suppressing bio-organisms that extinguish flames. All
  non-magical fires in the area are extinguished. You can also attempt to counteract
  one magical fire effect in the area.
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 4d4
    damage_type: untyped
    dc: 0
  on_failure:
  - type: damage
    dice: 4d8
    damage_type: untyped
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 8d8
    damage_type: untyped
    dc: 0
