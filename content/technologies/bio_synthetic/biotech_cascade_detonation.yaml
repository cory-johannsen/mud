id: biotech_cascade_detonation
name: Biotech Cascade Detonation
description: You cause the biological energies in a target's augmentations to explode
  outward. Choose a creature within 60 feet that has active biological augmentations
  or is under a biological effect. That creature takes 10d6 force damage (Fortitude
  save for half). Each creature adjacent to the target takes 5d6 force damage (Fortitude
  save for half).
tradition: bio_synthetic
level: 9
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d3
    damage_type: force
    dc: 0
  on_failure:
  - type: damage
    dice: 8d6
    damage_type: force
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d6
    damage_type: force
    dc: 0
