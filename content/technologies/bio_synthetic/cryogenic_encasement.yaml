id: cryogenic_encasement
name: Cryogenic Encasement
description: Bio-synthesized ice crystallizes around a creature, imprisoning it within
  a cryogenic pillar. On a successful saving throw, the creature is pushed to an adjacent
  space of its choice; otherwise, it's frozen inside the pillar and becomes @UUID[Compendium.pf2e.conditionitems.Item.Restrained]
  as its body can barely move within the ice. The ice has AC 10, Hardness 10, and
  60 Hit Points; it's immune to critical hits, cold damage, and precision damage,
  and it has weakness 15 to fire. If the ice is destroyed, the creature within is
  freed and the spell immediately ends.
tradition: bio_synthetic
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
