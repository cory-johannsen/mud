id: organic_seal
name: Organic Seal
description: You bond a bio-synthetic resin to the target object, sealing it shut.
  The object gains a +4 status bonus to its DC against attempts to open it for the
  duration.
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
