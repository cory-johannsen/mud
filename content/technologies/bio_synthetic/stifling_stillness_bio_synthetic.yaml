id: stifling_stillness_bio_synthetic
name: Stifling Stillness
description: |-
    You make all air in the target area unnaturally still and unyielding, creating a shimmering haze. The stagnant, heavy air becomes an area of difficult terrain. Creatures in the area that breathe air and aren't holding their breath must spend a single action on their turn straining to breathe the stagnant air; once they do, they still mostly breathe their own exhaled air, taking 3d6 poison damage (basic Fortitude save) and becoming @UUID[Compendium.pf2e.conditionitems.Item.Fatigued].

    Heightened (+2) The damage increases by 3d6.
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 3d3
          damage_type: poison
          dc: 0
    on_failure:
        - type: damage
          dice: 3d6
          damage_type: poison
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 6d6
          damage_type: poison
          dc: 0
