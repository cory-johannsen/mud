id: migration
name: Adaptive Terrain Shift
description: 'The targets naturally take on animal forms most fitting their movement
  and environment through rapid bio-synthetic adaptation. Each target gains a land,
  burrow, climb, fly, and swim Speed of 40 feet, and can transform into a Tiny or
  Small animal most appropriate for a given movement and environment. It also gains
  immunity to mild, severe, and extreme cold and heat, along with any other immunities
  common to the local wildlife, at the GM''s discretion. In exploration mode, a target
  can move much faster, at a travel Speed of 20 miles per hour.

  A target can''t Strike, cast spells, or use most manipulate actions in animal form,
  but it can resume its normal shape by Sustaining the tech. It can Sustain the tech
  again to resume animal form.'
tradition: bio_synthetic
level: 8
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
