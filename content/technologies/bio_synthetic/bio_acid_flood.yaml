id: bio_acid_flood
name: Bio-Acid Flood
description: You rupture a gland that expels a torrent of corrosive fluid sweeping
  away from you. You deal 6d6 bludgeoning damage to creatures in the area with a basic
  Quickness check. The flood also dissolves non-structural organic material it passes
  through.
tradition: bio_synthetic
level: 3
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 6d3
    damage_type: bludgeoning
    dc: 0
  on_failure:
  - type: damage
    dice: 6d6
    damage_type: bludgeoning
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 12d6
    damage_type: bludgeoning
    dc: 0
