id: engrave_memory_bio_synthetic
name: Memory Stone
description: 'You encode memories into a crystalline bio-synthetic substrate. This
  memory can convey up to 10 minutes of material. When you activate this tech, choose
  a command phrase. Any creature can access the stored memories by using an action
  to speak the command phrase while holding the substrate.


  Heightened (6th) The memory can convey up to 1 hour of material.'
