id: metabolic_transfer
name: Metabolic Transfer
description: 'You bio-chemically siphon speed from a foe and redirect it to yourself
  or an ally. The effects depend on the foe''s Toughness save.


  Critical Success The targets are unaffected.

  Success The foe is Slowed 1 for 1 round, and the other target is unaffected.

  Failure The foe is slowed 1 for 3 rounds and the other target is Quickened for 1
  round. The extra action can be used to Step, Stride, or Strike.

  Critical Failure The foe is slowed 1 for 3 minutes and the other target is quickened
  for 1 minute. The extra action can be used to Step, Stride, or Strike.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
