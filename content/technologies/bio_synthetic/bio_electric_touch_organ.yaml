id: bio_electric_touch_organ
name: Bio-Electric Touch Organ
description: You shroud your hands in a crackling field of lightning. Make a melee tech attack roll. On a hit, the target takes 2d12 electricity damage. If the target is wearing metal armor or is made of metal, you gain a +1 circumstance bonus to your attack roll with shocking grasp, and the target also takes @Damage[(1d4+(()-1))[persistent,electricity]] damage on a hit. On a critical hit, double the initial damage, but not the persistent damage.Heightened (+1) The damage increases by 1d12, and the persistent electricity damage increases by 1.
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: attack
effects:
  on_hit:
  - type: damage
    dice: 2d12
    damage_type: electricity
    dc: 0
  on_crit_hit:
  - type: damage
    dice: 4d12
    damage_type: electricity
    dc: 0
