  Using bio-synthetic osmotic manipulation, you raise or lower the level of water
  in the chosen area by 10 feet. Creatures that have the water trait in the area must
  attempt a Grit check.


  Upgraded (+2) You can raise or lower the water by an additional 10 feet.'
