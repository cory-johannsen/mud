id: hippocampus_retreat_bio_synthetic
name: Aquatic Propulsion Organ
description: |-
    Requirements You're mostly or totally submerged in water.You temporarily shape your lower limbs into the tail of a hippocampus in order to swim away from a nearby foe after dealing a parting blow. Attempt a melee tech attack roll against the target's AC, dealing 2d6 bludgeoning damage on a hit (or double damage on a critical hit). Then, Swim up to 30 feet; if you already have a swim Speed, you can Swim up to your Speed with a +10-foot circumstance bonus. You gain a +2 circumstance bonus to your AC against reactions triggered by this movement. At the end of the movement, your lower limbs return to normal.
    @UUID[Compendium.pf2e.spell-effects.Item.tech Effect: Hippocampus Retreat]Heightened (+1) The damage increases by 1d6.
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: attack
effects:
    on_hit:
        - type: damage
          dice: 2d6
          damage_type: bludgeoning
          dc: 0
    on_crit_hit:
        - type: damage
          dice: 4d6
          damage_type: bludgeoning
          dc: 0
