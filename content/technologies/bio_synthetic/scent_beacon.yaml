id: scent_beacon
name: Scent Beacon
description: 'You release bio-synthetic pheromones that detect when someone mentions
  your identity. During the spell''s duration, you detect when a creature within 1
  mile says your name, though you can''t identify who spoke it. You can Dismiss the
  spell to teleport to within 5 feet of the creature that most recently said your
  name, as long as you''re within 1 mile.


  Upgraded (4th) The range increases to 10 miles.'
