id: primal_chorus
name: Primal Chorus
description: |-
    You let loose a primal howl that incites animals and beasts to join in the chorus. Doing so gives you a general idea of how many creatures with the animal or beast trait are within the range of the spell, but significant creatures can attempt a Will save against your spell DC to resist responding to your call. You gain a +1 status bonus to your next Initiative roll in an encounter with an enemy creature that replies to your call. For purposes of using @UUID[Compendium.pf2e.actionspf2e.Item.Coerce] during exploration mode, you can communicate with a creature that responds to your call for the duration of the spell. You can only make simple commands, such as approach or hide, and only understand simple ideas, such as compliance with the order or the presence of natural hazards.

    Heightened (+2) The status bonus increases by 1.
tradition: bio_synthetic
level: 3
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: instant
save_type: cool
save_dc: 15
resolution: save
