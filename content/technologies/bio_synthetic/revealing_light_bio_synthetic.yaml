  attempt a Reflex save. On a failure, the target glows with revealing light for the
  duration, negating its @UUID[Compendium.pf2e.conditionitems.Item.Concealed] condition
  and making it @UUID[Compendium.pf2e.conditionitems.Item.Concealed] instead of @UUID[Compendium.pf2e.conditionitems.Item.Hidden]
  or @UUID[Compendium.pf2e.conditionitems.Item.Undetected] if it's @UUID[Compendium.pf2e.conditionitems.Item.Invisible].
