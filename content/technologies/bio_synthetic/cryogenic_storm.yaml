id: cryogenic_storm
name: Cryogenic Storm
description: 'A blast of cryogenic compound extends from your delivery system. If
  you activate this tech with 2 actions, it has an area of a 60-foot cone; if you
  use 3 actions, it has a range of 500 feet and an area of a 30-foot burst. Each creature
  in the area takes 10d6 cold damage with a Reflex save.


  Critical Success The creature is unaffected.

  Success The creature takes half damage.

  Failure The creature takes full damage and is Slowed 1 for 1 round.

  Critical Failure The creature takes double damage and is Slowed 2 for 1 round.'
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 10d3
    damage_type: cold
    dc: 0
  on_failure:
  - type: damage
    dice: 10d6
    damage_type: cold
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 20d6
    damage_type: cold
    dc: 0
