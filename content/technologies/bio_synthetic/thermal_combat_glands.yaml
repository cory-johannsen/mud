name: Thermal Combat Glands
description: 'Bio-synthetic thermal glands activate in the target''s hands and feet,
  producing superheated secretions. The target''s unarmed Strikes deal an additional
  2d6 fire damage. Critical hits with these Strikes also deal 2d4 persistent fire
  damage. Additionally, when the target attempts to Demoralize, on a success the target
  of Demoralize also takes 1d4 fire damage.


  Heightened (+2) The fire damage on Strikes increases by 1d6.'
