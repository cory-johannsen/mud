id: gale_burst
name: Gale Burst
description: 'You unleash a blast of compressed bio-gas. Each creature in the area
  takes 3d6 bludgeoning damage with a basic Reflex save and is pushed 5 feet on a
  failure (10 feet on a critical failure).


  Heightened (+1) The damage increases by 1d6.'
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d3
    damage_type: slashing
    dc: 0
  on_failure:
  - type: damage
    dice: 2d6
    damage_type: slashing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d6
    damage_type: slashing
    dc: 0
