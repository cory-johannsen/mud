id: scent_mask
name: Scent Mask
description: You coat the target in pheromone-neutralizing compounds that make it
  extremely difficult to detect via chemical or biological senses. This tech attempts
  to counteract all detection effects on the target.
tradition: bio_synthetic
level: 3
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You erect protective wards that make the target difficult to detect
      via magic. Veil of privacy attempts to counteract all detection, revelation,
      and scrying effects used against the target or the targ
