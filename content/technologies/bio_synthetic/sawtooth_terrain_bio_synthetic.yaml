id: sawtooth_terrain_bio_synthetic
name: Sawtooth Terrain
description: |-
    You cause long, serrated mantis limbs to appear, swiping at and obstructing creatures in the area. The area is difficult terrain. Each creature in the area when the spell is cast and who end their turn within the area take 3d6 slashing damage and @Damage[(floor((@item.level -1)/2)d6)[bleed]] damage, as determined by its Reflex save.Critical Success The creature is unaffected.
    Success The creature takes half damage and no persistent damage.
    Failure The creature takes full damage and a –10-foot circumstance penalty to their Speed until they receive magical healing or benefit from a successful Medicine check against your spell DC to @UUID[Compendium.pf2e.actionspf2e.Item.Administer First Aid].
    Critical Failure The creature takes double damage and a –15-foot circumstance penalty to their Speed until they receive magical healing or benefit from a successful Medicine check against your spell DC to administer First Aid.Heightened (+2) The damage increases by 3d6, and the persistent bleed damage increases by 1d6.
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 3d3
          damage_type: slashing
          dc: 0
    on_failure:
        - type: damage
          dice: 3d6
          damage_type: slashing
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 6d6
          damage_type: slashing
          dc: 0
