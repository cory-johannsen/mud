id: apex_magnetic_surge
name: Apex Magnetic Surge
description: You generate a massive magnetic surge that controls all metal and electrically-conductive objects in a 60-foot burst. You can move any metal object up to 10 feet in any direction. Metal-armored or metal-armed creatures in the area are restrained on a failed Fortitude save. Metallic structures take 10d6 force damage.
tradition: bio_synthetic
level: 9
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 10d6
    damage_type: force
  - &id001
    type: condition
    condition_id: immobilized
    value: 1
  on_crit_failure:
  - type: damage
    dice: 20d6
    damage_type: force
  - *id001
