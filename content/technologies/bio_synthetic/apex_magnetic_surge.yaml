id: apex_magnetic_surge
name: Apex Magnetic Surge
description: You generate a massive magnetic surge that controls all metal and electrically-conductive
  objects in a 60-foot burst. You can move any metal object up to 10 feet in any direction.
  Metal-armored or metal-armed creatures in the area are restrained on a failed Fortitude
  save. Metallic structures take 10d6 force damage.
