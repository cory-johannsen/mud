id: impaling_spike_organ
name: Impaling Spike Organ
description: 'You trigger a massive bio-synthetic bone spike to erupt from the ground
  beneath a target creature. The spike deals 8d6 piercing damage. The target must
  attempt a Quickness check.


  Critical Success The target dodges the spike and is unaffected.

  Success The target is struck but takes half damage.

  Failure The target takes full damage and is Immobilized for 1 round.

  Critical Failure The target takes double damage and is Immobilized for 1 minute.'
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d3
    damage_type: piercing
    dc: 0
  on_failure:
  - type: damage
    dice: 8d6
    damage_type: piercing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d6
    damage_type: piercing
    dc: 0
