id: acid_spray
name: Acid Spray
description: A bio-synthetic secretion that coats all nearby enemies in corrosive fluid.
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: zone
targets: all_enemies
duration: instant
resolution: save
save_type: reflex
save_dc: 14
effects:
  on_success:
    - type: damage
      dice: 1d3
      damage_type: acid
  on_failure:
    - type: damage
      dice: 1d6
      damage_type: acid
    - type: zone
      radius: 10
  on_crit_failure:
    - type: damage
      dice: 2d6
      damage_type: acid
    - type: zone
      radius: 10
