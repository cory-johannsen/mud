id: subterranean_lunge
name: Subterranean Lunge
description: You burrow briefly through the ground using bio-hardened claws. You Leap
  10 feet, and where you would land, the ground erupts in a 10-foot burst dealing
  2d6 bludgeoning damage with a basic Reflex save.
tradition: bio_synthetic
level: 3
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 3d6
    damage_type: bludgeoning
    dc: 0
  on_failure:
  - type: damage
    dice: 3d10
    damage_type: bludgeoning
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d10
    damage_type: bludgeoning
    dc: 0
