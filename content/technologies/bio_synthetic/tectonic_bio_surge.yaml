id: tectonic_bio_surge
name: Tectonic Bio-Surge
description: You trigger a massive seismic and biological upheaval. All creatures in a 60-foot burst take 10d10 bludgeoning damage and are knocked prone (Quickness check for half and negates prone). Structures in the area take 200 damage. The terrain in the area becomes difficult terrain permanently as biological growth and rock shards fill the area.
tradition: bio_synthetic
level: 9
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 10d10
    damage_type: bludgeoning
  - &id001
    type: condition
    condition_id: prone
    value: 1
  on_crit_failure:
  - type: damage
    dice: 20d10
    damage_type: bludgeoning
  - *id001
