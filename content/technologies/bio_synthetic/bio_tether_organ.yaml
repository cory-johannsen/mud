id: bio_tether_organ
name: Bio-Tether Organ
description: 'You use magical chains, vines, or other tethers to bind your target to you. The creature can still try to Escape, and it or others can break the tethers by attacking them (the tethers have AC 15 and 10 Hit Points). You must stay within 30 feet of the target while it''s tethered; moving more than 30 feet away from your target ends the spell. The target must attempt a Reflex save. You can Dismiss the spell.Critical Success The target is unaffected.

  Success The target takes a –5-foot circumstance penalty to its Speed as long as it''s within 30 feet of you.

  Failure The target takes a –10-foot circumstance penalty to its Speed and can''t move more than 30 feet away from you until it Escapes or the spell ends.

  Critical Failure The target is Immobilized until it Escapes or the spell ends.Heightened (+1) The tethers'' AC increases by 3, and their Hit Points increase by 10.'
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: immobilized
    value: 1
  on_crit_failure:
  - *id001
