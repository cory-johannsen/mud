id: one_with_the_land
name: Total Bio-Integration
description: You integrate yourself fully with the local biological network for 1
  hour. You gain tremorsense 60 feet, can communicate with any biological organism
  within 1 mile, and can sense all creatures within 1 mile. You can also control plant
  growth, create difficult terrain, or clear difficult terrain in a 120-foot burst
  as a single action.
