  wall up to 120 feet long and 20 feet high. You can shape the wall''s path, placing
  each 5 feet of the wall on the border between squares. The wall doesn''t need to
  stand vertically, so you can use it to form a bridge or set of stairs.


  Upgraded (+2) The Hit Points of each section increase by 15.'
