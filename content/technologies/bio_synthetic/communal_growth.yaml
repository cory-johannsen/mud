id: communal_growth
name: Communal Growth
description: You stimulate rapid organic growth in the area, causing nutritious fruits
  and healing fungi to sprout. Allies in the area regain 2d8 Hit Points and gain a
  +1 status bonus to Grit checks for 1 minute.
tradition: bio_synthetic
level: 3
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d4
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 2d8
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d8
    damage_type: mental
    dc: 0
