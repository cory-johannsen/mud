  For the duration, you gain a fangs unarmed attack. They''re a finesse, grapple,
  unarmed attack that deals 1d8 piercing damage and an extra 2d10 poison damage. If
  you have a creature at least one size smaller Grabbed with your fangs, you can use
  the Swallow Whole ability that deals @Damage[4d6[bludgeoning]] damage and has a
  Rupture value of 17. A swallowed creature is transported to an extraplanar bio-pocket;
  when freed, it appears adjacent to you. If you''re killed or the spell ends, the
  creature is immediately freed.


  Heightened (+3) The extra poison damage increases by 1d10, Swallow Whole damage
  increases by 6d6, and Rupture value increases by 9.'
