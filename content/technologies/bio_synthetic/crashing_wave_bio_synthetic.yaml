id: crashing_wave_bio_synthetic
name: Crashing Wave
description: |-
    You summon a crashing wave that sweeps away from you. You deal 6d6 bludgeoning damage to creatures in the area. The water also extinguishes non-magical fires in the area.

    Heightened (+1) The damage increases by 2d6.
tradition: bio_synthetic
level: 3
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 6d3
          damage_type: bludgeoning
          dc: 0
    on_failure:
        - type: damage
          dice: 6d6
          damage_type: bludgeoning
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 12d6
          damage_type: bludgeoning
          dc: 0
