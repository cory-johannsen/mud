id: frog_tongue
name: Frog Tongue
description: |-
    Your tongue extends unnaturally, flicking out toward a creature within range and dealing 2d8 bludgeoning damage (basic Reflex save). On a failure, the creature is also stuck to the end of the tongue. It is @UUID[Compendium.pf2e.conditionitems.Item.Off-Guard] and can't move beyond the reach of your tongue. A creature can sever the tongue with a Strike that deals at least 10 slashing damage or attempt to @UUID[Compendium.pf2e.actionspf2e.Item.Escape] against your spell DC. The AC of the tongue is equal to your spell DC. Severing the tongue in this way deals no damage to you but ends the spell. While a creature is stuck to the end of your tongue, actions you take with the auditory trait take a –2 circumstance penalty. If you move so that the affected creature is outside of the tongue's reach, the spell ends.

    Heightened (+1) The damage increases by 2d8.
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 2d4
          damage_type: bludgeoning
          dc: 0
    on_failure:
        - type: damage
          dice: 2d8
          damage_type: bludgeoning
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 4d8
          damage_type: bludgeoning
          dc: 0
