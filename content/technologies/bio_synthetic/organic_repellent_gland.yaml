id: organic_repellent_gland
name: Organic Repellent Gland
description: 'You alter your stomach, esophagus, and tongue to be able to spit partially digested food with force. You can spit at a foe once you finish Casting the tech and can repeat the attack once on each of your subsequent turns by taking a single action, which has the acid, attack, and concentrate traits. After your third spit attack, the spell ends. When you attack with camel spit, make a ranged tech attack roll against a creature within 15 feet, dealing 1d6 acid damage and causing the target to be Dazzled for 1 round if you hit. On a critical hit, you deal double damage and the target takes @Damage[[persistent,acid]] damage.


  Upgraded (+1) The damage increases by 1d6, and the persistent damage on a critical hit is increased by 1.'
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: attack
effects:
  on_hit:
  - type: damage
    dice: 1d6
    damage_type: acid
    dc: 0
  on_crit_hit:
  - type: damage
    dice: 2d6
    damage_type: acid
    dc: 0
