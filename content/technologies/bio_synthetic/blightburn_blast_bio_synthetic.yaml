id: blightburn_blast_bio_synthetic
name: Mutagen Radiation Burst
description: 'You channel a concentrated burst of mutagenic radiation from your palms.
  You deal 4d6 poison damage to creatures in the area. Creatures who fail their save
  are afflicted with stage 1 of mutagenic sickness (on a critical failure, the creature
  moves immediately to stage 2). The level of mutagenic sickness caused by this tech
  is equal to twice the tech''s rank, and the disease''s save DC uses the caster''s
  DC.


  Mutagenic Sickness (uncommon, disease) Level 15

  The waste vats beneath the bio-labs leak unstable mutagens that saturate the surrounding
  tunnels. These compounds are radioactive and flood the area with lethal energy.
  Creatures other than those native to the area or who have survived there for a long
  time develop mutagenic sickness.

  Creatures native to the contaminated zone are immune, as are creatures who are affected
  by mutagenic sickness but recover from it. The target can''t recover from the disease''s
  drained or sickened condition except by advanced biotech.

  The surest way to avoid contracting mutagenic sickness is by wearing a bio-ward,
  a piece of protective symbiote often found among scavengers'' gear or for sale in
  underground clinics.

  Saving Throw DC 32 Fortitude

  Onset [[/r 1d4 #days]]{1d4 days}

  Stage 1 Drained 1 (1 day)

  Stage 2 Drained 1 and Sickened 1 (1 day)

  Stage 3 Drained 2 and Sickened 2 (1 week)

  Stage 4 Drained 3 and Sickened 3 (1 month)

  Stage 5 Drained increases by 1 (1 year)'
tradition: bio_synthetic
level: 7
