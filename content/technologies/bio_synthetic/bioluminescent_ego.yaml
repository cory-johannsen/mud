id: bioluminescent_ego
name: Bioluminescent Ego
description: 'Brilliant bioluminescent patterns ripple across the target''s body, triggering overconfidence through pheromone feedback. The target attempts a Reasoning check.


  Critical Success The target is unaffected.

  Success The target sheds bright light in a 20-foot emanation (and dim light to the next 40 feet) and becomes Dazzled for 1 round.

  Failure The target sheds light as on a success, is Dazzled for 1 minute, and takes a -2 status penalty to AC for the duration.

  Critical Failure As failure, and the target is also Fascinated by itself.'
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: dazzled
    value: 1
  on_crit_failure:
  - *id001
