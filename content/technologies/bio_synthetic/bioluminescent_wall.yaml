id: bioluminescent_wall
name: Bioluminescent Wall
description: You grow a thin wall of intensely luminescent tissue in a straight line
  up to 60 feet long and 10 feet high. Creatures that pass through take 2d6 fire damage,
  and the wall provides bright light in a 30-foot radius.
