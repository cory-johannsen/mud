id: decompression_zone
name: Decompression Zone
description: 'Air pressure drops precipitously in the area, causing pain and debilitation in creatures'' inner ears and joints. Each living creature in the area must attempt a Grit check.


  Critical Success The creature is unaffected.

  Success The creature is Sickened 1.

  Failure The creature is Sickened 2 and Deafened for 1 round.

  Critical Failure The creature is Sickened 3, Deafened for 1 minute, and takes 4d6 bludgeoning damage.'
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 4d6
    damage_type: bludgeoning
  - &id001
    type: condition
    condition_id: nausea
    value: 1
  on_crit_failure:
  - type: damage
    dice: 8d6
    damage_type: bludgeoning
  - *id001
