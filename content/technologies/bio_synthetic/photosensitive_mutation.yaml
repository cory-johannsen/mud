id: photosensitive_mutation
name: Photosensitive Mutation
description: 'You induce a mutation that makes the target hypersensitive to light. The target must attempt a Toughness save.


  Critical Success The creature is unaffected.

  Success The creature is Frightened 1.

  Failure The creature is Frightened 2 and must spend at least 1 action on its next turn moving away from the nearest source of bright light.

  Critical Failure The creature is Frightened 3 and is Fleeing from all bright light sources for 1 round.'
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: frightened
    value: 1
  - &id002
    type: condition
    condition_id: fleeing
    value: 1
  on_crit_failure:
  - *id001
  - *id002
