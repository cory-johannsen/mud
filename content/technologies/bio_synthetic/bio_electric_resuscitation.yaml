id: bio_electric_resuscitation
name: Bio-Electric Resuscitation
description: 'A dense bioelectric field descends to fill the target''s space, then fires a jolt of revitalizing current into the target. If the target is a corpse that died within the last round, the creature comes back to life with 0 Hit Points, and any effects and conditions it had when it died, with the exception of dying, and its wounded condition increases by 1. The creature''s initiative is right before yours.

  Regardless of whether the creature came back to life or was already alive, it regains 8d8 Hit Points, and the jolt wakes it up if it was Unconscious. For the duration, the target is supercharged. It becomes Quickened and can use the extra action to Stand, Stride, Strike, or Fly (if it has a fly Speed). In addition, it can cast 5th-rank Thunderstrike as an innate tech at will, using your tech DC.

  The field that covered the creature remains until the end of the target''s next turn. Any creature in the field is Hidden, and anything outside the field is hidden to any creature inside the field.


  Upgraded (+1) The healing increases by 2d8, and the thunderstrike rank increases by 1.'
tradition: bio_synthetic
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 8d8
    damage_type: untyped
    dc: 0
