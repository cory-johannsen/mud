id: advanced_scurvy_bio_synthetic
name: Accelerated Decay
description: 'Your touch introduces a mutagenic pathogen that attacks the target''s
  cellular integrity. The symptoms include fatigue, joint degradation, tissue breakdown,
  and internal hemorrhaging. The target must attempt a Toughness save.


  Critical Success The creature is unaffected.

  Success The creature takes 2d6 poison damage.

  Failure The creature contracts the disease.

  Critical Failure The creature contracts the disease at stage 2.'
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: Your touch afflicts the target with an advanced form of scurvy, a
      mariner's disease stemming from improper nutrition. The symptoms of scurvy include
      fatigue, joint pain, loose teeth, and internal hemo
