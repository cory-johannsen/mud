id: blindness_bio_synthetic
name: Retinal Dissolve
description: 'You spray a targeted enzyme that dissolves the target''s retinal cells.
  The effect is determined by the target''s Toughness save. The target then becomes
  temporarily immune for 1 minute.


  Critical Success The target is unaffected.

  Success The target is Dazzled for 1 round.

  Failure The target is Blinded for 1 minute.

  Critical Failure The target is Blinded with no duration (must be healed).'
