id: linnorm_venom_gland
name: Linnorm Venom Gland
description: You inject an apex biological venom derived from a linnorm's biology.
  The target must attempt a Toughness save. On a failure it takes 6d6 poison damage
  per round for 6 rounds and is paralyzed for 1 round. On a critical failure it takes
  8d6 per round and is paralyzed for 1 minute. On a success it takes 6d6 once and
  is sickened 2.
tradition: bio_synthetic
level: 9
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d8
    damage_type: piercing
    dc: 0
  on_failure:
  - type: damage
    dice: 2d12
    damage_type: piercing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d12
    damage_type: piercing
    dc: 0
