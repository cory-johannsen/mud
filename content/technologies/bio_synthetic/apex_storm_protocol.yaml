id: apex_storm_protocol
name: Apex Storm Protocol
description: You unleash a devastating storm of pure bio-electric fury. All creatures in a 120-foot emanation take 10d6 electricity and 10d6 bludgeoning damage each round for 1 minute (Quickness check for half). On a failure, they are also knocked prone. The storm generates intense winds that make flight difficult (DC 30 Acrobatics check to maintain flight).
tradition: bio_synthetic
level: 9
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 10d6
    damage_type: electricity
  - type: damage
    dice: 10d6
    damage_type: bludgeoning
  - &id001
    type: condition
    condition_id: prone
    value: 1
  on_crit_failure:
  - type: damage
    dice: 20d6
    damage_type: electricity
  - type: damage
    dice: 20d6
    damage_type: bludgeoning
  - *id001
