id: dividing_trench_bio_synthetic
name: Dividing Trench
description: You dig an earthen trench across the surrounding terrain, which must be soil, clay, sand, or other soft earth, but not flooring or stone. The trench is 5 feet wide, 5 feet deep, and up to 15 feet long. You can shape the trench's path, but it must be one continuous line. You must conjure the trench in an open space so it doesn't pass through any creatures or objects. Creatures inside the trench have cover from creatures outside the trench, and creatures outside the trench have cover from creatures inside the trench. Small or smaller creatures in the trench might have greater cover against other creatures who aren't close to the trench's edge, and in turn, those creatures might have more cover against small creatures in the trench; the GM determines the amount of additional cover, if any. Entering or leaving the trench requires an additional 5 feet of movement but doesn't require any kind of check and isn't considered difficult terrain. At the end of the spell's duration, the trench disappears, and all creatures in the trench remain in their spaces on solid ground.Heightened (+2) The trench's maximum length increases by 15 feet.
tradition: bio_synthetic
level: 3
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: minutes:1
resolution: none
