id: corrosive_dart
name: Corrosive Dart
description: 'You synthesize a dart of concentrated acid that keeps corroding the
  target after it hits. Make a tech attack against the target. On a hit, you deal
  3d8 acid damage plus 1d6 persistent acid damage. On a critical hit, double the
  initial damage, but not the persistent damage.


  Upgraded (+2) The initial damage increases by 2d8, and the persistent acid damage
  increases by 1d6.'
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: attack
effects:
  on_hit:
  - type: damage
    dice: 3d8
    damage_type: acid
    dc: 0
  on_crit_hit:
  - type: damage
    dice: 6d8
    damage_type: acid
    dc: 0
