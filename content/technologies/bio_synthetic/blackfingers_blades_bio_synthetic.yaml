id: blackfingers_blades_bio_synthetic
name: Venom Coating
description: 'You synthesize a potent neurotoxin and coat allied weapons with it.
  The target weapons are coated with Giant Scorpion Venom with a DC equal to your
  spell DC. The effects remain on a weapon for 1 minute or until the weapon scores
  a hit, whichever comes first.


  Heightened (+2) You can coat two additional weapons.'
