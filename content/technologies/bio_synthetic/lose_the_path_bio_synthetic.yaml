id: lose_the_path_bio_synthetic
name: Bio-Trail Scrambler
description: |-
    Trigger A creature in range Strides

    You surround a moving creature with lifelike illusions, shifting their perception of the terrain to subtly lead them off course. The target must attempt a Willpower save. Regardless of the result, the creature is immune to lose the path for 1 hour.

    Success The creature is unaffected.
    Failure The creature treats all squares as difficult terrain for its Stride.
    Critical Failure As failure, except that you determine where the target moves during the Stride, though you can't move it into hazardous terrain or to a place it can't stand.
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 0
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
