id: abyssal_maw_vortex
name: Abyssal Maw Vortex
description: 'A spiral of dark, corrupted bio-fluid appears in the ground, plunging
  open a passage to the depths that seems to descend for miles. Disembodied bioluminescent
  eyes and gnashing bio-engineered teeth spin within the vortex, consuming anything
  that crosses their path.

  All creatures in the area take 4d8 piercing damage plus 4d4 void damage (basic Reflex
  save). Each time you Sustain the tech, you can increase the vortex''s radius by
  5 feet, to a maximum of 15 feet, or you can move the vortex up to 10 feet in a straight
  line. Each creature the vortex moves through takes the damage with a basic Reflex
  save. A creature can take damage from the abyssal maw only once per round.

  If activated underwater, the vortex instead fills a 40-foot-tall cylinder with a
  5-foot radius.


  Heightened (9th) The vortex deals 5d8 piercing damage and 5d4 void damage.'
tradition: bio_synthetic
level: 7
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
