    dice: 4d4
    damage_type: piercing
    dc: 0
  - type: damage
    dice: '4'
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 4d8
    damage_type: piercing
    dc: 0
  - type: damage
    dice: 4d4
    damage_type: void
    dc: 0
  on_crit_failure:
