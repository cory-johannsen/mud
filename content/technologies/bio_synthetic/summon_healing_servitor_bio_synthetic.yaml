id: summon_healing_servitor_bio_synthetic
name: Deploy Med-Drone
description: 'You deploy a bio-synthetic medical drone forged from regenerative compounds.
  The drone occupies the space of a Huge creature and has a speed of 60 feet.

  Arrive (healing, necromancy, vitality) Drone''s Protection The drone appears, moving
  from ally to ally and administering emergency bio-stims, restoring 3d8 Hit Points
  to each ally within 30 feet of it.


  Heightened (+2) The healing increases by 1d8.'
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 3d4
    damage_type: vitality
    dc: 0
  on_failure:
  - type: damage
    dice: 3d8
    damage_type: vitality
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d8
    damage_type: vitality
    dc: 0
