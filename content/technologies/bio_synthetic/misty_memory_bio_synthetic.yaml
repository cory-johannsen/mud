id: misty_memory_bio_synthetic
name: Hydro-Memory Recall
description: 'You extract residual chemical memory traces from a body of water, raising
  impressions of past events to the surface. When you Cast the Spell, fix your mind
  on an amount of time up to 24 hours ago. A mist rises from the water, filling a
  30-foot burst and coalescing into a scene of events that took place within 60 feet
  of the water.

  The images are translucent white, detailed enough to show silhouettes and motions
  but not fine details like facial features. The scene is silent.

  You can Sustain to play events forward or backward, each minute of Sustaining corresponding
  to a minute of playback.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
