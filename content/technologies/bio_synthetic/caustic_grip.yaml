id: caustic_grip
name: Caustic Grip
description: A bio-synthetic claw grips the target, burning it with concentrated acid.
  The target takes 2d8 acid damage plus @Damage[floor(@item.level/2)d6[persistent,acid]]
  damage depending on its Reflex save. A creature can attempt to @UUID[Compendium.pf2e.actionspf2e.Item.Escape]
  the grip.
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d4
    damage_type: acid
    dc: 0
  on_failure:
  - type: damage
    dice: 2d8
    damage_type: acid
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d8
    damage_type: acid
    dc: 0
