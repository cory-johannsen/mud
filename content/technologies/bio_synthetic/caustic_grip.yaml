id: caustic_grip
name: Caustic Grip
description: A bio-synthetic claw grips the target, burning it with concentrated acid. The target takes 2d8 acid damage plus 1d6 persistent acid damage depending on its Quickness check. A creature can attempt to Escape the grip.
