id: acid_bore
name: Acid Bore
description: You deploy a bio-synthetic boring organism that dissolves a visible tunnel
  through a wall in the chosen area, replacing the area with empty space. If the wall
  is thicker than 10 feet, the tunnel ends 10 feet in. Even a small layer of metal
  prevents this tech from functioning. This tech doesn't reduce the structural integrity
  of the wall.
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
