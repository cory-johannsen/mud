id: animal_form
name: Chimera Shift
description: 'You trigger a mutagenic transformation, reshaping your body into a combat-optimized
  animal hybrid. You gain the statistics of the chosen form. You can choose from bear,
  bull, canine, cat, deer, frog, shark, or snake. Your battle form has specific statistics
  depending on the form you choose.


  Heightened (3rd) You instead gain 10 temporary HP, an attack modifier of +14, a
  damage bonus of +5, and Athletics +14.

  Heightened (4th) Your battle form is Large. You instead gain 15 temporary HP, an
  attack modifier of +16, a damage bonus of +9, and Athletics +16.

  Heightened (5th) Your battle form is Huge. You instead gain 20 temporary HP, an
  attack modifier of +18, a damage bonus of +7 plus 2d6, and Athletics +20.'
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
