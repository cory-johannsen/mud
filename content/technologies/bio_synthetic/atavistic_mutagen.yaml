id: atavistic_mutagen
name: Atavistic Mutagen
description: 'You inject a retroviral mutagen that triggers rapid devolution, forcing the target into a feral biological state. The effect is based on its Toughness save.

  Critical Success The target is unaffected.

  Success The target''s body gains minor feral mutations. Its biology destabilizes, causing it to be Clumsy 1 for 1 round.

  Failure The target transforms into a feral mutant form for 1 hour. It becomes clumsy 1 and gains weakness 1 to silver. It gains a claw, hoof, horn, or jaws Strike (your choice) that uses the target''s unarmed Strike statistics except that the damage type changes to bludgeoning, piercing, or slashing, as appropriate. Whenever the target attempts any manipulate action, it must succeed at a Toughness save (DC 5) or the action is lost.

  Critical Failure As failure, but the duration is unlimited.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
