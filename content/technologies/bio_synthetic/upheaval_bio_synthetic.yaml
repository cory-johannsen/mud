id: upheaval_bio_synthetic
name: Tectonic Bio-Surge
description: You trigger a massive seismic and biological upheaval. All creatures
  in a 60-foot burst take 10d10 bludgeoning damage and are knocked prone (Reflex save
  for half and negates prone). Structures in the area take 200 damage. The terrain
  in the area becomes difficult terrain permanently as biological growth and rock
  shards fill the area.
tradition: bio_synthetic
level: 9
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'The ground in the area shudders and crumbles as huge pillars of
      stone erupt into the air, rending the terrain around them.

      The GM might add additional effects in certain areas. Cliffs might collapse,'
