id: cognitive_uplift_serum
name: Cognitive Uplift Serum
description: 'You inject the target animal with a cognitive enhancement compound,
  not truly awakening it but allowing it to better understand its surroundings. The
  target gains a +2 status bonus to Awareness checks and Reasoning checks, and Nature checks
  to Command the target gain a +1 status bonus. Additionally, if the target has the
  minion trait, it can take one action each turn even if its master doesn''t Command
  it, which it uses to perform any basic action it knows.


  Upgraded (8th) You can target up to 5 animals.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You give the target animal a glimmer of awareness, not truly awakening
