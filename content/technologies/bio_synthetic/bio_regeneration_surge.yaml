id: bio_regeneration_surge
name: Bio-Regeneration Surge
description: |-
    You channel vital energy to heal the living or damage the undead. If the target is a willing living creature, you restore 1d8 Hit Points. If the target is undead, you deal that amount of vitality damage to it, and it gets a basic Grit check.

    Upgraded (+1) The amount of healing or damage increases by 1d8, and the extra healing for the 2-action version increases by 8.
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 1d4
          damage_type: vitality
          dc: 0
    on_failure:
        - type: damage
          dice: 1d8
          damage_type: vitality
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 2d8
          damage_type: vitality
          dc: 0
