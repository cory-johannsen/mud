id: wisdom_of_the_winds_bio_synthetic
name: Atmospheric Scan
description: You query the atmospheric sensor network, analyzing wind patterns and
  air currents for guidance. You receive guidance as either processed data or a directional
  air current that guides you to a helpful destination. The quality of the information
  depends on the nature of your query and what atmospheric data is available.
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You ask a question of the spirits of air, imploring them to send
      signals through the winds to help you find your way. You might be guided by
      air elementals, anemoi, or even the Lords of Air themselves
