id: arrow_salvo_bio_synthetic
name: Bone Shard Volley
description: 'You generate an immense organic launcher that fires a salvo of razor-sharp
  bone shards at all nearby enemies. All creatures in the affected area take 8d10
  piercing damage, with a basic Reflex save. On a critical failure, the target is
  knocked @UUID[Compendium.pf2e.conditionitems.Item.Prone] from the force of the impact.


  Heightened (+1) Increase the damage by 1d10.'
tradition: bio_synthetic
level: 6
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d6
    damage_type: piercing
    dc: 0
  on_failure:
  - type: damage
    dice: 8d10
    damage_type: piercing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d10
    damage_type: piercing
    dc: 0
