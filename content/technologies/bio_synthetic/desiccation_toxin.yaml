id: desiccation_toxin
name: Desiccation Toxin
description: 'You inject the target with a toxin that makes its body unable to retain moisture. You can Dismiss the spell. The target must attempt a Grit check.Critical Success The creature is unaffected.

  Success The creature is Sickened 1.

  Failure The creature is Sickened 1 and takes 1d4 damage every 10 minutes unless it drinks water.

  Critical Failure As failure but Sickened 2.'
tradition: bio_synthetic
level: 3
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: nausea
    value: 1
  on_crit_failure:
  - *id001
