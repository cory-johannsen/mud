id: razorthorn_bloom
name: Razorthorn Bloom
description: Bio-engineered thorn bushes with razor-sharp molecular edges sprout from the ground in the area. The thorn bushes deal 8d8 piercing damage to each creature that's in the area when the spell is cast or that ends its turn in the area (basic Quickness check). A creature that critically fails its saving throw also takes @Damage[(ternary(gte(,9),2,1))d8[persistent,bleed]] damage and is Immobilized for 1 round or until the creature Escapes (against your tech DC), whichever comes first. The area is difficult terrain and hazardous terrain. A creature that moves through the area takes @Damage[(ternary(gte(,9),8,5))[piercing]] damage for every square of that area it moves into. Each time you sustain this tech, the radius of the burst increases by 5 feet.Upgraded (9th) The initial damage increases to 12d8, the persistent bleed damage increases to 2d8, and the hazardous terrain damage increases to 8.
