id: shadow_predators
name: Shadow Predators
description: You grow bio-synthetic predators from ambient shadows. The shades attack
  creatures you designate, making Strikes using your tech attack modifier and dealing
  2d6 slashing damage on a hit. You can command them when you Sustain the spell.
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
