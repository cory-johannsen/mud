id: sonic_spore_barrage
name: Sonic Spore Barrage
description: 'You cultivate an array of resonant fungal spore pods that emit devastating
  sonic frequencies when triggered. The spores materialize as vibrating organic nodules
  that pulse in rhythmic patterns.

  When you Use this tech, a concentrated burst of sonic spores detonates in a space
  you choose within range. On subsequent rounds, the first time you Sustain the tech
  each round, you can move your spore cluster to a space within range (if needed)
  and trigger another detonation.

  Each detonation deals 8d6 sonic damage to all creatures in a 10-foot burst (basic
  Toughness save). The spore cluster doesn''t take up space, grant flanking, or have
  any other attributes a creature would.


  Heightened (+1) The damage increases by 1d6.'
tradition: bio_synthetic
level: 6
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d3
    damage_type: sonic
    dc: 0
  on_failure:
  - type: damage
    dice: 8d6
    damage_type: sonic
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d6
    damage_type: sonic
    dc: 0
