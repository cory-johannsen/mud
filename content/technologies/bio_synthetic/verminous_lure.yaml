id: verminous_lure
name: Verminous Lure
description: |-
    Upon casting, the target emits a musk that's captivating to certain animals. Tiny animals and animal swarms of any size within range must attempt a Willpower save. On a failure, non-hostile animals or animal swarms try to touch the target. If hostile, such creatures choose to attack the target instead of other foes, if able to do so without spending additional actions or exposing themselves to additional danger.
    Verminous lure doesn't change animals' attitudes towards the target and is easily overridden by more direct control, such as the Command an Animal action. Animals with imprecise sense can use their scent as a precise sense against the target.
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
