id: bio_filament_web
name: Bio-Filament Web
description: 'You extrude sticky bio-synthetic filaments that fill the area, impeding
  movement. Squares filled with the web are difficult terrain. Each time a creature
  in the web begins to use a move action or enters the web during a move action it''s
  using, it must attempt an @Check[athletics] check or Reflex save against your spell
  DC to avoid taking a circumstance penalty to its Speeds or becoming @UUID[Compendium.pf2e.conditionitems.Item.Immobilized].
  A creature that gets out of the web ceases to take a circumstance penalty to its
  Speed from the web. Each square can be cleared of the web by a single attack or
  effect that deals at least 5 slashing damage or 1 fire damage. A square has AC 5,
  and it automatically fails its saving throws.


  Critical Success The creature is unaffected, and it doesn''t need to attempt further
  Athletics checks or saving throws against the web this turn. If it used an Athletics
  check, it clears the web from every square it leaves during its movement.

  Success The creature is unaffected during its action. If it used an Athletics check,
  it clears the web from every square it leaves during its movement.

  Failure The creature takes a -10-foot circumstance penalty to its Speeds until the
  start of its next turn.

  Critical Failure The creature is immobilized until the start of its next turn, after
  which it takes a -10-foot circumstance penalty to its Speeds for 1 round. It can
  attempt to @UUID[Compendium.pf2e.actionspf2e.Item.Escape] to remove its immobilized
  condition.


  Heightened (4th) The spell''s area increases to a @Template[burst|distance:20],
  and its range increases to 60 feet.'
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
