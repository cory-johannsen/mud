id: vitality_lash_bio_synthetic
name: Bio-Vitality Lash
description: |-
    You demolish the target's corrupted essence with energy from Creation's Forge. You deal 2d6 vitality damage with a basic Toughness save. If the creature critically fails the save, it is also Enfeebled 1 until the start of your next turn.

    Heightened (+1) The damage increases by 1d6.
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 2d3
          damage_type: vitality
          dc: 0
    on_failure:
        - type: damage
          dice: 2d6
          damage_type: vitality
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 4d6
          damage_type: vitality
          dc: 0
