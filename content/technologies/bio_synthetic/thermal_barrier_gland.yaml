id: thermal_barrier_gland
name: Thermal Barrier Gland
description: 'You activate a bio-synthetic heat-generating organ that projects a hovering
  shield of superheated plasma. The shield grants you cold resistance 5 and makes
  you immune to mild and severe environmental cold. You can Raise a Shield with it
  for a +1 circumstance bonus to AC. You can use Shield Block with it; it has Hardness
  10, is immune to fire, has 40 HP (no Broken Threshold), and its Hardness is halved
  against water effects. If you Shield Block a melee attack from an adjacent attacker,
  the attacker takes 2d6 fire damage.


  Heightened (+2) The cold resistance increases by 5, the HP increase by 10, and the
  fire damage increases by 1d6.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 2d6
    damage_type: fire
    dc: 0
