id: lightning_storm
name: Ion Storm
description: 'You deploy an atmospheric ionization device that calls down a lightning
  bolt within the tech''s area. The bolt is a vertical line from the top of the storm
  to the ground below, dealing 4d12 electricity damage to creatures in the line (basic
  Reflex save). On subsequent rounds, the first time you Sustain the tech each round,
  you call down another bolt.


  Heightened (+1) The damage of each bolt increases by 1d12.'
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 4d8
    damage_type: electricity
    dc: 0
  on_failure:
  - type: damage
    dice: 4d12
    damage_type: electricity
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 8d12
    damage_type: electricity
    dc: 0
