id: boomerang_shot_bio_synthetic
name: Boomerang Shot
description: |-
    You launch a curved length of wood at a foe that arcs around objects and obstacles to strike from an unexpected direction. Make a spell attack roll against the target's AC. This attack ignores the target's @UUID[Compendium.pf2e.conditionitems.Item.Concealed] condition and ignores all cover except greater cover. If you hit, the projectile deals 7d10 bludgeoning damage.Heightened (7th) The damage increases to 9d10.
    Heightened (9th) The damage increases to 12d10, and the attack ignores cover completely.
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: attack
effects:
    on_hit:
        - type: damage
          dice: 7d10
          damage_type: bludgeoning
          dc: 0
    on_crit_hit:
        - type: damage
          dice: 14d10
          damage_type: bludgeoning
          dc: 0
