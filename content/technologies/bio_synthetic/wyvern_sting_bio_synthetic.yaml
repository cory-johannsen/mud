id: wyvern_sting_bio_synthetic
name: Wyvern Sting
description: |-
    You duplicate the venomous sting of a wyvern. You deal 3d4 piercing damage to the touched creature and afflict it with wyvern venom. If the target takes piercing damage, they must attempt a Fortitude save.Critical Success The target is unaffected.
    Success The target takes @Damage[5d6[poison]] damage.
    Failure The target is afflicted with Wyvern Venom at stage 1.
    Critical Failure The target is afflicted with wyvern venom at stage 2.Wyvern Venom (poison) Level 9
    Maximum Duration 6 rounds
    Stage 1 @Damage[5d6[poison]] damage (1 round)
    Stage 2 @Damage[6d6[poison]] damage (1 round)
    Stage 3 @Damage[8d6[poison]] damage (1 round)
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: "3"
          damage_type: piercing
          dc: 0
    on_failure:
        - type: damage
          dice: 3d4
          damage_type: piercing
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 6d4
          damage_type: piercing
          dc: 0
