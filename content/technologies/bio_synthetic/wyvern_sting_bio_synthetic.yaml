id: wyvern_sting_bio_synthetic
name: Venom Strike
description: 'You replicate a concentrated bio-synthetic venom delivery. You deal
  3d4 piercing damage to the touched creature and afflict it with wyvern-class toxin.
  If the target takes piercing damage, they must attempt a Fortitude save.

  Critical Success The target is unaffected.

  Success The target takes 5d6 poison damage.

  Failure The target takes 7d6 poison damage and is Clumsy 2 for 1 round.

  Critical Failure The target takes 10d6 poison damage and is Clumsy 2 for 1 minute.'
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: '3'
    damage_type: piercing
    dc: 0
  on_failure:
  - type: damage
    dice: 3d4
    damage_type: piercing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d4
    damage_type: piercing
    dc: 0
