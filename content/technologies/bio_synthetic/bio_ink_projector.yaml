id: bio_ink_projector
name: Bio-Ink Projector
description: 'A spray of viscous, toxic ink jets from your fingertip to strike a target creature in the face. Make a tech attack roll against the target. On a hit, you deal 2d6 poison damage, plus you blast the target''s eyes, making them Dazzled for 1 round as the stinging ink blurs and distorts the creature''s vision. On a critical hit, double the poison damage, and the target becomes dazzled for 1 minute by the foul ink.

  The ink stain remains for 1 hour before fading, although vigorous cleansing (or magic such as a prestidigitation basic technique) can remove the ink before then.


  Upgraded (+1) Increase the base poison damage by 2d6.'
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: attack
effects:
  on_hit:
  - type: damage
    dice: 2d6
    damage_type: poison
    dc: 0
  on_crit_hit:
  - type: damage
    dice: 4d6
    damage_type: poison
    dc: 0
