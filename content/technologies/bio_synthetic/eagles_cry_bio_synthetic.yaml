id: eagles_cry_bio_synthetic
name: Eagle's Cry
description: |-
    You let out the mighty cry of a majestic eagle that pierces eardrums. This cry deals 4d8 sonic damage. Each creature in the area must attempt a Fortitude saving throw.Critical Success The creature is unaffected.
    Success The creature takes half damage and is Frightened 1.
    Failure The creature takes full damage and is Frightened 2.
    Critical Failure The creature takes double damage, is frightened 2, and is @UUID[Compendium.pf2e.conditionitems.Item.Fleeing] for 1 round.Heightened (+2) The damage increases by 3d8.
tradition: bio_synthetic
level: 3
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 4d4
          damage_type: sonic
          dc: 0
    on_failure:
        - type: damage
          dice: 4d8
          damage_type: sonic
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 8d8
          damage_type: sonic
          dc: 0
