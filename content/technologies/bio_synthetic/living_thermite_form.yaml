id: living_thermite_form
name: Living Thermite Form
description: 'You become living thermite, giving you fire immunity, resistance 10 to precision damage, and weakness 5 to cold and to water. Any creature that touches you or damages you with an unarmed attack or non-reach melee weapon takes 3d6 fire damage.

  Your unarmed attacks deal an additional 1d4 fire damage, and your fire tech deals one additional die of fire damage (of the same damage die the tech uses). You can activate Ignition as an innate tech; the activation time is reduced from 2 actions to 1.

  In thermite form, you have a fly Speed of 40 feet and don''t need to breathe.

  @UUID[Compendium.pf2e.spell-effects.Item.tech Effect: Fiery Body]


  Upgraded (9th) Creatures touching you take 4d6 fire damage instead of 3d6, your unarmed attacks deal 2d4 additional fire damage, and you have a fly Speed of 60 feet.'
tradition: bio_synthetic
level: 7
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 3d6
    damage_type: fire
  - type: damage
    dice: 4d6
    damage_type: fire
