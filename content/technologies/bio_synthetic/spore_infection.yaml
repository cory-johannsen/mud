id: spore_infection
name: Spore Infection
description: 'You launch a cluster of mutagenic spores at the target. The target must attempt a Toughness save.


  Critical Success The creature is unaffected.

  Success The creature takes 2d6 poison damage.

  Failure The creature takes 4d6 poison damage and is Clumsy 1 for 1 minute.

  Critical Failure The creature takes 4d6 poison damage and is Clumsy 2 for 1 minute. Fungal growths sprout from its body.'
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d3
    damage_type: poison
    dc: 0
  on_failure:
  - type: damage
    dice: 2d6
    damage_type: poison
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d6
    damage_type: poison
    dc: 0
