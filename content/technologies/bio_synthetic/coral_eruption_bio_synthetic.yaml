id: coral_eruption_bio_synthetic
name: Coral Eruption
description: |-
    Area two 10-foot bursts that don't overlap
    Razor sharp coral growths erupt from the ground, transforming the landscape into a dangerous coral reef. You can create a third nonoverlapping burst if the centers of all three bursts are underwater. Creatures in the area when the spell is cast take 6d6 piercing damage and must attempt a basic Reflex save. A creature that critically fails its saving throw also takes @Damage[1d6[bleed]]. The area becomes difficult terrain and hazardous terrain. A creature that moves through the area takes @Damage[(floor(@item.rank/2)+1)[piercing]] damage for every square of that area it moves into.Heightened (+2) The initial piercing damage increases by 3d6, and the hazardous terrain damage increases by 1.
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 6d3
          damage_type: piercing
          dc: 0
    on_failure:
        - type: damage
          dice: 6d6
          damage_type: piercing
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 12d6
          damage_type: piercing
          dc: 0
