id: dehydrate_bio_synthetic
name: Bio-Desiccant Gland
description: |-
    You stir the inner fire of all things within the area, driving out moisture. All creatures in the area take 1d6 persistent fire damage with a basic Toughness save; creatures with the water or plant traits get a result one degree of success worse than they rolled. The spell ends for a creature when its persistent damage ends.
    A creature affected by dehydrate attempts an additional Toughness save at the end of each of its turns, before rolling to recover from the persistent damage. It can forgo this additional save if it consumed water or a similar hydrating liquid within the last round (drinking typically requires a single action).

    Success The creature takes no additional effect.
    Failure The creature is Enfeebled 1 until the end of its next turn.
    Critical Failure The creature is Enfeebled 2 until the end of its next turn.

    Heightened (+2) The range increases by 10 feet, the burst increases by 5 feet, and the persistent fire damage increases by 3d6.
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 1d3
          damage_type: fire
          dc: 0
    on_failure:
        - type: damage
          dice: 1d6
          damage_type: fire
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 2d6
          damage_type: fire
          dc: 0
