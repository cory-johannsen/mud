id: snowball_bio_synthetic
name: Snowball
description: |-
    You throw a magically propelled and chilled ball of dense snow. The target takes 2d4 cold damage and potentially other effects, depending on the result of your tech attack roll.

    Critical Success The target takes double damage and a –10-foot status penalty to its Speeds for 1 round.
    Success The target takes full damage and a –5-foot status penalty to its Speeds for 1 round.
    Failure No effect.

    Heightened (+1) The damage increases by 2d4.
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: attack
effects:
    on_hit:
        - type: damage
          dice: 2d4
          damage_type: cold
          dc: 0
    on_crit_hit:
        - type: damage
          dice: 4d4
          damage_type: cold
          dc: 0
