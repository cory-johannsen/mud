id: conjured_conveyance_bio_synthetic
name: Conjured Conveyance
description: |-
    You conjure an intricate vehicle, carved entirely from wood, to serve as a method of conveyance. The vehicle appears in an unoccupied area of your choice within range. The vehicle can be piloted using Arcana, Driving Lore, or Nature skill checks. The DC to pilot the vehicle and the DC of the vehicle's collision are equal to your spell DC. The vehicle's remaining statistics are presented below.
    When you Cast this Spell, choose whether to create a Large skiff, a Large wagon, or a Medium cycle. With the GM's permission, you might instead summon a different vehicle of your choice with a maximum level of 1; this vehicle must be made primarily of plant matter, have common rarity, and be Large or smaller.Large Skiff—Space 15 feet long, 5 feet wide, 3 feet high; Crew 1 pilot; Passengers 3; Speed swim 30 feet (magical)Large Wagon—Space 10 feet long, 10 feet wide, 7 feet high; Crew 1 pilot; Passengers 3; Speed 35 feet (magical)Medium Cycle—Space 5 feet long, 3 feet wide, 3 feet high; Crew 1 pilot; Passengers 0; Speed 40 feet (magical)AC 13; Fortitude +8
    Hardness 5, HP 40 (BT 20); Immunities critical hits, object immunities, precision damage; Weaknesses fire 5, slashing 5
    Collision 2d6Heightened (+1) The vehicle's AC increases by 2, Fortitude bonus increases by 2, Hardness increases by 1, HP increases by 20, and the collision damage increases by [[/r 1d6]]. In addition, the maximum level of vehicle you can summon with GM permission increases by 2. The duration increases by 1 hour.
tradition: bio_synthetic
