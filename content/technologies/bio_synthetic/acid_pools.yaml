id: acid_pools
name: Acid Pools
description: 'Area all squares in two 10-foot bursts

  You create two puddles of bio-synthetic acidic slime that hinder movement. The area
  of each pool becomes greater difficult terrain. Each round that a creature starts
  its turn in one of the pools or enters a pool, it takes 4d6 acid damage with a basic
  Grit check.


  Upgraded (+2) The damage increases by 1d6.'
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d3
    damage_type: acid
    dc: 0
  on_failure:
  - type: damage
    dice: 8d6
    damage_type: acid
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d6
    damage_type: acid
    dc: 0
