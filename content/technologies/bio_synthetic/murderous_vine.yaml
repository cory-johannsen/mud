id: murderous_vine
name: Murderous Vine
description: |-
    You summon a slithering, thorny vine that attempts to constrict and crush a foe against a wall or other surface. Make a spell attack roll against the target's Fortitude DC. On a success, the creature is grabbed and takes 3d6 bludgeoning damage and 2d8 piercing damage. At the end of that creature's turn, if it's still grabbed by the vine, it takes @Damage[(floor(@item.level/2))d6[bludgeoning]] damage.
    The vine's Escape DC is equal to your spell DC. A creature can attack the vine in an attempt to break its grip. The vine's AC is equal to your spell DC, and the vine is destroyed if it takes 20 or more damage. Destroying or escaping from the vines ends the spell. You can Dismiss the spell.Heightened (+2) The initial bludgeoning damage increases by 1d6, the initial piercing damage increases by 1d8, and the damage a creature takes for ending its turn grabbed by the vine increases by 1d6.
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
resolution: attack
effects:
    on_hit:
        - type: damage
          dice: 3d6
          damage_type: bludgeoning
          dc: 0
        - type: damage
          dice: 2d8
          damage_type: piercing
          dc: 0
    on_crit_hit:
        - type: damage
          dice: 6d6
          damage_type: bludgeoning
          dc: 0
        - type: damage
          dice: 4d8
          damage_type: piercing
          dc: 0
