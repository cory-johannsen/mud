id: natures_enmity
name: Nature's Enmity
description: Animals, plants, and fungi in the area turn against the targets. Each target suffers from the following effects as long as it remains in the area.Vegetation springs up from every surface, giving each target a –10-foot circumstance penalty to its Speed any time it's adjacent to the plants and fungi.Aggressive animals attack unpredictably. At the start of its turn, each target rolls a @Check[flat|dc:8]. On a failure, it's attacked by creatures that deal @Damage[2d10[slashing]] damage. The target attempts a basic Reflex save and is @UUID[Compendium.pf2e.conditionitems.Item.Off-Guard] for 1 round on any outcome other than a critical success.The target loses any connection to nature or natural creatures. The target must succeed at a @Check[flat|dc:5] when casting any primal spell or the spell fails. Furthermore, animal, fungus, and plant creatures become hostile to it, even one with a strong bond to the target, such as an animal companion.The GM might decide that you can't subject some creatures, such as an emissary of a nature deity, to the ire of nature.
tradition: bio_synthetic
