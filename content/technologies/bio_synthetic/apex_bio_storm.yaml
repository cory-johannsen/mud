  - type: damage
    dice: 4d6
    damage_type: acid
  - type: damage
    dice: 10d6
    damage_type: electricity
  - type: damage
    dice: 8d6
    damage_type: bludgeoning
  - &id001
    type: condition
    condition_id: nausea
    value: 2
  on_crit_failure:
