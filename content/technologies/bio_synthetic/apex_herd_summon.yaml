level: 10
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: prone
    value: 1
  on_crit_failure:
  - *id001
