id: thermal_vortex
name: Thermal Vortex
description: 'Area 5-foot radius, 40-foot tall cylinder


  You combine superheated biochemicals and air currents into a fiery vortex. You can
  Use this tech only if you are outside or the ceiling is 40 feet or higher. All
  squares in the vortex are difficult terrain for flying creatures.

  All creatures in the area take 3d4 bludgeoning damage and 3d6 fire damage as gusts
  of scorching wind buffet them, with a basic Quickness check. Each time you Sustain the
  tech, you can move the vortex up to 20 feet in a straight line. Each creature the
  vortex moves through takes the damage with a basic Quickness check. A creature can take
  damage from a thermal vortex only once per round.


  Upgraded (+2) The vortex deals an additional 1d4 bludgeoning damage and 1d6 fire
  damage.'
tradition: bio_synthetic
level: 6
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: '3'
    damage_type: bludgeoning
    dc: 0
  - type: damage
    dice: 3d3
    damage_type: fire
    dc: 0
  on_failure:
  - type: damage
    dice: 3d4
    damage_type: bludgeoning
    dc: 0
  - type: damage
    dice: 3d6
    damage_type: fire
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d4
    damage_type: bludgeoning
    dc: 0
  - type: damage
    dice: 6d6
    damage_type: fire
    dc: 0
