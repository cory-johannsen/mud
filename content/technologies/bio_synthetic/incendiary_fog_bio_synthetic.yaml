id: incendiary_fog_bio_synthetic
name: Incendiary Fog
description: You summon a cloud of flammable black dust. The cloud functions as @UUID[Compendium.pf2e.spells-srd.Item.Mist]. If any open flame or fire effect is within the spell's area when it's cast, or later enters or occurs within the area, the cloud ignites. Creatures in the cloud take @Damage[10d6[fire]] damage (basic Reflex save), and the spell ends.
