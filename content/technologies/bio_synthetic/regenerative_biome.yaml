id: regenerative_biome
name: Regenerative Biome
description: 'The ground around you blooms with bio-synthetic flora that emits restorative
  compounds. Each living creature that starts its turn standing on the ground in the
  area recovers 1d6 Hit Points and gains a +5-foot status bonus to its Speed until
  the end of its next turn. Undead that start their turn in the area instead become
  Sickened 1 unless they succeed at a Grit check.Upgraded (7th) Increase
  the Hit Points restored to 1d8 and Sickened 2.

  Upgraded (10th) Increase the Hit Points restored to 1d10 and Sickened 3.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: rounds:5
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 1d3
    damage_type: untyped
    dc: 0
  on_failure:
  - type: damage
    dice: 1d6
    damage_type: untyped
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 2d6
    damage_type: untyped
    dc: 0
