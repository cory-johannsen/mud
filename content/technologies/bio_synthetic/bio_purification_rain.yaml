id: bio_purification_rain
name: Bio-Purification Rain
description: You synthesize a small floating cloud that rains down warm purifying
  liquid. The rain deals 5d6 spirit damage to hostile undead and corrupted creatures
  in the area at the end of your turn. When you Sustain, you can move the cloud at
  a fly speed of 15 feet to anywhere in range. The liquid dissipates on contact.Heightened
  (+1) The damage increases by 1d6.
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 5d3
    damage_type: spirit
    dc: 0
  on_failure:
  - type: damage
    dice: 5d6
    damage_type: spirit
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 10d6
    damage_type: spirit
    dc: 0
