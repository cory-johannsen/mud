id: mycelial_armor
name: Mycelial Armor
description: 'Bio-synthetic mycelial threads weave through you and your allies, forming
  flexible organic protection. Each affected creature gains resistance 5 to bludgeoning
  and piercing damage. Whenever a creature protected by these threads is targeted
  by a ranged weapon attack but takes no damage, the threads lash out at the attacker,
  dealing 2d6 piercing damage.


  Heightened (+2) The resistance increases by 2.'
