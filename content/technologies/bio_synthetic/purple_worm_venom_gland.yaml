id: purple_worm_venom_gland
name: Purple Worm Venom Gland
description: 'You synthesize the toxin of a lethal apex predator and inject it into the target. You deal 3d6 piercing damage to the touched creature and afflict it with apex venom. The target must attempt a Toughness save.


  Critical Success The target is unaffected.

  Success The target takes 3d6 poison damage.

  Failure The target is afflicted with apex venom at stage 1.

  Critical Failure The target is afflicted with apex venom at stage 2.


  Purple Worm Venom (poison)

  Level 11

  Maximum Duration 6 rounds.

  Stage 1 3d6 poison damage and Enfeebled 2 (1 round)

  Stage 2 4d6 poison damage and Enfeebled 2 (1 round)

  Stage 3 6d6 poison damage and Enfeebled 2 (1 round).'
tradition: bio_synthetic
level: 6
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 3d3
    damage_type: piercing
    dc: 0
  on_failure:
  - type: damage
    dice: 3d6
    damage_type: piercing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d6
    damage_type: piercing
    dc: 0
