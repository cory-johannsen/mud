id: poison_spore_exhale
name: Poison Spore Exhale
description: 'You exhale a shimmering cloud of toxic breath at an enemy''s face. The target takes 1d4 poison damage and @Damage[(ceil(/2))d4[persistent,poison]], depending on its Grit check.Critical Success The creature is unaffected.

  Success The target takes half initial damage and no persistent damage.

  Failure The target takes full initial and persistent damage.

  Critical Failure The target takes double initial and persistent damage.Upgraded (+2) The initial poison damage increases by 1d4, and the persistent poison damage increases by 1d4.'
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: '1'
    damage_type: poison
    dc: 0
  on_failure:
  - type: damage
    dice: 1d4
    damage_type: poison
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 2d4
    damage_type: poison
    dc: 0
