id: boneshaker_bio_synthetic
name: Skeletal Override
description: 'You seize control of the target''s skeletal structure, wrenching it
  painfully. The target takes 3d6 bludgeoning damage and must attempt a Fortitude
  save.


  Critical Success The creature is unaffected.

  Success The creature takes half damage.

  Failure The creature takes full damage and you can move it up to 10 feet in a direction
  of your choice.

  Critical Failure The creature takes double damage and you can move it up to 20 feet
  in a direction of your choice.'
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 3d4
    damage_type: bludgeoning
    dc: 0
  on_failure:
  - type: damage
    dice: 3d8
    damage_type: bludgeoning
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d8
    damage_type: bludgeoning
    dc: 0
