id: elephant_form
name: Pachyderm Graft
description: 'You inject a rapid-acting mutagenic compound that transforms you into
  a Large bio-synthetic combat form modeled on megafauna such as elephants, mammoths,
  or mastodons. This protocol has the effects of Megafauna Graft, except you gain
  the following specific abilities instead.


  Speed 40 feet;

  Melee 1 foot, Damage 2d8 bludgeoning.

  Melee 1 trunk (reach 10 feet), Effect grabbing trunk;

  Melee 1 tusk (reach 10 feet), Damage 2d6 piercing.


  Grabbing Trunk A creature up to two sizes smaller hit by your trunk is Grabbed.
  If you succeed at your Grapple check against a creature grabbed by your trunk, you
  can reposition it to another space within your trunk''s reach.


  Heightened (5th) Your form is Huge; trunk and tusk attacks have 15-foot reach, foot
  attack has 10-foot reach. 20 temporary HP, attack modifier +18, damage bonus +6,
  double damage dice, Athletics +21.

  Heightened (7th) Your form is Gargantuan; trunk and tusk attacks have 20-foot reach,
  foot attack has 15-foot reach. AC is 21 + your level, 25 temporary HP, attack modifier
  +25, damage bonus +15, double damage dice, Athletics +25.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
