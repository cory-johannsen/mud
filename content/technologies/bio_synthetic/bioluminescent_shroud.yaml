id: bioluminescent_shroud
name: Bioluminescent Shroud
description: 'A living membrane of adaptive chromatophores drapes over you, filled with pinpricks of bioluminescence. It synchronizes your biological signature with the ambient environment, granting you a +2 status bonus to Stealth checks to Hide and Sneak.

  While outside under low-light conditions, you''re also Invisible as long as you remain still. When moving under low-light conditions, you''re Concealed instead.

  Gazing too closely at the shifting patterns is disorienting. Any creature that ends its turn adjacent to you must attempt a Willpower save; this is a mental, visual effect.Success The creature is unaffected.

  Failure The creature is Dazzled until the end of its next turn.

  Critical Failure The creature is Confused and dazzled until the end of its next turn.'
tradition: bio_synthetic
level: 6
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: dazzled
    value: 1
  on_crit_failure:
  - *id001
