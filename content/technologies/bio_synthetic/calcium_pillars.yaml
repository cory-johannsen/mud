id: calcium_pillars
name: Calcium Pillars
description: 'You raise one or more pillars of hardite bio-calcium from the ground.
  The total height of the pillars is 30 feet, which must be used in 10-foot increments.
  Each pillar is a 5-foot square, and the top of the pillar is flat. A pillar can
  be destroyed (AC 10, Hardness 8, 30 HP).


  Upgraded (+1) The total height increases by 10 feet.'
