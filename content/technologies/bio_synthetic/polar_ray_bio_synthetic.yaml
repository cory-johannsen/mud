id: polar_ray_bio_synthetic
name: Polar Ray
description: |-
    You fire a blue-white ray of freezing air and sleet that deals 10d8 cold damage. Make a spell attack roll against the target.

    Critical Success The target takes double damage and is Drained 2
    Success The target takes full damage and is Drained 2

    Heightened (+1) The damage increases by 2d8
tradition: bio_synthetic
level: 8
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: attack
effects:
    on_hit:
        - type: damage
          dice: 10d8
          damage_type: cold
          dc: 0
    on_crit_hit:
        - type: damage
          dice: 20d8
          damage_type: cold
          dc: 0
