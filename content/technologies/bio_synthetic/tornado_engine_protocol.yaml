id: tornado_engine_protocol
name: Tornado Engine Protocol
description: 'Area (continued) 15-foot radius, 80-foot-tall cylinderA devastating
  bio-synthetic tornado coalesces from pressurized air reserves. You can activate
  this tech only if you are outside or the ceiling is 80 feet or higher. All squares
  in the tornado are difficult terrain.

  All creatures in the area take 5d10 bludgeoning damage as powerful winds and debris
  buffet them, with a Reflex save. Each time you Sustain the tech, you can move the
  tornado up to 30 feet in a straight line. Each creature the tornado moves through
  takes the damage, also with a Reflex save. A creature can be affected by a tornado
  only once per round.Critical Success The creature is unaffected.

  Success The creature takes half damage.

  Failure The creature takes full damage and rises 10 feet into the air. If it doesn''t
  have a fly Speed, the creature gains one equal to its Speed until it either reaches
  the ground or ceases to be in the tornado''s area, potentially falling when the
  tech ends or when it leaves the area.

  Critical Failure As failure, except the creature takes double damage and rises 20
  feet into the air.Heightened (+1) Increase the bludgeoning damage by 1d10.'
tradition: bio_synthetic
level: 8
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
