id: airlift_bio_synthetic
name: Pneumatic Surge Lift
description: 'A massive bio-generated pressure wave lifts you and everything around
  you to a nearby destination. You, each creature in the area, and each item of 10
  Bulk or lighter are lifted by this powerful gust. You and all affected creatures
  and objects Fly up to 60 feet and land on a solid surface, arriving in the same
  relative position to each other. If there wouldn''t be enough room at the destination,
  the protocol fails.

  Any unwilling participant can attempt a Reflex save to avoid being carried along.
  The airlift doesn''t carry items that are secured in place.


  Heightened (6th) The distance you Fly increases to 120 feet, and the Bulk limit
  increases to 20.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
