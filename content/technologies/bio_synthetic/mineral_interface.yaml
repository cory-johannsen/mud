id: mineral_interface
name: Mineral Interface
description: You tap into the geological sensor network embedded in natural and worked
  stone, extracting environmental data. While stone is not intelligent, you access
  its accumulated data, which is colored by the type of stone and the structure it's
  part of. A stone's awareness is limited to what it can sense through vibration and
  temperature changes.
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You can ask questions of and receive answers from natural or worked
      stone. While stone is not intelligent, you speak with the natural spirits of
      the stone, which have a personality colored by the type
