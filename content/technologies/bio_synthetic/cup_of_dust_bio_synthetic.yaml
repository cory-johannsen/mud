id: cup_of_dust_bio_synthetic
name: Desiccation Toxin
description: 'You inject the target with a toxin that makes its body unable to retain
  moisture. You can Dismiss the spell. The target must attempt a Toughness save.Critical
  Success The creature is unaffected.

  Success The creature is Sickened 1.

  Failure The creature is Sickened 1 and takes 1d4 damage every 10 minutes unless
  it drinks water.

  Critical Failure As failure but Sickened 2.'
tradition: bio_synthetic
level: 3
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You curse the target with a thirst no drink can quench. You can Dismiss
      the spell. The target must attempt a Toughness save.Critical Success The creature
      is unaffected and is temporarily immune for 1
