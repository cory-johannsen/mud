id: pheromone_terror_aura
name: Pheromone Terror Aura
description: 'The target exudes a bio-engineered pheromone cocktail that triggers
  primal terror in observers. The effect is unique to each observer—one might perceive
  a monstrous predator with dripping fangs, while another might see a toxic abomination
  wreathed in caustic fumes.

  When any creature attempts a hostile action against the target, the creature must
  attempt a Willpower save. It is then temporarily immune until the end of its next turn.

  Success The creature is unaffected.

  Failure The creature becomes Frightened 2 before using its action.

  Critical Failure The creature becomes Frightened 2, and its action fails and is
  wasted.


  Heightened (8th) You can target up to 5 creatures. If a creature uses a hostile
  action or reaction that affects multiple targets simultaneously, it needs to attempt
  only one save against the pheromone terror.'
tradition: bio_synthetic
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
