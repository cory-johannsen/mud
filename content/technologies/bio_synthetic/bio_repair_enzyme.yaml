id: bio_repair_enzyme
name: Bio-Repair Enzyme
description: 'You repair the target item. You restore 5 Hit Points per spell rank to the target, potentially removing the Broken condition if this repairs it past the item''s Broken Threshold. You can''t replace lost pieces or repair an object that''s been completely destroyed.


  Upgraded (2nd) You can target a non-magical object of 1 Bulk or less.

  Upgraded (3rd) You can target a non-magical object of 2 Bulk or less, or a magical object of 1 Bulk or less.'
