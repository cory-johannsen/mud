id: grasp_of_the_deep_bio_synthetic
name: Abyssal Pressure Crush
description: 'You subject a target to the crushing pressure of deep-ocean biology,
  disorienting and compressing its lungs and joints. The target takes 6d6 bludgeoning
  damage and other effects, depending on its Will saving throw.


  Critical Success The creature is unaffected.

  Success The target takes half damage.

  Failure The target takes full damage, and feels as though it''s being crushed. The
  target also becomes Grabbed, but it can attempt to Escape with an Escape DC equal
  to your spell DC.

  Critical Failure As failure, but the target takes double damage.


  Heightened (6th) You can target up to 5 creatures.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 6d3
    damage_type: bludgeoning
    dc: 0
  on_failure:
  - type: damage
    dice: 6d6
    damage_type: bludgeoning
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 12d6
    damage_type: bludgeoning
    dc: 0
