id: wall_of_flesh_bio_synthetic
name: Wall of Flesh
description: You craft a 20-foot-tall wall of living flesh in a straight line up to 30 feet long. The wall is 3 feet thick, and each 5-foot-long section has AC 10 and 75 Hit Points. If you wish, the wall can be of a smaller length or height. You must create the wall in an unbroken open space so its edges don't pass through any creatures or objects, or the spell is lost. The wall can't be Repaired but can be healed by vitality, and healing spells and abilities. When you Cast the Spell, choose one of the following features for your wall.Mouths The wall has countless toothy mouths along its surface. The mouths Strike any creature that ends its turn within 5 feet of the wall, using your spell attack modifier for these Strikes and dealing @Damage[(1+(ceil((@item.level - 4) / 2)))d6[piercing]] damage. The mouths are capable of consuming potions; since the wall is alive, it can recover Hit Points from a Healing Potion, but it can't benefit from any effect that would give it the ability to move. Otherwise, the GM determines which potions can affect the wall.Eyes The wall sprouts hundreds of unblinking eyes. You can see through these eyes, gaining a +2 circumstance bonus to visual Perception checks within the wall's line of sight. You can also use the eyes for determining line of sight for ranged attacks and spells, but you don't have line of effect through the wall.Arms The wall is a mass of grasping arms. Any creature that ends its turn within 5 feet of the wall must attempt a Reflex save.Success The creature is unaffected.Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Grabbed] by the wall for 1 round or until it Escapes against your spell DC, whichever comes first.Critical Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Restrained] by the wall for 1 round or until it Escapes against your spell DC, whichever comes first.Heightened (+2) The Hit Points of each section of the wall increase by 10, and the piercing damage dealt by the wall's mouths increases by 1d6.
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
