  A powerful geyser of superheated chemical compound blasts up from the ground. The
  bottom of this tech''s area must be on solid ground. Each creature in the area takes
  3d6 bludgeoning damage and 4d6 fire damage, with a Quickness check. A creature that
  fails is also pushed to the top of the geyser.


  Upgraded (+2) The fire damage increases by 2d6.'
