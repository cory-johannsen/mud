id: elemental_breath_bio_synthetic
name: Chemical Breath
description: 'You open a bio-synthetic chemical reservoir, then exhale a powerful
  chemical explosion. Roll 1d6 to determine the element. If you used 3 actions to
  activate this tech, you can choose the element instead. This tech gains the trait
  matching the element.

  Each creature in the area takes damage based on the element with a basic Reflex
  save.


  Heightened (+1) The damage increases by 2d6.'
