id: flammable_fumes_bio_synthetic
name: Flammable Fumes
description: |-
    Sending magic deep underground, you conjure a cloud of toxic gases that swiftly degenerate into volatile fumes. The gases are invisible, requiring a successful Perception check against your spell DC to detect visually, though their acrid smell and toxic effects are clear once a creature has entered the cloud. A creature that enters the cloud or is within the cloud at the start of its turn takes 2d6 poison damage. A creature can take the poison damage from flammable fumes only once per round.
    One round after you conjure the cloud, the gases loses stability and become flammable. If an open flame is brought into the cloud, or if anyone within the area uses a fire effect, the cloud detonates in a massive blaze that deals @Damage[10d6[fire]] damage to all creatures within it with a @Check[reflex|basic] save, and the spell ends.Heightened (+2) The poison damage increases by 1d6 and the fire damage on an explosion increases by 2d6.
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
resolution: none
effects:
    on_apply:
        - type: damage
          dice: 2d6
          damage_type: poison
          dc: 0
