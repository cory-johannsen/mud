id: biomass_wall
name: Biomass Wall
description: 'You grow a 20-foot-tall wall of bio-synthetic tissue in a straight line
  up to 30 feet long. The wall is 3 feet thick, and each 5-foot-long section has AC
  10 and 75 Hit Points. If you wish, the wall can be of a smaller length or height.
  You must create the wall in an unbroken open space.


  Upgraded (+2) The Hit Points of each section increase by 15.'
