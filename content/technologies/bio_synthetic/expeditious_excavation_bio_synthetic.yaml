id: expeditious_excavation_bio_synthetic
name: Expeditious Excavation
description: |-
    Area (continued) cube of dirt 5 feet across or smallerYou remove loose dirt, dust, gravel, sand, and the like (though not solid stone) up to the size of a 5-foot cube. Any Medium or smaller creature standing atop the earth when the spell is cast must attempt a Reflex save or @Check[acrobatics] check.
    Success The creature is unaffected and can choose to either descend the pit without damage or move to the nearest available space of its choice.
    Failure The creature falls @UUID[Compendium.pf2e.conditionitems.Item.Prone] in the nearest available space of its choice or falls into the pit if it prefers.
    Critical Failure The creature falls into the pit excavated by the spell and lands prone, taking falling damage as normal.Heightened (+2) The spell can excavate an additional 5-foot cube of earth. If you excavate all four 5-foot cubes beneath a Large creature, it must attempt a Reflex save or Acrobatics check, as above.
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
