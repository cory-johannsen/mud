id: hags_fruit_bio_synthetic
name: Soporific Compound
description: 'You lace a single food item with a bio-synthesized narcotic compound
  that induces deep catatonia. The first person to consume the food within the spell''s
  duration is subject to the Curse of Slumber, using your tech DC as the saving throw
  DC of the curse.


  Curse of Slumber (curse, incapacitation, necromancy, sleep)

  Level 11


  Effect You fall asleep for 1 round (or permanently on a critical failure) and seem
  to be dead; a creature must succeed at a @Check[medicine|dc:30] check to realize
  you''re alive. Noise doesn''t awaken you, but taking damage gives you a new saving
  throw against the curse.'
