id: trim_the_blight_bio_synthetic
name: Blight Purge
description: You deploy a biological purge agent that eliminates diseased or corrupted
  organic matter. All disease and poison effects on willing creatures in a 60-foot
  burst are removed. Undead and blighted creatures in the area take 10d8 positive
  damage (no save). Plants in the area are either killed or healed for 40 HP (your
  choice at time of casting).
tradition: bio_synthetic
level: 9
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 12d6
    damage_type: spirit
    dc: 0
  on_failure:
  - type: damage
    dice: 12d10
    damage_type: spirit
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 24d10
    damage_type: spirit
    dc: 0
