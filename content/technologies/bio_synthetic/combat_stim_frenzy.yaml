id: combat_stim_frenzy
name: Combat Stim Frenzy
description: 'A bio-synthetic combat stimulant floods the targets'' systems, filling them with strength and ferocity. Targets gain 5 temporary Hit Points, a +10-foot status bonus to their Speeds, and weakness 5 to silver. They also grow vicious bio-synthetic claws and fangs, which are unarmed attacks. The fangs deal 2d8 piercing damage; the claws deal 2d6 slashing damage and have the agile trait.


  Upgraded (6th) The temporary Hit Points increase to 10, and the damage dice for fangs and claws each increase by one step.'
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 2d8
    damage_type: piercing
  - type: damage
    dice: 2d6
    damage_type: slashing
  on_crit_failure:
  - type: damage
    dice: 4d8
    damage_type: piercing
  - type: damage
    dice: 4d6
    damage_type: slashing
