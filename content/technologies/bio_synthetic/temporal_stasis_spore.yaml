id: temporal_stasis_spore
name: Temporal Stasis Spore
description: You encase the target in a bio-synthetic temporal cocoon, causing it
  to vanish and reappear. The target disappears and then reappears in the same space
  (or the nearest unoccupied space) at the beginning of your next turn. It can't act
  while displaced. When it returns, it's unharmed.
