id: corrosive_muck_bio_synthetic
name: Corrosive Muck
description: Area all squares in two @Template[burst|distance:10]{10-foot bursts}.You create two puddles of acidic slime that hinders the movement of anyone who walks through them. The area of each pool becomes greater difficult terrain. Each round that a creature starts its turn in one of the pools or enters a pool during a move action it's using, it takes 8d6 acid damage with a basic Reflex save. A creature that critically fails its saving throw also takes @Damage[1d6[acid,persistent]]. As normal, if a Large or larger creature starts its turn in both pools, it takes the damage only once.Heightened (+2) Create an additional 10-foot burst.
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 8d3
          damage_type: acid
          dc: 0
    on_failure:
        - type: damage
          dice: 8d6
          damage_type: acid
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 16d6
          damage_type: acid
          dc: 0
