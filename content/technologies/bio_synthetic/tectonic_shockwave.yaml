id: tectonic_shockwave
name: Tectonic Shockwave
description: 'You strike the ground, and unleash a bio-seismic wave that travels through the struck surface to the target. The effect ends as soon as it can''t travel through a solid surface, such as a metal floor. Each creature in a line between you and the target is shaken by tremors and must attempt a Reflex saving throw against your tech DC. A creature that fails this save is pushed 10 feet away from you.

  The wave explodes once it reaches the target, showering the target with earth and debris and dealing 12d10 bludgeoning damage with a basic Reflex save. A target that fails its save against this explosion is also pushed back 10 feet and knocked Prone. A creature subject to the explosion doesn''t need to save against the tremors.


  Heightened (9th) The wave explodes on one additional target of your choice in the line to the final target.'
tradition: bio_synthetic
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 12d6
    damage_type: bludgeoning
    dc: 0
  on_failure:
  - type: damage
    dice: 12d10
    damage_type: bludgeoning
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 24d10
    damage_type: bludgeoning
    dc: 0
