id: bio_chitin_gauntlets
name: Bio-Chitin Gauntlets
description: 'Your arms and hands swell with new growth, transforming into tree trunks twice as big as their current size. Your fists deal 1d6 bludgeoning damage, lose the nonlethal trait, and have reach.


  Upgraded (3rd) Your fists gain the magical trait and become a striking weapon, increasing the damage your fists deal to 2d6 bludgeoning.

  Upgraded (7th) Your fists gain the magical trait and become a greater striking weapon, increasing the damage your fists deal to 3d6 bludgeoning. The duration is 10 minutes.

  Upgraded (9th) Your fists gain the magical trait and become a major striking weapon, increasing the damage your fists deal to 4d6 bludgeoning. The duration is 1 hour.

  Wooden Fists'
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
