    dice: 1d6
    damage_type: bludgeoning
  - type: damage
    dice: 2d6
    damage_type: bludgeoning
  - type: damage
    dice: 3d6
    damage_type: bludgeoning
  - type: damage
    dice: 4d6
    damage_type: bludgeoning
