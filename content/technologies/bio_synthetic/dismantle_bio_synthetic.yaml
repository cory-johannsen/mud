id: dismantle_bio_synthetic
name: Dismantle
description: |-
    You touch an object, and it immediately disassembles itself into its component pieces. The spell fails if the target lacks component pieces (such as a statue carved from one block of stone), and using it on a dangerous object like a snare or trap typically triggers it. The object gains the @UUID[Compendium.pf2e.conditionitems.Item.Broken] condition, and the component pieces become small enough to be @UUID[Compendium.pf2e.conditionitems.Item.Hidden] under normal clothing and armor. You can @UUID[Compendium.pf2e.actionspf2e.Item.Dismiss] the spell.
    When the spell ends, the object reassembles itself into its original form, appearing in your hand or hands if you have them free, or on the ground in front of you otherwise. Once reassembled, the object loses the Broken condition and its Hit Points return to the value the object had when you Cast the Spell.Heightened (4th) The spell lasts for 10 minutes.
    Heightened (6th) The spell lasts until your next daily preparations.
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: minutes:1
resolution: none
