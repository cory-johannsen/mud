id: lock_item_bio_synthetic
name: Lock Item
description: |-
    One object held by a creature becomes fused to that creature's hand and can't be put down. To @UUID[Compendium.pf2e.actionspf2e.Item.Disarm] or @UUID[Compendium.pf2e.actionspf2e.Item.Steal] the item, the result of the skill check must exceed the spell's DC or the normal DC, whichever is higher. To voluntarily drop the weapon, the target must spend an Interact action rather than a free action, and then succeed at a Reflex save; the target must also attempt a Reflex save to Interact to put away or swap the object. On a failed save, the action is wasted, but on a success, they drop the item and the spell ends. An unwilling creature must attempt an initial Reflex save against lock item. A willing creature can choose to critically fail the saving throw.Critical Success The creature is unaffected.
    Success The creature is affected for 1 round.
    Failure The creature is affected for 4 rounds.
    Critical Failure The creature is affected for 1 minute.Heightened (+2) You can target either one additional object held by the same creature or one additional object held by one additional creature.
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
