id: ballistic_tongue
name: Ballistic Tongue
description: You mutate your tongue into a long, sticky bio-synthetic appendage. You
  can make a melee Strike with your tongue against a target up to 15 feet away. On
  a hit, you deal 2d4 bludgeoning damage and can pull the target 5 feet toward you.
