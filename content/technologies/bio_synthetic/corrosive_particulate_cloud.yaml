id: corrosive_particulate_cloud
name: Corrosive Particulate Cloud
description: 'Red-brown flecks of bio-synthesized corrosive particles fill the air. All creatures within the cloud become Concealed, and all creatures outside become concealed to those within. The cloud deals 5d10 slashing damage to any creature that starts its turn in the area, with a basic Grit check.

  Metal corroded off a creature adds to the cloud. When a metal creature takes damage, the cloud''s area increases by 5 feet (to a maximum 40-foot burst), and the creature takes @Damage[(floor(/2)-1)d4[persistent,slashing]] damage. You can Dismiss the cloud.


  Upgraded (+2) The slashing damage increases by 1d10 and the persistent damage increases by 1d4.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 5d6
    damage_type: slashing
    dc: 0
  on_failure:
  - type: damage
    dice: 5d10
    damage_type: slashing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 10d10
    damage_type: slashing
    dc: 0
