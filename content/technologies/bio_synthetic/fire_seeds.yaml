id: fire_seeds
name: Incendiary Seed Pods
description: 'Four bio-engineered seed pods grow in your hand, their shells streaked
  with pulsing red and orange chemical patterns. You or anyone else who has one of
  the pods can toss it up to 30 feet with an Interact action. It explodes in a 5-foot
  burst, dealing 4d6 fire damage. The save uses your spell DC, even if someone else
  throws the pod. Flames continue to burn on the ground in the burst for 1 minute,
  dealing @Damage[2d6[fire]] damage to any creature that enters the flames or ends
  its turn within them. A creature can take damage from the continuing flames only
  once per round, even if it''s in overlapping areas of fire created by different
  pods. When the spell ends, any remaining pods decompose into organic matter.


  Heightened (8th) The burst''s damage increases to 5d6, and the continuing flames
  damage increases to @Damage[3d6[fire]] damage.

  Heightened (9th) The burst''s damage increases to 6d6, and the continuing flames
  damage increases to 3d6.'
tradition: bio_synthetic
level: 6
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 4d3
    damage_type: fire
    dc: 0
  on_failure:
  - type: damage
    dice: 4d6
    damage_type: fire
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 8d6
    damage_type: fire
    dc: 0
