id: hydraulic_torrent
name: Hydro Cannon Burst
description: 'A concentrated torrent of bio-pressurized water blasts along a straight
  line, battering creatures and unattended objects in its path. The torrent deals
  8d6 bludgeoning damage. Each creature must attempt a basic Fortitude save; unattended
  objects automatically fail. Creatures and objects that fail are also knocked back
  5 feet (10 feet on a critical failure).


  Heightened (+1) The damage increases by 2d6.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d3
    damage_type: bludgeoning
    dc: 0
  on_failure:
  - type: damage
    dice: 8d6
    damage_type: bludgeoning
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d6
    damage_type: bludgeoning
    dc: 0
