id: summon_warden_of_the_wild
name: Summon Apex Guardian
description: 'You briefly call forth the spirit of one of the Apex Guardians, legendary
  bio-engineered protectors of the wilds. The guardian occupies the space of a Gargantuan
  creature. When you activate this tech, you summon a guardian depending on the biome
  in which the tech is activated (for instance, summoning the Guardian of Caverns
  and Burrows if summoned in a cave, canyon, or other underground environment). In
  an unnatural environment, the guardian summoned depends on the region''s most recent
  or similar natural biome, as decided by the GM.@UUID[Compendium.pf2e.howl-of-the-wild-bestiary.Actor.Warden
  of Caverns and Burrows]: Speed 60 feet, burrow 100 feet; Arrive (earth) Obsidian
  Cage Obsidian stalagmites burst from the earth as the warden surfaces, impaling
  enemies and trapping them in stalagmites. Enemies on the ground within @Template[emanation|distance:40]{40
  feet} take @Damage[6d6[piercing]] damage (@Check[reflex|basic] save). Creatures
  that fail their save become @UUID[Compendium.pf2e.conditionitems.Item.Immobilized]
  until they @UUID[Compendium.pf2e.actionspf2e.Item.Escape] (the DC is your spell
  DC); Depart (earth) Blessing of the Depths The squares occupied by the warden remain
  disheveled and broken, becoming difficult terrain. The warden affects you and all
  your allies within @Template[emanation|distance:60]{60 feet} with a @UUID[Compendium.pf2e.spells-srd.Item.Mountain
  Resilience] and @UUID[Compendium.pf2e.spells-srd.Item.Unfettered Pack]. The duration
  for both spells is reduced to 3 rounds, but the duration of mountain resilience
  isn''t reduced when an affected target is hit by a bludgeoning, piercing, or slashing
  attack.@UUID[Compendium.pf2e.howl-of-the-wild-bestiary.Actor.Warden of Forests and
  Meadows]: Speed 120 feet; Arrive (illusion, mental) Idyllic Panorama The warden''s
  presence unpredictably warps the appearances and perceived distances of creatures
  and obstacles around it. Each time an enemy within 40 feet of the warden attempts
  a Strike or Stride action, it takes @Damage[4d6[mental]] damage (@Check[will|basic]
  save). On a critical failure, the creature Strikes a random target within reach
  or Strides in a random direction. On a critical success, the creature becomes temporarily
  immune for 1 round; Depart Fox''s Insightful Trickery The warden affects you and
  all your allies within 60 feet with @UUID[Compendium.pf2e.spells-srd.Item.Blur]
  and @UUID[Compendium.pf2e.spells-srd.Item.Truesight]. The duration for both spells
  is reduced to 3 rounds.@UUID[Compendium.pf2e.howl-of-the-wild-bestiary.Actor.Warden
  of Oceans and Rivers]: Speed 60 feet, swim 120 feet; Arrive I Am the Tide If the
  warden is summoned in a body of water, it creates a churning whirlpool that deals
  @Damage[10d6[bludgeoning]] damage to all creatures within @Template[emanation|distance:30]{30
  feet} (basic Reflex save). A creature that fails this save is pulled 15 feet closer
  to the warden (30 feet on a critical failure). If the warden is summoned outside
  of a body of water, it creates a wave of water that deals @Damage[8d6[bludgeoning]]
  damage to all creatures within 30 feet (basic Reflex save). A creature that fails
  this save is pushed 10 feet away from the warden; Depart Acclimation to the Deep
  The warden affects you and your allies within 60 feet with @UUID[Compendium.pf2e.spells-srd.Item.Feet
  to Fins] and @UUID[Compendium.pf2e.spells-srd.Item.Water Breathing]. The duration
  for both spells is reduced to 3 rounds, but a creature affected by feet to fins
  retains its normal land Speed.@UUID[Compendium.pf2e.howl-of-the-wild-bestiary.Actor.Warden
  of Peaks and Skies]: Speed 60 feet, fly 240 feet; Arrive Precipice Plummet The warden
  appears, flying downward from the sky and sends a shockwave where she lands. Creatures
  within @Template[emanation|distance:20]{20 feet} take @Damage[10d6[sonic]] damage
  (@Check[fortitude|basic] save). Creatures that critically fail their saves are Sickened
  1; Depart (auditory) Song of the Skies The warden affects you and all your allies
  within 60 feet with @UUID[Compendium.pf2e.spells-srd.Item.Fly] and @UUID[Compendium.pf2e.spells-srd.Item.Unfettered
  Movement]. The duration for both spells is reduced to 3 rounds.'
