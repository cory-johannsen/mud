id: primal_herd
name: Apex Herd Summon
description: You summon a stampeding herd of apex biological organisms. The herd occupies
  a 30-foot burst and tramples through it dealing 8d10+20 bludgeoning damage to all
  creatures (Reflex for half). Creatures that fail are knocked prone and take 4d10
  persistent bludgeoning damage. The herd persists for 1 minute, trampling each round.
