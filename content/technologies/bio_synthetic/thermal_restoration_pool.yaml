id: thermal_restoration_pool
name: Thermal Restoration Pool
description: 'Steam rises as a bio-synthesized mineral pool forms in the ground, filling
  with geothermally heated water rich in restorative compounds. Any creature that
  spends the full hour soaking regains 10d8 Hit Points and feels refreshed, losing
  the fatigued condition. As normal, this doesn''t remove underlying sources of fatigue.

  The pool is 20 feet on each side and 5 feet deep. It holds 16 Medium or smaller
  creatures at a time. A Large creature counts as eight, a Huge creature fills the
  entire pool. This pool has the structure trait.


  Heightened (+1) The healing increases by 2d8.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 10d8
    damage_type: vitality
    dc: 0
