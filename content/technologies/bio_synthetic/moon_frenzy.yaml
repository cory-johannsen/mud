  them with strength and ferocity. Targets gain 5 temporary Hit Points, a +10-foot
  status bonus to their Speeds, and weakness 5 to silver. They also grow vicious bio-synthetic
  claws and fangs, which are unarmed attacks. The fangs deal 2d8 piercing damage;
  the claws deal 2d6 slashing damage and have the agile trait.


  Heightened (6th) The temporary Hit Points increase to 10, and the damage dice for
  fangs and claws each increase by one step.'
