id: electro_storm
name: Electro Storm
description: 'You deploy an atmospheric ionization array that creates a fearsome surge
  of lightning and wind, dealing 6d6 electricity damage. Each creature must attempt
  a Reflex saving throw.


  Critical Success The creature is unaffected.

  Success The creature takes half damage.

  Failure The creature takes full damage and is knocked Prone.

  Critical Failure The creature takes double damage, is knocked Prone, and is Stunned
  1.'
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 6d3
    damage_type: electricity
    dc: 0
  on_failure:
  - type: damage
    dice: 6d6
    damage_type: electricity
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 12d6
    damage_type: electricity
    dc: 0
