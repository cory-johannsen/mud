id: mutagenic_overgrowth
name: Mutagenic Overgrowth
description: 'This gruesome bio-tech causes the target to sprout excess bio-synthetic
  tissue -- fingers multiplying, eyes opening in bizarre places, limbs sprouting from
  the torso. The target takes 10d6 piercing damage (basic Toughness save) as the growths
  erupt.


  On a failure, the target is also Clumsy 1 for 1 minute as the excess growths interfere
  with movement.


  Heightened (+1) The damage increases by 2d6.'
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 10d3
    damage_type: piercing
    dc: 0
  on_failure:
  - type: damage
    dice: 10d6
    damage_type: piercing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 20d6
    damage_type: piercing
    dc: 0
