id: cellular_implosion
name: Cellular Implosion
description: You collapse the cellular structure of a target from within. Choose a
  creature within 30 feet. It must attempt a Toughness save. On a failure, it takes
  75 force damage as its body tries to implode. If this reduces it to 0 HP, it is
  annihilated. On a success, it takes half damage. On a critical success, it is unaffected.
  You can use this once per round for the duration (1 minute).
tradition: bio_synthetic
level: 9
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: '75'
    damage_type: untyped
    dc: 0
  on_failure:
  - type: damage
    dice: '75'
    damage_type: untyped
    dc: 0
  on_crit_failure:
  - type: damage
    dice: '75'
    damage_type: untyped
    dc: 0
