id: iron_gut_bio_synthetic
name: Iron Gut
description: |-
    Your mouth, esophagus, and stomach become incredibly elastic and tougher than metal. For the duration of the spell, you can reach down your throat to store or retrieve a single object of light or negligible Bulk in your stomach, as though your stomach were a backpack or other container. Storing and retrieving an item in this way requires an Interact action. The object must be small enough to reasonably fit within your stomach. It is very difficult for other creatures to notice that you are hiding an object in this way; passive observers can't possibly notice and you gain a +4 circumstance bonus to your Stealth checks to @UUID[Compendium.pf2e.actionspf2e.Item.Conceal an Object] unless the searcher specifically searches your mouth and stomach. If at the end of the spell's duration you still have an object stored in your stomach, it is violently expelled, dealing 1d6 damage to you.
    @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Iron Gut]

    Heightened (3rd) The duration increases to 8 hours.
    @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Iron Gut (3rd Level)]
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
