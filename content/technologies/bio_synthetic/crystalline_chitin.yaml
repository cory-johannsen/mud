id: crystalline_chitin
name: Crystalline Chitin
description: 'You coat the target in transparent crystalline chitin. The target becomes
  Concealed, has no scent, and can''t bleed. They gain resistance 5 to acid, cold,
  electricity, and piercing damage and weakness 5 to sonic and bludgeoning damage.
  A creature in this form is affected by shatter effects as though it were an unattended
  object. Each time the target takes damage to which the spell grants resistance or
  weakness, reduce the duration by 1 minute.


  Heightened (+2) The resistances and weaknesses increase by 5.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
