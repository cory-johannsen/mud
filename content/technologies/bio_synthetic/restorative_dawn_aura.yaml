id: restorative_dawn_aura
name: Restorative Dawn Aura
description: 'Bright bioluminescent energy radiates from your body in a 20-foot radius (and dim light for the next 20 feet). You gain mental resistance 5. Any undead or corrupted creature that begins its turn adjacent to you must attempt a Willpower save.

  Critical Success The creature is unaffected and immune for the remaining duration.

  Success The creature is Sickened 1 until the end of its turn.

  Failure The creature is sickened 1 and becomes Slowed 1 until the end of its next turn.

  Critical Failure As failure, but Sickened 2 and remains slowed 1 for the rest of the duration.Upgraded (6th) Mental resistance 10.

  Upgraded (8th) Mental resistance 15.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: nausea
    value: 1
  - &id002
    type: condition
    condition_id: slowed
    value: 1
  on_crit_failure:
  - *id001
  - *id002
