id: dinosaur_form
name: Megafauna Graft
description: 'You inject a rapid-acting mutagenic compound that transforms your body
  into a Large bio-synthetic combat form modeled on prehistoric megafauna. When you
  activate this protocol, choose a form configuration. While in this form, you gain
  the bio-synthetic trait. You can Dismiss the spell.

  You gain the following statistics and abilities regardless of which form you choose:


  AC = 18 + your level. Ignore your armor''s check penalty and Speed reduction.

  15 temporary Hit Points.

  Low-light vision and imprecise scent 30 feet.

  One or more unarmed melee attacks specific to the form you choose. You''re trained
  with them. Your attack modifier is +16, and your damage bonus is +9. These attacks
  are Strength based. If your unarmed attack modifier is higher, you can use it instead.

  Athletics modifier of +18, unless your own is higher.


  Form configurations and their melee attacks remain identical to the base protocol
  statistics.


  Heightened (5th) Your battle form is Huge; attacks have 15-foot reach, or 20-foot
  reach if they started with 15-foot. 20 temporary HP, attack modifier +18, damage
  bonus +6, double damage dice, Athletics +21.

  Heightened (7th) Your battle form is Gargantuan; attacks have 20-foot reach, or
  25-foot if they started with 15-foot. AC = 21 + your level, 25 temporary HP, attack
  modifier +25, damage bonus +15, double damage dice, Athletics +25.'
