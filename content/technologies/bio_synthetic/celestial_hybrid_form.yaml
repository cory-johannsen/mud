id: celestial_hybrid_form
name: Celestial Hybrid Form
description: 'You recreate your form entirely out of bio-luminescent energy, transforming into a Large battle form. You must have enough space to expand into, or the tech is lost. When you activate this tech, choose to take on the lunar or solar bio-adaptation. You have hands in this battle form and can use manipulate actions. You can Dismiss the tech.

  You gain the following statistics and abilities regardless of the form that you choose:AC = 21 + your level. Ignore your armor check''s penalty and Speed reduction.20 temporary Hit Points.Darkvision.One or more attacks specific to the battle form you use. You''re trained with them. Your attack modifier is +25, and you use the listed damage. The melee attacks are Strength based (for the purpose of the enfeebled condition, for example), and the ranged attacks are Dexterity based. If your unarmed attack modifier is higher, you can use it instead.Athletics modifier of +25, unless your own is higher.You also gain specific abilities based on the stellar body:Moon Speed 30 feet, fly 50 feetMelee 1 fist (agile, reach 10 feet), Damage 2d4+10 bludgeoning plus 1d6 fireRanged 1 moonbeam (range 90 feet), Damage 2d4+10 fire; this form''s fire damage is silver for resistances, weaknesses, and the likeOn a critical hit with either Strike, the target is Stupefied 2 for 1 round.Sun Speed 30 feet, fly 50 feetMelee 1 fist (agile, reach 10 feet), Damage 2d6+10 fire plus 1d6 persistent fireRanged 1 sunbeam (range 90 feet), Damage 1d6+10 fire plus 1d6 persistent fireOn a critical hit with either Strike, the target is Dazzled for 1 round.@UUID[Compendium.pf2e.spell-effects.Item.tech Effect: Cosmic Form]'
tradition: bio_synthetic
level: 7
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: condition
    condition_id: dazzled
    value: 1
