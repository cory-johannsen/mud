id: one_with_plants
name: Vegetal Camouflage
description: You merge your bio-structure with nearby plant life, becoming nearly
  invisible among vegetation. You gain a +4 status bonus to Stealth checks to Hide
  or Sneak while in an area with plants. You can also move through non-magical plants
  without penalty.
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
