id: aqueous_orb_bio_synthetic
name: Acid Sphere
description: 'A sphere of corrosive bio-fluid 10 feet in diameter coalesces in an
  unoccupied space in range. When you activate this tech and each time you Sustain
  it, you can roll the sphere, moving it up to 10 feet along the ground.

  The sphere can engulf Large or smaller creatures it moves through. Any Large or
  smaller creature whose space the orb tries to move through can attempt a Reflex
  save.


  Success The creature avoids the sphere.

  Failure The creature is engulfed. It moves along with the sphere and takes 2d6 acid
  damage per round.

  Critical Failure As failure, but the creature can''t escape easily.'
