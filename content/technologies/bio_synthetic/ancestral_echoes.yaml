id: ancestral_echoes
name: Ancestral Echoes
description: 'You summon bio-synthetic projections of ancestral organisms. The spirits occupy the area and attack creatures that enter. A creature entering the area takes 2d6 mental damage with a basic Willpower save.


  Heightened (+1) The damage increases by 1d6.'
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 2d6
    damage_type: mental
  on_crit_failure:
  - type: damage
    dice: 4d6
    damage_type: mental
