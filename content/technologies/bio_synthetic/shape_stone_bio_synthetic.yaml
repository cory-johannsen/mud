id: shape_stone_bio_synthetic
name: Mineral Sculpting
description: 'You reshape stone or mineral matter into a rough shape of your choice.
  The process is too crude for intricate parts or fine details. Any creatures standing
  atop the stone when you reshape it must each attempt a Reflex save or Acrobatics
  check.


  Success The creature is unaffected.

  Failure The creature falls Prone atop the stone.

  Critical Failure The creature falls off the stone (if applicable) and lands Prone.'
