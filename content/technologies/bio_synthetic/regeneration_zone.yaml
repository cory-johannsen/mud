id: regeneration_zone
name: Regeneration Zone
description: 'A field of accelerated cellular regeneration fills the area, exuding
  warmth and rejuvenating those within. Each living creature that starts its turn
  in the area regains 1d8 Hit Points, and any undead creature that starts its turn
  in the area takes 1d8 vitality damage.


  Upgraded (8th) The healing and damage increase to 1d10.

  Upgraded (9th) The healing and damage increase to 1d12.'
tradition: bio_synthetic
level: 6
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 1d8
    damage_type: vitality
    dc: 0
