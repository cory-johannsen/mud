id: cloud_current_bio_synthetic
name: Jetstream Funnel
description: 'Bio-synthesized atmospheric manipulation creates a massive cloud corridor
  that funnels a powerful current within it. The cloud is up to 30 feet wide, 30 feet
  tall, and 10 miles long, running parallel to the ground at least 100 feet above
  it. The current travels in a direction you choose, and the travel Speed of creatures
  flying through it in that direction is doubled. You can Dismiss the effect.Heightened
  (6th) The duration is 8 hours, and the cloud can be up to 50 feet wide and 100 miles
  long.

  Heightened (8th) As 6th, and travel speed is quadrupled.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
