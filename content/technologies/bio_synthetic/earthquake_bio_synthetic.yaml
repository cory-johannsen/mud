id: earthquake_bio_synthetic
name: Earthquake
description: 'You shake the ground, topple creatures into fissures, and collapse structures. The GM might add additional effects in certain areas. Cliffs might collapse, causing creatures to fall, or a lake might drain as fissures open up below its surface, leaving a morass of quicksand.Shaking Ground The ground is difficult terrain, and creatures on it take a -2 circumstance penalty to attack rolls, AC, and skill checks. @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Earthquake (Shaking Ground)]Fissures Each creature on the ground must attempt a Reflex save at the start of its turn to keep its footing and avoid falling into 40-foot-deep fissures that open beneath it. The fissures are permanent, and their sides require successful @Check[athletics|dc:15|traits:action:climb] to Climb.Collapse Structures and ceilings might collapse. The GM rolls a flat check for each (@Check[flat|dc:16] for a sturdy structure, @Check[flat|dc:14] for an average structure and most natural formations, @Check[flat|dc:9] for a shoddy structure, all adjusted higher or lower as the GM sees fit). A collapse deals 11d6 bludgeoning damage to each creature caught in it with a basic Reflex save. A creature falls @UUID[Compendium.pf2e.conditionitems.Item.Prone] unless it critically succeeds and falls into a fissure if it critically fails.Heightened (10th) You create a massive earthquake that can devastate a settlement. The range increases to half a mile and the area to a quarter-mile burst.'
tradition: bio_synthetic
level: 8
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: rounds:1
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 11d3
          damage_type: bludgeoning
          dc: 0
    on_failure:
        - type: damage
          dice: 11d6
          damage_type: bludgeoning
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 22d6
          damage_type: bludgeoning
          dc: 0
