id: mirage_bio_synthetic
name: Mirage
description: |-
    You create an illusion that causes natural terrain to look, sound, feel, and smell like a different kind of terrain. This doesn't disguise any structures or creatures in the area.
    Any creature that touches the illusion or uses the @UUID[Compendium.pf2e.actionspf2e.Item.Seek] action to examine it can attempt to disbelieve your illusion.

    Heightened (5th) Your image can also disguise structures or create illusory structures (but still doesn't disguise creatures).
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
resolution: none
