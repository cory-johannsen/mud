id: weapon_storm_bio_synthetic
name: Weapon Storm
description: |-
    Area 30-foot cone or 10-foot emanationYou swing a weapon you're holding, and the weapon magically multiplies into duplicates that swipe at all creatures in either a cone or an emanation. This flurry deals four dice of damage to creatures in the area. This damage has the same type as the weapon and uses the same die size. Determine the die size as if you were attacking with the weapon; for instance, if you were wielding a two-hand weapon in both hands, you'd use its two-hand damage die.Critical Success The creature is unaffected.
    Success The target takes half damage.
    Failure The target takes full damage.
    Critical Failure The target takes double damage and is subject to the weapon's critical specialization effect.Heightened (+1) Add another damage die.
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
