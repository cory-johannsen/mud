id: toxic_cloud_bio_synthetic
name: Toxic Cloud
description: |-
    You conjure a poisonous fog. This functions as @UUID[Compendium.pf2e.spells-srd.Item.Mist], except the area moves 10 feet away from you each round. You deal 6d8 poison damage to each breathing creature that starts its turn in the spell's area. You can Dismiss the spell.

    Heightened (+1) The damage increases by 1d8.
tradition: bio_synthetic
level: 5
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 6d4
          damage_type: poison
          dc: 0
    on_failure:
        - type: damage
          dice: 6d8
          damage_type: poison
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 12d8
          damage_type: poison
          dc: 0
