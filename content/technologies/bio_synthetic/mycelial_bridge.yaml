id: mycelial_bridge
name: Mycelial Bridge
description: 'Reinforced fungal tendrils sprout beneath your feet and extend away from you in a straight line up to 60 feet, forming a 10-foot-wide bridge of interlocking organic matter. The bridge has an AC equal to your tech DC, Hardness 10, and 20 Hit Points. It is immune to critical hits and precision damage.

  While active, you and your allies can use the bridge normally. If other creatures attempt to cross, the tendrils attempt to trip and entangle them. They must attempt a Reflex save.Critical Success The target is unaffected.

  Success The target treats the bridge as difficult terrain.

  Failure As success, and the target is knocked Prone.

  Critical Failure As success, and the target is knocked prone and Grabbed until it Escapes or the spell ends.Heightened (+1) The bridge''s Hit Points increase by 10.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: grabbed
    value: 1
  - &id002
    type: condition
    condition_id: prone
    value: 1
  on_crit_failure:
  - *id001
  - *id002
