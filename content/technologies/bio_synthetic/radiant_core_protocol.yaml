id: radiant_core_protocol
name: Radiant Core Protocol
description: 'You activate a bio-luminescent core implant that fills the area with
  brilliant light. Your chest begins to glow with radiance. The spell has the following
  effects on creatures in the area, based on alignment:


  Good Creatures gain a +1 status bonus to attack rolls and Strikes deal an additional
  1d6 spirit damage.

  Neutral Creatures that begin their turn in the emanation must succeed at a Will
  save or be Dazzled for 1 round.

  Evil Creatures that begin their turn in the emanation must succeed at a Willpower save
  or be Blinded for 1 round.


  Heightened (+2) The additional spirit damage increases by 1d6.'
tradition: bio_synthetic
level: 4
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
