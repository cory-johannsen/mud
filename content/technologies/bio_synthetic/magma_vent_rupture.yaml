id: magma_vent_rupture
name: Magma Vent Rupture
description: 'Area 5-foot radius, 80-foot-tall cylinder


  The ground cracks open, spraying a column of superheated bio-synthetic magma high into the air in a vertical cylinder, dealing 14d6 fire damage to creatures in the area. The magma rapidly cools and encases creatures in rock-like slag. A creature encased in slag is Clumsy 1 and takes a -10-foot status penalty to its Speeds. All normal terrain is difficult terrain to a flying creature, and such creatures immediately descend 20 feet the moment they''re encased, but they don''t take damage from this fall. A creature encased in slag can attempt to Escape against your tech DC to end the effect. Otherwise, the creature remains encased until it takes a total of 50 damage, freeing it from the slag. Additionally, creatures in the area and those within 5 feet of the magma column automatically take 1d6 fire damage from the intense heat, regardless of the results of their saving throws.

  @UUID[Compendium.pf2e.spell-effects.Item.tech Effect: Volcanic Eruption]


  Critical Success The creature is unaffected.

  Success The creature takes half damage.

  Failure The creature takes full damage and is encased.

  Critical Failure The creature takes double damage and is encased.


  Upgraded (+1) The damage in the area increases by 2d6, and the damage from the intense heat increases by 1d6.'
