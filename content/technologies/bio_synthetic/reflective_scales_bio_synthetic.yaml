id: reflective_scales_bio_synthetic
name: Energy Absorption Scales
description: 'You grow a set of bio-synthetic scales that store energy before releasing
  it in a final burst. When you cast this tech, choose acid, cold, fire, electricity,
  or poison damage. You gain resistance 5 against that type. The scales'' color depends
  on the damage type chosen.

  The scales store energy as they protect you. Track how much damage the scales have
  prevented. As a 2-action activity (concentrate and manipulate traits), you can explode
  your scales in a 20-foot emanation, dealing 1d6 damage of the chosen type per 10
  damage prevented, to a maximum of 10d6 (after preventing 100 damage). Each creature
  in the area attempts a basic Reflex save. The spell then ends.Heightened (+2) The
  resistance increases by 5, and the maximum explosion damage increases by 5d6.'
