id: desiccation_pulse
name: Desiccation Pulse
description: 'You emit a wave of bio-synthetic dehydration that drains moisture from the area. Each creature in the area takes 4d6 fire damage with a basic Grit check. Water in the area evaporates, and plants take double damage.


  Upgraded (+1) The damage increases by 2d6.'
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 4d6
    damage_type: fire
  on_crit_failure:
  - type: damage
    dice: 8d6
    damage_type: fire
