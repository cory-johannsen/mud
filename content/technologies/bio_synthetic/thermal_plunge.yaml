id: thermal_plunge
name: Thermal Plunge
description: Superheated chemical reactions propel you upward before you crash back
  down in a burst of incendiary compounds. You Fly 15 feet straight up, then dive
  to a point within 60 feet, dealing 3d6 fire damage in a 10-foot burst with a basic
  Quickness check.
tradition: bio_synthetic
level: 3
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: '3'
    damage_type: bludgeoning
    dc: 0
  - type: damage
    dice: 3d3
    damage_type: fire
    dc: 0
  on_failure:
  - type: damage
    dice: 3d4
    damage_type: bludgeoning
    dc: 0
  - type: damage
    dice: 3d6
    damage_type: fire
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d4
    damage_type: bludgeoning
    dc: 0
  - type: damage
    dice: 6d6
    damage_type: fire
    dc: 0
