id: apex_mutagenic_transform
name: Apex Mutagenic Transform
description: 'You undergo or inflict an apex mutagenic transformation, reshaping biology at the fundamental level. If cast on yourself, you gain the benefits of a powerful apex form of your choice for 1 hour: flight speed 60 feet, size Huge, +6 status bonus to Strength, and natural attacks dealing 4d8+10 damage. If cast on a willing or restrained target, you choose the transformation.'
tradition: bio_synthetic
level: 9
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: condition
    condition_id: immobilized
    value: 1
