id: bio_limb_multiplier
name: Bio-Limb Multiplier
description: 'You temporarily transform one of your limbs into water, taking the form of ice, liquid water, or steam as you desire. Make a melee tech attack roll. On a hit, the target takes 2d6 damage; the type of damage dealt and any additional effect depends on the form you choose. On a critical hit, double the damage.Ice The limb deals cold damage, and the target takes a –10-foot status penalty to its Speeds until the start of your next turn. This spell gains the cold trait.

  Threefold Limb (Ice)Liquid Water The limb deals bludgeoning damage and you can Reposition the target up to 10 feet.Steam The limb deals fire damage and steam clings to the target, making all creatures Concealed to them until the start of your next turn or they perform an Interact action to wave the steam away. This spell gains the fire trait.Upgraded (+1) The damage increases by 2d6.'
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: attack
