id: instant_armor_bio_synthetic
name: Instant Armor
description: |-
    Upon casting this spell, the armor you're wearing is whisked away into an extradimensional space that's linked to you. If the armor is magical and invested by you, it remains invested while in this space, though you don't gain its benefits. You then gain the @UUID[Compendium.pf2e.actionspf2e.Item.Armor Up!] action; once you use the action, the spell ends. If the action hasn't been used by the time the spell's duration ends, the extradimensional space collapses, ejecting the armor's pieces on the ground under you.
    @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Instant Armor]
tradition: bio_synthetic
level: 2
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
