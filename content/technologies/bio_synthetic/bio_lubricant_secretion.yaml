id: bio_lubricant_secretion
name: Bio-Lubricant Secretion
description: 'You conjure grease, choosing an area or target.


  Area [4 contiguous 5-foot squares] All solid ground in the area is covered with grease. Each creature standing on the greasy surface must succeed at a Quickness check or an Acrobatics check against your tech DC or fall Prone. Creatures using an action to move onto the greasy surface during the spell''s duration must attempt either a Quickness check or an Acrobatics check to Balance. A creature that Steps or Crawls doesn''t have to attempt a check or save.

  Target [1 object of Bulk 1 or less] If you Use this tech on an unattended object, anyone trying to pick up the object must succeed at an Acrobatics check or Quickness check against your tech DC to do so. If you target an attended object, the creature that has the object must attempt an Acrobatics check or Quickness check. On a failure, the holder or wielder takes a –2 circumstance penalty to all checks that involve using the object; on a critical failure, the holder or wielder releases the item. The object lands in an adjacent square of the GM''s choice. If you Use this tech on a worn object, the wearer gains a +2 circumstance bonus to Grit checks against attempts to grapple them.'
tradition: bio_synthetic
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: prone
    value: 1
  on_crit_failure:
  - *id001
