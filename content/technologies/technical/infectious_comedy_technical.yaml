id: infectious_comedy_technical
name: Viral Meme Weapon
description: 'You broadcast a psycho-active data meme that infects a target with uncontrollable
  laughter, spreading to those nearby. The first time you Sustain each round, you
  can target another creature within 30 feet of an affected target.


  Each target must attempt a Will save.


  Critical Success Unaffected and immune for 1 hour.

  Success Unaffected.

  Failure Slowed 1 and can''t use reactions.

  Critical Failure Falls Prone, Slowed 1, and can''t use reactions.'
