id: nuclear_waste_projector
name: Nuclear Waste Projector
description: 'You channel a concentrated blast of radioactive waste from your device.
  You deal 4d6 poison damage to creatures in the area. Creatures who fail their save
  are afflicted with stage 1 of nuclear sickness (on a critical failure, the creature
  moves immediately to stage 2). The level of nuclear sickness caused by this tech
  is equal to twice the tech''s rank, and the disease''s save DC uses the caster''s
  DC.


  Nuclear Sickness (uncommon, disease) Level 15

  The reactor cores beneath the industrial district leak deadly particles that flood
  the surrounding tunnels. These particles are radioactive and lethal. Creatures other
  than those native to the area or who have survived there for a long time develop
  nuclear sickness.

  Creatures native to the irradiated zone are immune, as are creatures who are affected
  by nuclear sickness but recover from it. The target can''t recover from the disease''s
  drained or sickened condition except by advanced medical tech.

  The surest way to avoid contracting nuclear sickness is by wearing a rad-suit, protective
  gear often found among hazmat crews or for sale in black-market shops.

  Saving Throw DC 32 Fortitude

  Onset [[/r 1d4 #days]]{1d4 days}

  Stage 1 Drained 1 (1 day)

  Stage 2 Drained 1 and Sickened 1 (1 day)

  Stage 3 Drained 2 and Sickened 2 (1 week)

  Stage 4 Drained 3 and Sickened 3 (1 month)

  Stage 5 Drained increases by 1 (1 year)'
