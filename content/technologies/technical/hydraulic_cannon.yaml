id: hydraulic_cannon
name: Hydraulic Cannon
description: 'You fire a pressurized water cannon in a wide arc. Each creature in a 30-foot cone must attempt a Grit check.


  Critical Success The creature is unaffected.

  Success The creature is pushed 5 feet.

  Failure The creature is pushed 10 feet and falls Prone.

  Critical Failure The creature is pushed 20 feet and falls Prone.'
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 3d3
    damage_type: bludgeoning
    dc: 0
  on_failure:
  - type: damage
    dice: 3d6
    damage_type: bludgeoning
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d6
    damage_type: bludgeoning
    dc: 0
