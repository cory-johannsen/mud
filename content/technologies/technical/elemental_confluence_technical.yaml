id: elemental_confluence_technical
name: Multi-Element Reactor
description: 'You activate a multi-element reactor that combines volatile energy types
  into a chaotic storm. The confluence has AC 28 and 120 Hit Points, weakness 10 to
  area effects, and immunity to bleed and poison. Creatures can move through the confluence;
  creatures within are concealed, and all creatures outside are concealed to those
  within. When you Cast or Sustain this Spell, you choose up to two elements to activate.


  Air (air, electricity) The reactor releases an electrical bolt, dealing @Damage[4d4[electricity]]
  damage to creatures within 20 feet, with a basic Reflex save. This doesn''t affect
  creatures completely inside.

  Earth (earth) The confluence gains a +2 circumstance bonus to AC and resistance
  10 to all physical damage (except adamantine) for 1 round.

  Fire (fire) Thermal reactions roar through the confluence, dealing @Damage[1d6[persistent,fire]]
  damage to those partially or entirely inside.

  Metal (metal) The reactor flings shrapnel, dealing @Damage[2d6[slashing]] damage
  to those partially or entirely inside with a basic Reflex save. A creature that
  critically fails also takes @Damage[1d6[persistent,bleed]] damage.

  Water (attack, water) The reactor expels a high-pressure jet. Attempt a ranged spell
  attack against a target within 60 feet. This attack ignores concealment granted
  by the confluence, and gets a +2 circumstance bonus against targets inside. The
  water deals @Damage[4d6[bludgeoning]] damage on a hit (doubled on a critical hit).
  This doesn''t count toward your multiple attack penalty.

  Wood (wood) Structural supports grow, making ground in the area difficult terrain.'
tradition: technical
level: 6
usage_type: prepared
action_cost: 3
range: zone
targets: zone
