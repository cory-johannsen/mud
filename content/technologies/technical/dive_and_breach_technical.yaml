id: dive_and_breach_technical
name: Dive and Breach
description: |-
    You make the briefest of dives through the Plane of Water. You @UUID[Compendium.pf2e.actionspf2e.Item.Leap] 10 feet, and where you would land on the ground, you instead disappear in a splash of water, your body entering the surface like a diver entering a pool. You then exit from an unoccupied surface within 40 feet, appearing in another splash of water as you Leap out, landing 10 feet away from where you exited. Each splash deals 3d10 bludgeoning damage to all creatures in a @Template[emanation|distance:5]; creatures in multiple splash zones take damage only once.

    Heightened (+1) The damage dealt by each splash increases by 1d10.
tradition: technical
level: 3
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 3d6
          damage_type: bludgeoning
          dc: 0
    on_failure:
        - type: damage
          dice: 3d10
          damage_type: bludgeoning
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 6d10
          damage_type: bludgeoning
          dc: 0
