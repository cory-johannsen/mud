id: flashbang_zone
name: Flashbang Zone
description: 'You deploy flash emitters that fill the area with blinding light. Each creature in the area must attempt a Grit check.


  Critical Success The creature is unaffected.

  Success The creature is Dazzled for 1 round.

  Failure The creature is Dazzled for 1 minute.

  Critical Failure The creature is Blinded for 1 round, then Dazzled for 1 minute.'
tradition: technical
level: 2
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: dazzled
    value: 1
  - &id002
    type: condition
    condition_id: blinded
    value: 1
  on_crit_failure:
  - *id001
  - *id002
