id: clownish_curse_technical
name: Malfunction Protocol
description: 'You deploy a device that corrupts the target''s motor control systems,
  causing absurd error tones during movement and making hands and feet malfunction
  with exaggerated, uncoordinated motions.


  Critical Success The target is unaffected.

  Success For 1 round, the target must roll twice and use worse result on Acrobatics,
  Stealth, or Thievery checks. Failures become critical failures.

  Failure As success, but 1 hour.

  Critical Failure As success, but permanent.'
tradition: technical
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You afflict the target with a curse that causes it to emit ridiculous
      noises as it moves. Furthermore, the target's hands and feet become awkward
      and uncoordinated, as though it were wearing oversized
