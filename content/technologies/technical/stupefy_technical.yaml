id: stupefy_technical
name: Neural Jammer
description: 'You deploy a cognitive disruption field on the target. The target must
  attempt a Will save.


  Critical Success The target is unaffected.

  Success The target is @UUID[Compendium.pf2e.conditionitems.Item.Stupefied] 1 for
  1 round.

  Failure The target is @UUID[Compendium.pf2e.conditionitems.Item.Stupefied] 2 for
  1 minute.

  Critical Failure The target is @UUID[Compendium.pf2e.conditionitems.Item.Stupefied]
  3 for 1 minute.'
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'You dull the target''s mind, depending on its Will save.


      Critical Success The target is unaffected.

      Success The target is Stupefied 1 until the start of your next turn.

      Failure The target is Stupefied'
