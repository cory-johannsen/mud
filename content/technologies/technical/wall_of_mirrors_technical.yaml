id: wall_of_mirrors_technical
name: Reflective Barrier Array
description: You deploy a solid wall of shimmering reflective hardlight up to 50 feet
  long and 20 feet high. Each 10-foot-by-10-foot section has AC 10, Hardness 10, 40
  Hit Points. Immune to critical hits and precision damage. Everything is Concealed
  through the wall. Creatures that Strike the wall take 4d4 mental damage (basic Will
  save) from reflected psychic feedback.Heightened (+1) Section HP +10.
