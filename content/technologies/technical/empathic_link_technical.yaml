id: empathic_link_technical
name: Biometric Link
description: You establish a biometric monitoring link between yourself and the target.
  For the duration, each time the target takes damage, you can feel it (though you
  take no damage). You gain a +2 status bonus to Perception checks to Sense Motive
  against the target. You can Dismiss the spell.
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'You forge a bond between yourself and the target, enabling you to
      feel each other''s emotions. You and the target can communicate empathetically,
      sharing emotions, at a distance of up to 1 mile.


      Heigh'
