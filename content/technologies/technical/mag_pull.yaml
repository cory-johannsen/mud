id: mag_pull
name: Mag-Pull
description: You generate an electromagnetic field that attracts metallic objects.
  You pull an unattended metal object of up to 1 Bulk toward you from within 60 feet.
  If targeting a creature wearing metal armor, it must attempt a Toughness save or
  be pulled 10 feet toward you.
