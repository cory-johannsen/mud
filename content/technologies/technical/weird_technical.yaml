id: weird_technical
name: Mass Nightmare Uplink
description: 'You broadcast individualized nightmare signals to all targets in a 30-foot
  burst within 120 feet. Each target must attempt a Will save. On a failure: 16d6
  mental damage, frightened 4. On a critical failure: double damage, paralyzed. On
  a success: half damage.'
tradition: technical
level: 9
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 16d3
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 16d6
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 32d6
    damage_type: mental
    dc: 0
