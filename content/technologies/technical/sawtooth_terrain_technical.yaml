id: sawtooth_terrain_technical
name: Razor Wire Grid
description: 'You deploy razor wire and serrated barriers throughout the area, slashing
  at and obstructing creatures. The area is difficult terrain. Each creature in the
  area at activation and who end their turn there take 3d6 slashing damage and bleed
  damage, with a basic Reflex save.


  Heightened (+2) The slashing damage increases by 1d6.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 3d3
    damage_type: slashing
    dc: 0
  on_failure:
  - type: damage
    dice: 3d6
    damage_type: slashing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d6
    damage_type: slashing
    dc: 0
