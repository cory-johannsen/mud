id: peaceful_bubble_technical
name: Peaceful Bubble
description: |-
    An opaque shell of drifting, iridescent runes covers the area, creating a bubble. You can choose to make the burst smaller, in 10-foot increments. The runes don't block travel, but those inside the bubble can't perceive those outside it and vice versa. Detection and scrying effects are likewise blocked.
    Creatures sleeping within the bubble are immune to dreams sent by spells. Those sleeping 8 hours reduce their @UUID[Compendium.pf2e.conditionitems.Item.Doomed] condition by 2 instead of 1.
tradition: technical
level: 4
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
resolution: none
