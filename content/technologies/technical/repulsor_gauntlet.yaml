id: repulsor_gauntlet
name: Repulsor Gauntlet
description: 'Your gauntlet projects a repulsion field that launches the target away.
  Make a melee spell attack at mythic proficiency. The target must attempt a Fortitude
  save.


  Critical Success The target is unaffected.

  Success The target is pushed 10 feet.

  Failure The target is pushed 20 feet.

  Critical Failure The target is pushed 40 feet.'
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: attack
effects:
  on_hit:
  - type: damage
    dice: 1d6
    damage_type: bludgeoning
    dc: 0
  on_crit_hit:
  - type: damage
    dice: 2d6
    damage_type: bludgeoning
    dc: 0
