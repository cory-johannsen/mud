id: vision_of_death_technical
name: Mortality Simulator
description: 'You deploy a device that forces the target to experience a hyper-realistic
  simulation of its own death. It takes 8d6 mental damage with a Willpower save. If reduced
  to 0 HP, the simulation becomes lethal.Critical Success Unaffected.

  Success Half damage, Frightened 1.

  Failure Full damage, Frightened 2.

  Critical Failure Double damage, Frightened 4, Fleeing while frightened.Heightened
  (+1) Damage +2d6.'
tradition: technical
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d3
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 8d6
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d6
    damage_type: mental
    dc: 0
