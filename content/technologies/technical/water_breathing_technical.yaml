id: water_breathing_technical
name: Rebreather Module
description: You install temporary rebreather modules on the targets. The targets
  can breathe underwater for the duration. They retain the ability to breathe air.
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'The targets can breathe underwater.


      Heightened (3rd) The duration increases to 8 hours.

      Heightened (4th) The duration increases to until your next daily preparations.'
