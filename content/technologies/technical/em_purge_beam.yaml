id: em_purge_beam
name: EM Purge Beam
description: 'Area 10-foot radius, 60-foot-tall cylinder

  You fire a concentrated energy beam that scours the area with vitality energy. Each
  creature takes 6d8 vitality damage and must attempt a basic Reflex save. Creatures
  that fail also take persistent vitality damage equal to their level.


  Heightened (+1) The damage increases by 1d8.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 6d4
    damage_type: vitality
    dc: 0
  on_failure:
  - type: damage
    dice: 6d8
    damage_type: vitality
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 12d8
    damage_type: vitality
    dc: 0
