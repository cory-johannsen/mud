id: targeting_laser_crown
name: Targeting Laser Crown
description: 'You activate a head-mounted targeting laser array that sheds bright
  light to a range of 60 feet and dim light to a further 60 feet. When you activate
  this tech and when you Sustain it, you can launch a disc of coherent light at a
  creature within 120 feet. Make a ranged tech attack roll. On a hit, you deal 5d4
  fire damage plus 5d4 vitality damage.


  Heightened (+1) The fire damage and vitality damage each increase by 1d4.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 4d8
    damage_type: spirit
    dc: 0
  - type: damage
    dice: 1d4
    damage_type: spirit
    dc: 0
