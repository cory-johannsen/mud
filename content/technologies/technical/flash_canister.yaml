id: flash_canister
name: Flash Canister
description: 'You launch an exploding canister filled with a blinding chemical agent.
  Upon impact, the canister bursts and exposes all creatures in the area to the compound.
  Each creature must attempt a Grit check.

  Critical Success The creature is unaffected.

  Success The creature is Dazzled for 1 round.

  Failure The creature is Blinded for 1 round and Dazzled for 1 minute.

  Critical Failure The creature is Blinded for 1 minute and Dazzled for 10 minutes.


  Upgraded (+2) The initial damage increases by 1d6.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 3d3
    damage_type: poison
    dc: 0
  on_failure:
  - type: damage
    dice: 3d6
    damage_type: poison
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d6
    damage_type: poison
    dc: 0
