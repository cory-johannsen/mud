id: multi_shield_array
name: Multi-Shield Array
description: 'You deploy a multi-layered defensive shield array that appears to be
  in three places at once, blocking incoming fire. You gain a +2 circumstance bonus
  to AC for the duration. When an enemy critically hits you, one layer is destroyed,
  reducing the bonus by 1.


  Upgraded (7th) You start with four layers and a +3 bonus.'
