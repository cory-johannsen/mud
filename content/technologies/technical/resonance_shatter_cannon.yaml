id: resonance_shatter_cannon
name: Resonance Shatter Cannon
description: 'You fire a devastating resonance blast that shatters everything in its path. Creatures in the area take 4d8 sonic damage and 4d8 void damage. Each creature must attempt a Grit check. Unattended objects of Hardness 5 or less in the area are destroyed.Critical Success The creature takes half damage.

  Success The creature takes half damage and is Deafened for 1 round.

  Failure The creature takes full damage and is deafened for 1 minute.

  Critical Failure The creature takes double damage and is permanently deafened.Upgraded (+1) The sonic and void damage each increase by 1d8. The Hardness threshold increases by 1.'
tradition: technical
level: 6
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 4d4
    damage_type: sonic
    dc: 0
  - type: damage
    dice: 4d4
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 4d8
    damage_type: sonic
    dc: 0
  - type: damage
    dice: 4d8
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 8d8
    damage_type: sonic
    dc: 0
  - type: damage
    dice: 8d8
    damage_type: void
    dc: 0
