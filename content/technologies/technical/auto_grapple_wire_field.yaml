id: auto_grapple_wire_field
name: Auto-Grapple Wire Field
description: 'Dense networks of auto-grapple wires deploy from every surface in the area. Any creature moving on the ground, or Climbing or Swimming within the wires, takes a –10-foot circumstance penalty to its Speeds. Once per round, you can Sustain the spell to make a wire lash out from any square within the field. This wire has a 15-foot reach. Make a melee tech attack roll against the target; on a success, the wire pulls the target in and makes it Immobilized for 1 round or until the creature Escapes (against your tech DC), whichever comes first.

  Tangling Creepers'
tradition: technical
level: 6
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: instant
resolution: none
effects:
  on_apply:
  - type: condition
    condition_id: immobilized
    value: 1
