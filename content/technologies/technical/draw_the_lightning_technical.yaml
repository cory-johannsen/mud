id: draw_the_lightning_technical
name: Lightning Channeler
description: 'You deploy a lightning-attraction device that summons a bolt of electricity
  through a foe and into your weapon or body. A bolt descends through the target dealing
  3d12 electricity damage (basic Reflex save). For the remaining duration, your first
  Strike each round deals an additional 1d12 electricity damage.

  The device generates its own discharge source, working even underground. Under stormy
  conditions, increase damage by @Damage[2d12[electricity]].


  Heightened (8th) Initial damage +4d12, additional Strike damage +1d12.'
tradition: technical
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 3d8
    damage_type: electricity
    dc: 0
  on_failure:
  - type: damage
    dice: 3d12
    damage_type: electricity
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d12
    damage_type: electricity
    dc: 0
