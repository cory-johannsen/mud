id: auto_shield
name: Auto-Shield
description: You deploy an automated shield drone that protects you without using
  your hands. The shield floats near you and grants its bonus. You can Raise the shield
  using a free action. If the shield is destroyed, the spell ends.
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'You levitate the touched shield and send it to orbit around a creature.
      When you Use this tech and Sustain it, the shield uses the Raise a Shield action
      to protect the target creature.'
