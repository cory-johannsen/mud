id: dimensional_excision_technical
name: Dimensional Excision
description: You manipulate the boundaries between planes like a scalpel, using it to cut away portions of a creature's essence and banishing those portions to other realities and dimensions, afflicting the target deep lacerations or even severed appendages. The creature takes 14d10 damage (no damage type) and 2d10 persistent bleed damage and must attempt a Will save. If the target is not on its home plane, it takes a –4 status penalty to this save. A creature reduced to 0 HP has their entire body sectioned out and banished across multiple planes and dimensions, leaving nothing behind but their gear.Heightened (10th) The base damage increases by 2d10, and the persistent bleed damage by 1d10.
tradition: technical
level: 9
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 14d6
          damage_type: untyped
          dc: 0
        - type: damage
          dice: 2d6
          damage_type: bleed
          dc: 0
    on_failure:
        - type: damage
          dice: 14d10
          damage_type: untyped
          dc: 0
        - type: damage
          dice: 2d10
          damage_type: bleed
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 28d10
          damage_type: untyped
          dc: 0
        - type: damage
          dice: 4d10
          damage_type: bleed
          dc: 0
