id: sticky_fire_technical
name: Sticky Fire
description: You send a bubble of viscous liquid that sparks into flame. Make a spell attack roll against the target's AC, dealing 1d8 fire damage and 1d8 persistent fire damage on a hit. The target is Enfeebled 1 until they recover from their persistent fire damage.Heightened (+2) The initial and persistent fire damage increase by 1d8.
