id: sure_strike_technical
name: Target Lock
description: You establish a firm targeting solution, granting advantage on your next attack roll.
tradition: technical
level: 1
usage_type: prepared
action_cost: 1
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
