id: system_fork
name: System Fork
description: You create a perfect technical duplicate of yourself. The duplicate occupies
  your space and shares your actions, reactions, and resources. Each turn you can
  act as normal or have the duplicate act instead.
tradition: technical
level: 9
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You exist in two places at once. When you Use this tech, another
      copy of yourself appears in an adjacent square. During bilocation's duration,
      whenever you act, you can choose which of your selves do
