id: pneumatic_mass_lifter
name: Pneumatic Mass Lifter
description: 'A massive burst of compressed air lifts you and everything around you
  to a nearby destination. You, each creature in the area, and each item of 10 Bulk
  or lighter are carried. You and all affected creatures and objects Fly up to 60
  feet and land on a solid surface. If there''s not enough room, the device fails.

  Unwilling participants can attempt a Quickness check. Secured items aren''t affected.


  Upgraded (6th) Fly distance increases to 120 feet, Bulk limit increases to 20.'
