description: You deploy a device that generates a freezing storm cloud, pelting creatures with cryo-projectiles. When activated, a burst deals 2d8 bludgeoning and 2d8 cold damage (basic Quickness check). Frozen precipitation continues as difficult terrain. Creatures ending turns in the storm take (floor(/2))[cold] damage. Outdoors, deploy two nonoverlapping clouds.Upgraded (+2) Initial damage +1d8 each, end-of-turn cold +1.
