id: cryo_dispersal
name: Cryo Dispersal
description: 'A sudden downpour of cryogenic coolant drenches the area. The pooling
  liquid makes the area difficult terrain and extinguishes non-magical fires.

  On subsequent rounds when you Sustain, you can shift to freezing mode, coating surfaces
  in ice. Creatures in the area must attempt a Reflex save or fall Prone.


  Heightened (+2) The area increases by 10 feet in each dimension.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 4d3
    damage_type: cold
    dc: 0
  on_failure:
  - type: damage
    dice: 4d6
    damage_type: cold
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 8d6
    damage_type: cold
    dc: 0
