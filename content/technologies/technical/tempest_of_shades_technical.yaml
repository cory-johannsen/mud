  space of a Huge creature and has a Speed of 60 feet.

  Arrive (negative) Vortex of Erasure Each enemy creature within a 60-foot emanation
  must attempt a Fortitude save with the following effects.Critical Success The creature
  is unaffected

  Success The creature is Drained 1.

  Failure The creature is Drained 2.

  Critical Failure The creature is Drained 3.Depart (emotion, fear, mental) Scream
  of the Deleted The digital phantoms let out an anguished scream. All your enemies
  within a 100-foot emanation must attempt @Check[will|name:Tempest of Shades Depart|traits:necromancy,emotion,fear,mental]
  saves with the following effects.Critical Success The creature is unaffected.

  Success The creature is Frightened 1.

  Failure The creature is Frightened 3.

  Critical Failure The creature is frightened 3. It''s also @UUID[Compendium.pf2e.conditionitems.Item.Fleeing]
  for 1 round or until it''s no longer frightened, whichever comes first.'
