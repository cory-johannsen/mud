id: cryo_barrier
name: Cryo Barrier
description: 'You construct a barrier of flash-frozen cryogenic compound. You create
  either a 1-foot-thick wall in a straight line up to 60 feet long and 10 feet high,
  or a 1-foot-thick, 10-foot-radius hemisphere. Each 10-foot section has AC 10, Hardness
  10, and 40 Hit Points.


  When a section is destroyed, it releases a cryogenic blast dealing 3d6 cold damage
  within 10 feet (basic Reflex).


  Upgraded (+2) HP per section increases by 10, cold damage increases by 1d6.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 2d6
    damage_type: cold
    dc: 0
