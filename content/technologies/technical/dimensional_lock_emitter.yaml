id: dimensional_lock_emitter
name: Dimensional Lock Emitter
description: You create a visible energy barrier that attempts to counteract teleportation
  effects and planar travel into or out of the area, including items that allow access
  to extradimensional spaces. The dimensional lock tries to counteract any attempt
  to summon a creature into the area but doesn't stop the creature from departing
  when the summoning ends.
