id: shared_vr_conference
name: Shared VR Conference
description: When you activate this tech, any targets-including you-can choose to
  immediately fall asleep via neural jack. The tech ends for any creatures that don't
  choose to fall asleep. Sleepers join a shared virtual reality conference room, where
  they can communicate with one another as though they were in the same room. Individual
  targets leave this shared VR upon awakening, and if all the targets awaken, the
  tech ends.
tradition: technical
level: 8
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
