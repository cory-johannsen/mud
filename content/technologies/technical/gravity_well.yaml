id: gravity_well
name: Gravity Well
description: 'You deploy a localized gravity distortion that pulls the target toward you. The target must attempt a Grit check.


  Critical Success The creature is unaffected.

  Success The creature is pulled 5 feet toward you.

  Failure The creature is pulled 10 feet toward you.

  Critical Failure The creature is pulled 15 feet toward you and falls Prone.'
tradition: technical
level: 2
usage_type: prepared
action_cost: 0
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: condition
    condition_id: prone
    value: 1
