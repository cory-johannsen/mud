id: gravity_modulation_device
name: Gravity Modulation Device
description: 'You deploy a device that adjusts your personal gravity field between low, normal, and high gravity. Choose one type when activated. Can change type with a single action (concentrate trait). Effect is invisible.

  Low Gravity: Double jump distance, reduced fall damage.

  High Gravity: Encumbered, +2 status bonus to resist forced movement and prone, reduced jump distance, increased fall damage.Heightened (6th) Duration 1 hour.'
tradition: technical
level: 4
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: condition
    condition_id: prone
    value: 1
