id: ash_cloud_technical
name: Smoke Screen
description: 'You deploy a canister that fills the area with dense smoke. The cloud
  is difficult terrain and creatures in it are @UUID[Compendium.pf2e.conditionitems.Item.Concealed].
  A creature that breathes in the smoke must attempt a Fortitude save.


  Critical Success The creature is unaffected.

  Success The creature is @UUID[Compendium.pf2e.conditionitems.Item.Sickened] 1.

  Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Sickened] 2.

  Critical Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Sickened]
  3.'
tradition: technical
level: 2
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: '2'
    damage_type: fire
    dc: 0
  on_failure:
  - type: damage
    dice: 2d4
    damage_type: fire
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d4
    damage_type: fire
    dc: 0
