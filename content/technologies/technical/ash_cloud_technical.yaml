id: ash_cloud_technical
name: Ash Cloud
description: |-
    You summon a tumultuous cloud of ash and smoke. The cloud is difficult terrain for flying creatures, and creatures in the cloud can't detect anything using their sense of smell. Creatures that start their turn within the cloud take 2d4 fire damage as their lungs fill with the hot, acrid smoke, with a Fortitude save.

    Critical Success The target is unaffected.
    Success The target takes half damage.
    Failure The target takes full damage and is @UUID[Compendium.pf2e.conditionitems.Item.Dazzled] for 1 round.
    Critical Failure The target takes double damage and is @UUID[Compendium.pf2e.conditionitems.Item.Blinded] for 1 round.

    Heightened (+1) The damage increases by 1d4.
tradition: technical
level: 2
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: "2"
          damage_type: fire
          dc: 0
    on_failure:
        - type: damage
          dice: 2d4
          damage_type: fire
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 4d4
          damage_type: fire
          dc: 0
