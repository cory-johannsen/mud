id: mimic_spell_technical
name: Tech Reverse-Engineer
description: 'Trigger A creature you''re aware of within range activates a tech of
  the same tradition and of the same or lower rank.You reverse-engineer the schematics
  of a tech device just by scanning it in operation. Attempt to counteract the tech
  activated by the triggering creature. If the tech would be counteracted, you instead
  gain the ability to activate that tech without expending a slot.

  On your next turn, you spend the same number of actions to activate the tech as
  the triggering creature, but you choose the targets (if any) and use your tech attack
  modifier or tech DC as appropriate. The tech is heightened to the same rank as this
  tech. The reverse-engineered tech is of the same tradition as the tech you normally
  use.

  If you don''t activate the reverse-engineered tech by the end of your next turn,
  it is lost, unless you Sustain the knowledge of it. You can Sustain this knowledge
  for up to 1 minute, after which it is lost.'
tradition: technical
level: 8
usage_type: prepared
action_cost: 0
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: Trigger A creature you're aware of within range Casts a tech of
      the same tradition as mimic spell and of the same or lower rank.You learn the
      secrets of a spell just by watching someone else cast it.
