id: ravenous_darkness_technical
name: Void Field Projector
description: You project a zone of sensor-defeating darkness that also harms those
  inside it. This globe of pure darkness is identical to that created by a 4th-rank
  @UUID[Compendium.pf2e.spells-srd.Item.Darkness] spell. Mechanical constructs resembling
  gnashing actuators manifest within the void. Make a tech attack roll against the
  Fortitude DC of each creature in the area. Any creature that fails takes 4d6 bludgeoning
  damage as the constructs latch on. While the constructs are attached, it takes a
  –10-foot circumstance penalty to its Speeds and can't Step. Whenever a creature
  ends its turn in the area, the constructs attempt to attach if they haven't already,
  and they deal 1d6 bludgeoning damage to any creature they're already attached to.
  The constructs detach from any creature that leaves the area but can't otherwise
  be detached while the creature remains. You can Dismiss the spell.
tradition: technical
level: 6
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
resolution: attack
effects:
  on_hit:
  - type: damage
    dice: 4d6
    damage_type: bludgeoning
    dc: 0
  on_crit_hit:
  - type: damage
    dice: 8d6
    damage_type: bludgeoning
    dc: 0
