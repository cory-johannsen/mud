id: feast_of_ashes_technical
name: Feast of Ashes
description: |-
    You curse the target with a hunger no food can sate. You can Dismiss the spell. The target must attempt a Fortitude save.Critical Success The creature is unaffected and is temporarily immune for 1 hour.
    Success The creature is @UUID[Compendium.pf2e.conditionitems.Item.Fatigued] for 1 round.
    Failure The creature is immediately afflicted by hunger as if it hadn't eaten food in days. It becomes fatigued and takes 1d4 damage each day that can't be healed until it sates its hunger. No amount of eating can sate the creature's hunger during the spell's duration.
    Critical Failure As failure, but the creature takes 2d4 damage each day from unbearable hunger.Heightened (+1) The hunger becomes more intolerable, increasing the damage each day by 1d4, or by 2d4 on a critical failure.
tradition: technical
level: 2
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: "1"
          damage_type: untyped
          dc: 0
    on_failure:
        - type: damage
          dice: 1d4
          damage_type: untyped
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 2d4
          damage_type: untyped
          dc: 0
