id: gale_blast_technical
name: Gale Blast
description: |-
    Wind flows from your outstretched hands and whirls around you in a 5-foot emanation. Each creature in the area takes 1d6 bludgeoning damage, with a Fortitude save.Critical Success The creature is unaffected.
    Success The creature takes half damage.
    Failure The creature takes full damage and is pushed 5 feet away from you.
    Critical Failure The creature takes double damage and is pushed 10 feet away from you.Heightened (+1) The damage increases by 1d6.
tradition: technical
level: 1
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 1d3
          damage_type: bludgeoning
          dc: 0
    on_failure:
        - type: damage
          dice: 1d6
          damage_type: bludgeoning
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 2d6
          damage_type: bludgeoning
          dc: 0
