id: daemon_form_technical
name: Daemon Form
description: |-
    You infuse yourself with the corrupting death and pure malevolence of Abaddon, transforming into a Large daemon battle form. You must have enough space to expand into or the spell is lost. When you cast this spell you choose either lacridaemon, leukodaemon, meladaemon, or venedaemon. The battle form is Medium if you choose lacridaemon or venedaemon. While in this form, you gain the daemon and fiend traits. You have hands in this battle form and can use manipulate actions. You can Dismiss the spell.
    You gain the following statistics and abilities regardless of the form that you choose:AC = 21 + your level. Ignore your armor check's penalty and Speed reduction.15 temporary Hit Points and weakness 5 to holy.A +2 status bonus to all saving throws against death effects.Resistance 10 to poison.Darkvision.One or more attacks specific to the battle form you use. You're trained with them. Your attack modifier is +21, and you use the listed damage. These attacks are Strength based (for the purpose of the enfeebled condition, for example). If your unarmed attack modifier is higher, you can use it instead.Athletics modifier of +23, unless your own modifier is higher.You also gain specific abilities based on the type of Daemon you choose:Lacridaemon Speed 25 feet, fly 40 feet resistance 10 to coldSize MediumMelee 1 jaws (magical, unholy), Damage 1d8+12 piercing plus 1d6 cold and 1d4 poisonMelee 1 claw (agile, magical, unholy), Damage 1d6+12 slashing plus 1d6 cold.Leukodaemon Speed 25 feet, fly 40 feet +2 status bonus to saves against diseasesSize LargeMelee 1 jaws (magical, reach 10 feet, unholy), Damage 2d10+12 piercingMelee 1 claw (agile, magical, reach 10 feet, unholy), Damage 2d6+12 slashing;Ranged 1 composite longbow (deadly 1d10, magical, propulsive, range increment 100 feet, unholy, volley), Damage 2d8+12 piercing.Meladaemon Speed 25 feet, fly 40 feetSize LargeMelee 1 jaws (magical, reach 10 feet, unholy), Damage 2d10+12 piercingMelee 1 claw (agile, magical, reach 10 feet, unholy, void), Damage 1d6+12 slashing plus 1d6 void, and you can spend an action after a hit to attempt to Grab the target.Venedaemon Speed 25 feet sense magical items and active spells within 60 feet as an imprecise senseSize MediumMelee 1 tentacle (agile, magical, reach 10 feet, unholy), Damage 2d6+12 bludgeoning.@UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Daemon Form]
