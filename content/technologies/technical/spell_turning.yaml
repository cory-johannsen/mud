id: spell_turning
name: Reflection Matrix
description: This countermeasure reflects tech effects directed at you back at their
  source. When a tech targets you, you can spend a reaction to attempt to reflect
  it. This uses the rules for counteracting the tech, but if it is successfully counteracted,
  the effect is turned back on the caster. Whether or not the counteract attempt is
  successful, the reflection matrix then ends. Reflection matrix can't affect tech
  that isn't targeted (such as area effects). If reflection matrix reflects a tech
  back at a caster who also has a reflection matrix active, their matrix can attempt
  to reflect the tech back at you again; if they do so, their counteract attempt automatically
  succeeds.
tradition: technical
level: 7
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
