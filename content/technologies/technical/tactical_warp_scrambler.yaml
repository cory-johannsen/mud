id: tactical_warp_scrambler
name: Tactical Warp Scrambler
description: The operation would play out exactly as you envisioned it, if only the
  operatives would respect the formation plan. You instantly transport the targeted
  creatures and any items they're wearing and holding from their current space to
  an unoccupied space within range. You don't need to be able to see the destinations
  as long as you've been there in the past and know its relative location and distance
  from each target. Creatures affected by tactical warp scrambler are then temporarily
  immune to this tech for 1 minute.
tradition: technical
level: 8
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
