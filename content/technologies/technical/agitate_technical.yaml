id: agitate_technical
name: Motor Override
description: You seize the target's neural-motor systems, forcing hyperactive movement. The target must execute a movement
  action each turn or take 2d8 mental damage as the override burns through their voluntary motor control.
tradition: technical
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d4
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 2d8
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d8
    damage_type: mental
    dc: 0
