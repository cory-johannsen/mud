id: grasp_of_the_deep_technical
name: Pressure Crush Device
description: 'You deploy a device that subjects a target to immense crushing force,
  disorienting and compressing its joints and lungs. Target takes 6d6 bludgeoning
  damage depending on its Will save.


  Critical Success Unaffected.

  Success Half damage.

  Failure Full damage and Grabbed; can Escape against your spell DC.

  Critical Failure Double damage and Grabbed.


  Heightened (6th) Up to 5 targets.'
tradition: technical
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 6d3
    damage_type: bludgeoning
    dc: 0
  on_failure:
  - type: damage
    dice: 6d6
    damage_type: bludgeoning
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 12d6
    damage_type: bludgeoning
    dc: 0
