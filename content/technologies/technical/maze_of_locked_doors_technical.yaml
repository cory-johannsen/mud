id: maze_of_locked_doors_technical
name: Recursive Security Maze
description: 'The target is pulled into a recursive virtual security system—a long,
  twisting, extradimensional hallway blocked at 30-foot intervals with high-grade
  reinforced doors (Hardness 20, HP 80, BT 40, @Check[athletics|dc:30|name:Force Open
  Security Door|traits:action:force-open] to Force Open) secured with @UUID[Compendium.pf2e.equipment-srd.Item.Lock
  (Average)] (@Check[thievery|dc:25|name:Hack Security Lock|traits:action:pick-a-lock],
  4 successful checks required). A creature trapped within this system can escape
  only when the tech expires, or when they successfully pass through the number of
  doors determined by their save, either by breaking through the doors or hacking
  the locks. Teleportation effects of 6th level or lower are automatically suppressed
  within the virtual space; higher-level effects require a counteract check against
  your tech DC or they fail.


  Critical Success The target is unaffected.

  Success The target is trapped for 1 round, or until it bypasses 1 door.

  Failure The target is trapped for 1 minute, or until it bypasses 2 doors.

  Critical Failure The target is trapped for 10 minutes, or until it bypasses 3 doors.'
tradition: technical
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
