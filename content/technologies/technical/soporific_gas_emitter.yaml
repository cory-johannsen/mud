id: soporific_gas_emitter
name: Soporific Gas Emitter
description: 'A faint chemical haze and subsonic sedation waves fill the area, urging creatures to shut down and submit. Creatures in the area when you activate the tech must attempt a Willpower save. Creatures who end their turn in the area must also attempt the save. You can Dismiss the effect.Critical Success The creature is unaffected.

  Success The creature lies down, becoming Prone. If they were already prone, they instead drift off, becoming Unconscious.

  Failure As success, except that the creature is so sedated lying down that they cannot attempt to Stand or otherwise maneuver themself off of the ground on their next turn, though they can Crawl (potentially to escape the area).

  Critical Failure The creature immediately lies down and drifts off, becoming prone and unconscious. Any creature in the area who is already unconscious when you activate the tech (or whose turn ends in the area while they are unconscious) takes 6d4 spirit damage as their life force is siphoned away. This damage does not automatically wake them.Upgraded (+1) The spirit damage increases by 2d4.'
tradition: technical
level: 7
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: '6'
    damage_type: spirit
    dc: 0
  on_failure:
  - type: damage
    dice: 6d4
    damage_type: spirit
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 12d4
    damage_type: spirit
    dc: 0
