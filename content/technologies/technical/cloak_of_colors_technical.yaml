id: cloak_of_colors_technical
name: Holographic Shroud
description: 'A shroud of shifting holographic light envelops the target. Creatures
  are Dazzled while adjacent to it, and attacking the target causes a brilliant flash.
  A creature that hits the target with a melee attack must attempt a Will save.


  Success The creature is unaffected.

  Failure The creature is Blinded for 1 round.

  Critical Failure The creature is Stunned for 1 round and Blinded for 1 minute.'
