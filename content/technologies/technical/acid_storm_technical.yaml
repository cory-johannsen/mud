id: acid_storm_technical
name: Acid Storm
description: |-
    You evoke a storm of acid rain that pelts the area for the spell's duration. A creature that begins its turn in the area takes 3d8 acid damage (basic Reflex save).

    Heightened (+2) The damage increases by 1d8.
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 3d4
          damage_type: acid
          dc: 0
    on_failure:
        - type: damage
          dice: 3d8
          damage_type: acid
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 6d8
          damage_type: acid
          dc: 0
