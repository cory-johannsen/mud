id: fabricated_metal_wall
name: Fabricated Metal Wall
description: 'You rapid-fabricate a sheet of metal, forming a wall of iron, low-grade
  cold iron, or standard-grade silver up to 60 feet long, 30 feet high, and 1/4 inch
  thick. The wall doesn''t need to stand vertically but must form a straight line
  in an unbroken open space. Each 10-foot-by-10-foot section has AC 10 and is immune
  to critical hits and precision damage. The wall''s Hardness, HP, and BT use the
  statistics of a structure of the material you chose. Creatures can move through
  a broken section.


  Heightened (7th) The wall is high-grade silver or standard-grade dawnsilver.

  Heightened (8th) The wall is standard-grade cold iron.

  Heightened (9th) The wall is high-grade dawnsilver.

  Heightened (10th) The wall is high-grade cold iron or standard-grade adamantine.'
tradition: technical
level: 6
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: minutes:1
resolution: none
