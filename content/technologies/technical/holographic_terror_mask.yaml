id: holographic_terror_mask
name: Holographic Terror Mask
description: 'The target projects a holographic overlay that appears as a gruesome and terrifying entity to each observer. One person might see a rogue combat mech, while another might see a glitching horror from a VR nightmare.

  When any creature attempts a hostile action against the target, the creature must attempt a Willpower save. It is then temporarily immune until the end of its next turn.

  Success The creature is unaffected.

  Failure The creature becomes Frightened 2 before using its action.

  Critical Failure The creature becomes Frightened 2, and its action fails and is wasted.


  Upgraded (8th) You can target up to 5 creatures. If a creature uses a hostile action or reaction that affects multiple targets simultaneously, it needs to attempt only one save against the holographic terror.'
tradition: technical
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: frightened
    value: 2
  on_crit_failure:
  - *id001
