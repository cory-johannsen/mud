id: containment_sphere
name: Containment Sphere
description: 'A force sphere 10 feet in diameter materializes in an unoccupied space.
  When you activate this device and each time you Sustain it, you can roll the sphere
  up to 10 feet.

  The sphere can engulf Large or smaller creatures. Any creature in its path can attempt
  a Reflex save.


  Success The creature avoids the sphere.

  Failure The creature is trapped inside. It moves with the sphere and must hold its
  breath.

  Critical Failure As failure, but the creature can''t easily break free.'
