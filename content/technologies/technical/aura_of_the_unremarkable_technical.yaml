id: aura_of_the_unremarkable_technical
name: Stealth Field Generator
description: 'You activate a device that generates a perception-dampening field, making
  you and allies in the area appear completely innocuous to other creatures within
  the area, regardless of the actions you''re committing. Non-allied creatures in
  the emanation must attempt a Willpower save.


  Critical Success The creature sees your actions as they really are and announces
  them as such. All other creatures in the area gain a +1 circumstance bonus to their
  Will saves to recognize your actions as they really are.

  Success The creature sees your actions as they really are.

  Failure The creature believes your actions are normal and unworthy of concern.

  Critical Failure The creature believes you are performing other actions entirely,
  as determined by the GM. The creature doesn''t have a chance of remembering events
  normally.

  Any hostile actions by you or your allies against a creature or its allies break
  the effect of the spell for that creature. When the spell ends (or when affected
  allies move outside the range of the emanation), observers see things normally but
  the altered perceptions from earlier events remain in mind. Each mention of the
  events as noteworthy grants the target another Willpower save to break the effect and
  remember things normally (unless the creature critically failed their save).'
tradition: technical
level: 6
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
