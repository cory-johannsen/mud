id: plasma_arsenal
name: Plasma Arsenal
description: You fabricate weapons from plasma containment fields. You create a weapon made of contained plasma. The weapon deals 1d8 fire damage and has the traits of the weapon it resembles. When you Sustain the spell, you can make a Strike with the weapon.
