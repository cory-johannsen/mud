id: shared_invisibility_technical
name: Shared Invisibility
description: You and all targets are @UUID[Compendium.pf2e.conditionitems.Item.Invisible] except to each other as long as the targets remain within the emanation. If a creature made invisible by this spell leaves the spell's area, it becomes visible and remains so even if it returns to the spell's area. If any creature made invisible by this spell uses a hostile action, the spell ends after the hostile action is completed.Heightened (5th) The targets increase to you and up to 10 willing creatures. The duration increases to 1 hour.
