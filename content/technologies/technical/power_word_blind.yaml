id: power_word_blind
name: 'Override Code: Blind'
description: 'You speak a word of power that overwhelms the target''s visual processing
  systems. The effect of the tech depends on the target''s level.


  13th or Lower The target is @UUID[Compendium.pf2e.conditionitems.Item.Blinded] permanently.

  14th-15th The target is Blinded for [[/r 1d4 #days]]{1d4 days}.

  16th or Higher The target is Blinded for 1 minute.

  Once targeted, the target is then temporarily immune for 10 minutes.


  Heightened (+1) The levels at which each outcome applies increase by 2.'
tradition: technical
level: 7
usage_type: prepared
action_cost: 1
range: ranged
targets: single
duration: instant
resolution: none
