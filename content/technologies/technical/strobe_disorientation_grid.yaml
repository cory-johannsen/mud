id: strobe_disorientation_grid
name: Strobe Disorientation Grid
description: 'You deploy a grid of strobing light emitters. Creatures are @UUID[Compendium.pf2e.conditionitems.Item.Dazzled]
  while inside the grid. In addition, a creature must attempt a Will saving throw
  if it''s inside the grid when you deploy it, enters the grid, ends its turn within
  it, or uses a Seek or Interact action on it. A creature currently @UUID[Compendium.pf2e.conditionitems.Item.Blinded]
  by the grid doesn''t need to attempt new saving throws.


  Success The creature is unaffected.

  Failure The creature is Blinded by the grid. If it exits, it can attempt a new save
  to recover at the end of each of its turns, to a maximum duration of 1 minute.

  Critical Failure The creature is Blinded for 1 minute.'
tradition: technical
level: 6
