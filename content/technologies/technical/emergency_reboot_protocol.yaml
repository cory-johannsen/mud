id: emergency_reboot_protocol
name: Emergency Reboot Protocol
description: 'Trigger A creature within range fails or critically fails a saving throw
  or is reduced to 0 Hit Points


  You activate an emergency timeline correction protocol the instant a catastrophic
  outcome would otherwise have occurred. If the triggering creature failed its saving
  throw, it rerolls the saving throw. If it critically failed, it instead treats the
  result as a failure. If the triggering creature was reduced to 0 Hit Points, it
  remains at 1 Hit Point, and it still suffers any other debilitating effects from
  the damage source. In the case of a creature critically failing a saving throw or
  being reduced to 0 Hit Points simultaneously, you choose which event to correct.

  Once a creature benefits from this protocol, it''s temporarily immune for 24 hours.


  Upgraded (9th) You can target up to 10 creatures within range. All targets must
  still individually qualify as triggering creatures.'
tradition: technical
level: 6
usage_type: prepared
action_cost: 0
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'Trigger A creature within range fails or critically fails a saving
      throw or is reduced to 0 Hit Points


      As all good writers know, you shouldn''t kill off your protagonist before their
      story is complete'
