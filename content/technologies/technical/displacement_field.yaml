id: displacement_field
name: Displacement Field
description: You wrap the target in a holographic displacement field that makes it
  appear slightly offset from its true position. The target gains a +1 status bonus
  to AC and can attempt to Hide even without cover or concealment, using your spell
  DC as its Stealth DC.
