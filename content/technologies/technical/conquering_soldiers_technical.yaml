id: conquering_soldiers_technical
name: Conquering Soldiers
description: |-
    You tap into the glories of the armies of old, bringing forth their might to your battlefield and making their strength and power your own. This army manifests as glimmering forms of a conquering military of old, replete with banners and colors of their nation. The army occupies the space of a Gargantuan creature and has a Speed of 80 feet.
    Arrive (auditory, emotion, fear, mental) Banner's Call The conquering army manifests before you and your allies, letting out a battle cry of victory and devotion. Each enemy within an 80-foot emanation must attempt a Will save.Critical Success The creature is unaffected.
    Success The creature is Frightened 2.
    Failure The creature takes 6d12 mental damage and is Frightened 3.
    Critical Failure The creature takes @Damage[12d12[mental]|options:area-damage|traits:auditory,emotion,fear,mental] damage, is Frightened 4, and is @UUID[Compendium.pf2e.conditionitems.Item.Fleeing] for 1 round.
    Depart (emotion, healing, mental) Trumpets of War As the conquering soldiers begin to fade, their military musicians play one more triumphant song in your honor. You and all allies within 100 feet of the soldiers immediately reduce the value of any @UUID[Compendium.pf2e.conditionitems.Item.Clumsy], @UUID[Compendium.pf2e.conditionitems.Item.Drained], @UUID[Compendium.pf2e.conditionitems.Item.Enfeebled], @UUID[Compendium.pf2e.conditionitems.Item.Frightened], @UUID[Compendium.pf2e.conditionitems.Item.Sickened], and @UUID[Compendium.pf2e.conditionitems.Item.Stupefied] conditions by 2 and gain a +2 status bonus to all attacks, saving throws, skill checks, and DCs for 3 rounds.
    @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Conquering Soldiers (Depart)]
