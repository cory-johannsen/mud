id: elemental_annihilation_wave_technical
name: Elemental Annihilation Wave
description: |-
    You draw elemental power from your surroundings, and combining it with your own magical energy, unleash a wave of utter destruction and swirling colors that deals 1d6 fire damage and 3d6 bludgeoning damage with a basic Reflex save. You can replace the air trait with the metal and wood traits when you cast the spell. The number of actions you spend when Casting this Spell determines the area and other parameters.
    2 (somatic, verbal) The spell is a 30-foot cone.
    3 (material, somatic, verbal) The spell is a 30-foot cone. On a failed saving throw, creatures are pushed 5 feet away from you, and on a critical failure they are pushed 10 feet away and are knocked prone.
    Two Rounds If you spend 3 actions Casting the Spell, you can avoid finishing the spell and spend another 3 actions on your next turn to empower the spell even further. If you do, the spell is as 3 actions, but the area is a @Template[cone|distance:60], and for 1 round, the elements linger in the cone, racing off into the distance and making approaching you difficult, with the effects of @UUID[Compendium.pf2e.spells-srd.Item.Gust of Wind].Heightened (+2) The damage increases by 3d6 bludgeoning and 1d6 fire, and the distance that enemies are pushed back if you spent 3 actions or 2 rounds increases by 5 feet on a failed save and 10 feet on a critical failure.
tradition: technical
level: 3
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 1d3
          damage_type: fire
          dc: 0
        - type: damage
          dice: 3d3
          damage_type: bludgeoning
          dc: 0
    on_failure:
        - type: damage
          dice: 1d6
          damage_type: fire
          dc: 0
        - type: damage
          dice: 3d6
          damage_type: bludgeoning
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 2d6
          damage_type: fire
          dc: 0
        - type: damage
          dice: 6d6
          damage_type: bludgeoning
          dc: 0
