id: voice_modulator_hack
name: Voice Modulator Hack
description: 'You hack the target''s vocal processing hardware, distorting their speech.
  The target must attempt a Grit check.


  Critical Success The target is unaffected.

  Success Minor distortion; -1 penalty to speech checks.

  Failure The target can only produce garbled noise; -4 penalty to speech checks.

  Critical Failure The target is rendered mute for the duration.'
tradition: technical
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d6
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 2d10
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d10
    damage_type: mental
    dc: 0
