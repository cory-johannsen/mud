id: secure_comm_array
name: Secure Comm Array
description: 'You deploy a device that establishes a telepathic mesh network with
  creatures within 30 feet. Once connected, communication is two-way. You can communicate
  only with creatures that share a language.


  Upgraded (6th) Communicate via shared mental imagery without shared language;
  loses the linguistic trait.'
tradition: technical
level: 4
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You can communicate telepathically with creatures within 30 feet.
      Once you establish a connection by communicating with a creature, the communication
      is two-way. You can communicate only with creature
