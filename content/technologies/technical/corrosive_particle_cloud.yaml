id: corrosive_particle_cloud
name: Corrosive Particle Cloud
description: 'You deploy a cloud of agitated corrosive particles. All creatures within are Concealed, and all outside are concealed to those within. Deals 5d10 slashing damage (basic Grit check) to creatures starting turns in the area. Metal creatures corroded add to the cloud, increasing area by 5 feet (max 40-foot burst) and taking (floor(/2)-1)d4[persistent,slashing]. You can Dismiss.


  Upgraded (+2) Slashing +1d10, persistent +1d4.'
