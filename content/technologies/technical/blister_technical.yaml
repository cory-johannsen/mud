id: blister_technical
name: Thermal Blisters
description: 'You target a creature in range with a focused thermal beam that causes
  searing blisters. The target must attempt a Fortitude save.


  Critical Success The target is unaffected.

  Success The target grows one blister. You can spend a single action, which has the
  concentrate trait, to pop a blister, dealing 2d6 acid damage.

  Failure The target grows two blisters.

  Critical Failure The target grows three blisters.


  Heightened (+2) The damage per blister increases by 1d6.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 7d3
    damage_type: acid
    dc: 0
  on_failure:
  - type: damage
    dice: 7d6
    damage_type: acid
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 14d6
    damage_type: acid
    dc: 0
