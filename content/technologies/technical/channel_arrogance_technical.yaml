id: channel_arrogance_technical
name: Ego Amplification Device
description: You deploy a device that broadcasts an overwhelming superiority signal
  into the target's neural interface. You can activate it with 1 action (reduced power)
  or 3 actions (full power). The target takes 5d10 mental damage. If cast with 1 action,
  the target gets one degree better. All mechanical effects (fascinated, disruption,
  duration) remain identical to the base protocol.Heightened (+1) The damage increases
  by 1d10.
tradition: technical
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 5d6
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 5d10
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 10d10
    damage_type: mental
    dc: 0
