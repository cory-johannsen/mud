id: hydraulic_turret_array
name: Hydraulic Turret Array
description: 'Area 30-foot burst centered on you


  You activate pressurized hydraulic systems beneath the floor, sending majestic sprays,
  jets, and pressurized streams erupting forth. When you activate the tech, and the
  first time each round you Sustain it, you can command the array to use one of the
  following modes. The array can''t be commanded to use the same mode on two consecutive
  turns.


  Chasing Jets A series of vertical jets shoot up in a chase sequence, forcing one
  creature within the array to move 15 feet in a direction of your choice unless it
  succeeds at a Reflex save against your tech DC. The array can''t make a creature
  move outside its area.

  Flashing Spray Diffuse fog fills the area. All creatures within the array become
  @UUID[Compendium.pf2e.conditionitems.Item.Concealed], and all creatures outside
  the array become concealed to creatures within it. The spray persists until the
  beginning of your next turn.

  Power Rings The array blasts a series of pressurized water rings that land with
  a crash in a @Template[burst|distance:10] centered on a location of your choice
  within the array. The falling torrent deals @Damage[10d6[bludgeoning]] damage to
  all creatures within the burst (basic Reflex).'
tradition: technical
level: 7
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 10d3
    damage_type: bludgeoning
    dc: 0
  on_failure:
  - type: damage
    dice: 10d6
    damage_type: bludgeoning
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 20d6
    damage_type: bludgeoning
    dc: 0
