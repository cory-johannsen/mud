id: instant_minefield_technical
name: Smart Mine Deploy
description: 'You deploy several concealed smart mines throughout the area. Choose
  up to 6 unoccupied squares within range. A mine appears in each chosen square, visible
  only to you and allies. Mines can''t be targeted and aren''t affected by area effects.


  When a creature enters a mined square, the mine detonates, dealing 2d10 force damage
  with a basic Reflex save. Mines can be detected by Searching against your spell
  DC.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 3d3
    damage_type: piercing
    dc: 0
  - type: damage
    dice: 3d3
    damage_type: fire
    dc: 0
  on_failure:
