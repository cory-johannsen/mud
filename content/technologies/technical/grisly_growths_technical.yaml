id: grisly_growths_technical
name: Grisly Growths
description: |-
    This gruesome spell causes the target to grow excess limbs and organs, whether it be fingers multiplying until hands resemble bushes, eyes popping open in bizarre places, legs sprouting from the side of the body, or some other result. The target takes 10d6 piercing damage (basic Fortitude save) as the new features erupt. This spell has no effect on a target with a mutable anatomy or no limbs, such as an ooze or a protean. The growths rot rapidly and fall away after 1 round.
    In addition, unless the initial target critically succeeds, creatures within 30 feet of the target, including the target, must attempt @Check[will] saves, after which they're temporarily immune to this secondary effect of grisly growths for 1 hour. This additional effect is a mental and visual effect.Success The creature is unaffected.
    Failure The creature is Sickened 1.
    Critical Failure The creature is Sickened 2.Heightened (+1) The damage increases by 2d6.
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 10d3
          damage_type: piercing
          dc: 0
    on_failure:
        - type: damage
          dice: 10d6
          damage_type: piercing
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 20d6
          damage_type: piercing
          dc: 0
