id: grisly_growths_technical
name: Nano-Growth Overload
description: 'This tech triggers uncontrolled nano-fabrication in the target''s body,
  causing excess mechanical components to sprout from their flesh. The target takes
  10d6 piercing damage (basic Toughness save).


  On a failure, the target is also Clumsy 1 for 1 minute.


  Heightened (+1) The damage increases by 2d6.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 10d3
    damage_type: piercing
    dc: 0
  on_failure:
  - type: damage
    dice: 10d6
    damage_type: piercing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 20d6
    damage_type: piercing
    dc: 0
