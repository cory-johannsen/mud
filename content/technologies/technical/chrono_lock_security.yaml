id: chrono_lock_security
name: Chrono-Lock Security
description: 'You install a temporal security lock on a target doorway or container that rewinds the personal timeline of unauthorized users. A creature attempting to open the warded entry must attempt a Willpower save.

  You can set a password. Any creature that attempts to open without speaking the password must attempt a save.

  The lock vanishes when the spell''s duration ends, but can be removed as if it were a trap, using your tech DC for both the Perception check and Thievery check to disable it. Both checks require expert proficiency.

  You can Dismiss the lock. The maximum number of active locks equals your spellcasting ability modifier.


  Critical Success The creature is unaffected and opens normally.

  Success The creature must use an additional action to open. If it can''t or doesn''t want to, the action is wasted.

  Failure The creature is thrown backwards in time—their action is wasted and they''re returned to their start-of-turn position. Their turn ends.

  Critical Failure As failure, but the creature is also Confused for 1 minute.


  Heightened (10th) The lock has an unlimited duration, until counteracted, Dismissed, or Disarmed.'
tradition: technical
level: 6
usage_type: prepared
action_cost: 3
range: melee
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
