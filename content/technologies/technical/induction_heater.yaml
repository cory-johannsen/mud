id: induction_heater
name: Induction Heater
description: 'You activate an electromagnetic induction field that rapidly heats a
  metal object. The target metal object deals 4d6 fire damage to any creature holding
  or wearing it with a basic Reflex save. A creature that continues to hold or wear
  the item takes the damage again at the start of each of its turns.


  Heightened (+1) The damage increases by 2d6.'
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 4d3
    damage_type: fire
    dc: 0
  - type: damage
    dice: '2'
    damage_type: fire
    dc: 0
  on_failure:
  - type: damage
    dice: 4d6
    damage_type: fire
    dc: 0
  - type: damage
    dice: 2d4
    damage_type: fire
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 8d6
    damage_type: fire
    dc: 0
  - type: damage
    dice: 4d4
    damage_type: fire
    dc: 0
