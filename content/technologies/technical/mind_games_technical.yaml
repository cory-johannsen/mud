id: mind_games_technical
name: Mind Games Protocol
description: 'You deploy a cognitive disruption device that floods the target with
  paradoxical data. The target must attempt a Willpower save.


  Critical Success The target is unaffected.

  Success The target is @UUID[Compendium.pf2e.conditionitems.Item.Stupefied] 1 for
  1 round.

  Failure The target is @UUID[Compendium.pf2e.conditionitems.Item.Stupefied] 2 for
  1 minute.

  Critical Failure The target is @UUID[Compendium.pf2e.conditionitems.Item.Stupefied]
  3 for 1 minute.'
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'You lock minds with the target, trying to mentally subdue them.
      The target must attempt a Willpower save. Each time you Sustain this tech, the target
      attempts another Willpower save.


      Critical Success You are'
