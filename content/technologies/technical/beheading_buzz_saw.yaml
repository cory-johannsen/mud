id: beheading_buzz_saw
name: Plasma Disc Launcher
description: 'You compress superheated metal into a spinning plasma disc with gruesome
  blades protruding from its edges. It wheels forward, slicing through anyone in its
  path. Each creature in the area takes 5d10 slashing damage and 4d6 persistent bleed
  damage, with a Reflex save.

  Success The creature is unaffected.

  Failure The creature takes full damage.

  Critical Failure The creature takes double damage. If the creature has a head, it
  must succeed at a @Check[fortitude|against:spell|traits:death,incapacitation] save
  or be decapitated; this kills any creature except ones that don''t require a head
  to live. For creatures with multiple heads, this usually kills the creature only
  if you sever its last head. This second save has the death and incapacitation traits.Heightened
  (+1) The slashing damage increases by 1d10, and the persistent bleed damage increases
  by 1d6.'
tradition: technical
level: 7
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 5d6
    damage_type: slashing
    dc: 0
  - type: damage
    dice: 4d3
    damage_type: bleed
    dc: 0
  on_failure:
  - type: damage
    dice: 5d10
    damage_type: slashing
    dc: 0
  - type: damage
    dice: 4d6
    damage_type: bleed
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 10d10
    damage_type: slashing
    dc: 0
  - type: damage
    dice: 8d6
    damage_type: bleed
    dc: 0
