id: rime_slick_technical
name: Rime Slick
description: |-
    You call down a chill wind. When you Cast this Spell, you deal 2d4 cold damage to each creature in the area (basic Reflex save). If a creature in the area critically fails its Reflex save and was standing, it also falls @UUID[Compendium.pf2e.conditionitems.Item.Prone].
    You also create a layer of ice on all surfaces in the area, which become difficult terrain. Unattended objects in the area become slick with ice, and picking them up requires a successful Reflex save or Acrobatics check against your spell DC. The ice melts on any object that takes fire damage as well as in any square included in the area of a higher-rank spell or effect with the fire trait.

    Heightened (5th) The damage increases to 8d4 cold damage and the area is a 30-foot burst.
    Heightened (8th) The damage increases to 14d4 cold damage and the area is a 60-foot burst.
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: "2"
          damage_type: cold
          dc: 0
    on_failure:
        - type: damage
          dice: 2d4
          damage_type: cold
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 4d4
          damage_type: cold
          dc: 0
