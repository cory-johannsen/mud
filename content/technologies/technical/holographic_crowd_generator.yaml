id: holographic_crowd_generator
name: Holographic Crowd Generator
description: You deploy holographic projectors that create an illusory crowd in the
  area. The figures move, talk, and act like normal people. Creatures can attempt
  a Awareness check against your tech DC to disbelieve. The crowd is difficult terrain
  for creatures that believe it's real.
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: A tightly packed crowd of humanoids appropriate to the area appear,
      facing you and agreeing loudly with anything you say. A creature that touches
