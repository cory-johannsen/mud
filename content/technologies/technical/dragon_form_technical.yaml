id: dragon_form_technical
name: Heavy Assault Frame
description: 'You activate a heavy assault exoframe, gaining a Large armored battle
  form. When you activate the frame, choose one configuration. While in this form,
  you gain the dragon trait. You have hands in this battle form and can take manipulate
  actions. You can Dismiss the spell.

  You gain the following statistics and abilities regardless of which battle form
  you choose:AC = 18 + your level. Ignore your armor''s check penalty and Speed reduction.10
  temporary Hit Points.Speed 40 feet, fly 100 feet. You gain any of the following
  Speeds the chosen dragon has, but with the listed amount: burrow 20 feet, climb
  40 feet, swim 60 feet.Resistance 10 against the damage type of your Dragon Breath
  (see below).Darkvision and imprecise scent 60 feet.The following unarmed melee attacks,
  which are the only attacks you can Strike with. You''re trained with them. Your
  attack modifier is +22, and your damage bonus is +6. These attacks are Strength
  based (for the purpose of the enfeebled condition, for example). If your unarmed
  attack modifier is higher, you can use it instead. See below for more on these attacks.Melee
  1 jaws, Damage 2d12 piercing plus 2d6 damage of the same damage type as your Dragon
  Breath (see below);Melee 1 claw (agile), Damage 3d10 slashing;Melee 1 tail (reach
  10 feet), Damage 3d10 bludgeoning.Athletics modifier of +23, unless your own is
  higher.Dragon Breath 2 You exhale deadly magical energy in an area, dealing 10d6
  damage to each creature in the area with a basic save against your spell DC. The
  shape, damage type, and save type match that of your chosen dragon''s breath. If
  the chosen dragon''s breath can deal more than one type of damage, choose one when
  you cast dragon form. The shape is a 30-foot cone or a 100-foot line. Once activated,
  Dragon Breath can''t be used again for 1d4 rounds. Dragon Breath has the tradition
  trait matching the type of dragon and the damage trait matching the type of damage
  it deals, if applicable.Tradition Resistance If the dragon''s magical tradition
  matches that of your dragon form spell, you gain the listed ability. Arcane resistance
  5 against magic; divine resistance 10 to spirit, vitality, and void; occult resistance
  10 to mental; primal resistance 5 to physical damage.@UUID[Compendium.pf2e.spell-effects.Item.Spell
