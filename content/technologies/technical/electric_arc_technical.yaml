id: electric_arc_technical
name: Electric Arc
description: |-
    An arc of lightning leaps from one target to another. Each target takes 2d4 electricity damage with a basic Reflex save.

    Heightened (+1) The damage increases by 1d4.
tradition: technical
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: "2"
          damage_type: electricity
          dc: 0
    on_failure:
        - type: damage
          dice: 2d4
          damage_type: electricity
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 4d4
          damage_type: electricity
          dc: 0
