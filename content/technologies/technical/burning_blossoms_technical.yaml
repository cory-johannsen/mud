id: burning_blossoms_technical
name: Plasma Antenna Tower
description: 'Area 30-foot radius, 100-foot tall cylinder


  A towering hard-light antenna erupts from the ground and grows to massive height,
  radiating intense plasma energy that mesmerizes viewers. The base of the antenna
  takes up a single square and grows 100 feet upwards, while its emitter arrays extend
  outwards 30 feet, forming the tech''s cylindrical area. The antenna then activates,
  producing drifting plasma motes that burn with white-hot fire. As the arrays gently
  rotate, burning plasma drifts to the ground in a shower of flame. Any creature that
  ends its turn under the arrays takes 6d6 fire damage from the burning plasma. Any
  enemy that can see the antenna, even if the enemy is outside the tech''s area, must
  attempt a will save. This is an emotion, mental, and visual effect. Creatures fascinated
  with the antenna must use at least one of their actions on each of their turns to
  move toward it.


  Critical Success The creature is unaffected and is temporarily immune for 24 hours.

  Success The creature is unaffected, but it must attempt a new save at the end of
  its turn if it can still see the antenna.

  Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Fascinated] with
  the antenna until the end of its next turn. If it can still see it then, it must
  attempt a save again.

  Critical Failure The creature is fascinated with the antenna until the tech ends.
  The antenna''s fire damage doesn''t end the fascination; other hostile actions end
  it, as normal. If the fascination ends, the creature must attempt a new save at
  the end of its turn if it can still see the antenna.


  Heightened (+1) The damage increases by 1d6'
