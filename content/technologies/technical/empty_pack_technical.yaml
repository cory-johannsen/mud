id: empty_pack_technical
name: Empty Pack
description: You render every item inside the container you touch @UUID[Compendium.pf2e.conditionitems.Item.Invisible], although the container itself remains visible. The items within are @UUID[Compendium.pf2e.conditionitems.Item.Undetected] to all creatures, though a creature can attempt to find an item by reaching into the bag, making an item hidden to them instead if they succeed. Additionally, the spell doesn't prevent the items from making protrusions in the bag, adding weight, making noise when jostling around, and so on. However, the spell prevents anything within the container from falling out if it's upended. Any object removed from the container becomes visible and remains visible even if returned to the container.Heightened (4th) The duration is until the next time you make your daily preparations.
