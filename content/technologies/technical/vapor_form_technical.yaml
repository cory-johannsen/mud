id: vapor_form_technical
name: Dispersal Field
description: The target's body disperses into a vaporous state via molecular destabilization.
  In this state, the target is amorphous, loses item bonus to AC, uses unarmored defense
  proficiency, gains resistance 8 to physical damage, and is immune to precision damage.
  Can't cast spells, activate items, or use attack/manipulate actions. Gains fly Speed
  10 feet, can slip through tiny cracks. Can Dismiss.
