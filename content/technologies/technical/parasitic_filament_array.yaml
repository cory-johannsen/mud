id: parasitic_filament_array
name: Parasitic Filament Array
description: 'Barbed metallic filaments erupt from your device in a tangled cascade,
  puncturing creatures in the line and siphoning energy. You deal 8d6 piercing damage
  (basic Reflex save). You gain 1d4 temporary Hit Points per living creature in the
  line. Temporary Hit Points last 1 minute.


  Heightened (+1) Damage increases by 2d6.'
