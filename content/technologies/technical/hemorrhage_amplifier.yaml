id: hemorrhage_amplifier
name: Hemorrhage Amplifier
description: 'You deploy a device that amplifies the target''s awareness of its own bleeding. The target must attempt a Willpower save.


  Critical Success The creature is unaffected.

  Success The creature is Frightened 1.

  Failure The creature is Frightened 2 and takes 1d6 persistent bleed damage.

  Critical Failure The creature is Frightened 3 and takes 2d6 persistent bleed damage.'
tradition: technical
level: 2
usage_type: prepared
action_cost: 1
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 1d6
    damage_type: bleed
    persistent: true
  - type: damage
    dice: 2d6
    damage_type: bleed
    persistent: true
  - &id001
    type: condition
    condition_id: frightened
    value: 1
  on_crit_failure:
  - type: damage
    dice: 1d6
    damage_type: bleed
    persistent: true
  - type: damage
    dice: 2d6
    damage_type: bleed
    persistent: true
  - *id001
