id: detonate_magic_technical
name: System Cascade Detonation
description: You trigger a cascade failure in a target's arcane systems. The target
  takes 10d6 force damage (Fortitude for half). Adjacent creatures take 5d6 force
  damage (Fortitude for half).
tradition: technical
level: 9
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d3
    damage_type: force
    dc: 0
  on_failure:
  - type: damage
    dice: 8d6
    damage_type: force
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d6
    damage_type: force
    dc: 0
