id: neural_firewall_suite
name: Neural Firewall Suite
description: 'A powerful neural firewall suite hides a creature from tech that would spy on it or affect its mind. The target gains a +4 status bonus to saves against mental effects. Neural firewall suite attempts to counteract any detection, revelation, and scrying effects as if its tech rank were 1 higher than its actual rank. On a success, the effect functions normally except that it detects nothing about the target and its possessions. For instance, detect magic would still detect other tech in the area, but not any tech on the target.

  Hidden Mind'
tradition: technical
level: 8
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: condition
    condition_id: hidden
    value: 1
