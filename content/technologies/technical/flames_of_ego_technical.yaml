id: flames_of_ego_technical
name: Ego Overload
description: 'Elegant holographic flames of incredible beauty coruscate across the
  target''s body, overloading their threat-assessment systems with overconfidence.
  The target attempts a Willpower save.


  Critical Success The target is unaffected.

  Success The target sheds bright light in a 20-foot emanation and becomes Dazzled
  for 1 round.

  Failure Sheds light, is Dazzled for 1 minute, and takes a -2 status penalty to AC.

  Critical Failure As failure, and also Fascinated by itself.'
