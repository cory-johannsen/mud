id: missed_cue_technical
name: Missed Cue
description: |-
    You make the spell's target believe they had something incredibly important to say but forgot to say it, and now they've missed their opportunity. Sensations of overwhelming panic akin to stage fright flood the target's mind, causing them to suffer excruciating mental anguish and take 12d6 mental damage. The target might even become filled with the conviction that they've doomed themselves by missing their cue. The target must attempt a Will save.Critical Success The conviction of a missed cue is only a fleeting notion that passes quickly without any effect on the target.
    Success The target takes half damage and is Frightened 1.
    Failure The target takes full damage and becomes Frightened 2. In addition, the target is Slowed 1 for as long as they remain frightened.
    Critical Failure The target takes double damage and becomes Frightened 3. In addition, the target is slowed 1 for as long as they remain frightened.Heightened (+1) The damage increases by 2d6.
tradition: technical
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 12d3
          damage_type: mental
          dc: 0
    on_failure:
        - type: damage
          dice: 12d6
          damage_type: mental
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 24d6
          damage_type: mental
          dc: 0
