id: shadow_zombie_technical
name: Shadow Drone
description: You fabricate an autonomous combat drone from shadow-tech materials.
  The drone has the statistics of a zombie shambler but is made of shadow. It acts
  on your turn and follows your commands. It has 30 HP, AC 15, and makes melee Strikes
  at +10 for 1d8+3 bludgeoning damage.
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You cast a shadow over the target zombie, briefly turning it into
      shadowy vapor and controlling its movement. While in this vaporous state, the
      zombie is a minion under your control, gains resistance
