id: thermite_fissure
name: Thermite Fissure
description: 'A thin crack rips through the ground as a thermite charge detonates
  underground, erupting with superheated material. Each creature along the line on
  solid ground takes 4d6 bludgeoning damage and 6d6 fire damage with a Reflex save.


  Critical Success The creature is unaffected.

  Success The creature takes half damage.

  Failure The creature takes full damage and is knocked Prone.

  Critical Failure Double damage, Prone, and 2d6 persistent fire damage.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 4d3
    damage_type: bludgeoning
    dc: 0
  - type: damage
    dice: 6d3
    damage_type: fire
    dc: 0
  on_failure:
  - type: damage
    dice: 4d6
    damage_type: bludgeoning
    dc: 0
  - type: damage
    dice: 6d6
    damage_type: fire
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 8d6
    damage_type: bludgeoning
    dc: 0
  - type: damage
    dice: 12d6
    damage_type: fire
    dc: 0
