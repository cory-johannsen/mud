id: cable_snare
name: Cable Snare
description: 'You deploy grappling cables that erupt from the ground, entangling creatures. Each creature in the area must attempt a Quickness check.


  Critical Success The creature is unaffected.

  Success The creature takes a -5-foot circumstance penalty to its Speeds for 1 round.

  Failure The creature is Immobilized for 1 round. It can attempt to Escape against your tech DC.

  Critical Failure The creature is Immobilized for 1 minute. It can attempt to Escape against your tech DC.'
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: immobilized
    value: 1
  on_crit_failure:
  - *id001
