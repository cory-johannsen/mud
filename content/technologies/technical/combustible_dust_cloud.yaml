id: combustible_dust_cloud
name: Combustible Dust Cloud
description: 'You release a cloud of combustible industrial dust. The cloud functions
  as Mist. If any flame or fire effect contacts the cloud, it ignites, dealing 10d6
  fire damage (basic Reflex). After igniting, the cloud disperses.


  Upgraded (+1) The fire damage increases by 2d6.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 10d3
    damage_type: fire
    dc: 0
  on_failure:
