id: toxic_waste_zone
name: Toxic Waste Zone
description: 'You deploy industrial contaminants that poison the area. Creatures in the area when you cast the spell and creatures that enter the area must attempt Grit checks.


  Critical Success The creature is unaffected.

  Success The creature is Sickened 1.

  Failure The creature is Sickened 2.

  Critical Failure The creature is Sickened 2 and Slowed 1 for 1 round.'
tradition: technical
level: 2
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: nausea
    value: 1
  - &id002
    type: condition
    condition_id: slowed
    value: 1
  on_crit_failure:
  - *id001
  - *id002
