id: acid_grip_technical
name: Acid Grip
description: |-
    An ephemeral, taloned hand grips the target, burning it with magical acid. The target takes 2d8 acid damage plus @Damage[floor(@item.level/2)d6[persistent,acid]] damage depending on its Reflex save. A creature taking persistent damage from this spell takes a –10-foot status penalty to its Speeds. @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Acid Grip]Critical Success The creature is unaffected.
    Success The creature takes half damage and no persistent damage, and the claw moves it up to 5 feet in a direction of your choice.
    Failure The creature takes full damage and persistent damage, and the claw moves it up to 10 feet in a direction of your choice.
    Critical Failure The creature takes double damage and full persistent damage, and the claw moves it up to 20 feet in a direction of your choice.Heightened (+2) The initial damage increases by 2d8, and the persistent acid damage increases by 1d6.
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 2d4
          damage_type: acid
          dc: 0
    on_failure:
        - type: damage
          dice: 2d8
          damage_type: acid
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 4d8
          damage_type: acid
          dc: 0
