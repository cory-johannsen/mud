id: penumbral_shroud_technical
name: Shadow Cloak Module
description: You activate a partial-cloaking shroud, reducing the target's visual profile and penalizing both their vision
  and others' sight of them.
tradition: technical
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You envelop the target in a shroud of shadow. The target perceives light as one step lower than it actually
      is (bright light becomes dim light, for example), affecting their ability to sense creatures
