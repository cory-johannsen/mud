id: mariners_curse_technical
name: Gyro Scrambler
description: 'You deploy a device that corrupts the target''s balance and orientation
  systems. The target must attempt a Willpower save.


  Critical Success Unaffected.

  Success Sickened 1. Reducing sickened to 0 ends the effect.

  Failure Sickened 1, can''t reduce below 1 while the scrambler remains active.

  Critical Failure Sickened 2, can''t reduce below 1.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'You afflict the target with the curse of the roiling, unforgiving
      sea. The target must attempt a Willpower save.


      Critical Success The target is unaffected.

      Success The target becomes Sickened 1. Reducing'
