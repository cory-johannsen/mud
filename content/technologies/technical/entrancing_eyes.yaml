id: entrancing_eyes
name: Hypno-Optic Projector
description: 'Your eyes glow with an entrancing light that beguiles those who meet
  your gaze. Any creature that ends its turn within the emanation must attempt a Will
  save.


  Critical Success The creature is unaffected and is then temporarily immune for 24
  hours.

  Success The creature is unaffected and is then temporarily immune for 1 minute.

  Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Fascinated] until
  the end of its next turn.

  Critical Failure The creature is fascinated until the end of its next turn and is
  then Stunned 1.


  Once a creature succeeds or critically succeeds at its saving throw, it is temporarily
  immune to your hypno-optic projector for 24 hours.'
