id: crimson_breath_technical
name: Crimson Breath
description: |-
    You turn a creature toward you and exhale a blast of crimson mist from your mouth, exposing the target to a toxic miasma. The effects are determined by the creature's Fortitude save.Critical Success The target is unaffected.
    Success The target takes 8d6 poison damage.
    Failure The target is afflicted with breath of the mantis god poison at stage 1.
    Critical Failure The target is afflicted with breath of the mantis god poison at stage 2.Breath of the Mantis GodSaving Throw @Check[fortitude|dc:29]
    Maximum Duration 6 minutes
    Stage 1 3d6 persistent bleed and Drained 1 (1 minute)
    Stage 2 3d8 persistent bleed and drained 1 (1 minute)
    Stage 3 3d10 persistent bleed and Drained 2 (1 minute)
tradition: technical
level: 6
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 8d3
          damage_type: poison
          dc: 0
    on_failure:
        - type: damage
          dice: 8d6
          damage_type: poison
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 16d6
          damage_type: poison
          dc: 0
