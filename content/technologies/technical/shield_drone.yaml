id: shield_drone
name: Shield Drone
description: 'A Medium floating shield drone made of force fields appears adjacent to you, following you to block attacks. Each time you Sustain the tech, the drone moves to an adjacent space of your choice. When you Sustain, you can have the drone push one creature within 5 feet, dealing 3d6 force damage (Grit check for half).


  The drone has AC 25, 50 Hit Points, and your saves.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 3d6
    damage_type: force
  on_crit_failure:
  - type: damage
    dice: 6d6
    damage_type: force
