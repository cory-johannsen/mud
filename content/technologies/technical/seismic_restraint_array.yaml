  - type: damage
    dice: 1d3
    damage_type: bludgeoning
    dc: 0
  on_failure:
  - type: damage
    dice: 1d6
    damage_type: bludgeoning
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 2d6
    damage_type: bludgeoning
    dc: 0
