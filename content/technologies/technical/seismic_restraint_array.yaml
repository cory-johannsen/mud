id: seismic_restraint_array
name: Seismic Restraint Array
description: Mechanical protrusions of stone and soil grab and bury creatures. Each
  creature in the area must attempt a Grit check. All mechanical effects (grabbed,
  restrained, bludgeoning damage) remain identical to the base protocol.
tradition: technical
level: 4
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
