id: sensor_amplification_array
name: Sensor Amplification Array
description: 'You deploy a sensory enhancement package on the target. The target gains
  low-light vision, and all imprecise senses have distances doubled. If it already
  has low-light vision, it gains darkvision.


  Upgraded (+2) The number of targets increases by 1.'
tradition: technical
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You enhance the target's senses. The target gains low-light vision,
      and all of the target's imprecise senses have their distances doubled. If the
      target already has low-light vision, they gain darkvis
