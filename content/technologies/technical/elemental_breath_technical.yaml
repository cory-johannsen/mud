id: elemental_breath_technical
name: Elemental Breath
description: |-
    You open a miniature portal to an elemental plane within your mouth, then exhale a powerful explosion of the plane's element. Roll 1d6 to determine the element. If you used 3 actions to Cast this Spell, you can choose the element instead. This spell gains the trait matching the element.
    Each creature in the cone must attempt a basic Reflex save.

    Air Strong winds and lightning strikes buffet creatures in the cone, dealing @Damage[6d10[electricity]] damage. A creature that fails its save is also pushed 10 feet.
    Earth A cone of mud deals @Damage[5d10[bludgeoning]] damage to creatures in the area. A creature on the ground that fails its save slips and falls @UUID[Compendium.pf2e.conditionitems.Item.Prone].
    Fire A surging cone of fire deals @Damage[7d10[fire]] damage.
    Metal A cone of rust slices flesh and damages metal. Each creature in the area takes @Damage[5d10[slashing]] damage. A creature made of metal gets a result one degree of success worse than it rolled, and an unattended metal object gets a critical failure.
    Water A torrent of chilled water deals @Damage[3d10[cold]] damage and @Damage[3d10[bludgeoning]] damage.
    Wood Branches rip through creatures, dealing @Damage[3d10[piercing]] damage and @Damage[3d10[slashing]] damage. Ground in the area becomes difficult terrain for 1 minute.


    Heightened (+1) The damage increases by [[/r 1d10]]. For water and wood, you can choose which damage type increases for each rank the spell is heightened.
