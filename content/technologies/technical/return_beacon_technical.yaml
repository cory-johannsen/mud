id: return_beacon_technical
name: Return Beacon Transponder
description: 'You deploy an invisible quantum-entangled transponder within range.
  At any time during the duration, you can complete a 1-minute activity to teleport
  yourself and any creatures touching you back to the transponder''s location.


  Heightened (7th) You can teleport to the transponder as a 3-action activity.'
