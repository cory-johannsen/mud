id: impending_doom_technical
name: Terminal Prognosis
description: You run predictive algorithms that identify the target's most likely
  cause of death and project it into their awareness. The target must attempt a Will
  save.
tradition: technical
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: rounds:3
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 6d3
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 6d6
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 12d6
    damage_type: mental
    dc: 0
