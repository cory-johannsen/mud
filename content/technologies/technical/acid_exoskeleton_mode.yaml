id: acid_exoskeleton_mode
name: Acid Exoskeleton Mode
description: 'Your suit vents corrosive gas and acidic coolant coats your exoskeleton
  as you transform into a being of living acid. You gain acid immunity. Any creature
  that touches you or damages you with an unarmed melee attack or non-reach melee
  weapon takes 3d6 acid damage, and your unarmed attacks deal 1d4 additional acid
  damage. The first time each round that you deal acid damage to a creature in this
  way, you gain 3d6 Temporary Hit Points temporary Hit Points as your exoskeleton
  processes the eroded material. When the tech ends, any remaining temporary HP expires
  as well. Your acid tech deals one additional die of acid damage (of the same damage
  die the tech uses). You can activate @UUID[Compendium.pf2e.spells-srd.Item.Acid Splash]
  as an innate tech; the splash damage affects all creatures within 15 feet instead
  of the normal 5 feet.

  @UUID[Compendium.pf2e.spell-effects.Item.tech Effect: Corrosive Body]Upgraded
  (9th) Creatures touching you take 4d6 acid damage instead of 3d6, your unarmed attacks
  deal 2d4 additional acid damage, and you gain 5d6 Temporary Hit Points temporary
  Hit Points.'
tradition: technical
level: 7
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 3d6
    damage_type: acid
    dc: 0
