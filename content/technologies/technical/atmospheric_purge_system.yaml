id: atmospheric_purge_system
name: Atmospheric Purge System
description: 'You activate a device that rapidly evacuates all breathable air from the surrounding area. During the tech''s duration, you take a -1 circumstance penalty against inhaled threats, such as inhaled poisons. If you activate the tech in an environment where you can''t breathe, it fails and you immediately begin to suffocate.

  Creatures in the area must attempt a Grit check. A creature that''s holding its breath gets a result one degree of success better than it rolled, and creatures that don''t need to breathe air are immune to the tech. A creature that later enters the area or ceases holding its breath must attempt a save against the effect. On subsequent rounds, the first time each round you Sustain the tech, you can force each creature in the area to save against the effect.


  Success The creature begins holding its breath.

  Failure The creature wheezes and gasps as its breath is stolen, becoming Stunned 1. The creature then begins holding its breath but has only half its normal number of rounds of remaining air.

  Critical Failure The creature has all the air sucked out from its lungs and immediately starts to suffocate.'
tradition: technical
level: 7
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: stunned
    value: 1
  on_crit_failure:
  - *id001
