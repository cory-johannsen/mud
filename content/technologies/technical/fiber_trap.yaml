id: fiber_trap
name: Fiber Trap
description: 'You deploy a canister of high-tensile synthetic fibers that fill the area, impeding movement. Squares filled with the fibers are difficult terrain. Each time a creature in the web begins to use a move action or enters the web during a move action it''s using, it must attempt an Athletics save check or Quickness check against your tech DC to avoid taking a circumstance penalty to its Speeds or becoming Immobilized. A creature that gets out of the web ceases to take a circumstance penalty to its Speed from the web. Each square can be cleared of the web by a single attack or effect that deals at least 5 slashing damage or 1 fire damage. A square has AC 5, and it automatically fails its saving throws.


  Critical Success The creature is unaffected, and it doesn''t need to attempt further Athletics checks or saving throws against the web this turn. If it used an Athletics check, it clears the web from every square it leaves during its movement.

  Success The creature is unaffected during its action. If it used an Athletics check, it clears the web from every square it leaves during its movement.

  Failure The creature takes a -10-foot circumstance penalty to its Speeds until the start of its next turn.

  Critical Failure The creature is immobilized until the start of its next turn, after which it takes a -10-foot circumstance penalty to its Speeds for 1 round. It can attempt to Escape to remove its immobilized condition.


  Upgraded (4th) The spell''s area increases to a 20-foot burst, and its range increases to 60 feet.'
tradition: technical
level: 2
