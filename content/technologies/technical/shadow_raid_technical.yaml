id: shadow_raid_technical
name: Stealth Drone Swarm
description: 'You deploy a swarm of shadow-cloaked micro-drones throughout the area.
  The drones strike and weave, harming your foes and blocking their vision. Enemies
  in the area when you activate the tech take 6d8 bludgeoning, piercing, or slashing
  damage, with a @Check[reflex|basic|traits:illusion] or @Check[will|basic|traits:illusion]
  save, as the drone swarm materializes. You choose the damage type when you activate
  the tech, and each creature chooses the type of save it attempts before it rolls
  the save. The drones then persist in the area for 1 minute, dealing [[/r 3d8]] damage
  of the type you chose to any enemy that ends its turn in the area. All creatures
  are @UUID[Compendium.pf2e.conditionitems.Item.Concealed] to enemies in the area,
  as the drones block sensor feeds.

  A creature that spends an action to Seek or otherwise interact with the swarm can
  attempt a Perception check to disbelieve it. On a success, the creature halves the
  damage it takes from the drones, and they no longer impede its vision. These benefits
  last until the tech ends.Heightened (9th) The initial damage increases by 2d8, and
  the damage to a creature that ends its turn in the area increases by 1d8 ([[/r 4d8]]).'
tradition: technical
level: 7
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 6d4
    damage_type: bludgeoning
    dc: 0
  on_failure:
  - type: damage
    dice: 6d8
    damage_type: bludgeoning
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 12d8
    damage_type: bludgeoning
    dc: 0
