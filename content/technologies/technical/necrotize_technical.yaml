id: necrotize_technical
name: Molecular Decay Beam
description: 'You fire a beam that accelerates molecular decay in part of a creature''s
  body. The target takes 12d6 void damage and one of the following debilitations;
  roll [[/r 1d4]] to randomly determine which. The effects depend on its Fortitude
  save.


  Bones The target''s bones weaken, giving it weakness 3 to bludgeoning damage.

  Joints The target''s joints seize, making its movements ungainly. It becomes Clumsy
  1.

  Legs The target''s locomotion systems degrade, making it harder to move. The target
  takes a –10-foot status penalty to its Speeds. @UUID[Compendium.pf2e.spell-effects.Item.Spell
  Effect: Necrotize (Legs)]

  Muscles The target''s muscles deteriorate. The target becomes Enfeebled 1.



  Critical Success The target is unaffected.

  Success The target takes half damage and the debilitation lasts until the end of
  your next turn.

  Failure The target takes full damage and the debilitation lasts for 1 minute.

  Critical Failure The target takes double damage, and you can pick a second debilitation
  to apply, in addition to the one you rolled randomly. Both debilitations last for
  1 minute.


  Heightened (+1) The damage increases by 2d6.'
tradition: technical
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 12d3
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 12d6
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 24d6
    damage_type: void
    dc: 0
