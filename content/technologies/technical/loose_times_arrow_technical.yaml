id: loose_times_arrow_technical
name: Temporal Shift
description: You deploy a temporal displacement device that causes the target to phase
  out of time. The target disappears and then reappears in the same space (or the
  nearest unoccupied space) at the beginning of your next turn. It can't act while
  displaced. When it returns, it's unharmed.
