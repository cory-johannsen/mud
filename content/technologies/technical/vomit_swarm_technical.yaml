id: vomit_swarm_technical
name: Vomit Swarm
description: You belch forth a swarm of magical vermin. You evoke and shape the creatures from your own imagination, allowing you to change the appearance of the creatures (typically a mix of centipedes, roaches, wasps, and worms), but this doesn't change the effect of the spell. The vermin swarm over anyone in the area, their bites and stings dealing 2d8 piercing damage (basic Reflex save). A creature that fails its saving throw also becomes Sickened 1. Once the spell ends, the swarm disappears.Heightened (+1) The damage increases by 1d8.
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 2d4
          damage_type: piercing
          dc: 0
    on_failure:
        - type: damage
          dice: 2d8
          damage_type: piercing
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 4d8
          damage_type: piercing
          dc: 0
