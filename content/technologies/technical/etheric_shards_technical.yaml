id: etheric_shards_technical
name: Etheric Shards
description: You reach out and sow glittering splinters of force throughout the area, otherworldly caltrops of will and ectoplasm. The area is difficult terrain, even to flying or incorporeal creatures. Any creature that moves through the area takes 1d4 piercing damage per square traversed, with a basic Reflex save made at the end of each move action they take through the area.Heightened (+2) The spell's area increases by 5 feet, and the piercing damage increases by 1.
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: "1"
          damage_type: piercing
          dc: 0
    on_failure:
