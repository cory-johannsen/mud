id: uncontrollable_dance_technical
name: Uncontrollable Dance
description: |-
    The target is overcome with an all-consuming urge to dance. For the duration of the spell, the target is @UUID[Compendium.pf2e.conditionitems.Item.Off-Guard] and can't use reactions. While affected, the creature can't use move actions except to dance, using the Stride action to move up to half its Speed.

    Critical Success The target is unaffected.
    Success The spell's duration is 3 rounds, and the target must spend at least 1 action each turn dancing.
    Failure The spell's duration is 1 minute, and the target must spend at least 2 actions each turn dancing.
    Critical Failure The spell's duration is 1 minute, and the target must spend all its actions each turn dancing.
tradition: technical
level: 8
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
