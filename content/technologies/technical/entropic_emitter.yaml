id: entropic_emitter
name: Entropic Emitter
description: 'You deploy a device that imbues the touched object or space with slow-acting
  necrotic radiation. All mechanical effects (void damage, saves, durations) remain
  identical to the base protocol.


  Heightened (+2) Void damage increases by 1d6.'
tradition: technical
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d3
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 2d6
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d6
    damage_type: void
    dc: 0
