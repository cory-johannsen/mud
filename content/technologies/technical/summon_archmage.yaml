id: summon_archmage
name: Summon Archmage
description: |-
    You briefly call forth the spirit of a legendary wizard from ages long past, which manifests as an immense humanoid figure (typically an elf or a human). The archmage occupies the space of a Large creature and has a Speed of 60 feet.
    Arrive (evocation, force) Archmage's Amplification The archmage arrives in a fierce burst of magical force, automatically dealing 3d4+3 force damage to up to 5 creatures it chooses within 100 feet of it. Like @UUID[Compendium.pf2e.spells-srd.Item.Force Barrage], this can be blocked by the @UUID[Compendium.pf2e.spells-srd.Item.Shield] spell. The archmage also feeds magical power into some spells. Beneficial spells last longer due to the archmage's influence. When the remaining duration of a beneficial spell affecting you or one of your allies would decrease (usually at the start of the caster's turn), it doesn't decrease if the subject of the spell is within 100 feet of the archmage. This applies only if the spell's maximum duration was 3 rounds or longer.
    Depart (abjuration) Archmage's Rebuke The archmage drains the magic from your foes. Each of your enemies within 100 feet of the archmage must attempt a Will save. On a failure, the creature is Stupefied 2 for 1 round, and if it's currently benefiting from any spells of a lower level than summon archmage, the archmage can choose any one of them and end the spell.
tradition: technical
level: 8
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 3d4+3
          damage_type: force
          dc: 0
    on_failure:
        - type: damage
          dice: 3d4+3
          damage_type: force
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 3d4+3
          damage_type: force
          dc: 0
