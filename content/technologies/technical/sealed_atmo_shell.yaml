id: sealed_atmo_shell
name: Sealed Atmo-Shell
description: 'You deploy a sealed atmospheric shell around the target. The shell enables
  breathing in any environment including vacuum, protects from severe cold and heat,
  and grants a +1 status bonus to saves against inhaled dangers.


  Upgraded (7th) The bonus increases to +2, and the shell grants resistance 5 to
  cold and fire.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 1
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You create a replenishing protective bubble of fresh, temperate air
      around the target. The shell of air enables the target to breathe even underwater
      or in a vacuum, protects from severe cold and heat
