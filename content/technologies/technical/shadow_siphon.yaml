id: shadow_siphon
name: Shadow Siphon
description: 'You deploy a shadow-extraction device that tears at the target''s vitality. The target takes 4d4 void damage and must attempt a Grit check.


  Critical Success The target is unaffected.

  Success The target takes half damage.

  Failure The target takes full damage and is Enfeebled 1 for 1 round.

  Critical Failure The target takes double damage and is Enfeebled 2 for 1 minute.'
