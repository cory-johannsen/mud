id: final_fate_of_the_locust_host_technical
name: Drone Swarm Apocalypse
description: 'You deploy a massive autonomous drone swarm onto the battlefield—a churning
  cloud of weaponized micro-drones that function as a single horrific entity. The
  swarm occupies the space of a Gargantuan creature, bristling with cutting implements
  and toxic payloads whose collective movement grants it a Speed of 60 feet and a
  fly Speed of 60 feet.

  Arrive Behold the Swarm The drone cloud is deafeningly loud and horrifically dangerous,
  emitting acrid electrical smoke and constantly shifting as millions of drones operate
  within it. Each living enemy creature within a @Template[type:emanation|distance:60]
  must attempt a Toughness save with the following effects.Critical Success The creature
  is unaffected.

  Success The creature is Sickened 2.

  Failure The creature is Sickened 3 and @UUID[Compendium.pf2e.conditionitems.Item.Deafened]
  for the duration.

  Critical Failure The creature is Sickened 4, Stunned 1, and deafened for the duration.Depart
  (poison) Swarm Dispersal The millions of drones pour out and surge across the battlefield,
  shredding your enemies. This swarm deals 5d8 piercing damage and 5d8 poison damage
  to enemy creatures in a @Template[type:emanation|distance:60] with a basic Reflex
  save. A creature that critically fails is additionally Drained 2.'
tradition: technical
level: 7
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
