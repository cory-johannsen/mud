    dice: 5d4
    damage_type: piercing
    dc: 0
  - type: damage
    dice: 5d4
    damage_type: poison
    dc: 0
  on_failure:
  - type: damage
    dice: 5d8
    damage_type: piercing
    dc: 0
  - type: damage
    dice: 5d8
    damage_type: poison
    dc: 0
  on_crit_failure:
