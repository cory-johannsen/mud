id: pocket_dimension_resort
name: Pocket Dimension Resort
description: 'You open a gateway to a hidden pocket dimension server room, accessible only to you and your allies through a dense cloud of holographic interference. You and the other targets within range are transported through this interference into an extradimensional luxury resort of simulated environments. Creatures within this resort don''t need to eat or drink. For each minute you spend within this resort, all creatures within experience the benefits of 24 hours passing, gaining the healing benefits of a full night''s rest, as well as the elapse of any afflictions or spells with day-long intervals. However, for any afflictions or spells with intervals measured in shorter periods of time, only one of those intervals passes for every minute spent within the resort. This means that at the end of a minute, a creature can attempt a saving throw against a disease whose interval is 1 day, a poison whose interval is 1 minute, and a harmful spell that allows a saving throw each round. Each saving throw attempted while within the resort gains a +4 status bonus.

  You and your allies can act normally while within the resort and can use the time to cast spells, Refocus, or perform other exploration activities that take less than 10 minutes. When the tech ends, you and all other targets depart the resort, returning through the interference to your previous locations or in the nearest unoccupied spaces. You can Dismiss this tech.'
tradition: technical
level: 8
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: condition
    condition_id: hidden
    value: 1
