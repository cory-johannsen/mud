id: cognitive_disruptor_beam
name: Cognitive Disruptor Beam
description: 'You fire a beam that scrambles a creature''s cognitive functions and sensory processing. The target must attempt a Will saving throw. Regardless of the result of that save, the target is then temporarily immune for 10 minutes. The disruptor''s effects happen instantly, so @UUID[Compendium.pf2e.spells-srd.Item.Dispel Magic] and other effects that counteract tech can''t counteract them. However, Wish rituals and abilities that can remove non-technological effects can still counteract the effects.


  Critical Success The target is unaffected.

  Success The target spends the first action on its next turn with the Confused condition.

  Failure The target is Confused for 1 minute.

  Critical Failure The target is Confused permanently.'
tradition: technical
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You scramble a creature's mental faculties and sensory input. The target must attempt a Will saving throw. Regardless of the result of that save, the target is then temporarily immune for 10 minutes.
