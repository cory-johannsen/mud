id: confusion_technical
name: Logic Bomb Module
description: 'You deploy a device that scrambles the target''s decision-making processes
  with contradictory signals, causing random behavior. The effects are determined
  by the target''s Willpower save. All mechanical effects (stunned, confused, duration)
  remain identical to the base protocol.


  Heightened (8th) You can target up to 10 creatures.'
