id: remote_mic_drone
name: Remote Mic Drone
description: You deploy an invisible micro-drone with a high-sensitivity microphone
  to a location within range, even outside line of sight. You can hear through the
  drone's feed. Sustain to maintain the connection.
tradition: technical
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You create an Invisible
      floating ear at a location within range (even if it's outside your line of sight
      or line of effect). It can't move, but you can hear
