id: splinter_volley_technical
name: Splinter Volley
description: You launch a volley of splinters at your foes. Make a spell attack roll against a single creature. On a hit, the splinters deal 4d6 piercing damage. The splinters deal double damage on a critical hit and @Damage[(floor(@item.level/2))[bleed]] damage. You can spend a third action while casting this spell to fire splinters at two different targets instead of one. These attacks each increase your multiple attack penalty, but you don't increase your multiple attack penalty until after you make both spell attack rolls for splinter volley.Heightened (+2) Increase the damage dealt to each target by 4d6 and the persistent bleed damage by 1.
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: attack
effects:
    on_hit:
        - type: damage
          dice: 4d6
          damage_type: piercing
          dc: 0
    on_crit_hit:
        - type: damage
          dice: 8d6
          damage_type: piercing
          dc: 0
