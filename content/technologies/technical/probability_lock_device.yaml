id: probability_lock_device
name: Probability Lock Device
description: You deploy a device that pre-calculates a future outcome with quantum
  certainty. Before the duration ends, if you would attempt a relevant roll, you can
  attempt it at mythic proficiency. You choose which roll before rolling. If used,
  the spell ends. Temporarily immune for 1 hour afterward.
tradition: technical
level: 4
usage_type: prepared
action_cost: 1
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You envision a future for yourself, confident in the certainty that
      this vision is your destiny. Before the duration ends, if you would attempt
      an attack roll, Perception check, saving throw, or skill
