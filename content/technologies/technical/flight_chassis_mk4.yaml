id: flight_chassis_mk4
name: Flight Chassis Mk4
description: 'You deploy an advanced hardlight exoskeleton that reconfigures into
  a Medium flight-capable combat frame. When you activate this device, choose a configuration.
  While in this form, you gain the construct trait. You can Dismiss the spell.

  All statistics and form options (Bat, Bird, Pterosaur, Wasp configurations) remain
  identical to the base protocol.


  Upgraded (5th) Your form is Large, fly Speed gains +10-foot status bonus. Must
  have space to expand or the spell is lost. 10 temporary HP, attack modifier +18,
  damage bonus +8, Acrobatics +20.

  Upgraded (6th) Your form is Huge, fly Speed gains +15-foot, attacks have 10-foot
  reach. Must have space. AC = 21 + your level, 15 temporary HP, attack modifier +21,
  damage bonus +4 and double damage dice, Acrobatics +23.'
