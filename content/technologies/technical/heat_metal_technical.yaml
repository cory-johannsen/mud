id: heat_metal_technical
name: Heat Metal
description: |-
    This spell heats the targeted metal to become red-hot for a moment. This is usually harmless to an unattended metal item, which doesn't get a saving throw, though the GM might rule that flammable materials connected to the object catch fire or melt. If you target an item worn or carried by a creature, or you target a creature made primarily of metal, the heat deals @Damage[4d6[fire]] damage and @Damage[2d4[persistent,fire]] damage to the creature, which must attempt a Reflex saving throw.
    If you target an item held by the creature, the creature can @UUID[Compendium.pf2e.actionspf2e.Item.Release] the item to improve their degree of success by one step from the result of their saving throw. The persistent damage is associated with the object and damages whichever creature is holding or wearing it. It has no effect if no one is holding the item, but you continue to attempt flat checks to end the persistent damage as normal, since the item remains hot and can sear someone who picks it up.

    Critical Success The creature is unaffected.
    Success The creature takes half damage and the object deals no persistent fire damage.
    Failure The creature takes full damage and the object deals full persistent damage.
    Critical Failure As failure, but the creature takes double damage and the object deals double persistent damage.

    Heightened (+1) The initial damage increases by 2d6 and the persistent damage increases by 1d4.
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 4d3
          damage_type: fire
          dc: 0
        - type: damage
          dice: "2"
          damage_type: fire
          dc: 0
    on_failure:
        - type: damage
          dice: 4d6
          damage_type: fire
          dc: 0
        - type: damage
          dice: 2d4
          damage_type: fire
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 8d6
          damage_type: fire
          dc: 0
        - type: damage
          dice: 4d4
          damage_type: fire
          dc: 0
