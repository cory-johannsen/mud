id: tunnel_borer
name: Tunnel Borer
description: You deploy a precision boring device that carves a visible tunnel through
  a wall. If the wall is thicker than 10 feet, the tunnel ends 10 feet in. Even a
  small layer of reinforced metal prevents this tech from functioning. This tech doesn't
  reduce the structural integrity of the wall.
