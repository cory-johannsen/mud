id: shrink_item
name: Item Shrink Module
description: You compress the target item to coin-size with negligible Bulk. You can
  Dismiss the spell. The item returns to normal size if tossed onto a solid surface
  from at least 10 feet or when the duration expires.
tradition: technical
level: 3
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You shrink the target to roughly the size of a coin with negligible
      Bulk. You can Dismiss the spell, and the spell ends if you toss the object onto
      a solid surface. The object can't be used to attack
