id: system_purge
name: System Purge
description: 'You activate a targeted system purge that forces the target back to
  its origin point. The target must attempt a Willpower save. You can spend an extra action
  and add a specialized component to give a -2 circumstance penalty to the save.


  Critical Success The target is unaffected.

  Success The target takes 2d6 mental damage.

  Failure The target is returned to its home plane. If already there, it''s stunned
  and takes 4d6 mental damage.

  Critical Failure As failure, and the target can''t return for 1 week.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
