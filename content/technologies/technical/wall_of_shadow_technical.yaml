id: wall_of_shadow_technical
name: Wall of Shadow
description: |-
    You form a wall of pure darkness in a straight line up to 60 feet long and 10 feet high. You must create the wall in an unbroken open space so its edges don't pass through any creatures or objects, or the spell is lost. The wall stands vertically and, if you wish, can be of a shorter length or height. The wall prevents light from passing through and appears as a sheet of pure darkness to creatures observing it.
    Creatures without darkvision or those unable to see through darkness can't see creatures on the other side of the wall. The wall is too thin for creatures to @UUID[Compendium.pf2e.actionspf2e.Item.Hide] in the darkness itself, but creatures can Hide from creatures on the other side of the wall as normal.Heightened (5th) Creatures with darkvision (but not greater darkvision) can barely see through the wall. They treat targets seen through the wall as @UUID[Compendium.pf2e.conditionitems.Item.Concealed].
    Heightened (7th) Creatures with greater darkvision can barely see through the darkness. They treat targets seen through the wall as concealed. All other creatures are unable to see through the darkness at all.
tradition: technical
level: 3
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: minutes:1
resolution: none
