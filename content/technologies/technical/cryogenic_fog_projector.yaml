id: cryogenic_fog_projector
name: Cryogenic Fog Projector
description: 'You deploy a cryogenic fog projector that fills the area with bone-chilling mist. This has the effects of Mist, except that you can Sustain the spell once per round to move the fog up to 10 feet. A creature that starts its turn in the area takes 6d8 cold damage with a basic Toughness save. A creature that fails its save is also Clumsy 1 for 1 minute (Clumsy 2 on a critical failure) and takes a –10-foot status penalty to Speeds for as long as it''s clumsy.

  @UUID[Compendium.pf2e.spell-effects.Item.tech Effect: Frozen Fog]Heightened (+2) The damage increases by 3d8.'
tradition: technical
level: 6
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 6d4
    damage_type: cold
    dc: 0
  on_failure:
  - type: damage
    dice: 6d8
    damage_type: cold
    dc: 0
  on_crit_failure:
