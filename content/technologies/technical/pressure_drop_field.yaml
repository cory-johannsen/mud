id: pressure_drop_field
name: Pressure Drop Field
description: 'Air pressure drops precipitously in the area, causing pain in creatures'' ears and joints. Each living creature must attempt a Toughness save.


  Critical Success Unaffected.

  Success Sickened 1.

  Failure Sickened 2 and Deafened for 1 round.

  Critical Failure Sickened 3, Deafened for 1 minute, and takes 4d6 bludgeoning damage.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 4d6
    damage_type: bludgeoning
  - &id001
    type: condition
    condition_id: nausea
    value: 1
  on_crit_failure:
  - type: damage
    dice: 8d6
    damage_type: bludgeoning
  - *id001
