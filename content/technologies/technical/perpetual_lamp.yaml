id: perpetual_lamp
name: Perpetual Lamp
description: You install a perpetual light emitter in the area. It sheds bright light
  in a 60-foot radius (and dim light for the next 60 feet). If you cast this on an
  area that already has an everlight, the previous one is suppressed.
