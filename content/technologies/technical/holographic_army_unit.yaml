id: holographic_army_unit
name: Holographic Army Unit
description: 'You deploy mass-scale holographic projectors to create the illusion of a much larger force. Your projectors create up to three illusory Gargantuan duplicates of troops within range. You can program the illusion with a basic task such as standing in formation, marching, or mimicking guard movements; however, the illusion can''t perform any actual tasks and can''t create intelligible sounds. If you and any of the illusory troops are ever farther than 500 feet apart, the spell ends.

  An illusory troop''s AC is equal to your tech DC. Its saving throws modifiers are equal to your tech DC – 10. If an illusory troop is hit by an attack or fails a save, you must attempt a Grit check (DC 11). On success, the illusion of that troop is destroyed. On failure, the entire illusion shatters.Upgraded (8th) The DC of the is lowered to 8 (Grit check (DC 8)), and you can create up to five illusory troops.'
tradition: technical
level: 6
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
resolution: none
