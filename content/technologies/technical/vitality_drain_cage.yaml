id: vitality_drain_cage
name: Vitality Drain Cage
description: You deploy a hard-light restraint cage that materializes around the target
  and siphons its vitality for your gain. Deals 4d4 piercing and 4d4 void damage,
  target attempts Grit check. You gain temporary HP equal to void damage taken.
  All mechanical effects (immobilized, escape) remain identical.Upgraded (+1) Piercing
  and void damage +1d4 each.
