id: remote_surveillance_drone
name: Remote Surveillance Drone
description: 'You deploy a remote surveillance probe on a creature of your choice. This works like Clairvoyance, except that the feed is less precise, insufficient for teleport and similar effects. Instead of creating a sensor in a set location within 500 feet, you create a sensor that manifests just above the target. You can choose a target either by name or by touching one of its possessions or a piece of its body. If you haven''t met the target in person, the DC is 2 lower, and if you are unaware of the target''s identity, the DC is instead 10 lower.

  The effect depends on the target''s Willpower save.


  Critical Success The spell fails and the target is temporarily immune for 1 week. The target also gains a glimpse of you and learns its rough distance and direction from you.

  Success The spell fails and the target is temporarily immune for 1 day.

  Failure The spell succeeds.

  Critical Failure The spell succeeds, and the sensor follows the target if it moves, traveling up to 60 feet per round.'
tradition: technical
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
