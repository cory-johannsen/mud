id: ravenous_portal_technical
name: Mimic Mine
description: You deploy a disguised security device on a door that triggers when someone
  attempts to open, unlock, or destroy it. When triggered, the door transforms into
  a hostile automated defense system that attacks for up to 1 minute. You designate
  up to 10 creatures that don't trigger the ward. While active, the door can't be
  opened. When the spell ends, the door returns to its prior state.
