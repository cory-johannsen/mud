id: awaken_entropy_technical
name: Awaken Entropy
description: |-
    All things age, all things die, and at the end of days, even the universe will grow quiet and still. You awaken the cosmic principle of entropy, accelerating time in an area—flesh falters, plants shrivel, and even stone begins to crumble. Any creature that enters or begins its turn in the area takes 8d6 void damage with a basic Fortitude save, or 8d6 force damage if the creature normally doesn't take void damage, such as if the creature is a construct or undead. Even beings such as fiends with unlimited lifespans can be worn away by entropy.
    The first time you Sustain the Spell on each subsequent turn, the entropic zone grows stronger in addition to having its duration increased. The radius of the burst increases by 10 feet (to a maximum of 40 feet), and the size of the damage dice increases by one step (from d6 to @Damage[(2+@item.rank)d8[void]|shortLabel], then to @Damage[(2+@item.rank)d10[void]|shortLabel], and finally to @Damage[(2+@item.rank)d12[void]|shortLabel]).Heightened (+1) The damage increases by 1d6.
tradition: technical
level: 6
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 8d3
          damage_type: void
          dc: 0
    on_failure:
        - type: damage
          dice: 8d6
          damage_type: void
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 16d6
          damage_type: void
          dc: 0
