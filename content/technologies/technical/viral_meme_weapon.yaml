id: viral_meme_weapon
name: Viral Meme Weapon
description: 'You broadcast a psycho-active data meme that infects a target with uncontrollable laughter, spreading to those nearby. The first time you Sustain each round, you can target another creature within 30 feet of an affected target.


  Each target must attempt a Willpower save.


  Critical Success Unaffected and immune for 1 hour.

  Success Unaffected.

  Failure Slowed 1 and can''t use reactions.

  Critical Failure Falls Prone, Slowed 1, and can''t use reactions.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: slowed
    value: 1
  - &id002
    type: condition
    condition_id: prone
    value: 1
  on_crit_failure:
  - *id001
  - *id002
