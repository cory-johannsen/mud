id: disguise_module_set
name: Disguise Module Set
description: 'You deploy four holographic disguise modules, each storing a single
  identity profile. As an Interact action, activate or deactivate a module. When active,
  it projects a complete holographic disguise including altered voice and scent. Hides
  identity but doesn''t impersonate specific individuals.

  First activation sets the appearance. Deception check at mythic proficiency. One
  module at a time. Deactivating reverts. Modules given to others cease functioning.'
