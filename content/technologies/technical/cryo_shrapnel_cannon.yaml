id: cryo_shrapnel_cannon
name: Cryo-Shrapnel Cannon
description: 'You fire a cryo-round that flash-freezes ambient moisture into a flurry
  of jagged ice shards. The flurry deals 9d6 cold damage and 9d6 slashing damage to
  all foes, with a basic Reflex save, but the blast pattern flows harmlessly around
  your allies. The recoil carries you to the other end of the area; though your movement
  can still trigger reactions, the storm of ice crystals prevents you from being affected
  by any effects, except for those that would counteract the tech or that the GM decides
  would affect frozen material.


  Heightened (+1) The cold and slashing damage each increase by 1d6.'
tradition: technical
level: 7
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 9d3
    damage_type: cold
    dc: 0
  - type: damage
    dice: 9d3
    damage_type: slashing
    dc: 0
  on_failure:
  - type: damage
    dice: 9d6
    damage_type: cold
    dc: 0
  - type: damage
    dice: 9d6
    damage_type: slashing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 18d6
    damage_type: cold
    dc: 0
  - type: damage
    dice: 18d6
    damage_type: slashing
    dc: 0
