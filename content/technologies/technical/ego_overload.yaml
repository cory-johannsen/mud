id: ego_overload
name: Ego Overload
description: 'Elegant holographic flames of incredible beauty coruscate across the target''s body, overloading their threat-assessment systems with overconfidence. The target attempts a Willpower save.


  Critical Success The target is unaffected.

  Success The target sheds bright light in a 20-foot emanation and becomes Dazzled for 1 round.

  Failure Sheds light, is Dazzled for 1 minute, and takes a -2 status penalty to AC.

  Critical Failure As failure, and also Fascinated by itself.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: dazzled
    value: 1
  on_crit_failure:
  - *id001
