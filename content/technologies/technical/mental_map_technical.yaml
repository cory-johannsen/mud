id: mental_map_technical
name: Sonar Mapper
description: You deploy a sonar mapping device that scans the surrounding area. You
  gain a detailed image of all rooms, corridors, and passages within 60 feet, including
  hidden doors (though not how to open them). This doesn't reveal creatures or hazards.
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You glean detailed information about a specific place visited by
      a creature directly from its mind, unless it fends you off with a Willpower save.
