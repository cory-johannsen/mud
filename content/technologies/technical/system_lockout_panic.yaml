id: system_lockout_panic
name: System Lockout Panic
description: 'You broadcast an emergency alert into the target''s neural interface,
  convincing them they''ve missed a critical system deadline. Sensations of overwhelming
  panic flood the target, dealing 12d6 mental damage. The target must attempt a Will
  save.Critical Success The alert is dismissed immediately without effect.

  Success The target takes half damage and is Frightened 1.

  Failure The target takes full damage and becomes Frightened 2. In addition, the
  target is Slowed 1 for as long as they remain frightened.

  Critical Failure The target takes double damage and becomes Frightened 3. In addition,
  the target is slowed 1 for as long as they remain frightened.Upgraded (+1) The
  damage increases by 2d6.'
tradition: technical
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 12d3
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 12d6
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 24d6
    damage_type: mental
    dc: 0
