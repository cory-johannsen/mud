id: befitting_attire_technical
name: Holo-Wardrobe
description: You deploy holographic projectors that reshape the targets' clothing
  and worn items into ones suitable for a particular occasion. The illusion adjusts
  dynamically as the targets change posture or position. Any creature that touches
  the holographic clothes or Seeks realizes they're fake with a successful Perception
  check against your tech DC.
