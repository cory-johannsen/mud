id: antimagic_field_technical
name: EMP Suppression Dome
description: 'You deploy a wide-spectrum electromagnetic pulse dome that renders all
  technology inert within the target area, preventing tech and other powered systems
  from functioning. Tech can''t penetrate the area, augmented implants cease to function
  within it, and no one inside can activate tech abilities, including yourself. Likewise,
  countermeasures - such as @UUID[Compendium.pf2e.spells-srd.Item.Dispel Magic] -
  can''t affect the field itself unless they are of a higher level. Tech effects resume
  the moment they pass outside the field. For example, a beam fired from one side
  of the field could target a creature on the other side (as long as caster and target
  are both outside the field). A summoned construct winks out of existence but reappears
  if the field moves or ends. Invested tech items cease to function, but they remain
  invested and resume functioning when they exit the field; the ability boost from
  an apex item isn''t suppressed within the field. Tech of a higher rank than the
  suppression dome overcomes its effects, and can even be activated by a creature
  within the field.

  The field disrupts only technology, so a +3 longsword still functions as a longsword.
  Artificially created constructs (such as golems) function normally within an EMP
  suppression dome.'
tradition: technical
level: 8
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You repel all magic from the target area, preventing spells and other
      magic from functioning. Spells can't penetrate the area, magic items cease to
      function within it, and no one inside can cast spell
