id: mercurial_stride_technical
name: Liquid Metal Rush
description: 'You activate a device that partially converts your body to liquid metal
  form. You Stride up to twice your speed and can pass through one creature''s space,
  exposing it to heavy metal toxicity (Fortitude save). All mechanical effects (sickened,
  poison damage) remain identical to the base protocol.


  Heightened (+1) Damage increases by 1d6 on failure and 2d6 on critical failure.'
tradition: technical
level: 4
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 6d3
    damage_type: poison
    dc: 0
  on_failure:
  - type: damage
    dice: 6d6
    damage_type: poison
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 12d6
    damage_type: poison
    dc: 0
