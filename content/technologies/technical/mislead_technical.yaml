id: mislead_technical
name: Cloak and Decoy System
description: 'You activate a cloaking device rendering yourself @UUID[Compendium.pf2e.conditionitems.Item.Invisible]
  while simultaneously deploying a holographic decoy. When you Sustain the spell,
  you can mentally program the decoy''s actions for that round. Your decoy acts as
  though it had your full number of actions, though it can''t actually affect anything
  in the environment. Both the decoy and your invisibility persist for the spell''s
  duration. Performing a hostile action doesn''t end the invisibility, just like a
  4th-rank @UUID[Compendium.pf2e.spells-srd.Item.Invisibility] spell. A creature that
  determines the decoy is fake doesn''t necessarily know you''re invisible, and one
  that can see your invisible form doesn''t necessarily know the decoy is a projection.

  If you Cast a tech, attack, or otherwise interact with another creature, as a part
  of that action you can attempt a Deception check against observers'' Perception
  DCs to convince them your decoy used that action. This doesn''t fool anyone who''s
  aware the decoy is fake, nor does it work if the attack obviously couldn''t have
  come from the decoy.'
tradition: technical
level: 6
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
