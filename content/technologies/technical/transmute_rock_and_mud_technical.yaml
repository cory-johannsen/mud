id: transmute_rock_and_mud_technical
name: Transmute Rock And Mud
description: |-
    Area 2 adjacent 10-foot cubes
    You warp the structure of earthen material, turning rock into mud or mud into rock. Choose one of these two options when you Cast the Spell.

    Rock to Mud You transform non-magical, unworked, and unattended stone in the area into an equal volume of mud. If you Cast this Spell on a stone floor, it becomes difficult terrain; if the resulting mud is at least 3 feet deep, it is greater difficult terrain, or the creature can try to @UUID[Compendium.pf2e.actionspf2e.Item.Swim] through it (@Check[athletics|dc:10|traits:action:swim]). If the mud is deep enough that a creature can't reach the bottom, the creature must Swim to move through it. If you Cast this Spell on a ceiling, the falling mud deals @Damage[8d6[bludgeoning]] damage (@Check[reflex|basic] save) and spreads out, creating difficult terrain in an area 10 feet larger in radius than the original spell's area. Once the rock is transformed into mud, the mud is non-magical and remains until natural conditions cause it to dry out or otherwise disperse.
    Mud to Rock Mud in the area turns into unworked stone. If creatures are in the mud when it is transformed to stone, they must attempt a @Check[reflex] saving throw.

    Critical Success The creature escapes the mud and is atop the stone, unaffected.
    Success The creature climbs out of the mud as it turns to rock and is @UUID[Compendium.pf2e.conditionitems.Item.Prone] atop the stone.
    Failure The creature is partially stuck in the mud and is @UUID[Compendium.pf2e.conditionitems.Item.Grabbed] for 1 round or until it Escapes, whichever comes first.
    Critical Failure The creature is entirely stuck. It is @UUID[Compendium.pf2e.conditionitems.Item.Restrained] for 1 round or until it Escapes, whichever comes first.




    Heightened (+2) Add an additional 10-foot cube to the area, adjacent to at least one of the other cubes.
