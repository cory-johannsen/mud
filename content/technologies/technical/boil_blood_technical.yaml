id: boil_blood_technical
name: Microwave Blood Heater
description: 'You activate a directed microwave emitter that superheats the target''s
  blood within its veins. The target takes 10d10 fire damage, with a Toughness save.
  A nonliving creature with blood in its body (such as a vampire) can be affected,
  but a creature with no blood is immune.


  Critical Success The target is unaffected.

  Success The target takes half damage.

  Failure The target takes full damage and is Drained 2.

  Critical Failure The target takes double damage and is Drained 3.


  Heightened (+1) The damage increases by 1d10.'
tradition: technical
level: 8
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 10d6
    damage_type: fire
    dc: 0
  on_failure:
  - type: damage
    dice: 10d10
    damage_type: fire
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 20d10
    damage_type: fire
    dc: 0
