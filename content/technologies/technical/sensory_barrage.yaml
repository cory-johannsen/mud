id: sensory_barrage
name: Sensory Barrage
description: 'You deploy a barrage of simulated explosions, tracer rounds, and weapon discharges as an overwhelming torrent of sensory data. Enemies in the area must attempt a Willpower save.

  Critical Success Unaffected.

  Success Frightened 1.

  Failure Frightened 2.

  Critical Failure Frightened 3 and Fleeing for 1 round.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: rounds:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: frightened
    value: 1
  - &id002
    type: condition
    condition_id: fleeing
    value: 1
  on_crit_failure:
  - *id001
  - *id002
