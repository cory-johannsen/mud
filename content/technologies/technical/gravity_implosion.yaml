id: gravity_implosion
name: Gravity Implosion
description: You collapse the gravity field around a target. It must attempt a Fortitude
  save. On a failure it takes 75 force damage. On a critical failure it is annihilated
  at 0 HP. Usable once per round for 1 minute.
tradition: technical
level: 9
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: toughness
save_dc: 15
