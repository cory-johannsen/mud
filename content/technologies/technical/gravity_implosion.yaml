    dice: '75'
    damage_type: untyped
    dc: 0
  on_failure:
  - type: damage
    dice: '75'
    damage_type: untyped
    dc: 0
  on_crit_failure:
  - type: damage
    dice: '75'
    damage_type: untyped
    dc: 0
