id: charitable_urge_technical
name: Generosity Hack
description: 'You hack the target''s decision-making circuits to induce an overwhelming
  urge to give away possessions. The target must attempt a Will save.


  Critical Success The creature is unaffected.

  Success The creature must spend its first action on its next turn presenting one
  of its possessions to the nearest creature. It can choose which possession.

  Failure As success, but the creature must present its most valuable accessible possession.

  Critical Failure As failure, and the creature also becomes @UUID[Compendium.pf2e.conditionitems.Item.Stupefied]
  1 for 1 round.'
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You speak on the virtue of charity, compelling the target to give
      away its possessions. The target must attempt a Will save. If the target has
      no items on its person, the spell fails.Critical Success
