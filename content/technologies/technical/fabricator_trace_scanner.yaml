id: fabricator_trace_scanner
name: Fabricator Trace Scanner
description: You analyze the remains or energy residue of a destroyed construct to
  locate its creator. If within range, you sense the direction. If within 100 feet,
  you sense their presence. EM shielding and running water block the scan. Fails if
  no specific creator exists or they're on a different plane.
