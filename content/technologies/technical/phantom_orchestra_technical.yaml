id: phantom_orchestra_technical
name: Sonic Emitter Array
description: 'You deploy an array of sonic emitters that project devastating frequency
  bursts at targeted locations.

  When you Cast the Spell, a concentrated sonic burst detonates in a space you choose
  within range. On subsequent rounds, the first time you Sustain the Spell each round,
  you can reposition the array and trigger another burst.

  Each burst deals 8d6 sonic damage to all creatures in a 10-foot burst (basic Fortitude
  save). The array doesn''t take up space, grant flanking, or have any other attributes
  a creature would.


  Heightened (+1) The damage increases by 1d6.'
tradition: technical
level: 6
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d3
    damage_type: sonic
    dc: 0
  on_failure:
  - type: damage
    dice: 8d6
    damage_type: sonic
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d6
    damage_type: sonic
    dc: 0
