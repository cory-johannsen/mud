id: temporal_dampener
name: Temporal Dampener
description: 'You activate a temporal dampening field that slows the flow of time in the area. Any creature that begins its turn in the area must attempt a Willpower save.

  Success Unaffected.

  Failure Slowed 1 for 1 round.

  Critical Failure Slowed 2 for 1 round.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: slowed
    value: 1
  on_crit_failure:
  - *id001
