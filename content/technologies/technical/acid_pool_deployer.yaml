id: acid_pool_deployer
name: Acid Pool Deployer
description: 'Area all squares in two 10-foot bursts

  You deploy two pools of industrial acid that hinder movement. The area of each pool
  becomes greater difficult terrain. Each round that a creature starts its turn in
  a pool or enters one, it takes 4d6 acid damage with a basic Grit check.


  Upgraded (+2) The damage increases by 1d6.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
