id: ignite_fireworks_technical
name: Fireworks Launch Module
description: 'You fire pyrotechnic flares that explode in a brilliant display. Each
  creature in a @Template[burst|distance:10] takes 1d8 fire damage and 1d8 sonic damage
  with a basic Reflex save. On a failure, a creature is also @UUID[Compendium.pf2e.conditionitems.Item.Dazzled]
  for 1 round.


  Heightened (+1) The fire and sonic damage each increase by 1d8.'
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 1d4
    damage_type: fire
    dc: 0
  - type: damage
    dice: 1d4
    damage_type: sonic
    dc: 0
  on_failure:
  - type: damage
    dice: 1d8
    damage_type: fire
    dc: 0
  - type: damage
    dice: 1d8
    damage_type: sonic
    dc: 0
  on_crit_failure:
