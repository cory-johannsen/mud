id: summon_legacy_ai
name: Summon Legacy AI
description: 'You briefly activate a legacy artificial intelligence from ages long past, which manifests as an immense holographic humanoid figure. The AI occupies the space of a Large creature and has a Speed of 60 feet.

  Arrive (evocation, force) Archmage''s Amplification The AI arrives in a fierce burst of computational force, automatically dealing 3d4+3 force damage to up to 5 creatures it chooses within 100 feet of it. Like Force Barrage, this can be blocked by the Shield spell. The AI also feeds processing power into some tech. Beneficial tech lasts longer due to the AI''s influence. When the remaining duration of a beneficial tech affecting you or one of your allies would decrease (usually at the start of the caster''s turn), it doesn''t decrease if the subject of the tech is within 100 feet of the AI. This applies only if the tech''s maximum duration was 3 rounds or longer.

  Depart (abjuration) Archmage''s Rebuke The AI drains the processing power from your foes. Each of your enemies within 100 feet of the AI must attempt a Willpower save. On a failure, the creature is Stupefied 2 for 1 round, and if it''s currently benefiting from any tech of a lower level than summon legacy AI, the AI can choose any one of them and end the tech.'
tradition: technical
level: 8
