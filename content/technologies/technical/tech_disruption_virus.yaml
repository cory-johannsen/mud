id: tech_disruption_virus
name: Tech Disruption Virus
description: 'You upload a disruptive virus that causes any active technological enhancements to malfunction. The target must attempt a Willpower save.


  Critical Success The target is unaffected.

  Success Whenever the target becomes affected by a spell with a duration, the target takes 2d12 persistent force damage. Each time it takes persistent force damage from the virus, it reduces the remaining duration of spells affecting it by 1 round. Only a successful Arcana save check against your tech DC can help the target recover from the persistent damage; the curse and the persistent damage end after 1 minute.

  Failure As success, but the curse and persistent damage do not end on their own.

  Critical Failure As failure, but the persistent force damage is 4d12 persistent force.'
tradition: technical
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 2d12
    damage_type: force
    persistent: true
  - type: damage
    dice: 4d12
    damage_type: force
    persistent: true
  on_crit_failure:
  - type: damage
    dice: 2d12
    damage_type: force
    persistent: true
  - type: damage
    dice: 4d12
    damage_type: force
    persistent: true
