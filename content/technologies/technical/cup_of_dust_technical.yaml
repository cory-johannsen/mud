id: cup_of_dust_technical
name: Cup of Dust
description: |-
    You curse the target with a thirst no drink can quench. You can Dismiss the spell. The target must attempt a Fortitude save.Critical Success The creature is unaffected and is temporarily immune for 1 hour.
    Success The creature is @UUID[Compendium.pf2e.conditionitems.Item.Fatigued] for 1 round.
    Failure The creature is immediately afflicted by thirst as if it hadn't had a drink in days. It becomes Fatigued and takes 1d4 damage each hour that can't be healed until it quenches its thirst. No amount of drinking can quench the creature's thirst during the spell's duration.
    Critical Failure As failure but the creature takes 2d4 damage each hour.Heightened (+3) The thirst becomes more unbearable, increasing the damage each hour by 1d4, or by 2d4 on a critical failure.
tradition: technical
level: 3
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
