id: sealant_spray
name: Sealant Spray
description: You coat the target in a waterproof sealant. The target and its equipment
  are completely waterproof for the duration.
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You prevent the target item from taking on water or becoming wet
      for the duration of the spell. The hydrophobic properties of the spell also
      grant resistance 10 to acid and a +2 bonus to saves and DCs
