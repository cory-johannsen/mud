id: data_crystal
name: Data Crystal
description: 'You encode data into a crystalline storage medium. This memory can convey
  up to 10 minutes of material. When you activate this tech, choose a command phrase.
  Any creature can access the stored data by speaking the command phrase while holding
  the crystal.


  Upgraded (6th) The data can convey up to 1 hour of material.'
