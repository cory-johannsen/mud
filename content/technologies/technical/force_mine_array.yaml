id: force_mine_array
name: Force Mine Array
description: 'You scatter glittering shards of force energy throughout the area, creating
  invisible caltrops. The area is difficult terrain, even to flying or incorporeal
  creatures. Any creature that moves through the area takes 1d4 piercing damage per
  square traversed, with a basic Reflex save. Damaged creatures also take 1d4 persistent
  bleed damage.


  Heightened (+2) The piercing damage per square increases by 1d4.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: '1'
    damage_type: piercing
    dc: 0
  on_failure:
  - type: damage
    dice: 1d4
    damage_type: piercing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 2d4
    damage_type: piercing
    dc: 0
