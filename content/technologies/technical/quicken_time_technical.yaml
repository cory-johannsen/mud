id: quicken_time_technical
name: Quicken Time
description: You speed up the time stream in an area, stretching and pulling it until time flows swift and wild. Any creature that begins its turn in the area is @UUID[Compendium.pf2e.conditionitems.Item.Quickened] until the end of its turn and can use the extra action only to Stride or Strike. Unfortunately, speeding up time is much more difficult than slowing it down, and the effect is uneven and jittery, making accuracy between times painfully difficult; creatures inside the area are @UUID[Compendium.pf2e.conditionitems.Item.Concealed] to those outside it, and vice versa.
