id: drone_burst
name: Drone Burst
description: 'You launch a swarm of micro-drones from a canister. The swarm moves
  to a space within 30 feet and deals 2d8 piercing damage to each creature in a @Template[burst|distance:10].
  Affected creatures must attempt a basic Reflex save.


  Heightened (+1) The damage increases by 1d8.'
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d4
    damage_type: piercing
    dc: 0
  on_failure:
  - type: damage
    dice: 2d8
    damage_type: piercing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d8
    damage_type: piercing
    dc: 0
