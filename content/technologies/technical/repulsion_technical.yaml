id: repulsion_technical
name: Repulsor Field Emitter
description: 'You activate a repulsor field that prevents creatures from approaching.
  When casting the spell, you can make the area any radius you choose, up to 40 feet.
  A creature must attempt a Will save if it''s within the area when you Cast the Spell
  or as soon as it enters the area. Once a creature has attempted the save, it uses
  the same result for that casting. Restrictions on movement apply only if the creature
  voluntarily moves toward you.


  Critical Success The creature''s movement is not restricted.

  Success The creature treats each square in the area as difficult terrain when moving
  closer to you.

  Failure The creature can''t move closer to you within the area.'
