id: cable_serpents
name: Cable Serpents
description: 'Mechanized serpentine cables rise up to capture creatures in the area.
  Each creature takes 3d6 piercing damage and 1d6 persistent poison damage from electrified
  contacts, and is Grabbed or Restrained (your choice). A creature can Escape against
  your tech DC.


  Heightened (+2) The piercing and persistent damage each increase by 1d6.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 3d3
    damage_type: piercing
    dc: 0
  - type: damage
    dice: 1d3
    damage_type: poison
    dc: 0
  on_failure:
  - type: damage
    dice: 3d6
    damage_type: piercing
    dc: 0
  - type: damage
    dice: 1d6
    damage_type: poison
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d6
    damage_type: piercing
    dc: 0
  - type: damage
    dice: 2d6
    damage_type: poison
    dc: 0
