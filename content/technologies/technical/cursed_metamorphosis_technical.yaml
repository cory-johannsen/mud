id: cursed_metamorphosis_technical
name: Forced Reconfiguration
description: 'You activate a device that forcibly reconfigures the target creature
  into a harmless form, with effects based on its Fortitude save.Critical Success
  The target is unaffected.

  Success The target''s body gains minor features of the harmless form. Its systems
  churn as they partially reconfigure, causing it to be Sickened 1. When it recovers
  from the sickened condition, its features revert to normal.

  Failure The target transforms for 1 minute but keeps its mind. If it spends all
  its actions on its turn concentrating on its original form, it can attempt a @Check[will]
  save to end the effect immediately.

  Critical Failure The target is transformed into the chosen harmless form, body and
  mind, for an unlimited duration.'
tradition: technical
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
