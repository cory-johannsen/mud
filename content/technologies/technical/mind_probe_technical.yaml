id: mind_probe_technical
name: Neural Extraction
description: 'You deploy a neural scanning device to extract information from a creature''s
  mind. You access the target''s memories unless it resists with a Willpower save.

  Success The target is unaffected.

  Failure Each round you Sustain, you can ask a question and attempt another Will
  save. On failure, you discover the answer.

  Critical Failure As failure, and the target takes a -2 circumstance penalty to Will
  saves against this tech.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'You cast your thoughts through a creature''s mind, sifting for information.
      You access the target''s memories and knowledge unless it fends you off with
      a Willpower save.

      Success The target is unaffected.

