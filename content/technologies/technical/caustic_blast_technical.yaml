id: caustic_blast_technical
name: Acid Cluster Munition
description: You launch a cluster of acid grenades that detonate in a burst, dealing 1d8 acid damage to each creature in the
  area. Critical failures also take persistent acid damage.
tradition: technical
level: 1
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
