  - type: damage
    dice: 1d4
    damage_type: acid
    dc: 0
  on_failure:
  - type: damage
    dice: 1d8
    damage_type: acid
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 2d8
    damage_type: acid
    dc: 0
