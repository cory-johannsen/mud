id: false_vision_technical
name: Sensor Spoof
description: You hack the local sensor grid, creating a false data feed that fools
  any remote observation of the area. Any scrying or surveillance protocol detects
  whatever you wish within the area, rather than what is actually present. You can
  Sustain the tech each round to update the spoofed feed.
