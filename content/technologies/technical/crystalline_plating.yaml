id: crystalline_plating
name: Crystalline Plating
description: 'You deploy a device that coats the target in transparent crystalline
  material. The target becomes Concealed, has no scent, and can''t bleed. Gains resistance
  5 to acid, cold, electricity, and piercing; weakness 5 to sonic and bludgeoning.
  Affected by shatter effects as an unattended object. Each damage instance with resistance
  or weakness reduces duration by 1 minute.


  Upgraded (+2) Resistances and weaknesses increase by 5.'
tradition: technical
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You grant the target properties of dull, transparent glass. The target
      becomes Concealed, has no scent,
      and can't bleed. They gain resistance 5 to acid, cold
