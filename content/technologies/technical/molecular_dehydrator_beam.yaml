id: molecular_dehydrator_beam
name: Molecular Dehydrator Beam
description: 'You fire a molecular dehydrator that pulls the moisture from the targets''
  bodies at the atomic level, dealing 10d10 void damage. Creatures made of water (such
  as water elementals) and plant creatures use the outcome for one degree of success
  worse than the result of their saving throw. Creatures whose bodies contain no significant
  moisture (such as earth elementals) are immune to the molecular dehydrator.


  Upgraded (+1) The damage increases by 1d10.'
tradition: technical
level: 8
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 10d6
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 10d10
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 20d10
    damage_type: void
    dc: 0
