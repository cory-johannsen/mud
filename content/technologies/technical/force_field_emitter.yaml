id: force_field_emitter
name: Force Field Emitter
description: Project a personal force field that absorbs incoming kinetic and energy damage.
tradition: technical
level: 1
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You activate your force field emitter, surrounding yourself with a shimmering energy barrier.
      You gain a +1 item bonus to AC. While the force field is active, you use your unarmored
      proficiency to calculate your AC and add your Quickness modifier (maximum +5) to your defense.
