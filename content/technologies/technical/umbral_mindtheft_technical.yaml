id: umbral_mindtheft_technical
name: Data Exfiltrator
description: 'You deploy a memory extraction device on the target. The target must
  attempt a Will save.


  Critical Success The target is unaffected.

  Success You glimpse a surface thought from the target.

  Failure You steal a specific memory from the target. The target forgets the memory
  for 1 hour.

  Critical Failure As failure, but the target forgets the memory permanently unless
  restored by restoration or similar effects.'
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: rounds:3
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 2d6
    damage_type: mental
    dc: 0
