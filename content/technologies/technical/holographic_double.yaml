  attack, or use complex skills. It''s your minion. You can command it telepathically
  within 1 mile. Switch between your senses and the double''s with a single action.
  Same statistics as original except no item bonuses and 1/4 HP. At 0 HP, the spell
  ends.


  Upgraded (+1) Max target level +2.'
