id: security_bypass_siphon
name: Security Bypass Siphon
description: 'You unravel the security protocols of a tech effect that protects a container, door, or lock, converting it into energy you can repurpose to power your own devices.

  Attempt a counteract check against the target tech or effect that wards or seals a doorway or chest, such as Lock, or against a tech or effect that deals damage or delivers secondary effects when it''s opened, such as Rune Trap. If you succeed, you recover its energy, restoring one of your expended tech slots of 3rd rank or lower.


  Upgraded (8th) You can restore an expended tech slot of 4th rank or lower.

  Upgraded (9th) You can restore an expended tech slot of 5th rank or lower.

  Upgraded (10th) You can restore an expended tech slot of 6th rank or lower.'
