id: drone_swarm_strike
name: Drone Swarm Strike
description: 'You deploy automated micro-drones that attack targets in the area. The
  drones hover and strike nearby creatures. This deals 2d10 bludgeoning damage to
  each creature in the area. Creatures in the area must attempt a Reflex save.


  Critical Success The creature is unaffected.

  Success The creature takes half damage.

  Failure The creature takes full damage.

  Critical Failure The creature takes double damage.'
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d6
    damage_type: bludgeoning
    dc: 0
  on_failure:
  - type: damage
    dice: 2d10
    damage_type: bludgeoning
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d10
    damage_type: bludgeoning
    dc: 0
