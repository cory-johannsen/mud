id: swarming_wasp_stings_technical
name: Venom Dart Turret
description: You deploy a device that launches swarms of envenomed micro-projectiles
  into the area. Creatures take @Damage[1d6[piercing]] damage. Each creature that
  takes piercing damage must attempt a Toughness save. All mechanical effects (poison
  stages) remain identical to the base protocol.
tradition: technical
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 1d3
    damage_type: piercing
    dc: 0
  on_failure:
  - type: damage
    dice: 1d6
    damage_type: piercing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 2d6
    damage_type: piercing
    dc: 0
