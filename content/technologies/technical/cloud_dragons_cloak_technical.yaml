id: cloud_dragons_cloak_technical
name: Cloud Dragon's Cloak
description: |-
    Trigger You or an ally in range is targeted by a ranged attack.

    A cloud of mist enshrouds the target, appearing much like the deflecting clouds created by cloud dragons. The target is treated as @UUID[Compendium.pf2e.conditionitems.Item.Hidden] for the purposes of resolving the triggering attack (so normally the attacker must succeed at a @Check[flat|dc:11] to target it) and all ranged attacks against it for the duration.
