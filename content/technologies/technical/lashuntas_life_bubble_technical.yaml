id: lashuntas_life_bubble_technical
name: Lashunta's Life Bubble
description: |-
    You create a replenishing protective bubble of fresh, temperate air around the target. The shell of air enables the target to breathe even underwater or in a vacuum, protects from severe cold and heat, and grants a +1 status bonus to the target's saves against inhaled dangers such as inhaled poisons and @UUID[Compendium.pf2e.spells-srd.Item.Toxic Cloud].
    @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Lashunta's Life Bubble]Heightened (6th) The bubble lasts until your next preparation.
    Heightened (8th) The bubble lasts until your next preparation, protects against extreme cold and heat, and grants a +2 status bonus instead of +1.
tradition: technical
level: 5
usage_type: prepared
action_cost: 1
range: ranged
targets: single
duration: instant
resolution: none
