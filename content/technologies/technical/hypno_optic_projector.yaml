id: hypno_optic_projector
name: Hypno-Optic Projector
description: 'Your eyes glow with an entrancing light that beguiles those who meet your gaze. Any creature that ends its turn within the emanation must attempt a Reasoning check.


  Critical Success The creature is unaffected and is then temporarily immune for 24 hours.

  Success The creature is unaffected and is then temporarily immune for 1 minute.

  Failure The creature is Fascinated until the end of its next turn.

  Critical Failure The creature is fascinated until the end of its next turn and is then Stunned 1.


  Once a creature succeeds or critically succeeds at its saving throw, it is temporarily immune to your hypno-optic projector for 24 hours.'
tradition: technical
level: 7
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: stunned
    value: 1
  on_crit_failure:
  - *id001
