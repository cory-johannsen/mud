id: dispel_magic_technical
name: Counter-Tech
description: You deploy counter-frequency technology to unravel an active effect.
  Attempt a counteract check against the target spell.
tradition: technical
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You unravel the magic behind a spell or effect. Attempt a counteract
      check against the target. If you successfully counteract a magic item, the item
      becomes a mundane item of its type for 10 minutes.
