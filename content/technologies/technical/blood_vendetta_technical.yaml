id: blood_vendetta_technical
name: Blood Vendetta
description: |-
    Requirements You can bleed.
    Trigger A creature deals piercing, slashing, or persistent bleed damage to you.

    You curse the target, punishing it for having the audacity to spill your blood. The target takes 2d6 persistent bleed damage and must attempt a Will save.

    Critical Success The target is unaffected.
    Success The target takes half the persistent bleed damage.
    Failure The target takes the full persistent bleed damage. Until the bleeding stops, the target has weakness 1 to piercing and slashing damage. @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Blood Vendetta (Failure)]
    Critical Failure As failure, but the target takes double the persistent bleed damage.

    Heightened (+2) The persistent bleed damage increases by 2d6.
tradition: technical
level: 2
usage_type: prepared
action_cost: 0
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 2d3
          damage_type: bleed
          dc: 0
    on_failure:
        - type: damage
          dice: 2d6
          damage_type: bleed
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 4d6
          damage_type: bleed
          dc: 0
