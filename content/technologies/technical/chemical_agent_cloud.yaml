id: chemical_agent_cloud
name: Chemical Agent Cloud
description: 'You release a cloud of weaponized chemical agent. This functions as
  Mist, except the area moves 10 feet away from you each round. You deal 6d8 poison
  damage to each breathing creature that starts its turn in the area. You can Dismiss
  the tech.


  Heightened (+1) The damage increases by 2d8.'
