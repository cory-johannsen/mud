id: poltergeists_fury_technical
name: Magnetic Debris Storm
description: You activate a powerful electromagnet that whips loose metal objects
  into a devastating orbital storm. Any loose, unattended objects of 1 Bulk or less
  within range are picked up and begin to orbit you at lethal speeds. All creatures
  in the area take 6d4 piercing damage with a basic Reflex save. Each time you Sustain
  the spell, you can increase the radius of the storm by 10 feet, to a maximum of
  100 feet. The storm moves with you and provides you with lesser cover, though you
  can't use this cover to hide or sneak. Allies within the storm who roll a success
  on their Reflex save get a critical success instead.Heightened (+1) The damage increases
  by 1d4.
tradition: technical
level: 6
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
