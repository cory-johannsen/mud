id: phantom_signal_typhoon
name: Phantom Signal Typhoon
description: 'You broadcast corrupted frequencies that manifest as an amalgam of digital phantoms—echoing consciousness fragments from destroyed neural implants. This amalgam manifests as a massive tornado of flickering holographic faces. It occupies the space of a Huge creature and has a Speed of 60 feet.

  Arrive (negative) Vortex of Erasure Each enemy creature within a 60-foot emanation must attempt a Toughness save with the following effects.Critical Success The creature is unaffected

  Success The creature is Drained 1.

  Failure The creature is Drained 2.

  Critical Failure The creature is Drained 3.Depart (emotion, fear, mental) Scream of the Deleted The digital phantoms let out an anguished scream. All your enemies within a 100-foot emanation must attempt Cool save saves with the following effects.Critical Success The creature is unaffected.

  Success The creature is Frightened 1.

  Failure The creature is Frightened 3.

  Critical Failure The creature is frightened 3. It''s also Fleeing for 1 round or until it''s no longer frightened, whichever comes first.'
