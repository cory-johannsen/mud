description: 'Area 20-foot radius, 60-foot-tall cylinderMulti-hued plasma vents break through cracks in the floor plating from overloaded reactor cores, reaching high and giving off dangerous fumes. When you activate the tech, roll 1d8 on the table below to determine the effects of the vents.

