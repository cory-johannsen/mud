name: Subliminal Suggestion Module
description: 'You implant a subliminal directive in the target''s mind for them to
  follow when a trigger you specify occurs. Your directive must seem like a logical
  course of action and can''t be self-destructive. The target must attempt a Will
  save.


  Critical Success Unaffected and aware of the attempt.

  Success Unaffected.

  Failure Follows the directive when triggered.

  Critical Failure As failure, and unaware of the implant.'
