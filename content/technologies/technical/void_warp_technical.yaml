id: void_warp_technical
name: Void Warp
description: |-
    You call upon the Void to harm life force. The target takes 2d4 void damage with a basic Fortitude save. On a critical failure, the target is also Enfeebled 1 until the start of your next turn.

    Heightened (+1) The damage increases by 1d4.
tradition: technical
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: "2"
          damage_type: void
          dc: 0
    on_failure:
        - type: damage
          dice: 2d4
          damage_type: void
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 4d4
          damage_type: void
          dc: 0
