id: remote_command_broadcast
name: Remote Command Broadcast
description: You transmit a compulsive command to a known target regardless of distance.
  The target must attempt a Willpower save. On a failure it follows a one-sentence command.
tradition: technical
level: 9
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You send the target a message of 25 words or fewer, and it can respond
      immediately with its own message of 25 words or fewer. Your message is insidious
