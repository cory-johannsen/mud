id: gravity_reversal_projector
name: Gravity Reversal Projector
description: 'Area 20-foot radius, 40-foot tall cylinder

  You reverse the gravitational field in the area using a specialized projector. Creatures
  and objects that aren''t secured to the ground immediately fall upward to the top
  of the area. A creature might be able to @UUID[Compendium.pf2e.actionspf2e.Item.Grab
  an Edge] to arrest its fall if it falls past an appropriate surface. If a creature
  falls against a solid object (such as a ceiling), it takes the appropriate amount
  of falling damage and lands on the surface. Once an object or creature reaches the
  top of the area, it floats, caught between the normal and reversed gravity. The
  creature can move along the plane where the two forms of gravity meet. Creatures
  that can levitate or fly can use those abilities to mitigate the effects.

  When the projector shuts down, all creatures and objects caught in the area fall
  back down. Likewise, anything that moves beyond the area is subjected to normal
  gravity again.'
tradition: technical
level: 7
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: minutes:1
resolution: none
