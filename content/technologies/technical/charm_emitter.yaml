id: charm_emitter
name: Charm Emitter
description: 'You activate a smooth electromagnetic aura that subtly manipulates the
  attitude of those near you. Any creature that ends its turn in the aura must attempt
  a Will saving throw. No matter the result, it''s then temporarily immune for 24
  hours.


  Critical Success The creature is unaffected.

  Success Attitude unchanged.

  Failure Attitude improves by one step.

  Critical Failure Attitude improves by two steps.'
