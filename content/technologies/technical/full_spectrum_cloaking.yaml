id: full_spectrum_cloaking
name: Full Spectrum Cloaking
description: You activate a full-spectrum cloaking device that shrouds a creature from all detection. The target becomes Invisible, but not merely to vision. The invisibility granted by this tech applies to all precise senses an observer might have. It's still possible for a creature to find the target by Seeking using various senses, looking for disturbed dust, hearing gaps in the sound spectrum, or finding some other way to discover the presence of a creature that is otherwise undetectable.
tradition: technical
level: 8
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
