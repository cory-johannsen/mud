id: terror_projection_mk4
name: Terror Projection Mk4
description: You deploy a device that projects a personalized terror construct into the target's visual cortex. Only the target perceives it. The effect is based on the target's Willpower save. All mechanical effects (damage, frightened, death, fleeing) remain identical to the base protocol.Heightened (+1) Damage +2d6 on failure, +3d6 on critical failure.
tradition: technical
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: frightened
    value: 1
  - &id002
    type: condition
    condition_id: fleeing
    value: 1
  on_crit_failure:
  - *id001
  - *id002
