id: cable_snare_array
name: Cable Snare Array
description: 'Area 20-foot burst adjacent to a flat surface

  Mechanized grappling cables launch from concealed housings and attempt to capture
  creatures in the area. Make tech attack rolls against the Fortitude DC of each
  creature. Any creature you succeed against is Grabbed and takes 3d6 bludgeoning
  damage. On a critical success, it is also Restrained.


  Each round you Sustain, grabbed or restrained creatures take 1d6 bludgeoning damage.


  Upgraded (+2) The initial and ongoing damage each increase by 1d6.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
resolution: attack
effects:
  on_hit:
  - type: damage
    dice: 3d6
    damage_type: bludgeoning
    dc: 0
  on_crit_hit:
  - type: damage
    dice: 6d6
    damage_type: bludgeoning
    dc: 0
