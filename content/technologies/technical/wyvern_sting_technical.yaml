id: wyvern_sting_technical
name: Venom Injector
description: 'You deploy a pneumatic venom delivery system. You deal 3d4 piercing
  damage to the touched creature and afflict it with synthetic wyvern-class toxin.
  If the target takes piercing damage, they must attempt a Toughness save.

  Critical Success Unaffected.

  Success 5d6 poison damage.

  Failure 7d6 poison damage and Clumsy 2 for 1 round.

  Critical Failure 10d6 poison damage and Clumsy 2 for 1 minute.'
tradition: technical
level: 5
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: '3'
    damage_type: piercing
    dc: 0
  on_failure:
  - type: damage
    dice: 3d4
    damage_type: piercing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d4
    damage_type: piercing
    dc: 0
