id: imaginary_lockbox_technical
name: Phase Cache
description: 'You shift a container and its contents into a pocket dimension that
  only you can access. The container''s physical properties are irrelevant, but it
  can''t contain creatures. You spend a single action with the concentrate trait to
  recall the container.


  If you die while storing a phase cache, the container reappears in the nearest unoccupied
  space.'
