id: conditional_subroutine
name: Conditional Subroutine
description: 'You prepare a tech effect that will trigger later. While programming
  the conditional subroutine, you also load another tech of 4th rank or lower with
  a casting time of no more than 3 actions. This companion tech must be one that can
  affect you. You must make any decisions for the tech when you program the subroutine,
  such as choosing a damage type for resist energy. During the programming, choose
  a trigger under which the tech will be activated, using the same restrictions as
  for the trigger of a Ready action. Once the subroutine is set, you can cause the
  companion tech to come into effect as a reaction with that trigger. It affects only
  you, even if it would affect more creatures. If you define complicated conditions,
  as determined by the GM, the trigger might fail. If you program a new conditional
  subroutine, the newer one supersedes the older.


  Heightened (8th) You can choose a tech of 5th rank or lower.

  Heightened (9th) You can choose a tech of 6th rank or lower.

  Heightened (10th) You can choose a tech of 7th rank or lower.'
tradition: technical
level: 7
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
