id: stifling_stillness_technical
name: Atmospheric Stagnation Field
description: 'You deploy a device that renders all air in the target area unnaturally
  still and oxygen-depleted. The stagnant air becomes difficult terrain. Air-breathing
  creatures not holding their breath must spend an action straining to breathe, taking
  3d6 poison damage (basic Toughness save) and becoming Fatigued.


  Heightened (+2) Damage increases by 3d6.'
tradition: technical
level: 4
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 3d3
    damage_type: poison
    dc: 0
  on_failure:
  - type: damage
    dice: 3d6
    damage_type: poison
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d6
    damage_type: poison
    dc: 0
