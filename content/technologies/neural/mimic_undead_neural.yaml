id: mimic_undead_neural
name: Deadzone Aura
description: You project a psychic aura that mimics the neural signature of the undead.
  Mindless undead treat you as one of their own and won't attack you unless you attack
  them first. The spell ends if you use a hostile action against any undead.
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You take death and wrap it about you like a cloak-your colors wash
      out and your skin grows cold to the touch. Your heartbeat, breathing, and similar
      life functions become very difficult to detect. Sen
