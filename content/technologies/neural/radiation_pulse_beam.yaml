id: radiation_pulse_beam
name: Radiation Pulse Beam
description: 'You channel a concentrated blast of ionizing radiation from your palms.
  You deal 4d6 poison damage to creatures in the area. Creatures who fail their save
  are afflicted with stage 1 of radiation sickness (on a critical failure, the creature
  moves immediately to stage 2). The level of radiation sickness caused by this tech
  is equal to twice the tech''s rank, and the disease''s save DC uses the caster''s
  DC.


  Radiation Sickness (uncommon, disease) Level 15

  The reactor core beneath the Undercity leaks deadly particles that saturate the
  surrounding tunnels. These particles are radioactive and flood the area with lethal
  energy. Creatures other than those native to the area or who have survived there
  for a long time develop radiation sickness.

  Creatures native to the irradiated zone are immune, as are creatures who are affected
  by radiation sickness but recover from it. The target can''t recover from the disease''s
  drained or sickened condition except by advanced medical technology.

  The surest way to avoid contracting radiation sickness is by wearing a rad-ward,
  a piece of protective gear often found among scavengers'' equipment or for sale
  in black-market clinics.

  Saving Throw DC 32 Fortitude

  Onset [[/r 1d4 #days]]{1d4 days}

  Stage 1 Drained 1 (1 day)

  Stage 2 Drained 1 and Sickened 1 (1 day)

  Stage 3 Drained 2 and Sickened 2 (1 week)

  Stage 4 Drained 3 and Sickened 3 (1 month)

  Stage 5 Drained increases by 1 (1 year)'
