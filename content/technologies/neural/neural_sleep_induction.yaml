id: neural_sleep_induction
name: Neural Sleep Induction
description: 'Each creature in the area becomes drowsy, possibly nodding off. A creature that falls Unconscious from this tech doesn''t fall Prone or release what it''s holding. This spell doesn''t prevent creatures from waking up due to a successful Awareness check, limiting its utility in combat.Critical Success The creature is unaffected.

  Success The creature takes a –1 status penalty to Awareness checks for 1 round.

  Failure The creature falls unconscious. If it''s still unconscious after 1 minute, it wakes up automatically.

  Critical Failure The creature falls unconscious. If it''s still unconscious after 1 hour, it wakes up automatically.Upgraded (4th) The creatures fall unconscious for 1 round on a failure or 1 minute on a critical failure. They fall prone and release what they''re holding, and they can''t attempt Awareness checks to wake up. When the duration ends, the creature is sleeping normally instead of automatically waking up.'
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: unconscious
    value: 1
  - &id002
    type: condition
    condition_id: prone
    value: 1
  on_crit_failure:
  - *id001
  - *id002
