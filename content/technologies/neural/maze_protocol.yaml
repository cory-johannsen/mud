id: maze_protocol
name: Maze Protocol
description: Your mind constructs an inescapable labyrinthine neural prison around
  a target. The target must attempt a Willpower save. On a failure, it becomes mentally
  trapped in an endless recursive loop, unable to take actions that require concentration
  for the duration. The effect ends if the target succeeds at a Willpower save at the end
  of each of its turns.
tradition: neural
level: 9
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You connect the entire area with an invisible maze of astral energy
      that interferes with dimensional and mental magic. Choose a point in the area
      that you can see when you cast this tech. Objects oth
