id: entangle_fate_neural
name: Probability Tangle
description: 'You generate a quantum entanglement field that interweaves the probability
  matrices of all caught within the blast. Each creature in the area must attempt
  a Will save.Critical Success The creature is unaffected.

  Success The creature''s probability matrix destabilizes, and momentary conflicting
  probability cascades cause the creature to become Off-Guard until the start of its
  next turn.

  Failure As success, but the creature is off-guard for the duration of the spell.
  If more than one of the targets failed to resist this spell, the creature also becomes
  Stupefied 1 for the duration as its probability matrix and those of other creatures
  continue to clash.

  Critical Failure As failure, but any creature that becomes stupefied 1 also becomes
  Enfeebled 1 and Clumsy 1 for the spell''s duration.'
