id: entangle_fate_neural
name: Entangle Fate
description: |-
    You cause a swirl of energy to entangle the fates of all caught within the blast. Each creature in the area must attempt a Will save.Critical Success The creature is unaffected.
    Success The creature's fate becomes distorted, and momentary conflicting glimpses of the immediate future cause the creature to become @UUID[Compendium.pf2e.conditionitems.Item.Off-Guard] until the start of its next turn.
    Failure As success, but the creature is off-guard for the duration of the spell. If more than one of the targets failed to resist this spell, the creature also becomes Stupefied 1 for the duration of the spell as its fate and those of the other creatures continue to clash and strain against each other.
    Critical Failure As failure, but any creature that becomes stupefied 1 for the duration of the spell also becomes Enfeebled 1 and Clumsy 1 for the spell's duration.
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
