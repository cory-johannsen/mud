id: ambient_allure_field
name: Ambient Allure Field
description: 'You project a smooth psychic aura that manipulates the attitude of those
  near you. Any creature that ends its turn in the aura must attempt a Will saving
  throw with the following effects. No matter the result, it''s then temporarily immune
  for 24 hours. The effect lasts until the tech ends.


  Critical Success The creature is unaffected.

  Success The creature''s attitude is unchanged.

  Failure The creature''s attitude toward you improves by one step.

  Critical Failure The creature''s attitude toward you improves by two steps.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
