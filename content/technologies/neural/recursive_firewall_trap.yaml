id: recursive_firewall_trap
name: Recursive Firewall Trap
description: 'The target is pulled into a recursive virtual firewall—a long, twisting, extradimensional hallway blocked at 30-foot intervals with high-grade reinforced bulkheads (Hardness 20, HP 80, BT 40, Athletics save (DC 30) to Force Open) secured with Lock (Average) (Thievery save (DC 25), 4 successful checks required). A creature trapped within this hallway can escape only when the tech expires, or when they successfully pass through the number of doors determined by their save, either by breaking through the bulkheads or hacking the locks (or any combination of these, if the target must pass through multiple doors to escape). Teleportation effects of 6th level or lower are automatically suppressed within the virtual space; higher-level teleportation effects require the caster to succeed at a counteract check against your tech DC or they fail.


  Critical Success The target is unaffected.

  Success The target is trapped for 1 round, or until it bypasses 1 door.

  Failure The target is trapped for 1 minute, or until it bypasses 2 doors.

  Critical Failure The target is trapped for 10 minutes, or until it bypasses 3 doors.'
tradition: neural
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
