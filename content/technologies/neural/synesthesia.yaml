id: synesthesia
name: Sensory Scramble
description: 'The target''s neural sensory pathways are completely rewired, causing
  them to process audio as visual data, scent as sound, and so on. This has three
  effects, and the target must attempt a Will save.

  Due to the distraction, the target must succeed at a DC 5 flat check each time it
  uses a concentrate action, or the action is disrupted.

  The target''s senses are jumbled, causing it to be Clumsy 3.

  The warped senses also make the creature Confused.


  Critical Success The target is unaffected.

  Success The target is affected for 1 round.

  Failure The target is affected for 1 minute.

  Critical Failure The target is affected for 10 minutes.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
