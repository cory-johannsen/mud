id: synesthesia
name: Synesthesia
description: |-
    The target's senses are suddenly rewired in unexpected ways, causing them to process noises as bursts of color, smells as sounds, and so on. This has three effects, and the target must attempt a Will save.Due to the distraction, the target must succeed at a @Check[flat|dc:5] each time it uses a concentrate action, or the action fails and is wasted.The target's difficulty processing visual input makes all creatures and objects @UUID[Compendium.pf2e.conditionitems.Item.Concealed] from it.The creature has trouble moving, making it Clumsy 3 and giving it a –10-foot status penalty to its Speeds.Critical Success The target is unaffected.
    Success The target is affected for 1 round.
    Failure The target is affected for 1 minute.
    Critical Failure As failure, and the target is Stunned 2 as it attempts to process the sensory shifts.Heightened (9th) You can target up to five creatures.
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
