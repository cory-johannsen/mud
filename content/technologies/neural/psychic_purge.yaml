id: psychic_purge
name: Psychic Purge
description: 'You project a burst of cleansing psychic energy through the target, purging a harmful mental affliction. You immediately attempt to counteract a single effect on the target with the emotion or possession trait, or an effect giving the target the Confused, Controlled, or Stupefied condition. If your counteract attempt succeeds, the purged affliction streams from the target''s body as ectoplasmic residue that lashes back at nearby foes, dealing 5d8 mental damage to all enemies within a 30-foot emanation, with a basic Willpower save.


  Heightened (+2) The damage increases by 2d8.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 5d8
    damage_type: mental
  on_crit_failure:
  - type: damage
    dice: 10d8
    damage_type: mental
