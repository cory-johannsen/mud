id: phantasmal_killer_neural
name: Phantasmal Killer
description: |-
    You create a phantasmal image of the most fearsome creature imaginable to the target. Only the spell's target can see the killer, though you can see the vague shape of the illusion as it races forth to attack. The effect of the killer is based on the outcome of the target's Will save.Critical Success The target is unaffected.
    Success The target takes @Damage[4d6[mental]] damage and is Frightened 1.
    Failure The target takes @Damage[(max(8,@item.rank*2))d6[mental]] damage and is Frightened 2.
    Critical Failure The target is so afraid it might die. It must attempt a @Check[fortitude|traits:incapacitation] save; if the target fails, it dies. On a successful Fortitude save, the target takes @Damage[(max(12,@item.rank*3))d6[mental]] damage, is @UUID[Compendium.pf2e.conditionitems.Item.Fleeing] until the end of its next turn, and is Frightened 4. This effect has the incapacitation trait.Heightened (+1) The damage increases by 2d6 on a failure and by 3d6 on a critical failure.
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
