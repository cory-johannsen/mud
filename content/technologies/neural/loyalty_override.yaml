id: loyalty_override
name: Loyalty Override
description: You rewrite a target's fundamental allegiances. The target must attempt
  a Willpower save. On a critical failure, its loyalty is permanently rewritten to you.
  On a failure, it treats you as an absolute ally for 1 hour. On a success, it is
  unaffected but knows you attempted this.
