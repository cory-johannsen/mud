id: farflung_fetch_neural
name: Telekinetic Retrieval
description: You telekinetically pull an unattended object within range into your
  hand. The object must weigh 5 Bulk or less. If the object is held by another creature,
  you must succeed at a check against the creature's Reflex DC.
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You can pilfer an object even if it's outside the reach of your fingers.
      You teleport the target into one of your open hands. If you don't have a hand
      free, it falls to the ground at your feet.Heighte
