id: take_your_places_neural
name: Tactical Repositioning Pulse
description: The operation would play out exactly as you envisioned it, if only your
  squad would respect the formation plan. You instantly transport the targeted creatures
  and any items they're wearing and holding from their current space to an unoccupied
  space within range. You don't need to be able to see the destinations as long as
  you've been there in the past and know its relative location and distance from each
  target. Creatures affected by tactical repositioning pulse are then temporarily
  immune to this tech for 1 minute.
tradition: neural
level: 8
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
