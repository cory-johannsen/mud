id: cognitive_wipe
name: Cognitive Wipe
description: 'You drastically reduce the target''s mental faculties by corrupting
  their neural architecture. The target must attempt a Willpower save. The effects of this
  curse can be removed only through effects that target curses.


  Critical Success The target is unaffected.

  Success The target is Stupefied 2 for 1 round.

  Failure The target is Stupefied 4 with an unlimited duration.

  Critical Failure The target''s intellect is permanently reduced below that of an
  animal, and it treats its Charisma, Intelligence, and Wisdom modifiers as –5. It
  loses all class abilities that require mental faculties, including all spellcasting.
  If the target is a PC, they become an NPC under the GM''s control.'
tradition: neural
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
