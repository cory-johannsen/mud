id: psi_retribution_loop
name: Psi-Retribution Loop
description: |-
    An understanding of how violence begets more violence fills your target, causing it mental anguish in the form of splitting headaches when it attempts to take violent actions. The target must attempt a Will saving throw, with the following results.Critical Success The target is unaffected.
    Success The next time the target takes a hostile action, the target takes 1d4 mental damage; the spell's duration then ends.
    Failure The first time in a round when the target takes a hostile action, the target takes 1d4 mental damage.
    Critical Failure Each time the target takes a hostile action, the target takes 1d4 mental damage.Upgraded (+1) The mental damage increases by 1d4.
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: "1"
          damage_type: mental
          dc: 0
    on_failure:
        - type: damage
          dice: 1d4
          damage_type: mental
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 2d4
          damage_type: mental
          dc: 0
