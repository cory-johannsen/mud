id: breach_portal
name: Breach Portal
description: 'You hack local spatial coordinates to create paired transit portals.
  One appears on a flat surface you can touch, and the other appears on a different
  flat surface in range that you can see.

  You can move through the portals as though they were adjacent to each other. Any
  other creature attempting to move through the portals must succeed at a Will saving
  throw or be teleported up to 30 feet away from their starting point to a random
  safe space determined by the GM.Heightened (6th) When you Use this tech, you can
  designate up to 5 other creatures to freely move between the portals.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
