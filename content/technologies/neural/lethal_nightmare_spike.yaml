id: lethal_nightmare_spike
name: Lethal Nightmare Spike
description: 'You inject a personalized terror construct directly into the target''s visual cortex. Only the target can perceive the killer, though you can see the vague outline as it races forth. The effect is based on the outcome of the target''s Will save.Critical Success The target is unaffected.

  Success The target takes 4d6 mental damage and is Frightened 1.

  Failure The target takes @Damage[(max(8,*2))d6[mental]] damage and is Frightened 2.

  Critical Failure The target is so terrified it might flatline. It must attempt a Toughness save; if the target fails, it dies. On a successful Toughness save, the target takes @Damage[(max(12,*3))d6[mental]] damage, is Fleeing until the end of its next turn, and is Frightened 4. This effect has the incapacitation trait.Heightened (+1) The damage increases by 2d6 on a failure and by 3d6 on a critical failure.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 4d6
    damage_type: mental
  - &id001
    type: condition
    condition_id: frightened
    value: 1
  - &id002
    type: condition
    condition_id: fleeing
    value: 1
  on_crit_failure:
  - type: damage
    dice: 8d6
    damage_type: mental
  - *id001
  - *id002
