id: tomorrows_dawn_neural
name: Radiant Purge Aura
description: 'Restorative energy radiates from your body, filling the area with bright
  light in a 20-foot radius (and dim light for the next 20 feet). You gain mental
  resistance 5. Any corrupted or undead creature that begins its turn adjacent to
  you must attempt a Will save.

  Critical Success The creature is unaffected and immune to this effect for the remainder
  of the duration.

  Success The creature is Sickened 1 until the end of its turn.

  Failure The creature is sickened 1 and becomes Slowed 1 until the end of its next
  turn.

  Critical Failure As failure, but Sickened 2 and the creature remains slowed 1 for
  the rest of the spell''s duration.Heightened (6th) You gain mental resistance 10.

  Heightened (8th) You gain mental resistance 15.'
