id: part_the_mists_to_paradise_neural
name: VR Sanctuary Protocol
description: 'You open a gateway to a hidden virtual reality server, accessible only
  to you and your allies through a dense cloud of holographic static. You and the
  other targets within range are transported through this static into an extradimensional
  digital paradise of idyllic simulated environments. Creatures within this paradise
  don''t need to eat or drink. For each minute you spend within this paradise, all
  creatures within experience the benefits of 24 hours passing, gaining the healing
  benefits of a full night''s rest, as well as the elapse of any afflictions or spells
  with day-long intervals. However, for any afflictions or spells with intervals measured
  in shorter periods of time, only one of those intervals passes for every minute
  spent within the paradise. This means that at the end of a minute, a creature can
  attempt a saving throw against a disease whose interval is 1 day, a poison whose
  interval is 1 minute, and a harmful spell that allows a saving throw each round.
  Each saving throw attempted while within the paradise gains a +4 status bonus.

  You and your allies can act normally while within the paradise and can use the time
  to cast spells, Refocus, or perform other exploration activities that take less
  than 10 minutes. When the tech ends, you and all other targets depart the paradise,
  returning through the static to your previous locations or in the nearest unoccupied
  spaces. You can Dismiss this tech.'
tradition: neural
level: 8
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
