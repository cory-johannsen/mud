id: total_mind_override
name: Total Mind Override
description: 'You seize complete control of the target''s neural pathways, forcing
  it to obey your commands. If you issue an obviously self-destructive order, the
  target doesn''t act until you issue a new order. The effect depends on its Will
  save.


  Critical Success The target is unaffected.

  Success The target is Stunned 1 as it fights off your commands.

  Failure You control the target. It gains the @UUID[Compendium.pf2e.conditionitems.Item.Controlled]
  condition, but it can attempt a Willpower save at the end of each of its turns. On a
  success, the spell ends.

  Critical Failure As a failure, but the target receives a new save only if you give
  it a new order that is against its nature, such as killing its allies.


  Heightened (10th) The duration is unlimited.'
tradition: neural
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
