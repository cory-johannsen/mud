id: aberrant_form
name: Aberrant Protocol
description: 'You activate a black-market body modification protocol, transforming
  yourself into a Large aberrant cyborg. You must have enough space to expand into
  or the protocol fails. When you activate this tech, choose chuul, gogiteth, gug,
  or otyugh combat chassis. While in this form, you gain the aberration trait. You
  can Dismiss the protocol.

  You gain the following statistics and abilities regardless of which battle form
  you choose:AC = 18 + your level. Ignore your armor''s check penalty and Speed reduction.13
  temporary Hit Points.Darkvision.One or more unarmed melee attacks specific to the
  battle form you choose, which are the only attacks you can Strike with. You''re
  trained with them. Your attack modifier is +18, and you use the listed damage. These
  attacks are Strength based (for the purpose of the enfeebled condition, for example).
  If your unarmed attack modifier is higher, you can use it instead.Athletics modifier
  of +20, unless your own modifier is higher.You also gain specific abilities based
  on the type of chassis you choose:ChuulSpeed 30 feet, swim 25 feet;Melee 1 claw
  (reach 10 feet), Damage 2d8+8 bludgeoning, and you can spend an action after a hit
  to Grab the target.GogitethSpeed 40 feet, climb 30 feet;Melee 1 jaws, Damage 2d10+8
  piercing, and you can spend an action after a hit to Grab the target;Melee 1 leg
  (agile, reach 10 feet), Damage 2d6+8 piercing.GugSpeed 40 feet, climb 20 feet;Melee
  1 claw (agile, reach 10 feet), Damage 2d8+8 slashing;your multiple joints allow
  you to fit through tight spaces as if you were a Medium creature.Otyugh+2 circumstance
  bonus on saves against disease;Speed 20 feet;Melee 1 jaws, Damage 3d6+8 piercing;Melee
  1 tentacle (agile, reach 10 feet), Damage 2d6+8 bludgeoning.Heightened (6th) Your
  battle form is Huge, and the reach of your attacks increases by 5 feet. You must
  have space to expand, or the protocol fails. You instead gain AC = 21 + your level,
  26 temporary HP, attack modifier +22, damage bonus +13, and Athletics +23.'
tradition: neural
