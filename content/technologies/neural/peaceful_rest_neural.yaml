id: peaceful_rest_neural
name: Peaceful Rest
description: |-
    The targeted corpse doesn't decay, nor can it be transformed into an undead. If the corpse is subject to a spell that requires the corpse to have died within a certain amount of time (for example, @UUID[Compendium.pf2e.spells-srd.Item.Raise Dead]), do not count the duration of peaceful rest against that time. This spell also prevents ordinary bugs and pests (such as maggots) from consuming the body.

    Heightened (5th) The spell's duration is unlimited, but the spell takes one more action to cast and requires a cost (embalming fluid worth 6 gp).
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
