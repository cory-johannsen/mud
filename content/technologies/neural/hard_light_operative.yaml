id: hard_light_operative
name: Hard-Light Operative
description: 'You project a hard-light combat construct modeled after a historical
  or fictional figure. The construct is Medium, regardless of the original''s described
  size. When you Use this tech, decide what role the operative fills, choosing from
  striker, support, or harasser. The operative appears in an unoccupied space within
  range, and the first time each round that you Sustain the tech, you can direct
  it to Stride or take its role action. The construct has a speed of 25 feet and an
  AC of 22. Its saving throw modifiers, Perception modifier, and skill modifiers are
  +12. It has 90 HP.

  Striker: The operative''s action is to attempt a melee Strike, using your spell
  attack roll and inflicting 4d6+6 mental damage on a hit.

  Support: The operative''s action is to grant an adjacent creature 4d4 temporary
  Hit Points, which last for 1 round.

  Harasser: The operative''s action is to harry and distract an adjacent target. The
  target must succeed at a Willpower save or become Off-Guard (Slowed 1 on a critical failure)
  until the end of your next turn.Heightened (+1) The operative''s AC, saving throw
  modifiers, skill modifiers, and Perception modifier increases by 3, and its HP increase
  by 30. A striker''s damage increases by 1d6. A support''s temporary Hit Points increases
  by 1d4.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You create a phantasmal incarnation of a significant character from
      a novel, historical work, or religious parable. The phantasm is Medium, regardless
      of the size of the character as it was described
