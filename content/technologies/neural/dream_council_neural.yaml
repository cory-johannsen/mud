id: dream_council_neural
name: Shared Dreamspace Link
description: When you activate this tech, any targets-including you-can choose to
  immediately fall asleep. The effect ends for any creatures that don't choose to
  fall asleep. Sleepers join a shared dreamspace simulation, where they can communicate
  with one another as though they were in the same room. Individual targets leave
  this shared dream upon awakening, and if all the targets awaken, the tech ends.
tradition: neural
level: 8
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
