id: detect_creator_neural
name: Trace Fabricator
description: You analyze the remains or digital residue of a destroyed cybernetic
  undead to trace its creator. If the creator is within range, you can sense the direction
  to them. If the creator is within 100 feet, you sense their presence within 100
  feet, and the protocol ends; you can't further home in on their location. If there's
  EM shielding or running water between you and the creator, this protocol can't locate
  them. This protocol fails automatically if the target doesn't have a specific creator
  or the specific creator isn't on the same plane.
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
