id: claim_curse_neural
name: Curse Transfer Protocol
description: By severing psychic threads around a target and reattaching them to yourself,
  you temporarily absorb their neural affliction, offering brief respite. The target
  is freed from a single curse affecting it for the spell's duration, but you gain
  the curse for the same period.
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: By burning threads of fate around a target and then retying them
      to yourself instead, you temporarily draw their curse to you and offer them
      brief succor from the worst of its effects. Choose a curse
