id: despair_wave
name: Despair Wave
description: 'You broadcast a neural frequency that induces crushing hopelessness in creatures in the area. The effects for each creature are determined by its Reasoning check.


  Critical Success The creature is unaffected.

  Success For 1 round, the creature can''t use reactions and must attempt another save at the start of its turn; on a failure, it is Slowed 1 for that turn.

  Failure The creature is Slowed 1 for 1 minute and can''t use reactions.

  Critical Failure The creature is Slowed 2 for 1 minute and can''t use reactions.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: slowed
    value: 1
  on_crit_failure:
  - *id001
