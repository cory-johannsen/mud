id: item_facade_neural
name: Item Facade
description: |-
    You make the target object look and feel as though it were in much better or worse physical condition. When you cast this spell, decide whether you want to make the object look decrepit or perfect. An item made to look decrepit appears @UUID[Compendium.pf2e.conditionitems.Item.Broken] and shoddy. An intact item made to look better appears as though it's brand new and highly polished or well maintained. A Broken item appears to be intact and functional. Destroyed items can't be affected by this spell. A creature that Interacts with the item can attempt to disbelieve the illusion.

    Heightened (2nd) The duration is 24 hours.
    Heightened (3rd) The duration is unlimited.
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
