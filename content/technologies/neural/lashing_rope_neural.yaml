id: lashing_rope_neural
name: Lashing Rope
description: |-
    You cause a section of rope or a rope-like object to animate, slither to your square, and encircle you, wreathing you in twisting, lashing fibers.
    When you Cast the Spell and each time you Sustain the Spell, you can make a melee Strike with the rope, which uses and contributes to your multiple attack penalty. These rope Strikes are melee spell attacks; have the magical, reach, and trip weapon traits; and deal 3d6 slashing damage.
    If you critically fail a check to @UUID[Compendium.pf2e.actionspf2e.Item.Trip] using the rope, you can't make any more Strikes with it this turn, nor can you use it to make an Attack of Opportunity until the beginning of your next turn. This replaces the usual results of a critical failure to Trip.

    Heightened (+2) The damage from your rope Strikes increases by 2d6.
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
resolution: attack
effects:
    on_hit:
        - type: damage
          dice: 3d6
          damage_type: slashing
          dc: 0
    on_crit_hit:
        - type: damage
          dice: 6d6
          damage_type: slashing
          dc: 0
