id: uncontrollable_dance_neural
name: Motor Cortex Hijack
description: 'The target''s motor cortex is overridden by a psychic signal that forces
  involuntary rhythmic movement. For the duration of the tech, the target is @UUID[Compendium.pf2e.conditionitems.Item.Off-Guard]
  and can''t use reactions. While affected, the creature can''t use move actions except
  to dance, using the Stride action to move up to half its Speed.


  Critical Success The target is unaffected.

  Success The tech''s duration is 3 rounds, and the target must spend at least 1 action
  each turn dancing.

  Failure The tech''s duration is 1 minute, and the target must spend at least 2 actions
  each turn dancing.

  Critical Failure The tech''s duration is 1 minute, and the target must spend all
  its actions each turn dancing.'
tradition: neural
level: 8
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
