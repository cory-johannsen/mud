id: telepathy_neural
name: Neural Link Array
description: 'You establish a telepathic mesh network with creatures within 30 feet.
  Once you establish a connection by communicating with a creature, the communication
  is two-way. You can communicate only with creatures that share a language with you.


  Heightened (6th) You can communicate telepathically using shared mental imagery
  even without a shared language; the effect loses the linguistic trait.'
