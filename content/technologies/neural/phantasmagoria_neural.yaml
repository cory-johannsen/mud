id: phantasmagoria_neural
name: Phantasmagoria
description: |-
    You fill the targets' minds with endless images, like countless dreams and lives colliding with each other. The onrushing information deals @Damage[16d6[mental]] damage to each target, depending on its Will save.

    Critical Success The target is unaffected.
    Success The target takes half damage and can't use reactions until the start of your next turn.
    Failure The target takes full damage and is @UUID[Compendium.pf2e.conditionitems.Item.Confused] until the start of your next turn.
    Critical Failure The target takes double damage and is confused for 1 minute.
tradition: neural
level: 9
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 16d3
          damage_type: mental
          dc: 0
    on_failure:
        - type: damage
          dice: 16d6
          damage_type: mental
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 32d6
          damage_type: mental
          dc: 0
