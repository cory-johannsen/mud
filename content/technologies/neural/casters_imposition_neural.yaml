id: casters_imposition_neural
name: Caster's Imposition
description: |-
    A magical interference prevents the target from contributing to any form of cooperative spellcasting. On a failed save, the target can't participate in any ritual unless they can cast the ritual alone, and they can't access any spells provided by a coven or similar cooperative ability.

    Heightened (4th) Increase the duration to 1 hour.
    Heightened (5th) Increase the duration to 1 day.
tradition: neural
level: 3
usage_type: prepared
action_cost: 3
range: self
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
    on_apply:
        - type: utility
          dc: 0
          description: A magical interference prevents the target from contributing to any form of cooperative spellcasting. On a failed save, the target can't participate in any ritual unless they can cast the ritual alone
