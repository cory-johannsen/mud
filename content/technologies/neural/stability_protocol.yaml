id: stability_protocol
name: Stability Protocol
description: You psychically enhance the target's balance and footing. The target
  gains a +2 status bonus to Acrobatics checks to Balance and to DCs against being
  Tripped or Shoved for the duration.
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'You free the target''s limbs from ailments that impede mobility.
      Attempt to counteract an effect of your choice imposing one of these conditions'
