id: rewrite_memory
name: Memory Editor
description: 'You access the target''s memory engrams and modify them: erasing, enhancing
  clarity, altering, or implanting false memories. The target can attempt a Willpower save
  to resist.


  Critical Success The target is unaffected and realizes you attempted to modify its
  memories.

  Success The target is unaffected but thinks your protocol was something harmless,
  unless it identifies the effect.

  Failure During the first 5 minutes of the spell''s duration, you can Sustain the
  spell to modify a memory once each round. When you do, you edit up to 6 seconds
  of memory, to a maximum of 5 continuous minutes.

  Any memories you''ve altered remain changed as long as the spell is active. If the
  target moves out of range before the 5 minutes is up, you can''t alter any further
  memories.


  Heightened (6th) You can Use this tech on a willing target to suppress all memory
  of a particular topic, detailed in 50 words or fewer. The effect is permanent, and
  it patches these omissions with blank data.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'You alter the target''s memories by erasing a memory, enhancing
      a memory''s clarity, altering a memory, or adding a false memory. The target
      can attempt a Willpower save to resist the spell.


      Critical Succes'
