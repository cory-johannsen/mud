id: sensory_overload
name: Sensory Overload
description: 'You project a barrage of simulated explosions, gunfire, and weapon discharges as an overwhelming torrent of sensory data. Enemies in the area must attempt a Reasoning check.

  Critical Success The enemy is unaffected.

  Success The target is Frightened 1.

  Failure The target is Frightened 2.

  Critical Failure The target is Frightened 3 and Fleeing for 1 round.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: rounds:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: frightened
    value: 1
  - &id002
    type: condition
    condition_id: fleeing
    value: 1
  on_crit_failure:
  - *id001
  - *id002
