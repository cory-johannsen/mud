id: strange_geometry
name: Warped Topology
description: 'Area 4 cubes, each 10 feet on a side

  You distort local spatial geometry, bending and folding the area into impossible
  configurations. The cubes can''t be adjacent to one another. A creature must attempt
  a Will save if it''s in one of the cubes when you activate the tech, or if it enters
  one during the duration. A creature can attempt a new save each round.


  Success The creature is unaffected.

  Failure The creature can''t find its way out; it is Immobilized for 1 round.

  Critical Failure As failure, and the creature takes 4d6 mental damage.'
