id: kings_castle_neural
name: Position Swap
description: You and a willing creature swap positions via a momentary dimensional
  shortcut. You appear in the target's former space, and the target appears in your
  former space. You and your target must each be able to fit in the new spaces within
  range; otherwise, the tech fails.
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You and a willing creature swap places. You appear in the target's
      former space, and the target appears in your former space. You and your target
      must each be able to fit in the new spaces within rang
