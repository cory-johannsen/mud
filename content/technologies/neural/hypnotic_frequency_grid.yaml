id: hypnotic_frequency_grid
name: Hypnotic Frequency Grid
description: 'You project a grid of pulsing neural frequencies. Creatures are Dazzled while inside the pattern. In addition, a creature must attempt a Will saving throw if it''s inside the pattern when you cast it, enters the pattern, ends its turn within the pattern, or uses a Seek or Interact action on the pattern. A creature currently Blinded by the pattern doesn''t need to attempt new saving throws.


  Success The creature is unaffected.

  Failure The creature is Blinded by the pattern. If it exits the pattern, it can attempt a new save to recover from the Blinded condition at the end of each of its turns, to a maximum duration of 1 minute.

  Critical Failure The creature is Blinded for 1 minute.'
tradition: neural
level: 6
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: dazzled
    value: 1
  - &id002
    type: condition
    condition_id: blinded
    value: 1
  on_crit_failure:
  - *id001
  - *id002
