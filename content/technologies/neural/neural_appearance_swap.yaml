id: neural_appearance_swap
name: Neural Appearance Swap
description: |-
    To mislead pursuers, the Lacunafex developed the means to swap visages. You trade appearances with the target, with the effects depending on the result of the target's Will saving throw. Willing and @UUID[Compendium.pf2e.conditionitems.Item.Unconscious] targets automatically critically fail this saving throw.

    Critical Success No effect.
    Success You take on the target's appearance, and they take yours. This has the same effects as a 1st-rank @UUID[Compendium.pf2e.spells-srd.Item.Illusory Disguise] spell, except that the target can't Dismiss the disguise. The duration is 1 minute or until Dismissed.
    Failure As success, but the duration is 1 hour or until Dismissed.
    Critical Failure As success, but the duration is 24 hours.
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
