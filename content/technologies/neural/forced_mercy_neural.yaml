id: forced_mercy_neural
name: Neural Mercy Compulsion
description: |-
    You soften the target's blows, ensuring they avoid vital areas and cause no lasting harm. All physical damage dealt by the target to living creatures becomes nonlethal and all persistent bleed damage dealt by the target is reduced to 0. This effect doesn't incur the typical –2 circumstance penalty for nonlethal attacks with a lethal weapon or attack. An unwilling target must attempt a Willpower save. A willing target can choose to critically fail their saving throw.Critical Success The creature is unaffected.
    Success The creature is affected for 1 round.
    Failure The creature is affected for [[/gmr 1d4 #rounds]]{1d4 rounds}.
    Critical Failure The creature is affected for 1 minute.Heightened (4th) The range increases to 100 feet, and you can target up to 8 creatures.
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
