id: portrait_of_the_artist
name: Identity Overlay
description: You overlay your biometrics with those of a well-known expert in a particular
  craft or performance, with the effects of illusory disguise. Additionally, you appear
  to mimic their skill, although such appearances are merely a holographic overlay.
  If they are famous for a specific Craft or Performance specialty, you gain a +4
  status bonus to checks with that skill to Perform, Create, or Earn Income. Other
  benefits are determined by the GM.
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
