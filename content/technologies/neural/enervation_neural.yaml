id: enervation_neural
name: Vitality Drain Beam
description: 'Extending a finger, you fire a beam of entropic energy that saps the
  life force of any creature it touches. Each living creature in the line must attempt
  a Toughness save.Critical Success The creature is unaffected.

  Success The creature takes @Damage[(floor(@item.rank/2))d8[persistent,void]] damage.

  Failure The creature takes @Damage[(floor(@item.rank/2)*2)d8[persistent,void]] damage
  and becomes Drained 1.

  Critical Failure The creature takes @Damage[(floor(@item.rank/2)*2)d8[persistent,void]]
  damage and becomes Drained 2 and Doomed 1.Heightened (+2) The persistent void damage
  increases by 1d8 on a success, or by 2d8 on a failure or critical failure.'
