id: pocket_dimension_suite
name: Pocket Dimension Suite
description: 'You generate an extradimensional demiplane consisting of a spacious
  dwelling with a single entrance. The entrance connects to the plane where you activated
  the tech, appearing anywhere within range as a faint, shimmering, vertical rectangle
  5 feet wide and 10 feet high. You designate who can enter when you activate the
  tech. Once inside, you can shut the entrance, making it @UUID[Compendium.pf2e.conditionitems.Item.Invisible].
  You and the creatures you designated can reopen the door at will.

  Inside, the demiplane appears to be a luxury suite featuring a magnificent foyer
  and numerous opulent chambers. The suite can have any floor plan you imagine as
  you activate the tech, provided it fits within a space 40 feet wide, 40 feet deep,
  and 30 feet tall. While the entrance is closed, effects from outside fail to penetrate
  it, and vice versa, except for @UUID[Compendium.pf2e.spells-srd.Item.Interplanar
  Teleport], which can be used to enter. You can use scanning technology and similar
  effects to observe the outside only if they''re capable of crossing planes.

  A staff of up to 24 service drones attends to anyone within the suite. These are
  like the drone created by the @UUID[Compendium.pf2e.spells-srd.Item.Phantasmal Minion]
  tech, though they''re visible, with an appearance you determine during activation.
  The suite is stocked with enough food to serve a nine-course banquet to 150 people.'
tradition: neural
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You grow an extradimensional demiplane consisting of a spacious dwelling
      with a single entrance. The entrance connects to the plane where you Cast the
      tech, appearing anywhere within the spell's rang
