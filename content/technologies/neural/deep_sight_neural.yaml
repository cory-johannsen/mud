id: deep_sight_neural
name: Low-Light Implant
description: Your optic nerves reconfigure, granting enhanced vision in darkness.
  You gain darkvision. If you already have darkvision, you gain greater darkvision
  instead for the duration.
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'Your eyes darken until they become entirely pitch black. You grant
      yourself the ability to see in the darkness. You gain darkvision. If you already
      have darkvision, you gain greater darkvision.


      Heigh'
