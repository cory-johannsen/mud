id: paralyze_neural
name: Motor Lock
description: 'You block the target''s motor impulses at the neural level, threatening
  to freeze the target in place. The target must attempt a Will save.


  Critical Success The target is unaffected.

  Success The target is Stunned 1.

  Failure The target is Paralyzed for 1 round.

  Critical Failure The target is Paralyzed for 4 rounds.'
