id: confusing_colors_neural
name: Confusing Colors
description: |-
    A cloud of cascading, ever-changing colors manifests in the air. Creatures are @UUID[Compendium.pf2e.conditionitems.Item.Dazzled] while inside the cloud, as are those within 20 feet of the cloud's area. A creature must attempt a Will save if it is inside the cloud when you cast it, enters the cloud, ends its turn within the cloud, or uses a @UUID[Compendium.pf2e.actionspf2e.Item.Seek] or Interact action on the cloud. A creature currently affected by the cloud doesn't need to attempt new saves.Success The creature is unaffected.
    Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Confused] for [[/r 1d4 #rounds]]{1d4 rounds}.
    Critical Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Stunned] for [[/r 1d4 #rounds]]{1d4 rounds}. After the stunned condition ends, the creature is confused for the remaining duration of the spell.
tradition: neural
level: 8
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
