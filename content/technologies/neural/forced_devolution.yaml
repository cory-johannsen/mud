id: forced_devolution
name: Forced Devolution
description: 'You overwrite the target creature''s genetic expression, regressing it into a harmless organism appropriate to the area, with effects based on its Fortitude save.Critical Success The target is unaffected.

  Success The target''s body gains minor features of the harmless organism. Its insides churn as they partially transform, causing it to be Sickened 1. When it recovers from the sickened condition, its features revert to normal.

  Failure The target transforms for 1 minute but keeps its mind. If it spends all its actions on its turn concentrating on its original form, it can attempt a Cool save save to end the effect immediately.

  Critical Failure The target is transformed into the chosen harmless organism, body and mind, for an unlimited duration.'
tradition: neural
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: nausea
    value: 1
  on_crit_failure:
  - *id001
