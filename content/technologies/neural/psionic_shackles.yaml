id: psionic_shackles
name: Psionic Shackles
description: Translucent psychic restraints launch from your outstretched hand and clasp around the target's limbs, impeding its movements. The target must attempt a Reflex save or become Immobilized. It can attempt to Escape against your spell DC.
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: immobilized
    value: 1
  on_crit_failure:
  - *id001
