id: digital_doppelganger
name: Digital Doppelganger
description: 'You create a hard-light double that physically resembles and mimics
  the target. This double is limited to moving, Interacting, speaking short sentences,
  and other basic tasks. It is unable to activate spells, attack, or use any complex skills.

  The double is your minion. You can issue new commands as part of Sustaining the
  tech. You can command it telepathically within 1 mile. You can switch between your
  own senses and the double''s with a single action, which has the concentrate trait.
  The double has the same statistics as the original creature, except it doesn''t
  have any item bonuses, and it has one quarter of the original''s Hit Points. If
  the double''s Hit Points reach 0, the spell ends.


  Upgraded (+1) The maximum level of the target increases by 2.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
resolution: none
