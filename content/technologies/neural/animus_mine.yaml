id: animus_mine
name: Psychic Tripwire
description: 'You implant a neural mine within your psyche that detonates against
  anyone attempting to hack your thoughts. You gain the following reaction for the
  duration: Neural Detonation [reaction] Trigger A creature targets you with a mental
  effect; Effect You deal 4d8 mental damage to the triggering creature with a basic
  Willpower save against your tech DC. After the mine detonates, the spell ends.


  Heightened (+2) The damage increases by 2d8.'
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 4d4
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 4d8
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 8d8
    damage_type: mental
    dc: 0
