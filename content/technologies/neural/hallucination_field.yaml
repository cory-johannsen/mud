id: hallucination_field
name: Hallucination Field
description: You blanket an area with psychic interference that makes the ground appear treacherous and unstable. Ground in the area is difficult terrain. Each creature in the area when the spell is cast must attempt a Willpower save or become Slowed 1 for 1 round.
tradition: neural
level: 3
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: slowed
    value: 1
  on_crit_failure:
  - *id001
