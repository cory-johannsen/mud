id: subsonic_shatter_pulse
name: Subsonic Shatter Pulse
description: 'You transmit destructive resonance frequencies through a target''s body,
  vibrating their bones and organs at lethal harmonics. The creature takes 8d6 sonic
  damage and must attempt a Toughness save.


  Critical Success The target is unaffected.

  Success The target takes half damage.

  Failure The target takes full damage, is Sickened 1, and is Deafened for 1 round.

  Critical Failure The target takes double damage, is Sickened 2, and is deafened
  for 1 minute.


  Heightened (+1) The damage increases by 2d6.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d3
    damage_type: sonic
    dc: 0
  on_failure:
  - type: damage
    dice: 8d6
    damage_type: sonic
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d6
    damage_type: sonic
    dc: 0
