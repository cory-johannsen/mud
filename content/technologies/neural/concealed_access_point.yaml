id: concealed_access_point
name: Concealed Access Point
description: 'You cause the target cable to extend vertically into the air. Where
  it ends, an extradimensional pocket space opens, connected to the top of the cable.
  This space can be reached only by climbing the cable.

  The entrance can''t be seen, and it can be pinpointed only by the presence of the
  cable. The cable can''t be removed or hidden, though it can be detached by pulling
  with 16,000 pounds of weight, critically succeeding at an Athletics check against
  the spell''s DC, or destroying the cable. The space holds up to eight Medium creatures
  and their gear.

  If the cable is detached or destroyed, or if a creature attempts to enter that would
  put it over capacity, the space unravels in [[/r 1d4 #rounds]]{1d4 rounds}, depositing
  the creatures safely on the ground below.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
