id: dehydration_loop
name: Dehydration Loop
description: 'You trap the target in a neural feedback loop that makes their body believe it is critically dehydrated. You can Dismiss the spell. The target must attempt a Grit check.Critical Success The creature is unaffected.

  Success The creature is Sickened 1.

  Failure The creature is Sickened 1 and must drink water every 10 minutes or take 1d4 damage.

  Critical Failure As failure but Sickened 2.'
tradition: neural
level: 3
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: nausea
    value: 1
  on_crit_failure:
  - *id001
