id: stealth_cloak_protocol
name: Stealth Cloak Protocol
description: You mask the target with psychic interference that makes observers less
  likely to notice suspicious activity. Creatures who might notice the target breaking
  in, picking locks, or performing other criminal acts must succeed at an Awareness
  check against your tech DC or fail to notice the activity.
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: The only thing thieves love more than being silent and stealthy is
      the piles of gold they win with that silence and stealth. You mask the target
      with multiple illusions combined in a perfect mix, affe
