id: psi_force_barrage
name: Psi-Force Barrage
description: |-
    You fire a shard of solidified magic toward a creature that you can see. It automatically hits and deals 1d4+1 force damage. For each additional action you use when Casting the tech, increase the number of shards you shoot by one, to a maximum of three shards for 3 actions. You choose the target for each shard individually. If you shoot more than one shard at the same target, combine the damage before applying bonuses or penalties to damage, resistances, weaknesses, and so forth.

    Heightened (+2) You fire one additional shard with each action you spend.
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
    on_apply:
        - type: damage
          dice: 1d4+1
          damage_type: force
          dc: 0
