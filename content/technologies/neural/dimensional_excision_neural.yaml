id: dimensional_excision_neural
name: Reality Excision
description: You tear a target partially out of reality, sending them into a neural
  pocket dimension. The target must attempt a Willpower save. On a failure, it disappears
  from the battlefield, removed from play until the start of your next turn, at which
  point it returns to the nearest open space.
tradition: neural
level: 9
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
