id: internal_insurrection_neural
name: Autoimmune Cascade
description: 'You inject the target with a neural pathogen that turns portions of
  their body against itself, leading to agonizing systemic failure. The target must
  attempt a Toughness save.


  Critical Success The target is unaffected.

  Success The target becomes Clumsy for 1 round as pain wracks their body.

  Failure The target is afflicted with autoimmune cascade at stage 1.

  Critical Failure The target is afflicted with autoimmune cascade at stage 2.


  Autoimmune Cascade (disease); Level 7.

  The target can''t recover from the clumsy condition from autoimmune cascade until
  the disease is cured

  Stage 1 Clumsy 1 (1 day)

  Stage 2 Clumsy 2 (1 day)

  Stage 3 clumsy 2 and Off-Guard (1 day)

  Stage 4 Clumsy 3 and off-guard (1 day)

  Stage 5 death, and the target''s body splits apart into a mass of fragments in a
  10-foot-emanation before collapsing, leaving a bare skeleton surrounded by gore.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
