id: cognitive_scrambler
name: Cognitive Scrambler
description: 'You blast the target''s decision-making centers with contradictory neural impulses, causing it to act randomly. The effects are determined by the target''s Willpower save. You can Dismiss the spell.


  Critical Success The target is unaffected.

  Success The target babbles incoherently and is Stunned 1.

  Failure The target is Confused for 1 minute. It can attempt a new save at the end of each of its turns to end the confusion.

  Critical Failure The target is Confused for 1 minute, with no save to end early.


  Upgraded (8th) You can target up to 10 creatures.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: stunned
    value: 1
  on_crit_failure:
  - *id001
