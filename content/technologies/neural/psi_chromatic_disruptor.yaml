id: psi_chromatic_disruptor
name: Psi-Chromatic Disruptor
description: 'You unleash a swirling multitude of colors that overwhelms creatures based on their Will saves.


  Critical Success The creature is unaffected.

  Success The creature is Dazzled for 1 round.

  Failure The creature is Stunned 1, Blinded for 1 round, and dazzled for 1 minute.

  Critical Failure The creature is stunned for 1 round and blinded for 1 minute.'
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: dazzled
    value: 1
  - &id002
    type: condition
    condition_id: blinded
    value: 1
  - &id003
    type: condition
    condition_id: stunned
    value: 1
  on_crit_failure:
  - *id001
  - *id002
  - *id003
