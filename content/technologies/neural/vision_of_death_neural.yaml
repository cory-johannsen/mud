id: vision_of_death_neural
name: Vision of Death
description: |-
    You force the target to see a vision of its own death. It takes 8d6 mental damage with a Will save. If the target is reduced to 0 HP by this spell, its vision becomes reality and kills it instantly.Critical Success The target is unaffected.
    Success The target takes half damage and is Frightened 1.
    Failure The target takes full damage and is Frightened 2.
    Critical Failure The target takes double damage, is Frightened 4 and is @UUID[Compendium.pf2e.conditionitems.Item.Fleeing] for as long as it's frightened.Heightened (+1) The damage increases by 2d6.
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 8d3
          damage_type: mental
          dc: 0
    on_failure:
        - type: damage
          dice: 8d6
          damage_type: mental
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 16d6
          damage_type: mental
          dc: 0
