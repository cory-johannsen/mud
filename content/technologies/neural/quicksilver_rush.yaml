id: quicksilver_rush
name: Quicksilver Rush
description: 'Your body destabilizes into liquid-metal form as you surge forward. You partially shift into a metallic fluid state and Stride up to twice your speed. During this movement, you can pass through one creature''s space by splitting into droplets and reforming on the other side, though you can''t end your turn in such a space. Passing through a creature''s space exposes it to heavy metal toxicity, with a Grit check.


  Critical Success The target is unaffected.

  Success The target becomes Sickened 1.

  Failure The target becomes Sickened 2 and takes 1d6 poison damage.

  Critical Failure The target becomes Sickened 2 and takes ((+2)*2)d6[poison] damage.


  Upgraded (+1) The damage increases by 1d6 on a failure and 2d6 on a critical failure.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 6d3
    damage_type: poison
    dc: 0
  on_failure:
  - type: damage
    dice: 6d6
    damage_type: poison
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 12d6
    damage_type: poison
    dc: 0
