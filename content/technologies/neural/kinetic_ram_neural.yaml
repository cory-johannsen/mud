id: kinetic_ram_neural
name: Psi-Kinetic Ram
description: |-
    Gathering kinetic energy, you either focus it in a straight line or disperse it as an encircling ripple. Any creature targeted by this tech must succeed at a Fortitude saving throw or be pushed 10 feet away from you (or 20 feet on a critical failure).
    The spell's area or range and how many creatures it affects is based on how many actions you spend when Casting the tech.1 The spell targets one creature within 15 feet.
    2 The spell targets one creature within 30 feet. The distance the target is pushed if it fails is doubled, and on a critical failure, the target is also knocked @UUID[Compendium.pf2e.conditionitems.Item.Prone] and takes @Damage[1d6[bludgeoning]] damage.
    3 The spell targets all creatures in a @Template[emanation|distance:5].
