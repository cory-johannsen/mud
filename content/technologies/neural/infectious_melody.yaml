id: infectious_melody
name: Infectious Melody
description: |-
    You call forth the chords of a tune so catchy that foes hearing it can't help but sing along, making it harder for them to communicate. Each target must attempt a Will save.Critical Success The creature is unaffected.
    Success For 1 round, the creature can communicate only by singing along to the melody. It can speak only on its turn, and it must take the @UUID[Compendium.pf2e.actionspf2e.Item.Perform] action when it does. The result of the Performance check determines how well it sang, but it stills communicate the information regardless of the result, which has no further mechanical impact than the time spent to take the action. A single Perform check is sufficient for any amount of speaking on the creature's turn. This effect might interfere with verbal components of spells or other linguistic abilities that rely on precise speech; in order to use such an ability successfully, the creature must succeed at a @Check[flat|dc:5|showDC:all].
    In addition, the creature takes a -2 status penalty on linguistic Intimidation checks, as singing its threats saps away some of the menace. The creature's constant humming of the tune also makes it nearly impossible for the creature to remain @UUID[Compendium.pf2e.conditionitems.Item.Undetected].
    @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Infectious Melody (Success)]
    Failure As success, but the duration is 3 rounds.
    @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Infectious Melody (Failure)]
    Critical Failure As success, but the duration is 1 hour.
    @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Infectious Melody (Critical Failure)]
