id: optic_burnout
name: Optic Burnout
description: 'You overload the target''s visual cortex, burning out their optical nerves. The effect is determined by the target''s Toughness save. The target then becomes temporarily immune for 1 minute.


  Critical Success The target is unaffected.

  Success The target is Dazzled for 1 round.

  Failure The target is Blinded for 1 minute.

  Critical Failure The target is Blinded with no duration (must be healed).'
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: blinded
    value: 1
  - &id002
    type: condition
    condition_id: dazzled
    value: 1
  on_crit_failure:
  - *id001
  - *id002
