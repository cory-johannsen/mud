id: phantom_pain
name: Phantom Pain
description: 'Illusory pain wracks the target, dealing 2d4 mental damage and 1d4 persistent mental damage. The target must attempt a Willpower save.Critical Success The target is unaffected.

  Success The target takes full initial damage but no persistent damage, and the spell ends immediately.

  Failure The target takes full initial and persistent damage, and the target is Sickened 1. If the target recovers from being Sickened, the persistent damage ends and the spell ends.

  Critical Failure As failure, but the target is Sickened 2.Heightened (+1) The damage increases by 2d4 and the persistent damage by 1d4.'
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: '2'
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 2d4
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d4
    damage_type: mental
    dc: 0
