id: familiars_face_neural
name: Familiar's Face
description: The target becomes a scrying sensor, allowing you to see through its eyes, smell what it smells, and similarly use its other senses. If you Cast a Spell with the revelation trait that affects your senses, such as @UUID[Compendium.pf2e.spells-srd.Item.See the Unseen], while this spell is active, you gain the benefit of the spell through the target's senses instead of your own. You can also speak through the target with a voice much like yours, though it takes on some of the timbre and character of the target's growls or squawks. You can use Command an Animal on the target as part of Sustaining this spell. You don't need line of sight or line of effect to your target when you Cast this Spell.
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
