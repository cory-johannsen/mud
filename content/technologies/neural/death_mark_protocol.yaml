id: death_mark_protocol
name: Death Mark Protocol
description: 'You psychically designate a weapon as the instrument of a target''s
  demise, implanting deep-seated terror of the weapon into the enemy''s subconscious.
  This neural link forms a persistent dread signal. The effect is based on the target
  enemy''s Willpower save.Critical Success The target enemy is unaffected.

  Success The target weapon deals an additional @Damage[2d6[mental]] damage the first
  time it hits the target enemy before the end of the spell''s duration.

  Failure The target weapon deals an additional @Damage[2d6[persistent,mental]] damage
  to the target enemy. If the enemy is critically hit by the weapon, the enemy is
  Doomed 1 for as long as it takes this persistent mental damage.

  Critical Failure The target weapon deals an additional @Damage[4d6[persistent,mental]]
  damage to the target enemy. If the enemy is critically hit by the weapon, the enemy
  is doomed 1.Heightened (+2) Increase the mental damage by 1d6 on a success, and
  increase the persistent mental damage by 1d6 on a failure or by 2d6 on a critical
  failure.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You solemnly declare that the target weapon will bring death to a
      foe, implanting an irrational fear of the weapon into the target enemy's mind.
      This link echoes at the forefront of the enemy's mind,
