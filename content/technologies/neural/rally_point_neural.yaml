id: rally_point_neural
name: Rally Point
description: You mark the area touched as a rally point. During the spell's duration, you can take a single action, which has the concentrate trait, to teleport to the rally point along with items you are wearing or holding. This teleportation fails if the area is occupied, if the rally point is more than 120 feet away, or if you try to bring along any other creature, even if it's in an extradimensional container. Once you teleport to the rally point, the spell's duration ends.Heightened (7th) You can designate up to four other creatures within 30 feet, in addition to yourself. Each of these creatures can teleport to the rally point once during the spell's duration by taking a single action, which has the concentrate trait. The spell's duration no longer ends once you teleport to the rally point, though you still can't teleport to the rally point again.
