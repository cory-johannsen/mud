id: planar_frequency_lock
name: Planar Frequency Lock
description: 'You attune your neural interface to an extraplanar frequency, connecting
  your consciousness without fully transporting. Your Strikes and spells gain the
  alignment traits of the plane you chose, which deals additional damage to creatures
  with a weakness to those alignment traits. Furthermore, you gain resistance 5 to
  damage of the alignments that oppose your chosen plane.


  Heightened (+2) The resistance increases by 5.'
