id: premonition_of_ruin
name: Premonition of Ruin
description: 'You force the target to perceive a horrific vision of their most likely death—a ghastly foretelling that the target instinctively knows is eerily possible. It''s not a guaranteed outcome, just a dreadful probability, but it haunts the target''s neural pathways all the same.


  Critical Success The target is unaffected.

  Success The target is Slowed 1 and Stupefied 1 for 1 round.

  Failure The target is slowed 1 and stupefied 1 until it next gets eight hours of rest.

  Critical Failure The target is Slowed 2 and Stupefied 2, decreasing these conditions by 1 for each eight hours of rest it gets.'
tradition: neural
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: slowed
    value: 1
  on_crit_failure:
  - *id001
