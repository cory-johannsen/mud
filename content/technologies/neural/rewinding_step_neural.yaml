id: rewinding_step_neural
name: Temporal Anchor
description: 'You lock your current position in the timestream as a reference point.
  The space you''re in when you activate this tech becomes your temporal anchor space.
  While you''re within 500 feet of your temporal anchor space, you can spend a single
  action that has the concentrate trait to instantly teleport back to that space (or
  the nearest unoccupied space if it''s occupied).


  Heightened (7th) The range increases to 1 mile.'
