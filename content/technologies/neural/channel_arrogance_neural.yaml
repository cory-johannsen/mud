id: channel_arrogance_neural
name: Channel Arrogance
description: |-
    You channel your heightened sense of self-worth into a creature, forcing them to acknowledge your true worth. You can Cast this Spell using 1 action if you know the target isn't worthy of you spending your time to generate the full force of this spell, or using 3 actions if you can't possibly hold back the majesty of your presence and must flood the target with your full attention.
    The target takes 5d10 mental damage and other effects depending on its Will saving throw. If you Cast the Spell using 1 action, the target gets a result one degree of success better than it rolled.Critical Success The creature is unaffected.
    Success The target takes half damage and is @UUID[Compendium.pf2e.conditionitems.Item.Fascinated] with you for 1 round.
    Failure The target takes full damage and is fascinated with you for 1 round. While fascinated with you, the target must succeed at a @Check[flat|dc:5] when attempting to Cast a Spell or use an action with the auditory trait. On a failure, the action is disrupted as the target blurts praise for you instead of saying what it intended.
    Critical Failure As failure, but double damage and the effect lasts for 1 minute.Heightened (+1) The damage increases by 1d10.
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 5d6
          damage_type: mental
          dc: 0
    on_failure:
        - type: damage
          dice: 5d10
          damage_type: mental
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 10d10
          damage_type: mental
          dc: 0
