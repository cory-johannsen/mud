id: wall_of_mirrors_neural
name: Reflective Hardlight Wall
description: You project a solid wall of shimmering reflective hardlight up to 50
  feet long and 20 feet high. The wall is an inch thick and stands vertically. You
  must create it in unbroken open space or the spell is lost. Each 10-foot-by-10-foot
  section has AC 10, Hardness 10, and 40 Hit Points, and it's immune to critical hits
  and precision damage. Everything on each side of the wall is Concealed from creatures
  on the opposite side. If a creature Strikes the wall, the wall reflects psychic
  feedback; the creature takes 4d4 mental damage and can resist this with a basic
  Willpower save.Heightened (+1) The Hit Points of each section increase by 10.
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
