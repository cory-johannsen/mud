id: teeth_to_terror
name: Teeth to Terror
description: |-
    The target believes its teeth are falling out, crawling along its face, stabbing into its body, and cramming themselves down its throat. The target takes 2d4 mental damage and @Damage[1d4[persistent,mental]], depending on its Will save. The target takes a -1 circumstance penalty to Strikes with its jaws or teeth while it is taking persistent mental damage.

    Critical Success The target is unaffected.
    Success The target takes half damage and no persistent mental damage.
    Failure The target takes full damage and persistent mental damage and is Frightened 1.
    Critical Failure The target takes full damage and persistent mental damage and is Frightened 3.

    Heightened (+2) You can target two additional creatures, the mental damage increases by 2d4, and the persistent mental damage increases by 1d4.
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: "2"
          damage_type: mental
          dc: 0
        - type: damage
          dice: "1"
          damage_type: mental
          dc: 0
    on_failure:
        - type: damage
          dice: 2d4
          damage_type: mental
          dc: 0
        - type: damage
          dice: 1d4
          damage_type: mental
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 4d4
          damage_type: mental
          dc: 0
        - type: damage
          dice: 2d4
          damage_type: mental
          dc: 0
