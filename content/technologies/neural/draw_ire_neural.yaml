id: draw_ire_neural
name: Draw Ire
description: |-
    You cause mental distress to a creature, goading it to strike back at you. You deal 1d10 mental damage to the creature and cause it to take a -1 status penalty to attack rolls against creatures other than you. The creature must attempt a Will saving throw.Critical Success The target is unaffected.
    Success The target takes half damage and the penalty. The spell ends at the end of the target's next turn. @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Draw Ire (Success)]
    Failure The target takes full damage and the penalty.
    Critical Failure The target takes double damage, and the status penalty is -2.
    @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Draw Ire]Heightened (+1) The damage increases by 1d10.
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 1d6
          damage_type: mental
          dc: 0
    on_failure:
        - type: damage
          dice: 1d10
          damage_type: mental
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 2d10
          damage_type: mental
          dc: 0
