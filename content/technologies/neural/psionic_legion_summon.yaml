id: psionic_legion_summon
name: Psionic Legion Summon
description: 'In the sprawl, psychic strike teams with disciplined focus cut through chaos with lethal precision. However, even veteran psions know that backup never hurts in a firefight, and they might call upon the assistance of a psionic legion. The legion occupies the space of a Huge creature. When you activate this tech, choose one of the psionic divisions below to summon.Agathions Speed 30 feetArrive (fire) Pranks for All A squadron of procyals arrives, eager to see your enemies learn their lesson in this fight. All enemies in a 60-foot cone take 8d6[fire|options:area-damage|traits:fire] damage (Quickness check (basic) save) as the procyals bombard them with popping firecrackersDepart Parting Lesson (emotion, mental) The procyals laugh uproariously as they leave, each throwing out a piece of unrelated advice to a nearby enemy. Enemies in a 20-foot emanation take 4d6[mental|options:area-damage|traits:emotion,mental] damage (Cool save (basic) save). On a failure, a creature is also Stunned 1. On a critical failure, they''re Stunned 2.Angels Speed 30 feet, fly 40 feetArrive (spirit) Flaming Truth A legion of balisses arrive in a burst of holy flame, dealing 8d6[spirit|options:area-damage] damage to all creatures in a 20-foot emanation with a Grit check (basic) save. On a critical failure, a creature is also Blinded for 1 roundDepart Hidden Departure With a plume of smoke, the balisses vanish, spreading a thick cloud of smoke in a 10-foot emanation. All creatures within the smoke are Concealed. Unholy creatures within the smoke are Enfeebled 2, and holy creatures within the smoke gain the effects of truesight and ignore the concealment granted by the smoke.Archons Speed 30 feet, fly 60 feetArrive (spirit) Justice Prevails A battalion of aesras, also known as legion archons, swoop in to provide assistance. Enemies within a 60-foot cone take 8d6[spirit|options:area-damage] damage (Quickness check (basic) save)Depart (fire) Eyes of Judgment With one final examination of the battlefield, the aesras take their leave, but not before bringing down their fiery swords to create a corridor of sacred flame. Enemies in a 60-foot line take 4d6[slashing,2d6[persistent,fire]|options:area-damage] damage (Quickness check (basic) save).Azatas Speed 30 feet, fly 80 feetArrive (auditory, sonic) Inspiring Song Kanya muses arrive to embolden your allies while pushing back your foes. Enemies in a 20-foot emanation take 6d6[sonic|options:area-damage|traits:auditory,sonic] damage (Grit check (basic) save). A creature that fails the save is also pushed 10 feet away from the kanyas. Allies in the emanation gain a +2 status bonus to attack rolls and saving throws, as well as +4 status bonus to damage rolls for the duration of the spellDepart (emotion, fear, mental) Booming Finale With a thunderous chord that stirs the hearts of your forces, the kanyas depart. Enemies in a 60-foot cone must attempt a Cool save save. On a failure, they''re Frightened 2, and on a critical failure, they''re Frightened 3 and Deafened for 1 round. Allies in this cone regain (4d10+16)[healing|traits:emotion,fear,mental] Hit Points.Garudas Speed 25 feet, fly 60 feetArrive Swooping Dive A battalion of garudas sweep through enemy lines, dealing 6d10[slashing|options:area-damage] damage to enemies in a 120-foot line (Quickness check (basic) save)Depart Winds of Freedom The garudas flap their wings in tandem, focusing on a 20-foot burst within 60 feet of them. All allies in that area gain a +1 circumstance bonus to all skill checks and DCs for 1 round, and enemies must succeed a Quickness check save or be knocked Prone.Holy Host (Azata)

  Holy Host (Garuda)'
