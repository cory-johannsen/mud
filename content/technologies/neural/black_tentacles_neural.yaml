id: black_tentacles_neural
name: Neural Tendrils
description: 'Area 20-foot burst adjacent to a flat surface

  Writhing tendrils of psychic energy rise up and attempt to ensnare creatures in
  the area. Make spell attack rolls against the Fortitude DC of each creature in the
  area. Any creature you succeed against is Grabbed and takes 3d6 bludgeoning damage.
  On a critical success, it is also Restrained. A creature can attempt to Escape against
  your spell DC.


  Each round you Sustain the tech, each creature grabbed or restrained by the tendrils
  takes 1d6 bludgeoning damage.


  Heightened (+2) The initial damage increases by 1d6, and the ongoing damage increases
  by 1d6.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
resolution: attack
effects:
  on_hit:
  - type: damage
    dice: 3d6
    damage_type: bludgeoning
    dc: 0
  on_crit_hit:
  - type: damage
    dice: 6d6
    damage_type: bludgeoning
    dc: 0
