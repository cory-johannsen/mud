id: augury_neural
name: Probability Scan
description: 'You gain a vague glimpse of the future. During the casting of this tech,
  ask about the results of a particular course of action. The GM determines the most
  likely outcome based on probability models: woe (bad outcome), weal (good outcome),
  weal and woe (mix), or nothing (no strong outcome). The GM may use a "nothing" result
  to avoid spoiling a storyline.


  If anyone asks about the same topic as the first augury, subsequent auguries give
  a random result.'
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
