id: instant_minefield_neural
name: Psychic Minefield
description: 'You plant several concealed psychic traps throughout the area that detonate
  when triggered. Choose up to 6 unoccupied squares within range. A mine appears in
  each chosen square, visible only to you and your allies. A mine can''t be targeted
  and isn''t affected by area effects, but if it hasn''t been triggered by the end
  of the tech''s duration, it disappears.


  When a creature enters a mined square, the mine detonates, dealing 2d10 force damage
  with a basic Reflex save. A creature can detect a mine by Searching the area and
  succeeding at a Perception check against your spell DC.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 3d3
    damage_type: piercing
    dc: 0
  - type: damage
    dice: 3d3
    damage_type: fire
    dc: 0
  on_failure:
  - type: damage
    dice: 3d6
    damage_type: piercing
    dc: 0
  - type: damage
    dice: 3d6
    damage_type: fire
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d6
    damage_type: piercing
    dc: 0
  - type: damage
    dice: 6d6
    damage_type: fire
    dc: 0
