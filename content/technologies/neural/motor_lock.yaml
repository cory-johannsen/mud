id: motor_lock
name: Motor Lock
description: 'You block the target''s motor impulses at the neural level, threatening to freeze the target in place. The target must attempt a Willpower save.


  Critical Success The target is unaffected.

  Success The target is Stunned 1.

  Failure The target is Paralyzed for 1 round.

  Critical Failure The target is Paralyzed for 4 rounds.'
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: stunned
    value: 1
  on_crit_failure:
  - *id001
