id: charm_neural
name: Social Manipulation Wave
description: You broadcast a low-level psionic signal that makes you seem trustworthy and appealing to the target. It must
  resist or treat you as a friendly contact.
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: To the target, your words are honey and your visage seems bathed in a dreamy haze. It must attempt a Will
      save, with a +4 circumstance bonus if you or your allies recently threatened it or used hostil
