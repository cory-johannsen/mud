id: rebounding_barrier_neural
name: Kinetic Deflector
description: 'Trigger You are hit by a physical Strike.


  You instantly project a reactive kinetic barrier, reducing physical damage and reflecting
  it onto your attacker. You gain resistance 10 against one physical damage type the
  triggering attack deals. Your attacker takes 5 damage of the same type.


  Heightened (+1) The resistance increases by 2. Damage dealt to your attacker increases
  by 1.'
