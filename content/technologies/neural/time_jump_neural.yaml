id: time_jump_neural
name: Time Jump
description: |-
    You leap forward a few seconds in time, appearing across the battlefield in the blink of an eye. You gain 2 actions, each of which must be used to Leap, Stand, Step, or Stride. If you have an appropriate Speed, you can add @UUID[Compendium.pf2e.actionspf2e.Item.Burrow], @UUID[Compendium.pf2e.actionspf2e.Item.Climb], @UUID[Compendium.pf2e.actionspf2e.Item.Fly], or @UUID[Compendium.pf2e.actionspf2e.Item.Swim] to this list. While you take these actions, time pauses. All other creatures are completely unaware of your actions, can't speak, and can't use any actions that would be triggered by your movement.
    While you're taking these actions, you can't take any other actions, including any that would be triggered by the move actions. Once the actions are complete, time starts again, and to onlookers, you seem to have suddenly teleported across the distance you traveled. Leaping forward through time is disorienting, so if you use time jump again within 1 minute of using the spell, you become Stupefied 4 for 1 minute.
tradition: neural
level: 3
usage_type: prepared
action_cost: 1
range: self
targets: single
duration: instant
resolution: none
