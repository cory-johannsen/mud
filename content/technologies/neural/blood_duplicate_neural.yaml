id: blood_duplicate_neural
name: Blood Clone
description: This process deals you 1 piercing damage as you shape a psychic duplicate
  of the target from your blood; you can't cast this on yourself. The duplicate appears
  in an unoccupied space adjacent to you. It has the same appearance as the target
  but is obviously fake on close examination. The duplicate can't speak, attack, or
  cast spells, but it can move at the target's Speed. It has AC 10 and 1 HP. If the
  duplicate is destroyed, the spell ends. You can Dismiss the spell.
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
