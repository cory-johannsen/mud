id: velocity_siphon
name: Velocity Siphon
description: 'You hack a foe''s motor cortex to drain their speed and redirect it to yourself or an ally. The effects depend on the foe''s Toughness save.


  Critical Success The targets are unaffected.

  Success The foe is Slowed 1 for 1 round, and the other target is unaffected.

  Failure The foe is slowed 1 for 3 rounds and the other target is Quickened for 1 round. It can use the extra action to Step, Stride, or Strike.

  Critical Failure The foe is slowed 1 for 3 minutes and the other target is quickened for 1 minute. It can use the extra action to Step, Stride, or Strike.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: slowed
    value: 1
  on_crit_failure:
  - *id001
