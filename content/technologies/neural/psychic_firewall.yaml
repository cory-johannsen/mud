id: psychic_firewall
name: Psychic Firewall
description: You erect a defensive barrier in your neural architecture that reflects hostile intrusions. When a creature fails to affect you with a mental effect, it takes 3d6 mental damage from the reflected feedback.
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 3d6
    damage_type: mental
  on_crit_failure:
  - type: damage
    dice: 6d6
    damage_type: mental
