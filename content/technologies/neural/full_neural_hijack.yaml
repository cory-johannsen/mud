id: full_neural_hijack
name: Full Neural Hijack
description: 'You transmit your consciousness into the target''s neural implant, attempting to take control. The target must attempt a Willpower save. If you want to exert less control over the target, you can choose to use the effects of any degree of success more favorable to the target.

  While you''re controlling a target, your own body is Unconscious and can''t wake up normally. You can sense everything the hijacked target does. You can Dismiss this tech. If the hijacked body dies, the tech ends and you must succeed at a Grit check against your tech DC or be Paralyzed for 1 hour, or 24 hours on a critical failure. If the tech ends during an encounter, you act just before the hijacked creature''s initiative.Critical Success The target is unaffected.

  Success You inhabit the target but can''t control it. You ride along in the body while the tech lasts.

  Failure You inhabit the target and take partial control of it. You no longer have a separate turn; instead, you might control the target. At the start of each of the target''s turns, it attempts another Willpower save. If it fails, it''s Controlled by you on that turn; if it succeeds, it chooses its own actions; and if it critically succeeds, it forces you out and the tech ends.

  Critical Failure You fully hijack the target, and it can only watch as you manipulate it like a puppet. The target is controlled by you.Upgraded (9th) The duration is 10 minutes, and you can physically enter the creature''s body, protecting your physical body while the tech lasts.'
tradition: neural
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: unconscious
    value: 1
  on_crit_failure:
  - *id001
