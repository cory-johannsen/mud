id: shadow_serpents
name: Shadow Serpents
description: 'A mass of serpentine shadow constructs rise up to capture creatures
  in the area. Each creature in the area when you activate the tech takes 3d6 piercing
  damage and 1d6 persistent poison damage from a biting construct, and it''s Grabbed
  or Restrained (your choice). A creature can attempt to Escape against your spell
  DC.


  Upgraded (+2) The piercing damage increases by 1d6, and the persistent poison
  damage increases by 1d6.'
