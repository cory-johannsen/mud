id: liminal_doorway_neural
name: Pocket Dimension Access
description: 'You hack a surface to open a portal into an extradimensional server
  room. Any creature treating the marking as an actual door can Interact to touch
  it and pass through. The digital space beyond is 20 feet in width, depth, and height.
  The space is empty, with grid lines indicating walls.

  If the access point is disrupted or a creature attempts to enter that would put
  the space over capacity, it begins to collapse, ejecting one creature at random
  each round until all are returned outside.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You draw a chalk doorway on an unbroken surface, which opens into
      an extradimensional space. Any creature treating the drawing as an actual door
