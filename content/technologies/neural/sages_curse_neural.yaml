id: sages_curse_neural
name: Analysis Paralysis Virus
description: 'You inject cognitive malware that floods the target''s mind with distracting
  data noise and hyperspecialized minutiae, causing constant second-guessing. The
  target must attempt a Will saving throw.


  Critical Success The target is unaffected.

  Success For 10 minutes, the target must roll twice and use the worse result whenever
  attempting an Arcana, Lore, Occultism, or Society check. If the target succeeds
  at a check to Recall Knowledge, it gains one piece of true knowledge and one piece
  of erroneous knowledge, but has no way of knowing which is which.

  Failure As success, but the effect is permanent.

  Critical Failure As failure, and the target treats the outcomes of all checks to
  Recall Knowledge as one degree of success worse than the result the target rolled.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'You afflict the target with a curse that fills its mind with distracting
      and hyperspecialized minutiae, causing it to second-guess even simple facts.
      The target must attempt a Will saving throw.


      Crit'
