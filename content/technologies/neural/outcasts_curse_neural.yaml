id: outcasts_curse_neural
name: Social Pariah Virus
description: 'You inject a neural virus that makes the target''s presence abrasive
  and off-putting to others. The target must attempt a Willpower save.Critical Success
  The target is unaffected.

  Success For 10 minutes, the target must roll twice and use the worse result whenever
  attempting a Deception, Diplomacy, Intimidation, or Performance check, and creatures
  they encounter have an initial attitude toward them of one step worse.

  Failure As success, but the effect is permanent.

  Critical Failure As failure, and creatures that the target encounters have an initial
  attitude toward them of two steps worse.'
