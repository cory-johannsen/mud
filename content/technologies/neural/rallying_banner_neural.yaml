id: rallying_banner_neural
name: Propaganda Beacon
description: 'You project a massive holographic banner representing a faction, cause,
  or ideology. This banner is 30 feet tall, 30 feet wide, and hovers 20 feet in the
  air above the target. The banner is surrounded by flashing lights, simulated fireworks,
  and crowd noise.


  Allies within 30 feet of the banner gain a +1 status bonus to attack rolls, saving
  throws, and skill checks. Enemies within 30 feet take a -1 status penalty to Will
  saves.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
resolution: none
