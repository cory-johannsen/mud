id: psionic_tendrils
name: Psionic Tendrils
description: You animate nearby cables and wiring with psychokinetic force, causing
  them to slither to your position and encircle you defensively. When you are hit
  by a melee attack, the tendrils lash out at the attacker, dealing 1d6 bludgeoning
  damage.
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
resolution: attack
effects:
  on_hit:
  - type: damage
    dice: 3d6
    damage_type: slashing
    dc: 0
  on_crit_hit:
  - type: damage
    dice: 6d6
    damage_type: slashing
    dc: 0
