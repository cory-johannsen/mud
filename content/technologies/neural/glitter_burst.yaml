id: glitter_burst
name: Glitter Burst
description: 'You create a burst of shimmering psychic particles in the area. Each creature in the area must attempt a Grit check.


  Critical Success The creature is unaffected.

  Success The creature is Dazzled for 1 round.

  Failure The creature is Dazzled for 1 minute.

  Critical Failure The creature is Blinded for 1 round and Dazzled for 10 minutes.'
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: condition
    condition_id: dazzled
    value: 1
  - type: condition
    condition_id: blinded
    value: 1
