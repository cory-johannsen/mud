id: vocal_cord_lockout
name: Vocal Cord Lockout
description: 'You disable a creature''s vocal output, rendering them mute. The effect
  is determined by the target''s Grit check. The target then becomes temporarily
  immune for 1 minute. A creature that has no voice or can''t speak is immune.


  Critical Success The target is unaffected.

  Success The target becomes voiceless until the end of its next turn. A voiceless
  creature can''t speak, create vocal sounds, or take auditory actions. As long as
  the target is voiceless, whenever you speak, you can choose to have your voice sound
  like either your voice or the target''s voice.

  Failure As success, but the duration is 1 minute.

  Critical Failure As success, but the duration is permanent.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
