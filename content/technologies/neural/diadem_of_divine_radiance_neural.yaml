id: diadem_of_divine_radiance_neural
name: Diadem of Divine Radiance
description: |-
    You don a diadem of radiant light, which sheds bright light to a range of 60 feet and dim light to a further 60 feet. When you Cast the Spell and when you Sustain it during the duration, you can draw a disc of spiraling light from the diadem and throw it at a creature within 120 feet. Make a ranged spell attack at mythic proficiency against the target's AC. This action has the attack and spirit traits. On a hit, you deal 4d8 spirit damage, 1d4 persistent spirit damage, and the target is @UUID[Compendium.pf2e.conditionitems.Item.Dazzled] for 1 round (3 rounds on a critical hit). The persistent damage isn't doubled on a critical hit.
    If the disc passes through an area of magical darkness or targets a creature affected by magical darkness, the disc's glow attempts to counteract the darkness using your Religion or Occultism skill modifier as the counteract check modifier and half your level as the counteract rank.
    @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Diadem of Divine Radiance]Heightened (+2) The disc's spirit damage increases by 2d8, and the persistent damage increases by 1d4.
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
effects:
    on_apply:
        - type: damage
          dice: 4d8
          damage_type: spirit
          dc: 0
        - type: damage
          dice: 1d4
          damage_type: spirit
          dc: 0
