id: synaptic_pulse
name: Synaptic Pulse
description: 'You emit a pulsating neural blast that penetrates the minds of all enemies in the area. Each enemy in the area must attempt a Willpower save.


  Critical Success The creature is unaffected.

  Success The creature is Stunned 1.

  Failure The creature is Stunned 2.

  Critical Failure The creature is Stunned for 1 round.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: rounds:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: stunned
    value: 1
  on_crit_failure:
  - *id001
