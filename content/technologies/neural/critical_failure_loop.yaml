id: critical_failure_loop
name: Critical Failure Loop
description: 'You inject a recursive thought pattern into the target''s mind, convincing
  them they''ve missed a critical deadline or failed to act at a crucial moment. Sensations
  of overwhelming panic flood the target''s neural pathways, causing excruciating
  mental anguish that deals 12d6 mental damage. The target must attempt a Willpower save.Critical
  Success The conviction of a missed opportunity is only a fleeting notion that passes
  quickly without any effect on the target.

  Success The target takes half damage and is Frightened 1.

  Failure The target takes full damage and becomes Frightened 2. In addition, the
  target is Slowed 1 for as long as they remain frightened.

  Critical Failure The target takes double damage and becomes Frightened 3. In addition,
  the target is slowed 1 for as long as they remain frightened.Heightened (+1) The
  damage increases by 2d6.'
tradition: neural
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 12d3
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 12d6
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 24d6
    damage_type: mental
    dc: 0
