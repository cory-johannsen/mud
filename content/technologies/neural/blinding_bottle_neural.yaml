id: blinding_bottle_neural
name: Flashbang Grenade
description: 'You conjure an exploding canister filled with a sight-destroying chemical
  agent and hurl it across enemy lines. Upon impact, the canister bursts and exposes
  all creatures in the area to the compound within. Each creature in the area must
  attempt a Toughness save.

  Critical Success The creature is unaffected.

  Success The creature is Dazzled for 1 round.

  Failure The creature is Blinded for 1 round and Dazzled for 1 minute.

  Critical Failure The creature is Blinded for 1 minute and Dazzled for 10 minutes.


  Heightened (+2) The initial damage increases by 1d6.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 3d3
    damage_type: poison
    dc: 0
  on_failure:
  - type: damage
    dice: 3d6
    damage_type: poison
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d6
    damage_type: poison
    dc: 0
