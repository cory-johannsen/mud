id: blinding_bottle_neural
name: Blinding Bottle
description: |-
    You conjure an exploding glass container filled with a sight-stealing poison and hurl it across enemy lines. Upon impact, the bottle bursts and exposes all creatures in the area to the toxin within. Each creature in the area must attempt a Fortitude save.Critical Success The creature is unaffected.
    Success The creature takes 3d6 poison damage.
    Failure The creature is afflicted with blinding poison at stage 1.
    Critical Failure The creature is afflicted with blinding poison at stage 2.Blinding Poison (incapacitation, poison) Level 9
    Maximum Duration 4 rounds
    Stage 1 @Damage[3d6[poison]|traits:incapacitation,poison] damage and @UUID[Compendium.pf2e.conditionitems.Item.Blinded] for 1 round (1 round)
    Stage 2 @Damage[4d6[poison]|traits:incapacitation,poison] damage and blinded for 1 round (1 round)
    Stage 3 @Damage[5d6[poison]|traits:incapacitation,poison] poison damage and blinded for 1 round (1 round)
    Stage 4 @Damage[6d6[poison]|traits:incapacitation,poison] poison damage and blinded for 1 minute (1 round)PFS Note: The poison inflicted by this spell has the incapacitation trait, but the spell itself does not. This means that a creature which fails the save against the spell begins at stage 1 for the poison.
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 3d3
          damage_type: poison
          dc: 0
    on_failure:
        - type: damage
          dice: 3d6
          damage_type: poison
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 6d6
          damage_type: poison
          dc: 0
