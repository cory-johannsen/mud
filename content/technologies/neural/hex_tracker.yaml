id: hex_tracker
name: Hex Tracker
description: 'You install a psychic tracking beacon that hovers in the target''s neural
  field. You and allies within 30 feet of the target gain a +1 circumstance bonus
  to attacks against the target. The target takes a -1 circumstance penalty to Survival,
  Nature, and Lore checks to navigate or determine direction, and gains a +1 circumstance
  penalty to DCs of its saving throws against weather events. You can Dismiss the
  spell.


  Upgraded (4th) The penalty to checks increases to -2 and you and allies gain a
  +2 circumstance bonus to attacks against the target.'
