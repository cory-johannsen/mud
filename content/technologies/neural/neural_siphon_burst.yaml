id: neural_siphon_burst
name: Neural Siphon Burst
description: 'Area (continued) two 30-foot cones

  You project a neural siphon field that drains life force with one pulse and redistributes
  it with another. All living creatures in the first cone take 5d6 void damage with
  a basic Toughness save. You and all living creatures in the second cone regain Hit
  Points equal to the greatest damage a single creature took from the first cone.


  Heightened (+1) The damage increases by 1d6.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 5d3
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 5d6
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 10d6
    damage_type: void
    dc: 0
