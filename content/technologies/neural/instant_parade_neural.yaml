id: instant_parade_neural
name: Instant Parade
description: |-
    An illusory parade with dozens of participants and performers appears around you, following you as you move. The parade is lively and noisy, providing enough cover and distraction to hide among the crowd. You and other creatures can @UUID[Compendium.pf2e.actionspf2e.Item.Hide] and @UUID[Compendium.pf2e.actionspf2e.Item.Sneak] inside the crowd, though creatures that disbelieve the illusion still see creatures within as normal.
    You can choose to send the parade off with a 2-action activity, which has the concentrate trait. When you do so, the parade no longer follows you and instead continues traveling in the direction of your choice. The parade travels 100 feet over 1 round and then disappears as the spell is Dismissed. You can otherwise Dismiss the spell normally if you prefer.
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
resolution: none
