id: psychic_anchor
name: Psychic Anchor
description: Visible tendrils of psychic force anchor your body to the ground, preventing
  unwanted movement. Whenever you're on the ground and a creature or effect attempts
  to forcibly move you, you gain a +4 status bonus to your Fortitude DC or any check
  you make to resist the attempt.
