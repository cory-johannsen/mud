id: chimera_frame
name: Chimera Frame
description: 'You activate an experimental polymorph implant that reshapes your body
  into a synthetic combat chassis, which is Medium unless stated otherwise. When you
  cast this tech, choose a chassis type. While in this form, you gain the synthetic
  trait. Unless you choose certain chassis types, you have hands in this battle form
  and can use manipulate actions. You can Dismiss the spell.

  You gain the following statistics and abilities regardless of the form that you
  choose:AC = 19 + your level. Ignore your armor''s check penalty and Speed reduction.15
  temporary Hit Points and weakness 5 to cold iron.Low-light vision.One or more unarmed
  melee attacks specific to the battle form you choose, which are the only attacks
  you can Strike with. You''re trained with them. Your attack modifier is +16, and
  you use the listed damage. These attacks are Dexterity based. If your attack modifier
  is higher for the given unarmed attack or weapon, you can use it instead.Acrobatics
  modifiers of +16, unless your own modifier is higher.You also gain specific abilities
  based on the chassis type chosen. Statistics remain as per the base spell.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
