id: befitting_attire_neural
name: Holographic Wardrobe
description: You cloak the targets in a neural illusion, shaping their clothing and
  worn items into ones suitable for a particular occasion or social context. The illusion
  adjusts dynamically as the targets change posture or position. Any creature that
  touches the illusory clothes or Seeks realizes they're fake with a successful Perception
  check against your spell DC.
