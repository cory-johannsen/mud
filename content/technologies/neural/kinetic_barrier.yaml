id: kinetic_barrier
name: Kinetic Barrier
description: You psychically animate a shield to protect you without using your hands.
  The shield floats near you and grants its bonus. You can Raise the shield using
  a free action. If the shield is destroyed, the spell ends.
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'You levitate the touched shield and send it to orbit around a creature.
      When you Use this tech and Sustain it, the shield uses the Raise a Shield action
      to protect the target creature.'
