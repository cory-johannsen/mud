id: ectoplasmic_expulsion
name: Ectoplasmic Expulsion
description: You call upon tendrils of ephemeral ectoplasm to pass through the target and carry away a harmful psychic affliction. You immediately attempt to counteract a single effect on the target with the emotion or possession trait, or an effect giving the target the @UUID[Compendium.pf2e.conditionitems.Item.Controlled] or @UUID[Compendium.pf2e.conditionitems.Item.Fascinated] condition. If you fail to counteract the effect, you nevertheless set up a resonance that allows the target to more ably escape the effect on its own; for the next hour, the target gains a +2 status bonus to Will saves to shrug off the effect you failed to counteract (such as Will saves to shake off control by the @UUID[Compendium.pf2e.spells-srd.Item.Possession] spell).
