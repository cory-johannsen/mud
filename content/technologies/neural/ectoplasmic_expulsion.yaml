id: ectoplasmic_expulsion
name: Psychic Purge
description: 'You project a burst of cleansing psychic energy through the target,
  purging a harmful mental affliction. You immediately attempt to counteract a single
  effect on the target with the emotion or possession trait, or an effect giving the
  target the Confused, Controlled, or Stupefied condition. If your counteract attempt
  succeeds, the purged affliction streams from the target''s body as ectoplasmic residue
  that lashes back at nearby foes, dealing 5d8 mental damage to all enemies within
  a 30-foot emanation, with a basic Will save.


  Heightened (+2) The damage increases by 2d8.'
