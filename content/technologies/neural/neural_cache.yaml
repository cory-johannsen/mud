id: neural_cache
name: Neural Cache
description: 'You transfer a container and its contents into a psychic construct stored
  in your mind that only you can perceive and interact with. The container''s physical
  properties are irrelevant to this tech, but the container can''t contain any creatures.
  When you wish to retrieve the container, you spend a single action with the concentrate
  trait to return it to the physical world in an adjacent space.


  If you die while storing a neural cache, the container reappears in the nearest
  unoccupied space.'
