id: precognition_feed
name: Precognition Feed
description: 'You hardwire a precognitive data stream into a willing creature''s neural interface, granting a persistent early-warning sense. The target gains a +2 status bonus to initiative and cannot be flat-footed. It gains an outcome one step better than rolled on Awareness checks made as initiative. Duration: 1 hour.'
tradition: neural
level: 9
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: condition
    condition_id: flat_footed
    value: 1
