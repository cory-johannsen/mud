id: chromatic_ray_neural
name: Prismatic Lance
description: 'You project a beam of variable-frequency energy toward your target,
  with devastating effects depending on the wavelength. Make a spell attack roll.
  If you hit, roll [[/r 1d4]]{1d4} to determine which frequency fires. If the ray
  deals damage, that damage is doubled on a critical hit. Any additional traits that
  apply to a ray are listed in parentheses just after the name of the color.


  Red (fire) The ray deals @Damage[30[fire]] damage to the target.

  Orange (acid) The ray deals @Damage[40[acid]] damage to the target.

  Yellow (electricity) The ray deals @Damage[50[electricity]] damage to the target.

  Green (poison) The ray deals @Damage[25[poison]] damage to the target, and the target
  must succeed at a Fortitude save or be Enfeebled 1 for 1 minute (Enfeebled 2 on
  a critical failure).



  Heightened (6th) The damage for @Damage[40[fire]]{Red}, @Damage[50[acid]]{Orange},
  @Damage[60[electricity]]{Yellow}, and @Damage[35[poison]]{Green} each increase by
  10. Roll [[/r 1d8]]{1d8} to determine the ray''s color, using the results for 1-4
  above and the results for 5-8 below.


  Blue The ray has the effect of the Petrify protocol. On a critical hit, the target
  is Clumsy 1 as long as it''s Slowed by the crystallization effect.

  Indigo (emotion, incapacitation, mental) The ray has the effect of the Confusion
  protocol. On a critical hit, it has the effect of Warp Mind instead.

  Violet The target is Slowed for 1 minute. It must also succeed at a will save or
  be teleported 120 feet directly away from you (if there isn''t room for it to appear
  there, it appears in the nearest open space); this is a teleportation effect.

  Intense Color The target is Dazzled until the end of your next turn, or Blinded
  if your attack roll was a critical hit. Roll again and add the effects of another
  color (rerolling results of 8).'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
