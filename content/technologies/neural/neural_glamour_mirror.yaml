id: neural_glamour_mirror
name: Neural Glamour Mirror
description: When you cast this protocol, choose a willing creature that's the same
  size as you and that you can see within 30 feet. The spell then disguises you with
  a realistic holographic overlay that includes tactile and olfactory simulation in
  addition to visual and voice alteration. The appearance includes any changes needed
  to match the target creature's ideal self-image. If you're ever more than 30 feet
  from the subject, the effect immediately ends. You can Dismiss this tech.
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
