id: speak_with_stones_neural
name: Structure Interface
description: 'You tap into the embedded sensor networks within structural materials,
  extracting data from walls, floors, and foundations. While structures are not intelligent,
  you access their accumulated environmental data, which is colored by the type of
  material and the structure''s purpose. A structure''s awareness is limited to what
  it can sense through vibration and temperature changes.


  Heightened (6th) You can interface with structures up to 1 mile away.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You can ask questions of and receive answers from natural or worked
      stone. While stone is not intelligent, you speak with the natural spirits of
      the stone, which have a personality colored by the type
