id: circle_of_protection_neural
name: Psychic Exclusion Zone
description: You ward a creature and those nearby against a specified threat category.
  Creatures of the chosen category take a -1 status penalty to attack rolls, spell
  attack rolls, and DCs of their abilities against the warded creature and all allies
  within a 10-foot emanation.
tradition: neural
level: 3
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You ward a creature and those nearby against a specified alignment.
      Choose chaotic, evil, good, or lawful; this spell gains the opposing trait.
      Creatures in the area gain a +1 status bonus to AC again
