id: behold_the_weave_neural
name: Timeline Splice
description: 'You hack into the probability matrices surrounding a creature''s neural
  signature, forcing a favorable outcome to manifest. The target must attempt a Will
  save.Critical Success The creature is unaffected.

  Success Until the end of your next turn, when the creature uses a skill, it must
  roll twice and use the worse result.

  Failure As success, but the duration is 1 minute.

  Critical Failure As failure, and the creature also uses the worse result on attack
  rolls and saving throws.'
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: rounds:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You behold the many timelines that weave around a creature, and in
      so doing, you make one more likely to occur. The target must attempt a Will
      save.Critical Success You can make neither heads nor tail
