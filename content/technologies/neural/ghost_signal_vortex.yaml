id: ghost_signal_vortex
name: Ghost Signal Vortex
description: 'You channel corrupted data frequencies to briefly manifest an amalgam of echoing digital ghosts—fragments of consciousness harvested from deceased neural implant users. This amalgam manifests as a massive tornado of flickering, howling holographic faces. It occupies the space of a Huge creature and has a Speed of 60 feet.

  Arrive (negative) Vortex of Deletion Each enemy creature within a 60-foot emanation must attempt a Toughness save with the following effects.Critical Success The creature is unaffected

  Success The creature is Drained 1.

  Failure The creature is Drained 2.

  Critical Failure The creature is Drained 3.Depart (emotion, fear, mental) Howl of the Lost The digital ghosts let out an anguished scream. All your enemies within a 100-foot emanation must attempt Cool save saves with the following effects.Critical Success The creature is unaffected.

  Success The creature is Frightened 1.

  Failure The creature is Frightened 3.

  Critical Failure The creature is frightened 3. It''s also Fleeing for 1 round or until it''s no longer frightened, whichever comes first.'
tradition: neural
level: 7
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
