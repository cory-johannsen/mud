id: coiling_dance_neural
name: Coiling Dance
description: |-
    You perform a dance that seeks to pass on the knowledge and wisdom of a naga. Your allies in the area are filled with sacred energy, making their spells and attacks holy. Creatures or effects that would be unholy don't gain this benefit
    @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Coiling Dance]
    When you cast or Sustain this spell, you can choose an ally in the area that's @UUID[Compendium.pf2e.conditionitems.Item.Grabbed], @UUID[Compendium.pf2e.conditionitems.Item.Immobilized], or @UUID[Compendium.pf2e.conditionitems.Item.Restrained]. They can immediately use a reaction to @UUID[Compendium.pf2e.actionspf2e.Item.Escape]; they can use your Occultism or Religion modifier for the check instead of their unarmed attack, Acrobatics, or Athletics modifier if that would be better.
