id: unfathomable_song
name: Cognitohazard Broadcast
description: You broadcast a cognitohazardous signal that destabilizes cognition.
  Each creature in a 60-foot emanation that can perceive the broadcast must attempt
  a Will save at the start of each of your turns. On a failure, they become confused.
  On a critical failure, they also take 6d8 mental damage. Creatures that succeed
  are temporarily immune to this casting for 24 hours.
