id: vicious_jealousy_neural
name: Envy Virus
description: 'You infect the target with psychic jealousy toward a creature you specify.
  The target must attempt a Willpower save.


  Critical Success The creature is unaffected.

  Success The creature takes a -1 status penalty to checks involving the specified
  creature for 1 round.

  Failure The creature is compelled to outperform or undermine the specified creature
  for 1 minute, taking a -2 status penalty to checks that don''t involve competing
  with or sabotaging the target of its jealousy.

  Critical Failure As failure, and the creature must spend at least 1 action per turn
  targeting the creature it envies.'
tradition: neural
