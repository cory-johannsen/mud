id: swarm_intelligence_upload
name: Swarm Intelligence Upload
description: 'You upload a corrupted AI swarm intelligence to the battlefield, manifesting as a massive holographic construct riddled with swarming nanobots. The construct occupies the space of a Gargantuan creature. It is riddled with micro-drones, whose collective movement grants the construct a Speed of 60 feet and a fly Speed of 60 feet.

  Arrive Behold the Corrupted Host The construct is horrifically glitched, emitting acrid fumes, and constantly twitches thanks to the movement of millions of malfunctioning nanobots. A loud, persistent buzzing is created by the drone clouds surrounding it like a haze. Each living enemy creature within a 60-foot emanation must attempt a Grit check with the following effects.Critical Success The creature is unaffected.

  Success The creature is Sickened 2.

  Failure The creature is Sickened 3 and Deafened for the duration.

  Critical Failure The creature is Sickened 4, Stunned 1, and deafened for the duration.Depart (poison) Nanobot Swarm Feast The millions of nanobots pour out of the construct and surge across the battlefield, disassembling your enemies. This swarm deals 5d8 piercing damage and 5d8 poison damage to enemy creatures in a 60-foot emanation with a basic Quickness check. A creature that critically fails is additionally Drained 2.'
