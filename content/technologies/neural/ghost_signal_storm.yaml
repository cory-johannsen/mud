id: ghost_signal_storm
name: Ghost Signal Storm
description: 'You broadcast on forbidden frequencies that manifest as wailing digital
  ghosts to terrorize your foes. Living creatures in the area take 5d6 void damage
  and 1d6 mental damage and must attempt a Willpower save. Nonliving creatures are immune
  to this tech''s effects.

  Critical Success The creature is unaffected.

  Success The creature takes half damage.

  Failure The creature takes full damage and is Frightened 1.

  Critical Failure The creature takes double damage and is Frightened 2.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 1d3
    damage_type: mental
    dc: 0
  - type: damage
    dice: 5d3
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 1d6
    damage_type: mental
    dc: 0
  - type: damage
    dice: 5d6
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 2d6
    damage_type: mental
    dc: 0
  - type: damage
    dice: 10d6
    damage_type: void
    dc: 0
