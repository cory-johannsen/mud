id: entropic_irradiation
name: Entropic Irradiation
description: 'You imbue the touched object or space with slow-acting necrotic radiation.
  If you cast the spell on an object, any creature ending its turn holding or carrying
  the object takes 2d6 void damage. If you cast the spell on an area, any creature
  ending its turn in the area takes 2d6 void damage. You can attempt to use this tech
  on an attended object by touching it. If you do, the creature attempts a Reflex
  save to reduce the effect.


  Critical Success The object is unaffected.

  Success The creature pulls the object away quickly. The spell only lasts 1 minute.

  Failure The creature manages to slightly protect the object. The spell lasts 10
  minutes.

  Critical Failure The spell lasts the full 24 hours.


  Upgraded (+2) Increase the radiation''s void damage by 1d6'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d3
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 2d6
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d6
    damage_type: void
    dc: 0
