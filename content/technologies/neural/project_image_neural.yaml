id: project_image_neural
name: Remote Holographic Proxy
description: 'You project a hard-light holographic image of yourself. You must stay
  within range of the image, and if at any point you can''t see the image, the tech
  ends. Whenever you activate a tech other than one whose area is an emanation, you
  can cause the effect to originate from either yourself or the image. Because the
  image is a projection, it can''t benefit from tech, though visual manifestations
  appear. The image has the same AC and saves as you. If it is hit by an attack or
  fails a save, the tech ends.


  Heightened (+2) The maximum duration you can Sustain the tech increases to 10 minutes.'
tradition: neural
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
resolution: none
