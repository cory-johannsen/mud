id: prismatic_echo_array
name: Prismatic Echo Array
description: 'You project three holographic duplicates of yourself, and each of the four of you takes on a different chromatic frequency, your colors all shifting each time someone attacks you. This has the effects of Mirror Image, except that whenever a foe destroys one of the images, roll [[/r 1d4]]{1d4} to see which frequency the image was when it was destroyed. The attacker takes the corresponding effect.


  Red 5[fire] damage and 5[mental] damage.

  Orange 5[acid] damage and 5[mental] damage.

  Yellow 5[electricity] damage and 5[mental] damage.

  Green 5[poison] damage and 5[mental] damage, plus it''s Frightened 1.'
tradition: neural
level: 6
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: condition
    condition_id: frightened
    value: 1
