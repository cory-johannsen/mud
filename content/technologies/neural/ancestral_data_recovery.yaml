id: ancestral_data_recovery
name: Ancestral Data Recovery
description: 'You establish a neural link with the target, focusing on a piece of
  knowledge important to their culture, family (by birth or choice), or home settlement.
  Both you and the target must be aware this knowledge exists, even if you don''t
  know the exact details.

  As your tech connects them to this legacy, the target gains a non-lineage ancestry
  feat from their ancestry. The feat must be of a level no higher than twice the tech''s
  rank and the target must meet any prerequisites for the feat.

  The target is then immune to any further activations of ancestral data recovery
  until their next daily preparations.'
tradition: neural
level: 7
usage_type: prepared
action_cost: 3
range: melee
targets: single
duration: instant
resolution: none
