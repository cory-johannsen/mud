id: network_query
name: Network Query
description: You query the distributed sensor networks and data feeds surrounding
  you, requesting guidance. You receive guidance as either processed intelligence
  or a directional ping that guides you to a helpful destination. The quality of the
  information depends on the nature of your query and what data is available locally.
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You ask a question of the spirits of air, imploring them to send
      signals through the winds to help you find your way. You might be guided by
      air elementals, anemoi, or even the Lords of Air themselves
