id: viral_cognition_plague
name: Viral Cognition Plague
description: 'You inject a self-replicating psychic virus into the target''s neural
  architecture, sapping its processing power and leaving a contagious trap in its
  datastream. The target must attempt a Willpower save. Any creature that uses a neural
  or psionic tech on the target while it''s affected is targeted by the viral cognition
  plague and must also attempt a Willpower save. The virus continues to spread in this
  way.Critical Success The target is unaffected.

  Success The target is Enfeebled 2 and Stupefied 2 for 1 round.

  Failure The target is enfeebled 2 and stupefied 2 for 1 minute and Enfeebled 1 and
  Stupefied 1 permanently.

  Critical Failure The target is Enfeebled 3 and Stupefied 3 for 1 minute and enfeebled
  2 and stupefied 2 permanently.'
