id: holographic_scene
name: Holographic Scene
description: 'You project an elaborate holographic scene that includes up to 10 discrete
  entities or objects of various sizes, all of which must be within the tech''s area.
  These elements generate appropriate sounds and smells, and they feel right to the
  touch. Elements of a holographic scene are incapable of speech. Unlike simple holograms,
  this tech is undetectable by normal observation and remains in place even when unattended.


  Heightened (6th) Holographic entities can speak, though what they say is determined
  at the time of projection.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You craft an imaginary scene that includes up to 10 discrete creatures
