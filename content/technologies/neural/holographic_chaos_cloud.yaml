id: holographic_chaos_cloud
name: Holographic Chaos Cloud
description: 'A cloud of cascading, ever-shifting holographic interference patterns manifests in the air. Creatures are Dazzled while inside the cloud, as are those within 20 feet of the cloud''s area. A creature must attempt a Willpower save if it is inside the cloud when you activate it, enters the cloud, ends its turn within the cloud, or uses a Seek or Interact action on the cloud. A creature currently affected by the cloud doesn''t need to attempt new saves.Success The creature is unaffected.

  Failure The creature is Confused for [[/r 1d4 #rounds]]{1d4 rounds}.

  Critical Failure The creature is Stunned for [[/r 1d4 #rounds]]{1d4 rounds}. After the stunned condition ends, the creature is confused for the remaining duration of the tech.'
tradition: neural
level: 8
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: dazzled
    value: 1
  - &id002
    type: condition
    condition_id: stunned
    value: 1
  on_crit_failure:
  - *id001
  - *id002
