id: lock_neural
name: Neural Lock Override
description: |-
    The target's latch mechanism clinks shut, held fast by unseen magical wards. When you magically lock a target, you set an Athletics and Thievery DC to open it equal to your tech DC or the base lock DC with a +4 status bonus, whichever is higher. Any key or combination that once opened a lock affected by this tech does not do so for the duration of the spell, though the key or combination does grant a +4 circumstance bonus to checks to open the door. If the target is opened, the spell ends. Assuming the target is not barred or locked in some additional way, you can unlock and open it with an Interact action during which you touch the target. This does not end the spell. You can Dismiss this tech at any time and from any distance.

    Heightened (2nd) The duration is unlimited, but you must expend 6 gp worth of precious metals as an additional cost.
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
