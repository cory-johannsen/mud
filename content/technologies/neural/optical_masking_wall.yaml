id: optical_masking_wall
name: Optical Masking Wall
description: 'You project a transparent one-way optical barrier that renders creatures
  on one side invisible to those on the other. You choose which side provides invisibility
  when you cast the spell. You create either a 1-inch-thick wall in a straight line
  up to 60 feet long and 10 feet high or a 1-inch-thick, 10-foot-radius ring with
  the same height. The wall is intangible. Any creature that crosses the wall becomes
  visible or invisible as appropriate, and it''s visible if any portion of it is on
  the visible side. If a creature rendered invisible takes a hostile action, the spell
  ends after the hostile action is completed.


  Heightened (7th) The spell doesn''t end if an invisible creature takes a hostile
  action.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You create a transparent invisible wall that makes any creatures
      on one side of the wall invisible to those on the other side. You choose which
      side of the wall provides invisibility to the creatures
