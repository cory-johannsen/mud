id: combat_remorse
name: Combat Remorse
description: 'You fill the target with psychic regret over its violent actions. The target must attempt a Willpower save.


  Critical Success The creature is unaffected.

  Success The creature takes a -1 status penalty to attack rolls for 1 round.

  Failure The creature takes a -2 status penalty to attack rolls for 1 minute. It can attempt a new Willpower save at the end of each of its turns.

  Critical Failure As failure, and the creature is also Sickened 1.'
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 1d4
    damage_type: untyped
    dc: 0
  on_failure:
  - type: damage
    dice: 1d8
    damage_type: untyped
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 2d8
    damage_type: untyped
    dc: 0
