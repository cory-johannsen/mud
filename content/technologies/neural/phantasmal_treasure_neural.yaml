id: phantasmal_treasure_neural
name: Phantom Jackpot
description: 'You project an illusion of a valuable object that fascinates the target.
  The target must attempt a Will save.


  Critical Success The creature is unaffected and knows the treasure is fake.

  Success The creature is fascinated for 1 round, then recognizes the treasure is
  fake.

  Failure The creature is fascinated for 1 minute and tries to acquire the treasure.
  It can attempt a new Will save each round if other creatures interfere.

  Critical Failure As failure, and the creature won''t give up the treasure willingly.'
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
