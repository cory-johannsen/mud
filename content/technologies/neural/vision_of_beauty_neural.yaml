id: vision_of_beauty_neural
name: Phantom Lure Construct
description: 'You project a personalized holographic image of the most compelling
  figure imaginable to the target at a location within range. Only the target can
  perceive the construct, though you can see its vague outline. The effect is based
  on the target''s Willpower save.


  Critical Success The target is unaffected.

  Success The target is intrigued, becoming Stupefied 1 for 1 round.

  Failure The target is entranced, becoming stupefied 1 for 1 round and moving toward
  the image''s location via the most direct route for 1 round, bypassing obvious hazards.
  The target is then Fascinated by the illusion for 1 round.

  Critical Failure As failure, except the target is Stupefied 2 and becomes fascinated
  for 1 minute instead of 1 round.


  Heightened (+2) You can target an additional creature in range.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
