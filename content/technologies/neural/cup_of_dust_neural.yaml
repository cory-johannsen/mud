id: cup_of_dust_neural
name: Dehydration Loop
description: 'You trap the target in a neural feedback loop that makes their body
  believe it is critically dehydrated. You can Dismiss the spell. The target must
  attempt a Fortitude save.Critical Success The creature is unaffected.

  Success The creature is Sickened 1.

  Failure The creature is Sickened 1 and must drink water every 10 minutes or take
  1d4 damage.

  Critical Failure As failure but Sickened 2.'
tradition: neural
level: 3
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You curse the target with a thirst no drink can quench. You can Dismiss
      the spell. The target must attempt a Fortitude save.Critical Success The creature
      is unaffected and is temporarily immune for 1
