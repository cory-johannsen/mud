id: spirit_song_neural
name: Spirit Song
description: |-
    Your eldritch song sends pulsing waves of ethereal energy to attack creatures' spirits in the area, dealing 14d6 spirit damage that causes their bodies to momentarily freeze up from the hypnotic nature of the tune, depending on the result of their Fortitude save. The vibrating waves of spirit song penetrate into, but not through, solid barriers, damaging incorporeal creatures hiding in solid objects in the area but not passing onward to damage creatures in other rooms.Critical Success The creature takes no damage.
    Success The creature takes half damage and can't use reactions until the beginning of its turn.
    Failure The creature takes full damage, can't use reactions until the beginning of its turn, and is Stunned 1.
    Critical Failure The creature takes double damage, can't use reactions until the beginning of its turn, and is Stunned 2.Heightened (+1) The damage increases by 2d6.
tradition: neural
level: 8
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 14d3
          damage_type: spirit
          dc: 0
    on_failure:
        - type: damage
          dice: 14d6
          damage_type: spirit
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 28d6
          damage_type: spirit
          dc: 0
