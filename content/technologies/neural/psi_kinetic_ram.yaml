id: psi_kinetic_ram
name: Psi-Kinetic Ram
description: 'Gathering kinetic energy, you either focus it in a straight line or disperse it as an encircling ripple. Any creature targeted by this tech must succeed at a Fortitude saving throw or be pushed 10 feet away from you (or 20 feet on a critical failure).

  The spell''s area or range and how many creatures it affects is based on how many actions you spend when Casting the tech.1 The spell targets one creature within 15 feet.

  2 The spell targets one creature within 30 feet. The distance the target is pushed if it fails is doubled, and on a critical failure, the target is also knocked Prone and takes 1d6 bludgeoning damage.

  3 The spell targets all creatures in a @Template[emanation|distance:5].'
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 1d6
    damage_type: bludgeoning
  - &id001
    type: condition
    condition_id: prone
    value: 1
  on_crit_failure:
  - type: damage
    dice: 2d6
    damage_type: bludgeoning
  - *id001
