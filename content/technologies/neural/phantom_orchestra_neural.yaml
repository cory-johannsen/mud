id: phantom_orchestra_neural
name: Psychoacoustic Barrage
description: 'You orchestrate an array of psychic sound constructs, projecting devastating
  sonic frequencies that materialize as shimmering waveforms and resonance nodes.

  When you Use this tech, a concentrated burst of psychic sound explodes in a space
  you choose within range. On subsequent rounds, the first time you Sustain the tech
  each round, you can move your sonic barrage to a space within range (if needed)
  and create another explosion of sound.

  Each explosion from the psychoacoustic barrage deals 8d6 sonic damage to all creatures
  in a 10-foot burst (basic Toughness save). The barrage doesn''t take up space, grant
  flanking, or have any other attributes a creature would.


  Heightened (+1) The damage increases by 1d6.'
tradition: neural
level: 6
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d3
    damage_type: sonic
    dc: 0
  on_failure:
  - type: damage
    dice: 8d6
    damage_type: sonic
    dc: 0
  on_crit_failure:
