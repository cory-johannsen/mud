id: detection_pulse
name: Detection Pulse
description: You psychically illuminate a target creature, making it easier to see. The target must attempt a Quickness check. On a failure, the target glows with revealing light for the duration, negating its Concealed condition and making it Concealed instead of Hidden or Undetected if it's Invisible.
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: hidden
    value: 1
  on_crit_failure:
  - *id001
