level: 10
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: Choose a single statement you want the targets to believe. The fact
      could be narrow, such as "a dragon is circling overhead and wants to kill me";
