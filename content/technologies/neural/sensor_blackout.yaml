id: sensor_blackout
name: Sensor Blackout
description: You hack a single sensor device, preventing it from being used for surveillance or remote observation. If you target a non-augmented device used for scrying, the device can't be used for that purpose. If you target an augmented device that can cast scrying protocols, the device is suppressed. Even devices you've blinded can't be used to target the area with remote observation protocols. This tech doesn't prevent creatures from simply looking at the object with their own eyes.
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: condition
    condition_id: blinded
    value: 1
