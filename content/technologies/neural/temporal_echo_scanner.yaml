id: temporal_echo_scanner
name: Temporal Echo Scanner
description: 'Opening your mind to psychic echoes, you gain impressions from past
  events that occurred in your current location. The scanner reveals psychic impressions
  from events that occurred over the course of the last day throughout the first minute
  of the duration, followed by impressions from the next day back the next minute,
  and so on. These echoes don''t play out like a vision but instead reveal impressions
  of emotions and metaphors that provide cryptic clues and details of the past. If
  you witness a traumatic or turbulent event through an impression, the tech ends
  unless you succeed at a Willpower save with a DC of at least 30 and possibly as much
  as 50, depending on the severity of the event. The GM determines whether an event
  is traumatic and chooses the DC.


  Heightened (8th) You gain impressions of events that occurred over the previous
  year for each minute you concentrate, instead of the previous day, though the details
  diminish, making it harder to distinguish impressions from all but the most major
  events.

  Heightened (9th) You gain impressions of events that occurred over the previous
  century for each minute you concentrate, instead of the previous day, though the
  details diminish, making it almost impossible to distinguish impressions from all
  but the most major events.'
tradition: neural
level: 7
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
