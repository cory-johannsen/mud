id: mariners_curse_neural
name: System Corruption
description: 'You afflict the target with a debilitating system corruption that causes
  increasing nausea and disorientation. The target must attempt a Willpower save.


  Critical Success The target is unaffected.

  Success The target becomes Sickened 1. Reducing its sickened condition to 0 ends
  the curse.

  Failure The target becomes sickened 1 and can''t reduce its sickened condition below
  1 while the curse remains.

  Critical Failure The target becomes sickened 2 and can''t reduce its sickened condition
  below 1 while the curse remains.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'You afflict the target with the curse of the roiling, unforgiving
      sea. The target must attempt a Willpower save.


      Critical Success The target is unaffected.

      Success The target becomes Sickened 1. Reducing'
