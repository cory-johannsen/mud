id: infectious_comedy_neural
name: Viral Laughware
description: 'You broadcast a psychic meme and infect a target with uncontrollable
  laughter that spreads to those nearby. The first time you Sustain the tech each
  round, you can target another creature you can see that is within 30 feet of an
  affected target. The new target need not be able to see or hear the affected target,
  as the meme travels through subconscious neural channels.


  Each target must attempt a Will save.


  Critical Success The creature is unaffected and immune for 1 hour.

  Success The creature is unaffected.

  Failure The creature is Slowed 1 and can''t use reactions.

  Critical Failure The creature falls Prone, is Slowed 1, and can''t use reactions.'
