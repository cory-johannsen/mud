id: forced_disconnect
name: Forced Disconnect
description: 'You sever the target''s connection to local networks, forcing them back to their origin point. The target must attempt a Willpower save. You can spend an extra action while activating this tech and add a cost to give the creature a -2 circumstance penalty to its save. The cost must be a specially prepared signal jammer that is anathema to the creature.


  Critical Success The target is unaffected.

  Success The target takes 2d6 mental damage.

  Failure The target is returned to its home plane. If it''s already on its home plane, it''s stunned and takes 4d6 mental damage.

  Critical Failure As failure, and the target can''t return for 1 week.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 2d6
    damage_type: mental
  - type: damage
    dice: 4d6
    damage_type: mental
  - &id001
    type: condition
    condition_id: stunned
    value: 1
  on_crit_failure:
  - type: damage
    dice: 4d6
    damage_type: mental
  - type: damage
    dice: 8d6
    damage_type: mental
  - *id001
