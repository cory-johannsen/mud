id: mass_terror_broadcast
name: Mass Terror Broadcast
description: You broadcast a psychic terror signal across a wide area. All creatures
  in a 60-foot emanation must attempt a Willpower save. On a failure, they take 10d10 mental
  damage and become frightened 3. On a critical failure, they take double damage and
  become frightened 4 and fleeing. On a success, they take half damage. Creatures
  immune to mental effects are unaffected.
tradition: neural
level: 9
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d6
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 8d10
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d10
    damage_type: void
    dc: 0
