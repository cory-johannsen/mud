id: agitate_neural
name: Synaptic Overload
description: 'You flood the target''s neural pathways with dissonant feedback, forcing hyperactive motor response. The target''s
  motor cortex locks into overdrive — it must move at least once each turn or suffer 2d8 mental damage as the feedback loop
  burns out suppressed nerve clusters.

  Critical Success The protocol has no effect.

  Success The overload lasts 1 round.

  Failure The overload lasts 2 rounds.

  Critical Failure The overload lasts 4 rounds.'
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d4
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 2d8
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d8
    damage_type: mental
    dc: 0
