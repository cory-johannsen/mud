id: agitate_neural
name: Agitate
description: |-
    You send the target's mind and body into overdrive, forcing it to become restless and hyperactive. During the duration, the target must Stride, Fly, or Swim at least once each turn or take 2d8 mental damage at the end of its turn. The GM might decide to add additional move actions to the list for creatures that possess only a more unusual form of movement. The duration of this effect depends on the target's Will save.Critical Success The spell has no effect.
    Success The duration is 1 round.
    Failure The duration is 2 rounds.
    Critical Failure The duration is 4 rounds.Heightened (+1) The damage increases by 2d8.
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 2d4
          damage_type: mental
          dc: 0
    on_failure:
        - type: damage
          dice: 2d8
          damage_type: mental
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 4d8
          damage_type: mental
          dc: 0
