id: spiritual_anamnesis_neural
name: Past-Life Data Flood
description: 'Memories from a previous existence overwhelm the target''s consciousness
  with staggering intensity. This is especially disorienting for undead and creatures
  that have lived a previous life; if such creatures roll a critical success on their
  save, they get a success instead, and if they roll a failure, they get a critical
  failure instead.


  Critical Success The creature is unaffected.

  Success The creature is Slowed 1 for 1 round.

  Failure The target is Slowed 1 for 1 minute and babbles about the visions, possibly
  providing information about what they saw.

  Critical Failure As failure, but the target is also Stunned 3.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
