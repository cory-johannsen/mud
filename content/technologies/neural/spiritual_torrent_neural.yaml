id: spiritual_torrent_neural
name: Psychic Torrent
description: 'You release your psychic essence in a torrential blast of energy, dealing
  10d6 damage. If you''re a living creature, this deals vitality damage and gains
  the vitality trait. If you''re an undead creature, this deals void damage and gains
  the void trait. The effect is based on how many actions you spend.

  1 action - 30-foot cone

  2 actions - 60-foot line

  3 actions - 30-foot burst within 120 feet


  Each creature in the area must attempt a basic Fortitude save.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 10d3
    damage_type: vitality
    dc: 0
  on_failure:
  - type: damage
    dice: 10d6
    damage_type: vitality
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 20d6
    damage_type: vitality
    dc: 0
