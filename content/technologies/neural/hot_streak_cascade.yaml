id: hot_streak_cascade
name: Hot Streak Cascade
description: The target is energized by cascading combat success. It gains the Quickened
  condition for 1 round. If the target or one of their allies within 20 feet gets
  a critical success on an attack roll against a significant foe, whoever got the
  critical success becomes quickened if they weren't already, and the duration extends
  by another round. Creatures quickened by the spell can use the extra action to Strike,
  Step, or Stride. If a full round passes without a critical success on an attack
  roll against a significant foe, the streak breaks and the spell ends.
tradition: neural
level: 4
usage_type: prepared
action_cost: 1
range: ranged
targets: single
duration: instant
resolution: none
