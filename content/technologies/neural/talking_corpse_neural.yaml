id: talking_corpse_neural
name: Dead Man's Data
description: 'You interface with a corpse''s residual neural data, extracting answers
  to three questions. This protocol accesses the body''s latent memory traces rather
  than summoning the spirit, so the corpse must be mostly intact. The more damaged
  the corpse, the more corrupted its data. It must have a throat and mouth to vocalize.
  If anyone has previously used this protocol on the corpse in the last week, the
  spell automatically fails. The corpse can attempt a Willpower save using the statistics
  of the original creature at its time of death.

  Critical Success The target can lie or refuse to answer, and the target''s ghost
  data haunts your interface for 24 hours, preventing rest.

  Success The target can provide false information or refuse to answer your questions.

  Failure The target must answer truthfully, but its answers can be brief, cryptic,
  and repetitive.

  Critical Failure As failure, but the target''s answers are more direct and less
  repetitive, though still cryptic. It takes a -2 status penalty to Deception checks
  to deceive or mislead you.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
