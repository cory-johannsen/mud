id: liberating_command
name: Liberating Command
description: You call out a liberating cry, urging an ally to break free of an effect that holds them in place. If the target is Grabbed, Immobilized, or Restrained, it can immediately use a reaction to attempt to Escape.
tradition: neural
level: 1
usage_type: prepared
action_cost: 1
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: condition
    condition_id: grabbed
    value: 1
  - type: condition
    condition_id: immobilized
    value: 1
  - type: condition
    condition_id: immobilized
    value: 1
