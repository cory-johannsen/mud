id: tactical_ai_advisor
name: Tactical AI Advisor
description: 'A holographic tactical advisor appears, dispensing combat guidance.
  The projection appears floating next to the target. It''s a floating digital manifestation
  and doesn''t occupy any space. The advisor offers helpful suggestions, preparing
  to Aid the target as though it had its own reaction. The advisor uses a bonus equal
  to your tech DC - 10 for its rolls to Aid.

  On each of your turns, the advisor prepares to Aid its target again. You can use
  a free action, which has the concentrate trait, to redirect it to a different creature.'
