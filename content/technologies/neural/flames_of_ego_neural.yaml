id: flames_of_ego_neural
name: Flames of Ego
description: |-
    Elegant flames of incredible beauty coruscate across the target's body, creating overconfidence and carelessness. The target attempts a Will save.

    Critical Success The target is unaffected.
    Success The target sheds bright light in a @Template[emanation|distance:20] (and dim light to the next 40 feet) and becomes @UUID[Compendium.pf2e.conditionitems.Item.Fascinated] with itself for 1 round. It must spend at least 1 action on its turn on a taunting display of arrogance or overconfidence. Using actions that include such a display—such as using @UUID[Compendium.pf2e.actionspf2e.Item.Perform] to show off—count toward this requirement.
    Failure As success, but the duration is 1 minute and the target can't act hostile toward a creature until that creature acts hostile toward the target.
    Critical Failure As failure, except the target must spend at least 2 actions on its turn on a taunting display of arrogance or overconfidence.
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
