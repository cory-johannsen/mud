id: flames_of_ego_neural
name: Narcissistic Feedback
description: 'Elegant holographic flames coruscate across the target''s body, overwriting
  their threat-assessment software with overconfidence. The target attempts a Will
  save.


  Critical Success The target is unaffected.

  Success The target sheds bright light in a 20-foot emanation (and dim light to the
  next 40 feet) and becomes Dazzled for 1 round.

  Failure The target sheds light as on a success, is Dazzled for 1 minute, and takes
  a -2 status penalty to AC for the duration.

  Critical Failure As failure, and the target is also Fascinated by itself.'
