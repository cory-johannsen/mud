id: leng_sting_neural
name: Nightmare Venom Strike
description: 'You channel nightmare frequencies to replicate the venomous attack of
  aberrant entities from beyond known space. You deal @Damage[2d6[piercing]] damage
  to the touched creature and afflict it with nightmare toxin. If the target takes
  piercing damage, they must attempt a Toughness save.


  Critical Success The target is unaffected.

  Success The target takes @Damage[2d6[poison]] damage.

  Failure The target is afflicted with Nightmare Toxin at stage 1.

  Critical Failure The target is afflicted with Nightmare Toxin at stage 2.


  Nightmare Toxin (incapacitation, poison) Level 13

  Maximum Duration 6 rounds

  Stage 1 @Damage[2d6[poison]] damage and Drained 1 (1 round)

  Stage 2 @Damage[3d6[poison]] damage and Drained 2 (1 round)

  Stage 3 @Damage[4d6[poison]] damage, Drained 2, and @UUID[Compendium.pf2e.conditionitems.Item.Confused]
  (1 round)'
tradition: neural
level: 7
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d3
    damage_type: piercing
    dc: 0
  on_failure:
  - type: damage
    dice: 2d6
    damage_type: piercing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d6
    damage_type: piercing
    dc: 0
