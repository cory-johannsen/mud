id: undertaker_neural
name: Death Protocol
description: You implant a terminal neural command that detonates on a target's next
  death. When the target would die within 1 minute, it instead survives at 1 HP and
  immediately makes one action of your choice. After taking this action, it dies.
  On a critical success on the initial Will save, the target is immune to the effect.
tradition: neural
level: 9
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You point your finger toward the target and whisper an epitaph that
      promises to grace their gravestone in the near future. This spell works best
      when both you and the target are in contact with solid
