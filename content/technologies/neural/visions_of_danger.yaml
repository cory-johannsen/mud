id: visions_of_danger
name: Visions of Danger
description: An illusion of horrific creatures fills the spell's area. The creatures look like Tiny swarming monsters with a specific appearance of your choice, such as fiendish flies or animated saw blades. The burst deals 8d8 mental damage with a basic Will save to each creature that's inside the burst when it's created, enters the burst, or starts its turn inside the burst. A creature that critically succeeds at its Will save can immediately attempt to disbelieve the illusion. A creature that tries to Interact with the monsters or observes one with a @UUID[Compendium.pf2e.actionspf2e.Item.Seek] action can attempt to disbelieve the illusion. Creatures that disbelieve the illusion take no damage from the illusion thereafter.Heightened (+1) The mental damage increases by 1d8
tradition: neural
level: 7
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 8d4
          damage_type: mental
          dc: 0
    on_failure:
        - type: damage
          dice: 8d8
          damage_type: mental
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 16d8
          damage_type: mental
          dc: 0
