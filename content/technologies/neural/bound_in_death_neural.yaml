id: bound_in_death_neural
name: Parasitic Link
description: 'You establish a psychic tether to another creature''s nervous system,
  shunting part of the damage dealt to you onto one of your foes. You create a neural
  link between yourself and the target. Each time an effect damages you, the target
  attempts a Will save, which can cause it to take part of the damage, as detailed
  below. The spell ends if the target is ever more than 120 feet away from you. If
  either you or the target is reduced to 0 Hit Points, any damage from this spell
  is resolved, and then the spell ends.

  Each time you sustain this spell, you can choose to deal 6d8 damage to yourself,
  which can be reduced with the parasitic link as normal.


  Critical Success The damage you take is unaffected, and the spell ends.

  Success The damage you take is unaffected, and the target can''t take damage from
  the parasitic link for 1 round.

  Failure The target takes half the damage of the effect instead of you, then can''t
  take damage from the parasitic link for 1 round. Apply any immunity, resistances,
  or weaknesses you have to the damage before halving it, and the target still applies
  any immunity, resistances, weaknesses, and the like it has.

  Critical Failure The target takes half the damage of the effect.


  Heightened (+2) The damage you can choose to deal to yourself each time you sustain
  the spell increases by 3d8.'
tradition: neural
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
