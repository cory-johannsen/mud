id: spoofed_feed
name: Spoofed Feed
description: You hack the local sensor grid, creating a false data feed that fools
  any attempts to remotely observe the area. Any scrying protocol detects whatever
  you wish within the area, rather than what is actually present. You can Sustain
  the tech each round to change the spoofed feed as you desire, including playing
  out a full scene.
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
resolution: none
