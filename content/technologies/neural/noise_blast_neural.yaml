id: noise_blast_neural
name: Noise Blast
description: |-
    A cacophonous noise blasts out, dealing 2d10 sonic damage. Each creature must attempt a Fortitude save.

    Critical Success The creature is unaffected.
    Success The creature takes half damage.
    Failure The creature takes full damage and is @UUID[Compendium.pf2e.conditionitems.Item.Deafened] for 1 round.
    Critical Failure The creature takes double damage, is deafened for 1 minute, and is Stunned 1.

    Heightened (+1) The damage increases by 1d10.
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 2d6
          damage_type: sonic
          dc: 0
    on_failure:
        - type: damage
          dice: 2d10
          damage_type: sonic
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 4d10
          damage_type: sonic
          dc: 0
