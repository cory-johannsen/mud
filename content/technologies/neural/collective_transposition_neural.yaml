id: collective_transposition_neural
name: Mass Neural Displacement
description: 'You teleport the targets to new positions within the area. The creatures
  must each be able to fit in their new space, and their positions must be unoccupied,
  entirely within the area, and in your line of sight. Unwilling creatures can attempt
  a Willpower save.Critical Success The target can teleport if it wants, but it chooses
  the destination within range.

  Success The target is unaffected.

  Failure You teleport the target and choose its destination.Heightened (+1) The number
  of targets increases by 1.'
tradition: neural
level: 6
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: cool
save_dc: 15
resolution: save
