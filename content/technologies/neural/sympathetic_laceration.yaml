id: sympathetic_laceration
name: Sympathetic Laceration
description: You slice your own flesh in a ritual pattern, psychically mirroring far deeper wounds onto a target in your line of sight. These cuts are superficial and cause 1d4 slashing damage to you; however, the wounds that open on the target's body are devastating. The targeted creature takes 5d8 slashing damage; a creature that critically fails also takes @Damage[(1d8 + -4)[bleed]] damage. If you cast this as a three-action spell, the spell instead affects a 5-foot burst.Heightened (+1) Increase the damage dealt to the target by 1d8, and increase the persistent bleed damage by 1.
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 5d4
    damage_type: slashing
    dc: 0
  on_failure:
  - type: damage
    dice: 5d8
    damage_type: slashing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 10d8
    damage_type: slashing
    dc: 0
