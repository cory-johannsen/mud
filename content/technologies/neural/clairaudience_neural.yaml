id: clairaudience_neural
name: Remote Audio Tap
description: You deploy an invisible neural listening device at a location within
  range, even outside your line of sight. You can hear through the sensor as if you
  were standing there. You can Sustain the Spell to maintain the connection.
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You create an @UUID[Compendium.pf2e.conditionitems.Item.Invisible]
      floating ear at a location within range (even if it's outside your line of sight
      or line of effect). It can't move, but you can hear
