id: hidden_mind_neural
name: Deep Neural Encryption
description: 'Powerful psychic countermeasures hide a creature from tech that would
  spy on it or affect its mind. The target gains a +4 status bonus to saves against
  mental effects. Deep neural encryption attempts to counteract any detection, revelation,
  and scrying effects as if its tech rank were 1 higher than its actual rank. On a
  success, the effect functions normally except that it detects nothing about the
  target and its possessions. For instance, detect magic would still detect other
  tech in the area, but not any tech on the target.

  @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Hidden Mind]'
