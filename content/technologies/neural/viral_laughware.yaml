id: viral_laughware
name: Viral Laughware
description: 'You broadcast a psychic meme and infect a target with uncontrollable laughter that spreads to those nearby. The first time you Sustain the tech each round, you can target another creature you can see that is within 30 feet of an affected target. The new target need not be able to see or hear the affected target, as the meme travels through subconscious neural channels.


  Each target must attempt a Willpower save.


  Critical Success The creature is unaffected and immune for 1 hour.

  Success The creature is unaffected.

  Failure The creature is Slowed 1 and can''t use reactions.

  Critical Failure The creature falls Prone, is Slowed 1, and can''t use reactions.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: slowed
    value: 1
  - &id002
    type: condition
    condition_id: prone
    value: 1
  on_crit_failure:
  - *id001
  - *id002
