id: cognitohazard_broadcast
name: Cognitohazard Broadcast
description: You broadcast a cognitohazardous signal that destabilizes cognition. Each creature in a 60-foot emanation that can perceive the broadcast must attempt a Willpower save at the start of each of your turns. On a failure, they become confused. On a critical failure, they also take 6d8 mental damage. Creatures that succeed are temporarily immune to this casting for 24 hours.
tradition: neural
level: 9
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 6d8
    damage_type: mental
  on_crit_failure:
  - type: damage
    dice: 12d8
    damage_type: mental
