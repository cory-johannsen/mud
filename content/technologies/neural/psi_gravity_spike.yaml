id: psi_gravity_spike
name: Psi-Gravity Spike
description: 'By suddenly altering gravity, you pull the target toward you. The target is pulled 10 feet closer to you unless it succeeds at a Toughness save. On a critical failure, it''s also knocked Prone. The effects of this tech change depending on the number of actions you spend when you Use this tech.

  1 (somatic) The spell targets one creature.

  2 (somatic, verbal) The spell targets one creature and pulls the target 20 feet instead of 10.

  3 (material, somatic, verbal) The spell targets up to 5 creatures.'
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: prone
    value: 1
  on_crit_failure:
  - *id001
