id: holographic_doppelganger
name: Holographic Doppelganger
description: 'You create a temporary hard-light duplicate of an enemy to fight on
  your behalf. The target can attempt a Toughness save to disrupt the projection.
  The duplicate appears in an unoccupied space adjacent to the target and has the
  target''s attack modifier, AC, saving throw modifiers, Perception, and skill modifiers,
  but it has only 70 Hit Points and lacks the target''s special abilities, including
  immunities, resistances, and weaknesses. It has no gear except weapon potency runes.

  The duplicate gains the minion trait, and it can only Stride and Strike. Its Strikes
  deal the target''s normal damage but don''t apply added effects, since it doesn''t
  have special abilities. The tech automatically ends if the duplicate''s Hit Points
  drop to 0.

  The duplicate attacks your enemies to the best of its abilities. You can also try
  to give it additional instructions; when you Sustain the tech, you can also Command
  a Minion as part of your action, but the GM determines whether the duplicate follows
  your command.

  The duplicate is unstable, so each turn after it takes its actions, it loses 4d6
  Hit Points. It''s not a living creature, and it can never regain its lost Hit Points
  in any way.


  Critical Success You fail to create a duplicate.

  Success The duplicate deals half damage with its Strikes and the duration is reduced
  to a maximum of 2 rounds.

  Failure The duplicate works as described.


  Heightened (+1) The level of creature you can target increases by 2. The duplicate
  has 10 more HP.'
tradition: neural
level: 7
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: minutes:1
save_type: toughness
save_dc: 15
