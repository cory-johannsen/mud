id: cleanse_affliction_neural
name: Neural Purge
description: You purge a harmful mental infection or corruption from the target's
  neural pathways. Attempt a counteract check against one affliction affecting the
  target. If you succeed, you reduce the stage of the affliction by 1 (to a minimum
  of stage 1) instead of entirely removing it.
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
