id: neural_wardrobe_link
name: Neural Wardrobe Link
description: |-
    The target's clothes are transformed into ostentatious attire that epitomizes high-end local fashion. No details of the target's appearance transform other than their clothes, so their weapons or armor remain unchanged in appearance. The target gains a +1 status bonus on Deception checks to Create a Diversion. You can Dismiss this tech. At the end of the spell's duration, the target's clothes revert to their original appearance.

    Upgraded (+2) The status bonus increases by 1, to a maximum of +4 at 7th rank.
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
