id: dream_message_neural
name: REM Transmission
description: You transmit a message into the target's dream cycle. The message is
  one-way, up to 1 minute of speech (roughly 150 words). If the target is asleep,
  they receive the message instantly. If the target is awake, it receives the message
  the next time it sleeps.
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
