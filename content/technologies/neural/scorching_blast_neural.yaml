id: scorching_blast_neural
name: Scorching Blast
description: You evoke a mass of fire into the air around your outstretched fist. For the remainder of your turn, you can blast targets within 30 feet with this fire by spending a single action which has the attack and concentrate traits. When you do so, attempt a ranged spell attack roll. If you hit, you inflict 2d8 fire damage. On a critical hit, the target takes @Damage[(1d6+((@item.rank -1)*2))[persistent,fire]] damage.Heightened (+1) The base damage increases by 1d8 and the persistent fire damage on a critical hit increases by 2.
tradition: neural
level: 1
usage_type: prepared
action_cost: 1
range: self
targets: single
duration: instant
resolution: attack
effects:
    on_hit:
        - type: damage
          dice: 2d8
          damage_type: fire
          dc: 0
    on_crit_hit:
        - type: damage
          dice: 4d8
          damage_type: fire
          dc: 0
