id: shadow_army_neural
name: Shadow Army
description: |-
    You create dozens of semi-real copies of yourself that swarm across the battlefield and fight your enemies. You are virtually indistinguishable from your clones, allowing you to Hide and Sneak among them. An enemy that's in the area when the spell is cast or that ends its turn in the area takes 3d10 mental damage and 3d10 bludgeoning damage, and is possibly inflicted with a condition, depending on the result of its Will save. When you Cast the Spell, you choose a condition your shadows impose on a failed save: Clumsy 2, Enfeebled 2, @UUID[Compendium.pf2e.conditionitems.Item.Off-Guard], or Slowed 1.

    Critical Success The creature takes no damage. For the duration of the spell, the creature gets a result one step better than it rolled on further saves against the spell, and can distinguish you from your clones without difficulty.
    Success The creature takes half damage.
    Failure The creature takes full damage, and gains the chosen condition.
    Critical Failure The creature takes double damage, and gains the chosen condition.
tradition: neural
level: 10
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 3d6
          damage_type: mental
          dc: 0
        - type: damage
          dice: 3d6
          damage_type: bludgeoning
          dc: 0
    on_failure:
        - type: damage
          dice: 3d10
          damage_type: mental
          dc: 0
        - type: damage
          dice: 3d10
          damage_type: bludgeoning
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 6d10
          damage_type: mental
          dc: 0
        - type: damage
          dice: 6d10
          damage_type: bludgeoning
          dc: 0
