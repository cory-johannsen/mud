id: rip_the_spirit_neural
name: Rip the Spirit
description: |-
    You supernaturally rip the spirit from a living creature's body, dooming the target to pain and death. The target takes 5d6 void damage, depending on its basic Fortitude save, and is Drained 1 if it fails its save. The spell's effect is based on how many actions you spend when Casting the Spell.
    1 (somatic) The spell targets one living creature in range.
    2 (somatic, verbal) The spell targets one living creature in range and the damage is @Damage[10d6[void]] damage instead of 5d6.
    3 (material, somatic, verbal) The spell targets all living creatures in a 30-foot emanation.

    Heightened (+1) The amount of damage increases by 1d6, or by [[/r 2d6]] for the 2-action version.
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 5d3
          damage_type: void
          dc: 0
    on_failure:
        - type: damage
          dice: 5d6
          damage_type: void
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 10d6
          damage_type: void
          dc: 0
