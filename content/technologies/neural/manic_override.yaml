id: manic_override
name: Manic Override
description: 'You hack the target''s neural pathways to induce uncontrollable laughter. The target must attempt a Willpower save.


  Critical Success The target is unaffected.

  Success The target is Slowed 1 for 1 round.

  Failure The target is unable to take reactions and is Slowed 1 for 1 minute. It can attempt a new Willpower save at the end of each of its turns to end the effect.

  Critical Failure The target falls Prone and can''t stand for 1 round. It''s unable to take reactions and is Slowed 1 for 1 minute, and it can attempt a new Willpower save at the end of each of its turns to end the effect.'
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: slowed
    value: 1
  - &id002
    type: condition
    condition_id: prone
    value: 1
  on_crit_failure:
  - *id001
  - *id002
