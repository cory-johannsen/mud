id: spatial_jump
name: Spatial Jump
description: 'You instantly teleport yourself and any items you''re wearing and holding
  from your current position to an unoccupied space within range you can see. If this
  would bring another creature with you, the spell is lost.


  Heightened (5th) The range increases to 1 mile. You don''t need to be able to see
  your destination, as long as you have been there in the past and know its relative
  location and distance from you. You are then temporarily immune for 1 hour.'
