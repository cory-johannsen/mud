id: rouse_skeletons_neural
name: Reanimant Swarm
description: Misshapen cybernetic skeletal forms erupt from surfaces in the area.
  The area becomes difficult terrain. Their grasping limbs deal 2d6 slashing damage
  to any creature that enters the area or ends its turn there, with a basic Reflex
  save.
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d3
    damage_type: slashing
    dc: 0
  on_failure:
  - type: damage
    dice: 2d6
    damage_type: slashing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d6
    damage_type: slashing
    dc: 0
