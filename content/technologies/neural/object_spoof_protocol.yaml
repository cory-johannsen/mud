id: object_spoof_protocol
name: Object Spoof Protocol
description: You overlay an object with a convincing holographic disguise, making
  it appear to be something entirely different. When you Use this tech, speak aloud
  a declarative statement that the target is a different, nonspecific object. Your
  statement can't presuppose any other facts. Creatures who previously observed the
  target receive an immediate Willpower save to disbelieve, but on a failure, the neural
  overlay temporarily rewrites their memory that the object was something different.
  A creature who failed their Willpower save, or didn't already see the item's original
  form, must Interact with the illusion as normal to receive a Awareness check against
  the tech DC to disbelieve. When the spell ends, targets remember the object's true
  nature, even if they never disbelieved the protocol.
tradition: neural
level: 4
usage_type: prepared
action_cost: 3
range: melee
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You create an illusion that makes an object seem to be something
      entirely different. When you Use this tech, speak aloud a declarative statement
      that the target is a different, nonspecific object. Y
