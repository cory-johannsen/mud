id: holographic_skin
name: Holographic Skin
description: You coat a creature's body in a layer of shimmering holographic particles. The target gains a +2 status bonus on Deception checks to Feint and a +1 circumstance bonus to AC against attacks from creatures that are Dazzled.
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: dazzled
    value: 1
  on_crit_failure:
  - *id001
