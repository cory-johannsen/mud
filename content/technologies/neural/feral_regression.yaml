id: feral_regression
name: Feral Regression
description: 'You overload the target''s limbic system, triggering a neurochemical cascade that forces devolution into a feral state. The effect is based on its Grit check.

  Critical Success The target is unaffected.

  Success The target''s body gains minor feral features. Its motor cortex destabilizes as neural pathways partially revert, causing it to be Clumsy 1 for 1 round. When it recovers from the clumsy condition, its features revert to normal, and the effect ends.

  Failure The target transforms into a feral form for 1 hour. The target becomes clumsy 1 and gains weakness 1 to silver. It gains a claw, hoof, horn, or jaws Strike (your choice) that uses the target''s unarmed Strike statistics except that the damage type changes to bludgeoning, piercing, or slashing, as appropriate. Whenever the target attempts to use any manipulate action, it must succeed at a Grit check (DC 5) or the action is lost.

  Critical Failure As failure, but the duration is unlimited.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
