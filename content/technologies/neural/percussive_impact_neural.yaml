    damage_type: bludgeoning
    dc: 0
  - type: damage
    dice: 1d4
    damage_type: sonic
    dc: 0
  on_crit_hit:
  - type: damage
    dice: 8d8
    damage_type: bludgeoning
    dc: 0
  - type: damage
    dice: 2d4
    damage_type: sonic
    dc: 0
