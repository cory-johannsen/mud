id: weird_neural
name: Mass Nightmare Protocol
description: You broadcast individualized nightmare constructs to all targets in a
  30-foot burst within 120 feet. Each target must attempt a Willpower save. On a failure,
  the target takes 16d6 mental damage and is frightened 4. On a critical failure,
  it takes double damage and is paralyzed by terror. On a success, it takes half damage.
  The nightmares persist as long as targets remain in the area.
tradition: neural
level: 9
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 16d3
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 16d6
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 32d6
    damage_type: mental
    dc: 0
