id: ghost_army_protocol
name: Ghost Army Protocol
description: 'You project mass-scale holographic soldiers, creating the illusion of
  a much larger force. Your illusion can create up to three illusory Gargantuan duplicates
  of troops within range. You can give the illusion a basic task to perform, such
  as standing in formation, marching, mimicking guard movements, or unloading illusory
  crates; however, the illusion can''t perform any actual tasks and can''t create
  intelligible sounds, such as music or clear speech. If you and any of the illusory
  troops are ever farther than 500 feet apart, the spell ends.

  An illusory troop''s AC is equal to your tech DC. Its saving throws modifiers are
  equal to your tech DC – 10. If an illusory troop is hit by an attack or fails a
  save, you must attempt a @Check[flat|dc:11]. On success, the illusion of that troop
  is destroyed. On failure, the entire illusion shatters, and all illusory troops
  are destroyed.Heightened (8th) The DC of the is lowered to 8 (@Check[flat|dc:8]),
  and you can create up to five illusory troops.'
tradition: neural
level: 6
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You craft the illusion of your army being much bigger than it actually
