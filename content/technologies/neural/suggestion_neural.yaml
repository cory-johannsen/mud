id: suggestion_neural
name: Subliminal Directive
description: 'Your neural broadcast patterns are nearly irresistible. You suggest
  a course of action to the target, which must be phrased as a logical course of action
  and can''t be self-destructive or obviously against the target''s self-interest.
  The target must attempt a Will save.


  Critical Success The target is unaffected and knows you tried to control it.

  Success The target is unaffected.

  Failure The target immediately follows your suggestion. The spell has a duration
  of 1 minute, or until the target has completed a finite suggestion or the suggestion
  becomes self-destructive.

  Critical Failure As failure, but the base duration is 1 hour.


  Heightened (8th) You can target up to 10 creatures.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
