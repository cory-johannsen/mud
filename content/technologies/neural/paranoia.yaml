id: paranoia
name: Paranoia Protocol
description: 'You flood the target''s mind with psychic signals that make everyone
  appear hostile. The target must attempt a Willpower save.


  Critical Success The target is unaffected.

  Success The target believes one creature of your choice is a disguised enemy for
  1 round.

  Failure The target believes all other creatures are enemies for 1 minute. It doesn''t
  necessarily attack, but it won''t accept aid, takes hostile actions against those
  who provoke it, and so on. It can attempt a new Willpower save at the end of each of
  its turns.

  Critical Failure As failure, but the target actively attacks all creatures near
  it to the best of its ability.'
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'You cause the target to see all other creatures as dire threats.
      The target is stricken by intense paranoia toward all creatures around it and
      must attempt a Willpower save.

