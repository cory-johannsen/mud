id: containment_neural
name: Psionic Containment Field
description: 'You trap a creature in a psychokinetic force cage, whether to protect
  it or those around it. The field blocks attacks, effects, and creatures that would
  pass through it, including the target. The field has Hardness 10, 40 Hit Points,
  and immunity to critical hits and precision damage. If the target is unwilling,
  the effects depend on the target''s Reflex save.Critical Success The target escapes
  from the field as it''s forming, causing it to collapse.

  Success The field partially forms with 10 Hit Points instead of 40.

  Failure The field has its normal effect.Heightened (+1) The field''s Hit Points
  are 5 higher on a success or 15 higher on a failure.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
