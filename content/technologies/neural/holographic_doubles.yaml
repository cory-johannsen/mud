id: holographic_doubles
name: Holographic Doubles
description: You project three psychic duplicates of yourself. Each time a creature
  targets you with an attack, one of the duplicates is hit instead and destroyed.
  When all duplicates are destroyed, the spell ends. A creature can attempt an Awareness
  check against your tech DC to discern the real you.
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: Three illusory images of you swirl about your space, potentially
      causing those who attack you to hit one of the images instead of you. Any attack
      that would hit you has a random chance of hitting one
