id: binding_muzzle_neural
name: Synaptic Muzzle
description: 'A shimmering muzzle of pure psychic force clamps the target''s mouth
  shut. The target can attempt a Toughness save to resist.


  Critical Success The target is unaffected.

  Success The target takes a -1 status penalty to attack rolls with its jaws or fangs
  until the start of your next turn.

  Failure The target can''t make Strikes with its jaws or fangs for 1 round.

  Critical Failure The target can''t make Strikes with its jaws or fangs for 1 minute
  and can''t speak or use verbal components.'
