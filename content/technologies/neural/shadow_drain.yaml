id: shadow_drain
name: Shadow Drain
description: 'You psychically tear at the target''s shadow, extracting vitality. The target takes 4d4 void damage and must attempt a Toughness save.


  Critical Success The target is unaffected.

  Success The target takes half damage.

  Failure The target takes full damage and is Enfeebled 1 for 1 round.

  Critical Failure The target takes double damage and is Enfeebled 2 for 1 minute.'
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: rounds:3
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 4d4
    damage_type: void
