id: neural_double_protocol
name: Neural Double Protocol
description: 'You render yourself Invisible and project a holographic duplicate of yourself. When you Sustain the spell, you can mentally dictate a course of action for your duplicate to follow that round. Your duplicate acts as though it had your full number of actions, though it can''t actually affect anything in the environment. Both the duplicate and your invisibility persist for the spell''s duration. Performing a hostile action doesn''t end the invisibility, just like a 4th-rank Invisibility spell. A creature that determines the duplicate is an illusion doesn''t necessarily know you''re invisible, and one that can see your invisible form doesn''t necessarily know your duplicate is a projection.

  If you Cast a tech, attack, or otherwise interact with another creature, as a part of that action you can attempt a Deception check against observers'' Awareness DCs to convince them your duplicate used that action. This doesn''t fool anyone who''s aware your duplicate is an illusion, nor does it work if the attack obviously couldn''t have come from the duplicate. For instance, if you fired a ray, you could make it look like it came from the duplicate as long as the duplicate was positioned appropriately, but if you attacked with a melee weapon and your duplicate was across the room from the target, your Deception check would automatically fail.'
tradition: neural
level: 6
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
