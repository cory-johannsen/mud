id: prismatic_shroud
name: Prismatic Shroud
description: 'A shroud of shifting holographic light envelops the target. Creatures are Dazzled while adjacent to it, and attacking the target causes a brilliant flash. A creature that hits the target with a melee attack must attempt a Willpower save. The creature is then temporarily immune for 1 minute.


  Success The creature is unaffected.

  Failure The creature is Blinded for 1 round.

  Critical Failure The creature is Stunned for 1 round and Blinded for 1 minute.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: blinded
    value: 1
  - &id002
    type: condition
    condition_id: stunned
    value: 1
  - &id003
    type: condition
    condition_id: dazzled
    value: 1
  on_crit_failure:
  - *id001
  - *id002
  - *id003
