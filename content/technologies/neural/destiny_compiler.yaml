id: destiny_compiler
name: Destiny Compiler
description: You pre-calculate a future outcome, loading it into your probability
  engine with absolute certainty. Before the duration ends, if you would attempt an
  attack roll, Perception check, saving throw, or skill check that would aid in the
  fulfillment of this calculated destiny, you can attempt this roll at mythic proficiency.
  You choose which roll to use this benefit on before rolling. If you use this benefit,
  the spell ends. Either way, you're then temporarily immune to destiny compiler for
  1 hour.
tradition: neural
level: 4
usage_type: prepared
action_cost: 1
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You envision a future for yourself, confident in the certainty that
