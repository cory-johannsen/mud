id: inexhaustible_cynicism_neural
name: Paranoia Virus
description: 'You infect your targets with a crushing psychic virus that generates
  doubt about everyone and everything around them. For the duration, each target is
  unwilling to receive any effects that require a willing target (in case the effect
  was secretly an attack), refuse to ingest anything (in case the substances have
  been replaced with poisons and cursed duplicates), doesn''t treat anyone as an ally
  (in case its friends were replaced by an impostor), and doesn''t believe anything
  it''s told (in case of lies, though this doesn''t mean the creature automatically
  believes the opposite either). It doesn''t even fully trust its own ability to Recall
  Knowledge, as it becomes convinced it most likely remembered false information,
  as from a critical failure on a check to Recall Knowledge.

  Finally, the creature takes 6d6 mental damage at the end of each of its turns (with
  no save) unless it spent at least 1 action that turn Seeking or otherwise interacting
  with its surroundings in an attempt to verify reality.


  Critical Success The creature is unaffected.

  Success The creature is affected for 1 round.

  Failure The creature is affected for 1 minute.

  Critical Failure The creature is affected for 1 hour.'
tradition: neural
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 6d3
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 6d6
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 12d6
    damage_type: mental
    dc: 0
