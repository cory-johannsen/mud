id: spell_immunity_neural
name: Protocol Firewall
description: You install a targeted countermeasure against a specific hostile effect.
  Choose a spell and name it aloud as part of the verbal component. Protocol Firewall
  attempts to counteract that spell whenever the target is affected by it. Successfully
  counteracting an area or multi-target spell negates the effects only for the protected
  target.
tradition: neural
level: 4
