id: suspended_retribution_neural
name: Doom Protocol
description: 'All operatives dance one step from the precipice, one heartbeat from
  disaster. You hack into the target''s threat assessment systems and plant a lethal
  trigger. A spectral targeting reticle appears above the target''s head. When you
  Use this tech, pick one of the following triggers.

  The target moves more than its Speed in a single round.

  The target makes more than one Strike in a single round.

  The target Casts a tech.

  The target uses a specific skill you name.

  The target uses a specific ability you name.

  The target uses a specific ability you name. If the target takes the triggering
  action, the doom protocol activates and the target takes 70 mental damage with a
  basic Reflex save. The target instinctively knows which action will trigger the
  protocol and can ward off the effect by spending a total of 3 actions, which have
  the concentrate trait, to perform counter-intrusion routines. These actions need
  not be consecutive. After the creature spends the actions, the spell ends.Heightened
  (+1) The damage increases by 10.'
tradition: neural
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: '70'
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: '70'
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: '70'
    damage_type: mental
    dc: 0
