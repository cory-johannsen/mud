id: shadow_protocol_theft
name: Shadow Protocol Theft
description: 'You project a dark-spectrum energy field that allows you to steal active
  effects from enemies. During this tech''s duration, you can use the Steal action
  to attempt to abscond with active effects on a foe instead of stealing an item.
  You can also make one attempt to Steal as part of Casting. If you succeed, you randomly
  steal one effect with a target entry from the foe. The stolen effect ceases on the
  target and either transfers to you or is stored in your data buffer. The spell lasts
  for its remaining duration, to a maximum of 1 minute.

  If your Steal was a critical success, you automatically steal effects equal to or
  lower than this tech''s rank. On a regular success, you steal effects of lower
  rank automatically. Otherwise, you must attempt a counteract check.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: rounds:3
resolution: none
