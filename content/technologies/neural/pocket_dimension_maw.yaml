id: pocket_dimension_maw
name: Pocket Dimension Maw
description: You open an extradimensional storage pocket accessible through the target's mouth. The space can hold objects and equipment, up to a total of 10 Bulk. Items can be retrieved with an Interact action. The spell ends if the target falls unconscious.
tradition: neural
level: 3
usage_type: prepared
action_cost: 3
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: condition
    condition_id: unconscious
    value: 1
