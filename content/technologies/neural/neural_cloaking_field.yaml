id: neural_cloaking_field
name: Neural Cloaking Field
description: 'You make the object Invisible. This makes it Undetected to all creatures, though the creatures can attempt to find the target, making it Hidden to them instead if they succeed. If the item is used as part of a hostile action, the spell ends after that hostile action is completed. Making a weapon invisible typically doesn''t give any advantage to the attack, except that an invisible thrown weapon or piece of ammunition can be used for an attack without necessarily giving information about the attacker''s hiding place unless the weapon returns to the attacker.Heightened (3rd) The duration is until the next time you make your daily preparations.

  Heightened (7th) The duration is unlimited.'
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: condition
    condition_id: hidden
    value: 1
