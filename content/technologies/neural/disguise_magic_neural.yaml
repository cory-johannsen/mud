id: disguise_magic_neural
name: Neural Signal Masking
description: |-
    You alter how an item's or spell's magical aura appears to effects like detect magic. You can hide the auras entirely, have an item register as a common item of lower level, or make a spell register as a common spell of the same or lower rank. You can Dismiss the spell. A caster using @UUID[Compendium.pf2e.spells-srd.Item.Detect Magic] or @UUID[Compendium.pf2e.spells-srd.Item.Read Aura] of a higher rank than disguise magic can attempt to disbelieve the illusion using the skill matching the tradition of the spell (Arcana for arcane, Religion for divine, Occultism for occult, or Nature for primal). Further attempts by the same caster get the same result as the initial check to disbelieve.

    Heightened (2nd) You can Use this tech on a creature, disguising all items and spell effects on it.
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
