id: mass_psychic_catastrophe
name: Mass Psychic Catastrophe
description: A vision of apocalyptic destruction floods the mind of each creature in the area. The vision deals 11d6 mental damage (basic Willpower save). On a critical failure, the creature must also succeed at a Quickness check save or believe it's trapped (pinned under rubble, drowning in toxic waste, or some other fate in keeping with its vision). If it fails the second save, it's also Stunned for 1 minute. It can attempt a new Willpower save at the end of each of its turns, and on a success, it disbelieves the illusion and recovers from the stunned condition.Upgraded (+1) The damage increases by 2d6.
tradition: neural
level: 6
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 11d3
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 11d6
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 22d6
    damage_type: mental
    dc: 0
