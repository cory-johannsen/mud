id: echo_jump_neural
name: Echo Jump
description: You teleport to an unoccupied space within range, leaving behind a faint echo of your form that explodes with magical force. Each creature within a 10-foot emanation from your previous location takes 4d8 force damage.Heightened (+2) The range increases by 10 feet, and the damage increases by 3d8.
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 4d4
          damage_type: force
          dc: 0
    on_failure:
        - type: damage
          dice: 4d8
          damage_type: force
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 8d8
          damage_type: force
          dc: 0
