id: trade_items_neural
name: Trade Items
description: You magically swap an item you're holding for another that someone else has. The second item appears in the hand you were holding the first item (or it falls to the ground in your square if you're unable to hold it), and the first item appears in the same place on the other creature's possession where the second item was (held in a hand or attached to a belt, for instance). If the second item is in the possession of a creature unwilling to relinquish it, they can prevent the transposition with a successful Reflex save.Heightened (5th) Each object's maximum Bulk increases to 1. If one of the items is 1 Bulk and the other isn't, an unwilling creature gains a +2 circumstance bonus to their saving throw.
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
