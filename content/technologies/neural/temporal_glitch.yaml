id: temporal_glitch
name: Temporal Glitch
description: You psychically displace the target briefly through time, causing it
  to vanish and reappear. The target disappears and then reappears in the same space
  (or the nearest unoccupied space) at the beginning of your next turn. It can't act
  while displaced. When it returns, it's unharmed.
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You pluck the time stream like a bow—pull one string back, release,
