id: temporal_bog
name: Temporal Bog
description: 'You corrupt the local timestream, thickening and slowing it until everything
  moves at a crawl. Any creature that begins its turn in the area must attempt a Will
  save.

  Success The creature is unaffected.

  Failure The creature is Slowed 1 for 1 round.

  Critical Failure The creature is Slowed 2 for 1 round.'
