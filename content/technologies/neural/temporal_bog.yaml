id: temporal_bog
name: Temporal Bog
description: 'You corrupt the local timestream, thickening and slowing it until everything moves at a crawl. Any creature that begins its turn in the area must attempt a Reasoning check.

  Success The creature is unaffected.

  Failure The creature is Slowed 1 for 1 round.

  Critical Failure The creature is Slowed 2 for 1 round.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: slowed
    value: 1
  on_crit_failure:
  - *id001
