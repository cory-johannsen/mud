id: blind_eye_neural
name: Blind Eye
description: You enchant a single object, preventing it from being used for magical observation. If you cast this spell on a non-magical item used to cast scrying spells, such as a spell component pouch or a spell focus, the item can't be used to cast the spell. If you cast blind eye on a magical item that can be activated to scry (such as a Crystal Ball or @UUID[Compendium.pf2e.equipment-srd.Item.Hag Eye]), the item can't be activated for scrying effects. Magical items that are twice blind eye's spell rank or more aren't blocked this way.
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
