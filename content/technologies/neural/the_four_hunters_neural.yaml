id: the_four_hunters_neural
name: The Four Hunters
description: |-
    This is a story of four evenly matched hunters who sought to capture a falling star. Each hunter was known by the region they came from, and this spell focuses on one of their attributes. When you cast this spell, you must choose East, North, South, or West.East was steady and optimistic. The target gains 5 temporary Hit Points and a +1 status bonus to Athletics for 1 round.North was careful and cautious. The target can Step as a free action and gains a +1 status bonus to Survival for 1 round.South was clever and cunning. The target becomes @UUID[Compendium.pf2e.conditionitems.Item.Concealed] and gains a +1 status bonus to Stealth for 1 round.West was bold and competitive. The target gains a +10-foot status bonus to their land Speed and a +1 status bonus to Acrobatics for 1 round.1 You quickly remind yourself of the story, granting only yourself the benefit.
    2 You tell a trusted ally within 30 feet this story, granting them the benefit.
    3 You impart this tale on all of your allies within 30 feet, granting them the benefit.
    @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: The Four Hunters]
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
