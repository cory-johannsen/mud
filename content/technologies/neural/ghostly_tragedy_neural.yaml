id: ghostly_tragedy_neural
name: Crime Scene Replay
description: 'This protocol compels residual psychic impressions to reenact a violent
  event of the recent past that you''re aware of and name as you Cast the Spell. You
  take the role of the primary victim. The reenactment plays out the final 9 minutes
  leading up to the death or injury of the victim and the minute after. The impressions
  don''t change form, so this doesn''t help determine perpetrators by their looks.

  Once the scene ends, you take @Damage[2d6[void]] damage for each apparition that
  participated in the scene (typically equal to the number of creatures involved other
  than the victim). Any creature that observed the recreation, including you, can
  attempt checks to investigate the event to discover new clues and information.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
resolution: none
