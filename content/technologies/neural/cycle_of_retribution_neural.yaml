id: cycle_of_retribution_neural
name: Feedback Loop Protocol
description: You encode a retribution algorithm into a target — whenever they deal damage, the same harm is reflected back
  in diminished form.
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: melee
