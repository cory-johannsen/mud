id: undead_override_signal
name: Undead Override Signal
description: 'You broadcast a subsonic command frequency that empowers cybernetic
  undead and terrifies the living. Undead creatures within the area gain the Quickened
  condition for 1 minute, which they can use only to Stride.

  Living creatures in the area must attempt a Willpower save. This gains the emotion, fear,
  and mental traits for living creatures.


  Critical Success The creature is unaffected.

  Success The creature is Frightened 1.

  Failure The creature is Frightened 2.

  Critical Failure The creature is Frightened 3 and Paralyzed for 1 round.'
