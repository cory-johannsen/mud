id: undermine_reality_neural
name: Existential Destabilizer
description: 'You lash a target with tendrils of psychic entropy that steal some of
  its substance, making it quasi-real. As long as it is quasi-real, its Strikes deal
  half damage, it can''t critically succeed at any skill check, and creatures attempting
  saving throws against its tech and effects get a result one degree of success better
  than they rolled. The target must attempt a Will saving throw.


  Critical Success The target is unaffected.

  Success The target is quasi-real until the end of its next turn.

  Failure The target is quasi-real for 1 minute. At the end of each of its turns,
  it can attempt another Willpower save, ending the tech on a success.

  Critical Failure The target is quasi-real for an unlimited duration.'
tradition: neural
level: 8
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
