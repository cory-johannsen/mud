id: spectrum_barrier
name: Spectrum Barrier
description: 'You project a hardlight barrier in a single vibrant frequency. The wall
  is straight and vertical, stretching 60 feet long and 30 feet high. If the wall
  would pass through a creature, the tech fails. The wall sheds bright light for 20
  feet on each side, and dim light for the next 20 feet. You can ignore the wall''s
  effects.

  Roll [[/r 1d4]] to determine the frequency of the wall. Each frequency has a particular
  effect on items, effects, or creatures that attempt to pass through. Spectrum barrier
  can''t be counteracted normally; rather, each frequency is automatically counteracted
  when targeted by a specific tech, even if that tech''s rank is lower.


  Red The wall destroys ranged weapon ammunition that would pass through, and it deals
  20 fire damage to anyone passing through, with a basic Reflex save.

  Orange The wall destroys thrown weapons that would pass through, and it deals 25
  acid damage to anyone passing through, with a basic Reflex save.

  Yellow The wall stops acid, cold, electricity, fire, force, sonic, vitality, and
  void effects from passing through, and it deals 30 electricity damage to anyone
  passing through, with a basic Reflex save.

  Green The wall stops toxins, gases, and breath weapons from passing through. It
  deals 10 poison damage to anyone passing through and makes them Enfeebled 1 for
  1 minute. A basic Toughness save reduces the damage and negates the Enfeebled condition
  on a success.


  Heightened (7th) The tech''s duration increases to 1 hour. Roll [[/r 1d8]] to determine
  the wall''s frequency; results for 5-8 are additional options. Red, orange, yellow,
  or green walls deal an extra 10 damage.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You create an opaque wall of light in a single vibrant color. The
      wall is straight and vertical, stretching 60 feet long and 30 feet high. If
      the wall would pass through a creature, the spell is lost.
