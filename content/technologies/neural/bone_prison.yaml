id: bone_prison
name: Bone Prison
description: 'You telekinetically wrench bones from the ground or nearby remains to form a cage around the target. The target must attempt a Quickness check.


  Critical Success The creature is unaffected.

  Success The creature takes 2d6 piercing damage.

  Failure The creature takes 4d6 piercing damage and is Immobilized for 1 round.

  Critical Failure The creature takes 4d6 piercing damage and is Immobilized for 1 minute. It can attempt to Escape against your tech DC.'
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 2d6
    damage_type: piercing
  - type: damage
    dice: 4d6
    damage_type: piercing
  - &id001
    type: condition
    condition_id: immobilized
    value: 1
  on_crit_failure:
