id: hunger_protocol
name: Hunger Protocol
description: 'You hack the target''s appetite regulation systems, overwhelming them
  with all-consuming hunger. The target can restore its vitality by feasting on the
  flesh of the fallen. On its turn, the target can use 2 actions (these actions have
  the manipulate trait) to cannibalize an adjacent dead or dying creature, regaining
  6d8 Hit Points.


  The target must attempt a Willpower save each round or spend its actions attempting to
  feed on the nearest dead or dying creature.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: rounds:3
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You evoke Zevgavizeb's unceasing hunger and inflict it upon your
      target. The target becomes overwhelmed with cannibalistic hunger and can restore
      its vitality by feasting on the flesh of the fallen. O
