id: cutting_insult
name: Psychic Laceration
description: 'You deliver a cutting psychic barb that deals mental damage and humiliates
  the target. You deal 2d6 mental damage to the target, and it must attempt a Will
  save.


  Critical Success The creature is unaffected.

  Success The creature takes half damage.

  Failure The creature takes full damage.

  Critical Failure The creature takes double damage and is @UUID[Compendium.pf2e.conditionitems.Item.Stupefied]
  1 for 1 round.'
