id: cutting_insult
name: Cutting Insult
description: |-
    You utter an insult so offensive that it cuts your target to the quick. Your target takes @Damage[4d6[mental]] damage and 1 persistent bleed damage and must attempt a Will save.

    Critical Success The creature is unaffected.
    Success The creature takes half mental damage but no persistent bleed damage, and it becomes Frightened 1.
    Failure The creature takes full mental damage and full persistent bleed damage, and it becomes Frightened 2.
    Critical Failure The creature takes double mental damage and double persistent bleed damage, and becomes Frightened 3.

    Heightened (+2) The mental damage increases by 4d6, and the bleed damage increases by 1.
tradition: neural
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 4d3
          damage_type: mental
          dc: 0
        - type: damage
          dice: "1"
          damage_type: bleed
          dc: 0
    on_failure:
        - type: damage
          dice: 4d6
          damage_type: mental
          dc: 0
        - type: damage
          dice: "1"
          damage_type: bleed
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 8d6
          damage_type: mental
          dc: 0
        - type: damage
          dice: "1"
          damage_type: bleed
          dc: 0
