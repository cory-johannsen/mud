id: neural_save_state
name: Neural Save State
description: 'Trigger A creature within range fails or critically fails a saving throw
  or is reduced to 0 Hit Points


  You alter the course of reality the instant a catastrophic outcome would otherwise
  have occurred, restoring a creature from an unexpected or unwarranted fate. If the
  triggering creature failed its saving throw, it rerolls the saving throw. If the
  triggering creature critically failed its saving throw, it instead treats the result
  of that saving throw as a failure. If the triggering creature was reduced to 0 Hit
  Points, it remains at 1 Hit Point, and it still suffers any other debilitating effects
  that were associated with the source of the damage. In the case of a creature critically
  failing a saving throw or being reduced to 0 Hit Points simultaneously, you choose
  which of the two events to revise.

  Once a creature is affected by a neural save state, it''s temporarily immune to
  further instances for 24 hours, as the neural architecture resists too-frequent
  timeline corrections.


  Upgraded (9th) You can target up to 10 creatures within range. All targets must
  still individually qualify as triggering creatures. For example, if an explosion
  hit a group of your allies, only those who failed or critically failed their saving
  throw or those who were reduced to 0 Hit Points could be affected by this tech.'
tradition: neural
level: 6
usage_type: prepared
action_cost: 0
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'Trigger A creature within range fails or critically fails a saving
      throw or is reduced to 0 Hit Points


      As all good writers know, you shouldn''t kill off your protagonist before their
      story is complete'
