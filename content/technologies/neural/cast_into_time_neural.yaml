id: cast_into_time_neural
name: Temporal Dislocation Pulse
description: 'You release a wave of temporal energy that sends creatures violently
  tumbling through fractured timelines, scarring their neural pathways with chaotic
  data streams. Although the journey can feel like it lasts for minutes or even days,
  the targets reappear instantly. Witnessing this chaotic flow of time deals the targets
  5d8 mental damage and 5d6 bludgeoning damage, with a Fortitude save. A creature
  that falls into time disappears until the end of your turn. It then reappears in
  the same space it left; if that space is occupied, it appears in the nearest empty
  space, chosen by the GM.


  Critical Success The creature is unaffected.

  Success The creature falls into time. When it returns, it takes half damage.

  Failure The creature falls into time. When it returns, it takes full damage and
  is Sickened 1.

  Critical Failure The creature falls into time. When it returns, it takes double
  damage and is Sickened 2.


  Heightened (+1) The bludgeoning damage increase by 2d6.'
tradition: neural
level: 6
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 5d4
    damage_type: mental
    dc: 0
  - type: damage
    dice: 5d3
    damage_type: bludgeoning
    dc: 0
  on_failure:
  - type: damage
    dice: 5d8
    damage_type: mental
    dc: 0
  - type: damage
    dice: 5d6
    damage_type: bludgeoning
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 10d8
    damage_type: mental
    dc: 0
  - type: damage
    dice: 10d6
    damage_type: bludgeoning
    dc: 0
