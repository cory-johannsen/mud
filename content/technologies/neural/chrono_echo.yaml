id: chrono_echo
name: Chrono-Echo
description: 'You pull a fleeting duplicate of your ally from a fraction of a second
  in the past. The duplicate appears in an unoccupied space within 30 feet and can
  take a single action before vanishing: Strike, Stride, Step, or use a skill.'
tradition: neural
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You pull a fleeting duplicate of your ally from the recent past.
      The duplicate appears in an unoccupied space of your choice within 30 feet of
      you and repeats a basic single action the target took sin
