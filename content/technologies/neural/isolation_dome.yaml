id: isolation_dome
name: Isolation Dome
description: 'A shimmering shell of psionic interference covers the area, creating
  a sealed zone. You can choose to make the burst smaller, in 10-foot increments.
  The barrier doesn''t block travel, but those inside can''t perceive those outside
  and vice versa. Detection and scanning effects are likewise blocked.

  Creatures sleeping within the dome are immune to remotely transmitted nightmares.
  Those sleeping 8 hours reduce their Doomed condition by 2 instead of 1.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
resolution: none
