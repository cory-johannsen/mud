id: subconscious_suggestion_neural
name: Deep Implant
description: 'You implant a subconscious directive deep within the target''s mind
  for them to follow when a trigger you specify occurs. Your directive must be phrased
  in such a way as to seem like a logical course of action to the target, and it can''t
  be self-destructive. The target must attempt a Willpower save.


  Critical Success The target is unaffected and aware of the attempt.

  Success The target is unaffected.

  Failure The target follows the suggestion when triggered.

  Critical Failure As failure, and the target is unaware it has been implanted.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
