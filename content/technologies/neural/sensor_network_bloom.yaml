id: sensor_network_bloom
name: Sensor Network Bloom
description: You seed the area with self-replicating neural sensor clusters. You create
  10 invisible sensor nodes that orbit your head and can be placed in any unoccupied
  square within 30 feet. Each gives you visual and auditory perception of its location.
  The sensors persist for 1 hour and cannot be attacked unless a creature can perceive
  invisible objects.
tradition: neural
level: 9
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You implant an @UUID[Compendium.pf2e.conditionitems.Item.Invisible],
      magical eye sensor on the target's body. The eye has sight and vision, but no
      other special senses. The eye is highly contagious-th
