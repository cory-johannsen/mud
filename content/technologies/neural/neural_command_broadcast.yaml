id: neural_command_broadcast
name: Neural Command Broadcast
description: You broadcast a compulsive neural command to a creature you are familiar
  with regardless of distance. The target must attempt a Willpower save. On a failure,
  it is compelled to follow a one-sentence command. A creature affected by a previous
  casting is temporarily immune. You can also establish a two-way communication channel
  for the duration.
tradition: neural
level: 9
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You send the target a message of 25 words or fewer, and it can respond
      immediately with its own message of 25 words or fewer. Your message is insidious
