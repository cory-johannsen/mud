id: chroma_leach
name: Spectrum Drain
description: 'Your hand crackles with impossible wavelengths harvested from deep-spectrum
  radiation, and your touch saps both color and vitality from the living. The target
  must attempt a Fortitude save; creatures with photosensitive implants take a -2
  circumstance penalty to this save.Critical Success The target is unaffected.

  Success The target is Enfeebled 2 for 1 round.

  Failure The target is enfeebled 2 for 1 minute and Drained 1. The target is also
  filled with listlessness and neural fatigue. For 1 round, if the target tries to
  use a move action, it must succeed at a Will save against your spell DC or the action
  is lost; this effect has the mental and emotion traits.

  Critical Failure As failure, but the creature is permanently enfeebled 2 and Drained
  2 (although advanced medical procedures can remove these conditions).'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
