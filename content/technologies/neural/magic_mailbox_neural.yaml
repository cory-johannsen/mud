id: magic_mailbox_neural
name: Quantum Dead Drop
description: 'You create a quantum-entangled link between two containers, both of
  which must be capable of being closed. If both containers are left closed for 10
  consecutive minutes, the contents of each one, totaling no more than 3 Bulk of nonliving,
  non-magical material per container, transport to the other''s location.

  If a container''s contents total more than 3 Bulk, the transport fails. If either
  container is opened before the full 10 minutes have elapsed, the contents appear
  as they did when the containers were closed, and the process restarts. After the
  contents successfully swap, they can''t swap again until after both containers have
  been opened at least once. Both containers must be located on the same plane for
  the process to function.'
tradition: neural
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
