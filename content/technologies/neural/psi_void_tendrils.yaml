id: psi_void_tendrils
name: Psi-Void Tendrils
description: 'Tendrils of darkness curl out from your fingertips and race through the air. You deal 2d4 void damage and ()[bleed] damage to living creatures in the line. Each living creature in the line must attempt a Grit check.


  Critical Success The creature is unaffected.

  Success The creature takes half the void damage and no persistent bleed damage.

  Failure The creature takes full damage.

  Critical Failure The creature takes double void damage and double persistent bleed damage.


  Upgraded (+1) The void damage increases by 2d4, and the persistent bleed damage increases by 1.'
tradition: neural
level: 1
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: '2'
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 2d4
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d4
    damage_type: void
    dc: 0
