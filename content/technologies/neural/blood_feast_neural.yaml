id: blood_feast_neural
name: Psychic Drain
description: 'Your consciousness splits into a consuming maw of psychic energy that
  feasts upon the target''s neural patterns, dealing 12d6 piercing damage, depending
  on your tech attack roll. After the feed, your psyche re-consolidates. You gain
  temporary Hit Points for 1 minute equal to half the piercing damage the target took.


  Critical Success You deal double damage.

  Success You deal full damage.

  Failure You deal half damage.

  Critical Failure The target is unaffected.'
tradition: neural
level: 5
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: attack
effects:
  on_hit:
  - type: damage
    dice: 12d6
    damage_type: piercing
    dc: 0
  on_crit_hit:
  - type: damage
    dice: 24d6
    damage_type: piercing
    dc: 0
