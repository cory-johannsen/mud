id: lifes_fresh_bloom_fanatic_doctrine
name: Sanctified Ground
description: 'The ground around you blooms with consecrated growth that emits restorative
  compounds. Each living creature that starts its turn standing on the ground in the
  area recovers 1d6 Hit Points and gains a +5-foot status bonus to its Speed. Undead
  that start their turn in the area become Sickened 1 unless they succeed at a Fortitude
  save.Heightened (7th) Healing increases to 1d8, Sickened 2.

  Heightened (10th) Healing increases to 1d10, Sickened 3.'
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: rounds:5
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 1d3
    damage_type: untyped
    dc: 0
  on_failure:
  - type: damage
    dice: 1d6
    damage_type: untyped
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 2d6
    damage_type: untyped
    dc: 0
