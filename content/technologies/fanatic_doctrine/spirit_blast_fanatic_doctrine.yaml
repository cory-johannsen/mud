id: spirit_blast_fanatic_doctrine
name: Spirit Blast
description: |-
    You concentrate ethereal energy and attack a creature's spirit, dealing 16d6 spirit damage with a basic Fortitude save.

    Heightened (+1) The damage increases by 2d6.
tradition: fanatic_doctrine
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 16d3
          damage_type: spirit
          dc: 0
    on_failure:
        - type: damage
          dice: 16d6
          damage_type: spirit
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 32d6
          damage_type: spirit
          dc: 0
