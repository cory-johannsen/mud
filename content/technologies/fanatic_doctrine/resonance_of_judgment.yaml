id: resonance_of_judgment
name: Resonance of Judgment
description: 'You channel doctrinal power as devastating sonic vibrations through
  a target''s body, rattling bones and organs. The creature takes 8d6 sonic damage
  and must attempt a Grit check.


  Critical Success The target is unaffected.

  Success The target takes half damage.

  Failure The target takes full damage, is Sickened 1, and is Deafened for 1 round.

  Critical Failure The target takes double damage, is Sickened 2, and is deafened
  for 1 minute.


  Upgraded (+1) The damage increases by 2d6.'
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d3
    damage_type: sonic
    dc: 0
  on_failure:
  - type: damage
    dice: 8d6
    damage_type: sonic
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d6
    damage_type: sonic
    dc: 0
