id: demon_form_fanatic_doctrine
name: Demon Form
description: |-
    You corrupt yourself with the sin of the Outer Rifts, transforming into a Medium demon battle form. When you cast this spell, choose abrikandilu, brimorak, kithangian, or vloriak. If you choose kithangian, the battle form is Large and you must have enough space to expand into or the spell is lost. While in this form, you gain the demon and fiend traits. You have hands in this battle form and can use manipulate actions. You can Dismiss the spell.
    You gain the following statistics and abilities regardless of the form that you choose:AC = 20 + your level. Ignore your armor check's penalty and Speed reduction.30 temporary Hit Points, weakness 5 to cold iron, and weakness 5 to holy.Darkvision.One or more attacks specific to the battle form you use. You're trained with them. Your attack modifier is +22, and you use the listed damage. These attacks are Strength based (for the purpose of the enfeebled condition, for example). If your attack modifier is higher for the given unarmed attack or weapon, you can use it instead.Athletics modifier of +23, unless your own modifier is higher.You also gain specific abilities based on the type of demon you choose:Abrikandilu Speed 25 feet;Melee 1 jaws (magical, unholy), Damage 2d6+12 piercing, and clumsy 1 for 1 minute on a critical hit;Melee 1 claw (agile, magic, unholy), Damage 2d6+12 slashing;Ranged1 hurled debris (range increment 20 feet, unholy), Damage 2d6+6 bludgeoning.Brimorak Speed 30 feet;Melee 1 flaming sword (magical, unholy), Damage 2d8+10 slashing plus 1d6 fire;Melee 1 hoof (agile, unholy), Damage 2d4+10 bludgeoning plus 1d6 fire.Kithangian Speed 30 feet;Melee 1 pincer (magical, reach 10 feet, unholy), Damage 1d12+12 slashing, and you can spend an action after a hit to attempt to Grab the targetMelee 1 stinger (agile, magical, reach 10 feet, unholy), Damage 1d8+12 piercing; all melee Strikes deal 2d6 additional precision damage to animals.Vloriak Speed 25 feet; resistance 10 to acid;Melee 1 claw (unholy), Damage 2d6+12 piercing plus 1d6 spirit;Melee 1 tongue (agile, reach 10 feet, unholy), Damage 1d6+12 acid plus 1d6 spirit.@UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Demon Form]
