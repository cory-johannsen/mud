id: safe_passage_fanatic_doctrine
name: Safe Passage
description: |-
    Area 10-foot-wide, 10-foot-tall, 60-foot-long section of terrainYou make passage through the area safe for a brief amount of time. Anyone passing through the area gains the following benefits against harmful effects of the terrain and environment, including environmental damage, hazardous terrain, and hazards in the area. The spell grants a +2 status bonus to AC and saves against such effects, and resistance 5 to all damage from such effects. Furthermore, the spell prevents anything in the area that's prone to collapse, such as a rickety bridge or an unstable ceiling, from collapsing, except under extreme strain that would collapse a normal structure of its type.
    Safe passage protects only against harm, not inconvenience, and it doesn't reduce difficult terrain, remove the @UUID[Compendium.pf2e.conditionitems.Item.Concealed] condition caused by precipitation, or the like, nor does it protect against creatures within the spell's area.
    @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Safe Passage]Heightened (5th) The granted resistance increases to 10, and the area can be 120 feet long.
    Heightened (8th) The granted resistance increases to 15, and the area can be 500 feet long.
tradition: fanatic_doctrine
level: 3
usage_type: prepared
action_cost: 3
range: melee
targets: single
duration: minutes:1
resolution: none
