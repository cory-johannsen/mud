id: dull_ambition_fanatic_doctrine
name: Dull Ambition
description: |-
    You curse the target to fail in all avenues of its life that require drive and ambition, as it inadvertently undermines its own goals at every turn. The effect is based on the target's Will save.Critical Success The target is unaffected.
    Success For 1 hour, the target rolls twice and uses the lower result on initiative rolls.
    Failure For 1 day, the target rolls twice and uses the lower result on initiative rolls and any check to determine the success of a downtime activity.
    Critical Failure As failure, but the duration is unlimited.
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
