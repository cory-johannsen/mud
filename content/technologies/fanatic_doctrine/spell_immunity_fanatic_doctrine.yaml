id: spell_immunity_fanatic_doctrine
name: Sacred Countermeasure
description: You invoke doctrinal protection against a specific hostile effect. Choose
  a spell and name it aloud. Sacred Countermeasure attempts to counteract that spell
  whenever the target is affected by it. Successfully counteracting an area or multi-target
  spell negates effects only for the protected target.
