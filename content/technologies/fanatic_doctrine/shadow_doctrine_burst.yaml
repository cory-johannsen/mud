id: shadow_doctrine_burst
name: Shadow Doctrine Burst
description: 'A globe of doctrine-empowered freezing darkness explodes in the area,
  dealing 8d10 cold damage to creatures in the area, plus an additional 8d4 void damage
  to living creatures. Each creature in the area must attempt a Reflex save.

  If the globe overlaps with an area of light-based tech or affects a creature affected
  by such tech, the shadow doctrine burst attempts to counteract the light effect.


  Critical Success The creature is unaffected.

  Success The creature takes half damage.

  Failure The creature takes full damage.

  Critical Failure The creature takes double damage and becomes @UUID[Compendium.pf2e.conditionitems.Item.Blinded]
  by the darkness for an unlimited duration.


  Heightened (+1) The cold damage increases by 1d10 and the void damage against the
  living increases by 1d4.'
tradition: fanatic_doctrine
level: 7
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d6
    damage_type: cold
    dc: 0
  - type: damage
    dice: '8'
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 8d10
    damage_type: cold
    dc: 0
  - type: damage
    dice: 8d4
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d10
    damage_type: cold
    dc: 0
  - type: damage
    dice: 16d4
    damage_type: void
    dc: 0
