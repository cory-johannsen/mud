id: attacked_from_within_fanatic_doctrine
name: Attacked from Within
description: |-
    You assert your power over the target's own spirit as you reach deep into its soul in order to discover a moment of excruciating anguish, debilitating humiliation, or abject despair. The target takes 12d8 spirit damage and must attempt a Will save.Critical Success The target takes no damage, with a brief sensation of pain followed by a pleasant memory.
    Success The target takes half damage and is Frightened 1.
    Failure The target takes full damage and is Frightened 2.
    Critical Failure The target takes double damage and is frightened 2 and @UUID[Compendium.pf2e.conditionitems.Item.Off-Guard] for 1 round.Heightened (+1) The damage increases by 2d8.
tradition: fanatic_doctrine
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 12d4
          damage_type: spirit
          dc: 0
    on_failure:
        - type: damage
          dice: 12d8
          damage_type: spirit
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 24d8
          damage_type: spirit
          dc: 0
