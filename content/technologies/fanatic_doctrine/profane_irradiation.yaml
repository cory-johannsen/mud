id: profane_irradiation
name: Profane Irradiation
description: 'You imbue the touched object or space with slow-acting doctrinal corruption.
  If cast on an object, any creature ending its turn holding it takes 2d6 void damage.
  If cast on an area, any creature ending its turn there takes 2d6 void damage. All
  mechanical effects (saves, durations) remain identical to the base protocol.


  Upgraded (+2) Increase the void damage by 1d6.'
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d3
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 2d6
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d6
    damage_type: void
    dc: 0
