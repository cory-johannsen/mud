id: blood_vendetta_fanatic_doctrine
name: Martyr's Retribution
description: 'Requirements You can bleed.

  Trigger A creature deals piercing, slashing, or persistent bleed damage to you.


  You channel doctrinal retribution against the creature that shed your blood. It
  must attempt a Willpower save.


  Critical Success The creature is unaffected.

  Success The creature takes 2d6 mental damage.

  Failure The creature takes 4d6 mental damage and is @UUID[Compendium.pf2e.conditionitems.Item.Sickened]
  1.

  Critical Failure The creature takes 4d6 mental damage and is @UUID[Compendium.pf2e.conditionitems.Item.Sickened]
  2.


  Heightened (+2) The mental damage increases by 2d6 on a failure and critical failure.'
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 0
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d3
    damage_type: bleed
    dc: 0
  on_failure:
  - type: damage
    dice: 2d6
    damage_type: bleed
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d6
    damage_type: bleed
    dc: 0
