id: requiem_frequency
name: Requiem Frequency
description: 'You intone a doctrinal requiem that forces restless spirits to fully
  manifest. Each incorporeal creature in the area takes 4d10 sonic damage (bypassing
  resistances) depending on its Willpower save.


  Critical Success The creature is unaffected.

  Success The creature takes half damage.

  Failure The creature takes full damage and becomes semi-corporeal until the spell
  ends. All attacks against it gain the benefit of a ghost touch rune.

  Critical Failure As failure, but double damage.


  Heightened (+1) The damage increases by 1d10.'
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 4d6
    damage_type: sonic
    dc: 0
  on_failure:
  - type: damage
    dice: 4d10
    damage_type: sonic
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 8d10
    damage_type: sonic
    dc: 0
