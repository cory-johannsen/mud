id: return_to_essence_fanatic_doctrine
name: Return To Essence
description: |-
    You unravel the magic of a spell that affects a container, door, or lock, converting it into energy you can repurpose to power your own spells.
    Attempt a counteract check against the target spell or magical effect that wards or seals a doorway or chest, such as @UUID[Compendium.pf2e.spells-srd.Item.Lock], or against a spell or effect that deals damage or delivers secondary effects when it's opened, such as @UUID[Compendium.pf2e.spells-srd.Item.Rune Trap]. If you succeed, you recover its energy, restoring one of your expended spell slots of 3rd rank or lower.

    Heightened (8th) You can restore an expended spell slot of 4th rank or lower.
    Heightened (9th) You can restore an expended spell slot of 5th rank or lower.
    Heightened (10th) You can restore an expended spell slot of 6th rank or lower.
tradition: fanatic_doctrine
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
