id: wasting_judgment
name: Wasting Judgment
description: 'Your touch delivers the doctrine''s judgment of wasting affliction. The symptoms include fatigue, joint degradation, tissue breakdown, and internal hemorrhaging. The target must attempt a Toughness save.


  Critical Success The creature is unaffected.

  Success The creature takes 2d6 poison damage.

  Failure The creature contracts the disease.

  Critical Failure The creature contracts the disease at stage 2.'
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 2d6
    damage_type: poison
  on_crit_failure:
  - type: damage
    dice: 4d6
    damage_type: poison
