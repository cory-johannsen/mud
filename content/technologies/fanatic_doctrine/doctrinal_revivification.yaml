id: doctrinal_revivification
name: Doctrinal Revivification
description: 'A dense cloud of doctrinal energy descends to fill the target''s space,
  then fires a jolt of revitalizing power into the target. If the target is a corpse
  that died within the last round, the creature comes back to life with 0 Hit Points,
  and any effects and conditions it had when it died, with the exception of dying,
  and its wounded condition increases by 1. The creature''s initiative is right before
  yours.

  Regardless of whether the creature came back to life or was already alive, it regains
  8d8 Hit Points, and the jolt wakes it up if it was @UUID[Compendium.pf2e.conditionitems.Item.Unconscious].
  For the duration, the target is empowered by doctrine. It becomes @UUID[Compendium.pf2e.conditionitems.Item.Quickened]
  and can use the extra action to Stand, Stride, Strike, or Fly (if it has a fly Speed).
  In addition, it can cast 5th-rank @UUID[Compendium.pf2e.spells-srd.Item.Thunderstrike]
  as an innate tech at will, using your tech DC.

  The cloud that covered the creature remains until the end of the target''s next
  turn. Any creature in the cloud is @UUID[Compendium.pf2e.conditionitems.Item.Hidden],
  and anything outside the cloud is hidden to any creature inside the cloud.


  Heightened (+1) The healing increases by 2d8, and the thunderstrike rank increases
  by 1.'
tradition: fanatic_doctrine
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 8d8
    damage_type: untyped
    dc: 0
