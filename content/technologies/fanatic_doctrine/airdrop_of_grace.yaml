id: airdrop_of_grace
name: Airdrop of Grace
description: 'You invoke your doctrine to manifest delivery drones that drop restorative sacramental compounds from above. You or an ally in the area can Interact to collect one of these gifts, and can then either consume it as part of the same action or do so with a separate Interact action later in the spell''s duration. Enemies who attempt to pick up one of these gifts find that it turns to ash in their hands. Each time a character consumes one of these gifts, they can select one of the following benefits.

  The character regains 4d6 Hit Points.

  The character reduces the stage of one poison or disease they suffer from by one stage. This can''t reduce the stage below 1 or cure the affliction.

  The character reduces the value of their Clumsy, Drained, Enfeebled, or Stupefied condition by 2, or reduces two of the listed conditions by 1 each.Heightened (+2) The amount of Hit Points a character regains from consuming a gift increases by 2d6.'
tradition: fanatic_doctrine
level: 6
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 4d6
    damage_type: untyped
    dc: 0
