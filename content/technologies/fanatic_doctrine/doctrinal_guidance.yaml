id: doctrinal_guidance
name: Doctrinal Guidance
description: You petition the doctrine's accumulated wisdom for guidance. You receive
  insight as either words of revelation or a subtle directional sense that guides
  you to a helpful destination. The quality depends on the nature of your query and
  what the doctrine's archives contain.
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You ask a question of the spirits of air, imploring them to send
      signals through the winds to help you find your way. You might be guided by
      air elementals, anemoi, or even the Lords of Air themselves
