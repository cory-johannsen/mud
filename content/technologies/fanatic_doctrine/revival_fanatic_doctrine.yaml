id: revival_fanatic_doctrine
name: Revival
description: |-
    A burst of healing energy soothes living creatures and temporarily rouses those recently slain. All living targets regain 10d8+40 Hit Points.
    In addition, you return any number of dead targets to life temporarily, with the same effects and limitations as @UUID[Compendium.pf2e.spells-srd.Item.Raise Dead]. The raised creatures have a number of temporary Hit Points equal to the Hit Points you gave living creatures, but no normal Hit Points. The raised creatures can't regain Hit Points or gain temporary Hit Points in other ways, and once revival's duration ends, they lose all temporary Hit Points and die.
    Revival can't resurrect creatures killed by @UUID[Compendium.pf2e.spells-srd.Item.Disintegrate] or a death effect. It has no effect on undead.
tradition: fanatic_doctrine
level: 10
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
resolution: none
effects:
    on_apply:
        - type: damage
          dice: 10d8+40
          damage_type: untyped
          dc: 0
