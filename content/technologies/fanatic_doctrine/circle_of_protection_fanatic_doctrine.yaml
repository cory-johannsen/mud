id: circle_of_protection_fanatic_doctrine
name: Doctrinal Ward
description: You inscribe a doctrinal exclusion zone around the target. Creatures
  of the designated category take a -1 status penalty to attack rolls, spell attack
  rolls, and DCs against the warded creature and allies within 10 feet.
tradition: fanatic_doctrine
level: 3
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You ward a creature and those nearby against a specified alignment.
      Choose chaotic, evil, good, or lawful; this tech gains the opposing trait.
      Creatures in the area gain a +1 status bonus to AC again
