id: doctrinal_annihilation
name: Doctrinal Annihilation
description: 'You call forth a catastrophic manifestation of your doctrine''s ultimate power, destroying living and undead creatures in the area alike. Creatures in the area take 10d6 void damage and 10d6 alignment damage (good, evil, lawful, or chaotic), chosen from among the alignments your deity has. If your deity is true neutral, increase the void damage by 4d6 instead of dealing alignment damage. A creature harmed by vitality damage, such as one with void healing, takes vitality damage instead of void damage from this tech.

  You can''t activate this tech if you don''t have a deity. This tech gains the trait corresponding to the alignment damage dealt.


  Upgraded (+1) The damage increases by 1d6 void damage, 1d6 alignment damage, and 1d6 additional void and vitality damage for a true neutral deity.


  @Damage[(+2)d6[void],(+2)d6[spirit]|traits:spirit]{Leveled Void + Spirit Damage}

  @Damage[(+2)d6[vitality],(+2)d6[spirit]|traits:spirit]{Leveled Vitality + Spirit Damage}


  @Damage[((*2)-2)d6[void]]{Leveled Void Damage}

  @Damage[((*2)-2)d6[vitality]]{Leveled Vitality Damage}'
tradition: fanatic_doctrine
level: 8
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 10d6
    damage_type: void
  - type: damage
    dice: 1d6
    damage_type: void
  on_crit_failure:
  - type: damage
    dice: 20d6
    damage_type: void
  - type: damage
    dice: 2d6
    damage_type: void
