id: flesh_rot_doctrine
name: Flesh Rot Doctrine
description: 'You invoke the doctrine of corporeal punishment, causing part of a creature''s
  body to putrefy and wither. The target takes 12d6 void damage and one of the following
  debilitations; roll [[/r 1d4]] to randomly determine which. The effects depend on
  its Grit check.


  Bones The target''s bones necrotize and become spongy and weak, giving it weakness
  3 to bludgeoning damage.

  Joints The target''s joints necrotize, making its movements ungainly and clumsy.
  It becomes Clumsy 1.

  Legs The target''s legs necrotize, as well as any other limbs associated with forms
  of movement, making it harder for the creature to move. The target takes a –10-foot
  status penalty to its Speeds. @UUID[Compendium.pf2e.spell-effects.Item.tech Effect:
  Necrotize (Legs)]

  Muscles The target''s muscles necrotize, rotting away. The target becomes Enfeebled
  1.



  Critical Success The target is unaffected.

  Success The target takes half damage and the debilitation lasts until the end of
  your next turn.

  Failure The target takes full damage and the debilitation lasts for 1 minute.

  Critical Failure The target takes double damage, and you can pick a second debilitation
  to apply, in addition to the one you rolled randomly. Both debilitations last for
  1 minute.


  Upgraded (+1) The damage increases by 2d6.'
tradition: fanatic_doctrine
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 12d3
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 12d6
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 24d6
    damage_type: void
    dc: 0
