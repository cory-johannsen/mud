id: excommunication_brand
name: Excommunication Brand
description: 'You afflict the target with a doctrinal brand that makes its presence
  repulsive to others. The target must attempt a Willpower save.Critical Success The target
  is unaffected.

  Success For 10 minutes, the target must roll twice and use the worse result on Deception,
  Diplomacy, Intimidation, or Performance checks, and creatures they encounter have
  an initial attitude one step worse.

  Failure As success, but the effect is permanent.

  Critical Failure As failure, and creatures'' initial attitude is two steps worse.'
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'You afflict the target with a curse that makes its presence abrasive
      and off-putting. The target must attempt a Willpower save.Critical Success The target
      is unaffected.

      Success For 10 minutes, the target'
