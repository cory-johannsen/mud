name: Filter Air
description: |-
    Trigger You're exposed to a poison or disease that has the inhaled trait, and you're aware of the exposure
    Requirements You breathe air.You suck in a rough breath of air, and your body automatically filters out the harmful molecules that would infest your lungs. As you breathe for the duration of the spell, you get the outcome one degree of success higher on your saving throws against inhaled poisons and diseases.
