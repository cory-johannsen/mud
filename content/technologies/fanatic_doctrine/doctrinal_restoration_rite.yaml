id: doctrinal_restoration_rite
name: Doctrinal Restoration Rite
description: The targets experience a day's worth of recovery in an instant through
  the doctrine's healing power. Any detrimental effects that would be gone after 24
  hours end, though this doesn't shorten the duration of any active tech affecting
  the targets. The targets regain Hit Points and recover from conditions as if they
  had taken 24 hours of rest, but they do not make their daily preparations again
  or gain any benefits of rest other than healing. The targets are then temporarily
  immune for 1 day.
tradition: fanatic_doctrine
level: 8
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
