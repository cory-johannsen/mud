id: abyssal_plague_fanatic_doctrine
name: Corruption Vector
description: 'Your touch infects the target with a doctrinal corruption virus that
  siphons their willpower to feed the collective. The effect is based on the target''s
  Toughness save.


  Critical Success The target is unaffected.

  Success The target takes 2 spirit damage per spell rank, and takes a -2 status penalty
  to Toughness saves for 1 round.

  Failure The target is afflicted with doctrinal corruption (a disease). Stage 1 Drained
  1 (1 day); Stage 2 Drained increases by 1 (1 day).

  Critical Failure The target is afflicted with doctrinal corruption at stage 2.'
