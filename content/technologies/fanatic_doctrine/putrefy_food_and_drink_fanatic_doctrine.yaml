id: putrefy_food_and_drink_fanatic_doctrine
name: Putrefy Food and Drink
description: |-
    You cause otherwise edible food to rot and spoil instantly, and water and other liquids to become brackish and undrinkable. @UUID[Compendium.pf2e.equipment-srd.Item.Holy Water], @UUID[Compendium.pf2e.equipment-srd.Item.Unholy Water], and similar food and drink of significance are spoiled by this tech, unless they are associated with a deity of decay or putrefaction, but it has no effect on creatures of any type, potions, or alchemical elixirs. One cubic foot of liquid is roughly 8 gallons.

    Heightened (2nd) You can target an alchemical elixir with this tech, attempting a counteract check against it. If you succeed, the elixir spoils and becomes a mundane item.
    Heightened (3rd) You can target a potion or alchemical elixir with this tech, attempting a counteract check against it. If you succeed, the elixir or potion spoils and becomes a mundane item.
tradition: fanatic_doctrine
level: 1
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
    on_apply:
        - type: utility
          dc: 0
          description: You cause otherwise edible food to rot and spoil instantly, and water and other liquids to become brackish and undrinkable. @UUID[Compendium.pf2e.equipment-srd.Item.Holy Water], @UUID[Compendium.pf2e.
