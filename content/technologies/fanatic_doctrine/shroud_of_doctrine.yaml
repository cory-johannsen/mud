id: shroud_of_doctrine
name: Shroud of Doctrine
description: 'You wrap targeted creatures in thin cloaking shrouds that channel doctrinal
  power. The shroud grants a +1 status bonus to AC and a +2 status bonus to Stealth
  checks, both only while the target is in dim light or darkness.

  If a creature deals damage to a shrouded target, the attacker''s confidence is shaken,
  giving it a -1 status penalty to attack rolls for 1 round.'
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d4
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 2d8
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d8
    damage_type: mental
    dc: 0
