id: doctrinal_energy_reclaim
name: Doctrinal Energy Reclaim
description: 'You unravel the security protocols of a tech effect that protects a
  container, door, or lock, converting it into energy you can repurpose to power your
  own doctrine.

  Attempt a counteract check against the target tech or effect that wards or seals
  a doorway or chest, such as @UUID[Compendium.pf2e.spells-srd.Item.Lock], or against
  a tech or effect that deals damage or delivers secondary effects when it''s opened,
  such as @UUID[Compendium.pf2e.spells-srd.Item.Rune Trap]. If you succeed, you recover
  its energy, restoring one of your expended tech slots of 3rd rank or lower.


  Heightened (8th) You can restore an expended tech slot of 4th rank or lower.

  Heightened (9th) You can restore an expended tech slot of 5th rank or lower.

  Heightened (10th) You can restore an expended tech slot of 6th rank or lower.'
tradition: fanatic_doctrine
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
