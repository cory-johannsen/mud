id: ravenous_darkness_fanatic_doctrine
name: Devouring Judgment Field
description: You conjure a zone of doctrinal darkness that feeds on the unworthy within.
  This globe of pure darkness is identical to that created by a 4th-rank @UUID[Compendium.pf2e.spells-srd.Item.Darkness]
  spell. Shadowy manifestations resembling gnashing maws emerge within the void. Make
  a spell attack roll against the Fortitude DC of each creature in the area. Any creature
  that fails takes 4d6 bludgeoning damage as the constructs latch onto it. While the
  constructs are attached, it takes a –10-foot circumstance penalty to its Speeds
  and can't Step. Whenever a creature ends its turn in the area, the constructs attempt
  to attach to that creature if they haven't already, and they deal 1d6 bludgeoning
  damage to any creature they're already attached to. The constructs become unattached
  from any creature that leaves the area but can't otherwise be detached from a creature
  while that creature remains in the area. You can Dismiss the spell.
tradition: fanatic_doctrine
level: 6
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
resolution: attack
effects:
  on_hit:
  - type: damage
    dice: 4d6
    damage_type: bludgeoning
    dc: 0
  on_crit_hit:
  - type: damage
    dice: 8d6
    damage_type: bludgeoning
    dc: 0
