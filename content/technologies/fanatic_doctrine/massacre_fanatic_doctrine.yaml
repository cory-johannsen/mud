id: massacre_fanatic_doctrine
name: Massacre
description: |-
    You unleash a wave of death to snuff out the life force of those in its path. Each living creature of 17th level or lower in the line must attempt a Fortitude save. If the damage from massacre reduces a creature to 0 Hit Points, that creature dies instantly. If massacre doesn't kill even a single creature, the void energy hungrily turns backward toward you, dealing an additional @Damage[30[void]] damage to every living creature in the line (even those above 17th level) and 30 void damage to you.Critical Success The creature is unaffected.
    Success The creature takes 9d6 void damage.
    Failure The creature takes @Damage[(ternary(gte(@item.rank,10),115,100))[void]] damage.
    Critical Failure The creature dies.Heightened (10th) The spell can affect living creatures up to 19th level. Increase the damage to 10d6 on a success, and to 115 on a failure.
tradition: fanatic_doctrine
level: 9
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 9d3
          damage_type: void
          dc: 0
    on_failure:
        - type: damage
          dice: 9d6
          damage_type: void
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 18d6
          damage_type: void
          dc: 0
