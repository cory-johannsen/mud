id: doctrine_gift_protocol
name: Doctrine Gift Protocol
description: 'You teleport one object of light or negligible Bulk held in your hand to the target. The object appears instantly in the target''s hand if they have a free hand, or at their feet if they don''t. The target knows what object you''re attempting to send them. If the target is Unconscious or refuses to accept your gift, or if the spell would teleport a creature (even if the creature is inside an extradimensional container), the spell fails.Upgraded (3rd) The spell''s range increases to 500 feet.

  Upgraded (5th) As 3rd level, and the object''s maximum Bulk increases to 1. You can Use this tech with 3 actions instead of 1; doing so increases the range to 1 mile, and you don''t need line of sight to the target, but you must be extremely familiar with the target.'
tradition: fanatic_doctrine
level: 1
usage_type: prepared
action_cost: 1
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: condition
    condition_id: unconscious
    value: 1
