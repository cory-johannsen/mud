id: final_fate_of_the_locust_host_fanatic_doctrine
name: Final Fate of the Locust Host
description: |-
    You conjure the rotting corpse of Deskari, previously Lord of the Locust Hosts, to the battlefield. Deskari's corpse occupies the space of a Gargantuan creature. The corpse is riddled with vermin, including countless locusts, whose collective movement grants the corpse a Speed of 60 feet and a fly Speed of 60 feet.
    Arrive Behold the Rotten Lord Deskari's corpse is unspeakably foul, emitting a putrid stench, and constantly twitches thanks to the movement of the millions of insects and vermin that consume it. A loud, persistent buzzing is created by the clouds of locusts surrounding it like a haze. Each living enemy creature within a @Template[type:emanation|distance:60] must attempt a Fortitude save with the following effects.Critical Success The creature is unaffected.
    Success The creature is Sickened 2.
    Failure The creature is Sickened 3 and @UUID[Compendium.pf2e.conditionitems.Item.Deafened] for the duration.
    Critical Failure The creature is Sickened 4, Stunned 1, and deafened for the duration.Depart (poison) Feast of the Locust Host The millions of insects and vermin feasting on Deskari pour out of its corpse and surge across the battlefield, consuming your enemies. This swarm deals 5d8 piercing damage and 5d8 poison damage to enemy creatures in a @Template[type:emanation|distance:60] with a basic Reflex save. A creature that critically fails is additionally Drained 2.
tradition: fanatic_doctrine
level: 7
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 5d4
          damage_type: piercing
          dc: 0
        - type: damage
          dice: 5d4
          damage_type: poison
          dc: 0
    on_failure:
        - type: damage
          dice: 5d8
          damage_type: piercing
          dc: 0
        - type: damage
          dice: 5d8
          damage_type: poison
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 10d8
          damage_type: piercing
          dc: 0
        - type: damage
          dice: 10d8
          damage_type: poison
          dc: 0
