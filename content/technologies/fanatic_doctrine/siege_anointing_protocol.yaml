id: siege_anointing_protocol
name: Siege Anointing Protocol
description: You trace a doctrinal seal onto the body of a siege weapon, invoking
  sacred guidance for the attacks your allies make with this machine. For the spell's
  duration, any skill checks attempted to Load the siege weapon can be rolled twice,
  taking the better result; these skill checks gain the fortune trait. In addition,
  any saving throws attempted by creatures caught in the siege weapon's Launch area
  must be rolled twice, taking the worse result; these saving throws gain the misfortune
  trait.Heightened (9th) The duration is 8 hours.
tradition: fanatic_doctrine
level: 6
usage_type: prepared
action_cost: 3
range: melee
targets: single
duration: minutes:1
resolution: none
effects:
