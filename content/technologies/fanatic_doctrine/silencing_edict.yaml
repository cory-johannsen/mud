id: silencing_edict
name: Silencing Edict
description: 'You invoke a doctrinal decree that strips a creature''s ability to speak,
  rendering them mute. The effect is determined by the target''s Grit check. The
  target becomes temporarily immune for 1 minute. Creatures without voices are immune.


  Critical Success The target is unaffected.

  Success The target becomes voiceless until the end of its next turn. While voiceless,
  whenever you speak, you can choose to use your voice or the target''s.

  Failure As success, but duration is 1 minute.

  Critical Failure As success, but duration is permanent.'
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
