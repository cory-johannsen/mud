id: devil_form_fanatic_doctrine
name: Inquisitor Engine Form
description: 'You bind yourself to the inquisitorial doctrine, transforming into a
  Medium inquisitor engine battle form. When you cast this tech, choose one of four
  chassis configurations. Some configurations are Large and you must have enough space
  to expand into or the spell is lost. While in this form you gain the devil and fiend
  traits. You have hands in this battle form and can use manipulate actions. You can
  Dismiss the spell.

  You gain the following statistics and abilities regardless of the form that you
  choose:AC = 22 + your level. Ignore your armor check''s penalty and Speed reduction.5
  temporary Hit Points, resistance 5 to physical damage (except silver), and weakness
  5 to holy.Resistance 10 to fire.Darkvision.One or more attacks specific to the battle
  form you use. You''re trained with them. Your attack modifier is +20, and you use
  the listed damage. These attacks are Strength based (for the purpose of the enfeebled
  condition, for example). If your attack modifier is higher for the given unarmed
  attack or weapon, you can use it instead.Athletics modifier of +23, unless your
  own modifier is higher.You also gain specific abilities based on the type of devil
  you choose:Coarti Speed 25 feet, fly 40 feet;Size MediumMelee 1 morningstar (magical,
  unholy, versatile P), Damage 2d6+12 bludgeoning plus 1d6 spirit;Melee 1 wing (agile,
  unholy, versatile P), Damage 1d6+12 bludgeoning plus 1d6 fire.Levaloch Speed 30
  feet, climb 30 feet; +2 circumstance bonus to Fortitude DC against being Shoved
  and to other saving throws to resist being moved against your will;Size LargeMelee
  1 trident (magical, unholy) Damage 2d8+10 piercing;Ranged 1 trident (magical, thrown
  20 feet, unholy), Damage 2d8+10 piercing; all melee Strikes deal 2d6 additional
  precision damage to clumsy, enfeebled, immobilized, or restrained creatures.Sarglagon
  Speed 25 feet, fly 25 feet, swim 30 feet;Size LargeMelee 1 fangs (magical, unholy),
  Damage 2d10+10 piercing;Melee 1 tentacle arm (agile, magical, unholy), Damage 1d8+10
  bludgeoning plus 1d6 poison.Vordine Speed 25 feet;Size MediumMelee 1 trident (magical,
  unholy) Damage 2d8+12 piercing;Melee 1 hoof (agile, magical, unholy), Damage 1d4+12
  plus 1d6 fire;Melee 1 whip (disarm, magical, nonlethal, reach 10 feet, trip, unholy),
  Damage 2d4+10 slashing;Ranged 1 trident (magical, thrown 20 feet, unholy), Damage
  2d8+12 piercing.@UUID[Compendium.pf2e.spell-effects.Item.tech Effect: Devil Form]'
