id: spiritual_weapon_fanatic_doctrine
name: Sacred Striker
description: 'You conjure a floating weapon of devotional energy that attacks on its
  own. When you Sustain the Spell, the weapon can make a Strike against a creature
  within 120 feet. It uses your spell attack modifier and deals 2d8 force damage on
  a hit.


  Heightened (+2) The damage increases by 1d8.'
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
resolution: attack
effects:
  on_hit:
  - type: damage
    dice: 2d8
    damage_type: force
    dc: 0
  on_crit_hit:
  - type: damage
    dice: 4d8
    damage_type: force
    dc: 0
