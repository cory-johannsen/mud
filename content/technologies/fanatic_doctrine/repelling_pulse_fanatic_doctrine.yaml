id: repelling_pulse_fanatic_doctrine
name: Repelling Pulse
description: |-
    You unleash a powerful pulse of telekinetic power, and the pulse violently hurls creatures away from you. Each creature in the area takes 7d10 force damage depending on its Reflex save.

    Critical Success The creature is unaffected.
    Success The creature takes half damage.
    Failure The creature takes full damage and is pushed 10 feet away from you.
    Critical Failure The creature takes double damage. The creature is pushed 20 feet away from you and is then knocked @UUID[Compendium.pf2e.conditionitems.Item.Prone].

    Heightened (+2) The force damage increases by 2d10, and the distance the target is moved on a failure and critical failure increases by 5 feet.
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 7d6
          damage_type: force
          dc: 0
    on_failure:
        - type: damage
          dice: 7d10
          damage_type: force
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 14d10
          damage_type: force
          dc: 0
