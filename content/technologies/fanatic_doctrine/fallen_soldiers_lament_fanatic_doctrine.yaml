id: fallen_soldiers_lament_fanatic_doctrine
name: Fallen Soldier's Lament
description: You raise an illusion in the space of a fallen foe, crafting it to resemble a ghost of your target before parading it across the battlefield. Whenever you Cast this Spell or Sustain this spell, you move the illusion up to 30 feet and cause each enemy in a 30-foot emanation of the spirit to attempt a Will save against your spell DC. Enemies who fail become Frightened 1 (or Frightened 2 on a critical failure).Heightened (6th) You can target a corpse of any size that has died within the past 8 hours.
