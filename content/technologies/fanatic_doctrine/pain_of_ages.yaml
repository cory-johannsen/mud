id: pain_of_ages
name: Pain of Ages
description: You sense a spiritual resonance of deep anguish in the earth beneath your feet, the walls surrounding you, or the fragments of souls left behind in a place of calamity. You draw on this reservoir of pain and unleash its force against your enemies, dealing 8d8 spirit damage. On a critical failure, the creature is also @UUID[Compendium.pf2e.conditionitems.Item.Stunned] for 1 round as it reels from the impact of so much anguish.Heightened (+1) The damage increases by 2d8.
tradition: fanatic_doctrine
level: 6
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 8d4
          damage_type: spirit
          dc: 0
    on_failure:
        - type: damage
          dice: 8d8
          damage_type: spirit
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 16d8
          damage_type: spirit
          dc: 0
