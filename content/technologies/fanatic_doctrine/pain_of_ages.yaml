id: pain_of_ages
name: Eternal Suffering Protocol
description: You channel the accumulated suffering of generations through doctrinal
  resonance, inflicting it upon the target. The target takes 6d6 mental damage (basic
  Willpower save). On a failure, the target is also Sickened 2, and on a critical failure,
  Sickened 4.
tradition: fanatic_doctrine
level: 6
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d4
    damage_type: spirit
    dc: 0
  on_failure:
  - type: damage
    dice: 8d8
    damage_type: spirit
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d8
    damage_type: spirit
    dc: 0
