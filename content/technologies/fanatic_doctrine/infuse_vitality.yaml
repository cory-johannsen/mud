id: infuse_vitality
name: Infuse Vitality
description: 'You empower attacks with vital energy. The number of targets is equal to the number of actions you spent casting this tech. Each target''s unarmed and weapon Strikes deal an extra 1d4 vitality damage. (This damage typically damages only undead). If you have the holy trait, you can add that trait to this tech and to the Strikes affected by the spell.


  Upgraded (3rd) The damage increases to 2d4 damage.

  Upgraded (5th) The damage increases to 3d4 damage.

  Infuse Vitality'
tradition: fanatic_doctrine
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 1d4
    damage_type: vitality
