id: malediction
name: Malediction
description: |-
    You incite distress in the minds of your enemies, making it more difficult for them to defend themselves. Enemies in the area must succeed at a Willpower save or take a –1 status penalty to AC as long as they're in the area.
    Once per round on subsequent turns, you can Sustain the spell to increase the emanation's radius by 10 feet and force enemies in the area that weren't yet affected to attempt a saving throw.
    Malediction can counteract benediction.
    Malediction
tradition: fanatic_doctrine
level: 1
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
