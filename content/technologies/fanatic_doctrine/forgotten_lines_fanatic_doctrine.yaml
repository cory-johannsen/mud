id: forgotten_lines_fanatic_doctrine
name: Sacred Text Recovery
description: 'You perform a doctrinal rite to restore censored or destroyed information
  from texts. You learn one piece of information that was removed from the target
  text after its creation. You can instead learn one piece from a destroyed text if
  you have a fragment.


  Heightened (6th) The rite reconstructs all missing information on a specific topic.

  Heightened (9th) The rite also reveals self-censored information the writer withheld.'
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
