id: summon_lesser_servitor
name: Summon Lesser Servitor
description: |-
    While deities jealously guard their most powerful servants from the summoning spells of those who aren't steeped in the faith, this tech allows you to conjure an inhabitant of the Outer Sphere with or without the deity's permission. You summon a common celestial, fiend, or monitor of level –1. You can choose to instead summon a common animal of level –1 that hails from the Outer Sphere; you can choose for this animal to gain the celestial and holy traits, the fiend and unholy traits, or the monitor trait. It's anathema to summon a servitor if it has a holy or unholy trait that isn't allowed for your deity's sanctification. For example, Sarenrae's sanctification is "can choose holy," so you couldn't summon an unholy creature, and Pharasma's is "none," so you couldn't summon a holy or unholy creature. The GM might determine that your deity restricts specific types of creatures further, making it anathema to summon them as well.Heightened (2nd) The creature can be level 1 or lower.
    Heightened (3rd) The creature can be level 2 or lower.
    Heightened (4th) The creature can be level 3 or lower.
