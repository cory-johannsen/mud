id: mimic_undead_fanatic_doctrine
name: Death Shroud Rite
description: You perform a rite that cloaks you in the aura of death. Mindless undead
  treat you as one of their own and won't attack you unless you attack them first.
  The spell ends if you use a hostile action against any undead.
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You take death and wrap it about you like a cloak-your colors wash
      out and your skin grows cold to the touch. Your heartbeat, breathing, and similar
      life functions become very difficult to detect. Sen
