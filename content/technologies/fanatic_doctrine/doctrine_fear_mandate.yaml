id: doctrine_fear_mandate
name: Doctrine Fear Mandate
description: 'You plant fear in the target; it must attempt a Willpower save.


  Critical Success The target is unaffected.

  Success The target is Frightened 1.

  Failure The target is Frightened 2.

  Critical Failure The target is Frightened 3 and Fleeing for 1 round.


  Upgraded (3rd) You can target up to five creatures.'
tradition: fanatic_doctrine
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: fleeing
    value: 1
  - &id002
    type: condition
    condition_id: frightened
    value: 1
  on_crit_failure:
  - *id001
  - *id002
