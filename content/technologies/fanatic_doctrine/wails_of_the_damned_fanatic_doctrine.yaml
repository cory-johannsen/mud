id: wails_of_the_damned_fanatic_doctrine
name: Wails of the Damned
description: |-
    You howl a lament of damned souls. Each living enemy in the area takes 8d10 void damage and must attempt a Fortitude save.

    Critical Success The creature is unaffected.
    Success The creature takes full damage.
    Failure The creature takes full damage and is @UUID[Compendium.pf2e.conditionitems.Item.Drained] [[/r 1d4]].
    Critical Failure The creature takes double damage and is Drained 4.
tradition: fanatic_doctrine
level: 9
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 8d6
          damage_type: void
          dc: 0
    on_failure:
        - type: damage
          dice: 8d10
          damage_type: void
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 16d10
          damage_type: void
          dc: 0
