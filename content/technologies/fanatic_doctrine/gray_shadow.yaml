id: gray_shadow
name: Gray Shadow
description: |-
    You pray over a dying creature, drawing its shadow into your service as long as its owner is stooped at death's door.
    You summon a @UUID[Compendium.pf2e.pathfinder-monster-core.Actor.Greater Shadow] in a space adjacent to the dying creature. The greater shadow has its usual stats, with the following modifications:The greater shadow's shadow hand Strike deals an additional 1d8 poison damage. @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Gray Shadow]When you Cast a Spell, you can use the greater shadow's location as the origin point instead of your own location. Upon doing so, the greater shadow immediately disappears.If the dying creature targeted by this spell dies or regains consciousness, the greater shadow disappears and this spell ends.
tradition: fanatic_doctrine
level: 6
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: minutes:1
resolution: none
