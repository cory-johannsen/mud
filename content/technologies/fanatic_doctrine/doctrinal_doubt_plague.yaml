id: doctrinal_doubt_plague
name: Doctrinal Doubt Plague
description: 'You curse the target with a crisis of faith, sapping its conviction
  and leaving a contagious trap in its spirit. The target must attempt a Willpower save.
  Any creature that uses a divine or occult tech on the target while it''s affected
  is targeted by the doctrinal doubt plague and must also attempt a Willpower save. The
  curse continues to spread in this way.Critical Success The target is unaffected.

  Success The target is Enfeebled 2 and Stupefied 2 for 1 round.

  Failure The target is enfeebled 2 and stupefied 2 for 1 minute and Enfeebled 1 and
  Stupefied 1 permanently.

  Critical Failure The target is Enfeebled 3 and Stupefied 3 for 1 minute and enfeebled
  2 and stupefied 2 permanently.'
