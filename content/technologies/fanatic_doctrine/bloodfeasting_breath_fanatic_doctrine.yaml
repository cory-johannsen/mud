id: bloodfeasting_breath_fanatic_doctrine
name: Doctrine Siphon
description: 'Area (continued) two 30-foot cones

  You channel doctrinal energy that drains life with one pulse and redistributes it
  with another. All living creatures in the first cone take 5d6 void damage with a
  basic Fortitude save. You and all living creatures in the second cone regain Hit
  Points equal to the greatest damage a single creature took.


  Heightened (+1) The damage increases by 1d6.'
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 5d3
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 5d6
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 10d6
    damage_type: void
    dc: 0
