id: bloodfeasting_breath_fanatic_doctrine
name: Blood-Feasting Breath
description: Area (continued) two 30-foot conesLike a vorpal dragon, you absorb life with an inhale and release it with an exhale. All living creatures in the first cone take 5d6 void damage with a basic Fortitude save. You and all living creatures in the second cone regain Hit Points equal to the greatest damage a single creature took from the first cone.Heightened (+1) The damage and healing increase by 1d6.
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 5d3
          damage_type: void
          dc: 0
    on_failure:
        - type: damage
          dice: 5d6
          damage_type: void
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 10d6
          damage_type: void
          dc: 0
