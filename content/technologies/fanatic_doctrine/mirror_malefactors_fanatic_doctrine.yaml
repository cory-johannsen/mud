id: mirror_malefactors_fanatic_doctrine
name: Judgment Mirrors
description: 'You surround a Large or smaller creature in a ring of holographic doctrinal
  mirrors that follows it as it moves. These mirrors reflect the target''s sins, confusing
  attackers. Any attacker that can see the mirrors must succeed at a Willpower save or
  treat the target as Concealed.


  Heightened (6th) The mirrors also retaliate, dealing 2d6 mental damage to any creature
  that strikes the target.'
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 7d4
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 7d8
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 14d8
    damage_type: mental
    dc: 0
