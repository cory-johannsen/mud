id: sacred_radiance
name: Sacred Radiance
description: 'You fill the area with blinding devotional light. Each creature in the
  area must attempt a Toughness save.


  Critical Success The creature is unaffected.

  Success The creature is @UUID[Compendium.pf2e.conditionitems.Item.Dazzled] for 1
  round.

  Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Dazzled] for 1
  minute.

  Critical Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Blinded]
  for 1 round, then @UUID[Compendium.pf2e.conditionitems.Item.Dazzled] for 1 minute.'
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You create an area of bright light. Creatures with @UUID[Compendium.pf2e.bestiary-ability-glossary-srd.Item.Light
      Blindness] that are @UUID[Compendium.pf2e.conditionitems.Item.Blinded] by radiant
      fiel
