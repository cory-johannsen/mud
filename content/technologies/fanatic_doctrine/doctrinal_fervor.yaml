id: doctrinal_fervor
name: Doctrinal Fervor
description: 'You bypass your targets'' rational minds, filling them with unshakable
  doctrinal fervor. The targets each gain 12 temporary Hit Points and a +2 status
  bonus to Reasoning checks against mental effects, as their faith overrides the signals
  from their own bodies and minds. If you tell a target to do something, it must comply
  with your request, though if it would normally find the task repugnant, it can attempt
  a Willpower save at the end of its turn each round due to the cognitive dissonance. On
  a success, it ends the spell''s effects on itself entirely.

  @UUID[Compendium.pf2e.spell-effects.Item.tech Effect: Zealous Conviction]


  Upgraded (9th) The temporary Hit Points increase to 18, and the status bonus to
  Reasoning checks increases to +3.'
tradition: fanatic_doctrine
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
