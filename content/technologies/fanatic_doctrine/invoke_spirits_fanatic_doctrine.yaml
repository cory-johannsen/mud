id: invoke_spirits_fanatic_doctrine
name: Invoke Martyrs
description: 'Apparitions of fallen zealots rise to assault the living. They deal
  2d4 mental damage and 2d4 void damage to each living creature in the area, with
  a basic Willpower save. Creatures that critically fail the save are Frightened 2 and
  Fleeing for 1 round.


  Heightened (+2) The mental and void damage each increase by 1d4.'
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: '2'
    damage_type: mental
    dc: 0
  - type: damage
    dice: '2'
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 2d4
    damage_type: mental
    dc: 0
  - type: damage
    dice: 2d4
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d4
    damage_type: mental
    dc: 0
  - type: damage
    dice: 4d4
    damage_type: void
    dc: 0
