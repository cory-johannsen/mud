name: Veil of Spirits
description: |-
    You draw on the essence of spiritual energy surrounding you to manifest a misty veil. When a creature that isn't immune to spirit damage begins its turn within the area, it must attempt a Reflex save. You can Dismiss the veil.Critical Success The creature is unaffected.
    Success The creature is @UUID[Compendium.pf2e.conditionitems.Item.Dazzled] until the beginning of its next turn.
    Failure The creature is dazzled and gains a weakness to spirit damage equal to half your level until the beginning of its next turn as spiritual energy clings to it. A creature with spiritsense can't use that imprecise sense while it's dazzled in this way.
    Critical Failure As failure, but the weakness is equal to your level.
