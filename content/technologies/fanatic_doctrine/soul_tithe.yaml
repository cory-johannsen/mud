id: soul_tithe
name: Soul Tithe
description: Your touch drains life force as a doctrinal tithe. You deal 6d6 void
  damage to the target. You gain temporary Hit Points equal to half the damage dealt.
  Upgraded (+1) The damage increases by 2d6.
tradition: fanatic_doctrine
level: 3
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 6d3
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 6d6
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 12d6
    damage_type: void
    dc: 0
