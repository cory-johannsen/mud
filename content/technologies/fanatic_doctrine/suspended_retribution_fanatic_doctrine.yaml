id: suspended_retribution_fanatic_doctrine
name: Suspended Judgment
description: 'You invoke doctrinal judgment, placing a suspended sentence upon the
  target. A spectral omen of divine punishment appears above the target''s head. When
  you Cast this Spell, pick one of the following triggers.

  The target moves more than its Speed in a single round.

  The target makes more than one Strike in a single round.

  The target Casts a Spell.

  The target uses a specific skill you name.

  The target uses a specific ability you name.

  The target uses a specific ability you name. If the target takes the triggering
  action, the judgment activates and the target takes 70 mental damage with a basic
  Reflex save. The target instinctively knows which action will trigger the judgment
  and can ward off the sentence by spending a total of 3 actions, which have the concentrate
  trait, to perform penitential gestures. These actions need not be consecutive. After
  the creature spends the actions, the spell ends.Heightened (+1) The damage increases
  by 10.'
tradition: fanatic_doctrine
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
