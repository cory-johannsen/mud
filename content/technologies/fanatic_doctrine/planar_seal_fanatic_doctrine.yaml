id: planar_seal_fanatic_doctrine
name: Doctrinal Warding Seal
description: You create a visible barrier of doctrinal energy that attempts to counteract
  teleportation effects and planar travel into or out of the area, including items
  that allow access to extradimensional spaces. The warding seal tries to counteract
  any attempt to summon a creature into the area but doesn't stop the creature from
  departing when the summoning ends.
