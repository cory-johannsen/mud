id: past_life_revelation
name: Past-Life Revelation
description: 'Overwhelming memories of a past existence flood the target''s consciousness. This is especially disorienting for undead and creatures that have lived previous lives; if such creatures roll a critical success, they get a success instead, and if they roll a failure, they get a critical failure instead.


  Critical Success The creature is unaffected.

  Success The creature is Slowed 1 for 1 round.

  Failure The target is Slowed 1 for 1 minute and babbles about the visions.

  Critical Failure As failure, but also Stunned 3.'
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: slowed
    value: 1
  - &id002
    type: condition
    condition_id: stunned
    value: 3
  on_crit_failure:
  - *id001
  - *id002
