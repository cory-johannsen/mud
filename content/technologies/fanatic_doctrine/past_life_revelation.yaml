id: past_life_revelation
name: Past-Life Revelation
description: 'Overwhelming memories of a past existence flood the target''s consciousness.
  This is especially disorienting for undead and creatures that have lived previous
  lives; if such creatures roll a critical success, they get a success instead, and
  if they roll a failure, they get a critical failure instead.


  Critical Success The creature is unaffected.

  Success The creature is Slowed 1 for 1 round.

  Failure The target is Slowed 1 for 1 minute and babbles about the visions.

  Critical Failure As failure, but also Stunned 3.'
