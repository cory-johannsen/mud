id: doctrinal_decree
name: Doctrinal Decree
description: 'You utter a potent litany from your faith, a mandate that harms those
  who oppose your ideals. You deal 7d10 spirit damage to your enemies in the area;
  each enemy must attempt a Toughness save.


  Critical Success The creature is unaffected.

  Success The creature takes half damage.

  Failure The creature takes full damage and is Enfeebled 2 for 1 minute.

  Critical Failure The creature takes double damage and is enfeebled 2 for 1 minute.
  If you''re on your home plane and the creature is not, the creature is sent back
  to its home plane. A creature of 10th level or lower must also succeed at a Will
  save or be @UUID[Compendium.pf2e.conditionitems.Item.Paralyzed] for 1 minute; if
  it critically fails, it dies (this is a death effect).


  Heightened (+1) The damage increases by 1d10, and the level of creatures that must
  attempt a second save on a critical failure increases by 2.'
tradition: fanatic_doctrine
level: 7
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 7d6
    damage_type: spirit
    dc: 0
  on_failure:
  - type: damage
    dice: 7d10
    damage_type: spirit
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 14d10
    damage_type: spirit
    dc: 0
