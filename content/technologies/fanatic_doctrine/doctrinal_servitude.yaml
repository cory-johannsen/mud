id: doctrinal_servitude
name: Doctrinal Servitude
description: With an authoritative command phrase, you override the target's autonomous
  functions and bind it to your doctrine. It gains the minion trait. If you or an
  ally uses hostile actions against it, the binding breaks.
tradition: fanatic_doctrine
level: 3
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'With a word of power, you seize control of the target. It gains
      the minion trait. If you or an ally uses any hostile actions against the target,
      the spell ends.'
