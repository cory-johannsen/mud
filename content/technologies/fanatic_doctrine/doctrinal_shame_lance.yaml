id: doctrinal_shame_lance
name: Doctrinal Shame Lance
description: 'You drive a lance of doctrinal judgment deep into the target''s psyche,
  dredging up a moment of excruciating guilt, debilitating shame, or abject despair.
  The target takes 12d8 spirit damage and must attempt a Willpower save.Critical Success
  The target takes no damage, with a brief sensation of pain followed by a comforting
  memory.

  Success The target takes half damage and is Frightened 1.

  Failure The target takes full damage and is Frightened 2.

  Critical Failure The target takes double damage and is frightened 2 and Off-Guard
  for 1 round.Upgraded (+1) The damage increases by 2d8.'
tradition: fanatic_doctrine
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 12d4
    damage_type: spirit
    dc: 0
  on_failure:
  - type: damage
    dice: 12d8
    damage_type: spirit
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 24d8
    damage_type: spirit
    dc: 0
