id: bandits_doom_fanatic_doctrine
name: Sacred Ward Trap
description: 'You consecrate the target item with a doctrinal ward against theft.
  When a creature attempts to take the target into its possession, it takes 8d8 mental
  damage and is doomed, depending on the result of its Will save. The tech then ends.
  You can choose up to 10 creatures when you activate this tech; if you do, those
  creatures are immune to the ward.


  Heightened (+2) The damage increases by 2d8.'
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d4
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 8d8
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d8
    damage_type: mental
    dc: 0
