id: doctrinal_punishment
name: Doctrinal Punishment
description: 'Trigger A creature performs an act that violates your doctrine.


  You punish a creature that transgresses against your sacred ideology, channeling
  righteous fury upon witnessing a doctrinal violation. You can activate this only when
  a creature actively commits a unique violation. You deal 4d6 mental damage to the
  target, but a basic Willpower save can reduce this damage. If it fails, it is also Stupefied
  1 for 1 round. The creature is then temporarily immune for 1 minute.


  Upgraded (+1) The damage increases by 1d6.'
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 0
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 4d3
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 4d6
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 8d6
    damage_type: mental
    dc: 0
