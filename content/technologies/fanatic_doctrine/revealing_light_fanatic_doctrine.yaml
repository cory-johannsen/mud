id: revealing_light_fanatic_doctrine
name: Revealing Light
description: |-
    A wave of magical light washes over the area. You choose the appearance of the light, such as colorful, heatless flames or sparkling motes. A creature affected by revealing light is @UUID[Compendium.pf2e.conditionitems.Item.Dazzled]. If the creature was @UUID[Compendium.pf2e.conditionitems.Item.Invisible], it becomes @UUID[Compendium.pf2e.conditionitems.Item.Concealed] instead. If the creature was already concealed for any other reason, it is no longer concealed.

    Critical Success The target is unaffected.
    Success The light affects the creature for 2 rounds.
    Failure The light affects the creature for 1 minute.
    Critical Failure The light affects the creature for 10 minutes.
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
