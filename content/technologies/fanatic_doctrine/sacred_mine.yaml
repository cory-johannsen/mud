id: sacred_mine
name: Sacred Mine
description: 'Area 5-foot square

  You inscribe a doctrinal trigger glyph. While activating this tech, you also activate
  a tech of a lower rank to store in the glyph. The stored tech must take 2 actions
  or fewer to activate, have a hostile effect, and target one creature or have an
  area. Any creature that enters the glyph''s square triggers the stored tech.


  Heightened (+1) The maximum rank of the stored tech increases by 1.'
