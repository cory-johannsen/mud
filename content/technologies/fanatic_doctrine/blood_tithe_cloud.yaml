id: blood_tithe_cloud
name: Blood Tithe Cloud
description: 'You unleash a cloud of doctrinal nanoscale harvesters that drain vitality from the living. Each living creature in the area (aside from you) takes 6d6 void damage with a basic Toughness save. Creatures in the area are Concealed, and all creatures outside become concealed to those within.

  The first time each round you Sustain, living creatures in the area take additional 1d6 void damage. You gain temporary Hit Points equal to half the highest damage dealt. Temporary Hit Points last 1 minute.Heightened (+1) Initial damage increases by 2d6, secondary damage increases by 1d6.'
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 6d3
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 6d6
    damage_type: void
    dc: 0
  on_crit_failure:
