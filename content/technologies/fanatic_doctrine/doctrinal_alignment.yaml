id: doctrinal_alignment
name: Doctrinal Alignment
description: 'You attune yourself to a spiritual plane, connecting your essence without
  fully transporting. Your Strikes and spells gain the alignment traits of the chosen
  plane, dealing additional damage to creatures with weakness to those alignments.
  You gain resistance 5 to damage of opposing alignments.


  Heightened (+2) The resistance increases by 5.'
