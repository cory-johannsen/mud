id: doctrine_of_decay
name: Doctrine of Decay
description: 'All things age, all things die, and at the end of days, even the greatest
  empires crumble. You invoke the sacred doctrine of entropy, accelerating decay in
  an area—flesh falters, cybernetics corrode, and even reinforced structures begin
  to crumble. Any creature that enters or begins its turn in the area takes 8d6 void
  damage with a basic Toughness save, or 8d6 force damage if the creature normally
  doesn''t take void damage, such as if the creature is a construct or undead. Even
  beings with unlimited operational lifespans can be worn away by doctrinal entropy.

  The first time you Sustain the tech on each subsequent turn, the entropic zone
  grows stronger in addition to having its duration increased. The radius of the burst
  increases by 10 feet (to a maximum of 40 feet), and the size of the damage dice
  increases by one step (from d6 to @Damage[(2+@item.rank)d8[void]|shortLabel], then
  to @Damage[(2+@item.rank)d10[void]|shortLabel], and finally to @Damage[(2+@item.rank)d12[void]|shortLabel]).Heightened
  (+1) The damage increases by 1d6.'
tradition: fanatic_doctrine
level: 6
usage_type: prepared
action_cost: 3
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d3
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 8d6
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d6
    damage_type: void
    dc: 0
