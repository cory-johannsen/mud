id: repulsion_fanatic_doctrine
name: Doctrinal Repulsion Field
description: 'You project a doctrinal aura that compels creatures to keep their distance.
  When casting the spell, you can make the area any radius you choose, up to 40 feet.
  A creature must attempt a Will save if it''s within the area when you Cast the Spell
  or as soon as it enters the area while the spell is in effect. Once a creature has
  attempted the save, it uses the same result for that casting of the spell. Any restrictions
  on a creature''s movement apply only if it voluntarily moves toward you.


  Critical Success The creature''s movement is not restricted.

  Success The creature treats each square in the area as difficult terrain when moving
  closer to you.

  Failure The creature can''t move closer to you within the area.'
