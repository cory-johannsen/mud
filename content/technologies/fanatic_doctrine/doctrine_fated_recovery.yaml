id: doctrine_fated_recovery
name: Doctrine Fated Recovery
description: You speak about the consequences of actions people take against each other and how it's possible to break cycles of violence simply by making a different choice. The targets regain 1d4 Hit Points at the end of each of their own turns while the spell is in effect. If a target uses a hostile action against the other target, the spell ends for the target that used the hostile action.Upgraded (+1) The targets regain an additional 1d4 Hit Points at the end of their own turns.
tradition: fanatic_doctrine
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: rounds:5
resolution: none
effects:
    on_apply:
        - type: damage
          dice: 1d4
          damage_type: untyped
          dc: 0
