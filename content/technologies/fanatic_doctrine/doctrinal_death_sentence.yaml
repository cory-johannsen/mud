id: doctrinal_death_sentence
name: Doctrinal Death Sentence
description: 'You pronounce a doctrinal curse tying a creature to a specific type
  of death. Choose a damage type: acid, bludgeoning, cold, electricity, fire, piercing,
  slashing, sonic, or void. The effect is based on the target''s Toughness save.Critical
  Success The target is unaffected.

  Success The target gains weakness 2 to the chosen damage type until the end of your
  next turn.

  Failure As success, but duration is 1 minute. If reduced to 0 HP by the chosen damage
  and level is 7 or less, it dies.

  Critical Failure As failure, but duration is unlimited.Heightened (+2) Weakness
  increases by 1, and the max level for auto-kill increases by 4.'
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'You utter a curse that a creature will meet a certain end—a death
      by freezing, stabbing, or another means you devise. Choose one type of damage
      from the following list: acid, bludgeoning, cold, elec'
