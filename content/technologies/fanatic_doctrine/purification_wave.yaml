id: purification_wave
name: Purification Wave
description: 'Area 10-foot radius, 60-foot-tall cylinder

  You inundate the area with concentrated doctrinal energy that scours away corruption.
  Each creature in the area takes 6d8 vitality damage and must attempt a basic Reflex
  save. Creatures that fail also take persistent vitality damage equal to their level.


  Heightened (+1) The damage increases by 1d8.'
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 6d4
    damage_type: vitality
    dc: 0
  on_failure:
  - type: damage
    dice: 6d8
    damage_type: vitality
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 12d8
    damage_type: vitality
    dc: 0
