id: lashuntas_life_bubble_fanatic_doctrine
name: Sacred Atmosphere
description: 'You create a protective bubble of sanctified air around the target.
  The bubble enables the target to breathe even underwater or in a vacuum, protects
  from severe cold and heat, and grants a +1 status bonus to saves against inhaled
  dangers.


  Heightened (7th) The status bonus increases to +2, and the bubble also grants resistance
  5 to cold and fire.'
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 1
range: ranged
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: You create a replenishing protective bubble of fresh, temperate air
      around the target. The shell of air enables the target to breathe even underwater
      or in a vacuum, protects from severe cold and heat
