id: bone_flense_fanatic_doctrine
name: Bone Flense
description: |-
    The target weapon becomes imbued with Achaekek's power and glows softly with crimson light akin to that shed by a candle. When a creature with a skeleton or exoskeleton takes damage from a Strike delivered by this weapon, the creature's bones nearest to the wound instantly sprout jagged, razor-sharp spurs that flense the muscle and flesh from inside out. The creature takes an additional 1d6 persistent bleed damage from the Strike. You can use the @UUID[Compendium.pf2e.actionspf2e.Item.Erupting Spurs] reaction.
    @UUID[Compendium.pf2e.spell-effects.Item.Effect: Bone Flense (Damage)]
    @UUID[Compendium.pf2e.spell-effects.Item.Effect: Bone Flense (Reaction)]Heightened (+2) The persistent bleed damage increases by 1d6. The damage from Erupting Spurs increases by 4d6.
