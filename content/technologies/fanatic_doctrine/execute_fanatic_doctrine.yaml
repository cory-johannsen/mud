id: execute_fanatic_doctrine
name: Final Judgment
description: 'You point at a creature and invoke the ultimate verdict of your doctrine.
  The target takes 70 void damage with a basic Fortitude save. If the target is undead
  or otherwise has void healing, the tech loses the death and void traits and gains
  the vitality trait, and the target takes 70 vitality damage with a basic Fortitude
  save.


  Heightened (+1) The damage increases by 10.'
tradition: fanatic_doctrine
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: '70'
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: '70'
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: '70'
    damage_type: void
    dc: 0
