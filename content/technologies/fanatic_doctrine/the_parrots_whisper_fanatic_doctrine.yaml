id: the_parrots_whisper_fanatic_doctrine
name: The Parrot's Whisper
description: |-
    You call forth an echo of the gossiping parrot from the tale of the Witch and the Weaver to whisper the secrets of a creature you can see within range. The garrulous parrot is known to chatter on for some time while deciphering the information you seek. The target must attempt a Will saving throw.Critical Success The parrot chatters about various random topics for 1 round and reveals no relevant information.
    Success The parrot tells you the target's highest weakness at the start of your next turn. In the meantime, the parrot chatters about various random topics.
    Failure The parrot tells you the target's highest weakness immediately, but sticks around for 1 round to chatter.
    Critical Failure The parrot tells you the target's highest weakness immediately, and you can ask the parrot one question about the target creature. You might need to collaborate with the GM to narrow down the question. At the start of your next turn, the parrot answers the question truthfully.
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
