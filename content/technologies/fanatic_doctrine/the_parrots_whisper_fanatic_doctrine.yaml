id: the_parrots_whisper_fanatic_doctrine
name: Confession Extractor
description: 'You invoke a doctrinal compulsion to extract the target''s last words.
  You hear the last sentence the target spoke and the target must attempt a Willpower save.


  Critical Success The target is unaffected and knows you tried to read its mind.

  Success You hear the last sentence the target spoke.

  Failure As success, and the target forgets it spoke those words.

  Critical Failure As failure, and you can choose to implant different words as the
  target''s memory of what it said.'
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_apply:
  - type: utility
    dc: 0
