id: radiant_beam_fanatic_doctrine
name: Doctrine Radiant Beam
description: 'You fire a beam of doctrinal radiance from your outstretched hands.
  The beam deals 5d10 spirit damage. On a failed saving throw, a creature becomes
  Dazzled for 1 round, or dazzled for 4 rounds on a critical failure.

  If the beam passes through an area of profane darkness, it attempts to counteract
  it.


  Heightened (+1) The damage increases by 1d10.'
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 5d6
    damage_type: spirit
    dc: 0
  on_failure:
  - type: damage
    dice: 5d10
    damage_type: spirit
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 10d10
    damage_type: spirit
    dc: 0
