id: blast_of_the_bellows_fanatic_doctrine
name: Blast of the Bellows
description: |-
    You create a churning eddy of warm air that makes it difficult to fly within the area. This area is difficult terrain for flying creatures. Each time a flying creature enters the area or ends its turn there, it must attempt an Acrobatics check to @UUID[Compendium.pf2e.actionspf2e.Item.Maneuver in Flight].
    Success The creature is unaffected.
    Failure The creature descends 30 feet.
    Critical Failure The creature descends 60 feet.

    Heightened (4th) The duration increases to 10 minutes.
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
resolution: none
