id: purifying_icicle_fanatic_doctrine
name: Doctrine Cryo-Purge
description: |-
    You evoke life essence into the form of water and freeze it, then launch the icicle at a foe. Make a tech attack roll. On a success, the icicle deals 2d6 piercing damage and 1d6 cold damage, and if the target is undead, the icicle deals an additional 1d4 vitality damage. On a critical success, the target takes double damage and takes a –10-foot circumstance penalty to its Speeds for 1 round as the icicle lodges inside them before melting away.

    Heightened (+1) The piercing damage and cold damage each increase by 1d6. The vitality damage increases by 1d4.
tradition: fanatic_doctrine
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: attack
effects:
    on_hit:
        - type: damage
          dice: 2d6
          damage_type: piercing
          dc: 0
        - type: damage
          dice: 1d6
          damage_type: cold
          dc: 0
    on_crit_hit:
        - type: damage
          dice: 4d6
          damage_type: piercing
          dc: 0
        - type: damage
          dice: 2d6
          damage_type: cold
          dc: 0
