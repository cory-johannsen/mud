id: hunger_curse
name: Hunger Curse
description: 'You invoke a doctrinal curse of insatiable hunger upon the target. The target must attempt a Willpower save.


  Critical Success The creature is unaffected.

  Success The creature is Sickened 1.

  Failure The creature is Sickened 2 and takes a -2 status penalty to saves against disease.

  Critical Failure As failure, and the creature gains a hunger affliction.'
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: nausea
    value: 1
  on_crit_failure:
  - *id001
