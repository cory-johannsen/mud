id: radiant_heart_of_devotion_fanatic_doctrine
name: Radiant Heart of Devotion
description: |-
    You speak a fervent prayer for the heavens to assist you and your righteous allies. Your heart begins to glow with a radiance that fills the area with bright light. The spell has the following effects on creatures in the area, based on the creature's alignment on the good-evil axis.

    Good Creatures Good creatures in the emanation gain a +1 status bonus to attack rolls and their Strikes deal an additional 1d6 spirit damage.
    Neutral Creatures Neutral creatures that begin their turn in the emanation must succeed at a Will save or be @UUID[Compendium.pf2e.conditionitems.Item.Dazzled] for 1 round.
    Evil Creatures Evil creatures that begin their turn in the emanation must succeed at a Will save or be @UUID[Compendium.pf2e.conditionitems.Item.Blinded] for 1 round.


    Heightened (+2) The additional spirit damage increases by 1d6.
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
