id: spiritual_guardian
name: Doctrinal Guardian
description: 'A Medium guardian construct made of doctrinal force appears in an unoccupied
  space in range. The guardian is translucent and wields a ghostly echo of one weapon
  you''re wielding or wearing. When you Sustain the tech, the guardian can make a
  Strike against an adjacent creature, using your spell attack modifier and dealing
  2d8 force damage plus your spellcasting ability modifier.


  The guardian has AC = your tech DC, 50 Hit Points, and your saves.'
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 3d8
    damage_type: spirit
    dc: 0
