id: prophetic_certainty
name: Prophetic Certainty
description: You invoke a doctrinal prophecy, pre-determining your fate with absolute
  conviction. Before the duration ends, if you would attempt an attack roll, Perception
  check, saving throw, or skill check that would fulfill this prophecy, you can attempt
  the roll at mythic proficiency. You choose which roll before rolling. If you use
  this benefit, the spell ends. You're then temporarily immune for 1 hour.
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 1
range: self
targets: single
duration: instant
resolution: none
