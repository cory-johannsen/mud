id: mantiss_grasp_fanatic_doctrine
name: Mantis's Grasp
description: |-
    You cause red, ghostly mantis arms to sprout from a nearby surface and crush a creature, dealing 8d6 force damage and attempting to pin the target in place. The effects are determined by the creature's Reflex save.Critical Success The target is unaffected.
    Success The target takes half damage.
    Failure The target takes full damage and is @UUID[Compendium.pf2e.conditionitems.Item.Immobilized] for 1 round.
    Critical Failure The target takes double damage and is immobilized for 1 minute. At the end of each of its turns, the target can attempt to @UUID[Compendium.pf2e.actionspf2e.Item.Escape]. The Escape DC is equal to your spell DC.Heightened (7th) You can target up to 5 creatures.
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 8d3
          damage_type: force
          dc: 0
    on_failure:
        - type: damage
          dice: 8d6
          damage_type: force
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 16d6
          damage_type: force
          dc: 0
