id: reenactment_rite
name: Reenactment Rite
description: 'This doctrinal rite compels residual psychic impressions to reenact
  a violent event of the recent past. You take the role of the primary victim. The
  reenactment plays out the final 9 minutes before the death and the minute after.
  The impressions don''t change form.

  Once the scene ends, you take @Damage[2d6[void]] damage for each apparition that
  participated. Any witness can attempt investigation checks to discover new clues.'
