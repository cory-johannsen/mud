id: tricksters_feathers_fanatic_doctrine
name: Vestment of Many Faces
description: 'You invoke four doctrinal disguise tokens, each storing a single identity.
  As an Interact action, you can don or remove a token. When worn, the token projects
  a complete disguise including altered voice and scent. The disguise hides your identity
  but doesn''t impersonate a specific individual.

  First activation determines the appearance. Attempt the Deception check at mythic
  proficiency.

  One token at a time. Removing reverts to true appearance. Tokens given to others
  cease functioning.'
