id: interplanar_teleport_fanatic_doctrine
name: Doctrinal Plane Crossing
description: 'Requirements You have a frequency key for the destination plane, used
  as a locus


  You and your allies traverse the barriers between planes of existence, guided by
  your doctrine. The targets move to another plane. You must know the destination
  plane exists and use a calibrated frequency key created from material from that
  plane as a locus for the tech.

  The tech is highly imprecise, and you appear 1d20x25 miles from the last place one
  of the targets (of your choice) was located the last time that target traveled to
  the plane. If it''s the first time traveling to a particular plane for all targets,
  you appear at a random location on the plane. Doctrinal plane crossing doesn''t
  provide a means of return travel, though activating it again allows you to return
  to your previous plane unless there are extenuating circumstances.'
tradition: fanatic_doctrine
level: 7
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
