id: divine_immolation
name: Sacred Immolation
description: 'Doctrinal flames scour creatures within the area. Creatures take 6d6
  fire damage and persistent fire damage. The sacred power within the flames scorches
  the spirit as well; a creature takes spirit damage instead of fire damage if that
  would be more detrimental.


  Heightened (+1) The initial damage increases by 2d6.'
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 6d3
    damage_type: fire
    dc: 0
  on_failure:
  - type: damage
    dice: 6d6
    damage_type: fire
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 12d6
    damage_type: fire
    dc: 0
