id: fear_the_sun_fanatic_doctrine
name: Fear the Sun
description: |-
    You cause the creature's vision to become particularly sensitive. The creature must attempt a Fortitude save. The creature is then temporarily immune for 1 minute.Critical Success The creature is unaffected.
    Success The creature is @UUID[Compendium.pf2e.conditionitems.Item.Dazzled] for 1 round.
    Failure The creature is dazzled for 1 minute.
    Critical Failure The creature gains @UUID[Compendium.pf2e.bestiary-ability-glossary-srd.Item.Light Blindness] for 1 minute. If the creature is already exposed to bright light, it immediately becomes @UUID[Compendium.pf2e.conditionitems.Item.Blinded] until the end of its next turn, as it isn't acclimated to its newly acquired light blindness.Heightened (6th) You can target up to 10 creatures.
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
