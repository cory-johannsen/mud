id: fear_the_sun_fanatic_doctrine
name: Light Aversion Rite
description: 'You invoke a doctrinal curse that makes the target abhor light. The
  target must attempt a Willpower save.


  Critical Success The creature is unaffected.

  Success The creature is @UUID[Compendium.pf2e.conditionitems.Item.Frightened] 1.

  Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Frightened] 2
  and must spend at least 1 action on its next turn moving away from the nearest source
  of bright light.

  Critical Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Frightened]
  3 and is @UUID[Compendium.pf2e.conditionitems.Item.Fleeing] from all bright light
  sources for 1 round.'
