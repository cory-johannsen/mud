name: Wasting Judgment
description: 'Your touch delivers the doctrine''s judgment of wasting affliction.
  The symptoms include fatigue, joint degradation, tissue breakdown, and internal
  hemorrhaging. The target must attempt a Toughness save.


  Critical Success The creature is unaffected.

  Success The creature takes 2d6 poison damage.

  Failure The creature contracts the disease.

  Critical Failure The creature contracts the disease at stage 2.'
