id: sanctified_barrier_cloak
name: Sanctified Barrier Cloak
description: 'You wrap yourself in doctrinal protective energy, gaining resistance 5 to spirit damage and a +1 status bonus to saving throws against effects with the unholy trait. Creatures that hit you with melee attacks take 2d6 spirit damage.


  Upgraded (8th) The resistance increases to 10, and the spirit damage increases to 3d6 spirit.'
tradition: fanatic_doctrine
level: 6
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 2d6
    damage_type: spirit
  - type: damage
    dice: 3d6
    damage_type: spirit
