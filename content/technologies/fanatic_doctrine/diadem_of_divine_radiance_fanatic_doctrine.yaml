id: diadem_of_divine_radiance_fanatic_doctrine
name: Halo of Judgment
description: 'You manifest a halo of doctrinal radiance that sheds bright light to
  a range of 60 feet and dim light to a further 60 feet. When you activate this tech
  and when you Sustain it during the duration, you can hurl a disc of searing light
  at a creature within 120 feet. Make a ranged tech attack roll. On a hit, you deal
  5d4 fire damage plus 5d4 vitality damage.


  Heightened (+1) The fire damage and vitality damage each increase by 1d4.'
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
