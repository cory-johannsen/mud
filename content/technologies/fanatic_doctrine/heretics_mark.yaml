id: heretics_mark
name: Heretic's Mark
description: 'You brand the target with a mark of doctrinal condemnation. The target must attempt a Willpower save.


  Critical Success The creature is unaffected.

  Success The creature takes 2d6 fire damage.

  Failure The creature takes 4d6 fire damage and is marked. While marked, it takes a -1 status penalty to Deception and Diplomacy checks.

  Critical Failure The creature takes 4d6 fire damage and is marked for 1 month. While marked, it takes a -2 status penalty to Deception and Diplomacy checks.'
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - type: damage
    dice: 2d6
    damage_type: fire
  - type: damage
    dice: 4d6
    damage_type: fire
  on_crit_failure:
  - type: damage
    dice: 4d6
    damage_type: fire
  - type: damage
    dice: 8d6
    damage_type: fire
