id: spiritual_torrent_fanatic_doctrine
name: Doctrinal Torrent
description: 'You release your doctrinal essence in a torrential blast of energy,
  dealing 10d6 damage. If you''re a living creature, this deals vitality damage. If
  you''re an undead creature, this deals void damage.

  1 action - 30-foot cone

  2 actions - 60-foot line

  3 actions - 30-foot burst within 120 feet


  Each creature must attempt a basic Toughness save.'
