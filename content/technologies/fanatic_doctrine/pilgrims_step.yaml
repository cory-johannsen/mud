id: pilgrims_step
name: Pilgrim's Step
description: You invoke a doctrinal blessing of sure footing. The target gains a +2
  status bonus to Acrobatics checks to Balance and to DCs against being Tripped or
  Shoved for the duration.
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'You free the target''s limbs from ailments that impede mobility.
      Attempt to counteract an effect of your choice imposing one of these conditions
      on the target: @UUID[Compendium.pf2e.conditionitems.Item'
