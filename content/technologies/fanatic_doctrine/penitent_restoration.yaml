id: penitent_restoration
name: Penitent Restoration
description: You channel devotional healing to restore the target's vitality. Reduce the target's Clumsy, Enfeebled, or Stupefied condition value by 2. You can instead remove the target's Drained condition (reducing it by 1).
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: Restorative magic counters the effects of toxins or conditions that prevent a creature from functioning at its best. When you cast restoration, choose to either reduce a condition or lessen the effect
