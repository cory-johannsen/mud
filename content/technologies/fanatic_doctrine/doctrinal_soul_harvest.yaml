id: doctrinal_soul_harvest
name: Doctrinal Soul Harvest
description: You channel the doctrine's hunger to utterly consume the target's life
  force. The target takes 60 void damage with a basic Grit check. If this damage
  reduces the target to 0 Hit Points, it dies immediately. You regain Hit Points equal
  to half the void damage the target takes (after applying resistance and the like).
  Any excess healing is gained as temporary Hit Points, which you lose after 1 minute.
tradition: fanatic_doctrine
level: 8
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: '60'
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: '60'
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: '60'
    damage_type: void
    dc: 0
