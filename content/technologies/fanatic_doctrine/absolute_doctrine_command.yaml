id: absolute_doctrine_command
name: Absolute Doctrine Command
description: 'You impose your doctrine''s absolute authority upon the target, forcing it to obey your commands. If you issue an obviously self-destructive order, the target doesn''t act until you issue a new order. The effect depends on its Will save.


  Critical Success The target is unaffected.

  Success The target is Stunned 1 as it fights off your commands.

  Failure You control the target. It gains the Controlled condition, but it can attempt a Willpower save at the end of each of its turns. On a success, the spell ends.

  Critical Failure As a failure, but the target receives a new save only if you give it a new order that is against its nature, such as killing its allies.


  Heightened (10th) The duration is unlimited.'
tradition: fanatic_doctrine
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: stunned
    value: 1
  on_crit_failure:
  - *id001
