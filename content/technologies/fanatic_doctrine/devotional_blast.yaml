id: devotional_blast
name: Devotional Blast
description: 'You channel concentrated doctrinal force in a burst. Each creature in
  the area takes 3d6 bludgeoning damage with a basic Quickness check and is pushed 5 feet
  on a failure (10 feet on a critical failure).


  Upgraded (+1) The damage increases by 1d6.'
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 2d3
    damage_type: slashing
    dc: 0
  on_failure:
  - type: damage
    dice: 2d6
    damage_type: slashing
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 4d6
    damage_type: slashing
    dc: 0
