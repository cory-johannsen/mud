id: eclipse_rite
name: Eclipse Rite
description: 'You invoke a sacred rite that devours light in the area, creating dim
  light in a @Template[burst|distance:20]. Creatures in the area when you cast the
  spell must attempt a Toughness save.


  Critical Success The creature is unaffected.

  Success The creature is @UUID[Compendium.pf2e.conditionitems.Item.Dazzled] for 1
  round.

  Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Dazzled] for 1
  minute.

  Critical Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Blinded]
  for 1 round, then @UUID[Compendium.pf2e.conditionitems.Item.Dazzled] for 1 minute.'
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 1d3
    damage_type: cold
    dc: 0
  - type: damage
    dice: 1d3
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 1d6
    damage_type: cold
    dc: 0
  - type: damage
    dice: 1d6
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 2d6
    damage_type: cold
    dc: 0
  - type: damage
    dice: 2d6
    damage_type: void
    dc: 0
