id: show_the_way_fanatic_doctrine
name: Show the Way
description: You and allies in the area gain preternatural knowledge of the path ahead, allowing you to intuit the best way forward and avoid potential obstacles, such as difficult or confusing terrain. For the purpose of long-distance overland travel during exploration mode, traveling through difficult terrain reduces you to only three-quarters your travel Speed instead of half, and traveling through greater difficult terrain reduces your travel Speed to only half your travel Speed instead of one-third. Show the way doesn't prevent you from falling into traps or encountering other artificial obstacles and hazards.Heightened (6th) For the purpose of long-distance overland travel during exploration mode, traveling through difficult terrain doesn't reduce your travel Speed at all, and traveling through greater difficult terrain reduces your travel Speed to only three-quarters of its normal value instead of one-third.
tradition: fanatic_doctrine
