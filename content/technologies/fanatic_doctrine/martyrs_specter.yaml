id: martyrs_specter
name: Martyr's Specter
description: You project a doctrinal phantom from a fallen enemy, parading it across the battlefield as a tool of psychological warfare. Whenever you Cast or Sustain this tech, you move the projection up to 30 feet and cause each enemy in a 30-foot emanation to attempt a Willpower save. Enemies who fail become Frightened 1 (or Frightened 2 on a critical failure).Heightened (6th) You can target a corpse of any size that has died within the past 8 hours.
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: frightened
    value: 1
  on_crit_failure:
  - *id001
