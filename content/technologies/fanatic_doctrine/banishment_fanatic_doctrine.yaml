id: banishment_fanatic_doctrine
name: Doctrinal Exile
description: 'You invoke sacred protocols to banish the target from this place. The
  target must attempt a Will save. You can spend an extra action while activating
  this tech and add a cost to give the creature a -2 circumstance penalty to its save.


  Critical Success The target is unaffected.

  Success The target takes 2d6 mental damage.

  Failure The target is returned to its home plane. If already there, it''s stunned
  and takes 4d6 mental damage.

  Critical Failure As failure, and the target can''t return for 1 week.'
