id: inevitable_disaster_fanatic_doctrine
name: Inevitable Disaster
description: |-
    You briefly glimpse cause and effect, putting into motion a chain of events that will visit doom on your enemy at some point in the future, though you're not quite sure when or how the doom will occur. Some kind of strange accident occurs [[/gmr 1d4 #rounds]]{1d4 rounds} later, dealing 55 damage to the creature, with a basic Fortitude save. This happens regardless of where the target is located at the time, even if it travels to another plane. The GM should roll to determine when the damage occurs secretly and determine the form of the accident as well as the type of damage it deals; generally, the accident should be one that deals physical damage of some type (for instance, a tree branch might fall on the foe and deal bludgeoning damage, or a window might break and fling sharp slashing glass at them), though other damage types might be appropriate in more unusual environments.

    Heightened (+1) The damage increases by 10.
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: "55"
          damage_type: untyped
          dc: 0
    on_failure:
        - type: damage
          dice: "55"
          damage_type: untyped
          dc: 0
    on_crit_failure:
        - type: damage
          dice: "55"
          damage_type: untyped
          dc: 0
