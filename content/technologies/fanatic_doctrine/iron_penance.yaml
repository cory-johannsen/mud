id: iron_penance
name: Iron Penance
description: A spectral punishment device materializes around the target and drains
  its vitality for your gain. This deals 4d4 piercing damage and 4d4 void damage,
  and the target must attempt a Toughness save. You gain temporary Hit Points equal
  to the void damage taken. All mechanical effects (immobilization, escape) remain
  identical to the base protocol.Heightened (+1) The piercing and void damage increase
  by 1d4 each.
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: '4'
    damage_type: piercing
    dc: 0
  - type: damage
    dice: '4'
    damage_type: void
    dc: 0
  on_failure:
  - type: damage
    dice: 4d4
    damage_type: piercing
    dc: 0
  - type: damage
    dice: 4d4
    damage_type: void
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 8d4
    damage_type: piercing
    dc: 0
  - type: damage
    dice: 8d4
    damage_type: void
    dc: 0
