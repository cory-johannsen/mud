id: resurrection_protocol
name: Resurrection Protocol
description: You invoke the highest rites of your doctrine to restore a dead creature
  to life. The target must have died within the past 3 days. The creature returns
  to life with the same number of Hit Points it had when it died. The target is Clumsy
  2, Drained 1, and Enfeebled 2 for 1 week; these conditions can't be removed or reduced
  by any means until the week has passed. The creature is also temporarily immune
  to resurrection protocols for 1 week.
tradition: fanatic_doctrine
level: 6
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
resolution: none
