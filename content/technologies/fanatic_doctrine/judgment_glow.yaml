id: judgment_glow
name: Judgment Glow
description: You mark enemies with the light of doctrinal judgment. Each creature in the area when you cast the spell must attempt a Reflex save. On a failure, the creature is outlined in sacred light for the duration, making it Concealed ineffective (concealment is negated). If the creature was Invisible, instead of negating its concealment, it becomes Concealed rather than being Undetected or Hidden.
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
resolution: none
effects:
  on_apply:
  - type: condition
    condition_id: hidden
    value: 1
