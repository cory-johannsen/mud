id: orbital_doctrine_strike
name: Orbital Doctrine Strike
description: 'Area: 10-foot radius, 40-foot-tall cylinder


  You call a rain of doctrinal fire that plummets down from above, dealing 8d6 fire
  damage. Because the flame is infused with sacred energy, creatures in the area apply
  only half their usual fire resistance. Creatures that are immune to fire, instead
  of gaining immunity, treat the result of each fire damage die as a 1.


  Upgraded (+1) The damage increases by 2d6.'
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 8d3
    damage_type: fire
    dc: 0
  on_failure:
  - type: damage
    dice: 8d6
    damage_type: fire
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 16d6
    damage_type: fire
    dc: 0
