id: hymn_of_eternal_sorrow
name: Hymn of Eternal Sorrow
description: 'You intone a hymn distilled from the doctrine''s purest grief, conveying
  the inevitable loss of everything your target cherishes, audible to only them. The
  target takes 10d6 mental damage depending on its Willpower save. A creature cursed by
  this tech can''t benefit from circumstance or status bonuses, for the duration noted
  in the degree of success.


  Critical Success The target is unaffected.

  Success The target takes half damage, is Frightened 1, and is cursed for 1 round.

  Failure The target takes full damage, is Frightened 3, and is cursed for 1 week.

  Critical Failure The target takes double damage, is Frightened 4, and is cursed
  for an unlimited duration. While the curse remains, the target''s allies are also
  affected by the curse while within 15 feet of the creature.'
tradition: fanatic_doctrine
level: 8
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: cool
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 10d3
    damage_type: mental
    dc: 0
  on_failure:
  - type: damage
    dice: 10d6
    damage_type: mental
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 20d6
    damage_type: mental
    dc: 0
