id: wraith_storm_of_judgment
name: Wraith Storm of Judgment
description: 'You channel the doctrine''s judgment to manifest an amalgam of condemned spirits—fragments of the faithless and heretical. This amalgam manifests as a massive tornado of flickering, howling faces. It occupies the space of a Huge creature and has a Speed of 60 feet.

  Arrive (negative) Vortex of Judgment Each enemy creature within a 60-foot emanation must attempt a Grit check with the following effects.Critical Success The creature is unaffected

  Success The creature is Drained 1.

  Failure The creature is Drained 2.

  Critical Failure The creature is Drained 3.Depart (emotion, fear, mental) Wail of the Damned The condemned spirits let out an anguished scream. All your enemies within a 100-foot emanation must attempt Cool save saves with the following effects.Critical Success The creature is unaffected.

  Success The creature is Frightened 1.

  Failure The creature is Frightened 3.

  Critical Failure The creature is frightened 3. It''s also Fleeing for 1 round or until it''s no longer frightened, whichever comes first.'
tradition: fanatic_doctrine
level: 7
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_failure:
  - &id001
    type: condition
    condition_id: fleeing
    value: 1
  - &id002
    type: condition
    condition_id: frightened
    value: 1
  on_crit_failure:
  - *id001
  - *id002
