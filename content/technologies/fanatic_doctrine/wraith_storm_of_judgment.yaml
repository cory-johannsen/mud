id: wraith_storm_of_judgment
name: Wraith Storm of Judgment
description: 'You channel the doctrine''s judgment to manifest an amalgam of condemned
  spirits—fragments of the faithless and heretical. This amalgam manifests as a massive
  tornado of flickering, howling faces. It occupies the space of a Huge creature and
  has a Speed of 60 feet.

  Arrive (negative) Vortex of Judgment Each enemy creature within a 60-foot emanation
  must attempt a Toughness save with the following effects.Critical Success The creature
  is unaffected

  Success The creature is Drained 1.

  Failure The creature is Drained 2.

  Critical Failure The creature is Drained 3.Depart (emotion, fear, mental) Wail of
  the Damned The condemned spirits let out an anguished scream. All your enemies within
  a 100-foot emanation must attempt @Check[will|name:Tempest of Shades Depart|traits:necromancy,emotion,fear,mental]
  saves with the following effects.Critical Success The creature is unaffected.

  Success The creature is Frightened 1.

  Failure The creature is Frightened 3.

  Critical Failure The creature is frightened 3. It''s also @UUID[Compendium.pf2e.conditionitems.Item.Fleeing]
  for 1 round or until it''s no longer frightened, whichever comes first.'
