id: summon_fiend
name: Summon Fiend
description: |-
    You summon a creature that has the fiend trait and whose level is 5 or lower to fight for you. The GM might determine your deity restricts the specific types of fiends you can summon in certain cases. For instance, archdevils typically allow their followers to summon devils, but not other fiends.

    Heightened As listed in the summon trait.
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: minutes:1
resolution: none
effects:
    on_apply:
        - type: utility
          dc: 0
          description: You summon a creature that has the fiend trait and whose level is 5 or lower to fight for you. The GM might determine your deity restricts the specific types of fiends you can summon in certain cases.
