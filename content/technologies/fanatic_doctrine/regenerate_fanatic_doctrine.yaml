id: regenerate_fanatic_doctrine
name: Doctrinal Restoration
description: 'An infusion of doctrinal vital energy grants a creature continuous healing.
  The target temporarily gains regeneration 15, which restores 15 Hit Points to it
  at the start of each of its turns. While it has regeneration, the target can''t
  die from taking Hit Point damage and its @UUID[Compendium.pf2e.conditionitems.Item.Dying]
  condition can''t increase to a value that would kill it (this stops most creatures''
  dying condition at dying 3), though if its @UUID[Compendium.pf2e.conditionitems.Item.Wounded]
  value becomes 4 or higher, it stays @UUID[Compendium.pf2e.conditionitems.Item.Unconscious]
  until its wounds are treated. If the target takes acid or fire damage, its regeneration
  deactivates until after the end of its next turn.

  Each time the creature regains Hit Points from regeneration, it also regrows one
  damaged or ruined organ (if any). During the tech''s duration, the creature can
  also reattach severed body parts by spending an Interact action to hold the body
  part to the area it was severed from.

  @UUID[Compendium.pf2e.spell-effects.Item.tech Effect: Regenerate]


  Heightened (9th) The regeneration increases to 20.'
