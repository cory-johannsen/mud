id: bralani_referendum_fanatic_doctrine
name: Bralani Referendum
description: |-
    You enforce fair play with punishing zephyrs. When you Cast this Spell, choose one condition from among @UUID[Compendium.pf2e.conditionitems.Item.Clumsy], @UUID[Compendium.pf2e.conditionitems.Item.Drained], @UUID[Compendium.pf2e.conditionitems.Item.Enfeebled], or @UUID[Compendium.pf2e.conditionitems.Item.Stupefied]. When a creature in the area inflicts the chosen condition, they take 2d6 slashing damage with a basic Fortitude save. A creature can't take this damage more than once per round. You can Dismiss the spell.

    Heightened (+2) Choose one more condition. The slashing damage when a creature inflicts any of the chosen conditions increases by 2d6.
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: minutes:1
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 2d3
          damage_type: slashing
          dc: 0
    on_failure:
        - type: damage
          dice: 2d6
          damage_type: slashing
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 4d6
          damage_type: slashing
          dc: 0
