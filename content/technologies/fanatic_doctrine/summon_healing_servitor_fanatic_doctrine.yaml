id: summon_healing_servitor_fanatic_doctrine
name: Deploy Sacred Medic
description: 'You deploy a servitor forged from doctrinal healing energy. The servitor
  occupies the space of a Huge creature and has a speed of 60 feet.

  Arrive (healing, necromancy, vitality) Servitor''s Protection The servitor appears,
  moving from ally to ally and administering sacred healing, restoring 3d8 Hit Points
  to each ally within 30 feet.


  Heightened (+2) The healing increases by 1d8.'
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 3d4
    damage_type: vitality
    dc: 0
  on_failure:
  - type: damage
    dice: 3d8
    damage_type: vitality
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 6d8
    damage_type: vitality
    dc: 0
