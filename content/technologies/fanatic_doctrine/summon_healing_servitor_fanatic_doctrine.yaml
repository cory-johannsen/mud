id: summon_healing_servitor_fanatic_doctrine
name: Summon Healing Servitor
description: |-
    You call forth a servitor forged from raw vitality energy to heal and bolster your allies. The servitor occupies the space of a Huge creature and has a speed of 60 feet.
    Arrive (healing, necromancy, vitality) Servitor's Protection The servitor appears in a flash of light, moving from ally to ally and granting them a temporary reprieve. All allies within 20 feet of the Servitor gain 20 temporary Hit Points until the servitor departs.
    @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Summon Healing Servitor]
    Depart (healing, necromancy, vitality) Servitor's Blessing The servitor disappears in a @Template[emanation|distance:30] of vitality energy. All willing living creatures within heal 3d8 Hit Points. All undead within take that much damage, with a basic Fortitude save.

    Heightened (+2) The Arrive effect's temporary Hit Points increase by 8, and the Depart effect's healing and damage to undead increase by 1d8.
tradition: fanatic_doctrine
level: 5
usage_type: prepared
action_cost: 3
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 3d4
          damage_type: vitality
          dc: 0
    on_failure:
        - type: damage
          dice: 3d8
          damage_type: vitality
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 6d8
          damage_type: vitality
          dc: 0
