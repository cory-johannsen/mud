id: cosmic_form_fanatic_doctrine
name: Celestial Avatar Form
description: 'You channel your doctrine''s cosmic power, transforming into a Large
  battle form of radiant or shadow energy. You must have enough space to expand into,
  or the tech is lost. When you activate this tech, choose to take on the lunar or
  solar aspect. You have hands in this battle form and can use manipulate actions.
  You can Dismiss the tech.

  You gain the following statistics and abilities regardless of the form that you
  choose:AC = 21 + your level. Ignore your armor check''s penalty and Speed reduction.20
  temporary Hit Points.Darkvision.One or more attacks specific to the battle form
  you use. You''re trained with them. Your attack modifier is +25, and you use the
  listed damage. The melee attacks are Strength based (for the purpose of the enfeebled
  condition, for example), and the ranged attacks are Dexterity based. If your unarmed
  attack modifier is higher, you can use it instead.Athletics modifier of +25, unless
  your own is higher.You also gain specific abilities based on the stellar body:Moon
  Speed 30 feet, fly 50 feetMelee 1 fist (agile, reach 10 feet), Damage 2d4+10 bludgeoning
  plus 1d6 fireRanged 1 moonbeam (range 90 feet), Damage 2d4+10 fire; this form''s
  fire damage is silver for resistances, weaknesses, and the likeOn a critical hit
  with either Strike, the target is Stupefied 2 for 1 round.Sun Speed 30 feet, fly
  50 feetMelee 1 fist (agile, reach 10 feet), Damage 2d6+10 fire plus 1d6 persistent
  fireRanged 1 sunbeam (range 90 feet), Damage 1d6+10 fire plus 1d6 persistent fireOn
  a critical hit with either Strike, the target is @UUID[Compendium.pf2e.conditionitems.Item.Dazzled]
  for 1 round.@UUID[Compendium.pf2e.spell-effects.Item.tech Effect: Cosmic Form]'
