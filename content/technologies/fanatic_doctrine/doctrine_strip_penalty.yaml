id: doctrine_strip_penalty
name: Doctrine Strip Penalty
description: |-
    With a touch, you strip off the flesh, muscle, and internal organs off your target, leaving only bare bones. The effect depends on whether the target is a living creature, undead creature, or inanimate corpse. A creature or corpse that lacks flesh, muscle, and internal organs is immune to this tech.
    Inanimate Corpse The flesh, muscle, viscera, and organs are stripped from the corpse and vanish, leaving only bare bones behind.
    Living Creature Make a tech attack roll. On a hit, the target takes 2d6 slashing damage. On a critical hit, double the damage, and the target also takes 1d4 persistent bleed damage. If this tech's damage kills the target, the corpse is only bones.
    Undead Creature Make a tech attack roll. On a hit, the target takes 2d6 slashing damage. On a critical hit, double the damage, and the target also becomes Enfeebled 1 for 1 minute. If this tech's damage destroys the target, only its bare bones remain behind.

    Heightened (+1) The slashing damage to living and undead creatures increases by 2d6, and the persistent bleed damage to living creatures increases by 1d4.
tradition: fanatic_doctrine
level: 1
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: attack
effects:
    on_hit:
        - type: damage
          dice: 2d6
          damage_type: slashing
          dc: 0
    on_crit_hit:
        - type: damage
          dice: 4d6
          damage_type: slashing
          dc: 0
