id: divine_wrath
name: Divine Wrath
description: |-
    You channel the fury of divinity against your foes. You deal 4d10 spirit damage to enemies in the area, depending on their Fortitude save.

    Critical Success The creature is unaffected.
    Success The creature takes half damage.
    Failure The creature takes full damage and is Sickened 1.
    Critical Failure The creature takes full damage and is Sickened 2; while it's sickened, it's also Slowed 1.

    Heightened (+1) The damage increases by 1d10.
tradition: fanatic_doctrine
level: 4
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 4d6
          damage_type: spirit
          dc: 0
    on_failure:
        - type: damage
          dice: 4d10
          damage_type: spirit
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 8d10
          damage_type: spirit
          dc: 0
