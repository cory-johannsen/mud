id: ethereal_jaunt_fanatic_doctrine
name: Transcendent Phase Walk
description: 'You phase your physical form into a transcendent frequency that overlaps
  normal space, as taught by your doctrine. Normal-frequency creatures can''t see
  you, and you can move through solid objects. You move at half your normal Speeds,
  but can move in any direction (including up and down). You can perceive normal space
  within a radius of 60 feet; it is gray, hazy, and @UUID[Compendium.pf2e.conditionitems.Item.Concealed]
  from you. You can''t affect normal space, and you can''t be affected by it except
  by force effects and countermeasures originating there. When the effect ends, you
  return to normal space. If you''re in the air, you fall (unless you can fly), and
  if you''re inside an object, you''re pushed into the nearest open space and take
  1d6 damage per 5 feet you were pushed. If you activate this tech when not in normal
  space, it is lost.


  Heightened (9th) You can target up to five additional willing creatures at a range
  of 30 feet. The duration is up to 10 minutes.'
tradition: fanatic_doctrine
level: 7
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
