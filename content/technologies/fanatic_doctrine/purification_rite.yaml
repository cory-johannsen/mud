id: purification_rite
name: Purification Rite
description: You perform a doctrinal cleansing ritual to purge affliction. Attempt
  a counteract check against one affliction affecting the target. If you succeed,
  you reduce the stage of the affliction by 1 (to a minimum of stage 1) instead of
  entirely removing it.
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
