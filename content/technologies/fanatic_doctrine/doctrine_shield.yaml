id: doctrine_shield
name: Doctrine Shield
description: You invoke sacred protocols that fortify the target's mind against intrusion.
  The target gains a +2 status bonus to Will saves against mental effects for the
  duration.
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'You drive mental contamination from the target''s mind. Attempt
      to counteract an effect of your choice imposing one of these conditions on the
      target: @UUID[Compendium.pf2e.conditionitems.Item.Fleeing]'
