id: final_sacrifice_fanatic_doctrine
name: Martyr's Immolation
description: 'You trigger a willing ally or minion''s devotional self-sacrifice, dealing
  6d6 fire damage in a @Template[burst|distance:20] centered on it. Each creature
  in the area must attempt a basic Reflex save. The target of the sacrifice is destroyed.


  Heightened (+1) The damage increases by 2d6.'
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
save_type: hustle
save_dc: 15
resolution: save
effects:
  on_success:
  - type: damage
    dice: 6d3
    damage_type: fire
    dc: 0
  on_failure:
  - type: damage
    dice: 6d6
    damage_type: fire
    dc: 0
  on_crit_failure:
  - type: damage
    dice: 12d6
    damage_type: fire
    dc: 0
