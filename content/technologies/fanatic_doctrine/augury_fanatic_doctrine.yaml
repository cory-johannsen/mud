id: augury_fanatic_doctrine
name: Doctrinal Divination
description: 'You consult the sacred protocols for guidance on the future. During
  the casting of this spell, ask about the results of a particular course of action.
  The GM determines the most likely outcome: woe (bad outcome), weal (good outcome),
  weal and woe (mix), or nothing (no strong outcome). The GM may use a "nothing" result
  to avoid spoiling a storyline.


  If anyone asks about the same topic as the first augury, subsequent auguries give
  a random result.'
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
