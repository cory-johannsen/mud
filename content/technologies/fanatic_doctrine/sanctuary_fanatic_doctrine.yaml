id: sanctuary_fanatic_doctrine
name: Sanctuary
description: |-
    You ward a creature with protective energy that deters attacks. Creatures attempting to attack the target must attempt a Willpower save each time. If the target uses a hostile action, the spell ends.

    Critical Success Sanctuary ends.
    Success The creature can attempt its attack and any other attacks against the target this turn.
    Failure The creature can't attack the target and wastes the action. It can't attempt further attacks against the target this turn.
    Critical Failure The creature wastes the action and can't attempt to attack the target for the rest of sanctuary's duration.
tradition: fanatic_doctrine
level: 1
usage_type: prepared
action_cost: 2
range: melee
targets: single
duration: minutes:1
save_type: cool
save_dc: 15
resolution: save
