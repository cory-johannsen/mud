id: doctrine_spirit_ward
name: Doctrine Spirit Ward
description: |-
    You draw on nearby spiritual energy or on echoes of the spirits you've invoked throughout your life to temporarily ward living flesh against dangerous spirits. You grant the target a +1 status bonus to saving throws against spells and effects caused by creatures that have the spirit trait and haunts. The number of actions you spend when Casting this tech determines its targets, range, area, and other parameters.
    1 The spell has a range of touch.
    2 (concentrate) The spell has a range of 30 feet. If you target a living creature, the bonus increases to +2.
    3 (concentrate) You create a ward in a @Template[type:emanation|distance:30]. This targets you and all your allies in the burst.
    @UUID[Compendium.pf2e.spell-effects.Item.tech Effect: Spirit Ward]
