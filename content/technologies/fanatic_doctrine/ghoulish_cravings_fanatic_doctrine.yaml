  target must attempt a Will save.


  Critical Success The creature is unaffected.

  Success The creature is @UUID[Compendium.pf2e.conditionitems.Item.Sickened] 1.

  Failure The creature is @UUID[Compendium.pf2e.conditionitems.Item.Sickened] 2 and
  takes a -2 status penalty to saves against disease.

  Critical Failure As failure, and the creature gains a hunger affliction.'
