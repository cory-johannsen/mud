id: sacred_night_sight
name: Sacred Night Sight
description: 'You invoke a blessing of dark-sight upon the target. The target gains
  darkvision for the duration.


  Heightened (3rd) The spell''s range is touch and the target changes to 1 willing
  creature.

  Heightened (4th) The spell''s range changes to 30 feet, and you can target up to
  2 willing creatures.'
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: instant
resolution: none
effects:
  on_apply:
  - type: utility
    dc: 0
    description: 'You grant yourself supernatural sight in areas of darkness. You
      gain Darkvision.

