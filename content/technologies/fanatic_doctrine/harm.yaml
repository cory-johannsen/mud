id: harm
name: Harm
description: |-
    You channel void energy to harm the living or heal the undead. If the target is a living creature, you deal 1d8 void damage to it, and it gets a basic Toughness save. If the target is a willing undead creature, you restore that amount of Hit Points. The number of actions you spend when Casting this tech determines its targets, range, area, and other parameters.
    1 The spell has a range of touch.
    2 (concentrate) The spell has a range of 30 feet. If you're healing an undead creature, increase the Hit Points restored by 8.
    3 (concentrate) You disperse void energy in a @Template[emanation|distance:30]. This targets all living and undead creatures in the area.

    Heightened (+1) The amount of healing or damage increases by 1d8, and the extra healing for the 2-action version increases by 8.
tradition: fanatic_doctrine
level: 1
usage_type: prepared
action_cost: 2
range: ranged
targets: single
duration: instant
save_type: toughness
save_dc: 15
resolution: save
effects:
    on_success:
        - type: damage
          dice: 1d4
          damage_type: void
          dc: 0
    on_failure:
        - type: damage
          dice: 1d8
          damage_type: void
          dc: 0
    on_crit_failure:
        - type: damage
          dice: 2d8
          damage_type: void
          dc: 0
