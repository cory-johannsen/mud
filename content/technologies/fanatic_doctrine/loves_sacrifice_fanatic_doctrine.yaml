id: loves_sacrifice_fanatic_doctrine
name: Doctrine Love Sacrifice
description: 'Trigger You take damage that would reduce you to 0 Hit Points.

  You cry out according to the sacred rites of your doctrine, and a creature near
  you feels compelled to throw itself in front of the threat as the ultimate expression
  of their devotion. A target that genuinely loves the caster without compulsion,
  at their player''s or the GM''s discretion, fails the save.Critical Success The
  target is unaffected.

  Success The creature moves adjacent to you, moving further than its Speed if necessary
  as the doctrine compels it to exceed its limits. It takes half the damage you would
  have taken, while you take the rest. If you would be reduced to 0 Hit Points, you''re
  reduced to 1 instead.

  Failure As success, except they take the full damage. If the damage reduces them
  to 0 Hit Points, they immediately die; this is a death effect.PFS Note: This tech
  can only be activated on a friendly NPC with GM approval, and on a PC with their
  player''s approval.'
