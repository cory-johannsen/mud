id: vessel_of_doctrine
name: Vessel of Doctrine
description: 'You accept the overwhelming power of your doctrine into your body; while you are still recognizably yourself, you gain the features of an exalted servant of your ideology. Choose an alignment your doctrine has (chaotic, evil, good, or lawful). You can''t activate this tech if you don''t have a doctrine or your doctrine is true neutral. This tech gains the trait of the alignment you chose.

  If you were Medium or smaller, you become Large, as the effects of Enlarge. You must have space to expand into, or the tech is lost. You also gain the following benefits.


  40 temporary Hit Points.

  A fly Speed equal to your Speed.

  Weakness 10 to the alignment opposite the one you chose.

  A +1 status bonus to saves against tech effects.

  Darkvision.

  Your unarmed attacks and weapons deal 1 additional damage of the chosen alignment type.

  One or more unarmed melee attacks. If you chose good or lawful, your fist attacks deal 2d8 damage. If you chose chaotic, you gain a bite unarmed attack that deals 2d10 piercing damage. If you chose evil, you gain a claws unarmed attack that deals 2d8 slashing damage and has the agile and finesse traits.


  @UUID[Compendium.pf2e.spell-effects.Item.tech Effect: Divine Vessel]


  Heightened (9th) The temporary Hit Points increase to 60, the weakness increases to 15, and the duration increases to 10 minutes.

  @UUID[Compendium.pf2e.spell-effects.Item.tech Effect: Divine Vessel (9th level)]'
tradition: fanatic_doctrine
level: 7
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
effects:
  on_apply:
  - type: damage
    dice: 2d10
    damage_type: piercing
  - type: damage
    dice: 2d8
    damage_type: slashing
