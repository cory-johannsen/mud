id: spirit_sense_fanatic_doctrine
name: Spirit Sense
description: |-
    You open your mind to the metaphysical, enabling you to sense nearby spirits. Even if you aren't Searching, you get a check to find haunts and spirits in the area. You gain a +1 status bonus to the following checks regarding haunts or spirits: Perception checks to @UUID[Compendium.pf2e.actionspf2e.Item.Seek], attempts to Recall Knowledge, skill checks to determine the reason for their existence, and skill checks to disable a haunt. You also gain a +1 status bonus to AC and saving throws against haunts and spirits.Heightened (6th) The spell's duration lasts until the next time you make your daily preparations.
    @UUID[Compendium.pf2e.spell-effects.Item.Spell Effect: Spirit Sense]
tradition: fanatic_doctrine
level: 2
usage_type: prepared
action_cost: 2
range: zone
targets: zone
duration: instant
resolution: none
