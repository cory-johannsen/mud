id: ascended_zealot_form
name: Ascended Zealot Form
description: 'Invoking the supreme tenets of your doctrine, you transform into a Medium
  ascended battle form. When you activate this tech, choose one of four zealot archetypes:
  arbiter, herald, sentinel, or transcendent. The battle form is Small if you choose
  herald or sentinel. While in this form, you gain the angel and celestial traits.
  You have hands in this battle form and can use manipulate actions. You can Dismiss
  the tech.

  You gain the following statistics and abilities regardless of the form that you
  choose:AC = 22 + your level. Ignore your armor check''s penalty and Speed reduction.40
  temporary Hit Points and weakness 10 to unholy.Darkvision.One or more attacks specific
  to the battle form you choose. You''re trained with them. Your attack modifier is
  +25, and you use the listed damage. Melee attacks are Strength based (for the purpose
  of the enfeebled condition, for example), and ranged attacks are Dexterity based.
  If your attack modifier is higher for the given unarmed attack or weapon, you can
  use it instead.Athletics modifier of +25, unless your own modifier is higher.You
  also gain specific abilities based on the type of ascended form you choose:Balisse
  Speed 30 feet, fly 40 feet; Perception modifier of +26 to detect lies and illusions
  unless your own modifier is higherMelee 1 scimitar (fire, forceful, holy, magical,
  sweep), Damage 2d6+12 slashing plus 2d6 fire.Choral Speed 30 feet, fly 40 feet;
  +1 status bonus to AC and saves against sonic and auditoryMelee 1 fist (agile),
  Damage 2d6+12 bludgeoning plus 1d6 spirit;Ranged 1 piercing hymn (range 90 feet),
  Damage 1d6+12 sonic plus 1d6 spirit, and @UUID[Compendium.pf2e.conditionitems.Item.Deafened]
  for 1 round on a critical hit.Kuribu Speed 25 feet, fly 40 feet; resistance 10 to
  electricity and fireMelee 1 fist (agile, holy, magical), Damage 3d4+12 bludgeoning.Ranged
  1 composite shortbow (deadly 2d10, holy, magical, propulsive, range increment 60
  feet) Damage 3d6+12 piercingTennin Speed 30 feet, fly 60 feet; can Step into difficult
  terrain and use land and fly Speeds to Step;Melee 1 fist (agile, holy, magical,
  nonlethal), Damage 1d6+12 bludgeoning plus 1d6 cold and 1d6 spirit.@UUID[Compendium.pf2e.spell-effects.Item.tech
  Effect: Angel Form]Heightened (9th) Your battle form is Large. You must have space
  to expand, or the tech is lost. You instead gain 60 temporary Hit Points, weakness
  15 to unholy, attack modifier +30, damage bonus +20, and Athletics +33.'
tradition: fanatic_doctrine
level: 7
usage_type: prepared
action_cost: 2
range: self
targets: single
duration: minutes:1
resolution: none
