id: tracker
name: Tracker
archetype: naturalist
tier: 2
description: "Specialize in locating and apprehending targets — bounty hunters, assassins, or those searching for missing persons. Portland's ruins don't hide things well from them."
key_ability: grit
hit_points_per_level: 10
proficiencies:
  simple_weapons: trained
  simple_ranged: trained
  light_armor: trained
  toughness: trained
  hustle: trained
  cool: trained

skills:
  fixed:
    - wasteland
    - ghosting
  choices:
    count: 2
    pool:
      - parkour
      - intel
      - hard_look
      - scavenging
feats:
  general_count: 1
  fixed:
    - mark_target
  choices:
    pool: [rapid_shot, animal_companion_drifter]
    count: 1

class_features:
  - predators_eye
  - zone_awareness
  - read_the_signs

technology_grants:
  prepared:
    pool:
      - id: bio_scent_trail_marker
        level: 1
      - id: vanishing_tracks
        level: 1
      - id: bio_morph_shrink
        level: 1
drawbacks:
  - id: trail_obsession
    type: passive
    description: "You follow a trail to the end, even when the end is a bad idea. Breaking off a hunt requires a Resolve test (DN 3) or you keep going."
  - id: isolation_instinct
    type: situational
    trigger: on_enter_room_danger_level
    effect_condition_id: frightened
    duration: "30m0s"
    description: "Open, high-threat terrain spikes your predator-sense. You're used to being the thing doing the hunting — not the thing being hunted."
