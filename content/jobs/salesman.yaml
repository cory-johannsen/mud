id: salesman
name: Salesman
archetype: schemer
casting_model: spontaneous
tier: 2
description: "The lowest of lows. Peddles whatever they can for more than it's worth. Truly awful people who are also somehow essential to Portland's survival."
key_ability: savvy
hit_points_per_level: 8
proficiencies:
  simple_weapons: trained
  light_armor: trained
  toughness: trained
  hustle: trained
  cool: trained

skills:
  fixed:
    - hustle
    - smooth_talk
  choices:
    count: 2
    pool:
      - grift
      - factions
      - rep
      - intel
feats:
  general_count: 1
  fixed:
    - read_the_room
  choices:
    pool: [root_to_life, dirty_strike]
    count: 1

class_features:
  - street_tough
  - resilience
  - always_be_closing

technology_grants:
  prepared:
    pool:
      - { id: social_dynamics_scan, level: 1 }
      - { id: psi_boost_surge, level: 1 }
      - { id: psi_dramatic_overclock, level: 1 }
drawbacks:
  - id: reputation_burn
    type: passive
    description: "You've closed too many deals on too-thin promises. Word travels. Buyers who've heard your name twice often don't trust it a third time."
  - id: failed_pitch
    type: situational
    trigger: on_fail_skill_check
    effect_condition_id: demoralized
    duration: "30m0s"
    description: "A deal that falls apart in front of witnesses eats at you. The smile cracks."
