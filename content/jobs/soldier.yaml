id: soldier
name: Soldier
archetype: aggressor
tier: 2
description: "Professional fighters, trained to fight in a specific way. Focus on solving problems with overwhelming force."
key_ability: brutality
hit_points_per_level: 10
proficiencies:
  simple_weapons: trained
  martial_weapons: trained
  simple_ranged: trained
  martial_ranged: trained
  light_armor: trained
  medium_armor: trained
  toughness: expert
  hustle: trained
  cool: trained

skills:
  fixed:
    - muscle
    - hard_look
  choices:
    count: 2
    pool:
      - parkour
      - ghosting
      - wasteland
      - scavenging
feats:
  general_count: 1
  fixed:
    - cover_fire
  choices:
    pool: [hit_the_dirt, combat_read]
    count: 1

class_features:
  - street_brawler
  - brutal_surge
  - guerilla_warfare
drawbacks:
  - id: orders_dependency
    type: passive
    description: "Without a chain of command, your initiative suffers. Operating autonomously in ambiguous situations requires a Resolve test (DN 2) or you wait for direction that isn't coming."
  - id: flashpoint
    type: situational
    trigger: on_take_damage_in_one_hit_above_threshold
    effect_condition_id: frightened
    duration: "30m0s"
    description: "A hit big enough to rock you sends your nervous system back to a bad day in the field. Training kicks in, but so does the trauma."
