id: karen
name: Karen
archetype: influencer
tier: 1
description: "Karens have made everyone around them OK with their nonstop chatter. They solve problems by yelling louder. Somehow this works in Portland's ruins."
key_ability: flair
hit_points_per_level: 8
proficiencies:
  simple_weapons: trained
  simple_ranged: trained
  light_armor: trained
  toughness: trained
  hustle: trained
  cool: trained

skills:
  fixed:
    - rep
    - smooth_talk
  choices:
    count: 2
    pool:
      - factions
      - hustle
      - hard_look
      - conspiracy
feats:
  general_count: 1
  fixed:
    - reach_influence
  choices:
    pool: [raw_intensity, crowd_performer]
    count: 1

class_features:
  - command_attention
  - fast_talk
  - speak_to_the_manager

technology_grants:
  spontaneous:
    pool:
      - { id: neural_aggro_beacon, level: 1 }
      - { id: neural_suppression_wave, level: 1 }
      - { id: psi_dramatic_overclock, level: 1 }
drawbacks:
  - id: the_complaint
    type: passive
    description: "You've made so many official complaints that the system routes your calls to a discard pile. You get ignored in precisely the situations where being heard matters."
