id: thug
name: Thug
archetype: aggressor
tier: 1
description: "Employed by others to do their dirty work. Under the employ of a specific faction, they generally adhere to that faction's beliefs — at least while they're watching."
key_ability: brutality
hit_points_per_level: 10
proficiencies:
  simple_weapons: trained
  martial_weapons: trained
  light_armor: trained
  medium_armor: trained
  toughness: trained
  hustle: trained
  cool: trained

skills:
  fixed:
    - muscle
    - hard_look
  choices:
    count: 2
    pool:
      - parkour
      - grift
      - ghosting
      - gang_codes
feats:
  general_count: 1
  fixed:
    - raging_threat
  choices:
    pool: [brutal_charge, overpower]
    count: 1

class_features:
  - street_brawler
  - brutal_surge
  - pack_mentality
drawbacks:
  - id: reputation_trap
    type: passive
    description: "Your name means violence. That opens some doors and slams others permanently. Negotiations involving nuance tend to end badly for everyone."
  - id: unfinished_business
    type: situational
    trigger: on_leave_combat_without_kill
    effect_condition_id: demoralized
    duration: "1h0m0s"
    description: "A fight that doesn't end decisively leaves you wired and ugly. You start looking for a reason to finish what the last confrontation started."
