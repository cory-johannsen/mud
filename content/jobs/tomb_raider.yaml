id: tomb_raider
name: Tomb Raider
archetype: criminal
tier: 3
description: "Figured out that dead people tend to have stuff worth stealing. They have no friends and never will, but their collections are remarkable."
key_ability: quickness
hit_points_per_level: 8
proficiencies:
  simple_weapons: trained
  light_armor: trained
  toughness: trained
  hustle: trained
  cool: trained

skills:
  fixed:
    - scavenging
    - ghosting
  choices:
    count: 2
    pool:
      - wasteland
      - parkour
      - grift
      - intel
feats:
  general_count: 1
  fixed:
    - trap_eye
  choices:
    pool: [quick_dodge, tumble_behind]
    count: 1

class_features:
  - sucker_punch
  - slippery
  - trap_sense
drawbacks:
