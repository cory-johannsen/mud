id: politician
name: Politician
archetype: influencer
tier: 2
description: "Operates through cunning and influence. Portland's collapse didn't kill politics — it just made the stakes more obvious."
key_ability: flair
hit_points_per_level: 8
proficiencies:
  simple_weapons: trained
  light_armor: trained
  toughness: trained
  hustle: trained
  cool: trained

skills:
  fixed:
    - rep
    - factions
  choices:
    count: 2
    pool:
      - smooth_talk
      - hustle
      - intel
      - conspiracy
feats:
  general_count: 1
  fixed:
    - crowd_performer
  choices:
    pool: [sustained_presence, reach_influence]
    count: 1

class_features:
  - command_attention
  - fast_talk
  - plausible_deniability

technology_grants:
  spontaneous:
    pool:
      - { id: read_the_air_neural, level: 1 }
      - { id: message_rune_neural, level: 1 }
      - { id: musical_accompaniment_neural, level: 1 }
drawbacks:
  - id: public_record
    type: passive
    description: "Everything you've ever said can be weaponized against you. Enemies have receipts and the willingness to use them at the worst possible moment."
  - id: constituent_pressure
    type: situational
    trigger: on_fail_skill_check
    effect_condition_id: demoralized
    duration: "30m0s"
    description: "A public stumble chips away at the façade. You feel the support eroding in real-time."
