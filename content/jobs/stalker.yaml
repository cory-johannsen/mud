id: stalker
name: Stalker
archetype: drifter
tier: 3
description: "Specialize in obsessively tracking down and capturing or killing their prey. Portland's ruins are excellent hunting grounds."
key_ability: grit
hit_points_per_level: 10
proficiencies:
  simple_weapons: trained
  simple_ranged: trained
  light_armor: trained
  toughness: trained
  hustle: trained
  cool: trained

skills:
  fixed:
    - ghosting
    - wasteland
  choices:
    count: 2
    pool:
      - parkour
      - hard_look
      - intel
      - scavenging
feats:
  general_count: 1
  fixed:
    - mark_target
  choices:
    pool: [known_weakness, rapid_shot]
    count: 1

class_features:
  - predators_eye
  - zone_awareness
  - shadow_step

technology_grants:
  prepared:
    pool:
      - id: vanishing_tracks
        level: 1
      - id: bio_scent_trail_marker
        level: 1
      - id: bio_sentinel_trigger
        level: 1
drawbacks:
  - id: fixation_spiral
    type: passive
    description: "You don't let go. Once a target is in your head, they stay there — even if the mission ends or the job changes. It clouds your judgment in ways you don't notice."
  - id: shadow_paranoia
    type: situational
    trigger: on_enter_room_danger_level
    effect_condition_id: frightened
    duration: "30m0s"
    description: "High-danger spaces trigger the part of you that knows exactly what follows a mark into a kill zone."
