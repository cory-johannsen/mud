id: driver
name: Driver
archetype: drifter
tier: 2
description: "The best some can achieve is to operate a vehicle. The Driver is that person — and they're very, very good at it."
key_ability: savvy
hit_points_per_level: 8
proficiencies:
  simple_weapons: trained
  simple_ranged: trained
  light_armor: trained
  toughness: trained
  hustle: trained
  cool: trained

skills:
