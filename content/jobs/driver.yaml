    - parkour
    - tech_lore
  choices:
    count: 2
    pool:
      - muscle
      - scavenging
      - ghosting
      - rigging
feats:
  general_count: 1
  fixed:
    - defensive_stance
  choices:
    pool: [dirty_strike, read_the_room]
    count: 1

class_features:
  - street_tough
  - resilience
  - defensive_driving

technology_grants:
  prepared:
    pool:
      - id: bio_slipstream_organ
        level: 1
      - id: hydro_pressure_organ
        level: 1
      - id: hydro_pressure_gland
        level: 1
drawbacks:
