id: scout
name: Scout
archetype: drifter
tier: 2
description: "The expendable masses deployed into the streets to collect information before anyone risks their more valuable assets. Scouts know this and do it anyway."
key_ability: grit
hit_points_per_level: 10
proficiencies:
  simple_weapons: trained
  martial_ranged: trained
  simple_ranged: trained
  light_armor: trained
  toughness: trained
  hustle: trained
  cool: trained

skills:
  fixed:
    - ghosting
    - wasteland
  choices:
    count: 2
    pool:
      - parkour
      - intel
      - scavenging
      - hard_look
feats:
  general_count: 1
  fixed:
    - rapid_shot
  choices:
    pool: [mark_target, field_study]
    count: 1

class_features:
  - predators_eye
  - zone_awareness
  - dead_reckoning

technology_grants:
  prepared:
    pool:
      - id: bio_scent_trail_marker
        level: 1
      - id: chemical_census_sweep
        level: 1
      - id: bio_morph_shrink
        level: 1
drawbacks:
  - id: alone_out_there
    type: passive
    description: "You work best alone and trust slowly. In a team that needs coordination, your instinct to go solo creates gaps that get people killed."
  - id: perimeter_anxiety
    type: situational
    trigger: on_enter_room_danger_level
    effect_condition_id: frightened
    duration: "30m0s"
    description: "Moving into a hot zone without recon raises every alarm in your body. You've seen what happens to scouts who move blind."
