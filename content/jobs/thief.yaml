id: thief
name: Thief
archetype: criminal
tier: 2
description: "A Thief pursues their goals through acquisition, preferably without anyone noticing. Portland's ruins are full of unguarded treasures."
key_ability: quickness
hit_points_per_level: 8
proficiencies:
  simple_weapons: trained
  simple_ranged: trained
  light_armor: trained
  toughness: trained
  hustle: expert
  cool: trained

skills:
  fixed:
    - grift
    - ghosting
  choices:
    count: 2
    pool:
      - parkour
      - hustle
      - scavenging
      - tech_lore
feats:
  general_count: 1
  fixed:
    - quick_dodge
  choices:
    pool: [plant_evidence, twin_strike]
    count: 1

class_features:
  - sucker_punch
  - slippery
  - five_finger_discount
drawbacks:
