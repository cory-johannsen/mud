id: illusionist
name: Illusionist
archetype: schemer
tier: 2
description: "Masters of deception and trickery. They use their skills to manipulate the perceptions of others. Portland's ruined carnival folk."
key_ability: grit
hit_points_per_level: 10
proficiencies:
  simple_weapons: trained
  light_armor: trained
  toughness: trained
  hustle: trained
  cool: trained

skills:
  fixed:
    - grift
    - smooth_talk
  choices:
    count: 2
    pool:
      - hustle
      - ghosting
      - rep
      - parkour
feats:
  general_count: 1
  fixed:
    - mark_target
  choices:
    pool: [share_intel, field_study]
    count: 1

class_features:
  - predators_eye
  - zone_awareness
  - misdirection

technology_grants:
  prepared:
    pool:
      - { id: sensory_projection, level: 1 }
      - { id: psi_object_hologram, level: 1 }
      - { id: phantom_pain, level: 1 }
drawbacks:
  - id: smoke_and_mirrors
    type: passive
    description: "Your whole reputation rests on the trick. When people figure out the mechanism, they don't just disbelieve the illusion — they disbelieve you."
  - id: performance_anxiety
    type: situational
    trigger: on_fail_skill_check
    effect_condition_id: demoralized
    duration: "30m0s"
    description: "A failed trick doesn't just embarrass you — it collapses the entire persona you've built."
