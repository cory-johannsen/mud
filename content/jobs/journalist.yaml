id: journalist
name: Journalist
archetype: nerd
tier: 2
description: "Uses the power of the printed word to influence the masses. Post-collapse Portland still has a press — barely."
key_ability: reasoning
hit_points_per_level: 6
proficiencies:
  simple_weapons: trained
  light_armor: trained
  toughness: trained
  hustle: trained
  cool: trained

skills:
  fixed:
    - intel
    - smooth_talk
  choices:
    count: 2
    pool:
      - factions
      - hustle
      - conspiracy
      - rep
feats:
  general_count: 1
  fixed:
    - research_focus
  choices:
    pool: [field_identify, tamper]
    count: 1

class_features:
  - daily_prep
  - formulaic_mind
  - embedded

technology_grants:
