domain:
  id: outlet_scavenger_combat
  description: Combat behavior for outlet_scavenger. Cautious; uses ability when not outnumbered.

  tasks:
    - id: behave
      description: Root task — fight cautiously or pass
    - id: cautious_fight
      description: Fight only when not outnumbered

  methods:
    - task: behave
      id: cautious_combat
      precondition: outlet_scavenger_has_enemy
      subtasks: [cautious_fight]

    - task: behave
      id: idle
      precondition: ""
      subtasks: [do_pass]

    - task: cautious_fight
      id: fight_with_ability
      precondition: outlet_scavenger_not_outnumbered
      subtasks: [attack_enemy, outlet_scav_confuse]

    - task: cautious_fight
      id: flee_if_outnumbered
      precondition: ""
      subtasks: [do_pass]

  operators:
    - id: attack_enemy
      action: attack
      target: nearest_enemy

    - id: do_pass
      action: pass
      target: ""

    - id: outlet_scav_confuse
      action: apply_mental_state
      track: delirium
      severity: mild
      target: nearest_enemy
      cooldown_rounds: 4
      ap_cost: 1
