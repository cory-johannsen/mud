domain:
  id: brew_warlord_combat
  description: Combat behavior for brew_warlord. Attacks and can trigger rage conditions.

  tasks:
    - id: behave
      description: Root task — fight or idle
    - id: fight
      description: Engage enemy, potentially using ability

  methods:
    - task: behave
      id: combat_mode
      precondition: brew_warlord_has_enemy
      subtasks: [fight]

    - task: behave
      id: idle_mode
      precondition: ""
      subtasks: [do_pass]

    - task: fight
      id: strike_and_ability
      precondition: brew_warlord_enemy_below_half
      subtasks: [strike_enemy, warlord_enrage]

    - task: fight
      id: attack_and_ability
      precondition: brew_warlord_has_enemy
      subtasks: [attack_enemy, warlord_enrage]

    - task: fight
      id: attack_only
      precondition: ""
      subtasks: [attack_enemy]

  operators:
    - id: attack_enemy
      action: attack
      target: nearest_enemy

    - id: strike_enemy
      action: strike
      target: weakest_enemy

    - id: do_pass
      action: pass
      target: ""

    - id: warlord_enrage
      action: apply_mental_state
      track: rage
      severity: moderate
      target: highest_damage_enemy
      cooldown_rounds: 4
      ap_cost: 2
