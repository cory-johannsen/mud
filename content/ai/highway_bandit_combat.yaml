domain:
  id: highway_bandit_combat
  description: Combat behavior for highway_bandit. Cautious; uses ability when not outnumbered.

  tasks:
    - id: behave
      description: Root task — fight cautiously or pass
    - id: cautious_fight
      description: Fight only when not outnumbered

  methods:
    - task: behave
      id: cautious_combat
      precondition: highway_bandit_has_enemy
      subtasks: [cautious_fight]

    - task: behave
      id: greet_mode
      native_precondition: "player_entered_room"
      subtasks: [say_taunt]

    - task: behave
      id: idle
      precondition: ""
      subtasks: [do_pass]

    - task: cautious_fight
      id: fight_with_ability
      precondition: highway_bandit_not_outnumbered
      subtasks: [attack_enemy, bandit_intimidate]

    - task: cautious_fight
      id: flee_if_outnumbered
      precondition: ""
      subtasks: [do_pass]

  operators:
    - id: attack_enemy
      action: attack
      target: nearest_enemy

    - id: do_pass
      action: pass
      target: ""

    - id: bandit_intimidate
      action: apply_mental_state
      track: despair
      severity: mild
      target: nearest_enemy
      cooldown_rounds: 3
      ap_cost: 1

    - id: say_taunt
      action: say
      cooldown: "45s"
      strings:
        - "Empty your pockets and nobody gets hurt."
        - "Another traveler. How generous of you."
        - "You picked the wrong road today."
