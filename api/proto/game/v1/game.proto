// UncoverRequest asks the server to drop the player's current cover condition.
message UncoverRequest {}

// RestRequest asks the server to rest the player and rearrange prepared technology slots.
message RestRequest {}

// SelectTechRequest asks the server to interactively assign pending technology grants.
message SelectTechRequest {}

// AidRequest asks the server to queue an Aid action targeting the named ally.
message AidRequest {
  string target = 1;
}

// DisarmTrapRequest asks the server to attempt to disarm a detected trap by name.
message DisarmTrapRequest {
  // trap_name is the trap name as shown at detection time.
  string trap_name = 1;
}

// ReadyRequest asks the server to ready a reaction with the given action and trigger.
message ReadyRequest {
  string action = 1;   // "strike" | "step" | "shield"
  string trigger = 2;  // "enters" | "attacks" | "ally"
}

// BrowseRequest lists a merchant's inventory with current prices and stock.
message BrowseRequest {
  string npc_name = 1;
}

// BuyRequest purchases an item from a merchant.
message BuyRequest {
  string npc_name = 1;
  string item_id  = 2;
  int32  quantity = 3;
}

// SellRequest sells an item to a merchant.
message SellRequest {
  string npc_name = 1;
  string item_id  = 2;
  int32  quantity = 3;
}

// NegotiateRequest attempts a skill check to earn a session-scoped price modifier.
message NegotiateRequest {
  string npc_name = 1;
  // skill is "smooth_talk" or "grift". Defaults to "smooth_talk" if empty.
  string skill    = 2;
}

// StashDepositRequest deposits carried credits into the global stash.
message StashDepositRequest {
  string npc_name = 1;
  int32  amount   = 2;
}

// StashWithdrawRequest withdraws from the global stash to carried credits.
message StashWithdrawRequest {
  string npc_name = 1;
  int32  amount   = 2;
}

// StashBalanceRequest queries stash balance and current exchange rate.
message StashBalanceRequest {
  string npc_name = 1;
}

// HealRequest asks the healer NPC to fully restore the player's HP.
message HealRequest {
  string npc_name = 1; // name of the healer NPC to address
}

// HealAmountRequest asks the healer NPC to restore a specific number of HP.
message HealAmountRequest {
  string npc_name = 1;
  int32  amount   = 2;
}

// TrainJobRequest asks a job trainer NPC to train the player in a job.
message TrainJobRequest {
  string npc_name = 1;
  string job_id   = 2;
}

// TrainTechRequest asks a tech trainer NPC to teach the player a technology.
// If tech_id is empty, the server returns a list of learnable options (list mode).
message TrainTechRequest {
  string npc_name = 1;
  string tech_id  = 2;  // empty = list mode
}

// ListJobsRequest asks the server to list all jobs held by the player.
message ListJobsRequest {}

// SetJobRequest asks the server to change the player's active job.
// REQ-NPC-17: available from any room.
message SetJobRequest {
  string job_id = 1;
}

// HireRequest asks the server to hire a hireling NPC by name.
message HireRequest {
  string npc_name = 1;
}

// DismissRequest asks the server to dismiss the player's current hireling.
message DismissRequest {}

// TalkRequest initiates a conversation with a quest giver NPC.
message TalkRequest {
  string npc_name = 1;  // case-insensitive prefix matched against NPC name in room
  string args     = 2;  // optional subcommand args, e.g. "accept <questID>"
}

// BribeRequest asks the server to initiate a bribe with an optional target NPC name.
message BribeRequest {
  string npc_name = 1;  // optional; required when multiple bribeable NPCs present
}

// BribeConfirmRequest confirms a pending bribe after reviewing the cost.
message BribeConfirmRequest {}

// SurrenderRequest asks the server to surrender to law enforcement in the current room.
message SurrenderRequest {}

// ReleaseRequest asks the server to release a detained player (law enforcement only).
message ReleaseRequest {
  string player_name = 1;  // name of detained player to release
}

// DeployTrapRequest asks the server to arm a trap item at the player's current position.
message DeployTrapRequest {
  // item_name is the consumable trap item to deploy.
  string item_name = 1;
}

// TravelRequest asks the server to fast-travel the player to the named zone.
message TravelRequest {
    string zone_id = 1;
}

// ActivateItemRequest asks the server to activate an item in the player's inventory.
message ActivateItemRequest {
  string item_query = 1;
}

// ServerEvent wraps all server-to-client events.
message ServerEvent {
  string request_id = 1;
  oneof payload {
    RoomView room_view = 2;
    MessageEvent message = 3;
    RoomEvent room_event = 4;
    PlayerList player_list = 5;
    ExitList exit_list = 6;
    ErrorEvent error = 7;
    Disconnected disconnected = 8;
    CharacterInfo character_info = 9;
    NpcView npc_view = 10;
    CombatEvent combat_event = 11;
    RoundStartEvent round_start = 12;
    RoundEndEvent   round_end   = 13;
    ConditionEvent  condition_event = 14;
    InventoryView inventory_view = 15;
    TimeOfDayEvent time_of_day = 16;
    CharacterSheetView character_sheet = 17;
    MapResponse        map             = 18;
    SkillsResponse     skills_response = 19;
    FeatsResponse      feats_response   = 20;
    InteractResponse     interact_response      = 21;
    UseResponse          use_response           = 22;
    ClassFeaturesResponse class_features_response = 23;
    ProficienciesResponse proficiencies_response = 24;
    HpUpdateEvent         hp_update              = 25;
    TabCompleteResponse   tab_complete           = 26;
    CraftResultEvent      craft_result           = 27;
    HotbarUpdateEvent    hotbar_update          = 28;
    ShopView             shop_view              = 29;
    HealerView           healer_view            = 30;
    TrainerView          trainer_view           = 31;
    WeatherEvent         weather                = 32;
    LoadoutView          loadout_view           = 33;
    FixerView            fixer_view             = 34;
    JobGrantsResponse    job_grants_response    = 35;
    RestView             rest_view              = 36;
    APUpdateEvent        ap_update              = 37;
    QuestGiverView       quest_giver_view       = 38;
    QuestLogView         quest_log_view         = 39;
    QuestCompleteEvent   quest_complete          = 40;
    TechTrainerView      tech_trainer_view       = 41;
  }
}

// ShopItem represents a single item row in a merchant's shop listing.
message ShopItem {
  string name       = 1;
  string item_id    = 2;
  int32  buy_price  = 3;
  int32  sell_price = 4;
  int32  stock      = 5;
  // Item metadata for stat display and equipped comparison.
  string kind             = 6;   // weapon | armor | consumable | etc.
  string description      = 7;
  // Weapon stats (populated when kind == "weapon").
  string weapon_damage      = 8;
  string weapon_damage_type = 9;
  int32  weapon_range       = 10;  // 0 = melee, >0 = ranged feet
  repeated string weapon_traits = 11;
  // Armor stats (populated when kind == "armor").
  int32  armor_ac_bonus        = 12;
  string armor_slot            = 13;
  int32  armor_check_penalty   = 14;
  int32  armor_speed_penalty   = 15;
  string armor_prof_category   = 16;
  // Consumable stats (populated when kind == "consumable").
  string effects_summary       = 17;
}

// ShopView delivers structured merchant inventory in response to BrowseRequest.
message ShopView {
  string npc_name = 1;
  repeated ShopItem items = 2;
}

// HpUpdateEvent delivers a lightweight HP update to refresh the prompt bar.
// No console text is displayed; only the prompt is redrawn.
message HpUpdateEvent {
  int32 current_hp       = 1;
  int32 max_hp           = 2;
  int32 focus_points     = 3; // current focus point pool
  int32 max_focus_points = 4; // maximum focus points
}

// JoinWorldRequest is sent by the client to enter the game world after authentication.
message JoinWorldRequest {
  string uid = 1;
  string username = 2;
  int64  character_id   = 3;
  string character_name = 4;
  int32  current_hp     = 5;
  string location       = 6;
  string role           = 7;
  string region_display = 8;
  string class          = 9;
  int32  level          = 10;
  string archetype      = 11;
  // headless indicates the session is driven by an automated client (e.g. e2e tests).
  // When true, the server must auto-select the first valid option for all interactive
  // prompts rather than blocking on stream.Recv().
  bool   headless       = 12;
}

// MoveRequest asks the server to move the player in the given direction.
message MoveRequest {
  string direction = 1;
}

// LookRequest asks the server for the current room description.
message LookRequest {}

// SayRequest sends a chat message to all players in the same room.
message SayRequest {
  string message = 1;
}

// EmoteRequest sends an emote action to all players in the same room.
message EmoteRequest {
  string action = 1;
}

// WhoRequest asks for the list of players in the current room.
message WhoRequest {}

// ExitsRequest asks for the list of exits from the current room.
message ExitsRequest {}

// QuitRequest signals the client wants to disconnect.
message QuitRequest {}

// SwitchCharacterRequest asks the server to save and remove the current character
// so the player can select a different character without disconnecting.
message SwitchCharacterRequest {}

// RoomView describes the player's current room.
message RoomView {
  string room_id = 1;
  string title = 2;
  string description = 3;
  repeated ExitInfo exits = 4;
  repeated string players = 5;
  repeated NpcInfo npcs = 6;
  repeated ConditionInfo active_conditions = 7;
  repeated FloorItem floor_items = 8;
  int32  hour   = 9;
  string period = 10;
  repeated RoomEquipmentItem equipment = 11;
  string zone_name = 12;
}

// ExitInfo describes a single exit from a room.
message ExitInfo {
  string direction = 1;
  string target_room_id = 2;
  bool locked = 3;
  bool hidden = 4;
  string target_title = 5;
}

// MessageEvent delivers a chat message or emote from another player.
message MessageEvent {
  string sender = 1;
  string content = 2;
  MessageType type = 3;
}

// MessageType distinguishes between say and emote messages.
enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_SAY = 1;
  MESSAGE_TYPE_EMOTE = 2;
}

// RoomEvent notifies about player arrivals and departures.
message RoomEvent {
  string player = 1;
  RoomEventType type = 2;
  string direction = 3;
}

// RoomEventType distinguishes arrival from departure.
enum RoomEventType {
  ROOM_EVENT_TYPE_UNSPECIFIED = 0;
  ROOM_EVENT_TYPE_ARRIVE = 1;
  ROOM_EVENT_TYPE_DEPART = 2;
}

// PlayerList contains the players in the current room.
message PlayerList {
  string              room_title = 1;
  repeated PlayerInfo players    = 2;
}

// CombatStatus describes a player's current combat state.
enum CombatStatus {
    COMBAT_STATUS_UNSPECIFIED = 0;
    COMBAT_STATUS_IDLE        = 1;
    COMBAT_STATUS_IN_COMBAT   = 2;
    COMBAT_STATUS_RESTING     = 3;
    COMBAT_STATUS_UNCONSCIOUS = 4;
}

// PlayerInfo carries per-player detail for the who command.
message PlayerInfo {
    string       name         = 1;
    int32        level        = 2;
    string       job          = 3;
    string       health_label = 4;
    CombatStatus status       = 5;
}

// ExitList contains the exits from the current room.
message ExitList {
  repeated ExitInfo exits = 1;
}

// ErrorEvent delivers an error message to the client.
message ErrorEvent {
  string message = 1;
}

// Disconnected signals the server is closing the session.
message Disconnected {
  string reason = 1;
}

// TimeOfDayEvent is broadcast to all sessions when the game hour advances.
message TimeOfDayEvent {
  int32  hour   = 1;
  string period = 2;
  int32  day    = 3;
  int32  month  = 4;
}

// CharacterInfo is sent to the client on session join to display character stats.
message CharacterInfo {
  int64  character_id  = 1;
  string name          = 2;
  string region        = 3;
  string class         = 4;
  int32  level         = 5;
  int32  experience    = 6;
  int32  max_hp        = 7;
  int32  current_hp    = 8;
  int32  brutality     = 9;
  int32  quickness     = 10;
  int32  grit          = 11;
  int32  reasoning     = 12;
  int32  savvy         = 13;
  int32  flair         = 14;
}

// NpcInfo summarises an NPC visible in the room.
message NpcInfo {
  string instance_id         = 1;
  string name                = 2;
  string health_description  = 3;
  string fighting_target     = 4; // name of the player this NPC is currently fighting; empty if not in combat
  repeated string conditions = 5; // display names of active conditions (empty when not in combat or no conditions)
  string npc_type            = 6; // NPC type for non-combat NPCs (merchant, healer, etc.); empty for combat NPCs
  string tradition           = 7; // tech tradition for tech_trainer NPCs; empty for all other NPC types
}

// ExamineRequest asks the server for detail on a named target.
message ExamineRequest {
  string target = 1;
}

// NpcView delivers detailed NPC information in response to examine.
message NpcView {
  string instance_id        = 1;
  string name               = 2;
  string description        = 3;
  string health_description = 4;
  int32  level              = 5;
  string npc_type           = 6;
}

// HealerView delivers structured healer NPC information in response to examine.
message HealerView {
  string npc_name           = 1;
  string description        = 2;
  int32  price_per_hp       = 3;
  int32  missing_hp         = 4;
  int32  full_heal_cost     = 5;
  int32  capacity_remaining = 6;
  int32  player_currency    = 7;
  int32  current_hp         = 8;
  int32  max_hp             = 9;
}

// JobOfferEntry represents a single job offered by a trainer.
message JobOfferEntry {
  string job_id             = 1;
  string job_name           = 2;
  int32  training_cost      = 3;
  bool   available          = 4;
  string unavailable_reason = 5;
  bool   already_trained    = 6;
}

// TrainerView delivers structured trainer NPC information in response to examine.
message TrainerView {
  string npc_name             = 1;
  string description          = 2;
  repeated JobOfferEntry jobs = 3;
  int32  player_currency      = 4;
}

// TechTrainerView lists technologies available from a tech trainer NPC.
message TechTrainerView {
  string npc_name                = 1;
  string tradition               = 2;
  repeated TechOfferEntry offers = 3;
  int32  player_currency         = 4;
}

// TechOfferEntry describes one learnable technology at a tech trainer.
message TechOfferEntry {
  string tech_id      = 1;
  string tech_name    = 2;
  string description  = 3;
  int32  cost         = 4;
  int32  tech_level   = 5;
}

// FixerView delivers structured fixer NPC information in response to examine.
// bribe_costs maps wanted level (1–4) to the computed bribe cost in credits.
message FixerView {
  string npc_name           = 1;
  string description        = 2;
  int32  current_wanted     = 3;
  int32  max_wanted         = 4;
  int32  player_currency    = 5;
  map<int32, int32> bribe_costs = 6;
}

// RestView delivers structured motel/brothel NPC information in response to examine.
// Returned for motel_keeper and brothel_keeper NPC types.
message RestView {
  string npc_name        = 1;
  string description     = 2;
  string npc_type        = 3; // "motel_keeper" or "brothel_keeper"
  int32  rest_cost       = 4;
  int32  player_currency = 5;
  int32  current_hp      = 6;
  int32  max_hp          = 7;
}

// AttackRequest asks the server to attack a named target.
message AttackRequest {
  string target = 1;
}

// FleeRequest asks the server to attempt to flee combat.
message FleeRequest {}

// PassRequest forfeits the player's remaining action points for the current round.
message PassRequest {}

// StrikeRequest queues a 2-AP full attack routine (two attacks with MAP) against a target.
message StrikeRequest {
  string target = 1;
}

// EquipRequest asks the server to equip a weapon in the specified slot.
message EquipRequest {
  string weapon_id = 1;
  string slot = 2; // "main" or "off"
  int32 preset = 3; // 1-based preset index (0 = active preset)
}

// ReloadRequest asks the server to reload the specified weapon, or the primary slot if empty.
message ReloadRequest {
  string weapon_id = 1; // empty = reload primary slot
}

// FireBurstRequest asks the server to fire a burst at the specified target.
message FireBurstRequest {
  string target = 1;
  string weapon_id = 2;
}

// FireAutomaticRequest asks the server to fire automatically at the specified target.
message FireAutomaticRequest {
  string target = 1;
  string weapon_id = 2;
}

// ThrowRequest asks the server to throw an explosive.
message ThrowRequest {
  string explosive_id = 1;
}

// InventoryRequest asks the server for the player's backpack contents and currency.
message InventoryRequest {}

// GetItemRequest asks the server to pick up an item from the room floor.
message GetItemRequest {
  string target = 1; // item name or "all"
}

// DropItemRequest asks the server to drop an item from the backpack.
message DropItemRequest {
  string target = 1; // item name
}

// BalanceRequest asks the server for the player's currency.
message BalanceRequest {}

// SetRoleRequest asks the server to change a player's privilege level.
message SetRoleRequest {
  string target_username = 1;
  string role = 2;
}

// LoadoutRequest displays or swaps the player's weapon presets.
// If arg is empty, the server returns the current loadout display.
message LoadoutRequest {
  string arg = 1;
}

// LoadoutWeaponPreset describes one weapon preset (main-hand + off-hand).
message LoadoutWeaponPreset {
  string main_hand       = 1; // name of main-hand weapon, or "" if empty
  string off_hand        = 2; // name of off-hand weapon, or "" if empty
  string main_hand_damage = 3; // e.g. "1d8+3", or "" if no weapon
  string off_hand_damage  = 4; // e.g. "1d6+1", or "" if no weapon
}

// LoadoutView delivers the player's full weapon loadout state.
// Field 33 of ServerEvent.payload.
message LoadoutView {
  repeated LoadoutWeaponPreset presets = 1; // all available weapon presets
  int32 active_index                  = 2; // 0-based index of active preset
}

// QuestObjectiveView describes one objective within a quest entry.
message QuestObjectiveView {
  string id          = 1;
  string description = 2;
  int32  current     = 3; // current progress
  int32  required    = 4; // total required
}

// QuestEntryView describes a single quest as shown in the quest giver modal.
message QuestEntryView {
  string quest_id             = 1;
  string title                = 2;
  string description          = 3;
  int32  xp_reward            = 4;
  int32  credits_reward       = 5;
  repeated QuestObjectiveView objectives = 6;
  string status               = 7; // "available" | "active" | "completed" | "locked"
}

// QuestGiverView delivers all quests offered by a quest giver NPC.
// Field 38 of ServerEvent.payload.
message QuestGiverView {
  string npc_name             = 1;
  string npc_instance_id      = 2;
  repeated QuestEntryView quests = 3;
}

// QuestLogView delivers the player's active quest list.
// Field 39 of ServerEvent.payload.
message QuestLogView {
  repeated QuestEntryView quests = 1;
}

// QuestCompleteEvent is pushed to the player when a quest is completed and rewards are granted.
// Field 40 of ServerEvent.payload.
message QuestCompleteEvent {
  string quest_id      = 1;
  string title         = 2;
  int32  xp_reward     = 3;
  int32  credits_reward = 4;
  repeated string item_rewards = 5; // human-readable item reward strings (e.g. "Combat Stims x2")
}

// QuestLogRequest asks the server for the player's current quest log.
message QuestLogRequest {}

// UnequipRequest removes the item in the named slot and returns it to the backpack.
message UnequipRequest {
  string slot = 1;
}

// EquipmentRequest asks the server to display all equipped items.
message EquipmentRequest {}

// TeleportRequest asks the server to teleport a player to a specific room.
message TeleportRequest {
  string target_character = 1;
  string room_id = 2;
}

// SummonItemRequest asks the server to spawn an item directly into the player's inventory (admin only).
message SummonItemRequest {
  string item_id = 1;
  int32 quantity = 2;
}

// FloorItem describes an item on the room floor.
message FloorItem {
  string instance_id = 1;
  string name = 2;
  int32 quantity = 3;
}

// RoomEquipmentItem describes a permanent or respawning item in a room.
message RoomEquipmentItem {
    string instance_id = 1;
    string name        = 2;
    int32  quantity    = 3;
    bool   immovable   = 4;
    bool   usable      = 5;
    string cover_tier  = 6; // "lesser", "standard", "greater", or "" (not cover)
}

// UseEquipmentRequest asks the server to use a room equipment item.
message UseEquipmentRequest {
    string instance_id = 1;
}

// MapRequest is sent by the client to view the automap.
message MapRequest {
    string view = 1; // "zone" (default) | "world"
}

// PoiWithNpc pairs a POI type ID with the name of the NPC that provides it.
message PoiWithNpc {
    string poi_id   = 1; // e.g. "merchant", "healer", "guard"
    string npc_name = 2; // NPC display name e.g. "Sgt. Mack"
}

// ZoneExitInfo describes a zone-crossing exit from a map tile.
message ZoneExitInfo {
    string direction       = 1; // compass direction of the exit, e.g. "north"
    string dest_zone_id    = 2; // destination zone ID
    string dest_zone_name  = 3; // destination zone display name (may be empty if undiscovered)
}

// SameZoneExitTarget maps a compass direction to the target room ID for same-zone connections.
message SameZoneExitTarget {
    string direction      = 1; // compass direction of the exit, e.g. "north"
    string target_room_id = 2; // room ID of the destination (within the same zone)
}

// MapTile represents one discovered room on the automap grid.
message MapTile {
    string room_id   = 1;
    string room_name = 2;
    int32  x         = 3;
    int32  y         = 4;
    bool   current   = 5;
    repeated string exits = 6;
    string danger_level  = 7;
    repeated string pois = 8; // POI type IDs present in this room e.g. ["merchant", "equipment"]
    bool   boss_room     = 9; // true when this room is a boss arena (REQ-AE-24)
    repeated PoiWithNpc poi_npcs = 10; // NPC-backed POIs with display names; non-NPC POIs (equipment, map, cover) are absent. Every poi_id here appears in pois.
    repeated ZoneExitInfo zone_exits = 11; // zone-crossing exits from this room
    repeated SameZoneExitTarget same_zone_exit_targets = 12; // same-zone exits with target room IDs for connector rendering
}

// WorldZoneTile represents one zone on the world map.
message WorldZoneTile {
    string zone_id      = 1;
    string zone_name    = 2;
    int32  world_x      = 3;
    int32  world_y      = 4;
    bool   discovered   = 5;
    bool   current      = 6;
    string danger_level = 7;
    string level_range  = 8;
    bool   enemy        = 9; // true if this zone is enemy territory for the current player's team
    string description  = 10; // zone flavor text shown in hover tooltip
}

// MapResponse is returned by the server with discovered tiles for the current zone
// and/or world map zone tiles.
message MapResponse {
    repeated MapTile       tiles       = 1;
    repeated WorldZoneTile world_tiles = 2;
}

// SkillsRequest is sent by the client to view skill proficiencies.
message SkillsRequest {}

// SkillEntry represents one skill with its proficiency rank.
message SkillEntry {
  string skill_id     = 1;
  string name         = 2;
  string ability      = 3;
  string proficiency  = 4;
  int32  bonus        = 5;
  string description  = 6;
}

// SkillsResponse contains all skill entries for the character.
message SkillsResponse {
  repeated SkillEntry skills = 1;
}

// RoomEquipRequest asks the server to manage room equipment (editor command).
message RoomEquipRequest {
    string sub_command = 1;
    string item_id     = 2;
    int32  max_count   = 3;
    string respawn     = 4;
    bool   immovable   = 5;
    string script      = 6;
}

// InventoryItem describes an item in the player's backpack.
message InventoryItem {
  string instance_id = 1;
  string name = 2;
  string kind = 3;
  int32 quantity = 4;
  double weight = 5;
  string item_def_id = 6;  // ItemDef ID used by equip/wear commands
  string armor_slot     = 7;   // ArmorDef.Slot (head/torso/etc.) when kind == "armor"
  string armor_category = 8;   // "light", "medium", or "heavy" when kind == "armor"
  // Consumable stats (populated when kind == "consumable").
  string effects_summary = 9;
  bool   throwable       = 10;  // true when item has "throwable" tag
}

// InventoryView shows the player's backpack and currency.
message InventoryView {
  repeated InventoryItem items = 1;
  int32 used_slots = 2;
  int32 max_slots = 3;
  double total_weight = 4;
  double max_weight = 5;
  string currency = 6;
  int32 total_crypto = 7;
}

// CombatantPosition carries a combatant's name and 2D grid coordinates.
message CombatantPosition {
  string name         = 1;
  int32  x            = 2;
  int32  y            = 3;
  int32  ap_remaining = 4; // current remaining action points
  int32  ap_total     = 5; // total action points this round
  int32  hp_current   = 6; // current hit points at round start
  int32  hp_max       = 7; // maximum hit points
}

// CoverObjectPosition describes a cover object placed on the combat grid.
message CoverObjectPosition {
  string item_id    = 1; // equipment item ID
  string name       = 2; // display name (may be empty)
  int32  x          = 3; // grid column (0-based)
  int32  y          = 4; // grid row (0-based)
  string cover_tier = 5; // "lesser", "standard", or "greater"
}

// RoundStartEvent is broadcast to all combatants when a new round begins.
message RoundStartEvent {
  int32                      round             = 1;
  int32                      actions_per_turn  = 2;
  int32                      duration_ms       = 3;
  repeated string            turn_order        = 4;
  repeated CombatantPosition initial_positions = 5;
  int32                      grid_width        = 6;
  int32                      grid_height       = 7;
  repeated CoverObjectPosition cover_objects   = 8;
}

// RoundEndEvent is broadcast when a round's actions have resolved.
message RoundEndEvent {
  int32 round = 1;
}

// APUpdateEvent is broadcast to all room combatants when a combatant's
// action points change mid-round.
message APUpdateEvent {
  string name                  = 1; // combatant display name
  int32  ap_remaining          = 2; // updated remaining action points
  int32  ap_total              = 3; // total action points for this round
  int32  movement_ap_remaining = 4; // how many movement actions (Stride/Step) remain this round; max 2
}

// CombatEvent delivers combat narration to all players in the room.
message CombatEvent {
  CombatEventType type             = 1;
  string attacker                  = 2;
  string target                    = 3;
  int32  attack_roll               = 4;
  int32  attack_total              = 5;
  string outcome                   = 6;
  int32  damage                    = 7;
  int32  target_hp                 = 8;
  string narrative                 = 9;
  string weapon_name               = 10;
  int32  target_max_hp             = 11;
  int32  attacker_position         = 12 [deprecated = true]; // use attacker_x and attacker_y
  int32  attacker_x                = 13;
  int32  attacker_y                = 14;
  bool   flanking                  = 15;
}

// CombatEventType distinguishes combat narration events.
enum CombatEventType {
  COMBAT_EVENT_TYPE_UNSPECIFIED  = 0;
  COMBAT_EVENT_TYPE_INITIATIVE   = 1;
  COMBAT_EVENT_TYPE_ATTACK       = 2;
  COMBAT_EVENT_TYPE_DEATH        = 3;
  COMBAT_EVENT_TYPE_FLEE         = 4;
  COMBAT_EVENT_TYPE_END          = 5;
  COMBAT_EVENT_TYPE_CONDITION    = 6;
  COMBAT_EVENT_TYPE_RELOAD       = 7;
  COMBAT_EVENT_TYPE_THROW        = 8;
  COMBAT_EVENT_TYPE_POSITION     = 9;
}

// StatusRequest asks the server to return the player's active conditions.
message StatusRequest {}

// ConditionEvent reports a condition being applied to or removed from an entity.
message ConditionEvent {
  string target_uid     = 1;
  string target_name    = 2;
  string condition_id   = 3;
  string condition_name = 4;
  int32  stacks         = 5;
  bool   applied        = 6;  // true = applied/advanced, false = removed/expired
}

// WearRequest asks the server to equip an armor item from inventory into a body slot.
message WearRequest {
  string item_id = 1;
  string slot = 2;
}

// RemoveArmorRequest asks the server to remove armor from a body slot, returning it to the backpack.
message RemoveArmorRequest {
  string slot = 1;
}

// ConditionInfo describes one active condition on a combatant.
message ConditionInfo {
  string id                 = 1;
  string name               = 2;
  int32  stacks             = 3;
  int32  duration_remaining = 4;  // -1 = permanent or until_save
  string description        = 5;  // human-readable mechanical effects summary
}

// CharacterSheetRequest asks the server for the player's full character sheet.
message CharacterSheetRequest {}

// ArchetypeSelectionRequest asks the server to assign an archetype to the player's character.
message ArchetypeSelectionRequest {
  string archetype_id = 1;
}

// FeatsRequest is sent by the client to view feat list.
message FeatsRequest {}

// FeatEntry represents one feat with its details.
message FeatEntry {
  string feat_id        = 1;
  string name           = 2;
  string category       = 3;
  bool   active         = 4;
  string description    = 5;
  string activate_text  = 6;
  bool   is_reaction    = 7;
  string armor_category = 8;
  int32  action_cost    = 9;
}

// FeatsResponse contains all feat entries for the character.
message FeatsResponse {
  repeated FeatEntry feats = 1;
}

// ClassFeaturesRequest is sent by the client to view class feature list.
message ClassFeaturesRequest {}

// ClassFeatureEntry represents one class feature with its details.
message ClassFeatureEntry {
    string feature_id    = 1;
    string name          = 2;
    string archetype     = 3;
    string job           = 4;
    bool   active        = 5;
    string description   = 6;
    string activate_text = 7;
}

// ClassFeaturesResponse contains all class feature entries for the character.
message ClassFeaturesResponse {
    repeated ClassFeatureEntry archetype_features = 1;
    repeated ClassFeatureEntry job_features       = 2;
}

// InteractRequest asks the server to interact with a room equipment item by instance ID.
message InteractRequest {
  string instance_id = 1;
}

// InteractResponse carries the result of a room equipment interaction.
message InteractResponse {
  string message = 1;
}

// UseRequest asks the server to activate an active feat.
// An empty feat_id causes the server to return the list of available active feats.
message UseRequest {
  string feat_id  = 1;
  string target   = 2;
  int32  target_x = 3; // 0-based grid column (0–9); -1 means unset / no AoE; ignored unless feat has aoe_radius > 0
  int32  target_y = 4; // 0-based grid row (0–9); -1 means unset / no AoE; ignored unless feat has aoe_radius > 0
}

// UseResponse carries the result of a feat activation or a list of active feats.
message UseResponse {
  string             message = 1;
  repeated FeatEntry choices = 2;
}

// PreparedSlotView represents one prepared technology slot on the character sheet.
message PreparedSlotView {
    string tech_id          = 1;
    bool   expended         = 2;
    string tech_name        = 3;
    string description      = 4;
    string effects_summary  = 5;
    string short_name       = 6;
    int32  tech_level       = 7;
}

// HardwiredSlotView represents one always-available hardwired technology.
message HardwiredSlotView {
    string tech_id          = 1;
    string tech_name        = 2;
    string description      = 3;
    string effects_summary  = 4;
    string short_name       = 5;
    int32  tech_level       = 6;
}

// SpontaneousKnownEntry represents one tech known in the spontaneous pool with its name.
message SpontaneousKnownEntry {
    string tech_id          = 1;
    string tech_name        = 2;
    int32  tech_level       = 3;
    string description      = 4;
    string effects_summary  = 5;
    string short_name       = 6;
}

// CharacterSheetView delivers the player's full character sheet.
message CharacterSheetView {
    string name      = 1;
    string job       = 2;
    string archetype = 3;
    string team      = 4;
    int32  level     = 5;

    int32 brutality  = 6;
    int32 grit       = 7;
    int32 quickness  = 8;
    int32 reasoning  = 9;
    int32 savvy      = 10;
    int32 flair      = 11;

    int32 current_hp    = 12;
    int32 max_hp        = 13;
    int32 ac_bonus      = 14;
    int32 check_penalty = 15;
    int32 speed_penalty = 16;

    string currency = 17;

    map<string, string> armor       = 18;
    map<string, string> accessories = 19;
    string main_hand              = 20;
    string off_hand               = 21;
    string main_hand_attack_bonus = 33; // e.g. "+5" or "—" if no weapon
    string main_hand_damage       = 34; // e.g. "1d8+3" or "—" if no weapon
    string off_hand_attack_bonus  = 35; // e.g. "+3" or "—" if no off-hand weapon
    string off_hand_damage        = 36; // e.g. "1d6+1" or "—" if no off-hand weapon
    int32  total_ac               = 37; // 10 + effective dex mod + sum of armor ac_bonus
    repeated ResistanceEntry player_resistances = 38;
    repeated ResistanceEntry player_weaknesses  = 39;

    repeated SkillEntry        skills         = 22;
    repeated FeatEntry         feats          = 23;
    repeated ClassFeatureEntry class_features = 24;
    repeated ProficiencyEntry  proficiencies  = 25;

    int32 toughness_save = 26; // static bonus: grit_mod + proficiency_bonus
    int32 hustle_save    = 27; // static bonus: quickness_mod + proficiency_bonus
    int32 cool_save      = 28; // static bonus: savvy_mod + proficiency_bonus

    int32 experience     = 29; // current total XP
    int32 xp_to_next     = 30; // XP remaining to reach next level (0 if at level cap)
    int32 pending_boosts          = 31; // number of unassigned ability boosts
    int32 pending_skill_increases = 32; // number of unassigned skill rank increases
    string gender = 40;
    int32  awareness = 41; // static bonus: 10 + savvy_mod + awareness_proficiency_bonus
    int32  hero_points = 42; // current hero point count
    int32  pending_tech_selections = 43; // number of pending technology grant selections
    repeated PreparedSlotView prepared_slots = 44; // prepared technology slots with expended state
    repeated SpontaneousUsePoolView spontaneous_use_pools = 45;
    repeated InnateSlotView innate_slots = 46;
    // active_set_bonuses lists human-readable descriptions of currently active equipment set bonuses (REQ-EM-31).
    repeated string active_set_bonuses = 47;
    int32 focus_points     = 48; // current focus point pool
    int32 max_focus_points = 49; // maximum focus points
    repeated HardwiredSlotView     hardwired_slots     = 50; // always-available hardwired technologies
    repeated SpontaneousKnownEntry spontaneous_known   = 51; // known spontaneous technologies with names
    map<string, string> armor_categories = 52; // slot -> "light"/"medium"/"heavy" for equipped armor
    int32  proficiency_ac_bonus     = 53; // proficiency contribution to AC (applied once per character)
    string effective_armor_category = 54; // heaviest proficient armor category worn
    // Attack bonus breakdown components for equipped weapons (REQ-WEC-71).
    int32  main_hand_ability_bonus = 55; // ability modifier (Brutality) component of main-hand to-hit
    int32  main_hand_prof_bonus    = 56; // proficiency bonus component of main-hand to-hit
    string main_hand_prof_rank     = 57; // proficiency rank string ("untrained"/"trained"/"expert"/"master"/"legendary")
    int32  off_hand_ability_bonus  = 58; // ability modifier component of off-hand to-hit
    int32  off_hand_prof_bonus     = 59; // proficiency bonus component of off-hand to-hit
    string off_hand_prof_rank      = 60; // proficiency rank string for off-hand weapon
    string explore_mode            = 61; // active exploration mode ID (empty string means no active mode)
    string tech_tradition          = 62; // player's technology tradition (e.g. "neural", "technical")
}

// InnateSlotView delivers the per-tech innate use slot state for the character sheet.
message InnateSlotView {
    string tech_id          = 1;
    int32  uses_remaining   = 2;
    int32  max_uses         = 3;
    string tech_name        = 4;
    string description      = 5;
    bool   is_reaction      = 6;
    string effects_summary  = 7;
    string short_name       = 8;
    bool   passive          = 9;
    int32  tech_level       = 10;
}

// SpontaneousUsePoolView delivers the daily use pool for one spontaneous tech level.
message SpontaneousUsePoolView {
    int32 tech_level     = 1;
    int32 uses_remaining = 2;
    int32 max_uses       = 3;
}

// ResistanceEntry represents one player damage-type resistance or weakness.
message ResistanceEntry {
  string damage_type = 1; // e.g. "fire", "piercing"
  int32  value       = 2; // flat amount
}

// ProficienciesRequest is sent by the client to view armor/weapon proficiencies.
message ProficienciesRequest {}

// ProficiencyEntry represents one proficiency category with its rank and bonus.
message ProficiencyEntry {
  string category = 1; // e.g. "light_armor", "simple_weapons"
  string name     = 2; // e.g. "Light Armor", "Simple Weapons"
  string rank     = 3; // "untrained", "trained", etc.
  int32  bonus    = 4; // CombatProficiencyBonus(level, rank)
  string kind     = 5; // "armor" or "weapon"
}

// ProficienciesResponse contains all proficiency entries for the character.
message ProficienciesResponse {
  repeated ProficiencyEntry proficiencies = 1;
}

// LevelUpRequest asks the server to apply a pending ability boost to the named ability.
message LevelUpRequest {
  string ability = 1;
}

// CombatDefaultRequest asks the server to persist the player's preferred default combat action.
message CombatDefaultRequest {
  string action = 1;
}

// TrainSkillRequest asks the server to advance a skill proficiency rank.
message TrainSkillRequest {
  string skill_id = 1;
}

// ActionRequest asks the server to perform a named action against an optional target.
// An empty name causes the server to return the list of available actions.
message ActionRequest {
  string name   = 1; // action ID or shortcut alias; empty means list available actions
  string target = 2; // target NPC name; empty if not required
}

// RaiseShieldRequest asks the server to raise the player's shield.
message RaiseShieldRequest {}

// TakeCoverRequest asks the server to have the player take cover.
message TakeCoverRequest {}

// FirstAidRequest asks the server to apply first aid to the player.
message FirstAidRequest {}

// FeintRequest asks the server to feint against a target NPC.
message FeintRequest {
    string target = 1;
}

// DemoralizeRequest asks the server to demoralize a target NPC.
message DemoralizeRequest {
    string target = 1;
}

// GrappleRequest asks the server to grapple a target NPC.
message GrappleRequest {
    string target = 1;
}

// TripRequest asks the server to trip a target NPC.
message TripRequest {
    string target = 1;
}

// DisarmRequest asks the server to disarm a target NPC.
message DisarmRequest {
    string target = 1;
}

// StrideRequest asks the server to stride toward or away from the current target.
message StrideRequest {
    string direction = 1; // "toward" or "away"
}

// MoveToRequest asks the server to move the player to a specific grid cell.
// The server deducts 1 or 2 movement AP based on distance and fires Reactive Strikes per cell crossed.
// Cells within one stride (speedFt/5) cost 1 AP; cells within two strides cost 2 AP.
message MoveToRequest {
    int32 target_x = 1;
    int32 target_y = 2;
}

// ShoveRequest asks the server to shove a target NPC, pushing them back 5ft (10ft on critical success).
message ShoveRequest {
    string target = 1;
}

// StepRequest asks the server to step 5 ft toward or away from the current target.
// Step does not trigger Reactive Strikes.
message StepRequest {
    string direction = 1; // "toward" or "away"
}

// HideRequest asks the server to attempt to hide the player.
message HideRequest {}

// SneakRequest asks the server to attempt to sneak while hidden.
message SneakRequest {}

// DivertRequest asks the server to create a diversion to hide the player.
message DivertRequest {}

// EscapeRequest asks the server to escape from the grabbed condition.
message EscapeRequest {}

// TumbleRequest asks the server to tumble through the target NPC's space (Acrobatics vs Hustle DC).
message TumbleRequest {
  string target = 1;
}

// SeekRequest asks the server to scan for hidden NPCs (Perception vs NPC Stealth DC).
message SeekRequest {}

// ClimbRequest asks the server to attempt climbing a climbable surface.
message ClimbRequest {
  string direction = 1; // compass direction to climb (e.g. "up", "north")
}

// SwimRequest asks the server to attempt swimming through a water exit.
message SwimRequest {
  string direction = 1; // compass direction to swim (e.g. "north", "east")
}

// CalmRequest asks the server to attempt calming the player's worst active mental state.
message CalmRequest {}

// HeroPointRequest asks the server to spend a hero point.
message HeroPointRequest {
  string subcommand = 1; // "reroll" or "stabilize"
}

// DelayRequest banks remaining AP for next round at cost of -2 AC.
message DelayRequest {}

// JoinRequest asks the server to join active combat in the current room.
message JoinRequest {}

// DeclineRequest asks the server to decline joining active combat.
message DeclineRequest {}

// GroupRequest asks the server to create a group or show group info.
// args is optional; when non-empty it is treated as a player name to invite.
message GroupRequest { string args = 1; }

// InviteRequest asks the server to invite a player to the sender's group.
message InviteRequest { string player = 1; }

// AcceptGroupRequest asks the server to accept a pending group invitation.
message AcceptGroupRequest {}

// DeclineGroupRequest asks the server to decline a pending group invitation.
message DeclineGroupRequest {}

// UngroupRequest asks the server to leave (or disband) the sender's group.
message UngroupRequest {}

// KickRequest asks the server to remove a player from the sender's group.
message KickRequest { string player = 1; }

// MotiveRequest asks the server to read an NPC's intentions (awareness vs Hustle DC).
message MotiveRequest {
  string target = 1;
}

// GrantRequest asks the server to grant XP, money, or an item (editor command).
message GrantRequest {
  string grant_type = 1; // "xp", "money", or "item"
  string char_name  = 2; // target character name; empty = all players in editor's room
  int32  amount     = 3; // amount to grant (must be > 0 for xp/money)
  string item_id    = 4; // item def ID to place on the room floor (grant_type == "item")
}


// SpawnNPCRequest asks the server to spawn one NPC instance from a template.
message SpawnNPCRequest {
  string template_id = 1;
  string room_id     = 2; // empty = editor's current room
}

// KillNPCRequest asks the server to immediately kill an NPC instance (editor command).
message KillNPCRequest {
  string template_id = 1; // template or instance ID to kill; first match in editor's room
}

// AddRoomRequest asks the server to add a new room to a zone.
message AddRoomRequest {
  string zone_id = 1;
  string room_id = 2;
  string title   = 3;
}

// AddLinkRequest asks the server to add a bidirectional exit between two rooms.
message AddLinkRequest {
  string from_room_id = 1;
  string direction    = 2;
  string to_room_id   = 3;
}

// RemoveLinkRequest asks the server to remove a directional exit from a room.
message RemoveLinkRequest {
  string room_id   = 1;
  string direction = 2;
}

// SetRoomRequest asks the server to set a field on the editor's current room.
message SetRoomRequest {
  string field = 1;
  string value = 2;
}

// EditorCmdsRequest asks the server to list all editor commands.
message EditorCmdsRequest {}

// SpawnCharRequest asks the server to create a test character for the claude_player account.
message SpawnCharRequest {
  string name = 1;  // character name to create for the claude_player account
}

// DeleteCharRequest asks the server to delete a character by name from the claude_player account.
message DeleteCharRequest {
  string name = 1;  // character name to delete (must belong to claude_player account)
}

// FactionRequest asks the server for the player's current faction, tier, rep, and perks.
message FactionRequest {}

// FactionInfoRequest asks the server for public information about a specific faction.
message FactionInfoRequest {
  string faction_id = 1;
}

// FactionStandingRequest asks the server for the player's standing in all tracked factions.
message FactionStandingRequest {}

// ChangeRepRequest asks a Fixer NPC to improve the player's faction standing for currency.
message ChangeRepRequest {
  string faction_id = 1;
}

// TabCompleteRequest is sent by the client to request tab-completion candidates for the current input buffer.
message TabCompleteRequest {
  string prefix = 1; // current input buffer content
}

// TabCompleteResponse delivers sorted tab-completion candidates to the client.
message TabCompleteResponse {
  repeated string completions = 1; // matching completions, sorted alphabetically
}

// MaterialsRequest asks the server for the player's available crafting materials, optionally filtered by category.
message MaterialsRequest { string category = 1; }

// CraftListRequest asks the server for the list of craftable recipes, optionally filtered by category.
message CraftListRequest  { string category = 1; }

// CraftRequest asks the server to begin crafting the given recipe.
message CraftRequest      { string recipe_id = 1; }

// CraftConfirmRequest confirms a pending craft action.
message CraftConfirmRequest {}

// ScavengeRequest asks the server to scavenge the current room for materials.
message ScavengeRequest   {}

// AffixRequest asks the server to affix a precious material to an equipped item.
message AffixRequest {
    string material_query = 1;
    string target_query   = 2;
}

// ExploreRequest sets or clears the player's exploration mode.
// mode: one of "lay_low", "hold_ground", "active_sensors", "case_it",
//       "run_point", "shadow", "poke_around", or "off" to clear.
// shadow_target: player name to shadow (only used when mode == "shadow").
message ExploreRequest {
    string mode = 1;
    string shadow_target = 2;
}

// RefocusRequest asks the server to begin a Refocus action (REQ-EXP-REFOCUS-1).
message RefocusRequest {}

// SeduceRequest asks the server to attempt to seduce a target NPC (REQ-ZN-7).
message SeduceRequest {
    string target = 1;
}

// HotbarSlot carries a typed hotbar slot reference.
// kind: "command" | "feat" | "technology" | "throwable" | "consumable"
// ref: command text (for "command") or item/feat/tech ID (for all others)
// display_name: resolved by server from registries; empty falls back to ref
// description: resolved by server; empty for command slots
message HotbarSlot {
  string kind         = 1;
  string ref          = 2;
  string display_name = 3;
  string description  = 4;
  int32  uses_remaining     = 5;
  int32  max_uses           = 6;
  string recharge_condition = 7;
  // ap_cost is the action point cost for technology/feat slots; 0 for command slots.
  int32  ap_cost            = 8;
  // damage_summary is a compact description of the primary damage or heal effect,
  // e.g. "2d6 fire" or "1d8 healing". Empty for non-damaging techs and command slots.
  string damage_summary     = 9;
}

// HotbarRequest asks the server to set, clear, or show a hotbar slot.
// For typed (UI-driven) assignment, set kind+ref and leave text empty.
// For legacy command-text assignment (telnet hotbar command), set text and leave kind/ref empty.
message HotbarRequest {
  string action = 1;  // "set", "clear", "show"
  int32  slot   = 2;  // 1–10 for set/clear; ignored for show
  string text   = 3;  // backward-compat: non-empty for command-kind "set" via telnet
  string kind   = 4;  // typed kind for UI-driven set
  string ref    = 5;  // typed ref for UI-driven set
}

// HotbarUpdateEvent pushes the player's full 10-slot hotbar to the client.
message HotbarUpdateEvent {
  // Always exactly 10 entries; slots[0] = slot 1, slots[9] = slot 10.
  // An empty HotbarSlot (kind="", ref="") means unassigned.
  repeated HotbarSlot slots = 1;
}

// DowntimeRequest dispatches downtime subcommands: list, cancel, or an activity alias with optional args.
message DowntimeRequest {
    string subcommand = 1; // "list", "cancel", "", or activity alias
    string args       = 2; // optional args e.g. recipe name, item name
}

// QuestRequest dispatches quest subcommands: list, log, abandon, completed.
// args holds the subcommand and optional parameters (e.g. "list", "log q1", "abandon q1 confirm").
message QuestRequest {
    string args = 1;
}

// MaterialLoss describes the quantity of a material consumed during crafting.
message MaterialLoss {
    string material_id = 1;
    int32  quantity    = 2;
}

// CraftResultEvent delivers the result of a crafting or scavenging action to the client.
message CraftResultEvent {
    bool             success          = 1;
    string           item_id          = 2;
    int32            quantity         = 3;
    repeated MaterialLoss materials_lost = 4;
}

// UncurseRequest asks a chip_doc NPC to remove a cursed item.
message UncurseRequest {
  string npc_name  = 1; // name of the chip_doc NPC to address
  string item_name = 2; // name of the cursed equipped item to uncurse
}

// WeatherEvent broadcasts active weather state to all clients.
message WeatherEvent {
  string weather_name = 1; // display name of the weather event
  bool   active       = 2; // true = event started, false = event ended
  string description  = 3; // human-readable effects summary (e.g. "Reduced visibility, flooded terrain")
}

// JobGrantsRequest asks the server for the character's job feat and technology grant table.
message JobGrantsRequest {}

// JobFeatGrant describes a single feat granted by the job at a specific level.
message JobFeatGrant {
  int32  grant_level = 1; // character level when this feat is granted (1 = character creation)
  string feat_id     = 2;
  string feat_name   = 3;
}

// JobTechGrant describes a single technology granted by the job at a specific level.
message JobTechGrant {
  int32  grant_level = 1; // character level when this tech is granted (1 = character creation)
  string tech_id     = 2;
  string tech_name   = 3;
  int32  tech_level  = 4; // technology power level
  string tech_type   = 5; // "hardwired", "prepared", "spontaneous"
}

// JobGrantsResponse delivers the job's feat and technology grant table to the client.
message JobGrantsResponse {
  repeated JobFeatGrant      feat_grants          = 1;
  repeated JobTechGrant      tech_grants          = 2;
  repeated PendingFeatChoice pending_feat_choices = 3;
}

// FeatOption describes a single selectable feat in a pending choice pool.
//
// Precondition: feat_id is a valid feat ID in the server's feat registry.
message FeatOption {
  string feat_id     = 1;
  string name        = 2;
  string description = 3;
  string category    = 4;
}

// PendingFeatChoice describes one unresolved feat choice pool at a specific grant level.
//
// Precondition: count >= 1; options is non-empty; grant_level >= 1.
message PendingFeatChoice {
  int32             grant_level = 1;
  int32             count       = 2;
  repeated FeatOption options   = 3;
}

// ChooseFeatRequest asks the server to resolve one pending feat choice slot.
//
// Precondition: grant_level >= 1; feat_id is non-empty.
message ChooseFeatRequest {
  int32  grant_level = 1;
  string feat_id     = 2;
}

// Admin session snapshot for a single connected player.
message AdminSessionInfo {
  int64  char_id     = 1;
  string player_name = 2;
  int32  level       = 3;
  string room_id     = 4;
  string zone        = 5;
  int32  current_hp  = 6;
  int64  account_id  = 7;
}

message AdminListSessionsRequest  {}
message AdminListSessionsResponse { repeated AdminSessionInfo sessions = 1; }

message AdminKickRequest     { int64 char_id = 1; }
message AdminKickResponse    {}

message AdminMessageRequest  { int64 char_id = 1; string text = 2; }
message AdminMessageResponse {}

message AdminTeleportRequest  { int64 char_id = 1; string room_id = 2; }
message AdminTeleportResponse {}

// Admin zone/room/NPC messages.

message AdminListZonesRequest {}

message AdminZoneSummary {
  string id           = 1;
  string name         = 2;
  string danger_level = 3;
  int32  room_count   = 4;
