syntax = "proto3";

package game.v1;

option go_package = "github.com/cory-johannsen/mud/internal/gameserver/gamev1";

// GameService provides bidirectional streaming between the Telnet frontend
// and the Pitaya-powered game backend.
service GameService {
  // Session establishes a bidirectional stream for a single player session.
  // The client sends commands; the server sends events.
  rpc Session(stream ClientMessage) returns (stream ServerEvent);

  // Admin RPCs — unary, require admin role on the server side.
  rpc AdminListSessions(AdminListSessionsRequest) returns (AdminListSessionsResponse);
  rpc AdminKickPlayer(AdminKickRequest) returns (AdminKickResponse);
  rpc AdminMessagePlayer(AdminMessageRequest) returns (AdminMessageResponse);
  rpc AdminTeleportPlayer(AdminTeleportRequest) returns (AdminTeleportResponse);

  // World admin RPCs.
  rpc AdminListZones(AdminListZonesRequest)               returns (AdminListZonesResponse);
  rpc AdminListRooms(AdminListRoomsRequest)               returns (AdminListRoomsResponse);
  rpc AdminUpdateRoom(AdminUpdateRoomRequest)             returns (AdminUpdateRoomResponse);

  // NPC admin RPCs.
  rpc AdminListNPCTemplates(AdminListNPCTemplatesRequest) returns (AdminListNPCTemplatesResponse);
  rpc AdminSpawnNPC(AdminSpawnNPCRequest)                 returns (AdminSpawnNPCResponse);

  // Inventory admin RPCs.
  rpc AdminGiveItem(AdminGiveItemRequest)         returns (AdminGiveItemResponse);
  rpc AdminGiveCurrency(AdminGiveCurrencyRequest) returns (AdminGiveCurrencyResponse);
}

// ClientMessage wraps all client-to-server commands.
