syntax = "proto3";

package game.v1;

option go_package = "github.com/cory-johannsen/mud/internal/gameserver/gamev1";

// GameService provides bidirectional streaming between the Telnet frontend
// and the Pitaya-powered game backend.
service GameService {
  // Session establishes a bidirectional stream for a single player session.
  // The client sends commands; the server sends events.
  rpc Session(stream ClientMessage) returns (stream ServerEvent);
}

// ClientMessage wraps all client-to-server commands.
message ClientMessage {
  string request_id = 1;
  oneof payload {
    JoinWorldRequest join_world = 2;
    MoveRequest move = 3;
    LookRequest look = 4;
    SayRequest say = 5;
    EmoteRequest emote = 6;
    WhoRequest who = 7;
    ExitsRequest exits = 8;
    QuitRequest quit = 9;
    ExamineRequest examine = 10;
    AttackRequest attack = 11;
    FleeRequest   flee   = 12;
    PassRequest   pass   = 13;
    StrikeRequest strike = 14;
    StatusRequest status = 15;
    EquipRequest equip = 16;
    ReloadRequest reload = 17;
    FireBurstRequest fire_burst = 18;
    FireAutomaticRequest fire_automatic = 19;
    ThrowRequest throw = 20;
    InventoryRequest inventory_req = 21;
    GetItemRequest get_item = 22;
    DropItemRequest drop_item = 23;
    BalanceRequest balance = 24;
    SetRoleRequest set_role = 25;
    TeleportRequest teleport = 26;
    LoadoutRequest   loadout   = 27;
    UnequipRequest   unequip   = 28;
    EquipmentRequest equipment = 29;
    SwitchCharacterRequest switch_character = 30;
    WearRequest wear = 31;
    RemoveArmorRequest remove_armor = 32;
    CharacterSheetRequest char_sheet = 33;
    ArchetypeSelectionRequest archetype_selection = 34;
    UseEquipmentRequest use_equipment = 35;
    RoomEquipRequest    room_equip    = 36;
    MapRequest          map           = 37;
    SkillsRequest       skills_request = 38;
    FeatsRequest        feats_request   = 39;
    InteractRequest     interact_request    = 40;
    UseRequest          use_request         = 41;
    ClassFeaturesRequest class_features_request = 42;
    SummonItemRequest summon_item = 43;
    ProficienciesRequest proficiencies_request = 44;
    LevelUpRequest level_up = 45;
    CombatDefaultRequest combat_default = 46;
    TrainSkillRequest train_skill = 47;
    ActionRequest action = 48;
    RaiseShieldRequest raise_shield = 49;
    TakeCoverRequest take_cover = 50;
    FirstAidRequest first_aid = 51;
    FeintRequest feint = 52;
    DemoralizeRequest demoralize = 53;
    GrappleRequest grapple = 54;
    TripRequest trip = 55;
    HideRequest hide = 56;
    SneakRequest sneak = 57;
    DivertRequest divert = 58;
    EscapeRequest escape = 59;
    GrantRequest grant = 60;
    DisarmRequest disarm = 61;
    StrideRequest stride = 62;
    ShoveRequest shove = 63;
    StepRequest step = 64;
    TumbleRequest tumble = 65;
    SeekRequest seek = 66;
    ClimbRequest climb = 67;
    SwimRequest swim = 68;
    MotiveRequest motive = 69;
    CalmRequest calm = 70;
    HeroPointRequest hero_point = 71;
    DelayRequest delay = 72;
    JoinRequest join = 73;
    DeclineRequest decline = 74;
    GroupRequest group = 75;
    InviteRequest invite = 76;
    AcceptGroupRequest accept_group = 77;
    DeclineGroupRequest decline_group = 78;
    UngroupRequest ungroup = 79;
    KickRequest kick = 80;
    RestRequest rest = 81;
    SelectTechRequest select_tech = 82;
    AidRequest aid = 83;
    DisarmTrapRequest disarm_trap = 84;
    DeployTrapRequest deploy_trap = 85;
    ReadyRequest ready = 86;
    BrowseRequest        browse         = 87;
    BuyRequest           buy            = 88;
    SellRequest          sell           = 89;
    NegotiateRequest     negotiate      = 90;
    StashDepositRequest  stash_deposit  = 91;
    StashWithdrawRequest stash_withdraw = 92;
    StashBalanceRequest  stash_balance  = 93;
    HealRequest          heal            = 94;
    HealAmountRequest    heal_amount     = 95;
    TrainJobRequest      train_job       = 96;
    ListJobsRequest      list_jobs       = 97;
    SetJobRequest        set_job         = 98;
    HireRequest          hire            = 99;
    DismissRequest       dismiss         = 100;
    TalkRequest          talk            = 101;
    BribeRequest         bribe_request   = 102;
    BribeConfirmRequest  bribe_confirm_request = 103;
    SurrenderRequest     surrender_request     = 104;
    ReleaseRequest       release_request       = 105;
    SpawnNPCRequest      spawn_npc             = 106;
    AddRoomRequest       add_room              = 107;
    AddLinkRequest       add_link              = 108;
    RemoveLinkRequest    remove_link           = 109;
    SetRoomRequest       set_room              = 110;
    EditorCmdsRequest    editor_cmds           = 111;
    TravelRequest        travel                = 112;
  }
}

// RestRequest asks the server to rest the player and rearrange prepared technology slots.
message RestRequest {}

// SelectTechRequest asks the server to interactively assign pending technology grants.
message SelectTechRequest {}

// AidRequest asks the server to queue an Aid action targeting the named ally.
message AidRequest {
  string target = 1;
}

// DisarmTrapRequest asks the server to attempt to disarm a detected trap by name.
message DisarmTrapRequest {
  // trap_name is the trap name as shown at detection time.
  string trap_name = 1;
}

// ReadyRequest asks the server to ready a reaction with the given action and trigger.
message ReadyRequest {
  string action = 1;   // "strike" | "step" | "shield"
  string trigger = 2;  // "enters" | "attacks" | "ally"
}

// BrowseRequest lists a merchant's inventory with current prices and stock.
message BrowseRequest {
  string npc_name = 1;
}

// BuyRequest purchases an item from a merchant.
message BuyRequest {
  string npc_name = 1;
  string item_id  = 2;
  int32  quantity = 3;
}

// SellRequest sells an item to a merchant.
message SellRequest {
  string npc_name = 1;
  string item_id  = 2;
  int32  quantity = 3;
}

// NegotiateRequest attempts a skill check to earn a session-scoped price modifier.
message NegotiateRequest {
  string npc_name = 1;
  // skill is "smooth_talk" or "grift". Defaults to "smooth_talk" if empty.
  string skill    = 2;
}

// StashDepositRequest deposits carried credits into the global stash.
message StashDepositRequest {
  string npc_name = 1;
  int32  amount   = 2;
}

// StashWithdrawRequest withdraws from the global stash to carried credits.
message StashWithdrawRequest {
  string npc_name = 1;
  int32  amount   = 2;
}

// StashBalanceRequest queries stash balance and current exchange rate.
message StashBalanceRequest {
  string npc_name = 1;
}

// HealRequest asks the healer NPC to fully restore the player's HP.
message HealRequest {
  string npc_name = 1; // name of the healer NPC to address
}

// HealAmountRequest asks the healer NPC to restore a specific number of HP.
message HealAmountRequest {
  string npc_name = 1;
  int32  amount   = 2;
}

// TrainJobRequest asks a job trainer NPC to train the player in a job.
message TrainJobRequest {
  string npc_name = 1;
  string job_id   = 2;
}

// ListJobsRequest asks the server to list all jobs held by the player.
message ListJobsRequest {}

// SetJobRequest asks the server to change the player's active job.
// REQ-NPC-17: available from any room.
message SetJobRequest {
  string job_id = 1;
}

// HireRequest asks the server to hire a hireling NPC by name.
message HireRequest {
  string npc_name = 1;
}

// DismissRequest asks the server to dismiss the player's current hireling.
message DismissRequest {}

// TalkRequest initiates a conversation with a quest giver NPC.
message TalkRequest {
  string npc_name = 1;  // case-insensitive prefix matched against NPC name in room
}

// BribeRequest asks the server to initiate a bribe with an optional target NPC name.
message BribeRequest {
  string npc_name = 1;  // optional; required when multiple bribeable NPCs present
}

// BribeConfirmRequest confirms a pending bribe after reviewing the cost.
message BribeConfirmRequest {}

// SurrenderRequest asks the server to surrender to law enforcement in the current room.
message SurrenderRequest {}

// ReleaseRequest asks the server to release a detained player (law enforcement only).
message ReleaseRequest {
  string player_name = 1;  // name of detained player to release
}

// DeployTrapRequest asks the server to arm a trap item at the player's current position.
message DeployTrapRequest {
  // item_name is the consumable trap item to deploy.
  string item_name = 1;
}

// TravelRequest asks the server to fast-travel the player to the named zone.
message TravelRequest {
    string zone_id = 1;
}

// ServerEvent wraps all server-to-client events.
message ServerEvent {
  string request_id = 1;
  oneof payload {
    RoomView room_view = 2;
    MessageEvent message = 3;
    RoomEvent room_event = 4;
    PlayerList player_list = 5;
    ExitList exit_list = 6;
    ErrorEvent error = 7;
    Disconnected disconnected = 8;
    CharacterInfo character_info = 9;
    NpcView npc_view = 10;
    CombatEvent combat_event = 11;
    RoundStartEvent round_start = 12;
    RoundEndEvent   round_end   = 13;
    ConditionEvent  condition_event = 14;
    InventoryView inventory_view = 15;
    TimeOfDayEvent time_of_day = 16;
    CharacterSheetView character_sheet = 17;
    MapResponse        map             = 18;
    SkillsResponse     skills_response = 19;
    FeatsResponse      feats_response   = 20;
    InteractResponse     interact_response      = 21;
    UseResponse          use_response           = 22;
    ClassFeaturesResponse class_features_response = 23;
    ProficienciesResponse proficiencies_response = 24;
    HpUpdateEvent         hp_update              = 25;
  }
}

// HpUpdateEvent delivers a lightweight HP update to refresh the prompt bar.
// No console text is displayed; only the prompt is redrawn.
message HpUpdateEvent {
  int32 current_hp = 1;
  int32 max_hp     = 2;
}

// JoinWorldRequest is sent by the client to enter the game world after authentication.
message JoinWorldRequest {
  string uid = 1;
  string username = 2;
  int64  character_id   = 3;
  string character_name = 4;
  int32  current_hp     = 5;
  string location       = 6;
  string role           = 7;
  string region_display = 8;
  string class          = 9;
  int32  level          = 10;
  string archetype      = 11;
}

// MoveRequest asks the server to move the player in the given direction.
message MoveRequest {
  string direction = 1;
}

// LookRequest asks the server for the current room description.
message LookRequest {}

// SayRequest sends a chat message to all players in the same room.
message SayRequest {
  string message = 1;
}

// EmoteRequest sends an emote action to all players in the same room.
message EmoteRequest {
  string action = 1;
}

// WhoRequest asks for the list of players in the current room.
message WhoRequest {}

// ExitsRequest asks for the list of exits from the current room.
message ExitsRequest {}

// QuitRequest signals the client wants to disconnect.
message QuitRequest {}

// SwitchCharacterRequest asks the server to save and remove the current character
// so the player can select a different character without disconnecting.
message SwitchCharacterRequest {}

// RoomView describes the player's current room.
message RoomView {
  string room_id = 1;
  string title = 2;
  string description = 3;
  repeated ExitInfo exits = 4;
  repeated string players = 5;
  repeated NpcInfo npcs = 6;
  repeated ConditionInfo active_conditions = 7;
  repeated FloorItem floor_items = 8;
  int32  hour   = 9;
  string period = 10;
  repeated RoomEquipmentItem equipment = 11;
  string zone_name = 12;
}

// ExitInfo describes a single exit from a room.
message ExitInfo {
  string direction = 1;
  string target_room_id = 2;
  bool locked = 3;
  bool hidden = 4;
  string target_title = 5;
}

// MessageEvent delivers a chat message or emote from another player.
message MessageEvent {
  string sender = 1;
  string content = 2;
  MessageType type = 3;
}

// MessageType distinguishes between say and emote messages.
enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_SAY = 1;
  MESSAGE_TYPE_EMOTE = 2;
}

// RoomEvent notifies about player arrivals and departures.
message RoomEvent {
  string player = 1;
  RoomEventType type = 2;
  string direction = 3;
}

// RoomEventType distinguishes arrival from departure.
enum RoomEventType {
  ROOM_EVENT_TYPE_UNSPECIFIED = 0;
  ROOM_EVENT_TYPE_ARRIVE = 1;
  ROOM_EVENT_TYPE_DEPART = 2;
}

// PlayerList contains the players in the current room.
message PlayerList {
  string              room_title = 1;
  repeated PlayerInfo players    = 2;
}

// CombatStatus describes a player's current combat state.
enum CombatStatus {
    COMBAT_STATUS_UNSPECIFIED = 0;
    COMBAT_STATUS_IDLE        = 1;
    COMBAT_STATUS_IN_COMBAT   = 2;
    COMBAT_STATUS_RESTING     = 3;
    COMBAT_STATUS_UNCONSCIOUS = 4;
}

// PlayerInfo carries per-player detail for the who command.
message PlayerInfo {
    string       name         = 1;
    int32        level        = 2;
    string       job          = 3;
    string       health_label = 4;
    CombatStatus status       = 5;
}

// ExitList contains the exits from the current room.
message ExitList {
  repeated ExitInfo exits = 1;
}

// ErrorEvent delivers an error message to the client.
message ErrorEvent {
  string message = 1;
}

// Disconnected signals the server is closing the session.
message Disconnected {
  string reason = 1;
}

// TimeOfDayEvent is broadcast to all sessions when the game hour advances.
message TimeOfDayEvent {
  int32  hour   = 1;
  string period = 2;
  int32  day    = 3;
  int32  month  = 4;
}

// CharacterInfo is sent to the client on session join to display character stats.
message CharacterInfo {
  int64  character_id  = 1;
  string name          = 2;
  string region        = 3;
  string class         = 4;
  int32  level         = 5;
  int32  experience    = 6;
  int32  max_hp        = 7;
  int32  current_hp    = 8;
  int32  brutality     = 9;
  int32  quickness     = 10;
  int32  grit          = 11;
  int32  reasoning     = 12;
  int32  savvy         = 13;
  int32  flair         = 14;
}

// NpcInfo summarises an NPC visible in the room.
message NpcInfo {
  string instance_id         = 1;
  string name                = 2;
  string health_description  = 3;
  string fighting_target     = 4; // name of the player this NPC is currently fighting; empty if not in combat
  repeated string conditions = 5; // display names of active conditions (empty when not in combat or no conditions)
}

// ExamineRequest asks the server for detail on a named target.
message ExamineRequest {
  string target = 1;
}

// NpcView delivers detailed NPC information in response to examine.
message NpcView {
  string instance_id        = 1;
  string name               = 2;
  string description        = 3;
  string health_description = 4;
  int32  level              = 5;
}

// AttackRequest asks the server to attack a named target.
message AttackRequest {
  string target = 1;
}

// FleeRequest asks the server to attempt to flee combat.
message FleeRequest {}

// PassRequest forfeits the player's remaining action points for the current round.
message PassRequest {}

// StrikeRequest queues a 2-AP full attack routine (two attacks with MAP) against a target.
message StrikeRequest {
  string target = 1;
}

// EquipRequest asks the server to equip a weapon in the specified slot.
message EquipRequest {
  string weapon_id = 1;
  string slot = 2; // "primary", "secondary", "holster"
}

// ReloadRequest asks the server to reload the specified weapon, or the primary slot if empty.
message ReloadRequest {
  string weapon_id = 1; // empty = reload primary slot
}

// FireBurstRequest asks the server to fire a burst at the specified target.
message FireBurstRequest {
  string target = 1;
  string weapon_id = 2;
}

// FireAutomaticRequest asks the server to fire automatically at the specified target.
message FireAutomaticRequest {
  string target = 1;
  string weapon_id = 2;
}

// ThrowRequest asks the server to throw an explosive.
message ThrowRequest {
  string explosive_id = 1;
}

// InventoryRequest asks the server for the player's backpack contents and currency.
message InventoryRequest {}

// GetItemRequest asks the server to pick up an item from the room floor.
message GetItemRequest {
  string target = 1; // item name or "all"
}

// DropItemRequest asks the server to drop an item from the backpack.
message DropItemRequest {
  string target = 1; // item name
}

// BalanceRequest asks the server for the player's currency.
message BalanceRequest {}

// SetRoleRequest asks the server to change a player's privilege level.
message SetRoleRequest {
  string target_username = 1;
  string role = 2;
}

// LoadoutRequest displays or swaps the player's weapon presets.
// If arg is empty, the server returns the current loadout display.
message LoadoutRequest {
  string arg = 1;
}

// UnequipRequest removes the item in the named slot and returns it to the backpack.
message UnequipRequest {
  string slot = 1;
}

// EquipmentRequest asks the server to display all equipped items.
message EquipmentRequest {}

// TeleportRequest asks the server to teleport a player to a specific room.
message TeleportRequest {
  string target_character = 1;
  string room_id = 2;
}

// SummonItemRequest asks the server to spawn an item directly into the player's inventory (admin only).
message SummonItemRequest {
  string item_id = 1;
  int32 quantity = 2;
}

// FloorItem describes an item on the room floor.
message FloorItem {
  string instance_id = 1;
  string name = 2;
  int32 quantity = 3;
}

// RoomEquipmentItem describes a permanent or respawning item in a room.
message RoomEquipmentItem {
    string instance_id = 1;
    string name        = 2;
    int32  quantity    = 3;
    bool   immovable   = 4;
    bool   usable      = 5;
}

// UseEquipmentRequest asks the server to use a room equipment item.
message UseEquipmentRequest {
    string instance_id = 1;
}

// MapRequest is sent by the client to view the automap.
message MapRequest {
    string view = 1; // "zone" (default) | "world"
}

// MapTile represents one discovered room on the automap grid.
message MapTile {
    string room_id   = 1;
    string room_name = 2;
    int32  x         = 3;
    int32  y         = 4;
    bool   current   = 5;
    repeated string exits = 6;
    string danger_level  = 7;
    repeated string pois = 8; // POI type IDs present in this room e.g. ["merchant", "equipment"]
}

// WorldZoneTile represents one zone on the world map.
message WorldZoneTile {
    string zone_id      = 1;
    string zone_name    = 2;
    int32  world_x      = 3;
    int32  world_y      = 4;
    bool   discovered   = 5;
    bool   current      = 6;
    string danger_level = 7;
}

// MapResponse is returned by the server with discovered tiles for the current zone
// and/or world map zone tiles.
message MapResponse {
    repeated MapTile       tiles       = 1;
    repeated WorldZoneTile world_tiles = 2;
}

// SkillsRequest is sent by the client to view skill proficiencies.
message SkillsRequest {}

// SkillEntry represents one skill with its proficiency rank.
message SkillEntry {
  string skill_id     = 1;
  string name         = 2;
  string ability      = 3;
  string proficiency  = 4;
  int32  bonus        = 5;
  string description  = 6;
}

// SkillsResponse contains all skill entries for the character.
message SkillsResponse {
  repeated SkillEntry skills = 1;
}

// RoomEquipRequest asks the server to manage room equipment (editor command).
message RoomEquipRequest {
    string sub_command = 1;
    string item_id     = 2;
    int32  max_count   = 3;
    string respawn     = 4;
    bool   immovable   = 5;
    string script      = 6;
}

// InventoryItem describes an item in the player's backpack.
message InventoryItem {
  string instance_id = 1;
  string name = 2;
  string kind = 3;
  int32 quantity = 4;
  double weight = 5;
}

// InventoryView shows the player's backpack and currency.
message InventoryView {
  repeated InventoryItem items = 1;
  int32 used_slots = 2;
  int32 max_slots = 3;
  double total_weight = 4;
  double max_weight = 5;
  string currency = 6;
  int32 total_rounds = 7;
}

// RoundStartEvent is broadcast to all combatants when a new round begins.
message RoundStartEvent {
  int32           round            = 1;
  int32           actions_per_turn = 2;
  int32           duration_ms      = 3;
  repeated string turn_order       = 4;
}

// RoundEndEvent is broadcast when a round's actions have resolved.
message RoundEndEvent {
  int32 round = 1;
}

// CombatEvent delivers combat narration to all players in the room.
message CombatEvent {
  CombatEventType type    = 1;
  string attacker         = 2;
  string target           = 3;
  int32  attack_roll      = 4;
  int32  attack_total     = 5;
  string outcome          = 6;
  int32  damage           = 7;
  int32  target_hp        = 8;
  string narrative        = 9;
  string weapon_name      = 10;
}

// CombatEventType distinguishes combat narration events.
enum CombatEventType {
  COMBAT_EVENT_TYPE_UNSPECIFIED  = 0;
  COMBAT_EVENT_TYPE_INITIATIVE   = 1;
  COMBAT_EVENT_TYPE_ATTACK       = 2;
  COMBAT_EVENT_TYPE_DEATH        = 3;
  COMBAT_EVENT_TYPE_FLEE         = 4;
  COMBAT_EVENT_TYPE_END          = 5;
  COMBAT_EVENT_TYPE_CONDITION    = 6;
  COMBAT_EVENT_TYPE_RELOAD       = 7;
  COMBAT_EVENT_TYPE_THROW        = 8;
}

// StatusRequest asks the server to return the player's active conditions.
message StatusRequest {}

// ConditionEvent reports a condition being applied to or removed from an entity.
message ConditionEvent {
  string target_uid     = 1;
  string target_name    = 2;
  string condition_id   = 3;
  string condition_name = 4;
  int32  stacks         = 5;
  bool   applied        = 6;  // true = applied/advanced, false = removed/expired
}

// WearRequest asks the server to equip an armor item from inventory into a body slot.
message WearRequest {
  string item_id = 1;
  string slot = 2;
}

// RemoveArmorRequest asks the server to remove armor from a body slot, returning it to the backpack.
message RemoveArmorRequest {
  string slot = 1;
}

// ConditionInfo describes one active condition on a combatant.
message ConditionInfo {
  string id                 = 1;
  string name               = 2;
  int32  stacks             = 3;
  int32  duration_remaining = 4;  // -1 = permanent or until_save
}

// CharacterSheetRequest asks the server for the player's full character sheet.
message CharacterSheetRequest {}

// ArchetypeSelectionRequest asks the server to assign an archetype to the player's character.
message ArchetypeSelectionRequest {
  string archetype_id = 1;
}

// FeatsRequest is sent by the client to view feat list.
message FeatsRequest {}

// FeatEntry represents one feat with its details.
message FeatEntry {
  string feat_id       = 1;
  string name          = 2;
  string category      = 3;
  bool   active        = 4;
  string description   = 5;
  string activate_text = 6;
}

// FeatsResponse contains all feat entries for the character.
message FeatsResponse {
  repeated FeatEntry feats = 1;
}

// ClassFeaturesRequest is sent by the client to view class feature list.
message ClassFeaturesRequest {}

// ClassFeatureEntry represents one class feature with its details.
message ClassFeatureEntry {
    string feature_id    = 1;
    string name          = 2;
    string archetype     = 3;
    string job           = 4;
    bool   active        = 5;
    string description   = 6;
    string activate_text = 7;
}

// ClassFeaturesResponse contains all class feature entries for the character.
message ClassFeaturesResponse {
    repeated ClassFeatureEntry archetype_features = 1;
    repeated ClassFeatureEntry job_features       = 2;
}

// InteractRequest asks the server to interact with a room equipment item by instance ID.
message InteractRequest {
  string instance_id = 1;
}

// InteractResponse carries the result of a room equipment interaction.
message InteractResponse {
  string message = 1;
}

// UseRequest asks the server to activate an active feat.
// An empty feat_id causes the server to return the list of available active feats.
message UseRequest {
  string feat_id = 1;
  string target  = 2;
}

// UseResponse carries the result of a feat activation or a list of active feats.
message UseResponse {
  string             message = 1;
  repeated FeatEntry choices = 2;
}

// PreparedSlotView represents one prepared technology slot on the character sheet.
message PreparedSlotView {
    string tech_id  = 1;
    bool   expended = 2;
}

// CharacterSheetView delivers the player's full character sheet.
message CharacterSheetView {
    string name      = 1;
    string job       = 2;
    string archetype = 3;
    string team      = 4;
    int32  level     = 5;

    int32 brutality  = 6;
    int32 grit       = 7;
    int32 quickness  = 8;
    int32 reasoning  = 9;
    int32 savvy      = 10;
    int32 flair      = 11;

    int32 current_hp    = 12;
    int32 max_hp        = 13;
    int32 ac_bonus      = 14;
    int32 check_penalty = 15;
    int32 speed_penalty = 16;

    string currency = 17;

    map<string, string> armor       = 18;
    map<string, string> accessories = 19;
    string main_hand              = 20;
    string off_hand               = 21;
    string main_hand_attack_bonus = 33; // e.g. "+5" or "—" if no weapon
    string main_hand_damage       = 34; // e.g. "1d8+3" or "—" if no weapon
    string off_hand_attack_bonus  = 35; // e.g. "+3" or "—" if no off-hand weapon
    string off_hand_damage        = 36; // e.g. "1d6+1" or "—" if no off-hand weapon
    int32  total_ac               = 37; // 10 + effective dex mod + sum of armor ac_bonus
    repeated ResistanceEntry player_resistances = 38;
    repeated ResistanceEntry player_weaknesses  = 39;

    repeated SkillEntry        skills         = 22;
    repeated FeatEntry         feats          = 23;
    repeated ClassFeatureEntry class_features = 24;
    repeated ProficiencyEntry  proficiencies  = 25;

    int32 toughness_save = 26; // static bonus: grit_mod + proficiency_bonus
    int32 hustle_save    = 27; // static bonus: quickness_mod + proficiency_bonus
    int32 cool_save      = 28; // static bonus: savvy_mod + proficiency_bonus

    int32 experience     = 29; // current total XP
    int32 xp_to_next     = 30; // XP remaining to reach next level (0 if at level cap)
    int32 pending_boosts          = 31; // number of unassigned ability boosts
    int32 pending_skill_increases = 32; // number of unassigned skill rank increases
    string gender = 40;
    int32  awareness = 41; // static bonus: 10 + savvy_mod + awareness_proficiency_bonus
    int32  hero_points = 42; // current hero point count
    int32  pending_tech_selections = 43; // number of pending technology grant selections
    repeated PreparedSlotView prepared_slots = 44; // prepared technology slots with expended state
    repeated SpontaneousUsePoolView spontaneous_use_pools = 45;
    repeated InnateSlotView innate_slots = 46;
    // active_set_bonuses lists human-readable descriptions of currently active equipment set bonuses (REQ-EM-31).
    repeated string active_set_bonuses = 47;
}

// InnateSlotView delivers the per-tech innate use slot state for the character sheet.
message InnateSlotView {
    string tech_id        = 1;
    int32  uses_remaining = 2;
    int32  max_uses       = 3;
}

// SpontaneousUsePoolView delivers the daily use pool for one spontaneous tech level.
message SpontaneousUsePoolView {
    int32 tech_level     = 1;
    int32 uses_remaining = 2;
    int32 max_uses       = 3;
}

// ResistanceEntry represents one player damage-type resistance or weakness.
message ResistanceEntry {
  string damage_type = 1; // e.g. "fire", "piercing"
  int32  value       = 2; // flat amount
}

// ProficienciesRequest is sent by the client to view armor/weapon proficiencies.
message ProficienciesRequest {}

// ProficiencyEntry represents one proficiency category with its rank and bonus.
message ProficiencyEntry {
  string category = 1; // e.g. "light_armor", "simple_weapons"
  string name     = 2; // e.g. "Light Armor", "Simple Weapons"
  string rank     = 3; // "untrained", "trained", etc.
  int32  bonus    = 4; // CombatProficiencyBonus(level, rank)
  string kind     = 5; // "armor" or "weapon"
}

// ProficienciesResponse contains all proficiency entries for the character.
message ProficienciesResponse {
  repeated ProficiencyEntry proficiencies = 1;
}

// LevelUpRequest asks the server to apply a pending ability boost to the named ability.
message LevelUpRequest {
  string ability = 1;
}

// CombatDefaultRequest asks the server to persist the player's preferred default combat action.
message CombatDefaultRequest {
  string action = 1;
}

// TrainSkillRequest asks the server to advance a skill proficiency rank.
message TrainSkillRequest {
  string skill_id = 1;
}

// ActionRequest asks the server to perform a named action against an optional target.
// An empty name causes the server to return the list of available actions.
message ActionRequest {
  string name   = 1; // action ID or shortcut alias; empty means list available actions
  string target = 2; // target NPC name; empty if not required
}

// RaiseShieldRequest asks the server to raise the player's shield.
message RaiseShieldRequest {}

// TakeCoverRequest asks the server to have the player take cover.
message TakeCoverRequest {}

// FirstAidRequest asks the server to apply first aid to the player.
message FirstAidRequest {}

// FeintRequest asks the server to feint against a target NPC.
message FeintRequest {
    string target = 1;
}

// DemoralizeRequest asks the server to demoralize a target NPC.
message DemoralizeRequest {
    string target = 1;
}

// GrappleRequest asks the server to grapple a target NPC.
message GrappleRequest {
    string target = 1;
}

// TripRequest asks the server to trip a target NPC.
message TripRequest {
    string target = 1;
}

// DisarmRequest asks the server to disarm a target NPC.
message DisarmRequest {
    string target = 1;
}

// StrideRequest asks the server to stride toward or away from the current target.
message StrideRequest {
    string direction = 1; // "toward" or "away"
}

// ShoveRequest asks the server to shove a target NPC, pushing them back 5ft (10ft on critical success).
message ShoveRequest {
    string target = 1;
}

// StepRequest asks the server to step 5 ft toward or away from the current target.
// Step does not trigger Reactive Strikes.
message StepRequest {
    string direction = 1; // "toward" or "away"
}

// HideRequest asks the server to attempt to hide the player.
message HideRequest {}

// SneakRequest asks the server to attempt to sneak while hidden.
message SneakRequest {}

// DivertRequest asks the server to create a diversion to hide the player.
message DivertRequest {}

// EscapeRequest asks the server to escape from the grabbed condition.
message EscapeRequest {}

// TumbleRequest asks the server to tumble through the target NPC's space (Acrobatics vs Hustle DC).
message TumbleRequest {
  string target = 1;
}

// SeekRequest asks the server to scan for hidden NPCs (Perception vs NPC Stealth DC).
message SeekRequest {}

// ClimbRequest asks the server to attempt climbing a climbable surface.
message ClimbRequest {
  string direction = 1; // compass direction to climb (e.g. "up", "north")
}

// SwimRequest asks the server to attempt swimming through a water exit.
message SwimRequest {
  string direction = 1; // compass direction to swim (e.g. "north", "east")
}

// CalmRequest asks the server to attempt calming the player's worst active mental state.
message CalmRequest {}

// HeroPointRequest asks the server to spend a hero point.
message HeroPointRequest {
  string subcommand = 1; // "reroll" or "stabilize"
}

// DelayRequest banks remaining AP for next round at cost of -2 AC.
message DelayRequest {}

// JoinRequest asks the server to join active combat in the current room.
message JoinRequest {}

// DeclineRequest asks the server to decline joining active combat.
message DeclineRequest {}

// GroupRequest asks the server to create a group or show group info.
// args is optional; when non-empty it is treated as a player name to invite.
message GroupRequest { string args = 1; }

// InviteRequest asks the server to invite a player to the sender's group.
message InviteRequest { string player = 1; }

// AcceptGroupRequest asks the server to accept a pending group invitation.
message AcceptGroupRequest {}

// DeclineGroupRequest asks the server to decline a pending group invitation.
message DeclineGroupRequest {}

// UngroupRequest asks the server to leave (or disband) the sender's group.
message UngroupRequest {}

// KickRequest asks the server to remove a player from the sender's group.
message KickRequest { string player = 1; }

// MotiveRequest asks the server to read an NPC's intentions (awareness vs Hustle DC).
message MotiveRequest {
  string target = 1;
}

// GrantRequest asks the server to grant XP or money to a named player (editor command).
message GrantRequest {
  string grant_type = 1; // "xp" or "money"
  string char_name  = 2; // target character name
  int32  amount     = 3; // amount to grant (must be > 0)
}


// SpawnNPCRequest asks the server to spawn one NPC instance from a template.
message SpawnNPCRequest {
  string template_id = 1;
  string room_id     = 2; // empty = editor's current room
}

// AddRoomRequest asks the server to add a new room to a zone.
message AddRoomRequest {
  string zone_id = 1;
  string room_id = 2;
  string title   = 3;
}

// AddLinkRequest asks the server to add a bidirectional exit between two rooms.
message AddLinkRequest {
  string from_room_id = 1;
  string direction    = 2;
  string to_room_id   = 3;
}

// RemoveLinkRequest asks the server to remove a directional exit from a room.
message RemoveLinkRequest {
  string room_id   = 1;
  string direction = 2;
}

// SetRoomRequest asks the server to set a field on the editor's current room.
message SetRoomRequest {
  string field = 1;
  string value = 2;
}

// EditorCmdsRequest asks the server to list all editor commands.
message EditorCmdsRequest {}
