server:
  mode: standalone
  type: mud

database:
  host: localhost
  port: 5433
  user: mud
  password: mud
  name: mud
  sslmode: disable
  max_conns: 10
  min_conns: 2
  max_conn_lifetime: 1h

telnet:
  host: 127.0.0.1
  port: 4000
  headless_port: 4002
  read_timeout: 5m
  write_timeout: 30s
  # Telnet-deprecation (#325): the player flow is retired by default.
  allow_game_commands: false
  web_client_url: http://localhost:8080

logging:
  level: debug
  format: console

gameserver:
  grpc_host: 127.0.0.1
  grpc_port: 50051
  game_clock_start: 6
  game_tick_duration: 1m
