# deployments/k8s/mud/templates/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: mud-credentials
  namespace: mud
  annotations:
    # Prevent helm from overwriting the JWT secret on upgrade.
    # The web-jwt-secret key is managed out-of-band via kubectl patch.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  db-user: {{ required "db.user is required" .Values.db.user | quote }}
  db-password: {{ required "db.password is required" .Values.db.password | quote }}
  db-name: {{ required "db.name is required" .Values.db.name | quote }}
  {{- if .Values.webClient.jwtSecret }}
  web-jwt-secret: {{ .Values.webClient.jwtSecret | quote }}
  {{- end }}
