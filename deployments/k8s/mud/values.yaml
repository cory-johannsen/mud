# deployments/k8s/mud/values.yaml
image:
  registry: registry.johannsen.cloud:5000
  tag: latest
  pullPolicy: Always
  gameserverRepository: mud-gameserver
  frontendRepository: mud-frontend

db:
  name: mud
  user: mud
  password: ""   # required; pass via --set db.password=...

postgres:
  storage: 5Gi
  storageClass: ""   # empty uses the cluster default StorageClass
  hostPath: ""       # if set, use a hostPath volume at this path instead of a PVC
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

gameserver:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

frontend:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

content:
  persistentVolume:
    enabled: false        # set true in production
    storageClass: ""      # uses cluster default if empty
    size: 1Gi
    accessMode: ReadWriteOnce

logging:
  level: info
  format: json

webClient:
  repository: mud-webclient
  jwtSecret: ""  # required; pass via --set webClient.jwtSecret=...
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
